body:
  text: 厚齋易學卷十七宋馮椅撰易輯傳第十三經上篇坎離坎下坎上習坎贊曰重險也水流而不盈又曰天險不可升也地險山川丘陵也王公設險以守其國險之時用大矣哉説卦曰坎者水也正北方之卦也勞卦也萬物之所歸也故曰勞乎坎又曰坎陷也雜卦曰離上而坎下也朱子曰習重也坎險陷也其象為水陽陷隂中外虛而中實也上下皆坎是為重險李子思曰反之復之是之謂習習有重復之義李氏曰卦名習坎孔子釋之曰重險若巽言重巽離言重明皆因事以起義推而明之不若習坎之義正在於卦辭也石守道曰大統言之水也指實言之窪陷深險之處也夫窪陷深險之處水性習坎是以洊至習者不一之謂習熟也水之就下日至焉又至焉上下皆坎亦重險也王景孟曰陽陷於隂也水性善陷陷為險難謂之習坎者險中復有險也程可久曰坎為水離為火水火二字乃立坎離之畫又曰正北方之卦於至隂之中而陽生焉其氣不純故卦獨冠以習於方曰北曰朔太玄配罔與冥難經曰臟各有一腎獨有兩其蟲有龜有蛇皆其義也在人於用險不得不習吕與叔曰八卦唯險非吉德故於坎也獨以習名更試重險乃君子有所事也馮當可曰六純卦獨於坎言習君子之用坎最難不比諸卦坎險也人之險患難死生也君子卒然蹈患難死生之際居之恬然無變於心非積習之力有所不能都聖與曰習因而重也憂患之不一也習之義訓因書曰卜不習吉是也夫因性所有而後可習孔子曰性相近也習相逺也鄭舜舉曰八重卦獨坎加習文王之所加也文王居憂患之時而以憂患後世為心於是演易八卦自坎之外其七卦皆處平夷唯坎則一陽陷乎中而有險難之義其象為水水至險水雖至險而習乎水者出入乎水而不能溺然則習乎險難者斯能無入而不自得也亦有此義右明習義張子厚曰色以離見聲以震聞臭以巽知味以坎達坎離者天地之中二氣之正交非此二物則無易一陷溺而不得出為坎一附麗而不能去為離又曰隂陽之精互藏其宅李子思曰乾坤三畫以初相易而成震巽以中相易而成坎離以三相易而成艮兊故乾坤者隂陽之祖而坎離則天地之中也坎居正北於時為子為夜之中離居正南於時為午為日之中夜之中而一陽生焉故坎之三畫一陽居中日之中而一隂生焉故離之三畫一隂居中天地隂陽之中乃造化張本之地故易上經始乾坤而終坎離貴其得天地隂陽之中而為易之用也易之道本乎中乾坤以中相交而成坎離坎離得乾坤之中而成既未濟坎離者乾坤之中交而致用而既未濟者又坎離之中見于交不交之際而致用各别也且天一下降坎中在物為水而在人為精以畫觀之坎之一陽居中而中實即精藏于中而水積于淵之象也地二上兆離中在物為火而在人為神以畫觀之離之一隂在中而中虛則神寓于心而火明于空之象也李去非曰天地有真用坎離是也坎藏一天一生水而陷伏于二隂之間所謂藏一也人之思在火而精在水故精一則神全神全則形氣滋潤此坎水之效也楊廷秀曰坎本坤也乾一陽交其中而生水水內陽而外隂故其明內景離本乾也坤一隂交其中而生火火內隂而外陽故其明外景李仲永曰八卦獨坎言習萬物以生為險出乎一入乎一相因習於無窮也老氏書有九九篇明生生之理自一而至於九則窮矣九九八十一又不離乎一中則是墮於一中相習以險而無窮也案天地之中後天之坎離文王之易也隂陽之中先天之坎離包犧之易也何也春為陽中其位在卯秋為隂中其位在酉先天之易離東而坎西故曰隂陽之中書紀羲和東曰日中西曰宵中是也若夫冬至日景極北其位在子夏至日景極南其位在午後天之易坎子而離午故曰天地之中然夏至隆暑至於流金鑠石冬至隆寒至於折膠墮指乃隂陽之偏非中也若曰坎離天地隂陽之中則猶有當辨者大抵陽中有隂動根靜也隂中有陽靜根動也一動一靜互為其根後天坎離之謂也觀其畫可以見矣趙氏曰天一生水而為坎一者陽也坎雖以陷為義而乾陽在坤隂之中實為萬物胚胎之始故易始乾坤屯蒙需訟師比六卦繼之者皆有坎非偶然也屯蒙以乾之一索再索三索于坤而為卦皆以陽卦之合而成也然後以乾遇坎而為需訟以坤遇坎而為師比蓋莫不有自然之序存焉嗚呼此乾之所以居于西北而坎之所以居于正北者與右明坎義贊曰水洊至習坎君子以常德行習教事案習教閲兵武之事以備險也常德行者歲有四時之常右明卦用説卦坎為豕又曰坎為耳又曰坎再索而得男故謂之中男又曰坎為水為溝瀆為隱伏為矯輮為弓輪其于人也為加憂為心病為耳痛為血卦為赤其于馬也為美脊為亟心為下首為薄蹄為曳其于車也為多眚為通為月為盜其于木也為堅多心案此皆三畫未重之坎也右廣卦象序卦曰物不可以終過故受之以坎程正叔曰過極則必陷林黃中曰坎之成卦大過之變也大過之中爻三四之陽陷而為隂是以謂之坎也巽為木兊為澤木過乎澤而入于坎陷之中是以謂之坎也夫君子者未嘗無過物之志也然而消息天之行也天之所廢雖有過人之材亦末如之何矣是以大過上六有過涉滅頂之凶過而受之以坎斯其義也案聞之頤大過者坎離之象也頤為隂中大過陽中特隂陽之中爾故大過之後受之以坎坎者陽中而不過坎之後受之以離離者隂中而不過者也坎離所以濟頤大過過中之失右明卦序有孚維心亨行有尚贊曰行險而不失其信維心亨乃以剛中也行有尚往有功也程可久曰水善信而中實為有孚維心亨謂二五之迹陷而心志相通也所以行有尚尚配也李去非曰坎陽中也而陷於二隂故為險出乎險則為心亨陷而不能出則為心病生於水者安於水以習之有素也不習則玩而多死習坎之具其唯心乎故曰言忠信行篤敬雖蠻貊之邦行矣又曰心者中也二五皆中也平心以行險忠信以將之案説卦三畫之坎故為心病彖重坎也故為心亨林黃中曰一陽陷於二隂之中猶人之善溺身首俱陷而心獨亨也故坎為通楊中立曰北方寒極而隂凝一陽動乎中故凝釋而為水水者一之所生也一之所起有一而未形其為物不二矣故有孚心亨陽在內也誠孚于中險不能陷故亨夫險非可止之地止於險則終于陷而已故行有尚張子厚曰內外皆險義不可止馮當可曰行亦險不行亦險行也有可以出險之道不行則坐受其困矣案彖辭皆重坎之象主二五陽爻居中而言而二陽爻又主九五而言孚中實也有孚者與二相孚也心中居也維心亨者與二志通也行有尚者水之行無不下五行而有二為之配也居險阻之中非君臣誠心相與以圗出險鮮不為其所陷矣李子思曰坎之中實是為誠故曰有孚離之中虛是為明故曰重明作易者因坎離之中而寓誠明之用古聖人之心學也右明卦象占初六習坎入于坎窞凶贊曰習坎入坎失道凶也林黃中曰下卦之下又遇坎焉入于坎窞之象也楊廷秀曰重坎之下故為窞耦畫穴之象都聖與曰言入乎險而不能自出也王輔嗣曰最處坎底上無應援是以凶也朱子曰以隂柔居重坎之下其陷益深故其象占如此案前又一坎故曰習坎習坎之始未能熟險材弱不能有濟遇坎之穴焉而入之沒溺必矣是以凶也右明象占蘭惠卿曰隂柔之資無出險之材李子思曰水性善陷而居重險之下坎中之坎陷之尤甚者也嗚呼世間有夷坦之途唯髙明者識之擲埴索塗冥行于世者皆隂暗昏迷失道而入坎者也袁氏曰坎之性以出為德坎之時以往為有功初以趣下之性居重險之下入於坎窞者也夫離之性上而好上者無所容故突如其來如坎之性下而趣下者則失道故入于坎窞凶程可久曰初與四皆承陽而得失不同者初純坎以陷為象四雜物撰德始有承陽之美右明爻義九二坎有險求小得贊曰求小得未出中也蘭惠卿曰居下坎之中上有險而未可即出故曰坎有險在險難之時以剛居中其材足以自濟而上下二隂傅之求小得也張子厚曰險難之際弱必傅強上下俱隂求必見從李子思曰坎之有孚心亨唯賴於剛中九二似為二隂所陷然上下比而傅之為所服役故求隂小為得所得者小以居險之中未能出險而僅得左右二隂之用而已林黃中曰大川之水無險不平今居下而有險焉則淺淺之流也傳曰水之積也不厚則其負大舟也無力然則九二之水不足以行大舟近者求濟小有得而已不能無所不通如九五也案九二陽剛之材陷於二隂上猶有坎焉至九五而後有孚心亨有尚而可以圗出險矣故曰坎有險若以二隂同體相依以為固則庶或可爾故曰求小得以得中故也然上猶有坎故未出中都聖與曰有險云者未必有而不能必無之辭夫隂為險者也險趣下者也出乎一隂之上而掩乎一隂之下故以有險言焉九二以陽居尊大者之象也初六以隂在下小者之象也九五不應而初六承之求小得之義也案此止以下一坎為象而於贊未出中之義最切陽饒隂乏一陽在中而二隂下陷坎之所以為有險也自卦言之則以二五剛中同德相濟為象自爻言之則以二剛不相應為象不相悖也右明象占六三來之坎坎險且枕入于坎窞勿用贊曰來之坎坎終無功也王輔嗣曰履非其位又處兩坎之間出則之坎居則亦坎王景孟曰乾之三處二乾之間故曰終日乾乾坎之三處二坎之間故曰來之坎坎右明象馮當可曰用與勿用在人則知處險者時處乎險而吉凶者在我而已居六三之時而能勿用六三之道則免乎險此聖人以易垂訓之意也右明占案六四耦畫有穴之象在坎之下故曰坎窞初六之本爻下卦之坎窞也六三之上卦則入于上卦之坎窞矣來而退於內則有九二之險而上坎之水且沈溺矣是來亦坎也之而進於外則遇六四之陷入于坎窞矣是之亦坎也進退一無可者唯有勿用而已其所以然者處下卦之終當進退之際兩坎相遇位多凶德不稱也右明爻義六四樽酒簋二用缶納約自牖終無咎贊曰剛柔際也張舜元曰震有著尊之象焉互體震連於上體之坎有酒之象焉全體有簋之象焉坎為缶比之盈缶亦坎象著樽盛玄酒醴齊奠之牖下樂則用缶以爵內約自牖而酌獻之五則俯而受之剛柔相際各以其正故無咎也朱子發曰樽酒而簋副之燕饗之禮君臣相際之時也楊廷秀曰約如約信曰誓之約郭立之曰醴酒之設玄酒之尚貴其誠之著也國有凶荒則殺禮時有難易也至薄之禮可以自幽而達明坎之時為然四五近比而相親非正應自牖之象也吕與叔曰居重險之中獨傅陽明如自牖內約物雖薄而必饗明信著交際得也耿睎道曰皆以四交五之意張説近之大抵居坎險之時君臣相與以圗出險不暇求禮文之備而苟可以通其情足矣坎為酒食樽簋之象也下又一坎二之象也三四耦畫居二五竒畫之中缶中虛之象也亦牖通明之象也離九三四鼓缶而歌宛丘之詩曰坎其擊缶缶聲當樂也坎坎考擊之聲故缶又應坎象約質言也牖下私家之制此九五下際於四而四為禮以享之與圗險也世儒言納約自牖從明處入恐非本指林黃中曰禮飲于牖下詩奠于牖下室前也周官司約掌邦國及萬民之約劑治神之約為上神約謂命祀郊社羣望及所祖宗也其不能修祝嘏者內約劑而已一樽之酒一簋之食其樂用缶其告用約可謂簡且陋矣然而君子以是而為禮而鬼神亦以是而來歆者貴其誠也爾雅大琴謂之離小罍謂之坎琴中虛而外實罍中實而上下虛也古之制器而尚象蓋如此此説亦可通先儒唯王氏曰用至誠神明可享言焉而不詳姑存之以俟有考者右明象占李子思曰八純卦六爻俱無相應唯以近比而相交際為義夫居坎險之時以漸出而升于上者為貴六四離下體而進而傅五有欲出險之意真情相向期於濟難蓋當艱險之時不待侈為繁文縟禮而後可以導其誠意也石守道曰在重險之中得人應援則可以攀援而出今諸爻皆不能出以其無應也四已出險上攀援九五剛尊之君如此則得以濟是坎之卦獨以此一爻為美此深得文王之指坎之諸爻無一吉者故即其近君已出一險為義以告萬世處險圗濟之方也與大過九四之指同右明爻義九五坎不盈祗既平無咎贊曰坎不盈中未大也楊中立曰剛得中而履尊位宜可以濟險矣然一陽在二隂之中則雖中而未大故坎不盈祗既平而已盈則出險矣然既平則有出險之漸故無咎蘭惠卿曰以陽剛之材為濟險之主居中履正如水之流雖不至於滿盈而亦幾及於既平而不卑陷所以無咎以幾訓祗李季辨曰五濟險難之君也有孚心亨全在於五如水流而不盈行險而不失其信者然後可以出險止於既平然後無咎如水至於海既得水之平然後其流息也毛伯玉曰水之性行則亨止則盈水以亨為用不以盈也故彖贊曰水流而不盈而爻辭曰坎不盈盈則有泛溢之虞唯其不盈此所以適於既平也李去非曰月者水之精也月在天滿則虧亦有不盈之義劉長民曰坎盈於中則水盈而不流矣耿晞道曰在上體則幾於出險矣然猶未出則不盈而平之象也石守道曰須能平此難則無咎程正叔曰以九五剛中之材居尊位宜可以濟險然下無助也二陷於險中未能出餘皆隂柔無濟險之材人君安能獨濟天下之險不能致天下出於險則為有咎必祗既平乃得無咎也案上卦之中有剛明之材居大君之位宜有以出險矣而上猶有一隂焉此所以不能盈而祇既平也蓋下有一坎故水流而不盈上無隂則為盈之象矣上未出坎故祗既平而已上一隂猶岸也龍門之險水流湍激至盟津而平乃利涉焉則以水既平也既平則險可濟故無咎卦中唯二五材足以出險而皆陷焉二在下上又一坎故曰有險五在上流下坎焉故曰不盈右明象占上六係用徽纆置于叢棘三歲不得凶林黃中曰或謂九棘大司冦聽刑於其下非也棘以木言者棗也以叢言者刺也贊曰上六失道凶三嵗也朱子發曰上動成巽徽纆巽繩之象叢棘巽木交坎也張舜元曰坎為刑獄九家坎為叢棘程正叔曰以隂柔居險之極其陷之深者也以其陷之深取牢獄以為喻如縳之以徽纆因置於叢棘之中隂柔而陷之深其不能出矣袁氏曰不得者罪人不服之辭耿睎道曰糾之以刑則人心離人心離則深為隱伏而情不得也亦上卦變巽之象馮當可曰戀五而不去故係用徽纆置于叢棘四攀五以上出上顧五而復入險何由而濟也李季辨曰已應在三越三爻以求援又入于坎窞焉故三嵗不得也右明象毛伯玉曰凡言三者略舉之也七者六爻之變周而復始者也十者絶之之辭數之極也以筮用之有時而合其數當然非聖人前知其然也右明占案爻辭與否九五繫于苞桑之辭略同特否九五軫其亡之戒此爻言出險之難九五方挾剛明之材以求出險而已輒以隂柔掩之故始欲攀五而卒為五所困如徽纆之係而牢不可解叢棘之置而脫於東則留於西蓋五出于上則出險矣是以固縶之而兩相陷溺也三嵗之久其情不得則與九五之情近而反不相得矣故凶是五與上皆不得脫險也夫上變則為渙宜其險難之散也而今若此則以坎性善陷愈上而陷愈深是以出之難也與他卦易窮則變之例不同唯不膠柱者可以言易右明爻義郭子和曰下卦言處險之道上卦言出險之道李去非曰上體泄之疾水易流行故上三爻多無咎下體受之深水不盈溢故多凶林黃中曰離性炎上其在上卦則炎上之太過者也坎性下流其在下卦則下流之已甚者也下流易甚故坎下三爻不正而多凶炎上太過故離上三爻不正而多懼唯二五不失其中是以為無咎而已坎之九二不若九五之功離之六五不若六二之吉離上坎下斯其旨矣案坎之下卦受下流之多陷溺之深而不能出雖九二剛中而有險上卦浮于衆流之上陷溺之淺而可以圖出唯上六道窮而遂凶故初入于坎窞四則納約自牖矣二有險五則既平矣三來之坎坎上則係纆而置叢棘蓋隂復掩剛不能出坎也右明六爻離下離上離贊曰離麗也日月麗乎天百穀草木麗乎土重明以麗乎正乃化成天下説卦曰離麗也雜卦曰離上而坎下也朱子曰隂麗於陽其象為火體隂而用陽也耿睎道曰幽明域也域於幽則為陷域於明則為麗程正叔曰取其一隂麗於二陽之間則為傅麗之義取其中虛則為明義離為火火體虛麗於物而明者也萬物皆有所麗有形則有麗矣在人則為所親傅之人所由之道所主之事皆其所麗也王介父曰以柔為主也故晦則麗乎明弱則麗乎強小則麗乎大賤則麗乎貴李去非曰剛喜特立而柔必傅麗麗而不失正然後為明李仲永曰離有不離之義故曰麗也日月運行而不離乎天故曰麗乎天百穀草木生於土而反於土不離乎土故曰麗乎土李子思曰陽者明之體也然不得隂之交則文不成故隂麗乎陽然後文明外見此蓋隂陽相交而著見其輝光者也孔子贊離之德每曰文明其義如此又曰坎者隂中之陽而離者陽中之隂也坎之畫則中實實則誠離之畫則中虛虛則明實者坎之用虛者離之用也又曰離之中虛乃心之象案仁義誠敬之學出於乾坤中庸誠明之學則出于坎離言易者自子思發之鄭少梅曰離麗也人之神麗於身人之明麗於心耳目繼其明以為用而神實為之主故次二之火有神明之象取其麗於木也郭立之曰離傅物則生去物則滅聖人以是而知鬼神之情狀原始反終知死生之説古明卦義説卦曰離為雉又曰離為目又曰離再索而得女故謂之中女又曰離為火為日為電為中女為甲胄為戈兵其于人也為大腹為乾卦為鱉為蟹為羸為蚌為龜其于木也為科上稿案此皆三畫未重之離也右廣卦象象贊曰明兩作離大人以繼明照于四方説卦曰作結繩而為網罟以佃以魚蓋取諸離又曰相見乎離又曰離也者明也萬物皆相見南方之卦也聖人南面而聽天下嚮明而治蓋取諸此也右明卦用序卦曰坎者陷也陷必有所麗故受之以離離者麗也程正叔曰陷于坎險之中必有所傅麗理自然也林黃中曰自坎之離六畫盡變而成也陽上而隂下陽陷於隂則上者下矣是故坎自上而下流也隂麗於陽則下者上矣是故離自下而炎上也水火之象也水火之情如此其相逺也然而坎實陽也離實隂也君子小人顧其所以自處何如耳陷其髙明則為小人抗其卑晦則為君子豈有常也哉故曰陷必有所麗故受之以離言物無終陷之理陷而思出則必麗乎陽得其所麗則反昏以為明李子思曰八卦以乾坤坎離居上經乾坤者隂陽之純而坎離者隂陽之中故乾坤居六十四卦之首而坎離居六十四卦之中此有深意也蓋坎離為天地心造化之象實寓於此天之陽中在北為水地之隂中在南為火坎藏天之陽中受明為月離麗地之隂中含明為日坎為水而司寒離為火而司暑坎為月而司夜離為日而司晝水火日月之用寒暑晝夜之運天地造化無出諸此而坎離其之蔽之一言曰中而已右明卦序利貞亨畜牝牛吉贊曰柔麗乎中正故亨是以畜牝牛吉也耿睎道曰至順不傅乎中正則入於邪未見其亨也毛伯玉曰併二五言之也案君麗乎正臣亦麗乎正君臣之道交通而無間也亨乃二五交通之象右明卦象蘭惠卿曰牛者隂爻言六二也有柔順之德傳麗二陽之間有畜牝牛之象郭立之曰乾為馬坤為牝馬坤為牛離為牝牛亦象事之宜也毛伯玉曰旅之上九喪牛于易亦離象案離再索于坤得坤中氣故亦象乎牛然謂之牝者以隂位也故曰六二若五則陽位牛不牝矣然則畜之者六五也唯其君臣以中正交通故以如是之君畜如是之臣而吉也李子思曰離之性上若不能如畜牝牛則不免有炎上之患又安能吉乎張敬夫曰自古有國有家時適明盛無不由宦官女子之為患者失此道也右明卦占初九履錯然敬之無咎贊曰履錯之敬以辟咎也馮當可曰日方出人夙興之辰也自寢而興以足及履錯然有聲是動之始也於其始加敬而終必吉禍福幾微每萌於初動之時離性炎上躁急戒於其初案履錯然躁急之象也程正叔曰陽居下則欲進離性炎上志在上麗幾於躁動其履錯然未進而迹已動矣然其性剛明若知其義而敬慎之則不至於咎矣李去非曰火性炎上譬如好進之人此離之初交錯足動之象好進則失正失正則有咎故戒之此爻唯馮説曲盡其指但錯然之象似未甚安故以程李二説補之案説卦八卦相錯錯然足互進之狀初以陽剛履二之柔剛柔相雜故取此象履言一步之初已躁動如此也右總明象占爻義六二黃離元吉贊曰得中道也王介父曰黃者中之見乎色者也袁氏曰柔麗乎中正而文明見乎外是以在離為黃離楊中立曰麗乎中正而為文明之主故曰黃離元吉郭立之曰盡一卦之美其唯六二乎蘭惠卿曰自二至五唯此爻居中履正而得其所麗故謂之黃離故謂之元吉右明象占李去非曰六二本坤之中爻黃地之中色與黃裳元吉同裳下飾而離為日此其異也林黃中曰如日中天非元吉何足以當之案坤之黃裳在六五黃離乃在六二何也坤純臣也六五為大臣之位離雖純卦其二五君臣之位與諸卦同也故二位為大臣在離則六二為正在坤六五為正故皆以黃稱也劉長民曰離為禮而禮由中道應黃離之元吉右明爻義九三日昃之離不鼓缶而歌則大耋之嗟凶贊曰日昃之離何可久也王輔嗣曰處下離之終明在將沒故曰日昃之離李去非曰初為日出二為日中三為日􅨫前明將反後明未繼若大耋之嗟則有暮年將盡之悲矣程可久曰缶中虛而應謂六二也既過中矣宜俯即於六二以自樂不然之上則有過時之嗟矣離性炎上故有不即六二之義朱子發曰九十曰耋三爻之策九十又六故曰耋九陽數大耋也吕與叔曰詩云今者不樂逝者其耋與此同意林黃中曰易以上卦為晝下卦為夜故三已日􅨫也乾九三曰終日曰夕其取象如此古明象占程正叔曰八純卦皆為二體之義三居下體之終是前明將盡後明當繼之時人之始終時之革易也日􅨫則將沒矣達者順理為樂不達者則恐怛有將盡之悲此處死生之道也明者知其然故求賢以繼其事退處以休其身安常處順何足以為憂也右明爻義九四突如其來如焚如死如棄如贊曰突如其來如無所容也耿睎道曰六五尊位大中四以炎上之性突如犯之犯之而不能克則退矣故來如夫無禮于君者天下之所共疾也來而乘九三之剛宜其焚如以至於死且棄而莫之收也都聖與曰以陽居隂不足以有行進而復反之象也突如言若火之出突焚如言若火之焚物皆取離上之象也以陽居隂陽喜進故有突如之象隂喜退故有來如之象來如者若訟九二之所謂歸也郭子和曰若火之焚自蹈禍機雖至於死地而人無傷怛之心焉李去非曰死如突焚之禍也棄如衆所不收也可為犯上之戒李仲永曰火勢之盛必有所焚故焚如火事已見灰而已是死如也事已則棄之於土是棄如也案下卦之火衝而上進如突之出前遇六五大君以柔制剛剛大明當天而衆火蔑如故來反於四而下卦之火上炎而焚如矣焚之則死死而上下皆無所容故棄躁進輕犯者其終必至於此也聖人因此爻乘下卦之火上炎而上有君尊不可得進而寄此象以示戒云右明象占六五出涕沱若戚嗟若吉贊曰六五之吉離王公也耿晞道曰出涕沱若憂見於容也戚嗟若憂見於聲也朱子發曰離為日鄭康曰自目出曰涕案人為煙衝則出涕曰沱若以見下卦離火衝突之烈也程可久曰為九四所暴憂見於聲容則天下之赴其難者至矣故吉此爻之辭隱而難明唯此説平正右明象占蘭惠卿曰麗於物者以柔順為吉故離六爻柔吉而剛多凶李子思曰坎九二不如九五離六五不如六二意者水之性下漸上而出險則安火之性上炎上而為焚則非所以安矣故離後卦不如前卦鄭舜舉曰成卦在二五皆以柔麗剛二之辭安五之辭危者二得位而五失位也失位則危知危故吉右明爻義上九王用出征有嘉折首獲匪其醜無咎贊曰王用出征以正邦也獲匪其醜大有功也李子思曰六五一柔麗乎上下二陽而九四之陽以炎炎之勢陵突六五六五之君資本爻之陽以制之故曰王用出征李去非同處離之外為甲胄戈兵故有出征獲醜之象劉氏同馮當可曰有嘉者賞折首獲醜之功也程可久曰九四暴犯魁首之象九三在後醜類之象郭立之曰當嘉會之時而下有不麗於正者是以有征尚且折首獲匪其醜明黷武之戒也兵猶火也弗戢將自焚也嘉之義差右明象占李季辨曰繼體之君自當出征有扈之戰啓所以承禹商奄淮夷之征成王所以繼武王周公作立政終之曰其克詰爾戎兵以陟禹之迹召公畢公命康王唯曰張皇六師無壞我髙祖之寡命蓋出征者嗣君之體也案此繼六五之説為義毛伯玉曰蓋通六五而言之也六五而上九則往往舍五而取上大畜頤是也不然則通言之大有離鼎是也此其最著者也以六居上則往往外之於畔服之間比蹇解是也此上九上六之别也不然或明始終之義或著盛衰之變或盡異同之理易者變也通之則皆得矣林黃中曰離有文明之象故為禮有甲胄兵戈之象故為兵禮者下人者也治之本也故繫之於初兵者上人者也治之末也故繫之於上張敬夫曰易於離有甲胄戈兵之象而周六卿司馬之職則列於夏官豈無為而然與馮當可曰聖人作易一卦之中備著興亡之義自九三已著日􅨫則代謝之戒已明至上九則别言出征右明爻義林黃中曰初下卦之始日之出也二下卦之中日之正也三下卦之終日之􅨫也四上卦之始月之升也五上卦之中月之正也上上卦之終月之傾也石守道曰唯隂爻則吉陽爻皆有凶咎初上之得無咎者何也忌炎盛也都聖與曰凡麗之道以柔得中為美以剛不中為過此二五所以吉三四所以凶也若夫初雖剛而在下故能敬以無咎上雖剛而主出征之事故能變以趣時案六爻與大過取義略同三四為一例二五為一例初上為一例也劉長民曰離為火傅於物也若以剛傅柔則熖猛而易燼九四是也以柔傅剛則質堅而難然六五是也過盛則有衰竭之凶九三是也唯二以柔傅柔而又得中故元吉毛伯玉曰內卦專論明中虛之象也外卦專論麗從上之義也右明六爻
