body:
  text: 厚齋易學卷四十二宋馮椅撰易外傳第十象下贊漸至未濟山上有木漸君子以居賢德善俗朱子曰疑賢字衍或善下有脫字京云脫風字王子雍本有之地卑也木生於地之中自下而升也山已髙矣木在於山之上其髙以漸也耿晞道曰地中生木以順為本故其升不來山上有木以止為本故其進有漸又曰益動而巽進德之象漸止而巽居德之象程可久曰居以其德止於內也善風俗入於外也王介甫曰俗以漸善者也竊謂居德體艮善俗體巽居則久於其道而化成善俗以漸也小子之厲義無咎也小子之厲初六占義無咎也其義如此飲食衎衎不素飽也飲食衎衎六二占不素飽也飽道九反與九三道保皆叶咎韻素空也猶詩不素餐之義夫征不復離羣醜也婦孕不育失其道也利用御冦順相保也夫征不復九三占離羣醜也離去聲麗也約象為離醜匹也一曰衆也九往四麗上卦之羣匹故不復三或曰離去下卦之羣匹也婦孕不育占失其道也失婦之道利用禦冦占順相保也三本坤順四巽亦為順故曰相保或得其桷順以巽也或得其桷六四占順以巽也六自坤歸四成巽桷順以巽以承鴻之棲故無咎終莫之勝吉得所願也終莫之勝吉九五占得所願也如詩適我願兮之願蓋言隂陽之情其羽可用為儀吉不可亂也其羽可用為儀吉上九占不可亂也言其飛有序其進有漸澤上有雷歸妹君子以永終知敝李季辨曰澤上有雷水氣隨之而升則為女子從人之象君子指兄也兄之嫁妹未必如父之於女慮逺防敝之周澤之從雷一時之感也故戒之以此終身不改永終也以我御窮知敝也耿睎道曰永終則不敝曰知敝則不待見而後圗也程正叔曰天下之事莫不有終當思永終之戒歸妹以娣以恆也跛能履吉相承也初九象占以恆也有嫡則有娣以娣之歸長道也跛能履吉象占相承也二應五婦乘夫也初承二娣承嫡也故曰相承跛而能履非以正行事也承嫡而已故征吉或疑卦無夫義殊不知各爻取象不相蒙也利幽人之貞未變常也利幽人之貞九二占未變常也五隂柔隔於九四不能下應但守女子之貞而已未變常也歸妹以須未當也歸妹以須六三象占未當也於禮未為當取不當位之象愆期之志有待而行也愆期之志明九四愆期之占有待而行也以待釋遲或作時非也行謂女子有行言妹之所以愆期者非失時也乃有待乎禮而行也帝乙歸妹不如其娣之袂良也其位在中以貴行也帝乙歸妹不如其娣之袂良也六五象占其位在中以貴行也位在中得中道之象貴非不能盛飾而行此儉之禮故可尚也上六無實承虛匡也上六無實承虛匡也虛者無實之象雷電皆至豐君子以折獄致刑象電之明所以折獄象雷之威所以致刑雷與電皆至故折獄即致刑也郭子和曰折獄斷弊也致刑麗於刑也蘭惠卿曰折者折𠂻至當之理致者自此致之於彼林黃中曰舜戒臯陶曰唯明克允易凡刑獄之事未嘗不取諸離也李去非曰噬嗑明在上故明罰敕法其權在上所以曰先王豐明在下故折獄致刑責在有司所以稱君子唯旬無咎過旬災也唯旬無咎初九占過旬災也過旬則後時故有災災自外至六五罪之也有孚發若信以發志也有孚發若六二占信以發志也信有孚也六五之志也豐其沛不可大事也折其右肱終不可用也豐其沛九三象不可大事也子夏以沛為小蓋取諸此呂氏曰晝雖晦猶可作也故可以小事不可大事也折其右肱占終不可用也陸氏曰使不得終竟用事則固無咎矣用字韻未詳豐其蔀位不當也日中見斗幽不明也遇其夷主吉行也豐其蔀九四象位不當也位陰故亦以五為蔀蘇氏曰使九四而當位則明照天下矣豈復為五所覆哉日中見斗象幽不明也以位居陰故幽而不明本爻為人所見也遇其夷主占吉行也程可久曰動則與五相遇其柔中坦夷之德相得而吉行矣路氏曰謂之吉行者以遇主之吉而可行也六五之吉有慶也六五之吉有慶也明占不及譽者舉慶則譽在其中矣豐其屋天際翔也窺其户闃其無人自藏也豐其屋上六象天際翔也詩如翬斯飛之意天際言其髙亢也上一爻為天之上故曰天際震動之極故有飛翔之狀窺其户闃其無人占自藏也藏平聲言自為掩蔽亦重隂之象山上有火旅君子以明慎用刑而不留獄山上有火旅呂氏曰火非山上之物火寓於山故為旅林黃中曰山上非火之所歸李子思曰山下有火聚而為明故為賁山上有火散而不留故為旅君子以明慎用刑而不留獄林黃中曰明取諸離慎取諸艮程可久曰旅可托宿而已故以之不留獄朱子發曰明者或不慎慎者或留獄皆失旅之象李季辨曰貨財貴乎通而刑獄不欲積滯財利君子所不言故體其象以明獄毛伯玉曰陽失位為旅非山上有火也至於觀象而用之則取其火以為明取其止以為慎取其旅以不留獄無往而非易無往而非象也獄者小人之蘧廬久則重困留則蔓延趙氏曰噬嗑與豐之為刑以有震之威離之明也噬嗑繼之以賁豐繼之以旅則離明如故而震為艮止矣明無時而不用威有時而當止故賁曰無敢折獄旅曰明慎用刑而不留獄知無敢之辭又知明慎不留之辭則知震變為艮之義矣旅瑣瑣志窮災也旅瑣瑣初六象志窮災也無童僕而自負販於道其志窮矣此明占得童僕貞終無尤也得童僕貞六二占終無尤也旅以行為義而貞固以守宜有尤矣而童僕之助終無尤也災尤協聲旅焚其次亦以傷矣以旅與下其義喪也旅焚其次九三象亦以傷矣焚次則傷資以旅與下其義喪也明喪其童僕之占以在旅而與下無以為資此童僕之所以亡也喪去聲旅于處未得位也喪其齊斧心未快也旅于處九四占未得位也得位則即次矣未得位故姑處喪其齊斧心未快也明占其心不快者以喪其齊斧也終以譽命上逮也終以譽命六五占上逮也逮企而及也九自三終歸於五是上逮於五也以旅在上其義焚也喪牛于易終莫之聞也以旅在上其義焚也明上九鳥焚其巢之象以旅而亢於上其義必焚其巢也承九三以旅與下其義喪也之文喪牛於易占終莫之聞也牛在平野巢在髙亢牛喪而終於逺莫得聞隨風巽君子以申命行事隨風巽正義兩風相隨物無不順申命説見彖贊程可久曰申前事而命之行也李氏曰上之言謂之命舉而錯之謂之事李子思曰天下有風后所以施命若風相隨而至則是施命不一之象古之出命者必反覆申戒之然後其事可行於天下進退志疑也利武人之貞志治也進退初六象志疑也陰善疑故進退利武人之貞占志治也治平聲李氏曰先於志疑而後於志治者始疑而終決也李泰發曰治者蚤正素定臨事不惑蘭惠卿曰其志整治紛若之吉得中也紛若之吉九二占得中也用史巫紛若宜非吉事乃謂之吉者以二得中以九居之亦剛柔之中也頻巽之吝志窮也頻巽之吝九三象占志窮也志於執剛用柔而前又濵巽則其志窮矣亦下卦之終之象田獲三品有功也田獲三品六四占有功也田之有功九五之吉位正中也九五之吉占位正中也但以位正中故貞而獲吉悔亡無不利巽在牀下上窮也喪其齊斧正乎凶也巽在牀下上九象上窮也上窮則反下喪其齊斧正乎凶也又明占之貞凶者乃正乎凶也麗澤兌君子以朋友講習麗澤兌麗義見離彖贊李仲永曰麗澤者相連而不相離也君子以朋友講習同門曰朋同志曰友朋友相麗之象講兌為口舌頰輔習重習麗澤也鳥數飛為習都聖與曰講其所未知而明之習其所已知而行之程正叔曰猶麗澤之互有滋益和兌之吉行未疑也和兌之吉初九象占行未疑也爻與六三相逺九二未相疑也凡曰疑者謂隂爻林黃中曰未者因九二以成文也在初未疑至九二則可疑矣程正叔曰謂未有失也若得中正則無是言孚兌之吉信志也孚兑之吉九二象占信志也二與三其志相信非苟為相説者也馮氏曰其志可信而信之來兌之凶位不當也來兌之凶六三象占位不當也自外來居不當其位故凶此孔子之例也九四之喜有慶也九四之喜占有慶也相得則曰喜相樂則曰慶孚于剝位正當也孚于剝九五象位正當也明有厲之占當説之時剛過故有厲此亦孔子之例上六引兌未光也上六引兌象占未光也言所引不必皆隨皆正風行水上渙先王以享于帝立廟風行水上渙水為險難遇風則渙散帝上帝立創也李仲永曰方險難之時雖欲享於帝立廟不可得也蓋難散之後方始為之決曰享帝尊尊也立廟親親也朱子曰皆所以合其渙李季辨曰享帝立廟則渙之主定矣朱子發曰享於上帝使知天無二主立廟則人知反本鬼有所歸所以一天下之心合天下之渙虞仲翔曰隂上至四承五為享帝陽下至二為立廟蓋初耦二竒亦有廟宇之象劉氏曰巽者潔齋之時故卦有巽者多言神事觀曰盥薦升曰用禴巽曰史巫馮氏曰大象别立一意以為用易之方享帝立廟與王假有廟意有不同初六之吉順也初六之吉占順也一隂巽入陽下之象朱子曰非有濟渙之材但能順乎九二故其象占如此渙奔其杌得願也渙奔其杌九二象得願也往者中心之所欲也渙其躬志在外也渙其躬六三象志在外也外謂上九一曰九五也渙其羣元吉光大也渙其羣元吉六四象占光大也獨能離其羣以輔九五所以光大光大釋元吉也王居無咎正位也王居無咎九五占正位也王之居積所以散之而無咎者以正王者之位散與之權得專也渙其血逺害也渙其血上九象逺害也逺去聲乘剛之爭必見傷害澤上有水節君子以制數度議德行澤上有水節義見輯傳卦下行去聲程可久曰澤受水有節如名位不同禮亦異數是謂制數度以德詔爵以材居位是謂議德行李去非曰數有多寡度有長短制之所以立法也劉長民曰名位有等差德行有小大君子議德行升之品位則名器不濫毛伯玉曰象取於以澤節水剛柔分而剛得中取於畫説以行險取於德當位以節取於爻是皆觀象於正名之後因而通之爾不出户庭知通塞也不出户庭初九象知通塞也明無咎塞色白反通塞言時九二塞其前故不可出不出門庭凶失時極也不出門庭凶九二象占失時極也明凶極中也言失時中之義二居中故有極象不節之嗟又誰咎也不節之嗟六三象又誰咎也明無咎自己所致難咎他人安節之亨承上道也安節之亨六四象占承上道也明亨謂志通於君也承六五乃君臣之道甘節之吉居位中也甘節之吉九五象占居位中也明吉甘於味屬土居中央五位居中應甘之象二五皆中二失中而五得中者位當不當之異苦節貞凶其道窮也苦節貞凶上六象占其道窮也説見彖贊澤上有風中孚君子以議獄緩死中虛象獄二隂在獄中象死一居陽位者不可死也初九虞吉志未變也其子和之中心願也或鼓或罷位不當也馬匹亡絶類上也有孚攣如位正當也翰音登于天何可長也山上有雷小過君子以行過乎恭喪過乎哀用過乎儉山上有雷小過雷出地奮今在山上則過矣然未至天上大壯則所過亦小也行過恭喪過哀用過儉呂與叔曰過猶不及君子不取於斯三者許其過者可過於厚不可過於薄飛鳥以凶不可如何也飛鳥以凶初六象占不可如何也李泰發曰飛鳥迅速其離網罟畢弋之患間不容髮其可救乎不可如何者吾末如之何也已矣程正叔曰救止莫及無所用其力也不及其君臣不可過也不及其君六二象臣不可過也明無咎之占程可久曰君臣之分甚嚴臣道不可過也從或戕之凶如何也從或戕之凶九三占如何也如奈也蘭氏曰其凶可知李泰發曰雖有明知不能為之計矣弗過遇之位不當也往厲必戒終不可長也弗過遇之九四象位不當也不當其位故不能防隂小而與之相遇也往厲必戒占終不可長也雖與隂小相遇終不可長保其不變密雲不雨已上也密雲不雨六五象已上也上上聲也或作尚非言隂已上陽弗遇過之已亢也弗遇過之上六象已亢也亢極也隂不言亢言位之亢也水在火上既濟君子以思患而豫防之水在火上既濟水下而濟火火則不燥火上而濟水水則不寒故為既濟思患豫防石氏曰火性炎上水性就下火不能長居其上必有時傾覆而又水火亦相克故君子當既濟則思有患難豫先防備李去非曰預為之防所以先天地之數也毛伯玉曰天下之亂未有不伏於治知者防之於未然以為理之必至不可忽也曳其輪義無咎也曳其輪初九象義無咎也能力濟難其義無咎非本有咎而補過者也七日得以中道也七日得六二占以中道也以二之道得中非初三多凶無位之地故六雖反五其位不當數周復還也三年克之憊也三年克之九三占憊也憊步拜反困劣也陸作備當是古通其義憊其聲備終日戒有所疑也終日戒六四占有所疑也六陰也善疑疑其敝壞故終日戒之東鄰殺牛不如西鄰之時也實受其福吉大來也東鄰殺牛不如西鄰之時也九五象以時明禴祭言禮時為大不以物之豐殺也實受其福占吉大來也占者福也本爻陽為大濡其首厲何可久也濡其首厲上六象占何可久也易窮則變柔弱之材又不能持守既濟之治烏能久哉濡首而厲固其必至也火在水上未濟君子以慎辨物居方火在水上未濟李氏曰功未及物故為未濟慎辨物居方耿睎道曰二卦之所以不同者分定與亂耳故君子慎辨物使物以群分慎居方使方以類聚如此則分定而不亂為既濟矣李子思曰坎離互藏其宅乾坤之交也未濟者水火各反其位坎離之不交也坎離不交則上下名分之所由以辨不可以不交之故而義無所取也李季辨曰水火不相射則各從其類濡其尾亦不知極也濡其尾初六象亦不知極也亦蒙既濟上六象贊為辭李季辨曰極終也濡尾不往莫知所終即彖不續終之意蓋極之為言至也有終之之意既濟上六不知所終故何可久未濟者既濟之反未濟之初六即既濟之上六也故爻義相蒙九二貞吉中以行正也九二貞吉占中以行正也曵其輪得中以行正道故吉未濟征凶位不當也未濟征凶六三占位不當也毛伯玉曰六爻皆不當位而獨言於此爻蓋九二九四以不純用其剛為吉而六五又以柔中為亨各因爻取義獨此爻以非其人而居其位也貞吉悔亡志行也貞吉悔亡九四占志行也毛伯玉曰四能出險必貞而吉其悔乃亡悔亡則四之志行矣君子之光其暉吉也君子之光六五占其暉吉也暉日光離之象程可久曰光明輝映世之未濟非所患也飲酒濡首亦不知節也飲酒濡首上九象亦不知節也謂不知飲酒之節而至於濡者也亦又承初六之贊辭厚齋易學卷四十二
