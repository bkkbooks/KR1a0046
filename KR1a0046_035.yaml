body:
  text: 厚齋易學卷三十五宋馮椅撰易外傳第三彖下贊咸至遘咸感也咸志卦感也釋卦義柔上而剛下二氣感應以相與止而説男下女是以亨利貞取女吉也以卦變隂陽卦性六子四者明卦義而象占在中矣上上聲下應並去聲恒同坤六之柔自三而往於上成兊乾九之剛自上而下於三成艮剛柔以質言感應以氣言乾之氣感乎坤坤應之而成兊是坤與乾也坤之氣感乎乾乾應之而成艮是乾與坤也一感則一應故曰相與艮止而兊說之艮男下於兊女此其所以為咸感之義柔上剛下二氣感應所以為亨止而説所以利貞説利止貞也男下女所以為取女吉也此贊與恒對正如否泰然恒靁風相與言象此二氣感應以相與言氣者山澤无相與之象相與者其氣之感應也天地感而萬物化生聖人感人心而天下和平觀其所感而天地萬物之情可見矣此又以卦體推廣卦義乾感於坤而柔上坤感於乾而剛下天地之感也二陽二隂爻萬物之象也乾陽化為兊隂坤隂化為艮陽化生之象也聖人者艮之九三居下之上之象人心者兊之六三說之象也九六上下交感之象也二陽二隂爻天下之象也兊説而和艮髙而在下平也楊中立曰情也者感而動者也故觀其所感而天地萬物之情可見矣恒乆也恒志卦乆也釋卦義剛上而柔下雷風相與巽而動剛柔皆應恒恒亨无咎以卦變卦象卦性卦爻明卦義而象占在其中矣乾九之剛自初而上於坤之四成震坤六之柔自四而下於乾之初成巽震靁巽風相與者也巽風而震動六爻皆應此所以為恒乆之義如上四者情分有常而可乆此其所以亨而无咎不然鮮能持乆咎將至矣按咸曰是以亨利貞取女吉文義貫通此曰恒以明卦矣又曰恒亨云者葢謂四者皆卦義而亨之義因於恒故又複出一卦名與咸互文見義利貞乆于其道也天地之道恒乆而不已也利有攸往終則有始也利貞乆于其道也明以恒為貞又以天地之道明利有攸往之占乆而不已終則有始所以有攸往為利日月得天而能乆照四時變化而能乆成聖人乆于其道而天下化成觀其所恒而天地萬物之情可見矣承上文而以日月四時推廣卦義日月以得天之運而能乆照四時以變化之運而能乆成皆終則有始也聖人之于其道亦終則有始而天下化成天運極南則轉而北極北則又轉而南四時春化則變夏夏化則變秋秋冬亦然聖人之心嵗終又為正嵗頒政令皆終則有始之意所以為常而乆也遯亨遯而亨也剛當位而應與時行也小利貞浸而長也遯之時義大矣哉遯志卦亨遯而亨也以卦義明卦象謂亨由於遯也剛當位而應與時行也又以二五明卦象易以有應為亨蘭恵卿曰九五之君陽剛當位而反應六二随時之義也小利貞浸而長也以二隂明卦占小謂隂也浸長故利於貞固自守而不上進浸漸也隂以下為貞程可乆曰剛柔至第二爻稱浸長故臨遯皆曰浸遯之時義大矣哉贊卦義張舜元曰君子之出處也以時其進退也以義朱子曰隂方浸長處之為難故其時義為大李去非曰遯有時有義其大者消息盈虚與天道通關一時之盛衰郭子和曰雖堯舜授受亦不過遯而已矣堯典序曰將遜于位遜遯也聖人懼人之徒以匿迹山林者謂之遯則其義小矣大壯大者壯也剛以動故壯大壯利貞大者正也正大而天地之情可見矣晉進也明出地上晉志卦進也明卦義明出地上以卦象明卦義上去聲郭子和曰火在天上君道也明出地上臣道也順而麗乎大明柔進而上行是以康侯用錫馬蕃庶晝日三接也以卦性卦變明卦象占下坤順而上麗乎日日大明也六五之象六四升五柔進而上行於君道也觀此則知康侯坤之柔順之象也錫馬坤之牝馬之象也坤為衆蕃庶之象也晝日六五之象也三接接坤三爻也耿睎道曰睽旅麗乎明以火為象也此曰麗乎大明以日為象也毛伯玉曰柔六五也進而上行明三隂與五同德也且進陽退隂者易之常也今三隂進而上行不㡬於進小人乎六二曰于其王母受兹介福明所進者坤之順也非小人也進之者五之柔也唯其同德而後相與猶大畜之剛上而尚賢也明入地中明夷内文明而外柔順以蒙大難文王以之利艱貞晦其明也内難而能正其志箕子以之欠志卦明入地中明夷以卦象明卦義内文明而外柔順以蒙大難文王以之又以卦徳文王証卦義難去聲下同大難謂羑里之囚也文王聖明而囚于羑里有明入地中之象以之以明而傷也以或作似非利艱貞晦其明也又以成卦明卦象占其艱難固守其正如此葢隠晦其明而不章也此内卦之象内難而能正其志箕子以之又以箕子證卦象占内内卦之象難謂明傷紂其兄乃内難也正其志不死不去也以之同上説家人女正位乎内男正位乎外男女正天地之大義也家人志卦女正位乎内以六二明卦義并象占男正位乎外九五男女正天地之大義也兼三材而兩之五天而二地也家人有嚴君焉父母之謂也上九九三在内外卦之上各主其卦皆陽剛故為嚴君之象故曰上九在外而男承之父之為嚴君者也九三在内而女承之母之為嚴君者也父尊而不親母親而不尊者其情異也皆謂之嚴君者其義同也都聖與曰天子之妃曰后諸侯之妃曰小君與此同義蘭恵卿曰非惟天下有君一國亦有君非惟一國有君一家亦有君張舜元曰國有嚴君則政治家有嚴君則人倫正父父子子兄兄弟弟夫夫婦婦而家道正正家而天下定矣六爻上父初子五夫二婦四兄三弟又有此象剛柔各當其位惟上九位不當而居一卦之上亦正也有家道正之象以家推之又有天下定之象經止言女貞而孔子推明一家之人皆利于正有補于世教為多睽火動而上澤動而下二女同居其志不同行說而麗乎明柔進而上行得中而應乎剛是以小事吉天地睽而其事同也男女睽而其志通也萬物睽而其事𩔖也睽之時用大矣哉天地男女萬物以三才推廣卦義且恐人以吉止小事故推時用之大者以明之天地初上也男女二五也萬物二三四五也天尊地卑睽矣而事同於覆載男陽女隂暌矣而志同於相應萬物羣分睽矣其事各以𩔖聚謂二與四𩔖三與五𩔖也當睽之時其用如此豈不大哉蹇難也險在前也見險而能止知矣哉蹇利西南往得中也不利東北其道窮也利見大人往有功也當位貞吉以正邦也蹇之時用大矣哉解險以動動而免乎險解解利西南往得衆也其來復吉乃得中也有攸往夙吉往有功也解志卦險以動動而免乎險解以卦性明卦義以遇險而動未足盡卦義復以動而免乎險明之解利西南往得衆也以二陽在下之卦變明之上體本坤下體本兊今九自初往坤之四成震坤為衆是往得衆也其來復吉乃得中也以二陽在中之卦變明之上體本震下體本艮今九自艮之三來二成坎是其來復乃得中而吉也有攸往夙吉往有功也以震之初爻九四明之自初而往動而免乎險是有功也此彖全以二陽爻往來之變言之天地解而雷雨作雷雨作而百果草木皆甲拆解之時大矣哉以天地推廣卦義而贊之作興也拆敕宅反分裂也雲雷為屯故雷雨作而為解雨自天施雷出地奮天地解也雷雨二卦象也百果草木四隂之象也或甲或拆得二陽之發育也損損下益上其道上行損而有孚元吉无咎可貞利有攸往損志卦損下益上其道上行以卦變明卦義上下定體上行之上上聲上行所謂利有攸往也損而有孚元吉无咎可貞利有攸往以卦義明卦占皆知損而如此故志卦之外又復出損字以明之曷之用二簋可用享二簋應有時損剛益柔有時以上九六三明卦象應平聲當也舊去聲非夫剛非當損柔非當益也損剛益柔盖有時如此故二簋之享亦當有時如此也三剛而損其一止有二剛可以用享爾損益盈虚與時偕行復釋損剛益柔之義謂損而不已必虚益而不已必盈亦惟與時偕行爾不特損益盛衰之始如此也剛之虚則柔盈而為剥為坤剛之盈則柔虚而為夬為乾豈非時乎益損上益下民說无疆自上下下其道大光利有攸往中正有慶利涉大川木道乃行益動而巽日進无疆天施地生其益无方凡益之道與時偕行益志卦損上益下民説无疆自上下下其道大光以卦變明卦義下下上一字去聲損上卦四之九益下卦之初葢損陽之饒益隂之乏也坤隂為民坤得益故其情說无疆應地无疆也自上卦之乾下于坤之下此天道下濟而光明也故益道于是光大利有攸往中正有慶以六四一爻明卦占六自初往四上比九五陽饒之君以中正之道益天下故有君臣相得之慶利涉大川木道乃行又以卦材明卦占二卦皆木動巽行益動而巽日進无疆以卦性推廣致益之理如此天施地生其益无方以卦變推廣致益之功施去聲方所也九自乾來初坤乃一索而得震是天施而地生也震動而无方是其益无方也凡益之道與時偕行結卦義也說見損耿睎道曰在損則兼益曰損益盈虚在益則曰凡益之道不兼損者損則求益益不期損故也夬決也剛決柔也健而說決而和揚于王庭柔乘五剛也孚號有厲其危乃光也告自邑不利即戎所尚乃窮也利有攸往剛長乃終也夬志卦決也剛決柔也以卦材明卦義健而說決而和以卦性明卦用蘭恵卿曰内健則能決外說則能和李子思曰以和說而濟其健決則夬不傷太過而於是為得矣李去非曰若決水而放之乃有潰肆汗漫之憂曰說曰和皆深戒君子恐其恃衆以求為必勝也揚于王庭柔乘五剛也以六畫明之為一柔乘五剛故揚于王庭以暴其過而去之孚號有厲其危乃光也此下皆止以義明卦占危其危則不危故乃光孚於人而發號施令以去之明有危厲之事故能決之而其危乃光告自邑不利即戎所尚乃窮也小人唯尚武事不即戎則小人所尚乃窮矣利有攸往剛長乃終也長上聲朱子曰謂一變即為純乾遘遇也柔遇剛也勿用取女不可與長也遘志卦遇也柔遇剛也以初六一爻明卦義下卦象同勿用取女以女壯之女移寘于此成文後遂併經文増之誤不可與長也程可乆曰言將以柔變剛王景孟曰以𩔖言之過惡之方萌姦邪之初長盜賊外患之始作此皆不可與之長也唯知者見㣲而辯早當有以處之天地相遇品物咸章也剛遇中正天下大行也遘之時義大矣哉以三才推廣卦義李子思曰以坤之初六交乾九三之義是為天地相遇之象都聖與曰以竒偶之畫言之則有天地相遇之象以二五之應言之則有遇中正之象蘭恵卿曰天地隂陽之氣相遇于建午之月離明萬物相見之方故曰品物咸章以九二剛中之臣遇九五中正之君道同志合徳化盛行于天下故曰天下大行遇之時不常有其義甚大故曰時義大矣哉
