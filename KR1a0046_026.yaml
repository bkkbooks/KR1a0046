body:
  text: 厚齋易學卷二十六宋馮椅撰易輯傳第二十二經下篇震艮震下震上震雜卦曰震起也説卦曰帝出乎震又曰萬物出乎震震東方也又曰雷以動之又曰動萬物者莫疾乎雷又曰震動也又曰震為龍又曰震為足又曰震一索而得男故謂之長男又曰震為雷為龍為玄黃為敷為大塗為長子為決躁為蒼莨竹為萑葦其于馬也為善鳴為馵足為作足為的顙其于稼也為反生其究為健為蕃鮮九家為玉為鵠為鼓張舜元曰陽生於下動而上行隂氣閉之震怒而起卦所以為震也朱子曰一陽始生於二隂之下震而動也其象為雷李子思曰一陽之初動天地所資以為造化之張本也右明卦義象贊曰洊雷震君子以恐懼修省右明卦用序卦曰主器者莫若長子故受之以震程正叔曰長子傳國家繼位號者也故為主器之主序卦取其一義之大者為相繼之義林黃中曰自鼎之震變下卦巽上卦離而成也巽長女離中女而震則長男器之大者莫若鼎有以主之二女皆非主器者也主之者其唯長男乎所以巽離皆變而成震也案巽三爻全變離上一爻變不動者六五九四也君臣相與維持是器者也右明卦序亨程正叔曰陽生於下而上進亨之義也朱子發曰震自臨二之四也震於積隂之下奮擊而出亨也耿睎道曰上者陽之所也陽在下必起而之其所又以時焉是以亨也毛伯玉曰震而達之所以亨也是故塞者必其止者也亨者必其動者也李子思曰所以震隂達陽而開其生育之門故曰震亨林黃中曰先儒訓震為懼震在靁懼在物苟以為恐懼以致亨則是舍其主而議其賔矣案或又謂萬物待震而亨是物亨非震亨也以八卦觀之一陽動於重隂之下陽動而震以重卦觀之初位之陽奮出四位有靁出地奮之義震來虩虩笑言啞啞震驚百里不喪匕鬯贊曰震來虩虩恐致福也笑言啞啞後有則也震驚百里驚逺而懼邇也不喪匕鬯出可以守宗廟社稷以為祭主也郭子和曰皆主人事言又曰能恐懼修省於前則必獲和樂之吉於後程正叔曰蠅虎謂之虩者以其周環顧慮不自寧也又曰笑言啞啞言自若也李仲永曰先虩虩後啞啞與同人先號咷而後笑同程可久曰虩虩敬天之威也易凡言笑皆喜悅之意初九言後笑彖不言後以六爻自有先後之義也先虩虩而後笑此言危者使平之意楊廷秀曰當震之來也虩虩然為之恐懼而顧慮焉必求所以應之轉懼而為喜而笑言啞啞矣馮當可曰不喪匕鬯擾攘之際不至錯亂朱子發曰長子主器不喪匕鬯則不失職矣朱子曰臨大震懼而不失其常也當震之來能虩虩恐懼則可以笑言啞啞而無後憂矣使震驚百里亦不喪匕鬯也主器之事彖未有此意贊方言之又曰此卦之占為能恐懼則致福而不失其所主之重李氏曰震來虩虩震於己也震驚百里震於人也林黃中曰六爻二陽施震者也四隂遇震者也震來虩虩笑言啞啞初九是也言施震者也震驚百里不喪匕鬯六五是也言遇震者也朱子發曰自初至四乾坤之䇿百有二十百里舉大數也案震來云者一陽自外來內為震謂初九也馮當可曰陽剛之體方自乾來為笑言啞啞之象者內卦本兊為口舌二之四笑言也又初至四有頤象頤口輔亦為笑言謂九四也贊曰後有則則是後遇九四之震而笑言自若也震驚百里靁出地奮謂九四也七載鼎實自下而上六五之象也鬯灌地降神自上而下上六之象也此彖專以遇震言之震來虩虩此靁之初動皆恐懼也笑言啞啞此靁之習聞乃自若也震驚百里猶迅靁不及掩耳之意也贊言驚逺懼邇則合全體言也不喪匕鬯猶不失匕著之意也臨祭祀而匕鬯之薦無失節也右明象占初九震來虩虩後笑言啞啞吉贊曰震來虩虩恐致福也笑言啞啞後有則也李元達曰當動之始以剛下柔能自反而知懼者也謂之後則非方今之時也劉仲平同方動之始而能知懼則後有笑言啞啞必矣故又以吉言之張知常曰恐懼當在初郭子和曰震動之初恐懼修省不可緩也過此則危矣朱子發曰初九先九四後故言後笑言啞啞蘭惠卿曰小人震始來而不憂必待禍至而後悔憂才息而即忘之不能持終身之戒此聖人於初九所以再蒙彖辭之意也都聖與曰震來虩虩於其初則笑言啞啞於其後原始以要終先恐而後福故於初九所言如此右明象占李仲永曰二隂一陽則一陽為之主初九在內卦之內震之主也故辭與卦同石守道曰有陽明之德居震之始能先戒懼者故彖之所言此爻當之房喬曰震之初九謹始恐懼所以致福豫之初六倡始逸豫所以致凶劉氏仲平曰震之時時乎動也利乎動不利乎靜二以億則喪貝三以行則無眚四以泥則未光贊辭非系初九有動之材當震之始能恐懼修省者也右明爻義六二震來厲億喪貝躋于九陵勿逐七日得贊曰震來厲乘剛也蘭惠卿曰震自臨生六四來為六二以柔乘剛所以危也張舜元曰初以剛動而務上行二以柔正而來乘之近而不相得故危案震在初之陽六二之隂柔亦謂之震者卦者時也爻者事也謂處震之時來則厲也右明象蘭惠卿曰陽為金為玉為寶貝貝指九四也九本居二因此震驚而喪失之往為九四升於至髙之地九陵之象也雖然不必逐之七日復得言隂陽升降往反不過七日此以六二九四升降而言也李季辨曰以柔居隂為初所震喪其所有之貝互體有艮九陵之象也程正叔曰九言重之多如九天九地也震之來也雖一時不能禦然時過事已則復其常故云七日得薛氏曰九者陽之極數也都聖與曰勿逐言舍初九而不與之兢也七日得言自二而至於上自上而復於二其數凡七也李仲永曰貝為人所得去而升於九陵之髙逺也案處震之時來而遇震故厲驚而喪其所齎之資貨蓋有將之以升於九陵者宜其髙且逺而不可得即也聖人教之曰勿用逐之七日將自得之矣蓋天下之數無往不復也二自四來過初九自二往居上卦二尚隔三三則可逐二不可逐不能及也歷爻之終復至本位則四復二為臨矣故其占如此凡陽爻曰日右明占林黃中曰聖人於陽爻言施震之方隂爻言遇震之道示人著矣李季辨曰陽居初與四為洊靁二與三為初所震五與上為四所震也石守道曰震隂以失位為能戒懼二得位故不吉劉長民曰震雷之動威也驚恐者致其福惰慢者致其災二雖動體然安於得位是慢而不戒者張知常曰乘剛不能無失得位不能不復案二來遇震方安於位不知戒備故有失洊靁之後陽氣必復九反於二終亦必得其所喪也右明爻義六三震蘇蘇震行無眚贊曰震蘇蘇位不當也劉長民曰二安於得位而見危三不當位而知懼故得舒緩朱子發曰震為反生三震之極震極復蘇反生也右明象張子厚曰處非其地故危困不一懼而改行則無眚矣郭子和曰震自初動三逺於動者而能蘇蘇然懷不自安是以行而無眚也馮當可曰蘇蘇失中也四在前有相得之理以震而得則遇四故無眚林黃中曰兩言震者在初九九四之間也止則遇初行則遇四虩虩而不可犯四遂泥而不足畏是以行而無眚也程可久曰以六居三在它卦猶柔危況震之時乎逮九四震行則本爻可以去柔危之地故無眚李季辨曰六居三其位本危況為初所震氣息僅存以恐懼而行亦可無眚右明占案再言震者蘇蘇言初九之震行無眚言九四之震也去初逺故蘇蘇為舒遲之意震動而上非安於下者以震為上行無眚矣上卦之初為九四則震在我故也右明爻義九四震遂泥案泥去聲滯溺不通之辭與致逺恐泥之泥同遂無反之意荀遂作隊贊曰未光也陸希聲曰以陽處隂失位而動靁聲未隆者也蘭惠卿曰自臨之二震動而行近至於四留滯於此不能前往以升天位反失其居李季辨曰四處洊靁陷互體坎中遂泥之象也郭子和曰陷於重隂之間無中正之德以自將故不能有行而遂泥也李去非曰外卦之動欲震而滯泥不足以致逺因而遂焉則為四隂所蔽也故贊曰未光右明象劉氏仲平曰震唯初與四有能動之材而四以剛居隂其達材之效有不同也案雷出地奮豫此爻當之曰遂泥何也曰卦體與爻義多不相值此文王所以演爻而成易也震以一陽奮於二隂之下相激而成聲則為靁故取義於震以立卦初九在內靁之發聲也故曰震來虩虩九四在外靁之洊震也故曰震驚百里今發揮於爻則初反致吉而四反遂泥何也初陽位而靁聲之所達四隂位而靁聲之遂滯故在卦體則有驚百里之象而在爻義則為羣隂所掩滯而不能奮擊也以卦變言之此爻自二上行至此為位隂所泥不能上升五位故也右明爻義六五震往來厲億無喪有事贊曰震往來厲危行也其事在中大無喪也案大釋億也李仲永曰大無喪則小不能無喪也郭子和曰往而上則即柔來而下即乘剛案震動而上以往為利況往則逺四之震既逺而無厲來則遇四之震而不能無厲矣右明象蘭惠卿曰為震之主欲無喪失者於此有事焉不能居中自守而反震驚妄動則必有喪失六五隂柔故有此戒朱子發曰六二喪貝六五無喪當位不當位之異也馮當可曰震象靁者也凡靁之作不虞其來而忽震焉雖壯夫不免有失匕著之恐震而至於再則童子皆習而不懼矣一陽震於初故二不能無喪再震於四則五雖震不至於如二之不測矣此其所以不同也李季辨曰其所以無喪者以其有事也孟子所謂必有事焉六五有事雖洊靁而不能震也不喪匕鬯此爻當之案往上一震來下又一震也故往來皆厲雖無大喪失而不能無所事恐懼修省以應天威也人之常情震驚則多喪失故喪匕鬯喪貝無喪一卦每每言之右明占張子厚曰以其乘剛故危以其在中故無喪程正叔曰諸卦二五雖不當位多以中為美三四當位或以不中為過中重於正也蓋中則不違於正正不必中也天下之理莫善於中當居位而為動之主隨宜應變在中而已苟不失中雖危不至於凶也案此爻應六二言六二當位而安不知戒謹故震之初驚來厲而喪貝本爻不當位而危則知戒懼故震之洊驚來厲而無喪必有事焉如捧盈如履險無往無來而亦無喪失也震以懼為義故知懼則雖危亦安右明爻義上六震索索視矍矍征凶震不于其躬于其鄰無咎昏冓有言贊曰震索索中未得也雖凶無咎畏鄰戒也朱子發曰視矍矍者以震索索也案索索震極散而不收之意故其視恐懼而不寧右明象李氏曰動之極不可以復有行故征凶蘭惠卿曰物不可以終動動極則當靜今處震之終而猶震動不已故曰征凶躬本爻也鄰六五也本爻之震也非己之咎乃六五亦有乘剛之憂故又曰雖凶無咎震自臨之九二來為九四九二本六五之正應昏冓也今為九四而震六五故曰昏冓有言李季辨曰處震之極為洊靁所恐然四震在五非震已也震不在已而在己之鄰因鄰致戒可以無咎鄭舜舉曰昏冓有言羡文也卦中無此義他卦有此一句簡編脫落誤入於此必欲強為之説鑿矣昏冓有言要如鄭説必欲推其義則蘭説可通右明占朱子曰以隂柔處震極故為索索矍矍之象以是而行其凶必矣然能及其震未及身之時恐懼修省可以無咎而不能免於昏冓之有言戒占者當如是也鄭舜舉曰震有二義有震動之震有震懼之震震索索謂震懼也震懼之極征則凶也震不於其躬於其鄰謂震動也不迫於我而迫於鄰我能為之戒懼雖凶亦可無咎何也舉動之際覩事之將然而知戒亦聖人之所許也林黃中曰二五之於震為近或無喪而有事或有喪而自得未嘗至於顛沛失據也三上皆逺於震而乃至於蘇蘇索索者謂其無主於中遇物而自喪也程正叔曰震終當變柔不固守故有畏鄰戒而能變之義聖人於震之終示人知懼能改之義為勸深矣右明爻義郭子和曰卦言虩虩啞啞蘇蘇索索矍矍與二五之言億諸卦皆無其義雖多恐懼之貌亦於爻義各有辨也馮當可曰六爻皆無凶者恐懼則為福泰侈逸豫則為禍也案初四陽爻為震者也二三五上隂爻遇震者也震以洊靁為象故在初則為來四則驚百里來者靁聲發於地下驚百里者聲出於地上也爻於四言遂泥則以其掩於羣隂也二迫於震故喪貝五亦迫於震而無喪二初遇震而喪失五再遇震則習聞也然二來厲而五又言往何也三未至於極而上則窮矣故二必往三而五不往上故聖人勸之以往避震禍也三蘇蘇去震逺也上亦逺而索索矍矍何也上窮也故三震行則無眚而上則征凶也既征凶矣而又無咎何也易窮則變變則通也右明六爻艮下艮上艮贊曰艮止也説卦雜卦同時止則止時行則行動靜不失其時其道光明説卦曰艮以止之又曰成言乎艮又曰艮東北之卦也萬物之所成終而所成始也故曰成言乎艮又曰終萬物始萬物者莫盛乎艮又曰艮為狗又曰艮為手又曰艮三索而得男故謂之少男又曰艮為山為徑路為小石為門闕為果蓏為閽寺為指為狗為鼠為黔喙之屬其于木也為堅多節九家為鼻為虎為狐李元達曰一陽在上二隂在下上下各得其所可以止矣此艮之所以為止也程可久同朱子曰一陽止於二隂之上陽自下升極上而止也其象為山取坤地而隆其上之狀亦止於極而不進之意李子思曰夏之連山以艮為首何也艮東北之卦萬物之所成終而成始者也説卦論八卦始震終艮在時則為冬春之交為之動邪而品物未遂敷榮為之靜邪而生意已自萌蘖靜中思動止中有作然而專以止為義則是以其著者而言之也案卦之為義唯止一説而止之為義又唯一陽在上之象也然嘗論八卦之性蓋以竒耦之畫象之自乾坤純體之外陽卦耦畫在下者入伏於下故巽曰入耦畫在中者麗於二陽故離曰麗至於耦畫在上則曰説豈隂以在上為説邪蓋六之性兼隂陽言之陽上進遇隂而相説也然則竒畫在上亦惟二隂上進而一陽截然止之或不專以陽極於上而止為義也故震為靜中有動巽為隂入於陽坎亦隂之陷陽離亦陽之麗隂今之説者得其一偏者也乃若取象於山者以陽止而言之也坤地也而止以竒畫髙出於二隂之上故為山右明卦義象贊曰兼山艮君子以思不出其位右明卦用序卦曰物不可以終動止之故受之以艮艮者止也胡周父曰動而不已必有悔吝故艮次震程正叔曰動靜相因物無常動之理艮所以次震也林黃中曰艮之成卦震之反也自震之艮二五不動四爻相易而成也一陽在二隂之下居非其所欲無動得乎一陽在二隂之上動將何往欲無止得乎右明卦序艮其背不獲其身行其庭不見其人無咎贊曰艮其止止其所也上下敵應不相與也是以不獲其身行其庭不見其人無咎也蘭惠卿曰六爻各止其所在我者止其所是以艮其背不獲其身是我不應人也在人者亦止其所是以行其庭不見其人是人不應我也人我不交悔吝何從而生是以無咎朱子謂周茂叔定以中正而主靜自艮其背而為之説也耳目之官物交物則引之故物我兩無所交而靜觀萬理默會於心則行非我行也理之所當行者也止非我止也理之所當止也朱子又曰動靜各止其所而皆主夫靜焉所以得無咎也朱子曰內不見己為內卦也外不見人是外卦也兩卦各止其所艮其限是截斷不相貫通也艮其背不獲其身是見理而不見己也行其庭不見其人是見理而不見人也無一毫私意全是義理又曰止固是止行亦不失其止乃止也耿睎道曰背者無營為之地庭者交際之地也朱子發曰五四兩爻在門闕之中庭之象也李去非曰艮之象猶兩人相背而行兩不相見故其爻為上下敵應鄭少梅曰象言輔不言口言身不言腹言夤限不言臍有背面而立之象案合全卦言之上一陽肩也中二隂脊骨也下一陽腰也下二隂足也背之象也分二體而言之上一人背而立也下一人亦背而立也一陽為肩二隂手足也三四內外之交際也艮其背不獲其身全卦之象也行其庭不見其人二體之象也行者內卦也其人外卦也行其庭時行則行不限止於內也五官四體以為身皆前面也而止於其背則不獲有其身也外卦亦背立之象不見其人不見其面也右明卦象張舜元曰吉凶悔吝生乎動者也各止其所是以無咎右明卦占初六艮其止無咎利永貞贊曰艮其止未失正也正義曰居止之初行無所適止其足而不行乃得無咎李季辨曰六爻皆言人之背以止為義欲止而不欲動止在下而不動則無咎有止於暫而不能止於久者非善止也故曰利永貞程可久曰上無其應近無所承宜止者也故無咎隂爻性靜未履乎位所止在我故以永貞為利朱子發曰隂柔患不能久故戒之以利永貞朱子同林黃中曰咸言拇艮言止象其物宜也案隂以居下為貞永貞則止于其所止也右明象占郭子和曰小畜復皆言吉艮之初六有過於二者而不言吉蓋吉凶者失得之象也二卦之復雖與止相近然有失而能止則謂之復畜亦云復自道皆先失後得復則吉不復則凶吉凶可得而言也艮其止則止於未失得之前吉凶失得皆在所止是以不言吉也右明爻義六二艮其腓不承其隨其心不快贊曰不承其隨未退聽也鮮于子駿曰以隂從陽三亦艮限不進不能見承又未能退聽其命故其心不快程正叔曰九三成止之主者也二之行止系乎所主故有腓之象股動則腓隨動之在股而不在腓也朱子發曰九三止矣二亦隨而止則所謂其隨者隨九三也坎為心病不快也案九三在羣隂之中有心坎之象都聖與曰剛上而柔下各得其道在下者欲隨上以升而不與其升所謂其心不快者以不得其志也蘭惠卿曰隂之隨陽乃其本心本爻傅近九三之陽其心本欲隨之是以未能安靜退聽而在艮之時於義當止是以其心不快程可久曰傅物以行止欲靜則有所牽欲隨則不能承動靜失職是以其心不快也李季辨曰物在前而足向後但見其腓而已與物相背故不能承其隨然心固難持也止在腓而承在心心止則腓止是止腓之道也右明象占九三艮其限列其夤厲熏心贊曰艮其限危熏心也王輔嗣曰三當兩象之中故曰艮其限各止於其所上下不相與則列矣危莫甚焉程可久曰限分上下夤列左右各止其所無相資相待之意故其危熏心詩云憂心如惔惔者燔也虞仲翔曰未見坎體能熏灼人此泥象之過也案六爻之象縱視之則分上下衡視之則列左右然其為背之象則一也毛伯玉曰三處上下之間故為限一人之身榮衛流通則泰而無疾上痞下結則危矣蘇子瞻曰心在六四故憂之及心之謂熏案咸之四有心之象可類而推也王介父曰心者體之主也體之上下不相為用則其危及主矣朱子發曰坎為心病右明象占正義曰分列其夤身將喪亡故憂危之然則君臣共治大體若身大體不通則君臣不接君臣不接則上下離心列夤則身亡離心則國喪王氏逢曰夤於脊而對心者也過惡形而限絶之情欲深而割裂之其於身也不亦危乎劉氏曰以陽剛之材處上下之際宜上通乎四與之同心以翊戴九五今乃守其艮而不與四交故象占如此右推廣爻義皆可旁通而曲暢者也六四艮其身無咎贊曰艮其身止諸躬也李季辨曰四在夤上通以身言之身止則止其所矣石守道曰身者過中而近上之所也自止以上皆得謂之身身者心之主故於四曰艮其身張子厚曰止於心故能艮其身李子思曰出下體之上居上體之下將具全體故曰身身總諸體者也咸之六四居上下之間而喻其心今不以心喻何也艮其背而心不可見也案咸言心者以其感也面面相視所以因見有感也若身則無感矣艮言身者以其止也背背相背所以無見而遂止也若心則無止矣艮之六爻於身各象其一至三則限而列夤疑無全人矣彖又曰不獲其身作易者恐人疑於艮之各止其所而上下不相為用也故於四當已離下體而入上體之際乃以身為象則靜觀六畫貫乎上下儼然一全人也特示其背焉耳正義曰三止於下體不與上交所以體限夤列四已入上體故能總止其身身總名也然至中則體分而身喪入上體則不分而身全非中上獨是其身而中下非身也胡翼之曰自止其身使四肢不妄動不為外物所遷故無咎王輔嗣曰履得其位故不陷於咎劉氏仲平曰在下也在內也則止之道也今達而在上於卦為外出而交物失止之道則咎將隨之然以隂當位明止之義故無咎身者對物而言贊曰止諸躬明止之在我也程可久曰柔得位而上無所承無乘剛之咎其道不加諸人止其身而已郭子和曰以初論四則初為早辨者也然有初之艮其止然後有四之艮其身止其身能成已矣未能成物也案艮無及物之義有時行之義行則及物矣以六位言之四自內出外可行之時也彖所謂行其庭者也然以柔居隂無能行之材者也故僅獨善其身足以補過而已矣右明象占爻義六五艮其輔言有序悔亡贊曰艮其輔以中也林黃中曰居上而畫耦有口胠而不合之象故為輔又為言李季辨曰輔頰之兩旁骨背後而可得見者咸言其面故并見頰舌艮言其背故止見其輔口言則輔動輔止則言寡故言有序也毛伯玉曰咸以上為輔故尚頰舌艮以五為輔故言有序中不中之辨也此説本贊林黃中曰隂畫為虛故有輔之象咸在上而艮在五取其虛而已矣李去非曰艮其輔不出諸口也感其輔欲感以口也故艮其輔為悔亡而咸其輔為滕口或語或默不失其常者有序也馮當可曰凡人之口上不動而下動不動者輔也動者車也雖止而不動然非輔不能以言止而不廢動者亦止之善也蘭惠卿曰非位悔也如是則非位之悔可亡耿睎道曰君子以默為本以語為不得已如金石有聲不考不鳴也是故艮其輔可而咸其輔不可也以默為本故言則有序焉張舜文曰言不可不謹也為則訛出則詘延則誕曼則謾止諸輔何悔之有右明象占李子思曰人之所以見於外者不過言行二者也在下者有腓趾之象以喻其行在上者有輔頰之象以喻其言所以明止之義則一也郭子和曰五君位一卦之主止天下之止者也天下命令之所由出可不慎乎林黃中曰髙宗三年不言一言而四海咸仰案孔子曰君子居其室出其言善則千里之外應之況其邇者乎居其室出其言不善則千里之外違之況其邇者乎書曰唯口出好興戎然則人主莫謹於言艮有止義故易寄於輔之象而示以語默之有序而不可輕發也右明爻義上九敦艮吉贊曰敦艮之吉以厚終也李去非曰敦篤厚也以兼山之體處艮道之成而篤實有終不移於素可謂仁者之靜矣張舜文曰有崇髙之勢而不驕無臲卼之危而知止非厚德何以及此哉李季辨曰自止至輔皆得所止則止道厚矣故艮之終但贊以敦艮吉案易窮則變卦至于終未有不窮未有不變者獨臨艮二卦之終不窮不變以敦為象而獲吉何也天下之至厚者莫如地而山又厚於地者也二卦二爻皆居坤艮之上已謂厚也而臨下有一隂二陽以藉之艮下又一艮皆重重厚實之義大過之藉用白茅謙九三之有功不德傳猶以謹厚之厚稱之況二卦之上乎右明象占李去非曰六爻取一身之象而此爻獨不言所謂不見其人者與林黃中曰自止而上之五為輔矣則上之為顛可知也不取諸顛而言敦艮者微其顯而闡其幽也張敬夫曰敦艮者居之安也八卦之中唯艮為吉吉凶悔吝生乎動者也動則獲凶常多得吉常少靜而知止何咎之有馮當可曰止而終止有久而不渝之象自非其人敦厚重靜安能確然如山之不移哉是道也以之臨患難立事功處富貴甘貧賤交朋友應倉卒無不可者聖人於艮之上九獨立此象讀之未嘗不掩卷歎息也右明爻義張知常曰此一卦取喻一身上宜止下宜動今下卦皆止止所以立猶之可也腓不能使止則心不快矣限要也要今腰要復不動則危熏心矣躬也輔也止之宜也敦艮其首乎記曰足容重目容端口容止頭容直觀此卦則思過半矣趙氏曰下三爻以止於內為言而上爻四五以止於外為言唯上九在一卦之終有內外兼止之象李季辨曰咸艮言人之身咸言人前艮言人背艮其腓咸亦言腓者腓雖在後而前亦可得而見也咸其輔艮亦言輔者輔雖在前而後亦可得而見也故咸得兼艮之腓而艮得兼咸之輔右明六爻厚齋易學卷二十六
