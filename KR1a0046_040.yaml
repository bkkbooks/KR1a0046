body:
  text: 厚齊易學卷四十宋馮椅撰易外傳第八象下贊咸至益山上有澤咸君子以虛受人山上有澤咸卦言二氣感應虛象也此言山上有澤實象也耿睎道曰澤水之鍾也山上有澤鍾焉則山以虛受之也君子以虛受人程正叔曰夫人中虛則能受實則不能入矣咸其拇志在外也咸其拇初六之象志在外也虞氏曰外謂四雖凶居吉順不害也雖凶居吉六二占順不害也害釋凶也隨九三而動則凶若居以待九五之應則於理為順而九三不能為之害也劉氏曰六二中正若能安居以待正應則於理順而吉咸其股亦不處也志在隨人所執下也咸其股九三象亦不處也凡亦云者承上文而言處上聲猶居也九三為艮主也其德當止今亦感之而動也志在隨人所執下也執其隨之象虞氏曰下謂二貞吉悔亡未感害也憧憧往來未光大也貞吉悔亡九四占未感害猶大有無交害之辭有感於物之害則有悔而凶矣既貞吉而悔亡則未有所感之害憧憧往來象未光大也未能與往來相忘相忘則光大矣咸其脢志末也咸其脢九五象志末也末為上脢所感不通隨上而動故舍正應而志於上咸其輔頰舌滕口說也咸其輔頰舌上六象占滕口說也滕水超涌之謂謂尚口說滕或作媵說或音脫皆非雷風恆君子以立不易方雷風恆雷風相與以為常程可久曰雷風不相悖故可常也君子以立不易方取恆義不取雷風之象程可久曰方讀如合志同方之方趙氏曰方猶所也不易其所所以為常袁氏曰一德之謂蘭惠卿曰常其所立之操而不易方李子思曰譬之天動星回而辰極居其所璿機運轉而衡極處其中此道在於我而能體常以盡變者也浚恆之凶始求深也浚恆之凶初六象占始求深也初故云始浚為求深凡事始淺而終深乃為有常今始已求深其進鋭者其退速也九二悔亡能久中也能久中也巽陰長女而剛本有悔也然剛則能久二則得中故悔亡不恆其德無所容也不恆其德九三象無所容也爻居上下之間上下皆恆故不恆其德則進退皆無所容雖承之者亦且羞之况他人乎久非其位安得禽也明九四田無禽之象經以初六隔二陽不為之應今贊但以失位為解位當不當自是孔子之例位不當與九二同而休咎異者中不中之辨也婦人貞吉從一而終也夫子制義從婦凶也婦人貞吉六五象從一而終也婦人不再嫁故以恆其德貞為從一而終之吉夫子制義從婦凶也以制義從婦明夫子凶之占振恆在上大無功也振恆在上上六象大無功也爻應巽九三之陽為大而巽風搖落振動其木是謂無功天下有山遁君子以逺小人不惡而嚴天下有山遁天髙起而下有山是天逺山也不取遁義郭子和曰蓋備二體之象非名卦之義大象如此類甚多不惡而嚴惡入聲如論語所謂儼然人望而畏之斯不亦威而不猛之意乾為君子艮二陰為小人山浸長天不可階而升逺之之象也然艮之一陽與二陰同體而親之不惡之象天與山絶則分嚴也遁尾之厲不往何災也以災釋厲眀初六象占執用黃牛固志也執用黃牛二象不言革舉其凡也或因曰之革二字衍文非固志也言固吾之志固謂莫之勝說五志固則三陽固矣係遁之厲有疾憊也畜臣妾吉不可大事也係遁之厲有疾憊也九三象占以憊釋厲憊聲備荀作傋古文困也王子雍作斃畜臣妾吉不可大事也李氏曰必欲制小人而大有為則剛不得位故也君子好遁小人否也九四象占林黃中曰與大壯九三小人用壯君子罔也之義同否叶韻為否塞之否則聲鄙與缶者非也嘉遁貞吉以正志也嘉遁貞吉九五象占以正志也二五皆曰志則以其志應言之胡翼之曰正二之志也蓋既嘉二而遁故正二之志使之不侵害於諸陽耳肥遁無不利無所疑也肥遁無不利上九象占無所疑也陰善疑無所疑逺於陰也自五以下未免應陰唯此一爻在卦外無所應雷在天上大壯君子以非禮弗履壯于止其孚窮也九二貞吉以中也小人用壯君子罔也藩決不羸尚往也喪羊于易位不當也不能退不能遂不詳也艱則吉咎不長也眀出地上晉君子以自昭眀德房氏曰乾曰自彊晉曰自昭天行日進誰使之哉朱子發曰二者自已為之人力無與也耿睎道曰日本自眀月有所受而眀然則眀出地上自昭者也程正叔曰昭或作照非晉如摧如獨行正也裕無咎未受命也晉如摧如初六象獨行正也以行正眀貞吉之占獨謂異於諸爻之進裕無咎占未受命也言未受六五之命故五罔孚受兹介福以中正也受兹介福六二占以中正也眀貞吉衆允之志上行也鼫鼠貞厲位不當也失得勿恤往有慶也維用伐邑道未光也眀入地中眀夷君子以蒞衆用晦而眀坤為衆蒞衆立乎卦之外言之李去非曰蒞衆必用晦晦其明而自不可掩古之君子前旒黈纊蓋取諸此君子于行義不食也君子于行初九占義不食也眀三日不食以其義不可食蓋所主非其人而有言不恤也六二之吉順以則也六二之吉占順以則也蘭惠卿曰於理為順而合於法則耿睎道曰六二之於九三疑於不順而違則然剛上柔下中正以相與豈有不順而違則者乎程正叔曰則謂中正之道南狩之志乃大得也南狩之志乃大得也釋九三南狩之象得其大首之占嫌大首之大為陽故曰此乃九三之陽得此大首也志志在大首入于左腹獲心意也入于左腹六四象獲心意也釋獲眀夷之心心謂意也其子之貞眀不可息也其子之貞六五象占眀不可息也貞則不傷眀矣以眀不可息故也初登于天照四國也後入于地失則也初登于天上六象照四國也後入于地象失則也張舜元曰離之炎上性之則也入于地失其則也風自火出家人君子以言有物而行有恆行去聲物物則也恆常度也齊家自修身始修身自言行始黃帝書曰火疾風生此風自火出之驗也言出於口行出於行猶風出於火唯於卦義未有取也李季辨之說不然其曰風自火出槖籥之火也凡鼓鑄必須鼓風從火出槖籥自有戶庭閫奧家之象也其鑄必有模範言行一家之模範也一家之模範天下之模範也存之以俟知者而擇焉間有家志未變也間有家初九象志未變也女子未從人之初其志未變於此間之乃亡後悔六二之吉順以巽也六二之吉占順以巽也以順眀無攸遂巽眀在中饋六二索於坤之順應九五之巽家人嗃嗃未失也婦子嘻嘻失家節也家人嗃嗃九三象未失也眀悔厲吉之占婦子嘻嘻象失家節也眀終吝之占富家大吉順在位也富家大吉六四象占順在位也陰柔當位而順諸陽有子承父之象王假有家交相愛也王假有家九五象交相愛也交相愛故勿憂而吉威如之吉反身之謂也上火下澤睽君子以同而異見惡人以辟咎也遇主于巷未失道也見輿曳位不當也無初有終遇剛也交孚無咎志行也厥宗噬膚往有慶也遇雨之吉羣疑亡也山上有水蹇君子以反身修德往蹇來譽宜待也王臣蹇蹇終無尢也往蹇來反內喜之也往蹇來連當位實也大蹇朋來以中節也往蹇來碩志在內也利見大人以從貴也雷雨作解君子以赦過宥罪宥聲又寬也解雖蹇之反然正與屯對立義坎在上震在下則坎雨不下流而氣上蒸為雲所以屯結而不解也坎在下而雷在上則雷動雨施而也結解散矣李氏曰雷雨作則澤被萬物赦過宥罪則澤被萬民正義曰過輕則赦罪重則宥皆解緩之義都聖與曰舜之眚災肆赦流宥五刑周之三赦三宥是已蘭惠卿曰雷雨作天地所以解萬物之屯也赦過宥罪君子所以解天下之難也蓋難之作起於小人君子開其自新之路以解天下之難耿同程可久曰欲與民更始也雖宥有罪猶不敢赦所以懲惡而護善也王景孟曰人君之政有所謂赦宥之者特因亂難既解之後而有是也若屢行而不已適所以長姦而滋惡非政也其後世之過乎剛柔之際義無咎也以承應眀初六之占解難以剛爻承應以剛故無難咎際交際也九二貞吉得中道也九二貞吉占得中道也得黃矢之象負且乘亦可醜也自我致戎乂誰咎也負且乘六三象亦可醜也不安其貧故為可醜自我致戎釋致冦至之占古通以戎為冦也與傳六三同義又誰咎也冦自己所致不可咎他人解而拇未當位也解而拇九四象未當位也未當九五之位但解去所比附者足矣君子有解小人退也君子有解六五象小人退也眀有孚於小人之占小人相信則退聽矣公用射隼以解悖也公用射隼上六象以解悖也悖聲佩今背通悖謂前日之致難者今射而獲之故解山下有澤捐君子以澄忿窒欲澄直聲反鄭猶清也竊謂義當去聲今澄古登見蜀本劉王訛作懲忿芳粉反怒也窒珍栗反塞也徐得悉反鄭劉作懫止也孟作恎陸作睿恐非欲古浴孟本山下有澤則山摧而澤溷溷而壅有忿之象澄之則清澤下窊於山而氣漏泄有欲之象窒之則塞君子所以懲已之忿如澄澤之溷窒已之欲如窒山之窊耿睎道曰損之大莫大於忿欲以事遄往尚合志也以事遄往初九占尚合志也尚庶幾也志六四之志也以所損遄往於四而四為之斟酌庶幾與四合志九二利貞中以為志也九二利貞占中以為志也釋利于貞之義一人行三則疑也一人行三則疑也眀六三象占一陽上行為上九三為六三故二人並行至三則疑陰善疑三為六之象也損其疾亦可喜也損其疾亦可喜也眀六四象占六五元吉自上祐也六五元吉占自上祐也上上九祐助也弗損益之大得志也弗損益之上九象大得志也大謂九陽爻得志謂得六五之君遂其志也風雷益君子以見善則遷有過則改風散雷動所以有益於物遷善改過所以有益於已有改則過損所以益也吕與叔曰風雷震動萬物變而新之在人有遷善改過之義朱子曰遷善當如風之迅速改過當如雷之勇猛李去非曰見善則遷有過則改欲其敏而已敏則日加益而不自知也元吉無咎下不厚事也元吉無咎初九占下不厚事也未詳其義張舜元曰不以政事益我之為厚竭誠致力至於元吉而後無咎也僅通或益之自外來也九自四來初益我故曰自外九非正應故曰或益用凶事固有之也三多凶是位之固有凶事非由六居之位不當而後有凶事也楊廷秀曰唯凶事則固有是舉在他事則否告公從以益志也告公從六四占以益志也志在遷國之益公從之則益其遷國之志也有孚惠心勿問之矣惠我德大得志也有孚惠心九五象勿問之矣釋元吉之占惠我德象大得志也大指本爻得所與四之志四以五為益志五以四為得志互解也莫益之偏辭也或擊之自外來也莫益之上九象偏辭也林黃中曰我莫肯益物物莫肯益我皆私已一偏之辭都聖與曰莫非辭也而於此特言偏辭者聖人指其所之而辨吉凶者於此尢切也或擊之象自外來也林黃中曰自益者必有以决之益之上九居一卦之外乘九五之剛有澤上於天之象謂之自外來者眀其將變而為夬也爻辭稱或而孔子謂其自外來以夫禍福之無方吉凶之不測是以君子畏之也厚齊易學卷四十
