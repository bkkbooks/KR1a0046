body:
  text: 厚齊易學卷三十四宋馮椅撰易外傳第二彖上贊同人至離同人柔得位得中而應乎乾曰同人同人曰同人于野亨利涉大川乾行也文明以健中正而應君子正也唯君子為能通天下之志同人志卦柔得位得中而應乎乾曰同人以六二明卦義同人曰三字衍同人於野亨利涉大川乾行也主上卦以明象占行道也兼以天道君道明之文明以健中正而應君子正也唯君子為能通天下之志以卦德六二明利君子貞之占又以通志覆同人之義文明接物之禮健則能久而敬之中正則無私系物來則應此君子同人之正道所以能通天下之志也林黃中曰離為心在乾下故曰天下之志毛氏曰同者合一世之智愚强弱親疏逺近並育而不相害並行而不相悖是之謂通天下之志必欲盡聨而一之爭愈甚矣程可久曰所以成卦在六二故曰柔得位得中所以同人利涉者在九五故曰乾行所以利君子貞者在二體相用故曰文明以健中正而應大有柔得尊位大中而上下應之曰大有其德剛健而文明應乎天而時行是以元亨大有志卦柔得尊位大中而上下應之曰大有以六五一爻明卦義位曰尊中曰大對同人而言以見六之居五與居二不同也上謂上九下謂四陽爻以人事言之上天下臣民也同人一陰在臣位故以應乾為義大有一陰在君位故取其上下皆應其德剛健而文明應乎天而時行是以元亨以卦材六五明卦象蓋成卦之義以六五之柔而元亨之義以乾之能剛惟六五應乎乾而與時偕行所以元亨也不曰應乾者乾非在下之物故以天為義儲氏莊氏云六五應九二二在乾體故曰天馮氏曰五柔而不能行二乾體而健于行故二應五而時行所以元亨李仲永曰不失其時乃應天也郭子和曰卦具元亨利貞四德者則釋為大亨疑與乾坤同也不兼利貞則釋為元亨盡元義也謙亨天道下濟而光明地道卑而上行謙亨就象志卦天道下濟而光明地道卑而上行此以二體贊卦象下濟與卑謙之象光明上行亨之象也艮之陽乾之䇿也而居下卦天道下濟也陽居陽位而居下卦之上光明也故艮有光明之象坤也地道也地道本卑今居上卦是上行也天道虧盈而益謙地道變盈而流謙鬼神害盈而福謙人道惡盈而好謙復舉天地因旁及鬼神人道以推廣謙之所以亨之意虧馬作毁福京作富恐非好惡並去聲李氏曰虧益以氣言變流以形言害福以理言好惡以情言林黃中曰觀諸日月則見虧益之氣考諸山川則見變流之形驗諸災祥則知害福之理稽諸毁譽則知好惡之情朱子發曰上居首盈也三往損之為虧為變為害為惡三在下謙也九來益之為益為流為福為好說者謂一謙四益書曰滿招損謙受益古有此語孔子蓋述之謙尊而光卑而不可踰君子之終也光說見上不可踰有艮山也林黃中曰一陽在上卦之下下卦之上故兼尊卑釋君子有終之占尊卑皆不可無謙故君子終之豫剛應而志行順以動豫豫順以動故天地如之而况建侯行師乎天地以順動故日月不過而四時不忒聖人以順動則刑罰清而民服豫之時義大矣哉剛應而志行以九四明卦義應謂應五所以志得行不言上下應之者嫌其近君而權迫也朝氏曰剛應志行以爻言豫之才順以動豫以卦言豫之德也天地以順動故日月不過而四時不忒過平聲日月之行景長不過南陸短不過北陸故分至啓閉不差其序以順陰陽之氣而動也隨剛來而下柔動而說隨大亨貞無咎而天下隨時隨時之義大矣哉震動而兊說隨之所以元亨也元者震也蓋乾之一元來為動之主是以亨也九五正中當位所謂利貞也蠱剛上而柔下巽而止蠱蠱元亨而天下治也利涉大川往有事也先甲三日後甲三日終則有始天行也蠱志卦剛上而柔下巽而止曰蠱以卦變卦性明卦義上上聲下去聲剛為乾之九自初而上於上柔謂坤之六自上而下初剛柔各復其位則下巽而上止事之所以蠧壞也蠱元亨而天下治也以上文卦義明卦象剛柔相交巽而止之則蠱乃元亨而天下治矣言蠱不能亨天下亂也下户五反治去聲利涉大川往有事也又以上九一爻明占謂剛自內往外乃有事於蠱不畏其壞而期於必濟利涉大川之義也先甲三日後甲三日終則有始天行也又以初上兩爻卦變明占初九有甲象自初至上凡厯六位為六甲之象上終則復歸初為終則有始之象此天道之運自然如此行道也朱子曰亂之終治之始天運然也臨剛浸而長說而順剛中而應大亨以正天之道也至于八月有凶消不久也臨志卦剛浸而長說而順脫卦名當有臨字以二陽卦性明卦義長上聲浸漸也一氣不頓進非暴為之長也王景孟曰以和說不忤為德而羣陰順之不相違拒劉氏曰不得其時不可臨也不得其道不可臨也漸進而長得其時矣說而順得其道矣剛中而應大亨以正以二五明卦象天之道也覆釋卦辭天之運行消長之道如此毛伯玉曰二陽欲進而五援之豈人力也哉消不久也以天道消息明卦占臨後觀繼之陰長陽消矣大觀在上順而巽中正以觀天下觀盥而不薦有孚顒若下觀而化也缺志卦大觀在上順而巽中正以觀天下觀盥而不薦以九五卦性明卦義卦象觀並去聲大觀在上九居五位以示天下下三陰順上一陰巽共仰乎九五九五乃居中正之位以中正之德示天下以副其所觀瞻此卦之所以為觀見盥而不待薦也薦上九之事故觀所不及馮氏曰九五在上普觀羣有故為大觀若專應二則不大矣有孚顒若下觀而化也以四陰明卦占顒若下觀也有孚化也觀平聲下同觀天之神道而四時不忒聖人以神道設教而天下服矣又以九五推廣覆釋彖義服叶忒韻吐得反差也神道謂盥而不薦四時天下謂四陰之象王景孟曰不忒者非天不忒神故不忒也曰服者非服聖人服其神也頤中有物曰噬嗑噬嗑而亨剛柔分動而明雷電合而章柔得中而上行雖不當位利用獄也缺志卦頤中有物曰噬嗑以卦變之象明卦義頤頤卦也六四變剛有物之象有物必噬之而乃合也噬嗑而亨復出卦名明亨由於卦也剛柔分動而明雷電合而章柔得中而上行雖不當位利用獄也賁亨柔來而文剛故亨小分剛上而文柔故利有攸往天文也文明以止人文也觀乎天文以察時變觀乎人文以化成天下賁志卦亨衍柔來而文剛故亨小以六二一爻之變明卦象二之柔自上而來文乾之剛柔陰小也所謂亨小指六二也分剛上而文柔故利有攸往天文也以上九一爻之變明卦占分二之剛上于上而文坤之柔所謂利有攸往指上九也今本誤於卦下便添一亨字却於亨字下移小字置於利有攸往之上錯亂文義今正之柔來文剛分剛上文柔此明卦義就以柔來文剛明象分剛文柔明占故併入在贊下上上聲天文也又併以剛柔往來相文推廣卦義以此為文之在天者文明以止人文也以卦性明文之在人者又以二文字明卦義觀乎天文以察時變觀乎人文以化成天下因上文以推廣卦義楊廷秀曰天文之著者三辰五星之象觀之可以察四時之變人文之著者三綱五常之典觀之可以成天下之化剝剝也柔變剛也不利有攸往小人長也順而止之觀象也君子尚消息盈虗天行也剝志卦剝也柔變剛也以五陰一陽明卦義剝並普卜反五柔變一剛也不利有攸往小人長也主一陽明卦占長上聲小人謂五陰順而止之觀象也以卦性告筮者觀此之象順小人方長之𫝑而止之使不至為坤盡去君子君子尚消息盈虗天行也又以陰陽消長之運告君子凡陰陽始消消極則虗虗極則息息極則盈此天道之運如此行道也此彖以剛長象行為韻復亨剛反動而以順行是以出入無疾朋來無咎復志卦亨剛反以一陽明卦義卦象反平聲陽剛自上反下為復復則亨矣動而以順行是以出入無疾朋來無咎以卦性明卦占陽動而以順行之故無疾無咎反復其道七日來復天行也利有攸往剛長也復其見天地之心乎天行以天運明卦占剛長又以一陽明卦占陽剛浸長故所往皆利往上也楊廷秀曰復何以亨曰剛反何以出入無疾朋來無咎曰動而以順行何以反復其道七日來復曰天行何以利有攸往曰剛長復其見天地之心乎此孔子新意也李季辨曰窮冬積陰之時幾於無生意也而陽氣已動於黃泉之下猶之人焉方其物欲之深也幾於無天理矣而性善之端要不可泯也必有時而發就其發處觀之則天地之心見矣張敬夫曰以時觀之則一元之氣方萌於十一月天地之心可窺見矣以一身觀之則人心微動之初亦可以見天地之命我者矣竊謂孔子曰其見天地之心乎天地之心隱微難見唯一陽之復庶其見之蓋自羣陰併力剝去一陽陽道宜不復存矣而窮於上乃反於下遂有復生浸長之勢以此見天地之心未嘗一日不注意於陽也至於四陽大壯乃曰天地之情可見矣情發於顯心隱於微其見乎與可見矣之辭亦異蓋天地本無心而於扶陽抑陰見之漢人惟董仲舒略知此意其曰陽常居於大夏以生育長養為事陰常積於大冬空虗不用之處以此見天之任德不任刑又曰此天意也此為略識天地之心者無妄剛自外來而為主于內動而健剛中而應大亨以正天之命也其匪正有眚不利有攸往無妄之往何之矣天命不祐行矣哉四陽在上純體之卦成遁今來居於初為一卦之主是自外來而為主於內也此所謂元也震動而乾健所謂亨也九五以剛居中而下應六二陰陽上下各得所謂正也自賁至無妄四卦皆言有攸往之利不利蓋相沿生文以為占也大畜剛健篤實輝光日新其德剛上而尚賢能止健大正也不家食吉養賢也利涉大川應乎天也大畜志卦剛健篤實輝光日新以卦德贊卦義非以輝光日新為大畜之義也乾剛健艮篤實以此藴畜於內則輝光形於外而日日以新輝光四德所發而日新剛健為多其德剛上而尚賢能止健大正也以卦變卦性明利貞之象剛上謂九自四往居上賢乾三陽也九往居上成艮則能止乾健故大者得其正大指上九也大正謂利貞舊以日新其德為句今改從蘭讀句義猶大有其德剛健而文明不家食吉養賢也以畜乾明不家食之占養三陽之賢則賢者不食於家矣一謂養賢以及萬民則不必家家食之也養去聲利涉大川應乎天也以艮應乾明利涉大川之占所畜之賢其義應乎天之剛健故有利涉大川之象頤貞吉養正則吉也觀頤觀其所養也自求口實觀其自養也頤志卦貞吉養正則吉也以六爻明象占上下六畫陰陽停止觀頤觀其所養也以二陽明之其指二陽頤之所養者四陰也自求口實觀其自養也以四陰明之其指四陰所以自養天地養萬物聖人養賢以及萬民頤之時大矣哉又以六畫推廣卦用天上九地初九聖人上九賢初九也萬物萬民中四陰也大指二陽養四陰者也養賢之養或讀去聲大過大者過也棟橈本末弱也剛過而中巽而說行利有攸往乃亨大過之時大矣哉大過志卦大者過也明卦義陽為大而過於陰棟橈本末弱也以初上明卦象初為本上為末陰柔而寡故弱此六位以衡觀之有棟之象故不言上下而言本末兩端也剛過而中巽而說行利有攸往乃亨以四陰陽二體明卦占剛過謂四陽中居中也巽巽而行之以兊說故利於往往則亨矣大過之時大矣哉贊卦時習坎重險也水流而不盈行險而不失其信維心亨乃以剛中也行有尚往有功也習坎志卦重險也水流而不盈以卦性卦象明卦義重平聲水流盈一坎而上又一坎不盈行險而不失其信以卦象明有孚之象水行坎險而無有不下是不失信信有孚也此孔子新意維心亨乃以剛中也以卦才明卦占二五居中心之象也皆以剛實在中所以心相通也行有尚往有功也又以二五明卦占行有所配共濟險難故往則有功主九二而言一剛則陷險二剛叶濟則出險也天險不可升也地險山川丘陵也王公設險以守其國險之時用大矣哉以卦性推廣卦用上一坎天也坎性趨下故不可升下一坎地也山川丘陵皆為險阻王天子九五也公諸侯九二也其國指所都邑謂天子諸侯皆以重險守之設險之象險有時有用因時而用險則國可守而與天地相為長久其用豈不甚大離麗也日月麗乎天百穀草木麗乎土重明以麗乎正乃化成天下柔麗乎中正故亨是以畜牝牛吉也離志卦麗也日月麗乎天百穀草木麗乎土重明以麗乎正乃化成天下以卦性明卦義麗篆文古􅀈别篆麗傅麗也日月麗乎天上一離也百穀草木麗乎土下一離也重明以麗乎正六二六五也柔麗乎中正故亨是以畜牝牛吉也覆以二五明卦象占謂二五君臣之志通故君能畜其臣也離性炎上非柔順之至焉能畜之厚齊易學卷三十四
