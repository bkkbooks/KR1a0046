body:
  text: 厚齋易學卷三十三宋馮椅撰易外傳第一彖上贊乾至否彖者孔子所題文王卦辭之名而贊之上者上篇也彖吐亂反斷也言斷一卦之義也蘭惠卿曰元亨利貞文王之彖傳所謂知者觀其彖辭彖者言乎象之類是也後世誤以孔子之贊為彖而彖反謂為繇王輔嗣唯乾六爻之後方繼以贊乃費直之舊也大哉乾元萬物資始乃統天雲行雨施品物流形此以天道贊乾之元亨也大哉歎辭言無限極也資取也乾以一元之氣萬種之物資之以始天道運行而元氣總攝之此元之所以大也施去聲品類也元氣之陽上行而為雲下施而為雨萬物各以品類自元氣中流出此其亨也遊定夫曰乾元曰大坤元曰至乾之大無方而坤之至未離乎方也李去非曰元者一之未形也元之有形則一是已萬物之所祖也萬物祖於元得氣而有形得形而有質而生生無窮矣蘭惠卿曰乾元坤元天地之元氣亦如人之有元氣也乾元者天陽一元之氣也人知萬物之生於地而不知天以乾元之氣為之始亦如人之生於母而不知資始於父之元氣也始之於未生之前生之於有始之後胡翼之曰資始資生聖人於一字皆有指意李子思曰以日月星辰周天之度觀之若有機緘運轉而不得止者意者天在太虛之中隨一元之氣以轉故乾之元物所資以始者乃所以統天也毛伯玉曰世謂隂陽者天地之所有非也未有天地先有隂陽陰陽判而後有天地是故謂以陰陽而統天地則可以天地而御陰陽則不可或曰天之體乘陽氣而動猶人之身稟血氣而生也形以神為主故曰乃統天此本馮説又曰雖天亦資始於陽豈特萬物哉大明終始六位時成時乘六龍以御天此言聖人體元亨之德以治天下也聖人大明乾道之終始則見卦之六位各以時成而乘此六陽以行天道是乃聖人之元亨也不言於利貞之後而言之於此者蓋元亨者內卦也有內卦必因而重之故於內卦之元亨知其必有外卦之利貞也非六陽之純全何以成元亨之功哉萬物資始者初九也九二居中坤索成坎雲行雨施也自初衍而至三品物流形之象也胡翼之曰時潛則潛時見則見時躍則躍時飛則飛以至惕也亢也亦然是六位各以時而成也正義曰以所居上下言之謂之六位以陽氣升降言之謂之六龍程可久曰乘如乘車之乘託物以有有御如御馬之御制物而有節耿晞道曰統天統其體御天御其用統如首之統四體御如心之御五官林黃中曰此三畫之乾也下卦既終上卦又始始終相生聖人能大明此理則下三位亦以時成也乘此六陽之龍以御中天則乾之全體得矣此乾元用九所以天下治也乘六龍以御天用九之事而一元之氣實主之者體乾之元也然言於乾道變化之先者馮當可曰此聖人贊化育之功也由是乾道得以變化耳林黃中又曰乾為天爻不言天而時乘六龍以御天也乾道變化各正性命保合太和乃利貞此以天道贊乾之利貞也故復以乾道更端乾道至此變化無所不利而萬物各全其性命之正此乾之利貞也變者息而盈化者虛而消物所受為性天所賦為命太和者陰陽沖融之氣自夏而秋則陰升而變陽降而化萬物各以品類歸根反本復其性命之正而向之發逹流布者保聚會合至和之氣同歸於一元之貞矣變化者九四之乾道革也各正性命者九五之中正也保合太和者上九之不亢也耿晞道曰乾道之所以變化者陰陽而已各正性命者陰陽之定分也保合太和者陰陽之沖氣也胡翼之曰立秋涼風至八月白露降九月寒露降以至為霜為雪皆變化之漸也若大暑之後寒涼暴至則萬物其能成乎故曰保合太和乃利貞毛伯玉曰變化之餘各正性命收斂於冬故也斂之不固則泄不以時凡雨雪不應水泉不收愆陽伏陰冬華春實皆天地之沴氣也是故斂之於冬者萬物之所以止也各正性命者也首出庶物萬國咸寧此言聖人體利貞之德以安天下也聖人在上高出於物猶乾道之變化也萬國各得其所而咸寧猶萬物之各正性命而保合太和也是乃聖人之利貞也朱子曰四德循環而無端生氣流行初無間斷此元之所以包四德而統天也其以聖人言者孔子蓋以此卦為聖人以天德得天位行天道而致太平之吉占也雖其文義有非文王之舊者讀者各以其意求之則並行而不悖可也餘卦倣此此贊以天形成命貞寧為韻諸卦皆協韻語當以類推之書曰一人元良萬邦以貞古通以貞為寧也至哉坤元萬物資生乃順承天此以地道贊坤之元也坤之一元之氣萬物皆資之以生乃順承天施也可謂至矣朱子曰萬物資乾以始而有氣資坤以生而有形氣至而生生即坤元李仲永曰乾統之於先而坤順承之於後也遊定夫曰坤順承天則乾之道亦無餘地矣特不出于天之外而已故曰至哉坤元言地道于是為盡也李去非曰自後而從其先謂之順自下而奉其上謂之承坤厚載物德合無疆含𢎞光大品物咸亨此以地道贊坤之亨也含古函合無疆合天之覆物無限極也陽曰包陰曰含𢎞宏也品物咸亨亨于流形之後也李氏曰乾主覆坤主載坤以厚德載物則合天無疆而同其所覆也靜翕故含𢎞動闢故光大李季辨曰乾德在不息坤德在無疆可久之德自不息而至可大之業自無疆而至也李子思曰自太極肇分之後一載至今自今以往又不知其載之無疆也程正叔曰含𢎞光大四者形容坤道猶乾之剛健中正也牝馬地類行地無疆柔順利貞此以牝馬贊利貞也類言其朋之衆也馬稱牝以柔順也程可久曰在乾稱六龍在坤稱地類類言非一也牝馬行地猶六龍御天程正叔曰乾健為馬坤亦健乎曰非坤何以配乾未有乾行而坤止也君子攸行此下以人事贊坤之彖經以君子有攸往屬下文贊欲便聲韻遂以君子攸行屬上文言君子之所行者柔順之貞也先迷失道後順得常郭子和曰乾健坤順道之常也故先乾而行則迷而失坤之常道後乾而行則順而得坤之常道也西南得朋乃與類行東北喪朋乃終有慶西南與巽離兌行坤類也東北坎艮震則乾之類而喪坤之朋矣乃終有慶者六五配乎乾之九五凡有慶者皆君臣相得之辭李去非曰坤隂生于午至申而內卦成所與行者皆陰類也而失配於陽至于亥六爻成矣而乾居之得其配也故有慶亦通安貞之吉應地無疆言悠久無疆也正義曰無疆有二義一則廣博無疆二則悠久無疆也毛伯玉曰以乾統天則天有所宗以坤應地則地有所資陰陽斡旋天地非天地能斡旋陰陽也屯剛柔始交而難生動乎險中大亨貞屯志卦名剛柔始交而難生以卦變明卦義難去聲剛柔爻之德九六爻之象也乾剛坤柔皆純體不雜至是乾始交坤而為震坎在上為難謂難於生以生物為難也石守道曰始交者前未交也毛伯玉曰屯者其生甚難俗謂乳字為難月然則難生者生未生之間也已生則為解矣李氏曰乾坤之後一索得震而始交再索得坎而難生張舜元曰物生向上其象震也坎為大冬寒氣之所凝蟠屈地下而未逹此其所以為屯而謂之難生也一説二陽在下純體之卦當上坤下兌今兌二之九上交於坤成坎坤五之六下交於兌成震動而遇險是以難生動乎險中大亨貞以卦性明卦象震動於坎險之中所以濟屯大謂震之一陽亨於九五之貞乃所謂利也劉長民曰險難在前不動何由可濟李去非曰非大披刔則治之良難故曰大亨正雷雨之動滿盈天造草昧宜建侯而不寧以卦象明占震雷坎雨而震又動滿盈而未解天之造草亂冥昧不可往也往則遇雨或迷道故戒以勿用當此之時但宜封建諸侯而不敢安寧也屯有盈義利有宜義不寧乃動乎險中之象草亂而未齊昧晦而未明毛伯玉曰天造草昧即生民之初也蒙山下有險險而止蒙蒙亨以亨行時中也匪我求童蒙童蒙求我志應也蒙志卦山下有險險而止蒙以卦象卦性明卦義艮山之下有坎險焉遇險而止莫知所之蒙之象也艮止也蒙亨以亨行時中也此象全主九二下皆同言蒙之所以亨者以亨道行也所謂亨道時中也學記當其可之謂時九二陽明其於羣隂之蒙時而發之無過不及是以亨也再言蒙者以蒙自有亨義嫌上一蒙字為志卦故復言之卜子夏曰決而當於時適於中道乃行也張子厚曰但觀蒙者時之所及則道之乃亨行時也又曰時中之義甚大必觀其會通以行其典禮行其典禮而不逹會通則非時中矣朱子發曰蒙者屯之反蒙有屯塞之義九二引而逹之九本在五反而居二以亨行也蓋二陽在上而五之九乃來居二爾李季辨曰蒙而亨善端之發也就其發處推之無非時中之道也劉長民曰時中謂訓不失時也過稚則性未成過長則扞格不入匪我求童蒙童蒙求我志應也九二為內卦之主而能發蒙六五應之楊廷秀曰求者有志則教者必應應字韻未詳云初筮告以剛中也再三黷黷則不告黷蒙也蒙以養正聖功也初筮告以剛中也以剛明發蒙而得中道故筮之則告再三黷黷則不告黷蒙也明黷義筮至再三而一一告之適所以黷亂蒙者爾蒙以養正聖功也獨此主上九經以治蒙與蒙者皆利於貞為義而贊發此新意言蒙而未發天理之正固在於此乎養之乃作聖之功也程正叔曰以純一未發之蒙而養其正乃作聖之功也發而後禁則扞格而不勝矣耿氏曰書聖時風若又曰蒙恆風若聖者蒙之反也需須也險在前也剛健而不陷其義不困窮矣需有孚光亨貞吉位乎天位以正中也利涉大川往有功也需志卦須也險在前也以內卦乾明卦義須待也坎險在前故有待而後進剛健而不陷其義不困窮矣需有孚光亨又以乾明卦象三陽有需于九五蓋同德也坎陷陽則義當困窮三陽剛健則九五不陷義不困窮而光亨也貞吉位乎天位以正中也以九五明卦占利涉大川往有功也又以卦變明卦占四陽在下卦為大壯今四之九往五則上卦成坎故為需然得天位則三陽以類而進雖大事必濟蓋聖人之大寶曰位位乎天位以正中則剛健而不陷矣義與上文意相屬也司馬君實曰需者何待時而行之謂孚者何見信於人之謂夫信者已之所為孚者待人而後成故需之道利安而不利躁修己以待人者也非信義著明道德光大則不能以亨也居正待時然後吉也用邪求益宜其凶也需以涉難難可濟也躁以涉川沈可必也訟上剛下險險而健訟訟有孚窒惕中吉剛來而得中也終凶訟不可成也利見大人尚中正也不利涉大川入于淵也訟志卦上剛下險險而健訟訟有孚窒惕以卦才卦性明卦義凡説見輯傳者不復出後並倣此中吉剛來而得中也以九二明占九自三來二得中為成卦之主故其占如此終凶訟不可成也又以上九明占利見大人尚中正也又主二而以九五明占不利涉大川入于淵也又主上卦乾以明占淵謂坎水之深師衆也貞正也能以衆正可以王矣剛中而應行險而順以此毒天下而民從之吉又何咎矣師志卦衆也貞正也能以衆正可以王矣以九二一陽統五陰明卦義并象王去聲謂大人也朱子發曰周官自五人為伍積之至於二千五百人為師衆之義也剛中而應行險而順以此毒天下而民從之又何咎矣以九二與卦性明占李仲永曰九二以剛居中而上下應之王介甫曰藥石之攻疾者謂之毒王景孟曰殺戮之慘供億之苦勞民而費財所以毒天下也張舜元曰坎為毒噬嗑遇毒亦坎象李季辨曰聖人之兵以順動然猶曰毒天下此聖人特筆以示戒比吉也比輔也下順從也原筮元永貞無咎以剛中也不寧方來上下應也後夫凶其道窮也比志卦吉也比輔也下順從也以九五明卦義并占比吉也言比有吉義比輔也釋卦名義下順從也釋吉占程正叔曰親輔也林黃中曰輔當為傅今附傳寫之訛李氏曰比之所以吉者以下相比輔而順從也郭子和曰天下之吉生於順凶生於逆竊謂不言上下而但言下以上為後夫凶也原筮元永貞無咎以剛中也以九五明元永貞之占不寧方來上下應也以五陰明占上下定體後夫凶其道窮也又以上六明占易凡上下位為窮極之義郭子和曰易之道窮則變不知變則失易之道故乾有窮之災坤則其道窮况後夫乎聖人於道窮之際每致意焉者明易之道初無窮人自失之也小畜柔得位而上下應之曰小畜健而巽剛中而志行乃亨密雲不雨尚往也自我西郊施未行也小畜志卦柔得位而上下應之曰小畜以六四明卦義健而巽剛中而志行乃亨以卦體二五明卦象乾健而巽不逆君臣皆以剛德得中而其志得行雖小為所畜而必亨也密雲不雨尚往也自我西郊施未行也密雲不雨尚往也以乾健明占陽往則陰從而雨矣故以往為尚尚上之也乾健必往自我西郊施未行也又以施未行明占施去聲謂兩施履柔履剛也説而應乎乾是以履虎尾不嘻人亨剛中正履帝位而不疚光明也履志卦柔履剛也以卦材明象兌陰柔乾陽剛也説而應乎乾是以履虎尾不嘻人亨以卦性明占説今悅古止用兌學記説命作兌是也後凡兌卦之象同兌説而應乾言二體相應非云三應上九也剛中正履帝位而不疚光明也説雖主兌而兌實主三此又以九五為一卦之主而覆釋之三以柔説而履乾之後故不傷而亨若乃五以剛中正而履乾之帝位則不疚其光明不嘻人者不疚之象亨者光明之象也疚計又反病也泰小往大來吉亨則是天地交而萬物通也上下交而其志同也內陽而外陰內健而外順內君子而外小人君子道長小人道消也泰志卦小往大來吉亨則是天地交而萬物通也上下交而其志同也以二體釋卦義上下定體否同天氣下降地氣上騰萬物於是出乎震是其通也乾為君上坤為臣下下者上上者下是其交也不曰君臣而曰上下者天子諸侯卿大夫士庶皆有上下之分否言天下無邦可見矣內陽而外陰言卦氣內健而外順言卦德李氏曰以人事言之在內者健以建立在外者順以聽從內君子而外小人言人事此贊以上下之位明卦義以內外之位明往來以陰陽健順君子小人明小大之象郭子和曰內陽而外陰天地之道泰也內健而外順乾坤之道泰也內君子而外小人國家之道泰也君子道長小人道消也以陰陽升降明占乾勢上進故長坤勢下復故消長丁丈反長如長日加長而不自知消如火消膏而不自覺泰否之贊歸宿在君子小人之消長故曰易以天道明人事袁氏曰夬言小人道憂何也曰小人道消未知所憂也自三陽充而為五陽小人之危甚矣能無憂乎否之匪人不利君子貞大往小來則是天地不交而萬物不通也上下不交而天下無邦也內陰而外陽內柔而外剛內小人而外君子小人道長君子道消也否之匪人就象志卦不利君子貞大往小來則是天地不交而萬物不通也上下不交而天下無邦也以二體釋卦義無邦釋匪人之象邦悲江反天地不交乃閉塞成冬之時上下不交則王國令不行於諸侯諸侯不上交于天子言諸侯非其人也朱子發曰坤在上為邦在下為邑故象無邦內陰而外陽內柔而外剛內小人而外君子以卦氣卦材人事釋大往小來之占不言健順而言剛柔者君子在外不可言健健天德也小人道長君子道消也釋不利君子貞之占彖在大往小來之上而此倒之者對泰而言也李氏曰否泰反其類故否之辭反乎泰厚齋易學卷三十三
