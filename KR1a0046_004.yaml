body:
  text: 厚齋易學卷四宋馮椅撰易輯注第四經下篇萃至未濟坤下兑上下坤為地上兌為澤澤上於地有所容蓄而衆澤所聚故坤下兌上成卦曰萃萃亨王假有廟利見大人亨利貞用大牲吉利有攸往萃在季反聚集也亨衍王假有廟象假音義同家人九五舊讀格聲其義不通廟宗廟也利見大人亨占利貞象用大牲吉利有攸往占再言象占占屬於象也初六有孚不終乃亂乃萃若號一握為笑勿恤往無咎初六有孚不終始信終疑之象乃亂乃萃占都氏曰乃者繼事之辭又訓爾乃亂者繼也乃萃者爾也若號一握為笑始睽而終聚合之象號平聲言若人號泣一握手相遇則變號為笑矣勿恤往無咎占六二引吉無咎孚乃利用禴六二引吉無咎占牽引同體三隂以聚正應之五也孚乃利用禴相信而簡其禮以享之之象禴羊略反宗廟之薄祭也或作躍爚非此爻先占後象亦為祭祀之吉占六三萃如嗟如無攸利往無咎小吝六三萃如嗟如衆聚而已獨不安之象衆隂皆聚而已獨嗟嘆不安也無攸利往無咎小吝占聚四則嗟而無所利往五則無咎應上六則吝隂為小也九四大吉無咎九四大吉無咎象在占中義見輯傳九五萃有位無咎匪孚元永貞悔亡九五萃有位據尊位以聚人之象無咎占匪孚天下有不盡信之象元永貞悔亡占上六齎咨涕洟無咎上六齎咨涕洟聚極而散窮無所歸之象齎將啼反咨聲資嗟嘆也齎或將他反咨或去聲非自目出曰涕鼻出曰洟悲泣也洟或他麗反無咎占巽下坤上自萃而變則坤自下而升又巽木生於坤地之下長而升上故巽下坤上成卦曰升升元亨用見大人勿恤南征吉升今升自下而上之名元亨象用見大人勿恤南征吉占毛氏曰用見則用此道以見也初六允升大吉初六允升合衆論以升之象允如衆允之允篆文大吉占九二孚乃利用禴無咎九二孚乃利用禴象同萃無咎占九三升虛邑九三升虛邑以象占虛今墟六四王用亨于岐山吉無咎六四王用亨于岐山王者通于西方不庭之國之象亨或許兩反古雖通然如後世封禪之事恐非也岐山禹貢雍州境南王指六五或古有是事因以為象故直指岐吉無咎占六五貞吉升階六五貞吉占升階以賔禮接臣下之象厯階而升所以進賔也上六冥升利于不息之貞上六冥升窮亢極逺之象冥晦也望之不見也猶言青冥杳冥也利于不息之貞占升極則困困則息矣不息之貞猶天之行健在人則進德不息故利也坎下兌上兌為澤而坎水在下是澤無水困竭之象故坎下兌上成卦曰困困亨貞大人吉無咎有言不信亨貞象大人吉無咎有言不信占困有亨之理以守正道也有大人之德則吉而免顛連之咎矣若有言以求説則無能信之者初六臀困于株木入于幽谷三嵗不覿初六臀困于株木在下而困于剛陷之象株木之堅豈臀之所可坐者入于幽谷三嵗不覿占朝徐云多幽字於文義無妨覿大厯反私見曰覿不敢正視之意九二困于酒食朱紱方來利用亨祀征凶無咎九二困于酒食困無所飬之象酒食人君所以養賢困則無所須之朱紱方來利用亨祀征凶無咎占紱聲弗蔽膝也朱色者人君之服人主有下逮之象君下逮則必有下逮之賜宜用以亨廟祀神若不待君命之來而往以求之則凶而無所歸咎矣六三困于石據于蒺藜入于其宫不見其妻凶六三困于石據于蒺藜進退皆有傷閡之象前閡石後傷于蒺藜也蒺聲疾藜聲黎刺剛傷人之木入于其宫不見其妻凶占筮者當有喪配偶之占九四來徐徐困于金車吝有終九四來徐徐困于金車所應遲疑有閡之象徐徐遲緩也車今輿吝有終占九五劓刖困于赤紱乃徐有説利用祭祀九五劓刖除去上下掩蔽阻礙之象劓音義同睽六三刖五刮反又聲月劓鼻刑刖足刑也荀作臲卼鄭云當為倪㐳京作鼻劊恐非困于赤紱乃徐有説利用祭祀占赤紱諸侯朝王助祭所服困則諸侯不行此禮之象説今悅乃徐有來行此禮者君臣相得而説故利用祭祀也祭一作享上六困于葛藟于臲卼曰動悔有悔征吉上六困于葛藟于臲卼纒綿不安之象藟一作虆臲卼不安也臲五結反説文作劓卼五骨反説文作􅝨曰動悔有悔征吉占巽下坎上巽木入于坎泉之下有汲井之象故巽下坎上成卦曰井井改邑不改井無喪無得往來井井汔至亦未繘井羸其缶凶井冗地出水泉而汲之者也黃帝穿井世本以為益恐古已有之井已畫於包犧矣改邑不改井象邑不必國都凡人之所聚者即是古者八家為井四井為邑蓋八家同一井之田而四井之民家聚于一邑依之而居者也無喪無得往來井井占邑雖改而井不喪井不改而井無得邑改而往彼亦有井人來而居此亦有井朱子曰往來皆井其井亦通汔至亦未繘井羸其缶凶又占汔許訖其乞二反幾近也繘聲橘關西謂綆為繘汲水索也羸音義同大壯九三蜀才作纍鄭讀虆省纍缶白經反汲水器文從缶瓦器也或謂古無桶故不取巽木為象然韓信以木罌缶渡師如樽罍古皆用木疑古以木為瓶從缶則亦有瓦為之者此象巽木無疑謂瓶汲而上幾至井口而罥罣其瓶而覆之亦是未繘井也李季辨林黃中毛伯玉皆曰木上有水轆轤桔橰之象初六井泥不食舊井無禽初六井泥不食舊井無禽井穢滓而不汲之象又為廢棄而無所獲之象皆以象占泥去聲禽今擒與田有禽同義九二井谷射鮒雍敝漏九二井谷射鮒雍敝漏井不上出而注下之象谷聲欲水之旁出之名非溪谷之谷射食亦反鮒聲附或謂蝦蟆或謂鰌鮒或謂蛙屬或謂蝸牛或謂䗂蝓或謂陵螺字書作蚹程可久曰廢井汚渠中多有之合諸説類觀之則䗂蝓近之雍古文今從瓦俗字貯水器敝婢世反壞也此爻有此二象九三井泄不食為我心惻可用汲王明並受其福九三井泄不食井治而未有汲之之象泄息列食烈二反淘井曰泄浚治也為我心惻可用汲王明並受其福占為去聲我指本爻為其惻然者過之者也惻痛傷也泄則可用以汲而食之矣汲而食之則不唯邑居者雖王者之明亦與下民同受其養人之福此爻辭韻叶福聲逼六四井甃無咎六四井甃修整其井之象九五井洌寒泉食九五井洌寒泉食井潔而泉上出之象洌潔清也以象占上六井收勿冪有孚元吉上六井收勿冪井功成而不可私之象收去聲凡物之收成者謂之收故農事至秋亦曰農收冪亡狄反以巾覆物也古坰今作幕傳訛也或曰收謂鹿盧收繘有孚元吉占與九三有應九五相比皆有孚之象元吉指二陽爻之應比者為象離下兌上上兌之澤下濕下離之火上炎必相息滅為更革之象故離下兌上成卦曰革革已日乃孚元亨利貞悔亡革改變也已日乃孚元亨利貞悔亡占在象之前後則以象占也已為十干之名今誤作已朱子發正之六二同卦以更為義取庚日至已旬日矣故人情乃孚其革而大亨者利在於正而其悔乃亡蓋革易有悔也初九鞏用黃牛之革初九鞏用黃牛之革固執中順之道而不變之象以象占鞏九勇反以皮鞏物而固者也革者去毛之皮黃牛之皮取其堅韌程可久曰鞏與執皆固也執之者為物所固鞏則自固而已此與遁之六二剛柔之德異也六二已日乃革之征吉無咎六二已日乃革之待人情已孚而後變之象已日浹日也奉命浹日而革其所革者征吉無咎占九三征凶貞厲革言三就有孚九三征凶貞厲革言三就有孚象在占中往上則凶守貞亦厲惟上之人以變革之言三來相就斯有孚矣言議也就議如欲有謀焉則就之之就九四悔亡有孚改命吉九四悔亡有孚改命吉象在占中悔已亡矣能有孚則可以改命獲吉改代革也近君位三四有孚皆孚于君九五大人虎變未占有孚九五大人虎變湯武革命即位之象虎言其威武變言其為大君也未占有孚占凡大事必假卜筮然後占其吉凶今未占而已有孚也上六君子豹變小人革面征凶居貞吉上六君子豹變其臣皆依乘變化之象君子所與共功之人如伊呂之儔也豹虎屬小人革面其民皆一新觀瞻之象聖人作而萬物覩也征凶居貞吉占事變已定不可復往唯用靜吉巽下離上合二體六畫有全鼎之象又以巽木然離火亦有烹飪之象故巽下離上成卦曰鼎鼎元吉亨鼎丁冷反器也元吉亨象在占中元吉而亨程正叔曰吉衍文贊止云元亨程可久曰據象意宜有吉字贊文闕初六鼎顛止利出否得妾以其子無咎初六鼎顛止利出否去故納新之象止今趾顛倒也出尺遂反否者臧之反鼎實之不美者也得妾以其子無咎占因有子而得為妾也九二鼎有實我仇有疾不我能即吉九二鼎有實以陽實在中之象我仇有疾不我能即吉占仇聲求匹也如君子好仇之仇不必曰怨耦也疾自外疾之也即就也九三鼎耳革其行塞雉膏不食方雨虧悔終吉九三鼎耳革鼎不能舉之象革言換鑄耳也鼎舉以耳耳革則不能舉其行塞雉膏不食方雨虧悔終吉占塞悉則反不通也膏鼎實之甘肥者雉升鼎不能食以鼎未舉而沸慹也方欲雨而虧則不成雨猶雉登鼎而不得食也能悔之則終必吉方者方欲而未必然之辭九四鼎折足覆公餗其刑剭凶九四鼎折足覆公餗不勝其任之象折之舌反覆傾覆也公公家也餗送鹿反鼎實也或曰八珍之具或曰饘或曰糝皆無所據足折則餗覆矣其刑剭占刑舊作形今從九家京虞荀恱剭聲屋重刑也舊作渥或握京謂刑在頄為剭從九家京鄭一行陸希聲此爻聲韻叶舊有凶字衍文程正叔曰既曰其刑剭則凶可知矣此猶其人天且劓之辭六五鼎黃耳金鉉利貞六五鼎黃耳金鉉可舉而行之象鉉玄典反又苦玄古冥二反所以貫鼎耳而舉之者也利貞占上九鼎玉鉉大吉無不利上九鼎玉鉉功成可貴之象玉言可貴也大吉無不利占震下震上一陽奮動於重隂之下其象為靁其卦為震振動也正義曰象雷之卦天威震動故以為名震亨震來虩虩笑言啞啞震驚百里不喪匕鬯震之刃切亨象振動則通震來虩虩笑言啞啞震驚百里不喪匕鬯占虩虩許逆反陸希聲曰蠅虎也始在穴中跳躍而出象人心恐懼也再言之者不一而足也荀作訴訴啞烏客反趙曰笑而不敢出聲之貌喪去聲匕必以反形似畢但不兩岐耳以棘木為之取赤心之義長三尺刋柄與末祭祀之禮先烹牢於鑊納諸鼎而加冪焉將薦乃舉冪而以匕出之升于爼上鬯敕亮反香草也以為酒其氣調暢故曰鬯以灌地而降神王度記天子鬯諸侯薰大夫蘭初九震來虩虩後笑言啞啞吉初九震來虩虩震而不安之象後笑言啞啞吉占後上聲六二震來厲億喪貝躋于九陵勿逐七日得六二震來厲震驚而憂危之象億喪貝躋于九陵勿逐七日得占億解不一唯六五贊曰大無喪也以大訓億蓋萬萬曰億乃大之義喪去聲貝資貨也荀聲敗躋子西反一作隮升也九陵言九層之陵最髙處也六三震蘇蘇震行無眚六三震蘇蘇逺於震驚而神氣復還之象死而復生曰蘇程可久曰神氣之復為蘇蘇言蘇而復蘇也震行無眚占眚災也九四震遂泥震動而不能大有所振驚之象亦為不能上進之象以象占泥去聲滯也遂一作隊泥或平聲非聲叶六五六五震往來厲億無喪有事六五震往來厲可進而不可退之象震往則聲微來則聲厲億無喪有事占大無喪失但不能無所事上六震索索視矍矍征凶震不于其躬于其鄰無咎昏冓有言上六震索索視矍矍震驚之極而神散目動之象索索桑落反李氏曰散而不收也林黃中曰氣不充也視上去二聲皆通矍俱縳許縳二反蘭曰目之懼也李氏元逹曰如貜之顧有遽而不寧之意征凶震不于其躬于其鄰無咎昏冓有言占往則有凶居則震其鄰而不及其身無咎也但昏冓有言爾為鄰里親戚不和之占艮下艮上一陽進極於上而止又二隂上進而一陽止之皆為艮止之象象為山如山之安靜而不移也故其卦為艮艮艮其背不獲其身行其庭不見其人無咎艮止也志卦舊脫今補之贊亦先釋卦復出艮其背艮其背不獲其身行其庭不見其人無物我之私之象庭説見爻無咎占初六艮其止無咎利永貞初六艮其止止於未行之初之象止今趾無咎利永貞占六二艮其腓不承其隨其心不快六二艮其腓隨人而止之象腓隨股以動者也不承其隨其心不快占承詳見明夷承馬九三艮其限列其夤厲熏心九三艮其限列其夤上下左右間隔之象限腰也言上下於此分也列今裂夤今􅘡夷真反夾脊肉也或作䏖㣧腎非上下之分止而不通左右之間分而不合其象如此厲熏心占熏焚蒸也俗作薰轉作勳或作閽或作動皆非六四艮其身無咎六四艮其身不與物交之象無咎占六五艮其輔言有序悔亡六五艮其輔謹言語不出諸口之象言有序悔亡占言中節有次序而不亂也上九敦艮吉上九敦艮止於人上而重厚之象吉占艮下巽上乾之九四來三成艮而坤之六三往四成巽有漸進之象又巽木之在艮山亦漸進以髙故艮下巽上成卦曰漸漸女歸吉利貞漸捷儉反以之前為義進不越次也楊子雲有水漸木漸鴻漸之説蓋法乎此女歸吉占利貞象先占後象象寄占中女歸亦象也婦人謂嫁曰歸謂女歸所利也初六鴻漸于干小子厲有言無咎初六鴻漸于干自下而漸進之象鴻水鳥干水崖互體坎也鴻飛而進有漸小子厲有言無咎占小子憂厲小有違言不為害六二鴻漸于般飲食衎衎吉六二鴻漸于般進而就安之象般今磐見漢郊祀志畔干反水涯石堆之安平者也飲食衎衎吉占飲去聲食入聲衎衎苦旦反和樂意初與二聲叶九三鴻漸于陸夫征不復婦孕不育凶利御冦九三鴻漸于陸自下而漸髙之象馬云山上髙平曰陸此謂艮山之髙處也夫征不復婦孕不育凶利御冦占征行也復方六反還也孕古乘以證反懷妊而漸以成體也夫征而不復婦孕而不育御今禦六四鴻漸于木或得其桷無咎六四鴻漸于木離下而進上之象木在山上也或得其桷無咎占或者不必然之辭桷古聲谷柯之平衡如榱者也三與四亦聲叶九五鴻漸于陵婦三嵗不孕終莫之勝吉九五鴻漸于陵進而愈髙之象陵髙阜也婦三嵗不孕終莫之勝吉占勝平聲猶言終無奈何也謂九三閡阻六二正應如此終以三嵗之久上九鴻漸于逵其羽可用為儀吉上九鴻漸于逵超出物表之象逵舊作陸胡翼之程正叔讀渠龜反雲路也王輔嗣亦解為雲路之義朱子曰以韻讀之良是蓋此六爻皆叶其羽可用為儀吉占羽古上聲儀古聲訛然則逵亦當叶兌下震上上卦本坤下卦本乾坤之六外自四來內之三乾之九自三之四上成震長兄也下成兌乃震之妹也妹自外歸內嫁夫也故兌下震上成卦曰歸妹歸妹征凶無攸利歸妹歸嫁也妹女弟之稱言兄嫁之也征凶無攸利象在占中初九歸妹以娣跛能履征吉初九歸妹以娣妹之卑下而賤者娣象也六三同娣大計反同姓庶女從嫡而歸人所謂媵也男以女弟為妹女以女弟為娣故文從女從弟以左右之也江有沱詩曰不我以與此以娣同義跛能履不以正行事之象征吉占九二眇能視利幽人之貞九二眇能視不蔽于外而可見之象利幽人之貞占幽人謂靜女也六三歸妹以須反歸以娣六三歸妹以須反歸以娣象在占中須待也或作嬬或嫥謂星之須女賤妾之象於義不通或云與賁六二同象反平聲九四歸妹愆期遲歸有時九四歸妹愆期遲歸有時象在占中愆起虔反過也遲去聲待也猶今人言待次曰遲次自初至五聲皆叶六五帝乙歸妹其君之袂不如其娣之袂良月幾望吉六五帝乙歸妹其君之袂不如其娣之袂良禮文從儉之象帝乙見泰六五袂彌蔽反衣袖也良善也月幾望吉占幾望見小畜上九上六女承匡無實士刲羊無血無攸利上六女承匡無實士刲羊無血男女皆無以為婚姻之禮之象匡俗轉注作筐未嫁曰女未娶曰士刲苦圭反刺也無攸利占以匡羊叶六五良聲離下震上離火炎上而震動有赫奕盛明之象故離下震上成卦曰豐豐亨王假之勿憂宜日中豐芳中反盛大充盈之名説文草丰丰也爾雅苞蕪茂豐也豐之義生於丰亦為粢食豐潔之豐故文從丰丰而以豆盛之山盛之之象也亨象王假之勿憂宜日中占假古雅反大也謂至者非蓋豐之亨者王者實大之也勿憂其廣大而不能照臨宜如日之中則不遺微小矣初九遇其配主唯旬無咎往有尚初九遇其配主在下而得大臣之象配謂六二配九五之主也主猶孔子主癰疽之主非應而相比故曰遇唯旬無咎往有尚占唯舊作雖十日之謂旬謂天有十日其行均遍也尚猶坎行有尚之尚六二豐其蔀日中見斗往得疑疾有孚發若吉豐其蔀掩蔽其明之象蔀普苟反茅草掩蔽周匝以障明者也歷法有蔀亦取甲子周匝之義日中見斗不見有君而見有臣之象斗或作主鼂曰主古文極君也斗大臣也往得疑疾有孚發若吉占君疑臣疾唯有孚以啓發君志則吉若語辭九三豐其沛日中見沫折其右肱無咎九三豐其沛日中見沫蔽甚而愈暗之象沛或作斾芾未詳折其右肱無咎占九四豐其蔀日中見斗遇其夷主吉九四豐其蔀日中見斗遇其夷主吉占夷平易也主指六五六五來章有慶譽吉六五來章下求賢明之臣而共治之象章説見坤遘有慶譽吉占譽去聲上六豐其屋蔀其家窺其户闃其無人三嵗不覿凶上六豐其屋蔀其家外髙明而內卑暗之象豐大也説文作寷以為大屋非卦義蔀掩蔽家謂屋下也窺其户闃其無人三嵗不覿凶占窺謂傾門中視也艮下離上下卦本坤六自三往五為離是去乎內而麗乎外也九自五來三成艮是止乎下也麗乎外而有所止有羈旅客寄之象故艮下離上成卦曰旅旅小亨貞吉旅商賈之總名又客寄之名小亨象旅無大通之事貞吉占舊復出卦名衍也大抵此卦錯簡極多九四承二有懷其資之文遂以齊斧作資斧又以喪為得至於彖象之贊彖復出小亨字又亦重此旅字九三亦作得其資斧王輔嗣諸卦之錯誤未有如此卦之多者也初六旅瑣瑣斯其所取災初六旅瑣瑣負其寶貨於道而有聲之象瑣損果反玉聲也瑣瑣聲相續也或作璅或謂細小之貌非斯其所取災占如此不可掩則災乃其自取也災禍也斯郭京作厮役之厮非六二旅即次懷其資得童僕貞六二旅即次得其所止之象即就次舍也懷其資得童僕貞占懷猶懷其寶之懷資物貨童或曰古僮通未冠者僕給事也九三旅焚其次喪其童僕貞厲九三旅焚其次毁其所止之象喪其童僕貞厲占喪去聲下並同去也亡也九四旅于處喪其齊斧我心不快九四旅于處得所暫安之象處上聲喪其齊斧我心不快占喪舊作得緣童僕得喪字相混故以喪為得於下文意不相蒙漢王葬遣王尋屯洛陽將發亡其黃鉞其士房楊曰此經所謂喪其齊斧者也當以此為證齊應劭云利也舊作資亦沿六二懷其資相亂子夏諸家並作齊今從之讀當如齊衰之齊音同故相亂也六五射雉一矢亡終以譽命六五射雉一矢亡所求有獲而所喪者小之象射食亦反亡喪失也終以譽命占譽平聲名稱也命上命也上九鳥焚其巢旅人先笑後號咷喪牛于易凶上九鳥焚其巢過髙而自毁之象旅人先笑後號咷喪牛于易凶占號咷義見同人易去聲謂平野也易野車為主之易旅人言同旅之人也巽下巽上一隂入伏於二陽之下其卦曰巽其象為風再筮得之其名不易巽小亨利有攸往利見大人巽孫問反古顨俗巽委曲而有所入象風之行也小亨象主二隂而言利有攸往利見大人占初六進退利武人之貞初六進退卑巽之過無果決之象利武人之貞占有勇決而不失其正九二巽在牀下用史巫紛若吉無咎九二巽在牀下卑以自下之象用史巫紛若吉無咎占正義史巫謂祝史巫覡紛若盛多之貌九三頻巽吝九三頻巽所遇皆巽之象頻音瀕詳見復六三吝占六四悔亡田獲三品六四悔亡田獲三品象在占中田音畋三品詳見上九五貞吉悔亡無不利無初有終先庚三日後庚三日吉九五貞吉悔亡無不利無初有終先庚三日後庚三日吉象在占中先後庚三日音義同蠱上九巽在牀下喪其齊斧貞凶上九巽在牀下窮髙而反下之象喪其齊斧貞凶占齊斧音義見旅兊下兊上一隂見於二陽之外隂陽相説其象為澤坎下耦變竒有水不下流之象澤能説潤萬物故其卦為兊再筮得之其名不易兊亨利貞兊徒外反説也亨利貞以象占初九和兑吉初九和兊相與無間以説之象吉占九二孚兊吉悔亡九二孚兊相與以信而相説之象吉悔亡占六三來兊凶六三來兊就人以求説之象九四商兊未寧介疾有喜九四商兊未寧內外和説而有間之象商説文從外知內介疾有喜占介猶鱗介之介限也未寧者以有疾之者也能限之則有喜喜者君臣相得之辭九五孚于剝有厲九五孚於剝信近小人之象剝言柔變剛也上六引兊上六引兊相率以和説之象占引牽引也坎下巽上巽以卑順出乎坎險為蹇難渙散之象故坎下巽上成卦曰渙渙亨王假有廟利涉大川利貞渙聲喚釋也散也離也亨象王假有廟利涉大川利貞占假音義見萃初六用承馬壯吉初六用承馬壯初能剛健以出險之象承音義同明夷六二九二渙奔其杌悔亡九二渙奔其杌急歸其所以休息之象奔去聲急往也其所也杌聲兀木也悔亡占六三渙其躬無悔六三渙其躬自脫其身於險之象無悔占六四渙其羣元吉渙有丘匪夷所思六四渙其羣棄舊而得所依之象元吉占渙有丘散而復聚之象丘聚也匪夷所思占夷等夷也猶豐四夷主之夷言非其等夷所得思也此爻再言象占九五渙汗其大號渙王居無咎九五渙汗其大號渙王居無咎象在占中渙然發其大號令如汗之周遍一身皆通又以王者所居積之物而散之天下居如居貨與懋遷有無化居之居同非王者之居也渙散也王者之居不可言渙上九渙其血去惕出無咎上九渙其血去以其有傷而散去之象血傷也惕出無咎占音義同小畜六四惕舊作逖從朱子發朱子兊下坎上兊澤坎水澤上之水也節則容受有量而無泛濫之患又坤之柔來節乾之剛而乾剛亦往節坤之柔故兊下坎上成卦曰節節亨苦節不可貞節分假支節之義亨象天下之事有節則必通苦節不可貞占苦過也如味之苦人情所不堪故不可固守初九不出户庭無咎初九不出户庭未通其節而行之象説文户護也半門為户户今房門庭今堂前也無咎占九二不出門庭凶九二不出門庭時可而猶過於節之象雙扉曰門户內門外也門今堂門庭猶今廳前接物之所也凶占六三不節若則嗟若無咎六三不節若則嗟若當節而不可失之象若語辭當節而不節則後悔無及徒有嗟歎之而已矣無咎占六四安節亨六四安節人情相安於所節之象亨占九五甘節吉往有尚九五甘節人情説從於所節之象甘甘之也如其甘如薺之甘吉往有尚占往上也尚為配上六苦節貞凶悔亡上六苦節人情厭苦於所節之象苦苦之也貞凶悔亡占言固執而不變則凶知悔則吉而凶亡矣兊下巽上中孚豚魚吉利涉大川利貞説文孚字從爪從子此羽族卵化以爪覆子抱卵也孚者卵育而化也古蓋以卵為孚在人則性由中而發於外而人化之者也孚者彼此相信猶隂陽相資以孚也初九虞吉有它不燕九二鳴鶴在隂其子和之我有好爵吾與爾靡之離為飛鳥正南之卦其宿象爵中孚疊象離故以中虛取鳥字之義其極則聲聞于天之象也中虛則響逺故有鳴和翰音之象爵今人制字為雀古止以爵為文爵如爵祿之爵正猶燕安之燕履之為禮噬嗑之為市合之朋比也好爵猶今言美官六三得敵或鼓或罷或泣或歌六四月幾望馬匹亡無咎九五有孚攣如無咎上九翰音登于天貞凶艮下震上二陽居中而四隂在外隂過於陽隂為小故艮下震上成卦曰小過小過亨利貞可小事不可大事飛鳥遺之音不宜上宜下大吉可小事不可大事吉主隂過而言飛鳥遺之音象不宜上宜下大吉占上下定體主飛鳥而言此卦再言象各有占初六飛鳥以凶初六飛鳥以凶陵躐而上進之象乃為凶道占寄象中六二過其祖遇其妣不及其君遇其臣無咎六二過其祖遇其妣不及其君遇其臣以中道而有所遇之象在過與不及之間得中道也妣祖之配也無咎占九三弗過防之從或戕之凶九三弗過防之自守而戒備外虞之象弗過越於隂小又當防備之弗不肯也從或戕之凶占戕在良反殘害也隂小不防之而從之則或有殘害我者春秋傳在內曰弒在外曰戕九四無咎弗過遇之往厲必戒勿用永貞九四無咎占弗過遇之自守而有所遇之象弗過越於隂小而乃相遇也遇如論語遇諸塗之遇往厲必戒勿用永貞占往而進則遇隂小而危必須戒備占之者不可用之爻但當永守貞固以待隂小之變戒以兵守備也孟子曰辭曰聞戒故為兵饋之一曰勿用永貞言不可固守也六五密雲不雨自我西郊公弋取彼在穴六五密雲不雨自我西郊隂倡而陽不和之象義同小畜公弋取彼在穴占公公家也猶詩獻豜于公之公弋餘職反射之也上六弗遇過之飛鳥離之凶是謂災眚上六弗遇過之飛鳥離之凶不遇其人而麗於過咎之象離去聲麗也如詩鴻則離之之離是謂災眚占釋凶義離下坎上離火下而坎水上隂陽相濟故成卦曰既濟既濟亨小利貞初吉終亂既濟既已也盡也濟涉川而登岸之名亨小利貞象郭子和曰小為衍文緣未濟亨下有小字誤著于此初吉終亂占初九曳其輪濡其尾無咎初九曳其輪濡其尾身濟險難之象曳集韻羊列反今拽力挽之也陸以制反誤濡沾濕也尾在後也無咎占六二婦喪其茀勿逐七日得六二婦喪其茀失其所蔽之象喪去聲亡也茀方拂反詩翟茀謂以翟為蔽車之飾也諸家或作佛紱謂馬茀與蔽膝也未詳勿逐七日得占九三髙宗伐鬼方三年克之小人勿用九三髙宗伐鬼方力制逺人不服之象髙宗有啇之君武丁也鬼方小國蒼頡篇鬼逺也三年克之小人勿用占克勝而獲之也言小人勿用此占六四繻有衣袽終日戒六四繻有衣袽不以新而忘舊之象繻古襦而朱反王鄭聲須繒采色也一曰裂帛為衣也袽女居反説文作袽亦作絮潔緼也一曰敝絮終日戒占九五東鄰殺牛不如西鄰之禴祭實受其福九五東鄰殺牛不如西鄰之禴祭實受其福禮貴其宜而不貴其厚之象以象占李子思曰東鄰西鄰猶言東家西家殺牛大牲重祭也夏祭曰禴祭之薄者贊曰不如西鄰之時也上六濡其首厲上六濡其首以身出險難之象厲占坎下離上離火炎上坎水潤下兩不相濟放成卦曰未濟未濟亨小狐汔濟濡其尾無攸利未濟猶涉川而未登岸也亨小狐汔濟濡其尾象狐獸名汔許訖反説文水涸也有幾盡之義故鄭云幾也與井汔至之汔同無攸利占初六濡其尾吝初六濡其尾身涉險難之象吝占九二曳其輪貞吉九二曳其輪極力以欲出險之象貞吉占六三未濟征凶不利涉大川六三未濟征凶不利涉大川險難未能有濟之象以象占舊無不字象理皆不通朱子曰當有今補之九四貞吉悔亡震用伐鬼方三年有賞于大國九四貞吉悔亡占用伐鬼方三年句有賞于大國克難而成功之象震言以威而動也伐鬼方三年承既濟之象有賞功成受賞也大國賞之重也賞之重者其功大也六五貞吉無悔君子之光有孚吉六五貞吉無悔占君子之光小人之道晦而難濟之象光其道光明也有孚吉占言人君有孚于君子故吉上九有孚于飲酒無咎濡其首有孚失是上九有孚于飲酒君臣不疑而相安于逸樂之象無咎占濡其首沉溺于逸樂之象此聯上文飲酒為象與既濟義異故贊曰飲酒濡首也有孚失是占義亦聯上文言有孚于飲酒而乃失于此也
