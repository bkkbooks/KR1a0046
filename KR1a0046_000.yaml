body:
  text: 厚齊易學易類提要臣等謹案厚齊易學五十卷宋馮椅撰椅字儀之一作竒之號厚齊南康都昌人宋史馮去非傳云父椅家居授徒所著易書詩語孟輯說等書共二百餘卷今多不傳惟所輯易說尚散見永樂大典中考胡一桂啓蒙翼傳引宋中興藝文志云寧宗時馮椅為易輯注輯傳外傳猶以程逈朱熹未及盡正孔傳名義乃改彖曰象曰為贊又以隋經籍志有說卦三篇改繫辭傳上下為說卦上中俞琰讀易舉要所說亦同今檢永樂大典所載但有輯注輯傳而無所謂外傳者與舊說殊不相合以椅自序核之當日蓋各為一書輯注止解彖象輯傳則尊彖象為經而退十翼為傳外傳則以十翼為經各附先儒之說而斷以已意永樂大典編纂不出一手割裂其文雜附於各卦爻下遂併外傳之名而沒之今反覆參校釐為輯注四卷輯傳二十八卷外傳十八卷仍分三書以還其舊輯注多用古文如坤卦黃裳之裳作常蒙卦瀆蒙之瀆作黷屯卦磐桓之磐作般邅如之邅作亶師卦大人作大人旅卦資斧作齊斧雖異今本而皆根舊義至如履否同人諸卦以為舊脫卦名宜補姤彖女壯勿用取下以為衍女字之類則椅之自抒所見者也輯傳各卦皆分卦序卦義彖義爻義象占諸目縷析條分至為詳悉其搜採亦頗博洽如王安石張弼張汝明李椿年李元量李舜臣閭丘昕毛朴馮時行蘭廷瑞諸家其全書今皆不傳尚藉是以存梗槩外傳薈稡羣言亦多所闡發其以繫詞為說卦宗吳仁傑之本董真卿周易㑹通駁之良是明楊時喬周易古今文乃以合於隋志取之斯好竒之過矣然合觀三書皆元元本本淹貫宏通要不以一二微瑕掩也啓蒙翼傳又云鄱陽汪標手編諸家易解為一巨集名經傳通解以椅易解為底本求古今解增入蓋宋元之際甚重其書今標書亦不傳則此書彌可寶貴矣董真卿胡一桂皆稱是書為易輯宋史藝文志作易學文獻通考則作厚齊易學考王湜先有易學宜有所别故今從通考之名焉乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀厚齊易學自序周易一經文王困於羑里即包犧氏所畫之卦立大衍之法推七八九六之數以生爻而繫之辭者也古有官占即畫觀象以事揆理而遂知休咎至夏商各為一書曰連山歸藏意每卦為之辭矣蓋間或略見於傳記也然庖犧氏畫八卦因而重之為六十有四以盡其變故連山歸藏之辭至六十又四而止文王則以所重之卦復衍其爻為三百八十又四乃别為辭以繫卦於以體其常創為辭以繫爻於以盡其變故定名曰易文王既沒周之子孫乃著其代以别夏商而曰周易然猶與連山歸藏並列於卜筮之官而謂之三易者蓋因周之易云爾其實夏商以前不謂之易也自孔子定六經止贊周易門人又述其緒言以為之傳而連山歸藏始廢易道始尊先漢以來儒家者流宗主孔氏遂以孔贊與周易並行以孔贊等篇為傳而改上下篇為上下經此其始變也後以孔贊參入經文自費直鄭康成倡之王輔嗣和之而世不復知有文王之易矣何也取信於孔子之贊而不復推究文王之本指一也孔子推明人事而象數之本言焉而不發至使後世屏棄之間知學此則又多穿鑿傅㑹以為之說二也甚至繫卦之辭為彖孔子題彖以推明之而今繫以彖曰而彖反為孔子之傳矣繫爻之辭為象孔子題象以推明之而今繫以象曰而象亦為孔子之傳矣孔門說卦三篇將以推明繫辭之指今題以繫辭上下而繫辭又為孔子之傳矣易之稱周或以為周匝庖犧之卦例以為易八卦之重以為文王六爻之辭以為周公凡一經之名義錯亂無一存者況文王之本指乎天開我宋聖道日明康節卲氏首定經傳之序吕氏微仲朝氏以道從而訂之近日吳斗南復是正之沙隨程可久晦菴朱文公先生皆以注解傳雖名義微有未盡當而文王之全經則天髙日白矣椅自束髮受易於先人蓋伯祖父以此經鳴於三舍豫數十年來博親師友搜攬衆說遂以文王之本文如王氏所傳乾卦之文為正而為之輯注訂其音切釋其文義辨其異同使讀者粲然識其大指不惑於支離然後輯孔子贊傳左氏占辭及諸儒之說撮其不悖於大義者釐為輯傳義有未備者傳以己意又於孔子之傳裒輯衆說别為一書庶不相亂俾萬世復見文王之全經孔子曰文王既沒文不在兹乎信哉伯祖父蓋黼其名宋嘉定十年丁丑嵗夏五月辛卯既望草堂馮椅序孔子之贊易止於彖爻蓋其成書也孔安國稱先君孔子贊易道以黜八索此書是已蓋述周文王之易而贊述其義聲韻相叶實贊體也孔子沒門人追述其平日講說問答之辭與夫所傳於古而記之有補於易者為之傳則文言說卦是已何以知之以其書有子曰有古語有占法而知之也至於序卦雜卦其猶孔子之遺書與不然何雜卦之聲韻與贊相似也史謂孔子晚而好易讀之韋編三絶而門人記其言有曰加我數年卒以學易可以無大過矣夫孔子之於羣經初不若是其綢繆也而獨於易焉見之何哉蓋昔者文王之作經也即庖犧所重之卦演而生爻以隂陽竒耦之數位畫雜居之象仰探造化旁稽物理近察人情自為類例字字有據然不明言其故而使人觀象玩占以見諸行事至孔子時與連山歸藏並列於卜筮占者不勝異說而易道晦矣孔子憂之於是即卦之彖爻之象以知之所及者為之贊又間以新意推廣文王所未言者此非沈酣紬繹不能以臻此也至於文言說序雜卦諸篇又其平日之與門人講說與夫記録古語之舊者天下後世以信孔子而信周易故異說屏除而連山歸藏與八索俱廢文王之經如離明當天而衆星蔑矣中更秦火而此書獨以卜筮獲存亦可知天意之未喪斯文也奈之何儒生坑戮解散間得所傳者私自名家大義紛錯文言止於乾坤故費直參入於經說卦三篇漢初出於河內女子今止存其一而又有繫辭上下二篇夫繫辭云者文王之經而非傳也意者後人以其間推明繫辭之指而目之與要即所謂說卦上中篇也今所謂說卦者乃止下篇爾是說也近世吳斗南知之若夫所謂十翼云者以其羽翼周易蓋十篇也十篇之次猶多異說然其槩可知也彖象之贊各釐上下篇為四說卦合今之繫辭上下篇為三文言序卦雜卦各一是其目也今釐贊於經以合於傳復孔門全書之舊裒稡諸儒之說為之輯注庶有補於世教云爾斯亦孔子贊易之心也是日椅又叙
