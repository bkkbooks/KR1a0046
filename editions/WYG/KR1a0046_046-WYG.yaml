body:
  text: 厚齋易學卷四十六宋馮椅撰易外傳第十四說卦中二夫易彰往而察來而微顯闡幽易之為書兩端具舉不越是二者也有往有來天下之理也易則彰其已往之事察其方來之變使人驗諸其往以占其來也夫有顯有幽天下之事也顯者易玩易則微之使人深求而後得則信之矣幽者易惑易則顯之使人一見而能識則知之矣張子厚曰如坤之初六驗履霜之已然察堅冰之將至彰往察來也王介父曰顯者微之則神幽者闡之則明開而當名辨物開猶開物之開謂創立此卦則當此卦之名辨此卦之為隂陽之物所謂卦有小大也耿睎道曰名乾以辨陽物名坤以辨隂物蓋開此六畫純奇之卦則當之以乾之名而辨其為陽物坤卦亦然正言斷詞則備矣因名物以正言斷之以吉凶之辭然後易之道為備如坤君子有攸往以正言也安貞吉斷辭也又如諸爻君子終日乾乾夕惕若正言也厲无咎斷辭也卦爻皆然林黄中曰物不足故正言之言不足故辭斷之其稱名也小其取類也大此申釋開而當名辨物也名者卦之名類者物之類如豫之名不過順動而已然取其順動之類則天地聖人皆以順動而日月四時萬民不能違坎之名不過險陷而已然取其險陷之類則天險不可升地險山川邱陵與王公設險以守其國皆為其用故孔子每贊之以大矣哉者正謂此也毛伯玉曰類者推而廣之之謂也其旨遠其辭文此申釋斷辭也謂辭亦有不盡訓決而文之者然而其旨寄深遠而吉凶未嘗不粲然也如乾之彖雖雲行雨施變化性命其旨皆在其中而文之以元亨利貞之辭而其為吉未嘗不可知也如坤之初六雖善不善之積臣子君父其旨皆在其中而文之以履霜堅冰之辭而其為凶未嘗不可知也其言曲而中其事肆而隱此申釋正言也曲委曲也中去聲肆陳列也謂言亦有不盡正言而委曲者然而未嘗不中其事情但其事布列而少隱晦爾是亦正言也因貳以濟民行以明失得之報行去聲此結上文之意謂即占筮以占吉凶也凡易之書所以彰往察來微顯闡幽為是名與言辭者皆因斯民之所行疑貳於吉凶之域而以名其失得之報也不過其行事失則報之以凶其行事得則報之以吉而已貳者其志不一或疑其吉或疑其凶故明其吉凶以濟其所行也張子厚曰告人以當如何時如何事若其應也如何則吉如何則凶宜動宜靜丁寧告誡此因貳以濟民行也郭子和曰貳於失得也當名謂卦辨物謂象言爻彖之所言也辭吉凶之所定也易之興也其于中古乎作易者其有憂患乎結上生下中古指文王憂患斯世惑於失得故明其報如此也毛伯玉曰易用於聖賢而不用於天下天下唯用於筮占自文王系之以辭而易之教始興於天下耿睎道曰九卦乃修身以涉世之事而其營道也周其慮患也深以是知聖人興易之時在於道喪徳衰之際且有憂患也李仲永曰其衰世之意邪指紂而言也作易者其有憂患乎指文王而言也其當殷之末世周之盛徳邪當文王興紂之事邪兼商周而言也繼之以九卦乃文王與民同患應世之變故是以反覆而三言之也右第七章明卦爻系辭是故履徳之基也人之成徳以躬行為基足履實地立徳之始也此下孔子表出此九卦可以處己涉世成徳之事也謙徳之柄也所履必執謙以行之則不自滿而徳有進處復徳之本也自此復於初心而本立矣恒徳之固也既復其初心則當守之而不變斯不可摇矣損徳之修也徳既有常恐不能无過不及損其偏而歸於正所以修徳也益徳之裕也徳唯一而无過不及則日益而日裕矣裕有餘也說者多謂懲忿窒欲遷善改過為裕殊不知大象自别一意非本卦之指也困徳之辯也辯辨也一經皆用此辨字晉人所傳如此徳至於裕則既周於身矣可以用於世矣而窮通有命歳寒然後知松柏之後凋唯阨窮而不改其度然後辨其為君子井徳之地也雖困而不失其所故其徳井然不亂有所居之地巽徳之制也所遇必委曲以入之故能制其輕重小大之宜此涉世接物如此張子厚曰量宜接物故曰制或曰以巽制乎剛以中正制乎巽所以成徳也履至益徳已成而盛矣雖遇困窮有以自别所處不亂而後巽以制事至此聖人可以忘憂矣朱子曰然後巽順於理以制事變也又曰九卦皆反身修徳以處憂患之事也而有序焉蓋憂患斯世則教之以所處也此一節言立徳之序履和而至以和而後至兌為和說至詣也猶行者之至所至也非優柔不迫則力將不足半塗而止也耿睎道曰履之不處期於至也胡翼之同謙尊而光位愈尊而特謙則徳愈光矣艮居下卦之上尊也其道光明艮也復小而辨於物善不善貴辨之於其微小之時五隂小也初九陽物也於小之中辨其物也恒雜而不厭事物雜處日用雜陳而有常故不厭斁乾初九居四坤六四居初剛柔雜居然而男女皆長男上女下不相厭也損先難而後易先後清聲始於用力之難及其久則習熟而易於為力蓋損陽難損隂易下卦先上卦後也益長裕而不設長上聲益徳之裕蓋天理充長自然優裕不待人為施設也震動於下一陽上進其道日長不用相導程正叔曰固有此理而就上充長之撰造則偽也朱子曰充長而不造作困窮而通天下无不通之道造物无不通之時但困則途窮而後通蓋易窮而變彖贊曰困而不失其所亨是也澤无水為困然而水澤未嘗不通朱子曰身困而道亨井居其所而遷井不改而長存然後能汲以及物居其所改邑不改井之象遷者巽乎水而上水之象朱子曰不動而及物毛伯玉曰井未嘗遷遷者泉也巽稱而隱稱猶稱物平施之稱巽隱伏之卦也用巽必稱物之輕重而後隱藏於其間則不為无星之衡矣朱子曰巽稱物之宜而潛隱不露此一節言成徳之方皆一卦以一辭為用蓋憂患斯世而曲盡物情事理者也履以和行和去聲和其行則不違衆忤物當用履卦則和而不流以用也下皆倣此謙以制禮以禮接物制其節文當用謙卦則有才美不驕復以自知不善必自知之當用復卦則其失不遠恒以一徳終始惟一之一所謂徳惟一則動罔不吉者也當用恒卦則久而不已損以遠害遠去聲遠物之害當用損卦害物之弊不能驟去損之以漸則害日消矣益以興利興物之利當用益卦利物之事不能頓興與日加益則利日長矣困以寡怨欲寡怨於人則當用困卦自咎而不責人則怨自寡矣井以辯義義以方外欲辯其宜當用井卦不易所守則義自辯矣巽以行權權事之宜以行之當用巽卦委曲避礙則權可行矣李子思曰孔子論作易者之憂患而三陳九卦以巽為終八卦之中獨取此一卦以其涉憂患之世唯巽之徳為宜也此一節言用卦之義與上二節不甚相蒙又新意也李仲永曰九卦周於變故皆含兩意不執一也右第八章文王憂患斯世之心興易以濟民行而取其切於修徳涉世者九卦以為的一節言其立徳之序也二節言其成徳之方也三節言其用卦以修身涉世之義也文王之意孔子從而明之易之為書也不可遠為道也屢遷遠去聲孔子之時人自遠於易故以此曉之將以申其說也猶言天下之賾而不可惡言天下之動而不可亂語意正同屢遷言九六周流於六位之間不一而足也張子厚曰心不存之是遠也不觀其書亦是逺也蓋其為道屢遷變動不居周流六虚此明易之為道屢遷也九動則變六而九不居其位矣六動則變九而六不居其位矣九六上下相易於六虚位之間故曰周流流轉徙也王景孟曰居則不動動則不居謂九六周流也朱子發曰六虚者六爻之虚七八九六未加於初二三四五上之上也王介父曰位虚而爻實也上下无常剛柔相易陸上上聲此申言變動不居周流六虚也剛本在上也或來下而易柔柔本在下也或往上而易剛是所居不拘上下故无常而每相易位也不可為典要唯變所適總結為道屢遷也適猶之也不可以為常道要法唯趣時適變而已朱子發曰无常故不可為典相易故不可為要其出入以度外内句使知懼又明於憂患與故此言二體也自内卦往外為出自外卦往内為入剛柔出入相易於内外之際有尺度以劑量之度如度然後知長短之度故凡下卦之終將之上卦則一出一入之際出以度其外使知懼夫事物之交入以度其内使知懼夫言行之失又明於憂患與憂患所以然之故无非欲天下之趨吉避凶不陷於危咎之域也前章作易者其有憂患聖人之憂患天下也此言明於憂患天下之所憂患也无有師保如臨父母師教誨之者保保養之者雖親愛於己猶為人合也易之丁寧教詔如此不必有師保而如父母之臨其上有不容釋者蓋父母天屬也此應不可逺之義初率其辭而揆其方既有典常率循也方猶知方嚮方之方揆度也既已也入易之初但循其卦爻之辭而揆度其辭之所指之方則其辭莫不有典常之可據依所謂言天下之至動而不可亂與觀其會通以行其典禮者也其六爻屢遷出入有度故不可為典要之中而已有典常不待久而後諭也苟非其人道不虚行其道屢遷書之辭雖有典常而不可逺然而非易中人易之道豈虚而自行哉必待其人而後行也前言入易之初若甚易然以誘人之不可遠易復言行易之道右第九章此篇言易之為書者三此章言全卦二體也二章辯六爻之位也三章論重卦之有六位也楊廷秀曰此章言易道之用存乎變易道之體存乎常易道之行存乎人初曰不可為典要者變也又曰既有典常者常也又曰道不虚行者人也夫易之於人如水之於魚也魚不可離於水人不可遠於易君臣父子无非易也視聽言動无非易也治亂安危无非易也取舍進退无非易也魚離水則死人遠易則凶仲尼曰易之為書也不可遠此之謂也非易書之不可逺也易書之道不可逺也易之道安在哉曰變而已是故屢遷而不居周流而无間乾之初九忽上而居於坤之上六於是坤變而為剝坤之上六忽下而居於乾之初九於是乾變而為姤此易之變上下无常者也乾之一陽與坤之一隂相易而震生焉坤之一隂與乾之一陽相易而巽生焉此易之變剛柔相雜者也是皆不可拘之以典常繩之以要約也唯變之所適誰得而禦之者故曰易道之用存乎變然易之道有體有用其變而无常者用也其常而不變者體也君子之學易能通其變而得其常極其用而執其體是可謂善學易之書而深明易之辭力行易之道者矣易道之體安在哉曰敬而已矣乾曰夕惕若厲敬也坤曰敬以直内敬也易之道千變萬化而歸於一敬大哉敬乎其入徳之捷徑作聖之奇勲歟故曰易道之體存乎常今也學易而得乎敬之一字則出入起居非度不由外内屋漏惟懼是知曰度曰懼罔不夙夜以此應世則遇憂患而自明遇世故而自達以此謹獨則无師保而自律逺父母而自嚴君子何修何飾而臻此哉其初率循乎易之辭而不敢違揆度乎道之方而不敢離既於變動不居之中探索其典常不變之要在此而不在彼於是執而有之躬而行之故易之道為實用而不為虚言矣故仲尼稱之曰苟非其人道不虚行深贊之深嘉之之辭也故曰易道之行存乎人易之為書也原始要終以為質也要平聲質猶俗云胎骨也朱子發曰原始於初爻要終於上爻成六位以為體質張子厚曰於一卦之義䆒始終兩端以求其中者六爻則各指所之非卦之質也六爻相雜惟其時物也謂隂陽雜居於六位所以為之爻物事也卦者事也爻者時也在此爻則為事當此時剛柔相雜於隂陽之位而吉凶可見矣一云物者隂陽之物亦通此四句總言六爻之義前謂初上此兼指中爻其初難知其上易知本末也初辭擬之卒成之終易難易之易本木之幹末木之杪自初至上之象卒始卒之卒此申原始要終之意柴氏曰卦有初上以事莫不有始終故先存其體質也爻也者時也於是分别六爻之義先言初上二爻初卦之本也體未具故難知上一卦之末也體已具故易知初之辭但就其事擬度而言至其卒之辭皆言成事之終耿睎道曰擬議以成其變化擬言其始成言其終朱子發曰初上以時言之初終也以理言之本末也以事言之始卒也若夫雜物撰徳辯是與非則非其中爻不備此申六爻相雜之意物隂陽之物徳猶蓍之徳圓而神卦之徳方以知之徳謂雜物以撰六爻之徳也是非得失也耿睎道曰雜物者分隂分陽以為經迭用剛柔以為緯而相錯乎其間也朱子發曰揉雜六爻之物撰定六爻之徳辨得失是非則非中爻不備崔氏曰中爻二三四五也蓋在初上之中龔氏曰是非者事也以言明之者辨也朱子發又曰物无常是亦无常非施於彼者或不可施於此用於古者或不可行於今是與非不可不辨也鄭少梅曰因奇耦之相乗有比和有戰克故有是非也噫亦要存亡吉凶則居可知矣噫嘆辭要讀如要終之要居如居則觀其象之居王子雍讀則居為其辭知者觀其彖辭則思過半矣知今智過平聲越也此總結六爻之義有是非則有得失有得失則有存亡有存亡則有吉凶又曰存亡者猶消息又曰盈虚也故要其存亡吉凶之驗則爻之是非居可知矣居可知猶曰可坐而知也彖者原始要終以為質者也故觀其所系之辭則已思過六爻之半龔氏曰有是非則位之存亡事之吉凶要之則可知矣居言无待於動也思過半矣言无待於爻也李仲永曰舉本末以見中爻之是非則存亡吉凶不必動而後知耿睎道曰觀是非之要在要其存亡吉凶觀存亡吉凶之要在觀其彖辭彖者統論一卦之材雖未及爻辭之斷吉凶知者觀之則思過其半矣程可久曰其是非明辨備於中爻以其位有當否應有好惡剛柔雜居固可以見存亡吉凶不待動而見乎外也此一節分初上中四爻之義二與四同功而異位分中爻二隂之位其善不同二多譽四多懼近也柔之爲道不利逺者近上聲近君故戒謹亦其善也特不同於二耳柔之為道不利遠者二遠於君張子厚曰柔之用近也其要无咎其用柔中也指二三與五同功而異位分中爻二陽之位三多凶五多功貴賤之等也等等差也其柔危其剛勝邪指三邪今耶程可久曰二四雖同於臣功而位有逺近之異二得中而上應故多譽四近君而上承故多懼譽也懼也皆因爻之善特其善不同耳柔利於近承故不利逺者以其柔中故得无咎三與五同於陽功而異於君臣之位三過中承應不及於君故多凶五處尊位而得臣位之助故多功不言其善不同者凶非善也五為君位故貴三逺於君故賤三多凶者以柔處之則不稱而危以剛處之則太過而勝中爻視五為逺近得失之方故柔危剛勝特指三而已矣六十四卦不盡如此舉其多者云龔氏曰柔中者多譽則五多功者用剛中也三之柔危則二與四之柔為安三之剛勝則五之剛為當而二之剛為不及矣李氏曰曰多者非皆然也此一節申言中爻之位大略如此蓋以位當不當為吉凶然六十四卦自乾坤之外多以九居二以六居五為善蓋二五君臣之位臣欲有為於下故須用剛君欲无為於上故可用柔此又文王之指非孔子之例也右第十章辨初上中爻之位易之為書也廣大悉備柴氏曰廣大具三才也悉備兼而兩之有隂又有陽有柔又有剛有仁又有義也林黄中曰有天道故大有地道故廣有人道故備亦通有天道焉有人道焉有地道焉順卦之位自上而下故中言人兼三才而兩之故六三極而言三才者隂陽剛柔仁義乃三者之才也兼而兩之而三才之體乃具故卦必重而為六位六者非他也三才之道也恐人指以為才而不知其為道故申言之即所謂天道人道地道也林黄中曰前章既言六爻之辨此章遂論其本諸三才而成耿睎道曰六者非三才之位乃三才之道也道有變動故曰爻爻有等故曰物物相雜故曰文文不當故吉凶生焉朱子發曰此下再明六爻雜物之義耿睎道曰道一則无變而兩則相摩相推而變動焉龔氏曰凡反常者皆變也離靜者皆動也朱子曰等謂貴賤逺近之差物隂陽之物也林黄中曰位以為經爻以為緯錯而成文郭子和曰隂陽雜比則有著見之文文不當當云文當不當但取三字成句故止云不當而當在其中矣林黄中曰爻位相得不相得也右第十一章鄭少梅曰易之為書本於明道也至於有數有象有辭蓋不假是三者則道无由而明善學易者必自辭而窮象自象而窮數自數而窮理理窮則性盡至於命而道明矣道有變動所以為爻爻數之系也爻有等差所以為物物象之系也物相錯雜所以為文文辭之系也苟能因隂陽相雜之文而悟分隂分陽之物因分隂分陽之物而悟陽奇隂耦之爻而知一隂一陽之道則无負於聖人之作易也又曰一有變動則墮於數惟未變動之前學者思而勉之得其道則脱於吉凶之域矣易之興也其當殷之末世周之盛德邪當文王與紂之事邪是故其辭危紂當殷之末世文王當周之盛徳故其事為紂囚文王於羑里而易乃興於此時也柴氏曰非盛徳則易无自而興楊廷秀曰仲尼殷後也貶殷末世而不諱不以私沒公也其辭危憂患斯世故其辭危懼耿睎道曰危如操心危之危林黄中曰以其辭危而知其為殷之末世文王與紂之事也毛伯玉曰文王身履其危文王以其身試者演之為書易之教自此始行於天下危者使平易者使傾危險也平則无險故其心危懼者易之辭使之平夷而无憂易險易之易其心平夷自以為安者易之辭使之傾危而知懼柴氏曰殖有禮覆昏暴天道也栽者培之傾者覆之天之於物也耿睎道曰亦生於文王與紂之事而已程可久曰必於徳而不必於數其道甚大百物不廢物象也亦事也百物不廢則无事之不該矣懼以終始其要无咎此之謂易之道也終始即原始要終也自始至終使人知戒懼其要在於欲人之无咎而已此易之所以為道也始言辭而繼言道則知辭以載道者也右第十二章前三章言易之書此章明易之道鄭少梅曰文王之所以興紂之所以亡一則小心知危一則慢易自肆此吉凶之最明白者也易之道无一而不在其中此物理之學學者見物之消息盈虚有盛衰興廢有生死禍福寧無懼心哉危懼之心學易者之初心也柴氏曰夫子於此盡發文王興易之意夫乾天下之至健也徳行恒易以知險夫坤天下之至順也徳行恒簡以知阻夫聲扶健則自專故平易而無隂以為之險有險則知之矣順則承乾故簡徑而無陽以為之阻有阻則知之矣然易簡貴乎有恒恒則知險阻易簡而能恒者以為天下健順之至也王介父曰隂陷陽為險陽距隂為阻此以天道言也朱子曰健者如自高臨下而知其險順者如自下趣上而知其阻此以人事言也毛伯玉曰乾坤隂陽之畫也健順隂陽之性也易簡隂陽之徳也天下之人變態情偽各極其險阻而卒不逃於奇耦之二畫所以知險知阻能說諸心能研諸慮能謂易之乾坤說今悅研考覈也之於為諸心慮指天下之人舊本作諸侯之慮今据略例鼂氏曰其繆已久矣今正之張子厚曰易簡故能説諸心知險阻故能研諸慮定天下之吉凶成天下之亹亹者鄭少梅曰易簡則吉險阻則凶乾坤定之也然則天下之亹亹者趣易簡而避險阻亦乾坤成之也是故變化云為吉事有祥此以下言聖人用易之道云為即言動也陸農師曰君子曰言動聖人曰云為蓋君子言動擬議以成其變化聖人之變化在於一身而形於云為者也變化即易之變化乾坤之一闔一闢者也在天下則易簡能說其心研其慮在聖人則一云一為無非變化祥貞祥先見之兆也猶記云清明在躬志氣如神嗜欲將至有開必先不言凶者方言知器知來不為凶言也與幾者動之微吉之先見之義略同柴氏曰不言凶專為易簡言之象事知器占事知來事有其祥故即事為象即可知器不待筮卦爻而後知其制器之象也即事為占即可知來不待筮卦爻而後知其來物之占也楊廷秀曰象者器之影占者來之訊李氏曰器者象之形來乃占之應柴氏曰云者告人之說故占事知來為者有所作為故象事知器器即事之形而下者也天地設位聖人成能天地无全能聖人舉事而知器知來不待象占者聖人之成天地之能也楊廷秀曰天地以易簡而設位於上下聖人以易簡而成能於兩間郭子和曰聖人參天地贊化育以備三極之道也人謀鬼謀百姓與能與去聲聖人成能无待象占矣而猶謀之人謀之鬼雖夫婦之愚皆使之與其成能之事者聖人先天地以舉事雖知吉事之祥而聖人不自成其能也并天下之謀合天下之智以為聖人之能洪範汝有大疑謀及乃心謀及卿士謂人也謀及庶人謂百姓也謀及卜筮謂鬼也右第十三章與下章相屬上篇首言乾坤易簡聖人成位乎中以參天地故終歸於其人徳行身乎易者也此篇終言乾坤易簡而始之以爻象繫辭終歸於聖人成能而不廢占筮之事同乎易者也八卦以象告爻彖以情言剛柔雜居而吉凶可見矣但有奇耦之畫而已包羲始畫八卦相重立卦之體則以八物之象成卦之義以告天下不立文字也至於文王則因其卦體而繫之以彖辭又發揮剛柔而繫之以爻辭所以言隂陽之情也情如下所云凡易之情是已剛柔雜居於六位而吉凶可見知者觀之則象已可見吉凶而况有言乎雜居於六位而事之吉凶可見矣變動以利言吉凶以情遷變通所以盡利故以利言當位則吉失位則凶而逺近承乗愛惡之相攻情凶或遷而吉情吉或遷而凶是故愛惡相攻而吉凶生情之所愛者攻其所惡惡者亦攻其所愛愛勝惡則吉惡勝愛則凶逺近相取而悔吝生近取逺則多吝逺取近則多悔情偽相感而利害生情感偽則害生偽感情則利生或曰爻有情偽乎曰姑以此一端言匪寇婚媾寇乃偽婚媾乃情也凡易之情近而不相得則凶或害之悔且吝此又申言逺近相取而悔吝生未盡之意右第十四章自彖象引而伸之專明爻義能明此數語則六爻之義粲然可見矣將叛者其辭慙中心疑者其辭枝吉人之辭寡躁人之辭多誣善之人其辭游失其守者其辭屈右第十五章與易全不相關恐斷簡錯見於此非說卦也或曰諸如此類易各準其情而為之辭然誣善失守恐不入卦爻王介父曰易之辭亦必不慙枝游屈也郭子和亦嘗疑之不敢彊通厚齋易學卷四十六
