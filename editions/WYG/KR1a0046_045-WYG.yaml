body:
  text: 厚齋易學卷四十五宋馮椅撰易外傳第十三說卦中一八卦成列象在其中矣乾南坤北離東坎西震艮巽兌四維八卦相比相對交錯六十四卦雖未重而象已在其中矣因而重之爻在其中矣重平聲因八卦成列之象而重之文王未演易生爻而既有重卦則有六位既有六位則有竒耦而爻已在其中矣剛柔相推變在其中矣剛柔謂九六之爻相推於六位則爻之變在其中矣謂剛下柔上柔來文剛剛上文柔之類繫辭焉而命之動在其中矣文王於每卦逐爻之下皆繫之以辭而命之以吉凶則雖未筮得九六而九六之動已在其中矣龔氏曰命猶天之命萬物也毛伯玉曰有卦則有象有重則有爻有爻則有變有變則有動動在其中者卦爻之辭也吉凶悔吝者生乎動者也每爻動則占其變故有吉有凶有悔吝若静則有吉而无凶悔吝矣郭子和曰動之說未詳故繼言此終其言也周茂叔曰吉一而已動可不愼乎剛柔者立本者也竒耦之畫以立六爻之本變通者趣時者也趣去聲動則變變則通通乃趣其時也卦為時爻為事物變則之某卦為趣某時吉凶者貞勝者也貞固而常也勝或作稱非貞於得則勝失而吉貞於失則勝得而凶不貞則為悔吝矣天地之道貞觀者也觀示也天地示人法象人道常久而不變貞於觀者也日月之道貞明者也日月往來明生之道亦常久而不變貞於明者也天下之動貞夫一者也一猶終始惟一之一自所舉行始終不貳故能成功故動必貞於一也書曰德惟一動罔不吉郭子和曰上言爻在其中故此言剛柔立本上言變在其中故此言變通趣時上言動在其中故此言吉凶貞勝皆所以明在上未終之意又曰因言吉凶以貞勝復以天地日月明之又以明吉凶之生於天下之動也此一節明卦爻變動之吉凶夫乾確然示人易矣夫聲扶確苦角反剛健貌夫坤隤然示人簡矣隤大囬反柔順貌記隤乎其順也或作退妥非爻也者效此者也象也者像此者也象言卦申前爻象在其中之意此謂乾坤之易簡爻象動乎内申前動在其中之意一卦之内蓋畫成卦爻而後見某爻之動則知某爻之象是爻象動乎一卦之内者也吉凶見乎外見今現下同外謂一卦之外也吉凶生乎動故見於所動之外功業見乎變申前變在其中之意動則生變興事曰功功成曰業見乎一卦所動之變也聖人之情見乎辭申前繫辭焉而命之意辭謂一卦之辭王景孟曰聖人與民同患之意見乎其辭之所命如此而吉如此而凶此一節明前剛柔立本剛柔者乾坤也乾剛坤柔示人不易上篇之所謂易簡而已右第一章申言爻象郭子和曰上篇始於乾坤之成卦繼以易簡賢人之德業此篇始於八卦之成列繼以乾坤示人之易簡凡上篇之未盡者見於此篇相為始終之道也天地之大德曰生所以生生之謂易聖人之大寳曰位天位乎上地位乎下故能化生萬物有聖人之德而无聖人之位則不能配天地故作之君師而成位乎其中者此聖人之大寶也何以守位曰仁天地生物之大德仁也聖人得位與天地參故守位以仁猶天地之生物也吕微仲曰仁古作人朱子曰非衆罔與守邦之義何以聚人曰財仁之生物莫尚於財財者斯人之所以生也故有財則人聚无財則人散理財正辭禁民為非曰義禁平聲亦去聲既有財必為之理謂撙節有式也辭者理財之辭如曰貢曰賦曰篚之類正辭也非謂民之取財无節也禁民為非如數罟不入汚池斧斤以時入山林之類凡此者皆義也謂當然之冝也立人之道曰仁與義天地簡易故曰生一言而足人道雜而多端故曰位曰仁曰財曰義非一言之可盡也猶書之天地萬物父母一言也亶聰明作元后元后作民父母不一言也右第二章鄭少梅曰此簡為人君設古之聖人如包犧神農黄帝堯舜氏皆得是道也下章遂繼以十三卦制器焉皆聚人理財正辭禁民為非之事古者包犧氏之王天下也仰則觀象于天俯則觀法于地包今庖孟作伏犧許宜反轉注也古作羲上古未知亨餁茹毛飲血包犧氏教民佃漁亨餁故曰包犧犧牲也鳥獸全具曰犧王去聲觀象於天風雲日月之類觀法於地法法則也山澤水火之類觀鳥獸之文與地之宜鳥獸之文如鴻雉鳥隼龍馬虎豹牛羊之類地之宜如利西南不利東北亨於西山之類近取諸身逺取諸物身如乾為首之類物如乾為馬之類于是始作八卦以通神明之德以類萬物之情始去聲作興起也一曰作為也八卦謂三畫竒耦德謂吉凶來物通者知之也情謂遠近愛惡類者以類分之也作結繩而為罔罟以佃以漁蓋取諸離罔亦网今網贅系文從网從亡古􅘩籒􅂒則知亡亦偏旁也罟亦從网從古取獸曰罔取魚曰罟或曰罔目謂罟結繩謂之網兩目相承而物麗焉佃今畋古田漁古魚捕鳥獸魚鼈之名以用也取諸離凡諸卦之所以取有二義有象有理離謂麗也謂鳥獸魚鼈麗於罔罟也象謂虛中罔罟之目虚也是時生民未知飲食之道而鳥獸魚鼈未知避忌與人雜處傷害人民稼穡故包犧氏觀象於離作為罔罟以佃漁鳥獸魚鼈亨餁而食然後人物之辨始立此說石毛二君子得之胡翼之曰聖人作事立器自然符合卦象非必擬此卦然後成之包犧氏没神農氏作作興起也猶聖人作之作後同斵木為耜揉木為耒或作為之耒耨非斵竹角反斫也耜聲似田器說文重也一曰徙土輂齊人語揉忍九反說文屈申木也耒盧對反說文手耕曲木以從木推手古者垂作耒耜胡翼之曰耜者薄五寸其首有華胔以為耕作之用又揉其木其曲有鈎以為之耒龔氏曰耜者耒之首耒者耜之柄則為一器二物按說文則耜為今之鍬耒為今之犂特古今之制異爾耒耨之利以教天下蓋取諸益耨奴豆反鉏也王氏昭素云諸本或作耜乃合上文教平聲取諸益其理則為稼穡養民益下之道也其象則上震下巽動而入也震木直而斷為耜巽木曲而揉為耒耕重皆動而入土也程可久曰飛走之類實害稼穡唯罔罟佃漁之制立然後有耒耜之利見于天下郭子和曰包犧有犧牲而未粒食炎帝氏為耒耜之利以教天下故號曰神農然則粒食自神農始也取諸益者益以重震巽二木成卦故有斷木為耜揉木為耒之象而其彖則曰木道乃行粒食木類也耒耜木教也故言取諸益然則益以益下為道又有天施地生其益无方之義耒耨之利是以上益下之道也亦其益无方之道也皆備易之三義日中為市致天下之民聚天下之貨離在上日中也震動於下市合也不取早莫者欲其朝往而莫可歸也至周則大市日􅨫百族為主朝市以朝商賈為主夕市以夕販夫販婦為主蓋因其制而増益之也民貨三隂之象隂皆在陽下天下之象或曰震足動於下致民聚貨之象交易而退各得其所蓋取諸噬嗑噬嗑卦本三陽在上三隂在下九自五來初六自初往五交易之象卦本成否今交易而退則隂麗于陽成離明陽動于下為震起隂陽各得其所之象噬嗑市合也聲同則義通在古然也鄭少梅曰食貨民之本也益次以噬嗑兩者食貨也神農氏没黄帝堯舜氏作通其變使民不倦神而化之使民宜之變者更新化者革舊通則不礙人情神則由之不知鄭漁仲曰事久則敝不更則斁故通其變者使民不倦而已非常之變黎民懼焉故神而化之使民宜之張子厚曰鴻荒之世衣食足而用未備黄帝堯舜通其變神而化之以教天下也王介甫曰舟楫杵臼而次以一聖人足以具此必至於五六聖而備焉何也聖人也者因物之變而通之者也物之所未厭聖人不彊去物之所未安聖人不彊行故曰通其變使民不倦程伯淳曰各隨其時而已矣易窮則變變則通通則久是以自天祐之吉无不利舉易道以明之黄帝堯舜亦用易以變通之而已矣黄帝堯舜垂衣裳而天下治蓋取諸乾坤去物之害興食貨之利人道立矣自黄帝以至堯舜衣裳之制乃始明備故垂衣裳而天下自治取諸乾坤之尊卑易簡而已易之道定於乾坤之尊卑德業成於乾坤之易簡自黄帝以前衣鳥獸之皮衣裳之制始闓端于黄帝至堯舜之時命禹作服曰予欲觀古人之象蓋指黄帝也神農雖為耒耜教民稼穡然與民並耕而食饔飱而治故三聖人方辨上下之分正衣裳之儀法象簡易變則通之化則神之夫何為哉朱子發曰太𤣥曰垂綃而為衣襞幅為裳垂綃竒也襞幅耦也古者衣裳相連乾坤相依君臣上下同體也至秦取古之衣裳離之上衣下裳天尊地卑之義亦一說也刳木為舟剡木為楫刳口孤反又口溝反禮作挎剖也刳木令中虚為舟渙卦自二至五中虛之象剡以冉反削木令鋭也楫或作檝將輒反或聲集或子入反橈櫂也二木皆象於巽下坎水也舟浮水上巽木枉坎上之象楫入水中巽木入於坎之象舟楫之利以濟不通蓋取諸渙今本以濟不通下有致逺以利天下一句與下文相重陸德明王昭素皆云無此一句朱子亦曰疑衍今除之取諸渙有舟楫以濟不通則病涉之患散矣此其理也彖曰利涉大川賛曰乗木有功蓋謂是也鄭少梅曰制器至此不復載所作之聖人其事亦不復次序大扺黄帝堯舜之時此等器用無不備矣毛伯玉曰生民之初知鮮食矣而末知網罟知食草木矣而朱知稼穡知通有無矣而未知有市知馮河矣而未知舟楫知有稼穡而未知有杵臼知有文字而未知有書契聖人於是設為此器轉益便利以宜夫下所謂神而化之使民宜之者也服牛乗馬引重致逺以利天下蓋取諸隨一本無以利天下四字恐非諸卦皆言利盖謂變而通之以盡利也胡翼之曰豫言禦暴乾坤言治是亦利也服毛伯玊曰服箱也說文作犕聲備今之馬亦謂犕乗平聲大車牛駕之載物而重者也小車馬駕之載人而輕者也牛曰服馬曰乘其實皆駕車之稱牛馬行而車隨之以引重致逺故取諸隨隨卦純體本乾上坤下乾馬坤牛今坤六自初往乾之上服牛也乾九自上來坤之下乗馬也乾陽實重也而坤引之于上乾自上來初逺也而乾致于初此其象也毛伯玉曰古者牛以駕後世始以耕蓋耒為手耕之木以人為耦禹所以式之古者四馬駕一車多至六馬後世始以騎王景孟曰服云者以其能引重也乗云者以其能致逺也重門撃􅈀以待暴客蓋取諸豫􅈀本說文今柝它落反兩木相撃以行夜者重平聲艮為門闕自二至四有艮象下又有一耦畫重門之象二震為木為動為鳴木動而鳴撃􅈀之象也二隂在門外來攻九四有暴客之象四以一陽禦之待之之象暴鄭作虣暴客盗賊也豫豫備之義耿睎道曰川塗既通則萬民雖交而暴客亦至故重門以禦之所以為冦者不能攻故撃􅈀以警之所以為盜者不能竊王介父曰一陽能禦外之二隂故下之三隂得其安矣郭子和曰備豫之義非一獨舉重門撃柝者黄帝堯舜之世獨有此耳不若後世之禁備豫之宻也以黄帝堯舜之世猶設此焉則後世之君可不豫為之防哉斷木為杵掘地為臼斷讀如斷金之斷絶也杵昌吕反掘其月其勿二反臼求又反杵臼所以治米也杵臼之利萬民以濟蓋取諸小過治米欲其精鑿小過之義也震上艮下上動下止杵臼之象也隂過多於陽萬民之象張子厚曰過以養物李氏曰小過之彖曰可小事盖杵臼之類也程可久曰互體巽木折於上下斷木也二陽陷於四隂之中掘地也鄭少梅曰震以卯木而在上艮以寅木而在下二卦中分之斷木也艮為土而木克之掘地也柴氏曰約象兌金斷巽木而動於上杵也兌金掘艮土而止於下臼也舂者去其粃而已故曰小過象有此三說列之以俟有考者胡翼之曰神農氏教民粒食然未能精治五穀以為飲食之養後世聖人乃興杵臼之利耿睎道曰暴客不至而居者安可以治粟而食矣弦木為弧剡木為矢弦木以木為弧而弦之也剡木以木為矢而剡之也上九言張弧卦有弧象程可久曰坎離皆有木坎為矯揉弦木也離火上銳剡木也弧矢之利以威天下蓋取諸睽耿睎道曰孔子言足食次足兵序當然也竊謂弧矢所以威不服不止暴客之門􅈀也聞之潘氏冠英曰火上澤下其埶睽而澤火之用相資故弧矢象之弧屈而張矢直而弛弧張而却矢弛而前其埶相睽其用相資也後世弓備六材而矢以金石之砮古皆用木闓端之初猶樸也上古穴居而野處後世聖人易之以宫室上棟下宇以待風雨蓋取諸大壯冬穴居而无以待風夏野處而无以待雨宫室室房也棟俗稱為脊梁宇重簷也極髙出于上而簷垂覆于下則風雨不能為患朱子曰壯固之意程可久曰四方上下之間謂之宇九四剛實行于三陽之上以承二隂棟之象乾下覆宇之象胡翼之曰二隂風雨之象四陽棟宇也古之𦵏者厚衣之以薪𦵏之中野不封不樹喪期无數衣去聲胡翼之曰不能封之為墳不能樹之為别未立五服之制三年之喪喪期並如字數去聲後世聖人易之以棺椁蓋取諸大過棺聲官椁聲郭内曰棺外曰椁取諸大過朱子曰送死大事過干厚其義也柴氏曰棺而又椁大過也程可久曰木在地下有生意曰升木在澤下无生意曰大過耿睎道曰生而庇大厦死而衣之厚薪不可也生而處宫室死而葬之中野不可也于是棺椁興焉鄭少梅曰大壯外震震動也風雨飄搖之象大過内巽巽入也殯𦵏入土之象皆養生送死自然之意竊謂中二陽堅實棺也上下二陽周之淳也二隂掩其外土也此其象也以木為棺椁亦闓端之初爾有虞氏之瓦棺夏后氏之堲周其後從而増益之焉郭子和曰上古之世知簡不知禮故𦵏親之薄有至于此喪期無數者哀盡則止也聖人為制禮然後棺椁有度則䘮期可知矣大過雖取其過于厚然四剛有堅中之象故取以為棺椁也養生不足以當大事惟送死可以當大事可不過于厚乎上世嘗有其親死則舉而委之于壑者孟子謂孝子仁人之掩其親亦必有道矣此蓋聖人易之以棺椁取諸大過之意也上古結䋲而治後世聖人易之以書契百官以治萬民以察蓋取諸夬治去聲鄭康成曰事大大結其䋲事小小結其䋲竊意兩各以䋲相結人執一以為信也書文字契以合約也百官以治治平聲以此紀事辨訟萬民以察以此灼見是非情偽取諸夬其義在决欺偽也鄭少梅曰乾兌皆金兩相符合而又會于西北天庭夬决之象百官以治萬民以察之說于是乎在此所以取諸夬也程可久曰古人仰觀奎星環曲之埶而制文字則書契乾之成象也兌為傅决物來此傅已而求决斷諸陽正位以治之而隂在顯著之地有察見情實之象故取諸夬龔氏曰言有所不能記者則書述之事有所不能信者則契别之百官以治事辨而不相亂也萬民以察情盡而不相欺也以衆明照闇猶五剛之决一柔也郭子和曰結䋲之初結䋲所以為治結䋲之後書契所以為治皆所以防小人之偽非待君子也夬之為道以剛決柔君子道長小人道憂書契所以取諸夬者亦以夬去小人之偽也自離至夬十三卦與本卦之義多不同以見卦之象皆不可以一義窮盡能變而通之則其利亦無窮于天下矣此之所言亦其一也故曰通其變使民不倦是故易者象也象也者像也象畫之象像似也似物像彖者材也爻也者效天下之動者也材象之材動材之動是故吉凶生而悔吝著也此一節結十三卦制器之事耿氏曰像十三卦之象而制器材者成器者也動則用器者也毛伯玉曰畫而為卦故謂之象著而為言故謂之彖彖者因其材而明其用也聖人既制為是器以便天下之生矣器與人相用而有利有鈍有成有毁所用之者有工拙所遇之者有險易故彖論其材而爻别其所遇此吉凶悔吝之所由生也竊嘗觀之罔罟捕獸而或為獸傷耒耜殖稼也而或有水旱市以交易或以啓爭衣裳以辨分或以啟僣舟楫能載亦能覆弧矢能威亦能敗牛馬駕車有時而說輹書契防欺有時而偽詐凡此之類皆吉凶悔吝之所由生也右第三章專論易本乎象凡有所動无非取象于易韓宣子適魯見易象夫不曰易而曰易象則知易之有象猶詩之賦比興也象之有彖爻猶賦比興之有風雅頌也无象則无易无賦比興則无詩十三卦之制器此象之至著而一書之所未載者也故孔子述之陽卦多隂隂卦多陽此言未重之八卦也乾坤純體三男之卦則一陽二隂三女之卦則一隂二陽一則少二則多註曰少者多之所宗故以少為主其故何也陽卦竒隂卦耦其故何也孔子設為此問以曉人故者所以然也竒聲朞單隻也一畫是也耦並配也一畫是也隂中有一竒畫者為陽卦陽中有一耦畫者為隂卦以少為主也其德行何也陽一君而二民君子之道也隂二君而一民小人之道也其德行何也又設問以求隂陽竒耦之德行所謂卦之德與顯道神德行之德行也張子厚曰一其歸者君子之道多以御者小人之理陽遍體衆隂衆隂共事一陽理也是故二君共一民一民事二君上與下皆小人之道也一君而體二民二民而宗一君上與下皆君子之道也朱子曰震坎艮為陽卦皆一陽二隂巽離兌為隂卦皆一隂二陽陽為君隂為民林黄中曰陽物乾君之象也隂物坤民之象也右第四章鄭少梅曰隂陽之分以氣言竒耦之分以數言君子小人之分以勢位言君子小人之道以德言易之道其大本為天下治亂計所以喻之于君民而終歸于君子小人之分也易曰憧憧往來朋從爾思子曰天下何思何慮天下同歸而殊塗一致而百慮天下何思何慮此總言天下之人不能思慮而徒惑于往來之憧憧也致極致也往來雖異而其歸則同往來雖雜而其致則一天下之人見其憧憧而殊途以求之不知其歸之同見其朋從所思而百慮以索之不知其致之一故再言何思何慮而深有感于天下之人也其不來也則思其來其既往也則又慮其往惑之甚也程可久曰天下之動貞夫一何事多思慮哉故道則同歸于一致而天下自殊塗而百慮也日往則月來月往則日來日月相推而明生焉寒往則暑來暑往則寒來寒暑相推而歲成焉往者屈也來者信也屈信相感而利生焉此申言往來之理同歸也日推月則月來月推日則日來故曰相推寒暑亦然所謂剛柔相推而生變化者也屈感于來而信信感于往而屈故曰相感所謂二氣感應以相與者也往來屈信皆同歸也楊廷秀曰天下之事往來無窮不外乎屈信相感而已尺蠖之屈以求信也蠖聲雘屈信蟲也其行先屈而後信蓋如今人以手大拇并次指量度長短一信一屈為今准尺五寸古為一尺所以謂之尺蠖在桑間伸立宛如桑枝无辨江東俗呼為桑㪠蟲龍蛇之蟄以存身也蛇今虵存或作全此申言屈信之理一致也李氏曰當其信雖尺蠖之㣲亦屈以求信當其屈雖龍蛇之大亦蟄以存身精義入神以致用也利用安身以崇德也此又言人之于往來屈信之理同歸一致也精精熟也凡所以精于義理而入于神妙者非忘物也將以致之用也凡所以利于致用而安其身者非㣘物也所以崇我之德也林黄中曰精乎屈信往來之義而入于神利乎屈信往來之用而安其身出而致用入而崇德亦往來屈信之理朱子曰内外交相養互相發也毛伯玉曰道未始不自精思得之及其至也不思而得矣過此以往未之或知也窮神知化德之盛也往來屈信无有窮也學易者但能有以致用崇徳足矣若欲窮无窮而極无極非所敢知也神者信也方來者也化者屈也已往者也若欲窮極方信之神知得已屈之化自非德至于盛大其孰能與于此此聖人事也非學者之所知也自崇德充之可矣朱子曰自是以上則亦无所用其力矣至于窮神知化乃德盛仁熟而自致耳張子厚同楊廷秀曰仲尼于上篇既舉七卦之爻辭以發明六十四卦之㣲㫖至此復舉十一卦焉鄭少梅曰天地生陽于中孚而生隂于咸隂陽往來之不窮一言以蔽之曰誠也孔子于上篇論中孚之誠而于此篇論咸之誠皆以首乎諸卦使人知易之道本乎隂陽而天地之隂陽本乎至誠不息也誠者神也自憧憧往來至莫益之十一義皆明聖人所以玩易之辭以終上篇擬議之道道以用為大自一心之正推而及乎天下自一性而盡推而至于盡物皆用也所謂精義入神以致用者此也且以咸卦論之則憧憧徃來朋從爾思言其志意未定也孔子於此雖論何思何慮而極天下往來之理而論之則知爻辭往來二字非徒然也是所謂玩辭也且往來理之常也有往必來有來必往知往來之說則凡憧憧往來相感无定固有理存不必皆從爾思也惟知同歸殊塗一致百慮則天下何思何慮矣蓋朋從爾思者爾所感也不從爾思者非爾所感其往來自相感也日月寒暑是也有以屈信相感者尺蠖龍蛇是也有以精義相感而致用者聖人是也此雖殊塗而同歸于感也又何必朋從爾思乎觀乾之初九潜龍勿用至九五而後飛龍在天此所謂屈信相感精義入神以致用者也易曰困于石據于蒺藜入于其宫不見其妻凶困六三子曰非所困而困焉名必辱非所據而據焉身必危石非所困也困則名辱矣蒺藜非所據也據則身危矣既辱且危死其將至妻其可得見邪其一作期邪今耶正義曰上干九四故名辱下乗九二故身危上又無應故不見其妻而凶郭子和曰當困而困當據而據道之正也非所困非所據失道之正是以名辱身危也太甲所謂自作孽不可逭者也妻者至親而易保入宫必可見者非所宜為而為之者終至于不能保其妻子尚安能保四海乎此所謂失道者寡助也易曰公用射隼于髙墉之上獲之无不利解上六墉古庸子曰隼者禽也弓矢者器也射之者人也君子藏器于身待時而動何不利之有射食亦反藏器謂佩之于身待時遇隼則其時也動而不括是以出而有獲語成器而動者也朱子曰括結礙也語去聲器先成而後動故無所結礙凝滯而有獲禽之利猶工欲善其事必先利其器之謂也王介父曰上六在卦之中故曰成器毛伯玉曰非所以申爻辭欲以它義發之孔子之言有遺爻象而泛言之者欲其廣也鳴鶴在隂公用射隼是也有專明象而㣲其辭者欲其藏也天地絪縕萬物化醇是也有托于泛而深言之者欲其㣲也上交不諂下交不凟是也以此推之聖人之言可以理悟而意通矣子曰小人不恥不仁不畏不義不見利不勸不威不懲不以不仁為恥故見利而後勸于為仁不以不義為畏故必威而後懲于不義小懲而大誠此小人之福也懲之于罪惡之小而所以誡其罪惡之大易曰屨校滅止无咎此之謂也噬嗑初九小人言九四為間之一爻所謂頤中之物也立人之道曰仁與義正在三四兩爻四謂間不仁也乗三之柔不義也六五近而相得見利也初噬之始故懲誡之楊廷秀曰懲惡在初改過在小王景孟曰仁義人性之所固有也恥畏之心不存則勸懲之術不得已而施焉善不積不足以成名惡不積不足以滅身小人以小善為无益而弗為也以小惡為无傷而弗去也故惡積而不可掩罪大而不可解易曰何校滅耳凶噬嗑上九此爻之義與文言坤初六之意略同皆言積也九四陽剛本善也以為間而居隂位自陷于小人獨陽在衆隂之中故以善為小无益而弗為則善不積也名陽明之譽也居于隂不成名也中四爻獨此一爻為間故謂惡為小無傷而弗去不知自二至四惡已積于上矣噬而嗑之則滅身也毛伯玉曰小懲大誡故曰无咎罪大不赦故曰凶王景孟曰上之人至用刑戮者非我之本心也自爾致之吾不得已而應之云爾又曰至此雖小人之罪而上之人亦不能無失焉子曰危者安其位者也亡者保其存者也亂者有其治者也是故君子安而不忘危存而不忘亡治而不忘亂是以身安而國家可保也易曰其亡其亡繋于苞桑否九五安危存亡治亂相為倚伏猶隂陽之相為消長也故安其位則危保其存則亡有其治則亂有如有其善䘮厥善之有以九居五當位故安二陽夾輔故保其存以剛臨下故有其治然三陽浸長而上偪則危亡亂可立而至也身謂九五國家謂上三陽爻子曰德薄而位尊知小而謀大力少而任重鮮不及矣知今智少多少之少重輕重之重鮮上聲亦作尟易曰鼎折足覆公餗其形渥凶言不勝其任也勝平聲鼎九四卦有二象有全體之象有二體自為象全體之象具鼎之體也二體各自為象則上鼎無足下鼎無耳也鼎以三陽為德九四在上體之下二陽㢲隂下趨不相夾輔故為德則薄為知則小為力則少也而全體已在上卦近君故其位則尊其謀則大其任則重也一鼎之餗出納于四而四孤于上故不勝其任之重鮮不及言鮮不及于凶敗也郭子和曰道之用無施不可自一身至天下其用皆一安有不勝之患哉此論不勝其任者蓋因鼎而言也鼎器也于人才器之象也才器限量不同猶若鼎然故有不勝其任之凶君子不器則無限量矣龔氏曰鼎之九四不能利用者矣此五卦之六爻申利用也子曰知㡬其神乎㡬平聲柴氏曰此文言君子能精義入神以致用也君子上交不諂下交不瀆其知㡬乎九四以一陽統五隂權臣之象六二上爻則四也諂媚也初九與四為正應宻比于二六二下交則初也瀆數也言上交權臣下交權臣之與也王介父曰上非其應而求焉諂也下非其與而求焉瀆也幾者動之微吉之先見者也事物方兆之初故曰㣲見今現形也震動在四二已知其㣲朱子曰漢書云吉凶之先見程正叔曰吉見于先豈復至有凶也王介父同君子見㡬而作不俟終日作起也起而去其位也不俟終日下卦畫也不俟至三三則近四有吉凶矣故不俟終日程正叔曰知之圓也易曰介于石不終日貞吉豫六二張子厚曰以隂居隂獨無累于四故其介如石介如石焉寧用終日斷可識矣寧安也言安用也斷都玩切君子知㣲知彰知柔知剛萬夫之望動之㣲則必彰矣柔物之稚稚則柔至剛則堅實矣詩采薇二章言薇亦柔止三章言薇亦剛止是也望平聲言天下萬民視君子以為去就也卦多隂故曰萬夫子曰顔氏之子其殆庶㡬乎有不善未嘗不知知之未嘗復行也顔氏之子指顔淵殆近也㡬讀為上文知幾之㡬耿睎道曰言近於知㡬也此申言精義見㡬之次也復扶乂切易曰不逺復无祗悔元吉復初九耿睎道曰與見㡬而作不俟終日者近之矣郭子和曰顔子未能无過故論語稱不貳過未能无失故中庸言得一善則拳拳服膺而勿失李仲永曰聖人无不善賢人則容有不善但未嘗不知知之未嘗復行也天地絪縕萬物化醇絪於真反縕於溫反篆壹􅱃𨽻氤氳程正叔曰絪縕交宻之狀天地之氣相交而宻朱子曰醇謂厚而凝也言氣化也男女構精萬物化生言萬物雌雄牝牡皆有男女之道程正叔曰精氣交構則化生萬物朱子曰形生也易曰三人行則損一人一人行則得其友損六三言致一也楊廷秀曰致者力至之之謂柴氏曰春則生夏則長秋一者也龔氏曰申言精義則足以致一也郭子和曰損自泰來由乾坤而為艮兌故有天地男女之象張子厚曰隂虛陽實虛則受實則施受則益施則損子曰君子安其身而後動易其心而後語定其交而後求君子修此三者故全也易平易之易語去聲益極則損至君子修此三者故全其益而无損危以動則民不與也其身危而欲動則人驚而去之矣懼以語則民不應也應去聲毛伯玉曰以言恐人人孰諾之无交而求則民不與也所交未定而泛然有求則誰其予之民人也莫之與則傷之者至矣莫之與莫益之也傷之者至或撃之也易曰莫益之或撃之立心勿恒凶益上九修此三者則常益也反此三者則是立心勿常其凶必矣蓋无自全也李氏曰居其所安而人不我危故動則民傅處其所易而人不我懼故語則民信固其所交而人不我離故求則民親此立心之恒之人也上九反是身心不能自寧交不能自必况于民乎是以有傷而无益張子厚曰終以昧于致用之戒龔氏曰此四卦者申精義也李仲永曰始終舉此諸爻所以申精義入神以致用利用安身以崇德也易曰自天祐之吉无不利大有上九子曰祐者助也天之所助者順也人之所助者信也郭子和曰已順故天助之以順已信故人助之以信履信思乎順又以尚賢也又或作有古通尚賢以下乾三陽與大畜尚賢之象同是以自天祐之吉无不利也上九一爻在六五之上德剛而體柔六五厥孚交如而又柔順上九身履其信而心思其順乾三陽在下賢者也而尚之是以乾三陽祐之乾天也自天祐之之象也張子厚曰五陽一隂无有間焉者剛柔相求情也信也又曰宜在立心勿恒之後蓋上言莫益之此言多助也蓋此爻舊在上篇書不盡言之前上下文不相屬郭氏曰上篇擬議七爻皆不稱易此篇往來屈信十一爻皆稱易曰此是錯簡宜屬于此右第五章申上篇擬議七爻未盡之㫖以推玩辭之學子曰乾坤其易之門邪邪今耶後並同門或作户非林黄中曰前言十一卦之爻此申言其皆自乾坤出也故曰易之門毛氏同乾陽物也坤隂物也隂陽合德而剛柔有體乾三畫竒陽物也坤三畫耦隂物也乾合坤而剛有體則震坎艮也坤合乾而柔有體則巽離兌也乾坤合者隂陽合德也言六子出于乾坤自此重之六十四卦出于八卦所以為易之門者此也楊廷秀曰六十四卦之物本乎陽者皆乾也本乎隂者皆坤也以體天地之撰以通神明之德體去聲今俗作替非撰造作也讀如異乎三子者之撰猶言天地之所為也謂剛柔相推而生變化者以卦爻體之也神明之德謂无有逺近幽深知吉凶之來物以卦爻通之也其稱名也雜讀而不越于稽其類其衰世之意邪越過也言乾坤之稱名也雜雖若多端而不過于稽考其類凡陽卦陽爻皆乾之類隂卦隂爻皆坤之類也今人讀越字絶句于稽其類四字全無歸宿殊不知雜字為讀猶下章其稱名也小句法正同是說蓋得之上庠之知易者楊廷秀曰乾之名為龍為馬為虎為羊為豕為金為玉為碩果為棟為宇其所稱雖雜而不越乎陽物也坤之名為牛為牝馬為魚為瓜為葛藟為輿為缶為常為帛其所稱雖雜而不越乎隂物也朱子曰衰世指文王與紂之事程可久曰以其詳吉凶悔吝之變非上世風俗淳厚之世所有也朱子發曰世既下衰不如是不足以盡天下之情偽右第六章言易自乾坤而出自此以下皆言易之書鄭少梅曰萬物以氣則不離乎隂陽以形則不離剛柔大為天地妙為神明名稱萬端其能越于二物也哉此乾坤所以為易之門也然乾天而坤地天神而地明兩者未嘗不相為用在氣而不在形故曰以體天地之撰以通神明之德厚齋易學卷四十五
