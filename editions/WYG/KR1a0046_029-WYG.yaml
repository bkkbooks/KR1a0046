body:
  text: 厚齋易學卷二十九宋馮椅撰易輯傳第二十五經下篇巽兌巽下巽上巽贊曰重巽以申命說卦曰齊乎巽巽東南也齊也者言萬物之潔齊也又曰巽入也又曰巽為雞又曰巽為股又曰巽一索而得女故謂之長女又曰巽為木為風為長女為繩直為工為白為長為髙為進退為不果為臭其于人也為寡髪為廣顙為多白眼為近利市三倍其究為躁卦九家為楊為鸛雜卦曰兌見而巽伏也正義曰𧰼風之卦風行無所不入以卑順為體以容入為用朱子曰一隂伏於二陽之下其性能巽以入也其𧰼為風亦取入義朱子發曰柔在下而承二剛巽也巽以一隂在二陽之下取義卑也順也伏也入也卑以其下於陽也伏以其藏於下也入以其進於下也卑𧰼為風亦以其委曲而入物無所不順也右明卦義𧰼贊曰隨風巽君子以申命行事右明卦用序卦曰旅而无所容故受之以巽巽者入也林黄中曰自旅之巽變二五為剛而四為柔也豐旅二卦皆含巽象至是然後為巽李子思曰震一索而得長男巽一索而得長女則二卦自當次乾坤之後然而序易者以乾坤坎離居上經以震艮巽兌居下經蓋以八卦經緯于六十四卦之間有深意也乾先而坤次之坎先而離次之震艮先而巽兌次之皆陽先而隂後其義灼然不可誣也右明卦序小亨利有攸往利見大人贊曰剛巽乎中正而志行柔皆順乎剛是以小亨利有攸往利見大人案諸家止述贊說此􅂏蓋主六四一爻立象雖是六子之卦然易之為例凡二隂在上者以震上立本二隂在下者以艮下立本觀其爻之往來升降以立卦象諸儒所謂卦變孔子所謂變通者趣時者也此卦一隂在下則二當為六乃成遯卦今六自二升四九自四降二則成巽而不為遯所謂小者六也自下而達上近君位亨也利有攸往亦言六自二往四則不為遯也利見大人亦是六居四則宻親九五而隂陽之情相得也專主立一卦之本者當在四一爻故其爻為田𫉬三品右明卦占初六進退利武人之貞贊曰進退志疑也利武人之貞志治也陸希聲曰體柔性巽不能果决耿睎道曰巽為進退為不果又在其初難知之時則進退尤甚張子厚曰進退者柔不自决之𧰼也李氏曰處重巽之下其巽已甚一進一退疑而未果也右明𧰼李仲永曰武人行令必三令五申不妄動也郭子和曰臨事以武人之貞斯无進退之疑矣李去非曰利武人之貞者贊其决也蘭惠卿曰武人指本爻也履之六三亦以隂象武人右明占案巽為進退獨於初六遽言之何也進退者在三畫之巽則主隂一爻前過二陽之象詳具說卦下在重卦之巽則主下一爻矣隂主肅殺凡武人之𧰼必隂爻然而居陽位則志剛隂位則非其物宜初位陽故隂居之為武人在下者隂之貞也履之六三亦以隂居陽位為武人之象在衆陽之中則又有統帥之象巽之武人下卦之帥也履之武人全卦之帥也故履又有大君之象卑弱過巽進退无斷若用其隂為武人以行事則果决以臨事則有斷以出令則三令五申而必行又守居下之貞在巽之時无善於此者故利作易者開陳兩端以指其所之如此馮當可曰以隂柔卑巽處最下唯武將居功名之盛則宜用此爻痛自貶損乃可粗安士君子用之則失中矣此最得經㫖李季辨曰人唯以志為帥則不為血氣所動帥言武人不動言貞亦為善説易右明爻義九二巽在牀下用史巫紛若吉无咎贊曰紛若之吉得中也鄭少梅曰巽以陽爻為牀簀而隂爻為足四陽行列簀之象也二隂四耦在下足之象也九二牀之東首上九牀之西首而足傅之故有巽在牀下之象林黄中曰初爻牀下之象此爻下從初六巽伏於牀下之象又曰史職卜筮者也巫職禱祠者也張舜元曰兌為巫互體也劉氏曰史傳人言於神巫傳神言於人毛伯玉曰巽初民之𧰼也牀者二也長民者也古者席地而坐唯長民者坐于牀示不抗也巽而在牀之下近民之義也夫近民則必深知其所疾苦矣故祝史為之延福巫醫為之除病凡為民害者紛舉而更張之所以吉也民之所喜誰其咎之前代不得而考矣周官史掌卜筮巫掌祓禳卜筮所以占其吉凶祓禳所以除其烖害也諸說支離唯毛說可通巽在牀下屈己以近民也有利當興用史以占其吉凶有害當除用巫以除其疾苦至於卜來歲之稼帥旱雩之舞又皆唯所用之不特假象而已紛若云者言其急於斯民疾苦之去不一而足也吉云者其事之得也无咎者斯人不得而咎之也爻无應於上而宻比於初隂陽之情近而相得故其𧰼如此若夫九五之君在上而不相應故有用史巫以通於幽明之𧰼右明𧰼占九三頻巽吝贊曰頻巽之吝志窮也朱子發曰猶人行至水之厓欲前得乎案頻復者頻於外反之内也頻巽者頻於外卦又一巽也夫巽卑順之謂也初在最下而以隂處陽故必用武人之貞然後不過於卑二在中而以陽處隂故必用史巫紛若然後不過於順皆有所假借以濟其過巽也今此爻居下卦之上又以陽居陽庶幾柔亦不茹知不過於卑順者而六四當其前又頻於巽則未能自脫於巽故吝說者不知今古文之變失頻之義故皆无足据右明𧰼占蘭惠卿曰頻復則无咎頻巽則吝何也蓋復者改過也聖人不重无過而重改過重改過所以无咎頻巽則以其重剛頻巽非其本心所以有吝右明爻義六四悔亡田𫉬三品贊曰田𫉬三品有功也李泰發曰易之稱悔亡皆本有悔以處得其道故其悔可亡處巽之善莫如此爻故悔亡而反有𫉬也趙氏曰下卦三爻皆順之如田之𫉬三品也程可乆曰初六以柔順剛固已利武人之貞矣至本爻然後用武而有功田𫉬三品用武有功之象也爻有貴賤之等故曰三品案以六居四過于卑巽本有悔也以在上體以巽接下故悔亡而下卦三爻皆為所𫉬以事六五謙巽之君此古者大臣事君以人之道也以巽接下故下皆赴之九三以剛居陽又在下體之上乾豆之象也初六與己配應賓客之象也九二上應九五之君充君之庖之𧰼也六隂武事之象故取於田右明象占毛伯玉曰初為下卦下之巽也四為上卦上之巽也下巽其上嚴其分也上巽其下重其本也此爻所以悔亡而有三品之𫉬也不言其徳而遽言其報易蓋有即以爻畫為象者所謂象學也以下三爻為民故曰三品右明爻義九五貞吉悔亡无不利无初有終先庚三日後庚三日吉贊曰九五之吉位正中也朱子發曰五居位而正中故舉全卦以盡一爻之義蘭惠卿曰巽貴于柔順今以九居五雖若未盡然五者君位人君之巽苟柔弱過甚則失威望而反自悔矣今能以正自守則吉而悔亡馮當可曰巽則易于失貞貞徳近剛者也巽而貞猶曰柔而立悔亡无不利宜矣朱子曰有悔是无初也亡之是有終也案居巽而重剛宜有悔也唯其居尊位大中而有當其位且陽剛居上其徳貞矣一貞而遂吉其悔乃亡又无所不利所謂貞夫一者也夫以剛居上則巽而有立以剛接下則巽而行權是以无不利也初雖有悔而終乃悔亡是謂无初有終說者多以无初有終對蠱之終則有始為義然此爻辭也蠱蓋孔子之贊義不相蒙右明貞吉悔亡无不利无初有終程伯淳曰自甲至戊己春夏生物之氣已備庚者秋冬成物之氣也故有所更革李氏曰蠱者事之壊先甲後甲者所以修而飾之使復于興起巽者事之權先庚後庚所以推而行之使適于變通主巽以行權為義楊廷秀曰甲于五行為木巽為木蠱之下卦巽也故言甲庚于五色為白巽為白故言庚案庚甲先後於蠱備論之矣此言蠱之變故蠱之􅂏言先後三甲而此爻乃言先後三庚也或曰此六子純卦而乃後于蠱乎曰此重卦也非八卦也重六子之卦散于諸卦之間何獨後于蠱乎右明先後庚程可乆曰本爻蠱之變先後庚者申命以防蠱與先後甲之義通鄭少梅曰上九喪其資斧者過中也九二之用史巫者得中而未正也九三之頻巽者无位而失中也然則權以有位而得行者非九五乎馮當可曰蠱者事無小大皆當窮知其始末故于􅂏言之巽者人主所操天下之大權蓋安危禍福之機不可忽也故獨于九五言之義甚著明右明爻義上九巽在牀下喪其齊斧貞凶贊曰巽在牀下上窮也喪其齊斧正乎凶也朱子發曰以巽而居髙位處之不當窮則變而反下牀之下初六是也九二近初隂陽之情相得故反下從于初為巽而在牀下之象本爻為巽而以剛徳居髙位上窮而失其所守故窮上而反下則亦下從初六與九二之象同右明象李季辨曰二處下體巽在牀下未害也己處上體巽在牀下則反失威重古人有行之者周之夷王是也下堂而見諸侯似未害其為巽而諸侯反不至也喪其資斧失所操矣所操在剛德而上窮反下是以雖貞亦凶陽以居上為貞而陽窮于上非巽也非巽則貞乃剛之貞非巽之貞也失巽之貞故凶右明占案巽之義主乎卑下而順故上下二體皆以陽剛居上為凶吝三雖居上猶在下體之上故止于吝上在上體之上故雖貞亦凶初二在下得巽之體雖過于卑下終無凶義四五在上非巽之體雖各當位僅得悔亡右明六爻兌下兌上兌贊曰兌說也說卦同又曰說以先民民忘其勞說以犯難民忘其死說之大民勸矣哉雜卦曰兌見而巽伏也胡翼之曰其𧰼為澤其性為說朱子曰一隂在二陽之上喜之見乎外也其象為澤取其說萬物說卦曰兌以說之又曰說言乎兌又曰兌正秋也萬物之所說也又曰兌為羊又曰兌為口又曰兌三索而得女故謂之少女又曰兌為澤為巫為口舌為毁折為附決其于地也為剛鹵為妾為羊九家為常為輔頰右明卦義象贊曰麗澤兌君子以朋友講習右明卦用序卦曰巽者入也入而後說之故受之以兌兌者說也程正叔曰物相說則相入相入則相說兌所以次巽也林黄中曰巽之反也自巽之兌二五不動四爻相易而成也巽入乎其中然後說見乎其外物之至情也右明卦序亨利貞贊曰剛中而柔外說以利貞是以順乎天而應乎人正義曰惠施民說所以為亨以說說物恐陷諂邪利在於貞李子思曰以陽下隂隂陽相說故曰兌亨亦猶咸之所以為亨王介父曰說則亨矣非貞而後亨也朱子發曰二五剛中而五又正乃戒之以利貞者二三四不正不正則陷於邪諂悔吝將至李子思曰三女之卦􅂏辭必以歸于中正者戒之蓋隂柔之性多无所守而兌說之質最為易流乃若三男之卦直論其卦之徳而不復戒之以利貞者陽剛之性不至牽溺也右明卦象占初九和兌吉贊曰和兌之吉行未疑也耿睎道曰九二剛中之君子也說而與之和故吉馮當可曰隂陽必相說二說於三者也唯初逺於三與二相比不為二所疑和同无間林黄中曰和如和羮同如濟水晏子之言和與乖對同與異對以陽剛居兌之初君子之正者也比乎九二得其𩔖也和而說之不亦可乎右明象占九二孚兌吉悔亡贊曰孚兌之吉信志也程正叔曰承比隂柔說之當有悔剛中故吉而悔亡馮當可曰比三而說之說而信必其誠可信也故有說之吉无說之悔以中正剛明故也鄭舜舉曰成兌之主在三初逺之二比之逺之者不流於說雖同體和而不同也比之者其情宻其交深其能悔亡者陽剛而得中也案隂陽之情近而相得則相孚非正應本有悔也唯其以剛明中正而合故相說而吉其悔乃亡右明象占六三來兌凶贊曰來兌之凶位不當也程正叔曰隂柔不正說不以道者也來兌就之以求說者也比於在下之陽枉已非道就以求說所以凶也程可乆曰柔自外來乗剛不能安於非據之位故凶案六自九來居失尊位而說下兌澤非坎水比也坎水潤下而兌澤以上出為功觀坎兌之畫可見矣今澤不上出而下趨此澤之漏泉者也故凶况三之位自多凶乎說卦論三五多凶多功之殊曰貴賤之等也然則失貴得賤其凶可知􅂏贊所謂民之勞死者皆指此爻也右明象占九四商兌未寜介疾有喜贊曰九四之喜有慶也李仲永曰兌正秋也於五音為商程正叔曰兩間謂之介分限也地之界加田義乃同也介轉注作界從五正也說三邪也四近君若剛介守正將得君以行道為有喜也朱子發曰上從於五則君臣相說而有喜矣案商義難明皆謂商度之商六經未有此義恐當是後世之語不可以訓也按說文從外知内曰商差可通蓋兌道上行所謂商兌之義屬於五不屬於三也五在外四在内從五知四為商兌蓋四五相說也其未寜者以六三為之疾也六三之為疾何也六三下有二上有四皆隂陽之相比者也二同體而道上行則三无意於二者也上行則四矣而四又屬意於九五之君介然不容六三之相參六三又隔上下之體近而不相得則疾四之從五而不從已也是以四之說五而三為之疾而未寜唯四能介然截止六三之我疾而有君臣相與之喜兌正秋中二爻當八月之氣故因取商象猶履之禮噬嗑之市合聲同則義通也介離互體也剛外故疾不能入與本卦之柔外其取象又别右明象占鄭少梅曰下二爻陽氣猶盛七月之象中二爻隂陽中分八月之象上二爻隂過於陽九月之象所以九四言商以見震角離徵坎羽之音也郭子和曰兌道上行四舍三比五上行也至於九五比上失在小人蓋亦上行之象雖其性均本乎象而得失之異則係乎爻王介父曰易之文稱仇稱朋稱介稱疇稱夷皆稱其事而立辭右明爻義九五孚于剥有厲贊曰孚于剥位正當也林黄中曰剥柔變剛也小人而變君子也九五上六一隂一陽相近而合故有孚于剥之象李季辨曰小人之說君將以剥君子也程正叔曰說之惑人易入而可懼也如此李仲永曰秋則百果皆剥鄭少梅曰九五言剥以見震夬離遘坎復之理朱子曰此爻與履五同六十四卦縱衡血脉皆相通貫故履中有夬兌中有剥此不可以目前之象數拘也此爻則少梅之說得之震之終三月為夬兌之終九月為剥離之中五月為遘坎之中十一月為復坎離震兌在八卦未重言之則四卦各主一方一方各配一時漢儒卦氣以四卦主四時蓋本乎此而其失則依倣而託之者也兌中有剥象數如此右明象王介父曰有厲者不必厲而不能必无厲之辭郭子和曰居中正之位而有厲何哉蓋兌之象上行上親容說小人之徒是以危也朱子曰陽剛中正然富說之時宻比上六故其占但戒以信之則有危程正叔曰雖舜之聖且畏巧言令色孔壬安得而不戒右明占程可久曰九二九五同為隂所乗而所孚不同者二隂位不過剛故孚兌本爻以剛居陽故孚于剥孔子所謂位正當者如此林黄中曰五雖當位而下无應上下雖說而未必隨故上六之心未可保也若以六居二則當位而有應天下隨之矣故隨之五曰孚于嘉吉李仲永曰五爻皆有所說而稱兌此爻獨不稱兌是以為兌之主案卦有君有主君五位也爻不係也主成卦之爻也位不係也震以初九九四為主離以六二六五為主六子之卦可例而知矣復以初九為主遘以初六為主大畜以上九為主需以九五為主五十六卦可例而知矣成兌之主内卦在六三外卦在上六故内卦則曰來兌外卦則曰引兌今九五特兌之君非兌之主也其不稱兌者以剥易兌作易者之特筆也右明爻義上六引兌贊曰未光也朱子曰成說之主引下二陽相與為說而不能必其從也故九五當戒而此爻不言吉凶楊廷秀曰賢人在上引其𩔖小人亦然上六兌說之小人必引六三來兌之小人毛伯玉曰所以為兌者三與上也三為内卦故曰來上為外卦故曰引案兑象上行前者引後者說而隨之雖爻位承乘得失不同而大約如此上為兌主而莫先焉此引兌者也吉凶悔吝則係乎所引者也近而引之必隨者五也五剛中正之君引之以當道可也以柔佞說之引之以非道不可也同徳而應引之可隨者三也三之六本自五來今以引而復五可也復五則成大壯於隂柔小人不利而陽剛君子則利也其餘相逺各有隨也唯所引之而已矣右明象占朱子發曰引六三之小人也初九剛正不疑於三而行九二剛中孚于三也而悔亡九四以三為疾九五則孚于上矣然不引五而引三則小人以說進而為害其可不慮乎右明爻義王景孟曰兌為口六爻之辭皆簡而嚴抑以騰口說為戒與蘭惠卿曰在兌之時又尚隂柔則是柔佞以求說者也唯剛正有守則為誠實而不陷於邪媚故六爻以陽剛為吉隂柔為凶案澤水不下流以上出為利坎下一耦畫閉塞成兌乃其象也初和二二孚三三疾四四商五五孚上上在前而引之其道上行也初和而四商二孚兌而五孚剥三來而上引所謂動於地之下則應於天之上也右明六爻厚齋易學卷二十九
