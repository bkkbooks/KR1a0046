body:
  text: 厚齋易學附錄二宋馮椅撰先儒著述下京口說義周易說義十四卷凡七卷各分上下京口都絜撰知徳慶府陛辭日有劄繳進紹興乙亥張九成子韶序以為其父為邦師法尤邃於易以所聞於其父者為之傳先於理而次以象義毎卦終又為統論絜字聖與丹陽人父郁字子文終恵州敎官程可久云作周易變體推廣沈丞相小傳如觀之九五不言本爻之辭獨論剥六五推象數過當然他處亦不皆然也胡銓傳中興書目周易傳十卷乾道中敷文閣直學士胡銓撰銓字邦衡廬陵人號淡菴李直院解李直院易解八卷李椿年字仲永饒州浮梁人嘗直學士院門人吳說之編集淳熈乙未龍圖閣學士胡銓序又有吳說之問疑二卷右諫議大夫謝諤跋其說専主王輔嗣二五君臣論二五君臣論閭丘昕字逢辰與胡寅明仲在三舎為友同出胡文定公之門此書明仲多潤色之其說謂卦以六爻而成而二臣位也五君位也六二九五君臣之正體也若以陽居隂為九二則臣有時而失之强以隂居陽為六五則君有時而失於弱葢作於紹興間意有所属也乾道辛夘嵗張栻序其書五峰外傳五峰胡先生集有易外傳自屯至剝多引史事苦無經指胡文定公安國之子宏字仁仲張侍講易說易說十一卷題南軒先生張侍講侍講名栻字敬夫廣漢人南軒其自號也其學出於五峯胡仁仲以周程為宗李宏解易解潼川府路轉運判官李宏撰有進表蜀合小舟芸閣三家解刋之共三十卷宏於雜卦後又有餘意一卷小舟解易解三十卷合李宏芸閣三家題小舟先生李開去非撰漁樵易鑑漁樵易鑑十二卷蘭廷瑞字恵卿自序稱白雲溪箋釋上下經六卷繋辭二卷說卦序卦雜卦一卷圖說二卷外編一卷自謂於先儒未嘗蹈襲未嘗求異惟其是而已始於紹興己夘成於淳熈己酉三十餘年又撰日月運行二圖說一編無階自進於九重欲傳諸方䇿則漏泄神機必致天禍未免與糞土俱腐云縉雲易解易解六卷題縉雲先生孫男興祖編按馮時行字當可蜀人易論三卷著于篇首止六十四卦常言易之象在畫易之道在用其學傳仙井李舜臣隆山易本傳易本傳三十三卷題西蜀隆山李舜臣撰淳熈己亥自序其說以為易起於畫虙犧以畫寓心而文王孔子因畫以明心之用舜臣字子思程可久以為其學出於馮當可馮集中亦及其名今觀當可之易若不相似然葢其後又自有得也其子道傳立朝繳進付祕閣趙寺丞易說易說二卷題趙善譽上進毎卦為一篇序云求之象數十有餘年而不得求之傳注又多牽合牴牾而不通盡屏衆説一意孔子之易本畫卦命名之意參稽卦爻彖象之辭以貫通六爻之義而為之說善譽嘗為九寺丞将漕湖隂臨遣之時進此書錫以褒語本朝宗室前此未有推明經學者葢自善譽始林寶文解周易經傳集解三十二卷繫辭上下二卷文言說卦序雜本文共為一卷河圖洛書八卦九疇大衍總會圖六十四卦立成圖大衍揲蓍解共為一卷淳熈十二年乙巳直寶文閣權發遣潭州林栗表進付祕書栗字黄中其說毎卦必兼互體約象覆卦為太泥耳楊誠齋傳易傳二十卷題廬陵楊萬里學淳熈戊申自序其子長孺云自戊申至嘉泰甲子脫藁閲十七年而後成書嘉定元年臣寮申請得㫖給札其家抄錄宣付祕閣其說本之程氏而多引史傳事證毛氏傳易傳十一卷瀘川毛璞撰字伯玉嘗持潼川憲節嘉泰元年自序始涉其流稍出已見參以諸家之長讀之三十年知先儒之說與前日所見皆未也觀象按畫以定其名因卦分爻以盡其變此名與此卦相當此詞與此爻相得而因以得犧文孔子之心又有外傳易辨歴詆先儒之失似亦有理然所略取者王弼二蘇葢所學異也西谿易說易說十二卷題西谿先生多所發明慶元戊午李過自序謂幾二十年前有序說以毛漸三墳為信誤矣過興化人字季辨晚年䘮明棄科舉授徒童溪易傳易傳三十二卷題童溪先生淳熈丙午林焞序王宗傳字景孟臨安人由太學上舍免省童溪其自號云強恕解易解若干卷題強恕解柴元裕字益之饒州餘干人自少覃思河洛之學以經義敎授鄉里兩為鄉舉首亦有書解俱傳于世南溪解說卦上以後五篇解柴中行字與之亦餘干人強恕之族子也由太學上舎登第終祕書監南溪因所居自號與其弟中守撰之俱受學於強恕而得其學云關子明傳中興書目易傳一卷後魏關子明撰唐趙蕤注著其傳於篇端云魏孝文帝使并州刺史王虬與子明著成疑筮論數十篇即今易傳是也子明名朗河東人孝文崩虬卒遂不仕居臨汾山在汾州授門人春秋老易號闗先生其卜筮既定吉㓙必歸之人事蕤恨此書亡篇過半無能銓次但隨文解義阮逸後序云常讀文中子知王氏易宗於子明後於卜人徐生處得其易傳文已殘闕注文名㽔者本無姓氏或謂趙子趙隋人其時相接故議以趙蕤生為定注謂著長短經此星厯家淺術也逸銓次篇目重加刊正中有青龍朱雀之說疑卜人加而刪去之李侍郎壽翁刊于當塗郡齋乃十篇其篇目并文不見所謂疑筮者亦無殘闕說易亦非本指恐偽託之者也未知館閣所藏有無異同按隋志不錄亦可疑也壽翁名椿年一字仲永易通論中興書目易通論一卷凡五篇唐志宋處宗撰而今本題晉阮嗣宗撰書目云似非晉人之文崇文總目亦無之干寶傳中興書目周易傳十卷晉干寶撰其學以卦爻配月或以配日時傅諸人事而以前世已然之迹證之訓義頗有所據要自是一種非本指也按隋志梁有寶撰周易宗塗四卷已亡名義又與此異崇文總目皆無之疑亦偽本寶字令升新蔡人房審權亦采錄啓源中興書目易啓源十卷唐太子左諭徳蔡廣成撰皆問對語以徳常徳言徳庸徳翰分為四目啓𤣥中興書目易啓𤣥一卷前壽州司法張韓撰凡有七門五十條案揲蓍古法云唐中書舎人張轅撰未知孰是物象釋疑中興書目唐守江陵尹東鄉助撰其說以象之所生生於義也有斯義然後明之以物如以龍敘乾以馬明坤之類采注硫未釋者標出崇文緫目云取卦互體開釋言象葢未始見康成之學而著此書周易揲蓍法中興書目周易揲蓍法一卷序云廣政壬戌嵗青山人以闤闠揲蓍法鄙俚乖違故依正經及注疏集出廣政孟蜀年號也揲蓍古法中興書目揲蓍古法一卷本朝紹興中開封鄭克撰以今之言揲蓍者或不取四營成易不待三變成爻而謂之小衍或不揲右手所分不數小指所掛而謂之新譜故列舊法使有可據克字武子正心易法麻衣道者正心易法四十二章章四句句四言題希夷先生受并消息李壽翁刋于當塗熈寧三年廬峯隠者李潜幾道後序云得之廬山一異人注或云許堅或有疑而問者應之曰世有能作之者乎雖非麻衣是亦麻衣之徒者也竊謂麻衣止是善相陳圖南引以相錢若水耳未聞易能相人也必廬山隠士有粗知易者撰為此書又自解釋託之圖南以傅會其說耳雖李潜亦不敢為決然之辭欲託之許堅而不敢正言乾道間南康戴師愈孔文始為之跋以行未可據也其間亦粗有小小得處而謬妄實多毛伯玉曰其說謂學者當於羲皇心地上馳騁無於周孔脚跡下盤旋此理誠有之然専論互體卦變此漢儒之說而謂之羲皇心地孔子之所不及疎矣哉易龍圖中興書目易龍圖一卷本朝處士陳摶撰摶字圖南亳州人隱居華山三峯賜號白雲後賜號希夷邵子文云摶好讀易以數學授穆修伯長伯長授李之才挺之挺之授堯夫以象學授种放放授許堅堅授范諤昌毛伯玉曰挺之易學専論象耳未嘗及數學也子文既分象數為二而又以為其象學殊不可曉希夷故是異人神仙與學問自是兩途子文堯夫子也大易源流圖證墜簡中興書目參讀書志大易源流圖一卷天禧中毗陵從事范諤昌撰其說先定納甲之法以見納音之數諤昌建溪人又撰周易證墜簡一卷自謂其學出於湓浦李處約李得於廬山處士許堅其書酷類郭京舉正如井彖木字為水頥爻頥字作經之類震彖辭内脫去不喪匕鬯程正叔取之漸上六疑逵字胡翼之取之新注周易卦徳通論易數鈎隠通神中興書目云新注周易十一卷本朝太常博士劉牧撰吴祕表進田況序牧字長民彭城人仁宗時言數者皆宗之又有周易卦徳通論一卷論元亨利貞四時易數鈎隠圖一卷采摭天地奇耦之數自太極生兩儀而下至于河圖凡六十四位㸃之成圖於圖之下各釋其義讀書志云凡四十八圖并遺事九歐陽永叔序而其文殊不類吴祕又撰周易通神一卷凡三十四篇注云所以釋鈎隠黄黎獻受之於牧祕受之於黎獻久之無傳因作通神以奏之黄黎獻略例室中記師隠訣中興書目周易略例一卷本朝黄黎獻撰黎獻學易於劉牧采摭其綱宗以為略例一本總之於新注周易以通神為第十四卷略例為第十五卷此為牧之學者集而為一書也黎獻又以學易於牧筆其隠訣目為室中之記一卷題室中記師隠訣易源中興書目易源一卷本朝太常博士常豫撰范陽盧經序云易之藴數世莫得傳劉既能窺其端常乃善繼其序總斯大㫖著乎六篇命曰易源劉謂牧也豫字伯起河内人圖義中興書目周易圖義二卷治平中職方員外郎葉昌齡撰昌齡錢塘人以劉牧鈎隠圖之失遂著此凡四十五門鄭揚庭周易傳時用書明用書傳辭傳辭後語中興書目本朝鄭揚庭撰時用書二十卷明用書九卷易傳辭三卷傳辭後語一卷揚庭江東人其傳云夬字揚庭皇祐中登進士第復中說書科後以字為名而字明用葢為說易也林俛序時用書云揚庭補春秋傳測易賛連山歸藏外撮羣經大要諸子餘論成書一十九卷明測至明象十五篇皆以易為説明書明詩明春秋明禮樂四篇并次例一篇共二十卷謂古今聖賢與六經無非出於易亦無非可用者揚庭自序明用書云先儒已具乎用從而明之非已作也明測明數明象明書明詩明春秋明禮樂七卷與時用書同間有詳略有明太極明三易二篇時用書無之案劉鄭注周易首云鄭著辭六卷緫為傳辭今所存者第十卷明數第十一卷明象十二卷明傳井氏書此下有道字其墓誌云著江東易傳十二卷行於世井氏書有之又有明數明象明傳道明次例明範五篇在易傳之外竊意揚庭初為時用書後著易傳却刪時用書為明用書以與易傳並行後人或以為傳辭或循其時用書之舊是以複出如此姚嗣宗謂劉牧之學授之吳祕祕授之揚庭雖不及黄黎獻而要是牧之源流不疑邵堯夫乃言揚庭竊其學於王豫沈存中亦謂揚庭之學似堯夫云先天圖本朝邵雍撰易先天圖外圓内方其說曰圓者天也方者地也雍字堯夫河南人諡康節前知來物其始學之時睡不施枕者至三十年然而數學也惟毛伯玉論之為詳謂堯夫之筮虞翻管輅郭璞之學也堯夫之數陸績趙實李淳風之流也獨其人品髙耳若其精於數則所深諱也故避其名而自託於易述先天之圖推卦變之說衍大𤣥之象邵氏既託之易以自神其數學者每神其數而併信其易世傳邵氏易全解殊淺謬意後人假託耳抑觀子文所敘堯夫之學葢自陳希夷陳授穆李此數學也而堯夫易學大抵専於論象則託之象以隠其數爾堯夫得司馬君實以尊其學得程伯淳以誌其墓相與交推其所長而不言其所偏故世莫得而窺之然伯淳兄弟亦有抑揚其誌墓也言其學出於穆李而不言陳摶君實又自祖太𤣥不傳其易學云述衍通變中興書目述衍十八卷乾道中兵部員外郎張行成撰以易數生於衍因先釋繫辭之說而後析衍法窮源流命曰述衍又撰通變四十卷以邵堯夫之學祖於象數三圖其用皆起於交交則變今演解之命曰通變交者世俗以三錢擲卦背面之名前人詩云呵錢卦爻是也易軌讀書志易軌一卷偽蜀蒲乾貫撰專言流演其序云可以知否泰之源察延促之數葢數學也晁以道云劉道源十國紀言乾貫作虔觀童子問中興書目易童子問三卷本朝太子少師歐陽修撰設問辭以見義修字永叔廬陵人易筌中興書目本朝太常院丞阮逸撰凡三百八十四筌皇甫祕易讀書志本朝皇甫祕撰周易述聞一卷隠訣一卷補解一卷精微三卷又有紀師說辨通為八卷易說拾遺中興書目易說拾遺二卷題王安石尹天民所編温公易說繫辭說中興書目易説一卷本朝尚書左僕射司馬光撰首篇設問荅語後有繫辭雜說晁氏云雜解易義無詮次未成書也光字君實陜州人封温國公又有繋辭説二卷前袁州分宜主薄劉彥校正本聖斷中興書目周易聖斷七卷元祐中左諫議大夫集賢殿修撰鮮于侁撰毎卦為一篇皆斥王弼之失侁字子駿閬州人晁氏云本之王弼劉牧而時辨其非且云衆言淆亂則折諸聖故名曰聖斷意藴凡例總論卦變解中興書目周易意藴凡例總論一卷皇祐初徐庸撰庸東海人以注疏漶漫故著論九篇始於易藴終於大衍又撰周易卦變解序云皇祐初述周易凡例粗驗彖辭然未罄萬事之變閲唐李氏所集諸儒易注遂成周易卦變解二卷葢明卦有意象爻有通變以矯漢魏諸儒旁通互體推致之失發隠中興書目周易發隠二十卷嘉祐中陳良獻撰序云自第一卷首序乾坤至十二卷有疑義者輒著于篇所以尊卦徳也自第十三卷至末明天地之數隂陽五行之變所以終其要也乾生歸一圖中興書目乾生歸一圖嘉祐中石汝礪撰石英州人取乾為生生之本萬物歸於一也畫圖著論共十卷讀書志止兩卷云先辨卦彖爻象之别後列數圖頗雜以釋老之說意學中興書目周易意學十卷題齊魯後人陸東撰云欲撰易決藴難就今祗成此書亦如前代傳易之說河圖傳中興書目河圖傳一卷政和中朝奉郎李平西撰刪定易圖序論中興書目刪定易圖序論六卷本朝李覯撰凡十九篇六十四卦賦中興書目周易六十四卦賦一卷題守大理寺黄宗旦序云頴川陳君不知名林徳祖易說中興書目易說九卷題林徳祖撰徳祖吳郡人朱氏三宫易中興書目三宫易一卷題朱氏不知名其說分圓宫方宫交宫以初二中四終為序任奉古發題中興書目周易發題一卷本朝成都鄉貢三傳任奉古撰陳髙八卦數圖中興書目八卦數圖二卷莆陽陳髙撰林鯈變卦變卦纂集易說中興書目變卦八卷本朝右迪功郎林鯈撰其說考甲子通數以八卦定八方並以乾坎艮震巽離坤兊為序又有變卦纂集一卷易說十二卷夏休講義中興書目周易講義九卷紹興初紹興府進士夏休撰其說以言動制器卜筮四尚之說綜而通之以承乘比應為例休會稽人卦類中興書目周易卦類三卷不知作者本王弼注分八卦畫以類相從明疑錄中興書目周易正經明疑錄一卷不知作者設問對二十九口義中興書目周易口義六卷不知作者書多殘闕外義中興書目周易外義三卷不知作者多按諸經傳以釋注疏之言環溪璇璣易璇璣三卷環溪先生吳沆撰毎卷九篇雜論易義又有易禮圖說前有或問六條圖說十二軸沆字徳逺臨川人環溪所居也厚齋易學附録二
