body:
  text: 厚齋易學卷二十四宋馮椅撰易輯傳第二十經下篇困井坎下兑上困賛曰剛揜也王景孟曰陽爻雜于羣隂之中為之揜隔此君子不偶之象也李子思曰以二體觀之坎陽在下兑隂在上此剛為柔所揜也以六畫觀之下卦一陽䧟于二隂之間上卦二陽處于一隂之下此亦剛為柔所揜也剛為柔所揜是君子見困于小人者也陸希聲同于氏曰乾上九降居于二降而之險坤六二上為上六而揜剛成困之義朱子發曰君子窮困窒塞之時李氏曰時可以為而材不能為者弱也非困也材可以為而時不得為者困也非弱也以剛動之材而見揜于隂然後為困李氏元逹曰若蹇之能止則知足以避若需之不䧟則義無所窮困之為卦上下二剛皆揜於柔若无所逃於天地之間此所以為困也案困者君子之窮三陽上下為三隂包承揜原缺不能出下卦陽也而陽寡䧟于二隂之中上卦隂也陽雖衆而在一隂之下隂為之主此陽剛之困君子之窮之象也右以内象明之象賛曰澤无水困程正叔曰水在澤上則澤中有水也乃在澤下則枯涸无水之象朱子曰水下漏則澤上枯劉氏曰旱暵之時也右以外象明之旱乾澤竭苖則困矣説卦曰困德之辨也又曰困窮而通又曰困以寡怨雜卦曰井通而困相遇也李子思曰易者憂世之書也文王羑里之難悼世路之險艱以憂患之事寄之于易如屯需訟剥遯睽蹇旅皆極天下憂患之象内以自警外以垂世其間最切于其身者明夷與困是也孔子賛易三陳九卦以白文王淵懿之心蓋困窮之際可以觀人孔子陳蔡之厄實似文王孔子之於易蓋以其行之於身見之日用者而載之于書夫豈空言㦲右明卦義象賛曰君子以致命遂志右明卦用序卦曰升而不已必困故受之以困林黄中曰自升之困巽反為兑坤變為坎上下相易而成也升之上六其象為宴升升而不已也其困必矣李氏曰水澤之氣上升而及物今水在澤下无上升之義故有无水困之象世有詠蝸牛者曰升髙不知囬竟作黏壁枯其是之謂歟右明卦序亨賛曰險以説困而不失其所亨其惟君子乎正義曰君子處困而不失其通之道故曰困亨耿睎道曰君子不能無困困而不害為君子者處困有道也説以險困而不失其所蓋處困之道趙氏曰在險而能説則無入而不自得矣其於處困也何有此聖人明卦垂訓之意也張敬夫曰困窮而通固未嘗无可亨之理朱子曰身雖困而道則亨也案困之時九五以剛中之材下九二同德之臣相與以濟困之厄是以能亨右明卦象貞大人吉无咎賛曰貞大人吉以剛中也范諤昌謂脱无咎二字非也舉經文一隅而義在其中傳多如此程正叔曰困而能貞大人所以吉也以其有剛中之道也劉氏仲平曰萃之辭曰利見大人亨困之亨施於君子而不施於大人此其所以為困也夫剛中非終於不可為也難極否終則可為矣張敬夫曰唯大人為能處之天下之人困大則失節小則憂殞凡以中不剛耳毛伯玉曰大人正位乎二五則其卦安得為困此所為用易也夫剛之困于柔猶人困于疾耳使易専論其困而无以通之是能切􅍺審病而不能因病用藥也如是則安用作易是故設卦之初因象以命名以其不交也正之曰否以其遇險也正之曰蹇以其剛揜也正之曰困名既困矣則又因象而用爻此否所以可休蹇所以貞吉困所以吉无咎也案剛柔自乾坤往來于二與上而以九居五未始變也是之謂貞是之謂大人此其所以吉也困必有㓙咎今而吉則无㓙矣何咎之有吉无咎者與師􅂏之辭同有言不信賛曰尚口乃窮也九家曰隂從二升上六成兑為有言李子思曰六三坎耳不應故有有言不信之象程正叔曰當困而言人所不信朱子曰戒以當務晦黙不可尚口益取窮困李季辨曰當孫言以避禍案乾坤之二與上往來成困而九五為困之主未嘗變焉乾上九來居下卦之中同德相應此卦之所以為亨為貞為大人吉也至坤二徃上成兑之象而内坎不應乃有有言不信之辭揚子雲作太𤣥以凖易諸儒引之愚未敢盡非也且如此卦文王曰亨曰貞大人吉必有處困之道然後足以垂世示訓今子雲凖之以窮窮首曰隂氣塞宇陽亡其所蓋倣孔子剛揜之意而已失其指矣又曰萬物窮遽則是物終於困而已矣不亦戾乎右明卦占初六臀困于株木入于幽谷三嵗不覿賛曰入于幽谷幽不明也程可久曰臀體之在下者也謂本爻也陸希聲曰坎於木為堅多心株木之象石守道曰坎北方之卦幽隂之象劉長民曰坎流下谷也案井之九二為井谷亦下穴之象朱子發曰初覿四歴三爻三嵗也私見曰覿蘭惠卿曰臀所以坐謂本爻也株木斥九二也有應在四而礙九二不得徃從故曰臀困于株木在困之時處險之下是入于幽谷也坎之上六无應故曰三嵗不得今困則有應故言三嵗不覿馮當可曰以至柔居一卦之下處坎䧟之深上有九四之援而為九二所隔跬歩莫前坐以待之其困尤甚株木者九二也為九二所鎮壓而坐困也鄭少梅曰困因坎兑相重而成也兑正秋而坎正冬兑之一隂象乎始得秋而蔓草未殺故為葛藟之困六三秋冬之交蔓草之葉皆已脱而刺存焉故為蒺藜之困若初六在坎之下大冬之時也蔓草為霜雪所殺而靡有孑遺所存者株木而已三隂爻故繫以草木之象案困之時以柔居下在坎之底困之甚者也所望者九四出乎坎險有陽剛之材與已為應足以援我之困者而九二乗之居中得位厄我而不覿覿不敢正視之意雖自初至四所歴三爻有三嵗之象而終莫之遂也故凡株木幽谷皆九二之象不言㓙非所行之失也蓋所遇然也右明象占程可久日困之時承應皆不可恃也鄭舜舉曰剛揜於柔為困柔亦困乎曰成卦之義以柔揜剛爻則皆以困而取義故剛困終必亨柔困困之甚李子思曰猶坎之卦初爻入于坎䧟而不能自出者也困之六爻以柔揜剛其所以為險者在柔故凡隂爻之遇困皆其幽暗不明而自有以取之也困有亨之理者為君子設也右明爻義九二困于酒食朱紱方來利用亨祀征㓙无咎賛曰困于酒食中有慶也程可久曰酒食者人君之所以養賢朱紱者人君之所以飾下九五不應故困于酒食聲氣相同故朱紱方來耿睎道曰九五中正在上有需于酒食之材方困而施不及下而九二不得所欲故曰困于酒食然九五乃徐有説理不終困方将來而應下故曰朱紱方來亨祀者人臣之所以事宗廟者也祭祀者天子之所以禮百神者也臣得君然後能保宗廟而事之故九二朱紱方來則利用亨祀君得臣然後能主百神而禮之故九五困于赤紱乃徐有説則利用祭祀鄭少梅曰坎為赤乾為大赤二五之爻乾坎之爻也故坎象赤紱而九五象朱紱案此爻本乾上九與九五同體故二五有交相徃來之義爻當澤无水之時故困于酒食之匱以望九五之饋也張舜元曰有祭服然後可以亨祭祀此卦之體有諸侯公卿在廟承祭祀之象林黄中曰酒食者祭祀之所須也朱紱者祭祀之服也雖无酒食之豐也而不失朱紱之服以之享祀何所不可此君子所以亨也李去非曰需九五之需于酒食以酒食待人者也本爻之困于酒食以酒食而見困者也口腹之所欲而困于不足以給則猶孔子之絶糧于陳矣所恃以處困者朱紱方來也朱紱方來則二可以徃接紱所以飾下也利用享祀則飲福受胙矣其久困于酒食乎然不待之來而徃焉則非能安于困以待者㓙宜矣胡翼之曰征則㓙由已招復何咎於人右明象占劉氏曰所欲者不遂所惡者必遇唯困之時然也如株木如石如金車如葛藟此言遇所惡也如酒食如赤紱此言不遂所欲也水潤澤萬物猶酒食之養人故需之五困之二皆有酒食之辭五之應二必待能來二之應五必待能徃故皆以紱為象劉氏仲平曰本爻之至于亨祀九五之至于祭祀則天下无困矣困也者不可以有為也雖貞大人吉无咎矣征則必㓙又誰咎㦲曰征㓙无咎者戒之之辭馮當可曰當困時君臣未即相親唯専誠一意以相感如以事神明之心感接于五然後於患難之中必有來援之理曰利亨祀者以凡交神明之心當如困九二處險求濟之誠乃能感會幽明也程正叔曰卦二五以隂陽相應而吉唯小畜與困乃厄於隂故同道相求小畜陽為隂所畜困陽為隂所揜也案成卦之義以剛為柔所揜而剛困也然非剛不能以出困而二五之君臣以剛而中此困之所以亨而貞大人之所以吉也要必君臣處困窮之時同心德以相援然後能出故二五雖隂陽之正應而在困悴之中各有出困之材不容于不相援二䧟於二隂坎險之中而在下不如九五居尊位大中而下有九四之助為有能致之資可致之𫝑此二所以必待九五之下求然後應之也若不待九五之求而先徃以求濟前為六三之所揜九四之所阻其㓙必矣説者多謂二隂之間其征則㓙然於我為无咎審如此説則當云无咎征㓙不應于征㓙之後遽繫之以无咎也當與不節之嗟又誰咎也同義右明爻義六三困于石據于蒺藜入于其宫不見其妻㓙賛曰據于蒺藜乘剛也入于其宫不見其妻不祥也蘭惠卿曰隂柔則非出困之材无應則无救援之者上承九四故曰困于石下乘九二故曰據于蒺藜又無配耦故曰入于其宫不見其妻朱子曰石指四蒺藜指二宫謂三而妻則上六也蘇子瞻曰六三隂也而居陽自以為陽而求配上六不祥也困之三隂其始相諦交而揜剛其終初六之臀困六三之妻亡小人易合而難久李子思曰以其揜於剛而反為剛之所傷也右明象占案下卦之終困思出險前遇九四陽剛困于石者也前困于石則復據于下下遇九二之剛據于蒺藜者也九二在初之上初雖困于二而入于坎下之谷以自安不能傷初故象為株木今在三之下三前困于石而退據之九二必為害於三而欲其去故象為蒺藜進退不安復歸本位則上隂无配故象為入于其宫不見其妻疊斯三者㓙可知矣右明爻義九四來徐徐困于金車吝有終賛曰來徐徐志在下也雖不當位有與也劉氏曰志欲應初而疑二為難其來不決故為來徐徐二以剛在下象為方輪故謂之金車不當位吝也終𫉬所與有終也鄭舜舉曰凡易言徃徃外也言來來内也正義曰有應於初而閡於九二故曰困于金車李氏曰以剛居隂位雖不當而材足以有行終應於初而已故有終鄭舜舉曰有初以相與終必合也合則從正必能拯困右明象占李仲永曰困之六爻二與五三與上皆无應而初獨應四四欲從初而阻於二故其來有所疑而徐徐也程正叔曰唯力不足故困亨困之道必由援助困之時上下相求理當然也四以不中正處困其材不足以濟人之困初六比二二有剛中之材固足以拯困則宜為初所從矣四欲從初而阻於二故其來遲疑是困于金車也右明爻義九五劓刖困于赤紱乃徐有説利用祭祀賛曰劓刖志未得也乃徐有説以中直也利用祭祀受福也陸希聲曰五以剛中處位能去非􅁼小人救天下之困者也上六鼻之象六三足之象此皆隂爻揜剛之物故刑而去之馮當可曰為觧困之主視君子為小人所困豈化誨懐服之所可觧必用刑焉如去稂莠則嘉榖蕃上劓上六下刖六三三隂既服其辜君子之𩔖乃不困矣李季辨曰威福之權在已不過去上下之小人則君子亨矣用劓刑以去在上之小人謂上六也用刖刑以去在下之小人謂三與初也案兑西方金有劓刖刑人之象或曰劓以刑其上則柔不能以揜剛刖以刑其下則四不能以隔二於義亦通右明象程正叔曰赤紱諸侯之服取行來之義故以紱言人君之困由上下无與也五雖在困而有剛中之德下有九二剛中之賢道同德合而云上下无與何也曰隂陽相應者自然相應也如夫婦骨肉分定也二五皆陽爻同德而相求如君臣朋友義合也方其始困安有上下之與有上下之與則無困矣故徐合而後有説也郭立之曰上下皆揜於隂在常人處之受其困而已在有為之君必思所以去之故劓刖以困于赤紱故也閭丘逄辰曰困于赤紱乃諸侯不朝之象李仲永曰朱紱則外晦而内明陽含于中之色赤在外明著見陽熾於外之色陽含於中无為以臨人之道也陽熾於外有為以事人之義也采菽諸侯來朝曰赤芾在股車攻諸侯會東都曰赤芾金舄有事人之義也斯干宣王考室采芑方叔南征皆曰朱芾斯皇有臨人之道也赤紱朱紱皆祭服也赤紱雖不専為祭服然五下二下文皆有利用祭享之辭則知二之朱紱方來為天子方岳柴望之事五之赤紱為諸侯助祭之行其象如此故其占如此朱紱方來則以天子至于方岳也若徃朝廷則失之矣故曰征凶困于赤紱則以諸侯不朝王也唯九五刑去揜剛隔二之人乃始來助祭故曰乃徐有説説主兑言與有喜有慶同義李季辨曰上下小人既去則向者所困之赤紱乃徐徐而來以同德而相説也程可久曰利用祭祀與九二享祀之理同上下分殊故所用之祀異案易言利用禴利用享祀利用祭祀二簋可用享皆艱難相求之時如祭之有所求也禮簡而誠至也九四之來徐徐以困於二之金車九五之徐有説以困於未刖之四不然當困之時上下交相求助以出困四之於初五之於二豈容舒徐也哉右明占上六困于葛藟于臲卼曰動悔有悔征吉賛曰困于葛藟未當也動悔有悔吉行也馮當可曰葛之傅木最出木杪木杪上六之象也程正叔曰葛藟纒束之物臲卼危動之状鄭舜舉曰其應在三三以柔傅已而牽之困于葛藟之象也所比者五五以剛比已而難安臲卼之象也右明象朱子發曰曰發聲兑口之象毛伯玉曰曰云者自謀之辭李仲永曰自曰以上困之極也自曰以下處困之極而思有以通之也動固悔矣與其靜而无悔為困之窮孰若動而有悔為窮而通徃則吉也蘇子瞻曰曰不可動動且有悔而不知其不動乃所以有悔也上无揜我者則吉莫如征也耿睎道曰處困之終有自通之路知柔不可牽舍之可也剛不可乘去之可也毛伯玉曰危甚則求脱人之常情也困極則必通物之常理也上六處困之極外牽于葛藟内困于臲卼可以求説矣若曰動則有悔是无時而可出也案困之時柔既揜剛剛亦傷柔故多以同德相求以圖出困若二之於五是也三在坎險之上其位應上上當困窮而通之時可以圖出困者遂纒束牽聨而不可觧上欲求脱而莫之能也蓋亦柔而无斷故也是困于葛藟之象也况又乗九五大君之剛之上危而不安故心語口而懼動則有悔也夫動固有悔矣然舍三五而去則困可以出豈非計之得哉吉者得之象也凡上之所以依違不決者亦以隂柔故也爻不論揜剛之義右明占李氏曰上之揜五如三之揜二然上之悔不若三之凶者坎險而兑説也故葛藟不若石之堅臲卼不若蒺藜之傷也趙氏曰五爻皆不言吉而獨於上六言吉者要當俟時而不可欲速也九二曰征凶九四曰來徐徐九五曰乃徐有説至上六始有征吉之辭案人之處世險阻艱難備嘗其操心危慮患專故逹此困之所以必窮而後通也易窮則變變則通使困終无吉之理則天道有夜而無晝有寒而无暑非易之道也右明爻義趙氏曰成卦雖以柔揜剛為義而六爻唯陽剛而後為善蓋非陽剛則不足以出乎困也李季辨曰卦義君子為小人所困然初六困于株木六三困于石上六困于葛藟三隂爻皆凶九二朱紱方來九四有終九五乃徐有説三陽爻反吉以見小人之困君子君子終不可困而小人實自困也案觀内外卦淺深之辨初六困于株木而九四則困于金車九二困于酒食而九五則困于赤紱六三困于石而上六則困於葛藟外卦之困終輕於内卦何也内卦一陽揜於二隂䧟於坎險而不得出故其困愈甚外卦則出乎險外而兑體説順雖揜於一隂其困易説故也右明六爻巽下坎上井賛曰巽乎水而上水井説卦曰井德之地也又曰井居其所而遷又曰井以辯義雜卦曰井通而困相遇也李子思曰坎之三爻二隂在外而為險䧟井象也一陽居内而䧟于二隂之中泉象也以巽遇坎巽入乎坎水之中而上之汲井之象也程可久曰巽入乎水而以上出為用是之謂井朱子同此以巽乎水而上水為義都聖與曰木上有水自下而升以象養物之用而卦為井焉李季辨曰井轆轤之幹也汲者必登於幹之上上水下木井之象也或曰木汲瓶也韓信以木罌缶渡師其古之汲瓶歟此以巽乎木為義林黄中曰巽自是木矣豈得云巽乎木乎趙氏曰坎與乾坤震艮巽兑離重而成七卦反對而成十四卦坎又自重而為一卦坎上之卦凡八唯比取五隂之附一陽既濟取水火之相交為義其餘震遇之則為屯乾遇之則為需艮遇之則為蹇兑遇之則為節坎遇之則為習坎皆取遇險之義至以巽遇之乃獨以為井何哉井亦坎險之義也以巽入而在坎險之下其隂柔不足以濟險也故聖人不言險而特取巽木坎水之象以明巽之亦可以出險而濟物也案坎在下為雨水下流之象而在上則為險然八卦者父母六子也各有一德則各有一用巽也者委曲而有所入也出險之才固貴乎剛而以剛遇險不知巽其理而行之不缺則折故巽乎坎䧟之中有出險之理未可例以柔順无能而視之也耿睎道曰易以井喻性凡卦之所示爻之所效皆性喻也蜀有君子曰易有性命二卦聞之何希深鄭舜舉曰易之卦皆兩兩相對以變故兩卦之義或相反或相湏或相𩔖獨困之于井未見有相闗之義所謂性命二卦其在是乎夫剛為柔所揜有言而不信人之困也豈其所自為哉皆命也大象曰君子以致命遂志在命者雖不可求而君子則不謂命而求之于性改邑不改井无喪无得蓋言性也考之于象澤无水為困此命也澤雖无水而井則有水焉此性也君子知澤或涸而井則不涸是以致命而盡性二卦相為表裏學者未之識也李子思曰坎者天一之水也見于諸卦者皆諸水下流之失故多以險喻其得水之真性則井是也坎之為卦其位在北其時在冬以畫觀之一陽爻實其中而二隂爻圍其外譬之陽氣初囬于凝隂之中冬水因之而變温嘗試以此而觀天下之水其在冬而温者獨井泉而已蓋井泉得之地脉不失其本真及注之池沼滙之波澤已為風雨霜露之所剥而失其本性无復有向來一陽之温故凡天下之水皆其下流之失性而不反者也案天下之理有順之則敗逆之則成者如登山𫝑雖逆而漸髙下坡則勢雖順而趨愈卑水性以下為順而陷于坎險无復回流若井之泉以木巽水而上之又有汔至未繘羸瓶之患然而用之滌濯用之烹庖可以祀神可以養人此其勢逆而其用貴也抑又觀之凡川流趨下之水皆雨之所降會而成流者也若穴地得泉此乃天地五行之英水之元也反之吾身為涕為唾為便皆醎而下者也唯舌本之竅其津甘美古人以譬之井泉有以也蓋天一生水地以六成之以鍳取明水於月此天一之水也掘地為井而得泉此地六之水也此天地五行之真也若夫坎之氣上騰而為雲降而為雨雨集而成川則離其真久矣是以君子不貴也昔之論烹茶者以乳泉為上庶㡬近之右明卦義象賛曰木上有水井君子以勞民勸相右明卦用序卦曰困乎上者必反下故受之以井石守道曰凡人遇困厄必退而修德故曰井德之地程正叔曰困則必反于下物之在下者莫如井困乎上連升取義升而不已必困謂升乎上而困乎上也右明卦序改邑不改井无喪无得往來井井賛曰井養而不窮也改邑不改井乃以剛中也林黄中曰井者困之反也困反為井而二五不變是改邑不改井之象也井也者君子之德也邑也者衆人之居也邑可改而井不可改者以其剛中也剛中者泉在其中也李子思曰自古國邑之建必先眎其泉之所在是以公劉創京于豳之初其詩曰相其隂陽觀其流泉先卜其井泉之便而後居之也劉仲平曰古之制為井者八家同之邑之所聚者凡資乎井也邑之所資于井者自外來而求焉井不以是為得也邑之改而不資焉則外求之者不至井不以是為喪也朱子發曰古者八家為井四井為邑邑改而井不改井德之不遷也又曰初徃之五汲之象若有喪而實无所喪以其不失位也五來之初不汲之象若有得而實无所得以其失位也李去非曰徃者舍井而得井來者得井而舍井各井其井又曰井居其所而遷所遷者非井也邑遷焉隨所邑而井居其所邑之所在則斯有井矣案彖之象以困反為井取義坎之一陽在二隂之間是謂井泉之象也一陽者北方坎之真水二隂䧟之泉居坎䧟之中非井而何特以坎重坎則為純坎故聖人以巽在坎下取巽入乎水而上之有汲泉之象也且困坎在下今徃居上夫坎居上則困之兑來反于下而成巽矣易之言邑象其位也坎向位乎下而今徃位乎上是邑改也然在下此坎也在上亦此坎也是邑雖改而井未嘗改也夫坎向也自上來下非有得也來此井也今也自下徃上非有喪也徃亦此井也凡此縁改邑不改井而生義或者以初五兩爻徃來如朱子發之説亦有此象右併明卦象占汔至亦未繘井羸其瓶凶賛曰汔至亦未繘井未有功也羸其瓶是以凶也正義曰雖汲水㡬至井上然綆猶未出井纍罣其瓶而覆之也程正叔曰㡬至而未及用與未下繘於井同所以五榖不熟不如稊稗有濟物之用而未及物猶无有也郭子和曰孟子謂掘井九仭而不及泉猶為棄井九家曰巽繩在坎水中繘也楊廷秀曰巽下二爻在坎之下若瓶之覆而入井之象中二爻若井中之瓶覆者復仰之象而一九五隔其上猶有上六焉若系羸其瓶而不能上乎水之象劉氏曰三陽爻為水二陽既入于下一陽又不盈于中故有汔至羸瓶之象焉亦通李子思曰井以養人為事不能推以及人猶无井也君子德充實于中而澤不及物是獨善而已又曰人之于井取之不同而所得亦異然井常自若也是以賛論井之用養而不窮而以汔至亦未繘井為人功之未至而羸瓶之凶亦不過歸咎于汲者之未得其道耳案幾出井矣而未出猶未繘也於此之時正當用力以濟至此而羸其瓶則凶矣此聖人示人以謹終之戒諺所謂行百里者半九十也右明卦占初六井泥不食舊井无禽賛曰井泥不食下也舊井无禽時舎也程正叔曰以隂而在井之底泥之象也上无應援无上水之象人所不食也鄭舜舉曰輕清陽也重濁隂也輕清為泉重濁為泥朱子發曰坤五之初初在井底坤土汨之泥也乾初之五徃而為坎泉去泥存舊井也李仲永曰舊井廢井也无禽无所𫉬也案以初六本爻言之則陰之重濁在井之底上无其應无汲之者是井泥不食之象也以乾之初九徃五言之九五為坎是井泉之象也其初位則九五之舊是所居舊井之象也上无其應是无禽之象也程可久曰與田无禽之意通象贊勞民勸相亦指井田為言案井田正法井象而畫疆埸易之取象不一而足皆縁改邑為義井雖不改而汲之者少則泥而不可食不汲則廢猶井田之廢而禽獸不至故田獵无𫉬也右明象占九二井谷射鮒雍敝漏贊曰井谷射鮒无與也蘇子瞻曰上出者井之道下趨者谷之道失井之道而為谷故曰井谷耿睎道曰井谷旁出而下流者也下比初六故為井谷李氏程可久並同王輔嗣曰井之道以下給上者也而无應于上反下與初比故曰井谷射鮒鮒謂初也水不上出而反下注也王景孟曰巽之隂虚在下而復缺无有隄防之者故注于下使有陽剛之助而能隄防之不為井之谷矣程可久曰鮒處汚濕之物射鮒則即初矣甕者水已上而受之者也敝漏則復趨下矣以无上應故也案此爻上无應下比初六失井汲之義故在井則為旁穴之射鮒已汲則為注甕之敝漏皆象泉之下注也二以九居中有泉之象若上有六五則上出有六三則内蓄皆无此象矣右明象占朱子曰九二剛中有泉之象然下比初六功不上行故其象如此㳺定夫曰井道以髙潔為體以上出為功故初為井泥二為井谷蓋其自處汚下而功用熄矣卜子夏曰陽爻居中有中人之性不能應上從師友之訓而反習于下自敗其材噐之象程正叔曰不言悔咎何也曰失則有悔過則為咎无應援而不能成用非悔咎也居二比初豈非過乎曰處中非過也若上有與則當汲引而上成井之功矣右明爻義九三井渫不食為我心惻可用汲王明並受其福賛曰井渫不食行惻也求王明受福也李季辨曰渫初之泥也所謂浚井也井泥雖浚人猶有未食故至者心惻然以井澤未能及物也蘭恵卿曰在下卦之上未得上出故為不食李去非曰居内卦之極猶井之半也可食而不食者時未之知也李元卓曰有已渫之德而不食者未離乎下也夫泥而不食自取之也渫而不食寜不惻然哉時焉而已鄭舜舉曰渫而乃不食以所舉不中非井邑之會豈終不食㦲亦通楊廷秀曰可食者井也不食者人也井不自惻而人之行而過者惻之蘇子瞻曰井未有以不食為惻者為我惻者行道之人耳程可久日當位上應有可用汲之象李子思曰以陽居陽非隂濁之水也可食矣而不見食則以在上為應者乃隂柔之􅁼而非明王之象所以不能汲用以濟時也郭立之曰能自治以待用者九三是也渫之而不見食猶之修德之士不見用者王不知之也王不知之不明也李去非曰井之半不若水之滿而易見德之隠不若徳之顯而易知非王之明何以知之李仲永曰王明必用以養人則受養人之福矣案井渫者去下之泥井道将革者也不食者猶在井之中泉未上出也過之者以其已渫而不食故其心為之惻焉傷之何者可以用汲也上六正應則汲之者也然隂闇不明則不知其為可食而不之汲矣必王之明者然後汲之以養人則人也井也並受王之福也九五井之主陽明在上所謂王明也賛曰求王明則向之心惻者為之求之也以言士之修德在下可以汲引而不見録故過者傷之必求明王而舉之則已與民皆受其福矣右明象占六四井甃无咎賛曰修井也李氏曰重隂而貞固有井甃之象楊廷秀曰􅄲有兩甓連接之象故曰甃蘭惠卿曰乾施一陽於二隂之中而坎為水隂中之陽也故陽爻為水為泉地接隂氣而生土石陽中之隂也故隂爻為泥為甃初居下故謂之泥四近上故為之甃朱子曰以六居四雖得其正然隂柔不泉則但能修治而无及物之功故其象為井甃而占則為无咎王景孟曰隂虚亦敝漏也然下有九三隄防之助焉則與九二之得初六異矣所以有井甃之象能補其過而无咎也李元卓曰止於无咎者未有上出之功也右明象占耿睎道日渫井内則井潔甃井外則井完兩者不可偏廢也陸希聲曰井壊則水渾故甃而修之法亂則民擾故治而正之右明爻義九五井洌寒泉食賛曰寒泉之食中正也程可久曰水之始逹曰泉其正性曰寒李氏曰井洌則泉寒李去非曰坎水北方之凝隂故以寒泉為言郭立之曰洌言井之潔主人事而言也寒言泉之性主天理而言也右明象占鄭少梅曰井以陽為泉者水因天之一陽而生也巽之二陽亦在地位而趨下是谷而非井矣一雖在人位而居甃之下汲之不及不若坎之一陽浮溢于甃上也井欲溢而鼎戒盈德與噐之辨也毛伯玉曰三與五皆泉之潔者也三居甃下未汲者也故不食五出乎甃矣汲之泉也故曰食李季辨曰井至此初泥已浚二漏已修井道已全為時所食所謂井養而不窮正在此爻程可久曰井以上出為成功未至於上未及用也故至上而後言元吉右明爻義上六井収勿冪有孚元吉賛曰元吉在上大成也林黄中曰坎為輪故有収象亦為有孚逺應九三近乘九五泉源之富足以養而不窮故也楊廷秀曰爻畫􅄲開而勿冪之象耿睎道曰隂性吝嗇故有勿冪之戒王輔嗣曰不擅其有不私其利故有孚元吉右明象占李子思曰易中諸爻至于上則多有窮亢之患而井之上六乃曰元吉何也井之道貴乎上行故巽乎水而上水者乃井之象居井之上已収成功井道之大成者也井已収成而勿幂則是取之不禁用之不竭此古之君子所以為兼濟天下之事也劉氏曰陽爻為泉隂則无之上唯言井之大成此則汲水在上之時也案収有二義以為轆轤者収繘者也以為大成者収成者也轆轤之義為長収而勿幕則人信其不私有其井與衆共之所以大吉右明爻義劉長民曰初井泥則始掘井也二井谷則泉之始出能射其鮒三則淘井之汚四則甃之五則泉洌而食上則取水濟人不可幂覆也李季辨曰初井泥二井谷皆廢井也三井渫則渫初之泥四井甃則甃二之谷既渫且甃則井道全矣故五井洌而泉寒上井収而勿幂功始及物而井道大成案初與二在井底故初泥而二谷三與四居人位必盡人事故三渫而四甃五與上則得之天矣蓋以三材之位取義也三陽位皆取象於食以其為水泉也其不食者在下也唯九五坎中之泉浮而上出故為可食二隂位則為井谷者下注也甃者自下而上也収者成也初為舊井故四甃之二為射鮒故五洌寒泉三為渫而不食故上為収而勿幂貞悔之對也右明六爻厚齋易學卷二十四
