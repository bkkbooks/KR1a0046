body:
  text: 厚齋易學卷二十三宋馮椅撰易輯傳第十九經下篇萃升坤下兌上萃賛曰萃聚也順以説剛中而應故聚也又曰觀其所聚而天地萬物之情可見矣雜卦曰萃聚而升不來也程伯淳曰澤上于地水聚也故為萃不言澤在地上而云澤上于地言上于地則為方澤聚之義案對夬立象猶屯之於觧不以卦定序反對為定也澤上于天則決上于地則聚楊廷秀曰萃者天下生聚全盛之極也天地聚而隂陽和萬物聚而食貨充君臣聚而大道行萬民聚而天下泰此豈一日所致哉李子思曰以畫觀之二陽得位四隂聚而歸之故曰萃三隂已升在上二隂在下有應隨之以升故曰升臨萃二體相反二陽在下近民有臨之之𫝑而未有萃之之權及以兊而加之反之坤上而二陽位在上卦然後斯民可得而聚趙氏曰陽居五而五隂從之故卦為比陽居五與四而四隂從之故為萃二卦若相似也然比者衆隂始附之初聖人作而萬物覩之時也故曰原筮元永貞无咎而又曰不寧方來後夫㓙皆始附之意也萃者二陽相比羣隂聚而歸之君臣同徳而萬物盛多之時也非下順而上說則不足以為萃豈特二五相應而已哉毛伯玉曰萃似比然則何以異乎曰水在地上固相親也而散漫未有所歸故其卦曰不寧方來其爻曰失前禽名分未定不必其皆比也夫澤上於地則水固鍾於澤者也故曰王假有廟利見大人蓋天下一家極盛之時也馮當可曰非有擾攘傾覆之變安得舍彼而取此三代之時厯世載徳以有天下非一時萃於我者之所謂萃也案萃與比近葢地上之水與地上之澤亦不甚逺也然水聚而成澤則比者萃之初萃者比之後其象甚明比則一陽居尊位而五隂爭比之上六最後則為後夫凶為失前禽此正聖人作而萬物覩之時所謂鳯凰景星始見爭先覩之者也萃則二陽而四隂聚之有君有臣其民聚於臣以歸於君此名分已定聚而不散之時也此其大凡也若夫聚天下之民日中為市何以聚人曰財所欲與之聚之方以𩔖聚何莫非聚而又豈止以天下定未定為説哉先儒之言雖異同而各有理不得不辨右明象義象賛曰澤上于地萃君子以除戎器戒不虞右明卦用序卦曰遘者遇也物相遇而後聚故受之以萃林黃中曰自遘之萃巽反為兊乾變為坤上下相易右明卦序亨王假有廟利見大人亨利貞用大牲吉利有攸往賛曰王假有廟致孝享也利見大人亨聚以正也用大牲吉利有攸往順天命也觀其所聚而天地萬物之情可見矣張舜元曰全卦之體有廟之象朱子發曰艮為門闕上為宗廟李子思曰二陽在衆隂之中有建立宗廟總攝衆志之象豫之象亦為重門葢艮之上又有三耦畫也今此卦象如豫特多九五一竒畫耳故為有廟而九五至之之象耿睎道曰萃之時以言乎人則四海之歡心得矣以言乎物則九州之美味備矣王者之所以致孝享於是乎在朱子曰廟所以聚祖考之精神又人必能聚已之精神則可以致于廟而承祖考也又曰人之精神萃於己祖考之精神萃於廟陸希聲曰氣聚而生故精氣為物氣散而死故游魂為變魂氣有散无所依歸故聖人於萃聚之時立宗廟以致孝享胡翼之曰夫人之生則精神萃之於身及其死也雖欲見其容貌而不得聖人觀萃之卦設為宗祧以萃祖宗精神於其間以盡孝子之心程伯淳曰萃渙皆享帝立廟因其精神之聚而形於此為渙散故立此收之又曰古者祭祀用尸盖人之魂氣渙散孝子求神而祭无尸則不享无主則不依故易萃渙皆言王假有廟魂氣必求其𩔖而依之人與人既為𩔖骨肉又為一家之𩔖已與尸既已潔齋至誠相通以此求神宜其饗之程正叔曰羣生至衆也而可一其歸仰人心莫知其鄉也而能致其誠敬鬼神之不可度也而能致其來格天下萃合人心總攝衆志之道非一其至大莫過於宗廟故王者萃天下之道至於有廟則萃道之至也祭祀之報本於人心聖人制禮以成其徳耳故豺獺能祭其性然也李子思曰天地之氣浮游于大空之中絪絪緼緼漠然而无形也下騰上降往來聚散而不常也因其忽然而聚之際必求有以凝之然後既聚而不散譬之林林之衆紛然不齊一其耳目而堅其心志者其唯建邦立都置宗廟社稷之為先務乎李季辨曰宗廟者人心所系武王伐商載主而行髙帝初興立漢社稷皆以系人心也張子厚曰與渙卦義同故繫辭互見案聖人行禮有經有緯因萬物之萃而致享宗廟禮之經也以祖考之神萃于廟而萃已之精誠以格之所以系衆心而使不渙散禮之緯也李子思曰九五具陽剛之徳有大人之象當萃之時出履正位而上下羣隂聚而利見以求享此聚之以正者也又曰二陽得位而專賛九五者四為五之輔出而為九五聚民以歸於君上則可而分以自專則不可李季辨曰必得九五之位然後為萃之主故曰利見大人萃不以正其終必離故曰利貞李氏曰人不能无羣羣不能无爭必有善羣者為之主利見大人者求其所為主也程正叔曰人聚則亂物聚則爭事聚則紊非大人治之則萃所以致爭亂也萃不正則人聚為苟合財聚為悖義安得亨乎故利貞案貞利利貞兩言利義本不相蒙孔子合言之謂聚之利于亨者以見大人則為所聚之正是乃利貞也説者第釋孔子之傳而文王之經意隠矣林黃中曰坤為牛故有牲之象李子思曰隂聚而歸陽有萬物盛多能備禮之象程正叔曰祭祀人心之所自盡也萃天下之心者无如孝享用大牲承上有廟之文以享祀而言凡事莫不如是豐聚之時交於物者當厚稱其宜也李季辨曰君位既正方用大牲如湯用𤣥牡之𩔖用大牲則天命定矣王景孟曰當此之時凡事皆吉於用大亦不特大牲而已也成大功立大事興大利凡此皆吉於用大者也故繼之以利有攸往程正叔曰物聚而力贍乃可以有為故利有攸往右明卦象占初六有孚不終乃亂乃萃若號一握為笑勿恤往无咎説者謂孚四而三間之易无隂間隂之義賛曰乃亂乃萃其志亂也林黃中曰在一卦之下應乎九四四在臣位能萃而不居是有孚而不終也初孚四而不終將萃於五五既逺而非應而初之所居又陽也是以其志惑亂於其所欲萃焉如號咷之人一握其手而為笑也四五皆兊體為口舌故有先號後笑之象李季辨曰初與四應以隂求陽宜相孚也四位不當終不成萃故有孚不終心不能定去就不決故乃亂乃萃萃而以理不約而合若嬰兒之號泣然為父母者一握其手則為笑矣此見天理之萃也四既无位進而萃五得萃之正勿恤而往可以无咎程可乆曰號與笑哀樂之見於外與同人旅稱號笑同意右明象占六二引吉无咎孚乃利用禴賛曰引吉无咎中未變也李季辨曰五為萃主已為正應下連三隂相引萃五萃之吉也案説者多以牽於羣隂之間不能自達於九五唯蘭惠卿李子思以其礙於九四其説然矣而謂必待九五引之則又非文義盖凡下卦中爻多引其𩔖如泰與大畜之二是也初六牽於正應六三限於相比皆為九四所萃唯本爻與五為正應引初六六三以萃於五為得君臣之大義故吉而无咎咎以九四之當其前取象也右明占程可乆曰用大牲者萃之主也用禴者六二而已朱子曰卜祭者有其誠則雖薄物亦可以祭矣案禴固言祭然象也與坎九四之義相似為六二者苟不阻於九四而孚于九五則可以闊略禮文而得享上之義矣右明象王介父曰升之九二以剛升孚乃能无咎故先言孚乃利用禴而後言无咎右明爻義六三萃如嗟如无攸利往无咎小吝賛曰往无咎上巽也耿睎道曰比于九四而求聚者也雖有剛柔相與之道然非正應而求之不得所欲故萃如嗟如无攸利李仲永曰三隂皆進是萃如也三隂皆進而已獨无應故嗟如也不當位而應故无攸利李季辨曰三應上六既齎咨涕洟故萃而嗟如往而萃五則无咎馮當可曰物方萃已安得散但萃道不足故有小吝咎則无也三隂皆萃于九四是萃如也然四非已應又非君位於心不安嗟如也九四權臣也而萃之上六本應也而不應之故无攸利然九五在上往而聚之斯无咎矣若必欲踰五而求上六之應則終吝也小謂六之隂也右明象占九四大吉无咎贊曰位不當也朱子發曰陽為大大者吉也胡周父曰无他辭而直謂大吉无咎夫萃之世弱趨於彊闇依於明四臣位也而陽處之以説而接三隂民樂歸之者也若不專君位吉非大者乎郭立之曰卦有二陽下皆有應四又上比於君得其所萃莫吉於斯李氏曰下比三隂有得民之象上承九五有得君之象在萃而得君得民人臣之盛者也故大吉无咎程可乆曰人臣與君分其所萃安得无咎惟其與五同徳不植私黨使大者尊榮而吉始見補過之義大字義與郭合林黃中曰以九居四不當其位能萃而不居非與九五爭民者也此所以大吉无咎又曰萃之六爻皆言无咎而四言大吉无咎明萃之无咎皆九四之功也案説者率謂大吉然後无咎或者又不謂然今以爻義考之衆隂歸五多阻於四而九五亦无大得志之辭易於九四系之以无咎可矣而曰大吉云者似予之過何也曰聖人盖變文以示訓也使九四以其位之隂而如比之六四則九五安得有匪孚悔亡之辭豈非大吉使九五制於九四而如豫之六五則安得有有位元永貞之辭九四豈非有咎當知萃之四五善於豫而弗若於比曰大吉以示其勸曰无咎以示其戒讀九四之辭者黙喻於辭意之表可也右明象占爻義九五萃有位无咎匪孚元永貞悔亡賛曰萃有位志未光也馮當可曰聖人於萃卦雖二五中正无大與之之辭者四在側以爭萃為五者不可不勉其所以為萃之道矣元永貞則四必為大吉无咎朱子曰陽剛中正當萃之時而居尊固无咎矣若有未信則亦修其元永貞之徳而悔亡戒占者當如是也李季辨曰渙而方萃人情未孚必元永貞然後悔亡葢萃而得君其卦為比元永貞之道也萃而成比則悔亡矣右明象占趙氏曰比以九五一陽為主故卦有元永貞之辭萃有兩陽爻故元永貞獨歸之九五亦可見易中卦爻彖象之辭無非一理所貫也初與三不當位者自萃於四是物有匪孚者矣故必元永貞然後悔亡案二陽爻所以萃衆隂也九四臣位九五之位則君也故五之萃為有位以四之位不當故也匪孚以衆隂孚四也悔為匪孚也必盡君道元永貞然後匪孚之悔可亡盖四近民而已巍然處其上也易窮則變變則通以卦變言之九四之變則比也比吉也九五之變則豫也豫則貞疾也故四之辭吉而五之辭多戒云右明爻義上六齎咨涕洟无咎賛曰齎咨涕洟未安上也胡翼之曰居卦之外而下无其應是以齎咨涕洟也李仲永曰以兊說在上而齎咨涕洟者説極而憂也憂之如何無位而窮也李季辨曰五居正位以六居上失萃之時張舜元曰兊為口舌為雨澤之象右明象程可乆曰知危懼禍物亦不我咎也王景孟曰萃乆則散説極則悲君子以為无足咎也右明占林黃中曰上者萃人下者萃於人以隂柔處卦之窮是其无萃人之材物莫之與而又不能萃於人者也是以窮至於齎咨而涕洟焉案易窮則變萃澤萃於下也上窮則澤潰矣夫成卦萃聚也聚極而散上卦兊説也説極而悲故其象如此至於爻之變則成否夫萃之不早而窮焉无所復入徒有悲嘆何所咎也且萃者極盛之時也極盛之時宜物情和説順適以應坤兊之象今觀之六爻初則號三則嗟上則涕洟而且不止於號齎咨而又不止於嗟何也禍福倚伏而盛滿難居故六爻止于无咎而大象所以有不虞之戒也右明爻義蘇子瞻曰方以𩔖聚有𩔖必有黨有黨必有爭故萃者爭之大也盍以爻觀之五能萃二四能萃初近四而无應則四能萃三近五而无應則五能萃上豈非交爭之際哉林黄中曰六爻以相應相比為義盖當説順萃聚之時説極則易憂順極則易乖聚極則易散君子所當警戒不虞而尤惡於不相親也又曰六爻以隂聚於陽為義夫陽剛者人之所聚也隂柔者聚於人者也為上者人之所聚也為下者聚於人者也是故萃之二陽其居陽位者應萃之義居隂位者能萃而不居也李季辨曰卦四隂二陽以陽為主三應於上二爻皆隂非萃之善初應於四聚而得吉無萃之位二應于五君臣正位成萃之功都聖與曰相忘而相與本无咎也方以𩔖聚則相攻相感相取而吉凶悔吝生焉故所謂无咎者本皆有咎善補其過則所謂咎者亡矣此六爻所以皆言无咎也右明六爻巽下坤上升賛曰柔以時升雜卦曰萃聚而升不來也鄭康成曰木生地中日長於上故謂之升李氏元量曰剛以上為位其在下非其所也故於剛在上曰止其來自下曰復柔以下為位其在上非其所也故於卦柔在上曰見其進自下曰升蘭惠卿曰邵堯夫易圖謂升者臨之生萃之反柔以時升非獨六五蓋萃則四五皆陽而升則陽降隂升四五皆隂自萃之反而言也或曰升與晉何異曰升者自下升髙故謂之升故大象曰地中生木升晉者自近進逺故謂之晉故大象曰明出地上晉取義各不同也案木在地之下自下而方升明在地之上出地而上進李子思曰隂陽二氣迭為升降隂升則陽降隂降則陽升未有陽常升而不降亦未有隂常降而不升者反萃而升是二陽反居于下而三隂反居于上也故曰柔以時升又曰左右前後四隂乃扶二陽以俱升六爻蓋无一之不升也郭立之曰天地萬物皆有升在人則位之升謂之升徳之升亦謂之升楊廷秀曰升則足以行道李季辨曰古之賢者升進而上其道不一有自司徒命鄉論秀而升者自司徒升之樂正樂正升之司馬司馬升之王所有自侯方嵗貢而升者天子則試之射宫中多者得與於祭有自三年大比因賢能之書而升者天子拜受登于天府其條目見於周官王制而其義則隠於易之升盖木之升也其勾未萌甲未拆之時枝柯榦葉皆備於未升之時故其升也莫能禦猶賢者之未進也道徳藴畜皆當素備故一出而名實遂孚矣此卦辭元亨之道也案自下而上騰者謂之升觀孔子之傳唯柔以時升地中生木之二說諸儒不過祖述之而已大抵主巽之自下而升柔亦巽也木亦巽也象賛曰地中生木升君子以順徳積小以髙大右明卦用序卦曰萃者聚也聚而上者謂之升故受之以升林黃中曰自萃之升坤反居上兊反為巽二五相易而成也右明卦序元亨用見大人勿恤南征吉賛曰巽而順剛中而應是以大亨用見大人勿恤有慶也南征吉志行也案賛曰大亨則元主九二也九二以巽二順上以剛中而應上是以大亨乃上升之象也六五升之主也知九二之材足以升也乃用順應之道以見之勿憂其不見也南面而治天下者六五也九二之大人既見六五之大君乃偕進而上行南征之象也諦觀卦義似皆主巽而用見大人獨不主巽者陽為大未有六五而稱大人者无此象也王輔嗣曰陽爻不當尊位无嚴剛之正則未免於憂故用見大人勿恤也代氏曰尊爻无此人故不云利見程正叔曰凡升之道必由大人升於位則由王公升於道則由聖賢用巽順剛中之道以見大人必遂其升勿恤不憂其不遂也林黄中曰巽東南也坤西南也自巽升坤必渉乎離離南方也自南而征斯為吉矣程可乆曰陽以上行為南杜元凱謂陽氣起于南行是也李氏曰明夷九三曰南狩升曰南征征與狩皆有事之大也案用見大人主六五言蓋用元亨之道以見大人也人主之升於位與徳皆用見大徳之臣也此以已升言也南征乃以自下而升為義主九二之陽爻以象君子之升以方升為象也明夷升征與狩皆稱南以坤位西南嫌其為隂晦故以南目之大凡人背北面南南前進之義也右明象占初六允升大吉賛曰上合志也鄭少梅曰初傅二陽而升三隂又與之一體故有允升之象趙氏曰以柔居一卦之下又巽之主合乎上卦之坤柔宜升者也案卦以柔以時升為義初六之柔與三隂同徳而升无間言者也而二陽閡之然陽本上升之物三隂不能拒則亦與初六同體而升亦无問言者也是五爻皆欲與同升夫是之謂允其大吉可勿問而知也諸說不明卦之大義多曲而不當右明象占九二孚乃利用禴无咎賛曰九二之孚有喜也朱子發曰升萃之反也升之九二即萃之九五故升萃二爻反復同象明二五之交孚也李子思曰萃之六二以隂柔而應九五之剛升之九二以陽剛而應六五之柔其以至誠相感而相應則一也故爻辭皆有孚乃利用禴之義而彖傳皆有剛中而應之辭李氏元量曰萃之二柔也則疑於進之易故引吉无咎而後孚乃利用禴升之二剛也剛則能審義以進焉故即其材孚乃利用禴而无咎也林黄中曰二卦不言於五而言於二者貴賤之位也馮當可曰二中也五亦中也中誠相應雖五升而不來以二之誠而格之不能不守貞以待二而為之升階也二能感五五能待二乃成升道故賛二為有喜五為大得志毛伯玉曰古者卿大夫皆世禄然卑踰尊踈踰戚者有之矣其大者為舜為傅説為吕望其次如大夫僎與文子同升諸公此皆升之謂也匹夫而升于朝亦不偶然矣故曰孚乃利用禴无咎彼固孚於未禴之先者也案萃之六二无咎以閡九四升之九四无咎以閡九三本皆有咎唯二五中正故交孚而二陽爻不能為之間其所薦雖薄而必饗也萃之情下趣故引吉无咎者以其交孚乃利用禴也升之情上騰故必交孚乃利用禴而後无咎右明象占爻義九三升虚邑賛曰无所疑也蘭惠卿曰陽實隂虚邑者位也升自臨生三之位本隂爻居之虚邑也今以九升三居隂爻所居之地故曰升虚邑案二陽之卦在下者為臨也在上者為觀也今以臨之初九升六三之位而為升是升虚邑也邑虚則无所閡於升也説者以坤為邑謂前无陽實以閡之或又謂三諸侯之位邑國也皆非右明象占六四王用亨于岐山吉无咎賛曰王用亨于岐山順事也張舜元曰坤西方之卦岐山之象也李子思曰其事頗𩔖太王文王或者遂以爻辭非文王語然而易中王用之辭非一如王用三驅王用出征王用亨于帝皆泛言之未嘗指名其人况稱王而不稱號邪李氏曰體順又以隂居隂順之至也故於升之道有吉而无咎案象與隨上六相似特西為岐耳隨上體兊兊正西故曰西山此卦上體坤坤位西南羑里視岐其方也故曰岐山山皆以在上卦取象今觀太王遷岐之詩披荆棘通道路竊意太王未卜宅之先必有負固不庭之國王者乃用此順巽之道以通之故著此象所謂知以藏往者也若曰文王自稱太王之徳則羑里之時太王一諸侯耳未稱王也追王太王在武王有天下之後若曰文王自稱與爻辭非文王作則又失之甚矣右明象占六五貞吉升階賛曰大得志也李去非曰柔居尊守正而二以剛應之降接如賔主之於階揖遜以升焉接賢者之禮至矣程可乆曰虚中下應於剛徳之臣自二而升五如階之有級焉此人君升進賢臣而𫉬其輔賛故以貞吉先之案貞吉言二五正應之吉也升階自三至五自下卦升上卦有升階之象或以為如舜之厯試自匹夫而升六位然賛為大得志則指九二也李季辨曰至此則進于天子之階矣或升之王所或試之射宫或登之天府皆升階也則升道亨矣亦有此義上六㝠升利于不息之貞賛曰㝠升在上消不富也蘭惠卿曰㝠者晦也升豫皆以隂升居上故豫曰㝠豫升曰㝠升朱子曰以隂居升極昬㝠不已者也李季辨曰處升之極知進而不知退君子知進退存亡故宜貞守貞守乃所以不息也猶木升之極必歸根復命雖華實剥落而生生之意又寓於中矣李氏曰天下之理消息盈虚不可以為常升而不已則必困唯持以不息之貞則无驕盈之患此所以為利也諸説似覺支離案上无所之進而不已故為冥升猶㝠行也夫升極則困困則息若以進徳言之息則非利也故利于不息之貞右明象占趙氏曰艮有不自滿之意故内艮外順而為謙巽有不自髙之意故内巽外順而為升謙之六爻言吉者三言利者三而无凶悔咎之辭升之六爻言吉者三言利者二九三雖不言吉利而亦无凶悔吝之辭雖上六之㝠升亦利于不息之貞則巽順之效也馮當可曰萃聚而升不來隂陽當此時俱升而不降六爻之象如人相逐而行林黄中曰升六爻以自下而上往而不來為義何則升之為言上也譬猶木焉有長而无退也故既至六五而謂之升階焉唯九二閡於九三以應六五而遂升上六前无所瞻視以進故謂之㝠升右明六爻厚齋易學卷二十三
