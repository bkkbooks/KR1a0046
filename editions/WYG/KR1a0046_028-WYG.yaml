body:
  text: 厚齋易學卷二十八宋馮椅撰易輯傳第二十四經下篇豐旅離下震上豐賛曰豐大也雜卦曰豐多故也吕與叔曰豐致廣大也正義曰凡物之大有二有自然之大有由人𢎞闡之使大豐之為義乃𢎞大之大其亨也明以動其大也王假之𢎞大之義也李去非曰豐自泰二四相易離明而震動相資以為豐也馮當可曰上震下離日方生於東光明盛大太平至治之世也鄭少梅曰東方少陽之震運於南方太陽之離陽氣盛大故為豐路氏曰隂陽之運至午而亨嘉品彚之生至夏而假大劉氏曰豐之為大盖土地至廣民物至繁正明昌盛大之時也林黄中曰當其蕃衍盛大之時有不期豐而豐者顧所以自豐如何耳豐其徳澤豐其典禮豐其賢材則本益固而末益茂苟或不然豐其宫室豐其貨利豐其子女則其所以自豐乃其所以自蔽也右眀卦義𧰼賛曰雷電皆至豐君子以折獄致刑右明卦用序卦曰得其所歸者必大故受之以豐豐者大也林黄中曰歸妹之豐上震不動下兊為離二三相易而成也少女既𫉬所歸矣自少而壮則相與成家之時也震位乎離萬物相見之時取諸豐盛不亦宜乎右明卦序亨王假之勿憂宜日中賛曰明以動故亨王假之尚大也勿憂宜日中宜照天下也日中則昃月盈則食天地盈虛與時消息而況于人乎況于鬼神乎蘭恵卿曰豐者盛大也盛大則亨在其中矣李泰發曰離震於時為春夏萬物豐亨之時也王者之治自天造草昧以至豐而亨則太平極盛周家之業至成王之時也日以烜之雷以動之長飬成就物之所以能大也右明卦象劉氏曰豐固亨矣凡際天極地皆欲歸吾圖籍則王者尚大當極其至可知矣朱子發曰九二上行至四王假之也李泰發曰聖人所憂不在乎未中而常在乎日之既中日之始出則其明未盛日之將昃則其光已虧皆不能徧照天下之大也耿睎道曰豐多故之時疑有可憂者焉王景孟曰六五以柔居尊位而屬震體有震懼憂虞之象聖人則戒之以勿憂離明在下又勉之以宜日中都聖與曰六五居尊位大中故有王假之之辭焉震有憂懼之義而在卦之上者要其終也離為日中之時而在卦之下者原其始也李去非曰凡易之所謂勿問勿用勿亟勿疑云者皆我不能自決而賴他人之告戒也毛伯玉曰易者變也蒙有至明之理豐有至闇之寔有餘不足之相生也是故順以巽則蒙中有明豐其蔀則日中見斗明以動故亨苟日新日日新又日新是也怠而止之則其明索矣故曰王假之誠能大之則不足者非所以為憂挾其有餘則至足者憂所自始也林黄中曰當豐之時業鉅事叢朝廷尊安尊則易驕安則易情驕則日入於壅蔽之域惰則日淪於委靡之塗唯明故壅蔽之患不至唯動故委靡之漸不作原其所以致此者孰使之哉王實大之也所尚者大則其功博所尚者小則其效卑泰之九三曰勿恤其孚晉之六五曰失得勿恤夬之九五曰有戎勿恤家人之九五曰勿恤吉而豐之彖曰勿憂宜日中此五象者皆當文明極盛之時常人之所不憂而聖人以為深憂故其辭曰勿者深切之辭也詩曰無念爾祖聿修厥徳皆此意也案豐本以明而動之卦則豐非自致必有致之者盖王者大之之所致也然有其大必有以保其大際天所覆皆歸王者照臨之内而有一物失所之患則豐者歉矣此宜王者之所深憂也於此有道焉可以勿憂宜如日之中普天之下無不燭矣夫六五隂虚非能自豐唯下卦之九往居于四則虚者盈矣此王假之之謂也向也全體離也今上變成震宜有憂矣而勿憂者下卦為晝六来居二為日之中乃所宜也夫豐之為豐離明之義多於震動離在内其位則下六五隂虚柔弱無應懼其𫝑之下移而子富父貧也故曰假曰憂曰宜皆以六五隂柔之故然離震之性上趨故六五得以為豐大之主而諸爻无異志也右明卦占初九遇其配主唯旬无咎往有尚賛曰唯旬无咎過旬災也林黃中曰初九以六二為配主九四以六五為夷主九三上六雖居正應而不相遇焉三折其右肱上闃其無人盖有物蔽之也初當應四二當應五應在逺不可以言遇遇者適相值也遘之訓遇乃以初六遇九二而他爻爭之則凶今初與二四與五皆以近相值而合夫是以稱遇也或曰睽諸爻言遇皆其應何也曰睽以乖違為義六爻分散而不得相值􅆘值其配而合焉故可以言遇而况初四皆陽二五皆隂何自而遇哉李季辨曰六爻以五為主日中之主在五上下五爻皆當歸之初取五逺以九求六配主也案説者因初四皆有遇主之象遂使迭為賓主然於𧰼有疑焉唯黄中之説獨得其指夫主云者猶所謂觀逺臣以其所主觀近臣以其所為主之主也配主者二寔配五居中初之所主也夷主者以六居五夷易之主也初四兩爻无應而二五亦無應故隂陽相遇而以得位者為主馮當可曰爻處最下其豐未豐非志滿意得者未為豐所蔽故爻不言豐案卦兩爻不言豐六五不言者以為天下之主而隂虚歉然賴天下之助以為喜也右明爻義六二豐其蔀日中見斗往得疑疾有孚發若吉賛曰有孚發若信以發志也朱子曰居豐之時為離之主至明者也而上應六五之柔闇故為豐蔀見斗之𧰼大其障蔽故日中而昏也李泰發曰居中守正人臣之盛位卦體為離而處震下為掩覆之𧰼林黄中曰蔀覆也所以蔽日也正義曰離卦之中如日正中鄭少梅曰卦氣在五六月之交日在栁宿之度而斗指午未之分栁宿之度寔通三辰故有見斗之理日者君之𧰼也斗者大臣之𧰼也而沬者又羣臣之象也日之所􅄤而斗之所指有臣移君權之意亦有臣代君理之意此太平持盈之深戒也劉長民同郭子和曰日中无見斗之理是之謂疑疾猶睽之載鬼一車也案豐大明盛之卦爻𧰼乃如此何也卦以九六三四之往来與二體取𧰼而立也然至於爻位則六五在上離日在下不立六五以為之君則勢必下移為侯國封殖自擅其有之𧰼矣立六五以為之君則隂虛不富失豐之義一也隂闇不明失離之照二也故諸爻自三上之外餘爻皆以趨五為義立之君也離日方中而隂蔽在上故豐其蔀也自離而仰觀則止見九四之陽明而不見六五此見斗之𧰼也右明象張子厚曰凡言往者皆進而之上也初九進而上則遇隂而有尚六二既以隂居隂而又所應亦隂故往无所發益增疑疾郭子和曰用明投闇往得疑疾乃其宜也馮當可曰爻位正中又居兩陽之中有中心孚信之𧰼朱子發曰二五相應之地有孚之理吕與叔曰孚達于外所蔽者必開所疑者必釋故吉案自離往震自二往五蔀以明燭其闇則疑之斗以日掩其光則疾之唯與二五同徳相孚以發其蔀則蔽徹而𧰼隠疑疾皆消矣程正叔曰二雖至明中正所遇乃柔闇不正之君既不能下求於己若往求之則反得猜疑忌疾然則如之何而可君子之事上也不得其心則盡其至誠以感發其志意而已苟誠意能動則雖昏蒙可開也雖柔弱可輔也雖不正可正也李泰發曰以中正之臣遇六五柔闇之主可以自守而不可以有為往則為主所疾而衆且疾之矣能以忠信發其疑疾如成王之悔悟則保其終吉矣周公其人也右明占馮當可曰六二過初則已豐矣故𧰼言豐郭子和曰有中正離明之徳足以致吉有居隂從闇之義足以蔽明故聖人之辭兩及之豐其蔀外也主在外之事言也有孚發若内也主在己之徳言也右明爻義九三豐其沛日中見沬折其右肱无咎賛曰豐其沛不可大事也折其右肱終不可用也李子思曰沛者雲之掩也處離之極過下卦之中將有昃食之患而又應上六隂且揜之故為豐其沛之𧰼朱子發曰日中當明而反見斗後之小星其闇尤甚陸希聲曰斗象大臣沬以象家臣案爻應上六而隔于六五之重隂故有雲蔽離日之象其闇又甚扵蔀也故不惟見斗而又見其輔輔小星尤非日中之所可見者而見之闇蔽之甚也沬在上亦九四之象他无陽明之爻可以當之故止取斗之小星也以此又可見鄭少梅之説為當沫不必拘於家臣亦近臣之次者也大抵承六二之文為象右明𧰼李元達曰三有能為之材足以輔上所以有右肱之象程可久曰折右肱者廢其輔上之材也本爻當位宜無咎矣而上六幽闇不足以有為其𧰼如此張舜元曰兊為毁折約象兊也劉長民曰肱取股肱近臣之義案六爻中初九无位唯本爻有豐大之材而居下卦之上若足以有為矣而所應上六柔弱窮極重重蔽闇若往從之適足招凶唯有折其右肱以自晦於无用乃得无咎聖人知下卦之終必應上卦炎上之性不可遽止愛惜其材故教之如此姚氏曰肱當作股若止以本爻上下取象則左九四陽剛不折右六二隂柔可折在下卦股之𧰼也唯以約𧰼兌為毁折取象則陽左隂右九四為左六五為右正當毁折之處在上體乃肱𧰼也右明占九四豐其蔀日中見斗遇其夷主吉賛曰豐其蔀位不當也日中見斗幽不明也遇其夷主吉行也李氏元達曰六五體柔居上則二為應而四則承之上下異位所覩均也張子厚曰无應於下近比於五故亦云見斗李氏曰二居於離非終於不明若本爻則以陽居隂而自為幽故孔子賛之特曰位不當也幽不明也所以别於二案以六畫之象觀之本爻自應斗𧰼宜未安也然位不當而明自為幽近承六五之蔀則上連六五幽闇不明而本爻之斗見矣故承六二之文而不復别取象云孔子所以賛之以辨其疑也右明象蘓子瞻曰四无應而適五五亦坦然受之不吾巽也是謂夷主李氏元達曰以剛遇柔而六五有常易之徳為能用豐焉則四亦得以盡其可行之材矣此遇其夷主所以特異於二之往得疑疾也夷主之象石守道王介甫李氏路氏程可久李季辨皆同案以有用之材當豐大之世下無其應適逢平易之主可以判幽發明故吉右明占路氏曰二與四以體則有剛柔之異以位則有中不中之殊要之有位者无材有材者非其位以此居豐之時不免乎蔽匿之患故皆曰豐其蔀案九三有材有位亦豐其沛者遇五上之重隂而上无位而窮非六五之比也程可久曰六二往得疑疾本爻則吉行者逺近之情異也右明爻義六五來章有慶譽吉賛曰六五之吉有慶也毛伯玉曰自二言之五為甚闇故曰見斗自五言之二為文明故曰来章章者二之明也来者五也張子厚曰爻曰来章反比賢則明也賛曰有慶得配於四也案凡曰来者皆自外而之内五之四之二皆来也今四以陽爻居隂位章也二以隂麗二陽亦章也二有孚發若而四乃遇其夷主則以當豐之世六五隂虚柔暗有賴于两爻之助也曰慶者以四言也君臣相得之辭也曰譽者以二言也二多譽故蠱之六五下應九二則曰用譽坤之六四不在二位則曰无譽是也張子厚毛伯玉二家各得其一合而觀之可也右明象占程正叔曰五无虚己下賢之象聖人設此以為教朱子曰因其柔暗而設此以開之郭子和曰聖人貴夫持盈而不以豐大為務故書有招損受益之戒而易著豐蔀豐沛之失六爻之中稱豐者皆無善道而六五不言豐獨為可尚也李仲永曰二三四皆稱日中而有所蔽唯此爻不稱日中盖宜日中而无所蔽也案日中六二之象六五有日中之位彖所謂勿憂者為此爻而言則日中之𧰼雖在六二而中正相應實此爻之所宜也右明爻義上六豐其屋蔀其家闚其户闃其无人三嵗不覿凶贊曰豐其屋天際翔也闚其户闃其无人自藏也朱子曰以隂柔居豐之極處動之終明極而反闇者也故為豐大其屋而反以自蔽之象无人不覿亦言障蔽之深石守道曰窮大者必失其居聖人戒其過盛也楊子雲曰炎炎者滅隆隆者絶觀雷觀火為盈為寔天收其聲地藏其熱髙明之家鬼瞰其室右以本爻明象占路氏曰居一卦之上而位極其髙故曰豐其屋體隂柔之質而材蔽於闇故曰蔀其家无剛明之材以用下而且窮大以失其居焉九三雖應於下彼孰肯為之應哉此所以闚其户闃其无人而三嵗不覿也耿睎道曰豐其屋則外髙亢矣蔀其家則内幽闇矣是以九三折其右肱而終不為之用闚其户闃其无人也程可久曰闚其户闃其无人三嵗不覿言不得九三之助也户陽數竒九三之象也六五以謙接物故雖九四非應而必来本爻以亢自居雖九三正應而不為用此吉凶之斷也右以九三明象占陸氏曰屋於室為外家於國為私此爻窮於極大行失其中但豐於其外蔀其所私削國以益家反闚户无人李泰發曰豐其屋謂壮其所居也蔀其家謂屏蔽其所藏也案此大臣之營私自殖者闃其无人陸氏以為家空人亡也右明爻義艮下離上旅象贊曰山上有火旅雜卦曰親寡旅也林黄中曰旅者違其國去其家而託於他人者也王氏逢曰止而麗乎外旅也李泰發曰止而有所傳麗此䖏旅之善者王介父曰巽入也入而麗乎内所以為家人艮止也止而麗乎外所以為旅朱子發曰否之變也剛當居上柔當居下六居五失其所居而在外旅也楊廷秀曰内為主外為客山止而不動猶舎舘也火動而不止猶行人也李季辨曰古者四民商居其一洪範八政繼食以貨盖懋遷有无阜通貨賄亦有國者之先務也凡旅行者為商坐者為賈總名之旅也李子思曰死徙无出鄉者故旅之名不見于古因商而稱旅乃四民之賤者也自三代衰諸侯各自為國而大夫士不得志於國者違之於他鄉然後僑旅之名始興以至於國君公子之徒失國失位而奔走於外者比比有之故雖為君而猶不免旅則是舉天下皆旅矣案畫卦而重始于包犧文王特因所命之名而系之辭者也則商旅之懋遷自古然矣若夫諸侯大夫之至王廷朝方岳自相朝聘所謂四方之賓客行人凡託宿於道路舘舎者皆有旅義以至國君失國大夫士去位違之之於他邦者雖盛於晚周而太康失邦十旬弗反之事自夏已有之文王觀卦爻之𧰼以旅者四民之賤乃取下三爻為義而諸侯大夫士之旅於上卦之爻或寄其𧰼而亦不專指也以卦變言之六自三往五五卦之主也而三往居之客於外之𧰼也右明卦義𧰼贊曰山上有火旅君子以明慎用刑而不留獄右明卦用序卦曰豐者大也窮大者必失其居故受之以旅程正叔曰豐大至於窮極必失其所安旅所以次豐也林黄中曰離反居上震反為艮上下相反而成也郭子和曰豐之上六豐其屋蔀其家闚其户閴其无人而旅之𧰼己形焉所謂窮大者必失其居也右明卦序小亨貞吉贊曰旅小亨柔得中乎外而順乎剛止而麗乎明是以小亨旅三字衍貞吉也旅之時義大矣哉胡翼之曰覊旅之義輔己者少其志不得以大通故曰小亨郭子和曰大有之所以為大火在天上是以元亨則火在山上宜其小亨矣程可久曰柔得中乎外非大者之事故曰小亨耿睎道曰旅貞吉者旅之貞吉耳非所謂光亨貞吉者也李季辨曰旅有二義有出塗之旅行商是也有坐肆之旅坐賈是也小亨在外之旅出塗者也貞吉在内之旅坐肆者也内旅貴處艮止之義外旅貴出離明之義明而出則亨止而處則貞都聖與曰言小亨則旅之為道不利逺者而非可以大有為也言貞吉則止非利有攸往之材而旅亦非其時也諸儒之説不過出入孔子之贊盖卦以六五為主則為小事之亨次以艮之九三為𧰼則以得位之貞為吉隂為小陽以居上為貞當位為吉也以理言之覊旅之人无大亨通故所亨者小而易至謟巽故守正則吉也右明卦𧰼占初六旅𤨏𤨏斯其所取烖贊曰旅𤨏𤨏志窮烖也馮當可曰所處最下道途負販之民也李子思曰初本艮體安止於下而九四離體炎上而不下應殆將孤處而為末利之所昏志窮以召災者盖可必也程正叔曰烖眚對言則有辨獨言則謂烖患爾案在下无應援躬自負戴其貨寳而𤨏𤨏之聲聞於外盗斯奪之矣烖乃其所自取也右明𧰼占六二旅即次懐其資得童僕貞贊曰得童僕貞終无尤也九家曰以隂居二即就其舎承陽有實故懐其資初者卑賤二得乘之故得童僕處中得位故貞張子厚同馮當可曰上无應故懐其資而不售程可久曰臣有位妻有家子有親故於旅之在下者稱童僕焉林黄中曰即次而懐其資待時之義也時則未可以亨而有次可安有資可鬻有童僕可賴貞固守之斯善矣不言吉者旅於他邦无咎幸矣何吉之云彖之所謂吉者要其終而言之也李季辨曰在内為坐肆之旅此爻當之可以貞守之而无憂也即次則異於初之在途矣懐其資則无初之𤨏𤨏之聲矣得童僕則不自負戴矣爻當其位即次也承陽而无應懐其資貨而未售也初在己下得童僕也居中得正貞也艮止於内季辨之説或然右明𧰼占吕與叔曰以柔无所不順覊旅之安莫甚於此右明爻義九三旅焚其次䘮其童僕貞厲贊曰旅焚其次亦以傷矣以旅與下其義䘮也李子思曰接上卦之離故次則焚過剛則无徒故童僕則䘮二之貞无尤而此爻之貞則厲者剛過而不中非旅之道也張舜元曰初雖同體為六二之所得䘮其童僕也李氏曰雖於爻為貞而於旅為厲案下卦終則進上卦而艮止于下不與上接故九四之情近不相得雖陽得位可以即次而離火焚之矣九反親二而初六在下已歸于二而不可得奪故雖有童僕而䘮于六二矣陽在艮卦之上又居陽位貞也而位多凶非旅卑巽之義厲也此爻㳂六二之𧰼生文右明𧰼占馮當可曰以九居三全反旅道以此為旅雖貞亦厲右明爻義九四旅于處喪其齊斧我心不快贊曰旅于處未得位也喪其齊斧心未快也蘭惠卿曰處者有暫而不久之意非若六二之即次也李子思曰以陽居隂處而不行者也故其心不快也王氏逢同程正叔曰我者指本爻而言案旅以行為義處而不行非旅之亨也䘮其齊斧无以自防故留滯也雖資貨具在未至憂傷而我心終不快也離麗則不能行陽居隂位得所處之象也以剛而居隂位喪其齊斧之象也四心之位火性剽疾位隂而失其剛利不快之𧰼也右明象占六五射雉一矢亡終以譽命贊曰終以譽命上逮也林黄中曰離為文明為飛鳥為弧矢故有射雉之象馮當可曰六自三而升直入于二陽之中猶射雉而貫其中也離為雉明六五自三来也朱子曰雖不无亡矢之費而所䘮不多終有譽命也程正叔曰終以譽命終當致譽命也已譽命則非旅矣案三畫之離性介而文明雉之𧰼也然離之所以為離者以六五麗乎二陽之中也六非本居五者也自坤之三而上之射雉之𧰼也六射中五則九遯而下居三矣上卦本乾三陽竒畫駢置三矢之𧰼也中一竒畫之下為艮一矢亡之𧰼也有譽者陽也謂亡矢也出命者君也謂五位也九雖亡易窮則反九終歸五則有譽矣五終居九則有命矣為旅而至天位有客食王朝之象故有譽命言有君也故贊曰上逮也右明𧰼占李季辨曰上為在外之旅乘時射利者也如射雉然不靳一矢之亡然後可以得禽必委千金之資然後可以謀什百之利旅之善者也故終有以當富商巨賈之名易之道言不盡意故立𧰼以盡意𧰼立於此意皆旁通不旁通不足以盡意也凡在旅者即此𧰼可以推其時物不止為商旅而已也李季辨特止以卦體為説爾程正叔曰人君无旅旅則失位故五不取君義蘭惠卿曰衆旅人之主也李氏曰旅以麗乎文明為正四為未及上為已亢五適文明之時故為射雉右明爻義上九鳥焚其巢旅人先笑後號咷䘮牛于易凶贊曰以旅在上其義焚也䘮牛于易終莫之聞也林黃中曰離飛鳥於木為科上槁鳥巢之𧰼炎炎之極則有自焚之禍矣程可久曰巢言居之亢也李泰發曰鳥之巢木猶旅人之託迹於傳舍也巢者鳥所託以棲息者也今處離上是巢而遇焚失所棲息之象也右明𧰼李季辨曰五既得譽命可以守貞矣而利心无厭乃焚其巢方其焚也以身免為喜及其定也資貨皆䘮莫之追悔故後號咷牛所以載資貨也牛䘮則資䘮可知聖人設此義而後世謀利者莫不脗合馮當可曰牛在易野為旅者當随其資畜共處則无䘮矣置牛於平田易野而自居於髙險之上與牛相逺䘮牛于易終莫之聞也張舜元曰火有聲為笑號之象離為牝牛案六五約象兑兑為口舌號笑之象焚其巢者上九也旅人六五也見上九之焚其巢故先笑之既而焚䘮之極與之同體故後號咷牛離全體之𧰼易九之𧰼所謂乾以易知卦有大小辭有險易易皆指陽也牛䘮于易亦鳥自焚其巢之𧰼大抵旅貴卑巽故位隂爻柔多言吉右明占林黄中曰三與上應皆以剛居上而無相與之情故三焚其次上焚其巢三承九四之離為他人所焚也上焚其巢者自焚也三之焚其次則巢尚在也䘮其童僕則牛尚存也巢在則有可歸之理牛存則有行之資今也巢焚而牛䘮欲歸而無其所欲行而无其資凶斯至矣李仲永曰同人親也故先號咷而後笑旅寡親也故先笑而後號咷右明爻義李子思曰旅之時不冝用剛故三陽爻皆不安序卦曰旅而无所容故受之以巽從可知矣林黄中曰旅者去國之人也故剛而上者人之所託也柔而下者託於人者也是故旅之諸爻以隂託於陽下託于上者得其所託者也以剛託於柔以上託於下者失其所託者也趙氏曰六二六五柔得中位旅之正也故能即次而有懐資童僕之用射雉而終以得人之譽得上之命初六九四不及乎中者也九三上九過乎中者也旅之道不及則弱不自持過則剛必自折所以在内在外皆貴乎中也右明六爻厚齋易學卷二十八
