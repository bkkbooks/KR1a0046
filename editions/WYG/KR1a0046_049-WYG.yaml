body:
  text: 厚齋易學卷四十九宋馮椅撰易外傳第十七序卦周官太卜掌三易夏曰連山商曰歸藏周曰周易按連山歸藏乃神農黄帝之氏而十三卦制器神農黄帝實次包犧則是自神農以後傳包犧八卦而其序各不同所以夏用連山而首艮商用歸藏而首坤二氏無文字可傳所傅者卦之序也然則序卦者文王周易之序孔子推明其㫖也有天地然後萬物生焉盈天地之間者唯萬物故受之以屯屯者盈也直以天地體乾坤又以盈明屯義屯非盈也其象為靁雨之動滿盈故亦為盈義人亦物也後去聲凡卦所受之義詳說在輯傳屯者物之始生也凡物生之始必屯艱物生必蒙故受之以蒙蒙者蒙也物之穉也上蒙卦名下蒙卦義後凡此類皆同若有物蒙蔽之而聰明未開也穉直利反㓜也一作稚物穉不可不養也故受之以需需者飲食之道也需非養也養人以飲食而需為飲食之道人之㓜穉須飲食以養也飲上聲食聲似飲食必有訟故受之以訟飲食有得有不得或得則多或得則寡必有爭爭而不决必訟之於公以求决其曲直均其多寡得否訟必有衆起故受之以師師者衆也訟必有黨有證故為衆起之義師之為言衆也興兵亦為用衆衆必有所比比者比也比言其相親宻詩其比如櫛比必有所畜故受之以小畜小畜畜比大畜畜无妄比者人情故為所畜之小无妄者天理故為所畜之大物畜然後有禮故受之以履人情相比必有出於其類者畜之畜之則有上下等級品節斯之謂禮履聲同亦為禮人之所行也以通篇例之當云履者禮也今无之者以礙泰義故不言若夫天理无妄藴畜於中心必有以養其天理故大畜之後次之以頥履而泰然後安故受之以泰取安泰之義泰者通也又别起義以接否卦故易安為通物不可以終通故受之以否物不可以終否故受之以同人取交不交之義與人同者物必歸焉故受之以大有物歸之則能有天下之大有大者不可以盈故受之以謙有大者易盈故聖人欲人滿而不溢謙者歉然不足之意與滿盈相反故彖賛率以盈對謙有大而能謙必豫故受之以豫二卦之義難通故通大有以三卦為義謂有大物而又能謙則人情必說豫也豫必有隨故受之以隨以喜隨人者必有事故受之以蠱蠱者事也喜謂豫也此又通三卦以為義謙而說說而隨隨而忘反故事乃蠱敗正義曰蠱乃有事非訓蠱為事也耿睎道曰事斯有蠱蠱斯有事有事而後可大故受之以臨臨者大也臨非訓大也陽為大大謂二陽浸長也物大然後可觀故受之以觀可觀而後有所合故受之以噬嗑嗑者合也二卦之序其義未明四隂之觀二陽無有閒之者頥中有物以閒之必噬之而後嗑噬嗑去閒之卦也物不可以苟合而已故受之以賁賁者飾也㑹合必有禮文之飾致飾然後亨則盡矣故受之以剥亨今享鄭徐用今文享燕享也為酒食燕樂以盡其歡洽之情則无復有飾之者矣剥者剥也卦名為剥撃之剥卦義為剥落之剥乃盡也或曰當為剥者盡也則文義相貫物不可以終盡剥窮上反下故受之以復上下定體反今翻復則不妄矣故受之以无妄復之无妄又别立一義不與剥通有无妄然後可畜故受之以大畜或於无妄下加物字自復以來皆言聖學大抵真實无虗偽乃可畜聚物畜然後可養故受之以頥頥者養也此雖轉言物然所畜誠實亦必貴養不養則不可動故受之以大過謂養萬民然後可以動衆舉大過人之事物不可以終過故受之以坎坎者陷也過義又一轉為過猶不及之過坎陷於中不可過也陷必有所麗故受之以離離者麗也坎又只論陷義不論中義麗必有所感故受之以咸咸者感也鼂以道曰後人妄有上下經之辯故省此三句王氏昭素云諸本皆有之右上篇有天地然後有萬物有萬物然後有男女有男女然後有夫婦有夫婦然後有父子有父子然後有君臣有君臣然後有上下有上下然後禮義有所錯夫婦之道不可以不久也故受之以恒恒者久也咸至恒又自天地萬物起論直推至禮義有所錯然後再言夫婦之道以恒接咸則知上下篇之分自文王序卦然矣物不可以久居其所鄭作物不可以終久於其所故受之以遯遯者退也退則不久終於其所矣恒又轉一義物不可以終遯故受之以大壯以雜卦大壯則止為義物不可以終壯故受之以晉亦以壯為止晉者進也進必有所傷故受之以明夷二卦反對故取此為義夷者傷也傷于外者必反其家故受之以家人反今返生外字意以接家人家道窮必乖故受之以睽睽者乖也二卦反對故取家道之窮為義乖必有難故受之以蹇蹇者難也難去聲蹇亦非難以其有艱難之意物不可以終難故受之以解解者緩也緩必有所失故受之以損解則難有緩義損去則有失義此皆欲生卦序之意故取諸此損而不已必益故受之以益益而不已必決故受之以夬如水澤之積益而不已必決其防夬者決也決必有所遇故受之以遘遘者遇也正義作君子決去小人之義去於此必有遇於彼物相遇而後聚故受之以萃萃者聚也聚而上者謂之升故受之以升升而不已必困故受之以困困乎上者必反下故受之以井二卦反對其序不通却就升言困義反平聲上下定體井道不可不革故受之以革亦止得如此取義革物者莫若鼎故受之以鼎石氏曰革既革窮弊之事則必新立制度鼎取新義又取神器之名故以長子主器為序主器者莫若長子故受之以震震者動也又以卦性為義物不可以終動止之故受之以艮艮者止也物不可以終止故受之以漸漸者進也進必有所歸故受之以歸妹進本晉今漸亦取進義欲就以歸為義也故歸妹不取妹義得其所歸者必大故受之以豐豐者大也窮大者必失其居故受之以旅旅而无所容故受之以巽巽者入也入而後說之故受之以兌此又通旅无所容為義兌者說也說而後散之故受之以渙散去聲說與散似不甚相蒙渙者離也離平聲坎險在下九五已離乎險故曰渙物不可以終離故受之以節節而信之故受之以中孚人情不知限極渙然无統故立為品節使尊卑大小各安其分人情初若不堪及其久也知天下之分不可不節不節則亂故信之有其信者必行之故受之以小過以信而必行无從權適變之意故或小有過差有過物者必濟故受之以既濟物猶人也又取過人為義不取過差物不可窮也故受之以未濟終焉常人則以未濟而後既濟為序今以未濟後於既濟則有無窮之義濟不濟未可知也所謂過此以往未之或知也終焉二字趙氏蕤謂疑非孔子之辭後人増益之也右下篇厚齋易學卷四十九
