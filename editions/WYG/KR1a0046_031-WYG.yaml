body:
  text: 厚齋易學卷三十一宋馮椅撰易輯傳第二十七經下篇中孚小過兑下巽上中孚豚魚吉利涉大川利貞案中孚義猶无妄也有正有不正如盗賊之相羣男女之相期士夫之死黨小人之握手出肺肝相視皆孚之不正者也故曰貞吉初九虞吉有他不燕案字以羽族孚子為象故六爻皆有取於此虞是山虞防守山林䕶鳥獸之卵胎斧斤捕獵非時不得入也是故中二隂爻孚者也卵有孚有不孚六三失信不孚者也六四當位孚者也爻之序自初至上九二得中而先者也故為鳴鶴九五得中而後者也故為子和初在前防其巢者也虞人是也上最後雛而飛舉者也翰音之登天是也初當位故吉二隂孚最近者二五是也爪翼覆之而孚於上皆隔一爻非能孚者也故二爻皆不取孚義故不專心致志防護山林而有它志則羣鳥不安矣有應在四故設此戒耳燕或取燕雀之象兊之初七月末社燕猶在也過此之它則巽在東南又明年矣社過則无燕故有不燕之象九二鳴鶴在隂其子和之我有好爵吾與爾靡之案燕爵皆取飛鳥之象諸爻有應皆有闗隔反无應義唯二五无間隔乃以同德相孚中虚相感故有取鶴鳴子和之象或以鶴為胎生非也豈有不卵生羽族哉六三得敵或鼓或罷或泣或歌六四月幾望馬匹亡无咎九五有孚攣如无咎上九翰音登于天貞凶案易凡有應而不得應者必鳴以求其應如鳴謙鳴豫是也今卦取鳥之孚卵故以翰音為象爻應六三而九五隔之本爻乃登於五之上而呼之有羽翰之音登於天之象又曰卦中虚故多取聲音𧰼又曰鷄之鳴必信而巽又有此𧰼禮有此名宜无疑者然恐周家偹此名物夏商之質未有此稱則亦恐泛以羽翰之音為象而聲聞於天詩亦以此稱鶴則於斯二者難以臆説定也艮下震上小過雜卦曰小過過也朱子曰四隂在外二陽在内隂多於陽小者過也李子思曰二陽畫處不中之地失位而無權隂畫乃在二五居中用事而初上二隂又從而佽助之則是隂盛陽微而小者之過可知程可乆曰剛在外而柔居於内於理為當故為頥為中孚柔在外而剛揜於内於理為過故為大過小過四隂揜二剛又為小者之過也案以未重之卦言剛藴柔為離之麗柔揜剛為坎之䧟義可見矣司馬君實曰隂之過差者也李元逹曰大過上下不當其所而本末皆弱能過越小者而已小者之材不足以有為能過越大者所以為過也案易二大小卦小畜為小畜大而大畜亦為大畜大何也下卦皆乾陽也若乃大過則為大過小小過則為小過大何也多寡之不等也李氏之説其義然矣右明卦義𧰼贊曰山上有雷小過君子以行過乎恭䘮過乎哀用過乎儉説卦曰斷木為杵掘地為臼臼杵之利萬民以濟蓋取諸小過右明卦用序卦曰有其信者必行之故受之以小過李泰發曰自中孚二爻相變上下反合中孚柔在内而剛得中小過則剛在内而柔得中毛伯玉曰中孚卵之𧰼小過飛鳥之象未化則為中孚已孚則為小過中孚上九翰音登於天明小過之以反對次中孚也序卦者言其理此言其𧰼卦之為序當以𧰼為本指右明卦序亨利貞可小事不可大事飛鳥遺之音不宜上宜下大吉贊曰小者過而亨也過以利貞與時行也柔得中是以小事吉也剛失位而不中是以不可大事也程正叔曰卦自有亨義過之道利於貞也不失時宜之謂貞過所以求就中也所過者小事也事之大者豈可過也李氏曰易以隂陽之剛柔定大小之分故剛過而中為大過柔得中則為小過小者之材所以過而亨者以其得中而不為己甚也過以趣時為正唯時不能然過以矯之所以為正也得其時則柔足以有為故柔得中是以可小事假二五而言也非其時則剛不能以有為故剛失位而不中不可以大事假三四而言也趙氏曰合全體而言之則剛中故亨利貞析二體而言之則柔得中而剛不中故可小事而不可大事也程可乆曰小者既過也而位上下之中故亨也夫矯天下之枉者以過為正故利特不可常爾柔者妻道也臣道也子道也雖曰得中止可用小事剛者天道也君道也父道也以其失位而不中故不可大事朱子發曰譬之寒或過於隂暑或過於陽冬裘夏葛无非正也毛伯玉曰卦有飛鳥之象中孚有卵化之象鳥飛則兩羽翼成矣是以不繫之元而但言亨利貞也右明前𧰼占贊曰有飛鳥之𧰼焉飛鳥遺之音不宜上宜下大吉上逆而下順也陸希聲曰柔在内而剛在外有鳥孚卵實之𧰼變為小過則剛在内而柔在外者有飛鳥之𧰼大者在内其道未顯故不可以上行而可以俯就李季辨曰上體飛而下下體飛而上飛鳥遺之音謂上六也上極而亢有遺墜之音飛上者逆飛下者順隂道不可令居上故卦言不宜上宜下贊言上逆而下順也李泰發曰隂柔得位而為主上下皆小人也君子於此時有飛鳥之𧰼焉鳥飛而遺其音猶君子當遐舉逺引而棄其聲名之時也二剛在内君子也四雖上承於五而進則犯上故不宜上二能承三三退則得所承故宜下也知難而退吉孰如之正義曰鳥失聲必是窮迫未得安處蘭恵卿曰上卦四五隂陽皆失位故不宜上下卦二三剛柔皆當位故宜下案全體有飛鳥𧰼而二體各飛則從其所好震動而上上飛者也善鳴則有音也艮止於下下飛者也上飛者其聲音有遺尋其聲則矰弋得以施之故不宜上也下飛者雖有遺音而反山林則得其所棲矰弋所不能施宜下大吉也大指陽爻則九三也此𧰼專為二陽爻為之謀也陽君子也當小過之時陽揜於隂而求脱者也如鳥斯飛則引去者也身雖引去而聲音有遺若猶戀禄仕去本朝而出仕人國則矰弋之所不免也唯反栖山林而不出則大善矣不宜上宜下猶曰不宜出宜反也右明𧰼後占初六飛鳥以凶贊曰不可如何也李子思曰大過之棟小過之飛鳥寄之初上何也棟梁之用必處於室之中而飛鳥之逆順則見於上下故也初之飛在下而以其繫應而上飛勢不可遏殆將以此取凶李泰發曰以隂柔處於艮下可止者也而正應在四四為動初不能止靜如鳥之飛未知前有矰繳之虞凶之道也案郭景純洞林曰占得此者或致羽蟲之孽鳥飛以翼不在翼而在翰初上兩翰也故鳥飛𧰼焉右明𧰼占司馬君實曰以凶者止過宜在初也與坤𧰼之初同皆戒於初而慮於終也蘭恵卿曰大過之初過謹則无咎小過之初不謹則有凶聖人之救過戒人深矣右明爻義六二過其祖遇其妣不及其君遇其臣无咎蘭恵卿曰初者陽位祖也二者隂位妣也臣也三者陽位又以陽爻居之君也六過初而居二是過祖而遇妣居二而未至於三是不及其君而遇其臣也閨門之内私恩可過故妣可以過祖朝廷之上公義不可過故不及其君而遇其臣臣不可過也王氏逢曰處中以正可以過也知其分而止焉得所遇也劉氏仲平曰祖妣内也内則主恩仁之過也君臣外也外則主敬義之别也張知常曰相過之謂過邂逅之謂遇李泰發曰以柔居隂位臣子之道也小過之世以中為遇焉配祖則妣也承君則臣也案爻止以艮三畫取象不及震又自取新例祖妣君臣之爻位所以説者多不同唯蘭王數家得之蓋六位一定而不易六爻變動而不居以六言之自初至二前有陽爻以止之故過初而過二不及三而止曰其云者指二也故初内為祖而三外為君六過初而不及三乃遇二也二與初配則妣也猶丑之配子位相比也二承乎三猶臣也猶地之載人位有間也初二為地三四為人五上為天况初隂鬼道也三陽君道也或曰卦以五為君未聞以三為君者蓋古者諸侯皆有君道在上體則通全卦言之五大君之位天子也以八卦言之則下體自為一國諸侯也全卦則上兩位為天而五在下配天大君也下卦則三位為天在上卦之下國君也諸卦三有取𧰼於公者即諸侯也配王則稱公配天子則稱諸侯配元后則稱后配大君則稱君又何疑焉右明𧰼贊曰不及其君臣不可過也程正叔曰過臣之分其咎可知案无咎之義繋於君臣而不闗於祖妣故贊之義云然遇臣而不及其君本宜有咎然卦體為小過則君不可過與其過也寧不及也故无咎也此為士之入人之國得遇其臣而未見其君之𧰼然過祖遇妣亦非有咎者也右明占李仲永曰諸爻遇則弗過過則弗遇唯此爻得中故有過有遇案小過之世得中為貴五中而失位又不如二之位當也特過於隂故僅止无咎而已右明爻義九三弗過防之從或戕之凶贊曰從或戕之凶如何也李季辨曰爻居下卦二隂過陽不過爻必防之若從之則被其戕而凶也朱子曰小過之時事毎當過然後得中此爻以剛居正衆隂所欲害者也而自恃其剛不肯為之備故其𧰼占如此若筮之者能過防之則可以免矣李子思曰陽不能過隂而慮隂之過以傷我則要在周防而捍禦之苟以隂私近比之故而俯從之反與之狎䁥而不知戒則或受其戕害之凶矣此爻以剛居陽有重剛之材在上可以制在下之隂故聖人設此辭以戒之正義曰或者未必然之辭案爻所以弗過者寡弗過衆陽一而隂二也然位則過乎二隂之上必須防之苟以在上而弗為過越之行下與二隂相從情非相得隂險之人或有戕害之者則凶无及矣艮止也二隂進而一陽止之弗過之𧰼也亦防之之𧰼也右明𧰼占蘭恵卿曰小者隂也大者陽也小者皆過而大者皆弗過不勿弗者皆不然之辭不者无也勿者不可也弗者不肯也陽自知其𫝑不敵隂故弗肯過之若論其義則陽貴而隂賤陽大而隂小陽可過隂隂不可過陽今陽之知幾而不肯過隂者時也右明爻義九四无咎弗過遇之往厲必戒勿用永貞贊曰弗過遇之位不當也往厲必戒終不可長也劉氏仲平曰无咎善補過也而此爻之无咎不待有為何也蘭恵卿曰以剛履隂非如九三之過剛而不為小人之所戕故曰无咎案此特例也蓋沿九三之象而生辭李氏曰剛失位而二隂已過而居其上勢必不能過於柔而制其心特以禮遇之使不得為亂而已往厲必戒者危其往而教之以謹也以是而權之可矣非永貞之故曰勿用李泰發曰方羣隂用事之時求動而進則危矣故當戒謹亦勿固守其正而昧於幾也處小人之間求進則為所擠陷守節則為所忌嫉蓋處位不當姑靜以俟天時之復而已朱子曰陽性堅剛故又戒以勿用永貞言當隨時之宜不可固守也程可乆曰防其戕者其禍深戒其厲者則禍淺上下之𫝑異也右明𧰼占案此卦合六畫觀之有鳥衡飛之𧰼四隂如翼方張而二陽如腹背之聽命於兩翼此以卦論也析二體而觀之則震動而上艮止於下上者自上下者自下隂陽又自為敵而以相比為吉凶六爻无上下之應則上卦一陽二隂小者過也下卦亦一陽二隂亦小者過也故九三防在下二隂之戕而此爻遇在上二隂之厲二陽相比而情各異趨此四隂得以為害者其羣分其黨㪚也夫隂在下則進而消陽在上則降而下墜故三防下隂而四遇上隂也右明爻義六五宻雲不雨自我西郊公弋取彼在穴贊曰密雲不雨已上也程正叔曰陽降隂升合則和而成雨隂已在上雲雖密豈成雨乎李季辨曰君位而隂居之隂倡則不成雨朱子發曰兊澤之氣上而為雲兊盛隂也故為密雲澤降則雨兊澤之氣已上而不降故雲雖密而无雨也隂倡而陽不和不雨之𧰼五自謂曰我爻辭與小畜之􅂏同蓋所畜之小與所過之小皆不可以大事過之則畜之矣吕與叔曰此爻得位隂之盛者且在二陽之上故應斯𧰼蘭恵卿曰隂過或不及皆不雨自我西郊自我隂爻所致也案此正猶蠱之彖應巽五之𧰼五位乎君足以主一卦故象或應他卦之􅂏也此卦約𧰼兊澤氣上於二陽而為密雲下有互體巽風以㪚之故不雨西郊亦兊之𧰼此爻當兊之上故云自我陽倡則隂和而成雨隂倡則陽不和而不雨矣小畜之𧰼正應此爻六四互體兊而上卦巽成小畜者六四也右明𧰼程正叔曰在穴指六二也二與此爻本非相應乃弋而取之五當位故為公謂公上也張子厚曰有飛鳥之𧰼故因曰取彼在穴楊庭秀曰如初六上六之飛鳥不能射也則乗其栖宿於巢穴者而弋之案此隂上至五而隔於二陽初上飛而不可即唯有六二居所應之地而不應獨隂不足以倡二陽而不能和以致雨也則徒曰自我西郊為隂之過而四隂分而不聚同體者三而上逺舉矣四又陽爻而以我為厲則有下取六二之應以取我配陽六二不飛而止於艮山之下者也竒畫在上而耦畫在下穴之𧰼需之九五六四正同此𧰼言取則有不必𫉬之義公猶獻豜於公之公李泰發曰公弋而取彼在穴失三驅之義又失弋不射宿之義蘭恵卿曰在穴鳥之隠伏為過之小者已亦隂柔不雨不能施澤以赦宥小過之罪乃於穴弋而取之案唯其時物所遇而占之亦可通也右明占上六弗遇過之飛鳥離之凶是謂災眚贊曰弗遇過之已亢也李去非曰上已過無所遇也朱子發曰上不與五相當失中也又動而過之則甚矣陸希聲曰四以陽承五故弗過遇之上以隂過中故弗遇過之程正叔曰處過之極不以理遇動皆過之違理過常如飛鳥之迅速所以凶也案五君位四與上承乗而同體者也四在五下故弗過五而遇之上在五上故弗遇五而過之正猶六二之取𧰼也夫已過五是臣過君矣臣不可過罪也如鳥之飛而過也然離於網羅則誅譴臨之凶之道也此爻變離易窮則變也其取𧰼於離小過變則可以通離所謂變而通之者也郭子和曰鳥之飛也多失之過過則離於凶焉李泰發曰震動之極如鳥之飛必離矰弋之凶李子思曰如鳥之飛不能戢翼少止而終離於網羅之凶雖曰氣數之厄亦自有以取之也程正叔曰天理人事皆然也朱子曰是謂災眚釋其凶之義也右明𧰼占蘭恵卿曰始以小過為無傷而弗改如鳥之飛翔於始其終遂至離於網羅李仲永曰處小之終而不變其過過而不改是謂過矣李去非曰旅在上則鳥焚其巢過在上則鳥離其凶小人飛揚䟦扈之志觀此可以少抑矣李泰發曰君子制行適於中而已矣太卑過亢皆致凶之道故初與上皆有飛鳥之凶初太卑而上過亢也右明爻義蘭恵卿曰二陽居不用事之地四則剛柔相濟而无咎三則過剛而或戕二五雖中而過二在下而不及五在上而不雨初上為過之初終則似鳥之飛而終離於網羅也案卦猶大過六爻中二爻為配二五初上各相配取𧰼右明六爻厚齋易學卷三十一
