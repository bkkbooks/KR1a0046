body:
  text: 厚齋易學卷五宋馮椅撰易輯傳第一經上篇乾坤乾下乾上案舊注乾下乾上六十四卦皆然然三代以前用刀刻方冊无小字此後人所増也説卦曰兼三才而兩之故易六畫而成卦又曰陽卦竒隂卦耦又曰聖人設卦觀象又曰八卦成列象在其中矣又曰八卦以象告又曰成象之謂乾易緯曰卦者掛也正義曰言縣掛物象以示人故謂之卦但三畫之體雖象隂陽之氣未成萬物之象於萬物變通之理猶未盡故重之而有六畫備萬物之形象程可久曰易起數以定畫因畫以生辭定辭以明象立象以盡意案自大造言之則有理而後有象有象而後有數自包犧言之則起數以定畫因畫以明象立象以盡意而文王則因意以繫辭者也盖大造自源而沿流包犧自流而遡源爾程説謂文王之易也朱子曰包犧仰觀俯察見隂陽有竒耦之數故畫一竒以象陽畫一耦以象隂見一隂一陽各有生一隂一陽之象故自下而上再倍而三以成八卦又曰包犧乃未有卦時畫出成卦文王則就已成之卦而衍爻非是畫一畫而又始思第二畫也方一畫時畫畫皆具馮當可曰觀易於畫可見一隂一陽之道易之畫不過竒耦竒耦進退而四時成八卦備八卦備而六十四卦備天人事物之理變化消息之道盡於此又曰易之象在畫易之道在用知所用則畫不徒設矣此乾坤所以立用九用六之例也一隂一陽之謂道可謂至論麻衣曰无窮妙義盡在畫中陳圖南曰犧皇卦畫若今經書正文文王孔子之辭乃是注䟽始畫八卦重為六十又四不立文字使天下之人觀其象而已能合象焉則吉凶應違其象焉則吉凶反鄭康成略知此説後世卦畫不明易道不傳聖人於是不得已而有辭學者謂易止於是而不復知有畫矣案易有象謂竒耦之畫雜居六位之象非止有物之象也是故觀畫則知象觀象則吉凶悔吝可知矣抑聞之曰易有内象有外象内象理也外象物也楊中立曰讀易必先識根本竊謂易之根本在隂陽隂陽之象在畫一竒一耦徃来更代有无窮之變李子思曰方一隂之生於時為午於節為夏至隂氣之所激宜其為寒也而反熱一陽之生於時為子於節為冬至陽氣之所激宜其為熱也而反寒盖一隂之氣萌於地下推出陽氣而發見於外故熱一陽之氣萌於地下推出隂氣而發見於外故寒此隂陽之氣自下而上而六畫象之非聖人之私意也右論六畫之位始終之序如此凡静則自上而墜下死道也動則自下而升上生道也觀植物之生可見矣正義曰王輔嗣等以為包犧既畫八卦即重為六十又四按重卦或以為神農或以為禹其非有不待辨者獨司馬遷之徒以為文王夫八卦不足以盡天下之變明矣使包犧之畫止於八卦則亦大踈矣况夏商之時卦已六十又四見於周官明甚十三卦尚象制器亦有見於神農黄帝堯舜之時者盖包犧畫此八卦以具其體使筮者因而重之以盡其變有六十四卦之畫而无其辭文王則具六十四卦之體而衍三百八十四爻之變各占其動而繫之以辭云爾彼盖誤以文王衍卦之六爻為重六爻而不深考也嗚呼生蓍以衍七八九六者文王也乃以為始於包犧以卦重卦者包犧也乃以為始於文王衍爻而繫之辭者文王也乃以為周公至於易之名義亦錯亂无據甚矣秦火之烈而諸儒之失其傳也説卦曰成象之謂乾效法之謂坤案此言畫卦之始一畫之奇即已成象坤則畫耦盖效乾之畫而法之者也右明卦畫乾程正叔曰乾坤古无此二字畫卦者特立此二字以明難明之道按古文乃立乾坤之畫至於水火之文亦是立坎離之畫盖包犧畫八卦之後文字始生乃象卦之義以立名非先有此而後有卦畫以象之也程可久曰乾之為名八卦之一也乾陽物也為天為君為父者皆其所告之象所類之情也呉斗南曰筮易之法揲蓍求畫畫備為卦所畫者卦爾揚子雲有言觀易者見其卦而名之文王於每卦為之彖辭故題卦名以繫之焉盖所畫之卦即其名也左氏循文王之題既畫卦而又名之正義反謂左氏不畫卦今畫卦者後學私畫以備忘非也右明卦名象贊曰天行健説卦曰乾陽物也又曰夫乾天下之至健也徳行恒易以知險又曰乾健也又曰乾剛坤柔陳圖南曰凡天下之所謂健者皆乾也順者皆坤也入者皆巽而動者皆震也陷者皆坎而麗者皆離也止者皆艮而説者皆兑也仲尼特舉八卦之大者以為宗本爾案乾純陽故其徳剛其行健李季辨曰四徳見性六爻見情成之者性謂健也四徳猶性之有仁義禮智故即仁義禮智以見性右明卦義説卦曰乾天也又曰乾為天程正叔曰天者乾之形體乾者天之性情正義謂天與乾為體用程可久曰倫類不通如艮兑不可為山澤之用也李季辨曰乾天之理也未有天先有乾之理太極既判天就易中禀得剛健中正之徳故曰乾蘭恵卿曰天地者形也乾坤者所以法象天地者也天徳剛健地勢卑順故聖人畫為乾坤以法象天地之健順案太極未判已有健順之理動而生陽静而生隂乃有健順之氣積陽上浮成形而為天積隂下墜成形而為地天地者盖禀乾坤之氣以成形者也包犧氏仰則觀象於天俯則觀法於地於是即陽之純而剛健者法天行之健畫卦而名之曰乾即隂之純而柔順者法地勢之順畫卦而名之曰坤是天地禀乾坤之氣以成形包犧法天地之象以畫卦二説初不相悖也故曰法象莫大乎天地説卦曰乾為天為圜為君為父為玉為金為寒為氷為大赤為良馬為老馬為瘠馬為駁馬為木果趙氏曰古今説者徃徃直以乾坤為天地不復玩味其辭以求消息盈虚之理胡不以未有十翼之前觀之乎二卦爻彖之辭凡百二十七字自飛龍在天一字之外皆未嘗以天地為言至孔子乃始詳陳天地之理特舉其得健順之大者以明之耳右明卦象象贊曰天行健君子以自强不息石守道曰乾下乾上純剛至精之氣无一隂以雜之人君固當法乾使朝廷上下皆君子不可使一小人亂之也楊廷秀曰人君體乾之剛則必力於行道勇於進徳明於見善決於改過用賢必堅去邪必果建天下之大公破天下之衆私聲色不能惑隂邪不能奸矣右明卦用等而下之隨其分量皆當知所用説卦曰天尊地卑乾坤定矣又曰乾知大始又曰黄帝堯舜垂衣裳而天下治盖取諸乾坤又曰乾以君之又曰乾天也故稱乎父李子思曰説易者謂无極之前以隂含陽隂為陽母毎以坤先乾此歸藏學也諸儒論卦氣所起從坤而来大抵宗本此説夫无極之前未有兆眹也而孰分其後先太極肇分坤體寂然之初乾陽之氣先動而坤從之乾之一陽交於坤而為震坤之一隂於是乎感而從之交於乾而為巽則是乾之一索實先乎坤故説卦之序曰萬物出乎震齊乎巽此乾之所以先坤而為文王之易之序也又曰孔子於乾坤二卦彖象文言訓釋㫖義既已曲盡而又論天尊地卑之位天一地二之數乾父坤母之分乾剛坤柔之徳天地君臣之序上下禮義之錯大率以乾先坤後為義遂使乾之道行乎天下而天地位萬物育至今訓義之著於人心與春秋書元書王書正之法相為表裏則孔子之易學於天地兩間之功用豈曰小補之哉右明卦序元亨利貞林黄中曰六十二卦彖辭以二體與剛柔雜居言其性情乾坤純體无剛柔之雜自初至上以始終為序故文王繫之以元亨利貞之辭李子思謂文言字字有位置噫豈唯文言哉易之一書皆然林氏之論深得其㫖元亨下乾之象利貞上乾之象也郭子和曰乾道也元亨利貞其徳也李子思曰此所謂和順於道徳林慎㣲曰繼道者善繼乾者元二説皆得其指以和順於道徳言之則乾道也元亨利貞徳也以一隂一陽之謂道繼善成性言之則乾道也元亨利貞善也健性也故曰元者善之長亨利貞皆善也元乃其長耳朱子曰此聖人所以作易教人占筮而可以開物成務之精意餘卦放此或疑辭變象占易有聖人之道四焉今専以筮占言易可乎曰人心皆有此易聖人先得此心之同然者不待占而已知來物故其以言以動以制器无非易也然或有大疑則決之蓍龜舜有官占洪範有稽疑周官大卜簭人初不廢此况夫百姓日用而不知是興神物以前民用聖人以此設教焉可誣也右明彖指即象占也贊曰大哉乾元萬物資始乃統天雲行雨施品物流形大明終始六位時成時乗六龍以御天乾道變化各正性命保合大和乃利貞首出庶物萬國咸寜文言曰乾元者始而亨者也利貞者性情也楊廷秀曰彼異端者以空言性命為元其究窒於亨之用以詭遇事功為利其究賊於貞之體右以元亨為一義利貞為一義文言曰元者善之長也亨者嘉之㑹也利者義之和也貞者事之幹也君子體仁足以長人嘉㑹足以合禮利物足以和義貞固足以幹事君子行此四徳者故曰乾元亨利貞都聖與曰在天為四時在地為四方在人為四端程正叔曰讀易必先識卦體四徳闕一不成乾如兀子少一足即不成又曰唯乾坤具此四徳在他卦則隨事而變焉李仲永曰他卦或具得之而孔子不言利者不足以盡乾所利之大也王氏逢曰始降氣而造物者元也著明其分而達之者亨也因所宜而成之者利也固其本而終之者貞也李季辨曰元胚腪也亨發達也利成遂也貞不變也李仲永曰元則始萬物也亨則長萬物也利則遂萬物也貞則成萬物也非健而不息安能若是又曰乾如斗焉斗指於東則為春指於南則為夏指於西北則為秋冬四時行而不息所謂健也李子思曰一人之身天地咸具以心言之元者一念之始生者也亨者出與物交者也利者舉斯心而加諸彼者也貞者人與物辨者也以氣言之昧爽之氣即所謂元晝日之氣即所謂亨與利而夜氣則反本而歸正者也右析為四徳程正叔曰四徳之元猶五常之仁偏言之則一事専言之則包四者郭立之曰元之在乾猶人之有首林黄中曰四者其本一一者何元之謂也元則亨而利利則貞耿睎道曰近取諸身乾元者元氣也周流於身豈非亨乎榮潤其身豈非利乎邪氣不受受則為疾豈非貞乎右主元文言曰乾始能以美利利天下不言所利大矣哉大哉乾乎剛健中正純粹精也六爻發揮旁通情也時乗六龍以御天也雲行雨施天下平也李子思曰孔子於四徳多言元而貞繼之罕言利也至此總歸於利以見乾之為利如此之大也右主利李子思曰一陽之氣運轉於太虛之中健而无息者也元亨利貞乾道之始終也乾之生出唯一元字而乾之歸宿唯一貞字若夫亨與利則其間之功用也乾元一氣之動唯其有所歸宿之地是以周流今古運用不窮易之所以為易者此也又曰孔子論文王八卦始震終艮震者乾陽在下為動之始艮者乾陽在上動極而止者也震之動即乾之元而艮之止即乾之貞貞内伏元艮申起震故曰萬物之所以成終而成始者也右主貞程可久曰徳也者合而言之則大亨以正分而言之則元者始而亨者也利貞者性情也析而言之則元者善之長也亨者嘉之㑹也利者義之和也貞者事之榦也亦猶四時兩而言之則曰隂陽一而言之則曰嵗或合或離各當其時物而已案易道廣大聖人之言亦廣大縱衡曲直皆可推而通凡彖象所繫自正意之外皆可旁通曲暢故孔子於文言説卦敷陳而推明之毛伯玉曰易者象也不正言之而以象言盖无徃而不在也文王孔子各以己意互明之至於序卦雜卦又所謂旁通曲暢者然則易未嘗有定説而亦未嘗定為一説也今之傳解累數百家不勝其異然短長乗除苟不至於穿鑿无理安知不得其旁通曲暢者哉是説深得其指盖以三百八十四爻包括古今萬事之變非事之所能盡而舉其象焉則以言不盡意而立象以盡之也觀左氏所載占辭出於文王繫辭之後而不専用文王之辭而孔子十翼亦多出於辭之外盖文王之辭特舉一隅耳麻衣曰辭外見意方審易道斯言得之或曰易以天道明人事者也他卦之彖言天道必繼之以人事而乾獨不及之何也曰乾天也専以天道明之故不及人事也此特例也自六十二卦言之則乾坤特為一例自乾坤二卦言之則乾又特例焉如六爻之備三才孔子大象之不言乾例也右推廣彖義初九都聖與曰以時言之有初則有終以位言之有上則有下以數言之有二三四五則有一六三者互文以見也初不謂之下者一陽數而下之位卑非所宜居也曰初則有克終之意上不謂之終者終則窮矣曰上則有反下之意初以時言上以位言各舉其盛者也李季辨曰一言初六言上始終不隸乎數所以相循而无窮林黄中曰不曰九初而曰九二盖以初攝九則始終之義明以九攝二則體用之情著右明位先儒曰七八卦數九六爻數吕與叔曰爻稱九六而不稱七八盖變者有占占必有辭故繫辭於爻之下以定吉凶程可久曰竒數一二三四䇿數七八九六五與十不用此四徳四時四象之驗變數九六卦數七八陽升而隂降九六者易數之窮也案蓍生百莖而聖人用其半以衍數虛其一以四十九數分掛揲扐三變而成一爻其揲數之竒則一二三四而扐之則不用也其扐之餘數則六七八九盖以四乗之二十四䇿則六也二十八䇿則七也三十二䇿則八也三十六策則九也聖人又以天地五行生數合之天數一三五參之則九也地數二四兩之則六也而七八不與焉况陽浮而升隂沉而降自七而升九猶陽數也自八而降六猶隂數也數未窮則静而不變故无眹无眹則不占爻以占卦卦以彖名七八不用矣若夫陽升至九則數窮而下變六隂降至六則數窮而上變九一曰九下變八六上變七此隂陽徃来循環之運而不窮者也故九六隂陽之數已窮則動而生變故用此占之所以題九六於六位而繫之辭林黄中畧知此説其餘隂陽饒乏盈縮進退諸説皆似之而未真也唯隂陽老少一説轉相傳襲莫有悟其非者夫謂七少九老可也謂八少六老可乎唯胡翼之謂陽以老為尊隂以少為貴差為有理而亦非易窮則變之義右明爻林黄中曰初二三四五上以為經六七八九以為緯而後易之義有所錯矣李子思曰九六爻錯於六畫周流於六位所以象隂陽氣數運行之所寓其或竒或耦或當或否或中或不中或應或不應吉凶悔吝之事皆可推求於爻位之間聖人因取其象以論情之愛惡數之得失而托於辭以明其理之是非而占其事之吉凶悔吝是則不爽而何必雜取後世隂陽推測數術之説以混古聖人作易之指哉馮當可曰三百八十四爻非一時畢陳也方一爻用事則易在此爻而餘爻俱廢卦猶嵗也爻則猶月卦猶月也爻則猶日卦猶日也爻則猶時方有是月日時也餘月日時之在前者則既徃矣後乎此則未至也右總明爻位濳龍勿用贊曰陽在下也文言曰下也程正叔曰理无形也故假象以顯義龍之為物靈變不測故以象乾道變化陽氣消息聖人進退蘭恵卿曰不謂之陽不謂之聖人而獨取於龍者盖龍為陽類而善變化又可以象聖人此乃作易者立象以盡意者也凡三百八十四爻之言象者皆類此王介甫曰龍行天之物也故以象乾馬行地之物也故以象坤李仁父曰龍之鱗八十一為九九之數亦以象乾也李子思曰六爻之象皆取於龍者陽體而健者也其所以潛見惕躍飛亢者初終之序而變化之迹也陸農師曰乾為馬而謂之龍盖馬以行地言龍以行天言也周官廋人八尺以上為龍六尺以上為馬古者天子乗龍諸侯乗馬馬之稱龍尚矣案天子六馬八尺以上取六龍之象也文言曰陽氣潛藏李仲永曰龍當蟄而蟄不可見也程可久曰水經注龍以秋日為夜埤雅龍秋分而降則蟄寢於淵聖人擬諸形容象其物宜如此李子思曰方龍之潛於深淵也涵養神氣養其全力異時見躍而飛者皆張本於此房喬曰陽氣㣲勿可暴進暴進則為羣隂所抑馮當可曰居下位而欲為上禍斯及之矣時方潛藏而欲發泄所謂反時為烖也張舜文曰其爻為復其畫為震其位為子陽動乎水中其潛龍之象乎此亦可以言象但以六爻配十二辰以月則一陽之生配建子可也餘必有不通者以乾六爻配六陽月則建丑不可為履霜以陽生子終已配乾隂生午終亥配坤則建午豈有霜乎文言子曰龍徳而隠者也不易乎世不成乎名遯世无悶不見是而无悶樂則行之憂則違之確乎其不可㧞潛龍也朱子曰孔子以人事言之欲其用也石守道曰龍潛於淵養其神也聖人潛於道養其徳也李去非曰陽氣始動於九地之下潛而勿用所以養陽也程正叔曰當養晦以俟時張舜元曰聖人君子豈无心於天下哉時未可用宜隠以待時而已右明象文言曰君子以成徳為行曰可見之行也潛之為言也隠而未見行而未成是以君子弗用也都聖與曰止之所以勿用也朱子曰取象各不同以告筮者或筮者非所當得則謂他人矣又曰六爻不必限定説人君且如潛龍勿用庶人得之自當不用程正叔曰若一爻當一事則三百八十四爻只當得三百八十四事右明占九二見龍在田利見大人贊曰見龍在田徳施普也文言曰見龍在田天下文明正義曰陽氣發見故曰見龍郭立之曰龍之潛也有必見之理石守道曰六位下兩畫為地中兩畫為人上兩畫為天李去非曰二為地上故曰田程可久曰坤已配地故抑坤而稱田案乾坤易之門類例尤嚴不稱地别嫌乎偪下也文言曰見龍在田時舍也都聖與曰田以利養言也非龍之宜居猶聖人以君徳而居下位也毛伯玉曰田非變化之地也雖然謂之龍矣非田之所能留也李子思曰田者喻聖人應世之迹爾龍豈真在是哉按易之有象盖以見天下之賾爾非必真有是物也如載鬼一車臀困於株木皆假象也龍之在田以象陽氣之見於地上耳龍豈在田之物哉原本缺郭立之曰大人者其道大之人也乾徳以大為主故曰大人李子思曰文言兩稱君徳盖大人之徳充實而有光輝著見於外為一世之所利見者孔子之意也右明占李季辨曰在他卦二五為君臣唯乾坤為純卦乾六爻皆君徳二不取臣坤六爻皆臣位五不取君乾坤自為一例與屯蒙以下剛柔雜居之卦不同故其所以垂世立教之義如此君臣之不可紊猶天地之不相亂也若夫以占筮者則隨其所筮之人以為之斷爾程正叔曰或問乾坤之六爻聖人之事乎曰盡其道者聖人也得失則有吉凶焉豈惟乾哉諸卦皆然也程可久曰唯二五得中聖人事也他爻失中非聖人也案二五中之位故其徳為中非中之道也若當潛而潛則潛為中當躍而躍則躍為中特處時之亢則欲其无首爾无首亦中也善乎馮當可曰中猶皇極也用於五事則皇極在五事用於八政則皇極在八政二五中之位非中也所以機括初上三四而成一卦亦猶皇極上總下貫而成九疇者也當潛而潛則初得中矣知亢无首則上得中矣中見於事為而用中者在君子之心右明爻義九三君子終日乾乾夕惕若厲无咎劉長民曰三四俱明人道故不稱龍程可久曰非龍徳故稱君子夫是之謂曲而中朱子曰君子指筮者而言楊中立曰其曰君子行此四徳者盖乾之所謂君子也所以為君子者乃行此四徳之人耳案正義居不得中故不稱大人乾坤者君臣之分聖賢之徳也然乾不言聖者作經立教使夫婦之愚皆可與知與行若以聖人言之天下之望絶矣故自二五大人之外止言君子使天下之為父為夫為子者皆可勉而至也六十四卦之大象不言聖人亦謂此耳林黄中曰下卦為晝上卦為夜上下之交日之終夜之夕也王景孟曰下三卦之終也故乾之三曰終日坤之三曰有終案日陽之象故於乾言之都聖與曰乾乾者健之至也凡言謙謙蹇蹇之類皆謂其至也王景孟曰間乎二乾之間徃来皆乾是能盡乾乾之道也朱子曰性體剛健有能乾乾惕厲之象李子思曰此爻不言龍而取二乾字以繫之以其本真而易其似者則是聖人於此辭猶致意也要之六爻皆龍其用皆乾而其徳則皆君子也贊曰終日乾乾反復道也文言曰終日乾乾行事也又曰終日乾乾與時偕行耿睎道曰君子朝以聽政晝以訪問夕以修令自朝至夕皆有所事之時也故以惕若言夕右明象説卦曰无咎者善補過也朱子曰凡言厲多於陽爻見之王氏曰安其危則必危危其危則无危易之道也王輔嗣曰凡言无咎者本皆有咎者也處得其道故得无咎也郭立之曰凡言吉凶悔吝者皆人道之辭李仲永曰三四曰无咎者立人之道其要无咎也右明占文言曰君子進徳修業忠信所以進徳也修辭立其誠所以居業也知至至之可與幾也知終終之可與存義也是故居上位而不驕在下位而不憂故乾乾因其時而惕雖危无咎矣蘭恵卿曰處下卦之極當上卦之下居嫌疑之地禍福之機成敗之決正在於此故乾乾惕若則雖危厲而可免咎毛伯玉曰離乎二矣而未達乎四猶可止也故於其未至於四也深危之夫潛也見也躍也飛也亢也皆以一言盡其義九三之危非一言之所能盡也故曰終日乾乾曰夕惕若曰厲而以君子當之聖人之戒深矣其意深故其言微學者可以理曉不可以辭盡也文言曰重剛而不中上不在天下不在田故乾乾因其時而惕雖危无咎矣揚子雲曰過中則惕李仲永曰居過中之位行過中之事夕者過中也過中而懼懼而修徳以補過故雖危无咎李子思曰龍以不見為神重淵之下乃其棲神之宅也自潛而見則未免渉世而有人道之患故作易者易龍之名而寄之君子以終日乾乾夕惕若厲无咎戒之程正叔曰君徳已著天下將歸之其危懼可知雖言聖人事苟不示戒則何以為教作易之義也聞之曰易為天下作不為聖人作也唯其為天下而作故雖天地聖人亦必設為警懼戒謹之辭所以立教也右明爻義九四或躍在淵无咎程可久曰初與二皆稱龍本爻即上文知其為龍也亦猶大壯九三羝羊觸藩羸其角而九四稱藩決不羸是也李去非曰六位三四為立人之道三言君子其人可見也四稱或則其人在有无之間或之者疑之也乾之龍至於飛非天地之合豈易以人力而致而四以人事為疑其唯四之多懼乎又曰或躍者陽使之也在淵者隂繫之也揚子雲曰不及則躍張子厚曰位非所安故曰或躍處隂故曰在淵都聖與曰隂善疑陽善斷故有或躍之象劉長民曰龍將出反諸淵右明象占贊曰或躍在淵進无咎也案然則九三之進或有咎矣文言曰或躍在淵自試也李子思曰龍之飛天一息不留也而可以試躍邪作易者特借此以示飛龍變化之漸云爾乾龍之健方其潛淵之初已有飛天之力不獨今躍淵時也至此氣數將滿或躍出而不自知其有自試之象焉文言又曰或躍在淵乾道乃草耿睎道曰不言龍何也九三雖有可至之道然有可終之義九四雖有或躍之勢然有在淵之時故不稱龍就二者論之九四乾道革矣有必飛之勢无或終之義故以龍事言焉文言子曰上下无常非為邪也進退无恒非離羣也君子進徳修業欲及時也故无咎李仲永曰畸於人而侔於天矣故進徳修業以及時為无咎文言又曰重剛而不中上不在天下不在田中不在人故或之或之者疑之也故无咎毛伯玉曰躍者飛之漸或者不必然之辭自四言之則有必躍之勢自三言之則有可終之理三可以終者理之常也而或有躍者焉以為凡至於三者不必皆達於四也右明爻義九五飛龍在天利見大人文言曰飛龍在天上治也又曰飛龍在天乃位乎天徳正義曰陽氣盛至於天猶聖人有龍徳飛騰而居天位為萬物所瞻覩贊曰飛龍在天大人造也文言子曰同聲相應同氣相求水流濕火就燥雲從龍風從虎聖人作而萬物覩本乎天者親上本乎地者親下則各從其類也又曰夫大人者與天地合其徳與日月合其明與四時合其序與鬼神合其吉凶先天而天弗違後天而奉天時天且弗違而况于人乎况于鬼神乎李子思曰潛見躍飛其迹不同同此一龍耳向以大人之徳為一世之所利見今以大人之徳居大人之位為天下之所利見所謂聖人作而萬物覩也李季辨曰人心利見已在二矣况正九五之位乎文言大人正謂九五程正叔又曰聖人既得天位則利見在下大徳之人右明象占毛伯玉曰五為君位他卦皆然唯乾之九五卦與爻徳與位皆為君道之正故以飛龍在天象之利見大人言之林慎微曰飛以下為順五稱飛言不宜復上上則亢矣此說亦通右明爻義上九耿睎道曰上不言終何也曰終者時之窮易之所貴變通而不窮故不言也亢龍有悔贊曰盈不可久也文言曰與時偕極又曰亢之為言也知進而不知退知存而不知亡知得而不知䘮毛伯玉曰龍非有亢也託於龍云爾右明象文言曰窮之烖也又曰貴而无位髙而无民賢人在下位而无輔是以動而有悔也李季辨曰五居中位過中則亢六陽已極物極必反故亢則有悔都聖與曰凡言有者不宜有也乾聖人之象不宜有悔以其盈也是以有悔焉正義曰悔吝者言乎其小疵也故凡悔之為文必以餘字配之其悔若在則言有悔謂必有此悔也其悔若无則言悔亡言其悔亡也其悔雖亡或更取他文結之若不逺復无祗悔之類也程可久曰不言凶者在馴致之後案當悔而不悔則凶當悔而知悔則吉聖人於吉凶之外復有曰悔吝云者盖悔者自凶而之吉吝者自吉而之凶夫理有是非則事有得失有得失則有吉凶知其非而欲改則有悔知其非而不改則為吝書改過不吝此爻之有悔者以其失在亢也若處此而不亢則悔亡矣所謂无首是也右明占李子思曰乾元之運不免於亢則何以為乾其曰亢龍云者盖慮人主龍飛之後以滿亢自居而或至招悔故記乾之上九以垂戒云耳天為剛徳猶不干時則乾元一氣之運安有至於亢者若夫物極則亢亢則悔此氣數之常而㳺於氣數之内徇溺而不知變者每每蹈之耿睎道曰隂陽之運積息而成盈盈則反消積消而成虛虛則反息此自然之機天且弗違而上知進而不知退知存而不知亡知得而不知䘮是乃所以有悔吝小疵也有悔可變而趨吉也是用九也張舜元曰天地之道以六陽逓相徃来生成萬物而无窮也陽氣至此而盛極隂氣將生而推之苟不能窮上反下以知變是之謂亢非久而不窮之道也案乾坤六陽六隂之氣一寒一暑萬古不忒寒徃則暑來暑徃則寒來此理之常安有亢而悔者聖人為天下而作易推造化以明人事使知者觀之而知監愚者筮之而知戒也右明爻義用九李子思曰乾純於九坤純於六故可以用九六他卦則隂陽之雜不可以指名也易窮則變變則通者也易以用為主用者變而通之之謂㳺定夫曰揲蓍之法數遇九六則變乾以純陽陽極而亢坤以純隂隂極而戰如其不變則亢而烖戰而傷不能免也乾以用九則陽知險而變故无首而吉坤以用六則隂知阻而變故永貞而利案用九之説又有四焉一謂六十四卦陽爻之通例然蔡墨曰乾之坤止謂乾一卦也二謂併於上九然曰羣龍則六爻並陳也三謂即純坤牝馬先迷後得之義然曰羣龍則非指坤也四謂用九而不用十為无首之義然則坤當用六不用五為永貞之義也見羣龍无首吉贊曰天徳不可為首也文言曰乾元用九天下治也又曰乾元用九乃見天則都聖與曰陽為首而隂為之後者爻之常也上為首而下為之後者位之常也其所以不可為首者變也於窮而能變變則通矣李氏曰處其窮則亢用其變則通唯變而通則潛見飛躍適時而為故曰見羣龍不居於亢故曰无首李去非曰不敢為天下先此箕子沈潛之義右明象李季辨曰天道功成者退陽至上則亢故退不為首則吉盖天道盈虛消息自如此程可久曰易以道義配禍福故為聖人之書隂陽家獨言禍福而不配以道義故為伎術如以詭遇獲禽則曰吉得其正而斃則曰凶故王仲淹曰京房郭璞古之亂常人也右明占李去非曰陽動而進故以七隂動而退故以八一隂一陽合而為十五陽自七之九隂自八之六亦合於十五此數之祖也案河圖數縱横十又五參天兩地之數亦十又五此五行之生數也以五行之生數分配隂陽為七八九六之成數而用之此聖人揲蓍生爻起例之義也石守道曰卦本三畫上一為天中一為人下一為地三才之象備矣變而動三才之道也一不能動動必須兩何也盖相偶然也此所謂兼三才而兩之李去非曰易氣從下生動於地之下則應於天之下動於地之中則應於天之中動於地之上則應於天之上案此内卦三爻與外卦三爻為應也盖動於内則必應於外雖有剛柔之殊閒閡之異而大槩如此若八卦之純雖无剛柔之應而爻義亦未嘗有不應者初潛則四躍二見則五飛三惕則上亢盖各有升降顯晦之異也程正叔曰卦者事也爻者事之時也分三而又兩之足以包括衆理引而伸之觸類而長之天下之能事畢矣張舜元曰聖人重卦有天道焉有地道焉有人道焉天道貴乎下覆故上言亢五言在天人道尊天而親地故三言君子四言中不在人地道貴乎上承故初言勿用二言在田揚子雲曰龍之潛亢不獲其中矣過中則惕不及則躍二五其中乎故有利見之吉李氏曰乾陽物也消息盈虛必有時龍陽類也潛見飛躍亦有時聖人龍徳也升降進退亦有時六爻之序可考而知也右明六爻坤下坤上李子思曰包犧畫卦之初乾中連而坤中斷何也曰陽盈而隂闕乃自然之象非作意而為之也天地隂陽之氣一盈而一闕故月之生也亦然乾坤之畫象之坤之畫則純隂竅闕之象也聞之曰天一地二故乾畫竒坤畫耦乾一而圓其精為日坤二而闕其精為月故於文日圓而一月闕而二日月為易隂陽相代之義也坤説卦曰夫坤天下之至順也徳行恒簡以知阻雜卦曰乾剛坤柔李季辨曰未有隂先有坤之理大極判隂就易中禀得柔順之理故曰坤右明卦義説卦曰坤地也故稱乎母又曰坤也者地也萬物皆致養焉故曰致役乎坤程正叔曰今所指地者乃土也土特天中一物耳不可言地也石守道曰不謂之地謂之坤者取順義也坤地道也隂道也臣道子道妻道也地必承順於天隂順於陽臣順於君子順於父妻順於夫天下之大順也説卦曰坤道成女又曰坤作成物又曰坤以簡能又曰夫坤其静也翕其動也闢是以廣生焉又曰效法之謂坤又曰闔户謂之坤又曰坤隂物也又曰坤以藏之又曰坤為牛又曰坤為腹又曰坤為地為母為布為釡為吝嗇為均為子母牛為大輿為文為衆為柄其于地也為黒右明卦象象贊曰地勢坤君子以厚徳載物右明卦用元亨利牝馬之貞君子有攸徃先迷後得主利西南得朋東北䘮朋安貞吉贊曰至哉坤元萬物資生乃順承天坤厚載物徳合无疆含𢎞光大品物咸亨牝馬地類行地无疆柔順利貞李子思曰一元之氣乾坤同得之然而乾元之氣禀陽之剛健出入動息之間无能撓之者故文王卦下之辭直曰元亨利貞而已无他語也若乃坤之隂其體寂然待陽而應陽先動而坤後隨之將以其所得於太極一元之氣者而申乾以成元亨之徳苟非柔順後天而行則失其所以承乾故曰元亨利牝馬之貞程正叔曰坤乾之對也四徳同而貞體異乾以剛固為貞坤則柔順而貞也正義曰牝對牡為柔馬對龍為順不云牛而云馬者牛雖柔順不能行地无疆无以見坤廣生之徳李仲永曰行地莫如馬而又牝馬柔順之至也李季辨曰乾為馬坤為牛不言牛而言牝馬象乾之配也牝馬能載而又能生育所以為坤之貞李氏曰别其隂之匹於陽也案元者坤之元盖太極動極而静隂所自生也以順承乾同此亨利也乾剛坤柔其貞則異也乾稱龍坤稱馬行天行地之辨也馬稱牝别嫌乎乾且明其為乾之配也周制天子乗龍諸侯乗馬君臣之義也乾之稱龍者六坤之稱馬者一詳乾畧坤也乾稱龍矣而又稱馬坤稱馬矣而又稱牛此易之取象所以象其物宜不可以一説定也右明卦象贊又曰君子攸行先迷失道後順得常西南得朋乃與類行東北䘮朋乃終有慶安貞之吉應地无疆文言曰坤至柔而動也剛至静而徳方後得主而有常含萬物而化光坤道其順乎承天而時行郭子和曰自君子有攸徃以下皆人道也凡言吉凶皆人道之辭張舜元曰坤者乾之配君子體之不為事先盖先則迷而失為坤之道後則得主有為臣為子之利隂之所主者陽也陸希聲曰隂以陽為主當後而順之則利李季辨曰君子體之而有行為先則迷為後則得主而利以隂道不為倡也龍氏曰巽離坤兊隂之朋也乾坎艮震陽之朋也楊廷秀曰乾之彖止言其體謂四徳自坤以下併與用言之坤地道也妻道也臣道也皆欲以隂從陽不欲以隂從隂隂從隂則造化消隂從陽則造化息案坤之六隂其朋盛矣易乃欲其䘮朋復之一陽无朋矣易乃欲其朋来聖人抑小人之朋而進君子之朋如此李子思曰利貞之間加牝馬二字天下唯剛者為能貞而柔順者一失其守則徃徃溺而為邪是以彖言君子體坤之事反復告戒歸於安貞而後吉其亦謹乾坤上下之位著君臣先後之戒而使天下凡居坤位者一守之以正邪案此卦於君子之體坤複言利貞盖前言利貞者坤之徳也後言利貞者君子之體坤也元亨屬陽利貞屬隂坤隂物也故於利貞再致意焉右明卦占案乾坤一隂一陽之配也坤之四徳同乎乾坤順與乾健合也然陽道常饒隂道常乏故陽得兼隂隂不得兼陽此坤之所以異於乾也且以成形之大者言之天形如雞子地如其黄則天盖包地也天包地者陽饒而隂乏也則其氣數何獨不然是以文王合乾六爻之徳一言而足至於坤則分而為二下卦言其徳上卦言其事則以人道觀地也徳止於三畫者隂乏故也言人事者備三才也元初也亨二也利牝馬之貞三也君子有攸徃自内卦而徃外也先迷上在五前也後得主利四在五後也西南言下卦也隂在下故得朋東北言五也五君位故䘮朋安貞吉上也觀於孔子之贊昭然明甚而世儒未之察也卦有兩利貞謂此也右明彖義初六履霜堅氷至贊曰履霜隂始凝也馴致其道至堅氷也文言曰積善之家必有餘慶積不善之家必有餘殃臣弑其君子弑其父非一朝一夕之故其所由来者漸矣由辨之不早辨也易曰履霜堅氷至盖言順也朱子發曰震為足自下而進履也此爻下卦震之變也張舜元曰方夏至之初一隂初生於地下露氣方凝未結為霜也而言履霜堅氷者知微知彰之意李去非曰乾之初言潛龍而戒之以勿用其愛養微陽之生如此坤之初言履霜而戒之以堅氷至其逆防盛隂之極又如此乾為氷以氣而結坤之形也月之建亥乾之所位人見坤之為氷也豈知其中有乾哉隂之始凝為霜其微易散也馴致堅氷則隂陽難判矣毛伯玉曰堅氷至者積而至於无君也林慎微曰初之隂有陽在上以止之則无堅氷之事上无陽則有馴而无止至堅氷也孰禦哉朱子曰隂陽者造化之本不能相无而消長有常亦非人所能増益也然陽主生隂主殺則其類有淑慝之分焉故聖人於易其不能相无者既以健順仁義之屬明之而无所偏主至其消長之際淑慝之分則未嘗不致其扶陽抑隂之意焉所以贊化育而參天地者其㫖微矣案初九乾潛龍勿用而此稱履霜堅氷至何也曰陽主發見故稱潛龍以明其未見也隂主隠伏故稱履霜以彰其已至也戒之以勿用所以愛之戒之以堅氷所以憂之也是又聖人扶陽抑隂之意蘭恵卿曰下卦内也坤之時一小人居内引至朋類終至於盡去君子而為剥為坤故聖人於一隂之始生知其生至於堅氷也故曰國之治不治於已治之日國之亂不亂於已亂之時其所由来者漸也楊廷秀曰陽始萌則曰勿用隂始生則曰堅氷至可以知君子之難進而小人之易盛矣有國者其亦思所以求君子於隠而防小人於早也哉右明象占六二直方大不習无不利贊曰六二之動直以方也不習无不利地道光也正義曰得其位極地之質程可久曰四方不易者直也四維有所者方也不可以中繩中矩者大也郭子和曰居无不當之位而上无異道之應故可以直可以方不疑其所行凡以順道故也張舜元曰地道貴乎上承二居地上地道之正也履中居正故全於坤之直方大之徳也雖居坎位異於坎之待習而後行也案六二坎之變坎險則習險變而順則不習矣此以地道言之文言曰直其正也方其義也君子敬以直内義以方外敬義立而徳不孤直方大不習无不利則不疑其所行也蘭恵卿曰居中履正所以為直陽為仁仁則其徳圓隂為義義則其徳方直而不方與方而不直皆孤也孤則徳不大司馬君實曰不孤則大也此以人道言之右明象占程子曰二與六地道之精純者若六與五則異矣蘭恵卿曰乾之六爻唯九五為中正坤之六爻唯六二為中正李子思曰居中守正故爻辭以直方形容之直方者中正之别名也文言又以敬義形容之敬義者又直方之别名也推本而言六二之徳无出乎中正案乾之六爻莫盛於五坤之六爻莫盛於二何也中而且正乾尊而坤卑各盡其道也然徳成於二而發揮於五二卦則同也文王於此故以與乾合徳者言之直方而大剛健中正純粹以精之配也夫直方則多礙礙則必習而後行唯其大故不習而无不利也雖然乾坤者聖賢之辨也大矣而未化利矣而未至於安聖人論六二之徳視乾猶有等也右明爻義六三含章可貞或從王事无成有終贊曰含章可貞以時發也或從王事知光大也文言曰隂雖有美含之以從王事弗敢成也地道也妻道也臣道也地道无成而代有終也九家曰以六居三下有伏陽坤隂含藏不顯待乾之命不敢自成也程伯淳曰章外見之物郭子和曰含則不茹終於必吐待時之義也故或有王事則從之劉氏曰三隂生則文明者皆斂藏之故有含章之辭朱子曰位有陽所以言含章若无陽何由有章為有陽故半動半静蘭恵卿曰姤九五无所發行其明亦云含章案章辨也下體與上體分辨之際位陽顯著或含藏之不自止於下而有從上之志也文言明陽盛則包隂隂盛則含陽自重卦言之三隂浸盛陽明斂藏含章之象也右明象程正叔曰可貞固守之常久而无悔咎非含藏終不為也蘭恵卿曰貞者事之幹在他卦以六居三則為不當位而招悔咎在坤則五無陽明之君苟又以陽居三則或為權首而致凶咎今剛柔相濟可以貞幹王事或者未必然之辭從者自我從人非先倡也王事云者明其上有君父也劉氏曰隂以斂藏為事故含章可貞又當應陽而發之應陽猶臣之從王事也朱子曰居下之上不終含藏故時出而從上之事始雖无成後必有終邵堯夫曰陽知其始而圖其成隂効其法而終其勞馮當可曰乾成之坤從而終之猶乾始之坤從而生之林黄中曰嵗功出乎震勞乎坎成乎艮非隂之所敢成也案居内卦之終可貞有終之象也夫下卦終則上卦繼焉此筮易之定序也而易每於下卦之三若欲終之何也易以六爻明始終之序而以二體嚴上下之分盖欲上下各安其分而不相陵躐此聖人作易設教之微意也是故孔子於乾之三言知至知終之兩端而文王於坤之三言可貞從事之二説乾陽也性趨上而健進三有君徳而未正君位故多恐懼之辭坤隂也性趨下而順止是以從陽為善故有勸勉之語陽以進為懼隂以退為安也右明占程可久曰乾九三動以趨中者也本爻静以守正者也林黄中曰乾之九四坤之六三皆隂陽之雜也是以或之李子思曰三與五其陽功則同而上下之位則異是以乾坤唯九三六三之辭最費盖處此地之難也右明爻義六四括囊无咎无譽贊曰括囊无咎慎不害也文言曰天地變化草木蕃天地閉賢人隠易曰括囊无咎无譽盖言謹也林黄中曰坤為囊見荀慈明説卦三在内為含四至外括之矣案象下卦之坤為囊羣隂在上閉塞其路四當囊之口故有括之之象抑下卦之隂不使上進乃得无咎无譽盖不能辨之於早是以僅能如此右明象朱子曰重隂不中故其象占如此或事當謹宻或時當隠遁也林黄中曰隂當其位是以无咎嫌无陽焉是以无譽李子思曰譽者咎之招六四之所以无咎者以其无譽也隂晦之世其法當隠身將隠焉用名世之託隠以求名者皆不能无意於世者也名之一出而辭之不可則人世吉凶之患將廹逐而不去為君子者不可以不謹也案此説亦通右明占劉長民曰夫坤其静也翕應四之位其動也闢應二之徳毛伯玉曰方其初也辨之於早以絶其害及其盛也深晦其迹以避其禍馮當可曰坤宜在下而反居上非括囊謹宻其能免於禍哉聖人首乾坤以定君臣之分使乾常不失在上而坤常不失在下則君臣之分定而禍亂不作矣此義亦通陽貴上進故至四而或躍隂惡上行故至四而括囊石守道曰隂之為道聖人惡之故彖欲其䘮朋而六爻並不言羣隂惡其黨盛而類滋也陽為君子隂為小人乾言君子則坤宜言小人也今六爻无小人之辭何也曰易不為小人作也初言堅氷上言龍戰以見小人之情狀而中爻每每為君子慮焉右明爻義六五黄常元吉贊曰文在中也文言曰君子黄中通理正位居體美在其中而暢于四肢發于事業美之至也李子思曰居坤位之中得地之正色故謂之黄林黄中曰乾為衣坤為裳黄帝堯舜垂衣裳盖取諸此五雖尊配乾為下矣案乾純陽坤純隂兩卦對立為兩儀六十二卦之父母也故乾配天坤配地曰黄以明其為地之色曰裳以明其配乾之衣嫌其為君位而正其名分也或謂坤妻道也臣道也五君位也以妻與臣居君位猶女媧王莽之流李子思曰此最係名教之大者不可以不辨右明象朱子曰春秋傳南蒯將叛筮得此爻以為大吉子服恵伯曰忠信之事則可不然必敗外强内温忠也和以率貞信也故曰黄裳元吉黄中之色也裳下之飾也元善之長也中不忠不得其色下不共不得其飾事不善不得其極且夫易不可以占險三者有闕筮雖當未也後蒯果敗此可以見占法矣案古之占者辭吉而事反之則凶辭凶而事反之則吉不専以辭之吉凶悔吝斷也恵伯之意以忠中釋黄以信共下飾釋裳以善釋元配為三徳曰吾嘗學此必有所授也至孔子則變其説以為大臣之美張舜元曰凡元吉者以元為吉貞吉者以貞為吉也亦有以元訓大者如元亨之為大亨是也右明占石守道曰乾九五君位之盛坤六五臣位之盛案以徳言之乾九五得陽之精純坤六二得隂之精純也以位言之則乾坤之位皆以五為盛李子思曰辭但言其吉之元文之顯而不言其徳者盖六二之徳即六五之徳也大凡位之盛者不以徳稱盖曰居此位而獲吉則其徳可知矣李季辨曰人臣之極位可以有為矣故辭但贊其美由直方大之徳藴蓄於中者素備故能如此程可久曰坤臣道五君位有臣道達於君所之象案此説亦通張舜元曰周六卿分職各率其屬六六三百六十職盖本諸坤與天官冢宰其當六五與馮當可曰天下之變无常社稷有綴旒之危莫不頼腹心大臣從權制變而社稷以安君薨百官總己以聽於冢宰三代之常制然則人臣而行君事无世无之坤之六爻於初戒之四戒之上又申戒之而五復為戒懼之辭世不幸而至大變則為臣者不敢犯難而任事為君者終疑其臣於下誰與寄社稷之計不可之大者也亦唯忠誠純至臨大節而不可奪如黄裳者是頼焉而後成社稷之功矣案易道廣大无所不通程張説理象亦然况以盛徳居尊位守人臣之常分大節焉當平世以為經綸之純懿當禍變則為方正之節操要不外乎黄裳之象也右明爻義上六龍戰于野其血𤣥黄贊曰龍戰于野其道窮也文言曰隂疑于陽必戰為其嫌于无陽也故稱龍焉猶未離其類也故稱血焉夫𤣥黄者天地之雜也天𤣥而地黄正義曰説卦戰乎乾是也戰於卦外故曰于野九家曰坤行至亥下有伏乾李去非曰乾位西北而隂窮以薄陽而戰焉曰龍戰則是乾來戰不以坤敵乾也春秋書王師敗績于茅戎以自敗為文龍戰之義深矣王介甫曰隂盛於陽故與陽俱稱龍陽衰於隂故與隂俱稱血林黄中曰乾為馬坤稱馬者牝也龍戰于野是龍與龍鬭也坤之龍其牝矣乎又曰外卦之外故稱野野者天地之際而戰者隂陽之敵也隂陽有敵故雖坤而稱龍隂陽俱傷故雖乾而稱血主陽而言戰故曰龍主隂而言傷故曰血乾為赤坤為黒天地之正色也震為𤣥黄天地之始交也赤變於黑為𤣥黑變於赤為黄坤終而陽出乎震故其象為龍其色𤣥黄也盧氏曰云戰者盖罪陽之失於防漸至无陽之嫌云野者又罪隂不能退避非所處之位案主龍而言則知隂不可亢亢則陽必伐之戒隂也以戰而言則知隂不可長長則與陽敵矣戒陽也啓與有扈戰于甘之野正應此象右明象占郭立之曰坤道之窮而不知變亡其所謂坤順者也由是言之六爻之順者時焉而已凡易貴陽而賤隂非賤之也陽知進退之義隂无過亢之悔是以非克之不去也始也履霜則難與之進終也龍戰則難與之退不知進退存亡是以賤之也案陽亢則知反求諸已而有悔隂窮則不知自反而有戰此君子小人之情狀也李子思曰聖人寓堅氷之戒於初盖所以救其終龍戰之禍案龍戰即所謂堅氷之至也初六之爻義可見矣孫氏曰乾之上九陽之亢極不言隂戰之者所以抑臣僣也坤之上六隂之過極則與陽戰者所以警君防也指其微乎案以八卦配方位言之乾居西北其辰則亥也以隂陽配十二辰言之隂終於亥其位則坤也隂陽之氣行乎天方位之氣鍾乎地以天氣之坤乗地氣之乾其勢不順其氣相薄故乾陽激而上戰坤隂此萬物蟄藏所以待隂陽之定也其蟄蔵者避隂而就陽也夫乾君也坤臣也王者有征无戰戰者兩相敵之謂也不曰與龍戰而曰龍戰于野以乾為主猶曰君之討臣云爾抑又聞之乾變至上則為坤故用九謂乾之坤是也易乃曰見羣龍存陽也坤變至上則為乾故龍戰當於用六言之易乃言於上而至用六則戒之以利永貞抑隂也右明爻義用六利永貞贊曰用六永貞以大終也劉氏曰易之道窮則變變則通上六不知通其變使隂道已窮故至於與陽戰而受傷苟能通變以用六而知永貞於柔順之為利則无戰傷矣林黄中曰上隂位六柔徳以柔居隂永以為貞配乎純乾斯為利矣馮當可曰乾極矣九將變而為六能用九則不失其為君之道坤極矣六將變而為九能用六則不失其為臣之節用九在无首用六在永貞永貞所以用六者也或謂乾用九不用七坤用六不用八是則然矣而於文王繋辭未有義也當可之説與繋辭之㫖合李子思曰乾不䘮其乾體者要在用九坤不䘮其坤體者要在用六用六之辭曰利永貞則是慮其侵陽而欲永守其牝馬之貞以保其柔順之利也程可久曰乾以元為本所以資始故曰乾元用九坤以貞為主所以代終朱子曰自坤而用六故不足於元亨云右明象李季辨曰中四爻坤之徳也初戒履霜終戒龍戰本末之義也趙氏曰初與四有履霜括囊之戒以不得中也三與上有无成龍戰之戒以過中也唯二五居中故无不利而元吉由是觀之乾坤之畫雖純要必相濟而後可一失其中聖人必為之慮也林黄中曰乾之六爻皆以龍言而坤之六爻雜舉其物者隂陽之情也郭立之曰乾一以健坤一以順而六爻之義不齊非異也時物之不同也右明六爻
