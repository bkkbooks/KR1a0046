body:
  text: 厚齋易學卷三十八宋馮椅撰易外傳第六象上贊泰至觀天地交泰后以財成天地之道輔相天地之宜以左右民后君也天子諸侯之通稱財今裁相去聲左右今佐佑天之氣下交於地地之氣上交於天天地之氣中和所以為泰也為君者於是以天地造化之運財而成之然後隨其所宜輔而相之凡以左右扶翊天下之民由其道遂其宜無過不及以歸於中和也財成謂一嵗則財成春夏秋冬四時則財成孟仲季三月一月則財成二節六候而輔相左右則如堯典之羲和吕春秋之月令是也毛伯玉曰乾坤相交和之至也隂陽適停中之至也由中以為和由和以為泰財成説本朱子拔茅征吉志在外也拔茅征吉初九象占志在外也泰三隂三陽以交為義不為二三陽爻所隔與四相應志於上復故曰在外包巟得尚于中行以光大也包巟得尚于中行九二象占以光大也舉上下二句則全爻之義皆在其中泰之為卦莫尚此爻故曰光大陽明中正之象无往不復天地際也无往不復九三象天地際也交際之際偏偏不富皆失實也不戒以孚中心願也偏偏不富六四象占皆失實也皆者三隂同志之辭陽為實上卦皆无陽故曰失實不戒以孚占中心願也二隂樂於下復以祉元吉中以行願也以祉元吉六五占中以行願也得中則吉女之有行生而願為之有家也六自五而復二猶女子之行歸於夫家乃所願也城復于皇其命亂也城復于皇上六象其命亂也事至於更則其邑人已不聴命矣亂謂不歸一也天地不交否君子以儉徳辟難不可榮以禄都聖與曰天地不交之時陽已事而揫斂不榮其末而將反其本故君子法之朱子曰収斂其徳不形於外以辭小人之難人不得以禄位榮之毛氏曰自象言之則以不交為否因其象而用之則以不交為宜逺而去之如天地之相絶所以身名俱全也李季辨曰君子處亂世之道程可乆曰畏小人之禍也使人懐此心則傾其否者誰乎六爻之間君子之可以有為者不一而足也竊謂可以有為者在位之君子不交而退辟者在下之君子唯其時物也拔茅貞吉志在君也拔茅貞吉初六象占志在君也乾在上君道也志於上交非謂九五大人否亨不亂羣也大人否亨六二占不亂羣也語曰入鳥不亂行入獸不亂羣郭子和曰不亂羣者如鷹鸇鳥雀必不可同羣伯夷不立於惡人之朝不與惡人言是也包羞位不當也包羞六三象占位不當也不當則不安其位故包二隂以進有命无咎志行也有命无咎九四象占志行也荀氏諝曰志行乎羣隂大人之吉位正當也大人之吉九五占否終則傾何可長也否終則傾釋上九傾否天與火同人君子以類族辨物天與火同人正義曰天體在上火又炎上此其同也因六二中在人故曰同人張舜元曰乾離謂之同人氣皆上行陽也陽為善故以无所不同為亨有所同為吝坎坤謂之比氣皆下趣隂也隂或流為不善故以有孚比内比賢顯比為吉匪人為傷君子以類族辨物唯六二一爻為隂物五陽族皆陽物也當類其族而辨其物則同人者衆陽之族君子之道乎六二之族猶非此族也不在祀典之族物猶是其生也與吾同物之物以類推之則知君子之族為君子小人之族為小人士夫之族為士夫農之族為農工商之族為工商皆其物也倮族為倮物羽族為羽物毛族為毛物鱗介之族為鱗介之物類其族者乃辨其物若比而同之是墨氏之學而孟子辭而闢之者也出門同人又誰咎也出門同人初九同人於門之象又誰咎也誰能咎之蓋出門而有遇即同之非有所擇也伏戎于莽敵剛也三嵗不興安行也伏戎於莽九三象敵剛也剛謂九五三嵗不興占安行也所以三嵗之乆雖不興而亦不解者行之安耳此猶居之不疑與自以為是者也乘其庸義弗克也其吉則困而反則也乘其庸九四象義弗克也能乘其庸非力之不能攻也乃義弗克攻耳義謂隂陽相應之正義其吉占則困而反則也有物必有則物皆然心為甚夫婦有義有别乃其則也困者困於義之弗克故反於夫婦之則耳已非二之正應是强暴侵陵義所不可四位隂有困反之義同人之先以中直也大師相遇言相克也同人之先謂九五號咷之象以中直也不言中正而言中直者由中而其義直乃為三四所間故發於憤激大師相遇占言相克也王介甫曰言兩剛之盛欲克五五中直能克之同人于郊志未得也同人於郊上九象志未得也其志在二而相逺非應故未得不曰不得者以五陽皆應一隂有一爻之不應非大同也特有逺近之異故未得其志耳火在天上大有君子以遏惡揚善順天休命火在天上大有程可乆曰陽氣位乎天徳之時萬物盛多故曰大有或謂所照者廣然離在天成日在地成火今在天上而不言日則不取照義君子以遏惡揚善順天休命遏於葛反止也休美也善惡无所不有故為大有天命有善而无惡故曰休命止遏其惡然後乃揚其善所以順天之休也朱子曰反之於身亦若是而已矣李仲永曰天命在我故可以遏惡揚善非若同人别白是非而已竊謂君子藴離火之明故能分别善惡順乾天之命故能遏惡揚善大有初九无交害也大有初九无交害也以爻義明初九之象當大有之初乃无上下之交豈不有害於大有之義乎大車以載積中不敗也大車以載九二象積中不敗也明有攸往无咎之占乾剛之中而健於行故積重於中而不撓敗以中明大車以載之義公用亨于天子小人害也公用亨于天子九三象小人害也以害明弗克之占謂小人則專其有而害於職貢之義匪其彭无咎明辨晳也匪其彭无咎九四象占明辨晳也晳讀如明星晳晳之晳或作哲遰非謂其明足以察禍福之幾辯之甚分明也離有明象張舜文曰无比周蔽主之疑有明哲保身之義可以无咎矣厥孚交如信以發志也威如之吉易而无備也厥孚交如六五象信以發志也以信感發上下之志所以孚交威如之吉占易而无備也此義未詳唯程可乆曰使臣下易事而无求備故得衆剛之助而有威如之吉亦通大有上吉自天祐也大有上吉自天祐也以爻義明上九象占居大有為之上故自天祐之而吉无不利地中有山謙君子以裒多益寡稱物平施凡大象皆别立一意使人知用易之理謙卦之象山本髙也今乃降而處地下地本卑也今乃升而在山上君子觀此象以治天下于多者則裒之于寡者則益之裒多者以益寡者俾大小長短無不各得其平非君子一己謙徳之象乃君子治一世使謙之象彖與六爻全无此意楊中立曰蓋取虧盈益謙之意朱子曰裒多益寡所以稱物之宜而平其施都聖與曰稱物之多寡而抑揚之如稱物然平而後已朱子發曰平者施之則也謙謙君子卑以自牧也謙謙君子初六象卑以自牧也牧協聲墨耿睎道曰制其放也鳴謙貞吉中心得也鳴謙貞吉六二象占中心得也心在於五得其中心之正不詭隨三也勞謙君子萬民服也勞謙君子九三象萬民服也服協蒲墨反一經皆同隂為民衆隂歸之萬民服之象郭子和曰萬盈數也合乾坤隂陽之策乃盈是數易言萬國萬民萬夫大之之辭也无不利撝謙不違則也无不利撝謙六四象占不違則也耿睎道曰剛上而柔下剛乘而柔承物之則也九三以剛下四而承之非剛柔之則六四撝而去之不違則矣利用侵伐征不服也利用侵伐六五占征不服也不服指九三鳴謙志未得也可用行師征邑國也鳴謙上六象志未得也可用行師征邑國也志在九三三昵於近隂而不應故未得所以可征伐之雷出地奮豫先王以作樂崇徳殷薦之上帝以配祖考初六鳴豫志窮凶也不終日貞吉以中正也盱豫有悔位不當也由豫大有得志大行也六五貞疾乘剛也恒不死中未亡也㝠豫在上何可長也澤中有雷隨君子以嚮晦入宴息官有渝從正吉也出門交有功不失也係小子弗兼與也小子與之則丈夫不兼與之也係丈夫志舎下也隨有獲其義凶也有孚在道明功也明功謂明之功如此孚于嘉吉位正中也拘係之上窮也山下有風蠱君子以振民毓徳振平聲鼔之舞之也毓本王子雍今育養也李仲永曰山下有風風落山也凡山之草木皆為風所摇落蠱之象也郭子和曰振民風象毓徳山象李子思曰振民如風之鼔物毓徳如山之養材知所謂育徳則天下焉得有所謂蠱壊而不復振之事幹父之蠱意承考也幹父之蠱初六象意承考也考父之往者其意以子能任事故子能承父之意以幹其蠱也薛氏曰繼志述事之謂游定夫曰以柔巽為體意專於承父子道之正也故爻稱有子幹母之蠱得中道也幹母之蠱九二象得中道也王介甫曰剛巽乎中趣時之宜而不失道者也張舜文曰事親以孝不失於柔制義幹蠱不失於剛剛柔相濟人子之道盡矣耿睎道曰得中道是以悔吝不至也幹父之蠱終无咎也幹父之蠱九三象終无咎也耿睎道曰始雖小有傷恩終歸於義裕父之蠱往未得也裕父之蠱六四象往未得也吝故往未得言未得飭蠱之道也幹父用譽承以徳也幹父用譽六五象承以徳也謂用九二之譽者九二承之以剛中之徳也游定夫曰譽在下而上不忌者承上以徳也不事王侯志可則也不事王侯上九象志可則也程正叔曰進退合道澤上有地臨君子以教思无窮容保民无疆上思竝去聲澤上有地以上臨下為象教象也无窮象澤无疆象地互相為法象也地官掌教觀之設教亦以坤也澤則所容者廣无窮言其乆无疆言其廣楊中立曰君子之臨下非以力制之也亦教之容保之而已程可乆曰君子之教不能无窮其思无窮也保民不能无疆也其容保无疆也咸臨貞吉志行正也咸臨貞吉初九象占志行正也以内感外志於行正故吉大抵得位為正失方為邪羣隂在上勢未遽通但志在行正咸臨吉无不利未順命也咸臨吉无不利九二象占未順命也所謂无不利者非唯六五正應相感而六三亦近而相得故孔子發其隠曰情猶分於六三未盡順六五之命甘臨位不當也既憂之咎不長也甘臨六三象位不當也臨失其正則為甘以説人位不當失正也既憂之咎不長也又以咎不長明无咎之占蓋能憂之則變而從陽斯无咎矣程可乆曰卦不變故陽消不乆爻知變故隂咎不長至臨无咎位當也至臨无咎六四象占位當也當其位則臨无失道於是為至何咎之有蘭惠卿曰自二至五唯四一爻當位此臨之至也大君之宜行中之謂也大君之宜六五占行中之謂也李仲永曰極髙明而行之以中知周乎萬物而不過者也敦臨之吉志在内也敦臨之吉上六象占志在内也雖在卦外去二陽為逺而隂之志在於應之於内故二陽无削剥之咎此孔子新意胡翼之曰坤本在下今在上道窮而志在反於内也風行地上觀先王以省方觀民設教風行地上觀觀去聲省悉井反觀民之觀平聲程正叔曰風行地上為由歴周覽之象林黄中曰先王以之巡狩省四方觀民俗之好惡而為之設教袁氏曰命太師陳詩以觀民風命市納賈以觀好惡用此道也劉氏曰觀民設教如齊之末業教以農桑衛之淫風教以禮别奢如曹則示以儉儉如魏則示以禮毛伯玉曰出於上者謂之風化成於下者謂之風俗猶風行而草偃也竊謂古者掌教以地官蓋取諸此初六童觀小人道也初六童觀象小人道也明占謂如童稚之觀乃小人之道故无咎闚觀女貞亦可醜也闚觀女貞六二象占亦可醜也亦承初六謂童觀在君子為吝闚觀在女人亦可醜觀我生進退未失道也觀我生進退六三象占未失道也不一於進而知退故隂未為失道觀國之光尚賔也觀國之光六四象尚賔也明占尚上之也觀我生觀民也觀我生九五象觀民也觀平聲謂觀之民而我之所以生之之道可見矣程正叔曰以中正觀天下而天下之所觀也故得失驗之民而後見趙氏曰我示以陽剛之徳則可以觀四隂之必應故又有觀民之辭林黄中曰自四以下皆隂其象為民觀其生志未平也觀其生上九象志未平也見輯傳馮説厚齋易學卷三十八
