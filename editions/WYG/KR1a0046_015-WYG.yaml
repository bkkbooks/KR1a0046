body:
  text: 厚齋易學卷十五宋馮椅撰易輯傳第十一經上篇剥復无妄坤下艮上剥賛曰剥剥也柔變剛也雜卦曰剥爛也朱子曰五隂在下浸長一陽在上將盡隂盛長而陽消落九月之卦也案卦以五隂擊一陽為義讀如八月剥棗之剥正與夬對也爻以隂之割刻為義言其消陽之漸以使知戒懼也凡卦五隂一陽者一陽為之主而五隂應之此孔子之例也至剥復二卦則此例變矣是知易无達例與春秋同也乃若卦氣比類六隂六陽之消息盈虚則七月當否八月當觀九月當剥十月坤矣然天地之間初无純隂无陽之理亦无純陽无隂之理以一隂一陽方生言之則氣當為遘復此建午建子之月也以三隂三陽適停言之則氣當為否泰此春分秋分之月也然則九月之氣為觀十月之氣為剥剥窮上反下則為復矣嘗試以是觀之朱子發曰柔剥乎剛下剥乎上回邪剥正道小人剥君子李子思曰太極肇判之初隂陽之氣均布于天地之間造物不能使兩間无隂及隂陽之氣鍾而為人而聖人亦不能使世間无小人聖人所以處君子小人者特於氣運隂長之時委曲為君子之謀而使小人无得以肆害而已當羣隂卦中獨論一陽作易者未嘗一日而忘君子盖如此都聖與曰君子之盛也欲化小人而使之改然中人以下不可化也於是乎去之而有夬決之事焉小人之盛也亦欲彊君子而使之從然中人以上不可彊也於是乎擠之而有剥䘮之事焉此盖治亂之極也右明卦義象賛曰山附于地剥上以厚下安宅案以上下厚薄取象而不以隂陽消長為義此聖人用卦之㣲權也右明卦用序卦曰賁者飾也致飾然後亨則盡矣故受之以剥林黄中曰剥之成卦賁之變也自賁之剥上艮不動離變為坤易其二剛而成剥也夫所以為賁者離與艮也離為火艮為土火熄而為土則盡矣是以謂之剥也案剥非訓盡卦止一陽剥去之則盡矣林黄中又曰作易者愛君子之至憂小人之深愛之至則畀以周身之防憂之深則開其為善之利至於轉禍為福撥亂為治則聖人之本心也夫復臨泰壯夬者五陽之序也姤遯否觀剥者五隂之序也而易之序則不然陽先退而後進故自泰而之臨自臨而之復然後繼之以壯夬者所以成其治也隂先進而後退故自否而之觀自觀而之剥然後反之以遯姤者所以止其亂也以為治亂皆任之自然則人事廢矣是故六十四卦之辭吉多而凶少至於否剥猶有吉亨无不利之辭焉案卦序似非自然之次而隂陽進退恐亦自然之數聖人序易或亦有㣲㫖焉林之説未可廢也右明卦序不利有攸往賛曰小人長也順而止之觀象也君子尚消息盈虚天行也都聖與曰五柔而一剛於卦為剥而其事則柔變剛也而未已君子仁足以救亂知足以全身使犯難而可救猶欲為也至於小人衆多視君子十九而勢猶未艾則殺身不足以成仁尚可往乎哉楊廷秀曰此君子處剥之道也然則其遂聴天下之自亂乎孔子固曰順而止之止亂以順止小人以順不逆而激之此君子治剥之道也案隂長至五則人主柔懦不能自立而羣小人得志矣獨上九君子宻輔人主而无位无位則无權其如衆隂何往則殺身而已矣固不利也唯輔導君徳變柔為剛變闇為明則上九宻運帷幄不動聲色轉危而安易亂而治而成大觀之治也不然殆矣程可乆曰坤道先迷至於剥而極故不利有攸往袁氏曰易於復之剛長則言利有攸往則剥之小人長不利有攸往固其理也林黄中曰方賁之時小利有攸往而已况於剥乎五為主而一陽為客小人盛而君子㣲矣故其卦為剥其彖曰不利有攸往凡此皆為君子言之也案夬以陽决隂故主君子剥以隂剥陽故當主小人今不利有攸往之辭與夬同則易為君子而作可知矣右明卦占此彖无象初六剥牀以足蔑貞凶賛曰剥牀以足以滅下也林黄中曰牀上實下虚有剥之象蘭恵卿曰一陽在上五隂載之有牀之象李季辨曰君子在上處牀也小人自下剥之漸而毁也毛伯玉曰天下之勢猶牀也古者席地而坐唯長民者坐于牀示不撓也今也初剥其足離其民也二剥其辨黜其臣也小人亡人之國必先去其臣與民而後及其君此五之所以受其剥也張知常曰凡剥皆小人剥君子故每進而益凶終于自剥其廬焉袁氏曰夫剥始於姤而終於剥始於一隂而成於五隂故其卦以滅下為剥以厚下為无剥案取象子牀林説猶觀之象亦一義也蘭説則與上九得車剥廬之象同及觀爻義則又不然下卦三隂為牀猶坤之稱輿也六四為膚六五君位即身矣一陽在上猶廬也坤載於下而艮止於上牀之象也右明象耿睎道曰於是時上有以正之則不能馴致而為剥矣唯上无陽應故凶由此而起都聖與同右明占李子思曰隂爻凡五唯三舍羣隂以應上九之陽故无咎五以宫人之寵待羣隂而殺其勢故无不利乃若初二與四則居剥之世而専以隂剥陽者故皆因剥牀而得凶則是聖人於隂類當長之時猶不許小人之害君子其戒益昭然也右明爻義六二剥牀以辨蔑貞凶賛曰剥牀以辨未有與也袁氏曰言剥牀皆所以危之也而有逺近之殊故莫甚於剥牀以膚逺於膚者為足近於膚者為辨剥牀而至於辨其勢已殆矣然猶可為也使有以正之未必凶也胡翼之曰初民之象故曰足四切近於君故曰膚二居膚足之間是上下分辨之際則人臣之位也始剥於民又剥於臣矣右明象占林黄中曰凡卦六二多吉者以中且正也然如剥之為卦有與則為正无與則為邪今逺无所應近无所承䧟於羣隂之中是以為剥牀之象也若有應則為觀矣有承則為艮矣何遽凶哉右明爻義六三剥之无咎賛曰失上下也蘭恵卿曰處羣小之中而不與之為黨以害君子所以无咎然不言吉盖君子道消之時无咎足矣胡翼之曰於小人中獨不為小人之行雖在剥時得无咎也程可乆曰失上下而无咎猶坤䘮朋而乃終有慶李子思同程正叔曰不言吉何也三雖從正其勢孤弱所應在无位之地於斯時也難乎免矣安得吉言无咎所以勸也楊廷秀曰内則失上下羣隂之心外亦未能為一君子之助然許其无咎者勸之之辭也李季辨曰聖人未嘗不開小人為善之門案卦體為剥其占為无咎不與羣小人為黨而志在君子一君子處世之窮雖不能獨立於上要非三之所能助然使在下者皆存心如三則君子雖窮不至為羣小所逐矣以隂剥陽本有凶也而不為剥陽之事志在從善雖失羣隂亦不得而咎之也夫觀之隂爻以近為貴故六二正應僅可闚觀剥之六三聖人乃取之何也觀與剥之時物不同也右明占此爻无象袁氏曰剥雖小人之事以近陽為善以有應於陽次之近陽者六五是也故可以治剥有應者本爻是也故不為剥案初剥牀以足二以辨本爻當以笫四乃以膚今本爻不言笫而无象則以應上而不為剥故不言也右明爻義六四剥牀以膚凶賛曰剥牀以膚切近災也張舜元曰艮為膚噬嗑六二噬膚互體亦艮毛伯玉曰四屬上體故曰膚一陽與四同為艮體初剥及艮陽之膚也五則禍及身矣聖人不言之耳右明象朱子曰隂禍切身故不復言蔑貞而直言凶也朱子發曰剥陽至四而乾毁其凶可知張舜文曰治生於君子而小人蒙其利亂生於小人而君子被其害林黄中曰譬之於牀先剥其足次剥其辨又及其膚然且熟寐而不之覺此其所以凶也所謂厝火積薪之下而寝其上火未及然因謂之安者也右明占李子思曰進而傷體此君子之身受剥者也唯六五之主不以大權假之其禍僅至於膚而止比之大過諸卦自足止至頂耳者有間也案以卦之序言豈无頂耳之象特聖人示天下以轉禍為福之道故不言爾右明爻義六五貫魚以宫人寵无不利賛曰以宫人寵終无尤也朱子曰五為衆隂之長當率其類受制於一陽故有此象程可乆曰貫魚者衆隂次序之象以順承上而不剥上也林黄中曰一陽貫魚之象也右明象張舜元曰柔得尊位而衆隂以次相傳有后以宫人備數進御於君之象馮當可曰五隂剥陽意極不善至是乃肯為宫人之寵何也以五也隂本柔順而五得中以率其下必能不為剥滅之道夫時非自剥人事使然也乾亢矣用九乃吉坤戰矣用六乃吉顧在人者如何耳時則剥矣而下有為善之道上有取吉之理下可為善本爻是也上可取吉上九是也此以虚象言也楊中立曰先王之時六宫各帥其屬以時御于王所九嬪掌之御叙于王之燕寢女御掌之而嬪御之職皆列于天官大宰涖之則燕好嬖暱之私不得干其上矣貫魚之象也夫女子與小人之難養一也先王所以處之无二道焉以宫人寵之則无不利矣是亦順而止之之道也若夫付之以心膂之寄借之以威福之重而遽絶之則肘腋之變不可測矣可不戒哉都聖與曰天下之亂多生乎小人女子易故深探剥之所由生而為人君言之也毛伯玉曰四剥膚則及於五矣五能御之則為觀不能御則為剥五之受其剥也其禍已成故置而不論獨原所以致剥者盖五實使之也小人而不得君何剥之有是故嬖寵之家不及以政使令之人不出房闥如是則未嘗无小人而天下不知有小人也右明占鄭舜舉曰五君位也不當例以小人之進為言故告以處小人之道袁氏曰上承一陽而下據四隂治剥而不為剥者也趙氏曰居剥之極而不言剥者以剥及君位難於有言故但言人主所以待羣隂之道此以君位言之亦或可取以為義也張敬夫曰五雖君位而卦有隂為主者不取君義坤也剥也遯也明夷也歸妹也旅也非人君所處故亦无君義此不以君義言之張子厚曰異於六三者以居尊制裁為卦之主故不云剥也隂陽近必相比本爻能上傅於陽反制羣隂不使進偪方得處剥之善下无剥之之過上得陽功之庇故曰无不利劉長民曰居君位故不言剥然體未異羣隂總湊于己故稱貫魚程正叔曰剥及君位其凶可知故不言剥而别設義以開小人遷善之門聖人之意深切之至也林黄中曰剥至五凶之極也聖人謂其无應而承於上九故别設義以救之五隂貫魚以承上九以宫人之寵寵之斯為善矣非柔變剛之義也故曰无不利本爻之不言剥以居君位隠之也然為剥之主羣隂宗焉如貫魚以進於上本爻但以宫人寵之則羣隂受蓄而上九无剥廬之患矣无不利云者施之四隂則四隂有受蓄之利施之一陽則一陽有得車之利也五有其位又有其權故作易者教之如此一君子无位而在外何自而激其變耶右明爻義上九碩果不食君子得車小人剥廬賛曰君子得車民所載也小人剥廬終不可用也張舜元曰艮為果蓏此卦自乾而變木果乾也下應六三之坤不為所剥故不食蘭恵卿曰居无位之地不為時君所任有碩果不食之象亦猶井九三之井渫不食鼎九三之雉膏不食也然在剥之時小人亦不能盡剥君子猶有在上者亦碩果不食之象李季辨曰人之食果必留其碩大者以為種子生意已存於不食之中矣案凡衆小人擊一君子其道浸盛而君子猶得以安其身者亦必有隂為之助不深擊者也在它卦五隂一陽則五隂皆歸之矣在剥復夬遘則論隂陽消息盈虚之理然隂陽之情豈能泯滅剥之上九六三正應故失上下六五近而相得故无不利盖六三居羣隂之中而為之解六五握羣隂之權而為之平則碩果不食於時固碩果之不得位而碩果不食於羣隂亦碩果之得所助也陽為大故果為碩果之不食以其碩也夫有一大陽在上則天下未至於純隂生意有望焉有一大人在上則天下未至於全亂生民有望焉此易之㫖也右明象李去非曰君子以小人為車小人以君子為廬上所以庇下下所以載上也楊廷秀曰五隂載一陽車之象一陽庇五隂廬之象也蘭恵卿曰自上觀之譬之君子之乘車則下為庶民之所載自下觀之譬之小人之剥廬則將无以自庇其身矣程子曰九非小人但言剥極之時小人如是也案聖人設卦觀象立象盡意原无所不通初不可以一説定也剥之時一陽在上危如累夘不能以一日安也明矣易乃取碩果不食之象又取君子得車之象正猶觀之四隂而有取於門闕觀瞻也然剥之終終歸於剥於是乃言剥廬之象以曉之使小人知世无君子則將无以庇其身矣然九君子之象非小人之象若使六處此位則剥純隂耳使九常居之則廬亦不可剥也車廬皆因牀生象衆隂承載之義坤之為大車亦以此也右明占石守道曰牀足至膚獨有屋廬可以庇也若更為小人上進併廬而剥去之民何所安卦存此一爻所以庇民也王景孟曰君子存則小人安君子去則小人禍然則君子亦何負於小人而小人亦何利於剥君子也都聖與曰五陽為夬五隂為剥夬之終猶欲進君子剥之終己欲退小人則以君子之道宜進小人之道宜退乃天下之常理人情之公願而自然之分故也李季辨曰小人極盛然後知君子為民所屬望禍亂既極然後知小人之不可用也李去非曰天下未有必无君子之理亦无盡絶小人之理碩果之不食蔓草之難圗此天理也李氏曰立卦之義在於柔變剛則受剥正在上九而乃言碩果不食者聖人探消息之理有剥必有復存陽也胡翼之曰君子守正執節明哲保身不為小人所害至此將復其位而得行其道也毛伯玉曰三隂為否四隂為觀猶可及也有九五以為陽之主也故否之大人則休否觀之君子則无咎至於剥則遂无君矣勢窮理盡必將有一人焉徐起而妆之甚矣爻象之㣲且宻也天生聖人將以靖亂孰得而滅之故湯文不死於桀紂乃碩果不食之象也馮當可曰觀此一爻得車剥廬之異象則剥與不剥豈不在人聖人明言君子小人於一爻之中其義著矣朱子曰取象既明而君子小人其占不同聖人之情益可見矣右明爻義都聖與曰否與剥皆主隂長成卦而六爻所言皆主君子者彖言成卦之本爻傚天下之動聖人作易與民同患則欲為君子者可以預知小人之情状也小人何與焉傳曰易不可占險盖謂是也袁氏曰以陽化隂其勢甚易詩之雨雪瀌瀌見晛曰消此剥之諸爻以近陽有應為善也謂三五案六位以牀之象言則初足二辨三笫四膚五身體也而三不言笫以有應於上不剥之也五不言身者五剥之主治剥者也而笫與身之序黙藏乎其中矣右明六爻震下坤上復雜卦曰復反也説卦曰復徳之本也又曰復小而辨於物又曰復以自知王輔嗣曰復者反本之謂也郭立之曰易以乾坤言形以天地言氣以隂陽言故乾坤之理天地之運隂陽之㑹无不反其始而後行故乾之初九復于甲子嵗功之出起于冬至之夜半七政之行復于牽牛之初以至律歴之紀四時之序无不反於此者所以黄鐘為萬事根本此之謂也袁氏曰復以五隂乘一陽陽位乎下隂位乎上疑若處非其所然而陽體動以居内隂體順以居外陽方升而進乎上隂方降而退乎下由是而復其所矣此卦之所以為復也朱子曰剥盡則為純坤十月之卦而陽氣已生於下矣積之踰月然後一陽之體始成而來復故十一月卦為復此以隂陽言之程正叔曰陽君子之道陽消極而復生君子之道消極而復長故為反善之義程可乆曰不極其往而還曰復春秋書公孫敖如京師不至而復公如晉至河乃復遷善欲蚤故以不極其往者言之此以人道言之案復有二義有往復之復有復其所之復易以内為主外為客夫陽向也往於外而今復于内此以往復為義泰之无往不復是也上者陽之所下者隂之所陽今在下自此日復于上此以復其所為義小畜之復自道牽復是也卦之彖以復其所為義而爻以復于内為義是各一道也李子思曰老子萬物並作吾以觀其復夫物芸芸各歸其根曰静静曰復命復命曰常以静為復者也老氏盖知易之體而不知易之用案老氏歸根復命之復天地之貞也易言一陽來復之復天地之元也意各有在不可以一説律之也右明卦義象賛曰雷在地中復先王以至日閉闗商旅不行后不省方案此以冬至應卦氣彼歴家謂六日七分以應七日來復之義冬至起中孚者傅㑹之説非易之㫖也右明卦用序卦曰物不可以終盡剥窮上反下故受之以復程正叔曰物无剥盡之理故剥極則復來隂極則陽生陽剥於上而復生於下復所以次剥也右明卦序亨賛曰剛反程可乆曰陽復於内有應在外故亨李子思曰陽反而復生生之氣自此萌動故曰復亨都聖與曰陽宜主乎内隂宜賔乎外陽宜進而上隂宜退而下此理分之常也而内外上下之不常者時也時方在午則隂主乎内而隂乃往焉隂進乎上而陽退下焉其漸至於閉塞而成冬則非所以亨也至於時運乎子則隂極而陽萌於是為主於内而漸進乎上復其理分之當然而亨矣王景孟曰剥之上九雖居五隂之上其勢往而屈也此一陽之窮也復之初九雖居五隂之下其勢來而信也此一陽之亨也右明卦象出入无疾朋來无咎反復其道七日來復利有攸往賛曰動而以順行是以出入无疾朋來无咎楊中立曰動而以順行故出入无疾出入无疾故朋來无咎夫四時之變浸而為寒暑固非一日之積也天且不能暴為之而况於人乎朱子發曰復本坤而乾交之剥極成坤陽降而入坤極而動陽升而出羣隂莫能害之之謂无疾言剛反而得位也李氏曰无疾者莫為之害也无咎者適當其可也李子思曰震初動而坤順從之隂陽不相攻害故曰无疾李氏曰一陽方動衆陽從之以類而升何咎之有郭子和曰疾猶不疾而速之疾隂陽消長有漸此説亦通賛曰反復其道七日來復天行也侯氏曰七日七月也豳詩一之日二之日三之日四之日皆月也袁氏曰或曰年或曰嵗或曰日或曰月盖年與嵗則有乆近之意月與日則有隂陽之殊唯其當而已朱子曰七日者所占來復之期也都聖與曰反以其道原其始也復以其道要其終也李子思曰歴剥之六爻至復之初爻凡七爻而一陽來復隂陽之數自午至子數不過七一辰是為一日自剥至復爻亦如之一變而為七嵗月日時之運皆然而易爻象之故畫六而止至七則變此古聖人作易之成説也林黄中曰日陽物也月隂物也七陽數也八隂數也舉日稱七故於一陽言之舉月稱八故於二隂言之聖人因象以寓辭因辭以寓意八月有凶七日來復盖有喜懼之辭焉案天地之道有反則有復陽道之來復盖歴七日此天道然也非人之所能為也復曰七日臨曰八月隂陽之義也故曰隂陽之義配日月賛又曰利有攸往剛長也復其見天地之心乎案剛浸長故自一陽之復以往二陽為臨三陽為泰以至于大壮與夬无不利也易之諸卦占辭未有詳於復者喜之也右明卦占初九不逺復无祗悔元吉賛曰不逺之復以修身也説卦子曰顔氏之子其殆庶幾乎有不善未嘗不知知之未嘗復行也案六二賛曰下仁而此又引顔子竊謂孔門告顔子以克己復禮為仁應此爻之義也朱子發曰外為逺内為近九自外來内不逺也失而後復不失而无復矣李子思曰承剥之後而一陽來復乃生生之本也天地之運一息不留剥終復始不容少緩若少遲不反則生理息矣李季辨曰一陽在内天地之心性善之端也故六爻以復善為義初復之始始而知復不至於悔案一陽來復於内而以復名卦至爻則自内而之外每爻以至此始復為義初言復於初也一歩之始即知其非而亟反如所謂違道不逺施諸己而不願則勿施諸人者也故无適悔而大善而吉也六二休復吉賛曰休復之吉以下仁也張敬夫曰上无繫應能休泰而復林黄中曰是以其心休休然无入而不自得也案需二曰衍在中二位乎内卦之中寛裕和平去陽最近其復也易故為休復之吉右明象占諸説紆淺皆不足據石守道曰六爻唯初九是陽六二以其近之六四以其應之故二休復吉而四中行獨復右明爻義六三頻復厲无咎賛曰頻復之厲義无咎也朱子發曰厥初妄動自厓而反則頻復也頻者危道故曰厲袁氏曰動而過中則其初失於不能復矣處下體之窮則其終不可以不復唯初不能復故厲唯不可以不復故无咎楊廷秀曰聖人危其頻過故曰厲以儆之開其頻復故曰无咎以勸之易於三每以下卦之終為義巽至三則濵上體矣故曰頻㢲復至三則濵坤矣故曰頻復頻於外而能復者以衆隂皆趣於初其勢可復也復貴蚤不貴遲貴於内不貴於外故復於初則過形於心而即復也此復之至善者也故曰元吉復於二則平居豫暇之時有過則復不待事作物交而有過然後復也此復之次者也故亦曰吉至於三則已頻於外卦矣過形於外則不可妆矣故頻於外而不得不復此危道也此廹而後復者也故曰厲无咎盖庶幾於補過云爾聖人開天下之復於善如此右明象占李子思曰復之所以為復者初九一爻也而諸爻皆以復稱盖因託之人事以盡復之義也右明爻義六四中行獨復賛曰以從道也王輔嗣曰上下各有二隂而處厥中履得其位而應於初獨得所復張子厚曰柔危之世以中道合正應故不與羣爻同朱子發曰五隂㝠行去道日逺四行於五隂之中獨反而復下從於初郭子和曰舍其類而獨行其志者也虞仲翔曰四在外體不在二五何得稱中夫中无一定之中自初至三以二為中自四至上以五為中復卦五隂自二至上則四為中康成謂爻處五隂之中是也程可乆曰本爻當位初未有失故不言吉朱子曰當此之時陽氣甚㣲未足以有為故不言吉理所當然吉凶非所論也右明象占馮當可曰猶夬之九三於衆陽中獨應上六為獨行遇雨郭子和曰剥之六三與復之六四反對其義相類故在剥取於失上下以應乎陽在復則取其獨復以從道王景孟曰此二爻者其可以隂柔少之乎君子之在天下无往而不可貴剥之上九處一卦之外宜若失位也復之初九在一卦之下宜若甚㣲也而六三六四應之誠以道之所在可從不可違如此右明爻義六五敦復无悔賛曰中以自考也林黄中曰敦厚也益也艮之九三既為艮矣故上九謂之敦艮又從而益之也臨之六五正應九二則上六為敦臨復之六四正應初九則六五為敦復案敦之為言厚之至也下有一艮山矣而上又為艮故曰敦艮三隂為坤厚矣而積為四隂故臨之上復之五皆曰敦謂此象也右明象閭丘逄辰曰五逺於初而下又无應但能无悔而已右明占李子思曰陽長之卦凡遇隂柔之主則未嘗不順之无所於逆故復臨泰壮六五之爻皆以下順陽剛而得居上之體作易者以此垂訓要所以為君子之地也鄭舜舉曰六五未必皆善唯坤體則无不善此黄中之理唯知易者識之右明爻義上六迷復凶有烖眚用行師終有大敗以其國君凶至于十年不克征賛曰迷復之凶反君道也左氏子太叔曰楚子不修其政徳而貪昧於諸侯以逞其願欲乆得乎周易有之在復之頥曰迷復凶其楚子之謂乎欲復其願而棄其本復歸无所是謂迷復能无凶乎復上六變而得頥吕與叔曰處卦之終最逺於陽迷而不反者也馮當可曰至是而不復可謂迷矣郭子和曰或謂迷而後復非也苟能復矣雖迷何凶太甲是也張舜元曰以坤居上先迷者也王輔嗣曰比復好先而坤曰先迷何也順爻之序以觀之則初先而上後也故復好先謂不逺而復也衡爻之序以觀之則上在前初在後也先迷謂先人以行前則迷也上六是也隂昏闇去陽明最逺故迷於所復猶蒙之困也右明象朱子發曰上窮矣不可動動則降初成坎坎烖眚也卦成師用行師也林黄中曰謂之烖則有人為之咎焉謂之眚則有天降之罰焉雖有聖賢不能為之謀矣楊廷秀曰國君者六五也李去非曰盡坤土之數而尤不克征也盖迷而求復之為難如此毛伯玉曰十年不克征絶之之辭也李子思曰以天理論人事亦可以為從物流轉乆而不復以致顛沛流離者之戒案復次剥者也五隂剥一陽極則上反而下成復以此例之則一陽上復至五成夬其極則上反而下成師而下卦則坎也易窮則變迷復而不知所以變則窮上而反下如此故烖眚之象則坎也用行師之象則師也終有大敗以其國君凶者上反下則六五上窮矣反下為坎大敗之象也六五上窮則以其國君凶之象也十年坤土之數上反下而六五猶為四隂則厯坤之三陰猶未能變不克征之象也然而聖人序卦則坤全變而為乾然後无迷復之禍此聖人静觀造化之運變而通之之神也右明占張敬夫曰易之爻辭鮮有如是之詳其凶鮮有如是之極者而獨於復之上六言之盖自古亡家覆國反道敗徳无所不至者其源盡起于一念之㣲不能制遏之耳夫以隂柔之材去本之逺所謂人欲肆而天理蔑者故有大敗終凶之義右明爻義案初復不逺至四則為獨復以應初也二復休裕至五則為敦復以得中也三頻厓而復至上則迷以不蚤辨也右明六爻震下乾上无妄元亨利貞其匪正有眚不利有攸往初九无妄往吉六二不耕穫不菑畬則利有攸往六三无妄之災或繫之牛行人之得邑人之災九四可貞无咎九五无妄之疾勿藥有喜上九无妄行有眚无攸利
