body:
  text: 厚齊易學卷十宋馮椅撰易輯傳第六經上篇泰否乾下坤上泰贊曰則是天地交而萬物通也上下交而其志同也郭立之曰泰者主人道而言朱子曰天地交而二氣通故為泰正月之卦也案天地中和之氣三隂三陽適相均平乾本在上而其氣下降坤本在下而其氣上騰相通相濟而不相病所以泰也以三陽自下而上言之則為正月之卦以隂陽適停言之則為春分之卦在所引用爾李子思曰蓋嘗反觀之一身陽浮于上而不降隂涸于下而不升不相通暢如是者病必繼起要須隂陽之氣升降往來于一身之中然後氣血流通而風雨寒暑之冦有不能入者一身之泰也知此之理而見之日用于以贊天地之化育于以通君臣上下之情絪緼相感誠意交孚蓋無適而不可又曰天尊地卑定位于太極肇判之初故易以乾坤為上經之首以辨上下之分演而至履凡十卦十者天地之極數也尊卑且猶各履其位兩不相交則其情不通故聖人取乾下坤上重而為泰以示上下之交其意深矣雜卦曰否泰反其類也右明卦義象贊曰天地交泰后以財成天地之道輔相天地之宜以左右民右明卦用序卦曰履而泰然後安故受之以泰泰者通也耿睎道曰泰者心安體舒之謂也天下安寧而無虞則人人心安而體舒矣泰者非通之謂也乃通之所由致也否者非塞之謂也乃塞之所由致也孔子言泰者通也蓋通則致泰而非謂泰則通也案聞之曰自乾坤後始涉人道經厯六坎險阻備嘗必內有所畜外有所履然後致泰而泰之後否則繼之以此知斯人之生立之難而喪之易國家之興成之難而敗之易天下之治致之難而亂之易此又序易之深意而亦天地自然之理也右明卦序小往大來吉亨贊曰內陽而外陰內健而外順內君子而外小人君子道長小人道消也蘭惠卿曰以上下之情而言致泰之因以內外之位而言致泰之道郭子和曰乾為大坤為小陽為大隂為小君上為大臣下為小君子為大小人為小總衆類言之故特曰小大也楊中立曰小往而後大來小人在內而能進君子者未之有也郭立之曰小者以往大者當來往者屈而來者信也鄭少梅曰觀泰之象則知否之所生觀否之象則知泰之所起蓋以隂陽之上下升降成象也故否泰二卦皆曰往來案卦有上下內外以六畫之象言之則悔上而貞下以六位之序言之則外往而內來夫隂陽迭相升降往來于宇宙之間萬古不忒易于其相有而不可相無者既以乾坤天地君臣上下名之而論其升降焉至于其類不無淑慝之分則以大小貧富虛實君子小人名之而論其往來焉夫往者屈也來者信也陽來居于內則日長隂往居于外則日消故君子得時而小人退避此天下之所以泰也右明卦象袁氏曰道有君子有小人用有吉有凶時有亨有塞泰之道長者君子也故于用則吉于時則亨王景孟曰天地之道不能有陽而無隂人之道不能有君子而無小人否泰二卦隂陽適停君子小人各相半焉然時乎泰通則陽為主而隂為客小者不能以病大往者不能以遏來隂時出而佐陽而小人日聽命于君子此所以吉亨也程正叔曰不云元吉元亨者時有汙隆治有小大雖泰豈一槩哉言吉亨則可包矣案吉亨以人事言也天道有元亨而無吉凶吉凶不僭在人吉凶為君子設也抑聞之先君子曰有以父占者得泰而喜或告之曰女父已葬矣乾為父坤為土父入土中已而信然是知易道有無窮之義唯其時物而已右明卦占初九拔茅茹以其彚征吉贊曰拔茅征吉志在外也王輔嗣曰初為類先楊中立曰泰之初上下始交也小者未盡往則豈一君子之力獨能信哉故以其彚征乃吉三陽本上今在于下必復于上程正叔曰君子小人未有能獨立不賴朋類之助者也自古君子得位天下之賢萃于朝廷同志協力以成天下之泰小人在位則不肖者並進然後其黨勝而天下否矣蓋各從其類也袁氏曰不謂之往吉而謂之征吉蓋凡言征者必以正行之右明象占馮當可曰三陽在下而上有其應其進而征莫之能禦進而征者陽之性有其應者君子之時蓋時者上之所為也為人上而欲致泰者無他應君子而已林黃中曰六爻以相通為義三陽同志而上騰三隂同志而下接所以為泰之時李子思曰乾本在上而居下坤本在下而居上卦則借象以示交泰也乾三爻皆上征坤三爻皆下復爻則辨分以正隂陽也卦言來者謂天氣之下降爻言征者謂君子之上亨使天氣下降之象一定而不易則隂陽無乃失位乎又曰卦以氣交自上而下者也爻以位升自下而上者也右明爻義九二包巟用馮河不遐遺朋亡得尚于中行贊曰包巟得尚于中行以光大也蘭惠卿曰包巟者包初九也初為內二為外故曰包用馮河者用九三者也以剛居陽故謂之馮河不遐遺者不逺忘三隂也三隂比三陽為逺故謂之遐朋亡者三陽為朋然亦不相黨馮當可曰初比二為未用猶賢者之在荒逺三比二則材過于剛二獨居中後則引初以進前則用三以行位在內而志應于外為不遐遺己應五而初應四三應上同類各從其應為朋亡趙氏曰人材有不及者容之其或勇為之過則亦取之不以其逺而遺之不以其朋而私之過與不及皆無所棄而疏與親皆無所偏此九二之責也案凡下卦二居中多以初三兩爻同體協比為義小畜之三陽九二猶且牽復在中况泰之三陽上復者乎初在後而不及則包之以進三在前而過則用之以行三隂在外逺也而應五則不遺三陽同體朋也而各有應則不黨此泰之九二所以為盛也右明象李子思曰世有皇極之主則必尊而尚之故曰得尚于中行程正叔曰二以陽剛得中上應于五五以柔順得中下應于二是以剛中之材為上所專任故雖居臣位主治泰者也右明占案泰之為卦天地之中三隂三陽而無所偏上降下升而無所倚中之道也則于六位之中又取中焉二五君臣之中位也五雖君而六居之二雖臣而九居之其象為剛中之臣上配柔中之君以任中道之責者也故六爻之義二得而兼之尚配也得配于中道之主也今取帝女者謂之尚主蓋取諸此六五所以有歸妹之象右明爻義九三無平不陂無往不復艱貞無咎勿恤其孚于食有福贊曰無往不復天地際也都聖與曰天確然而常髙其氣之下際乎地則平矣然未有平而不陂者也地隤然而常處其氣之上際乎天則往矣然未有往而不復者也李子思曰當乾坤二體交接之間而天地二位將復其故之際其象蓋如此郭子和曰否泰之道如循環然終則有始可不豫戒乎城復于隍則無及矣林黃中曰以至剛迫至柔物極則反是以聖人憂之而為之戒曰勿極其平庶幾不陂勿窮其往庶幾不復世之君子當極盛之時視其力足以誅鋤小人視其力足以鞭笞四夷必極其平窮其往而後已此小人之所以復用而夷狄所以復彊也此說近巧而理意亦通平謂平其隂猶削平之平往謂往乎上即大往之往然隂平而陽上進則傾矣是陂也陽往而隂上窮則復矣故未敢廢而兩存之右明象楊廷秀曰隂將復泰將否矣可不懼乎君臣克艱而守正庶乎其無咎馮當可曰乾之極不久位于三將進而為四矣三一進則二初亦進而隂則下生矣此一爻乃天地將交際變革之㑹儻非泰則三當凶矣無咎者艱貞而免于咎也劉氏曰三猶有應特否不可不防爾若憂其以否見疑而遂不食其祿則失于食之福矣案上卦雖坤有君道焉下卦雖乾臣也三陽之進但能知艱而守則可以貞而無咎蓋陽以上復為貞也三隂下復不必憂其不與已孚而所食于上者自錫佑之上下之交其象如此上一位天之象也應已福之也位多凶故不無戒之之辭亦持盈之意右明占李仲永曰將近小人故其辭危案或問關朗曰時運已往艱其如何曰天人有前期變而能通故治亂有可易之理大哉人謨其與天地終始乎右明爻義六四偏偏不富以其鄰不戒以孚贊曰偏偏不富皆失實也不戒以孚中心願也張舜元曰坤為衆偏偏者衆飛之象朱子發曰三陽相率而上三隂下復其所如葉墜井上偏偏而下以井氣扶之也李氏曰初言拔茅者引而出之征于上也四言偏偏者以下為順復于下也初乘道長之時而欲進四安道消之時而欲退自然之理右明象郭子和曰趨下從陽蓋見幾之君子也又曰隂虛也以乾坤之䇿言之亦已耗矣故為不富又曰主坤而言故辭與謙同袁氏曰三隂在上其道常乏故資陽以為富實而已六四未能得陽故曰不富失實三隂皆從陽而獨於四言之則知四從之之先矣陸希聲曰以隂居隂故曰不富三隂皆欲下復四能先之是能用其鄰也耿睎道曰下之三陽則以其彚而征上之三隂則以其鄰而復毛氏曰三之于隂也勿恤故四于三陽不戒戒生于疑疑生於畏我不彼恤則彼不我戒矣君子無意于害小人而小人亦信君子之不吾害也案說者多謂三隂不戒以相孚非也三四隂陽往復之交故言孚則隂陽之相孚也明矣豈惟君子小人哉臣之進于君君之下于臣所謂上下交而其志同者相孚之謂也右明占王輔嗣曰乾樂上復坤樂下復四處坤初程正叔曰三為將中知戒則可保四已過中矣理必變也故専言終始反復之道理當然者天也衆所同者時也蘭惠卿曰上卦之下內外之限君子小人出處之際一喻小人思復于內一喻上之人應下之君子右明爻義六五帝乙歸妹以祉元吉贊曰以祉元吉中以行願也左氏晉趙鞅卜救鄭陽虎以周易筮之遇泰之需曰宋方吉不可與也微子帝乙之元子也宋鄭甥舅也祉祿也若帝乙之元子歸妹而有吉祿我安得吉焉乃止見哀九年按商之君有三乙成湯為天乙史謂其母吞乙卵而生其一也祖乙圯于耿其二也自成湯至于帝乙乃所謂微子之父其三也今湯歸妹之辭見于漢京房傳具有證據則非微子之父明矣虎去商千餘嵗間已訛如此則夫名同實異者古今訛謬何可勝數哉傳記之未可盡信久矣瀆書者必如孟子之於武城雲漢一斷之以理可也陸希聲曰以柔在上帝女之象下配于二下嫁之象韓康伯曰女子而居王之位必帝王之妹張舜文曰互體兊約象震有歸妹之體焉泰道尚交故有此象泰之九三進四六四退三者歸妹也因泰之互體約象有歸妹之體而歸妹之九六各歸本位則為泰故以六五而取象焉子憂曰湯之歸妹也湯嫁妹之辭曰無以天子之尊而乘諸侯無以天子之富而驕諸侯隂之從陽女之順夫天地之義也往事爾夫必以禮義語見京房傳王昭素曰商之諸王多以十干為名甲為陽首六五隂爻交泰之主故以名乙之主為象李氏曰蠱言甲取興起巽言庚取更變泰歸妹言帝取其尊乙取其屈三者有商之君皆取于紀號而易特取其義非以號也吕與叔曰位尊曰帝體隂曰乙乙隂之長也李季辨曰五歸妹而二尚主交際之義阮氏曰易著人事舉商周帝乙髙宗箕子是也孔子曰卦之德方以知又曰知以藏往文王演易已往之事近而易信者莫如商周故也然發揮于剛柔而生爻自文王始未演易之前固未有占爻者或者以其事之應此爻之象與如所謂周易有之在師之臨之類或謂帝乙歸妹之時亦嘗占得此爻殊不知文王之占卦未占爻也馮當可曰他卦多以陽居五為君德此以隂居陽為君德何也九二之才之德可以致泰決矣有臣如此君何為哉推誠屈己專其好合如帝妹下嫁于人所以致泰者一任之而已人屬惟男女相親出于天性不可間也右明象陸希聲曰天降于下猶男下于女天復于上地復于下天地之大義也天地之大義也者以順而承天也今五志于順故獲福祉天道助順故必元吉程正叔曰五能倚任九二剛明之賢而順從之如帝乙之歸妹然降于尊而順從于陽則以受祉且元吉也謂成致泰之功也袁氏曰泰者福祉之時也三亦言于食有福案福祉自天泰之時天道下際故多福祉之象右明占楊中立曰泰之主也時之盛衰係人主而已天下隨之以為時也故復言處泰之道而不以時之往復為辭與三四異矣毛伯玉曰泰之世君子雖用事而五實隂也左右亦隂也聖人因爻取象使小人之在左右者如女子之不與政則吉矣天下不能無小人而便嬖使令人主所不能無也故嚴為之約使宫閫之人不出房闥嬖寵之私不及以政反是則適足以禍之蓋寵極則過過則為災節之則中中則為祉故孔子曰中以行願也其防患也至深而其垂戒也至切矣右明爻義上六城復于皇勿用師自邑告命貞吝贊曰城復于皇其命亂也程正叔曰􅕻土積纍以成城如治道積纍以成泰及泰之中將反于否如城頽圯復反于隍也郭立之曰三之無往不復上之城復于隍雖理之所必然亦始終之戒也石守道曰泰之中不可過過中則否矣案陽本上而今在下隂本下而今在上終則各復其位矣陽以上為復隂以下為復也故九三上六皆言復夫天下之理唯自然者不可泯沒也人力之所加久而必敗蓋人者窮則天者還矣夫􅕻隍以為城此人力也夷者可使之險卑者可使之髙此非土之性也及其終也土復其性而下墜則城壤而隍塞矣泰之時天也泰之所以成人也君子之道消而小人之道長則泰反而否保泰之治者其可不加之意乎右明象朱子發曰坤為衆師衆也楊中立曰泰之終反為否上下分崩離析之時也命亂而不一衆其可用乎然有剛健之才處之則顛而扶危而持猶可為也故曰吝而已陳氏曰唯告命於邑而不能及他命令不行吝之道也程正叔曰貞凶貞吝有二義有貞固守此則凶吝者有雖得正亦凶吝者吕與叔曰城復于皇上陵下替也勿用師征伐不自上出也自邑告命貞吝夷於列國不足以令諸侯也案乾三爻方上進泰終則上為乾居矣坤三爻下反上反下則居三矣坤三爻皆翩翩而下不為己用故曰勿用師上六反居三其邑也其命止可告三餘爻不禀命也故曰自邑告命以六居上當位貞也而勢方下反故貞固則吝不言凶者四五無陽爻以阻之也夫泰非謙比也其上六乃利用行師征邑國何也謙極則亢九三其應而据有衆隂其勢跋扈故利用行師以征之泰極則否三之九自上復六得反其本邑而坤之衆不為用矣右明占蘭惠卿曰否終則傾剝極則復治極則亂事理之常張知常曰物極則反理之必然唯聖人然後持滿有道鄭舜舉曰往復者有是理也所以使之然者人事也處泰之終坤體而隂柔泰安得而不否處否之終乾體而陽剛否安得而不傾人事天理未有不相符者毛伯玉曰泰之六爻隂陽皆應獨上在一卦之極有自外之意故為君子者亦因而外之近者不相傾逺者不相激此泰所以為最安也與趙氏曰三上皆居一卦之極故雖相應而皆有警戒之辭九三之時尚可為也故能艱貞則無咎上六之時不可為也故雖自邑告命而不免于吝此所以貴乎制治于未亂保邦于未危也右明爻義林黃中曰三陽在下三隂在上此其所以為泰也然在六爻陽反上升隂反接下何也陽升隂降自然之理若陽降而不能升隂升而不能降則尊卑易位而非上下交感之義矣天地之位不可易也所以交者其氣也君臣之位不可易也所以交者其志也又曰初四升降之始故有拔茅偏偏之辭二五升降之中故有歸妹得尚之義三上升降之極故有往復城隍之象都聖與曰六五以仁德居中而樂與賢者共之有九二為之應六四為之輔初九為之引類而進所以能相與財成輔相以左右民使常泰而不否也右明六爻坤下乾上否贊曰則是天地不交而萬物不通也上下不交而天下無邦也閭丘逢辰曰否反于泰天地各復其所上下不交隂陽隔絶萬物閉塞不得亨通故謂之否案嘗觀隂之長一隂為遘二隂為遁夫二隂尚微也而名卦以遁謂陽消也今三隂浸浸乎上進矣作易者乃取反泰為否之義上下不交而閉塞不進聖人抑隂扶陽杜小人之路而保君子之位其微意見於名義之表學者不可不知也雜卦曰否泰反其類也案此言隂陽剛柔內外之相反也右明卦義象贊曰天地不交否君子以儉德辟難不可榮以祿右明卦用序卦曰物不可以終通故受之以否林黃中曰泰通也否塞也泰闢也否闔也一通一塞一闢一闔如寒暑之相推昏明之相代雖天地聖人不能外所貴乎聖人者為能消息盈虗知進退存亡不失其正乘其機㑹有以變而通之耳右明卦序否之匪人蘭惠卿曰或以為非人所為或以為人道絶胡不觀此之六三處羣隂小人之中故謂匪人今否豈非小人在內而致否與右明卦象不利君子貞蘭惠卿曰君子欲有所建明羣小必共攻之非徒無益適以招禍耿睎道曰泰否二卦言君子小人之消長而參天地隂陽萬物言之則是君子小人與天地隂陽萬物同乎消長也又曰天下之所同欲者泰也所同惡者否也自古君臣相與有為于天下者皆欲以致泰非欲以致否也唯不明乎善以君子為小人以小人為君子其所以致泰乃所以致否耳案陽以居上為貞君子居得致之勢有能致之資有君子以左右之變而通之反否而泰是在君子今乃安於貞而上下不交否無由亨非君子之利也大往小來贊曰內隂而外陽內柔而外剛內小人而外君子小人道長君子道消也李子思曰隂陽二氣對行乎天地之間或者謂陽一而隂二故君子少小人多治世少亂世多然自有天地以來隂陽二氣分于四時無一嵗不得其平者而君子小人治亂之運則或者不齊豈幽隂之氣獨盛于人間而天運則不爾邪是不然天人有相勝之理治亂有可易之運特在人所以制之者何如耳治否之世雖小人道長君子道消而所以消小人而長君子者亦必有道矣此作易者所以極論其消長而寄之于爻王景孟曰泰之彖特曰小往大來吉亨而否之彖先之以匪人不利君子貞者君子得志則使小人各安其所無他事也若否則不然彼小人者與君子無齟齬不合之勢則君子必不引去而小人亦未必果來也曰不利君子貞以小人之吾忌也當此時也吾不得不往以聽其來也右明卦占初六拔茅茹以其彚貞吉亨贊曰拔茅貞吉志在君也程正叔曰泰與否皆取于茅者以羣隂同在下有牽連之象也右明象朱子曰小人連類而進而初之惡則未形也故戒其貞則吉而亨蓋能如是則變而為君子矣右明占李子思曰否之世陽在上而隂在下作易者乃以隂為一卦之主何也凡物之生皆自下而升上故上卦為外下卦為內初位為本上位為末李去非曰小人之欲引其類與君子之心一也泰曰征吉而否曰貞吉亨孔子戒之曰志在君其委曲深至如此正而後吉則望小人以正也志在君則猶望小人以解私黨也案朱子謂初之惡未形故聖人望之夫泰以卦之內外明君子小人之消長而否以位之上下明君子小人之名分此作易者之微㫖也夫茅不自拔拔之者上也隂陽之應求雖否隔不交之世未嘗忘也故孔子以為志在君者在下者之同情也然欲其貞固自守而不欲其征者上不交下小人知分而安于在下則吉也安于在下則上終應之未有不亨者苟不安其分守而進焉三陽在上未易敵也則固失矣尚何亨之有右明爻義六二包承小人吉大人否亨贊曰大人否亨不亂羣也劉長民曰當否之時隂得位而為主于內居中履順在小人之中能包下而承上也初六在已之下故包之六三在已之上故承之此以小人言包承也耿睎道曰小人之在下也君子不遁則包之小人之在上也君子未能決則承之此以大人言包承也夫泰之二曰包荒用馮河䝉之二曰包䝉吉納婦吉否之二亦曰包承蓋二在下體之中初與三左右之者也苟非其情有不相得則必能引其類以為之助也右明象李季辨曰包承于羣小小人固吉大人固否然實則亨也李氏曰小人之吉亦吉其凶而已程可久曰大人用否以不交于上此孟子所以聞王命而不果朝也以其正應故用否而亨李子思曰泰中有否否中有亨隂陽消息之運如寒暑之往來能少安之未有久而不變者此大人所以雖否而不終窮也案否亨猶言困窮而通也以小人而包承其類黨盛相安固吉以大人處羣小之中而能包其下而承其上雖不與之為羣而亦不與之為敵所謂和而不同者雖處上下不交之時在上者知其不為小人則終必進之斯其否而亨也不言君子而言大人非大有力量者不足以臻此右明占程正叔曰其質則隂柔其居則中正小人以隂柔言大人以中正言也鄭舜舉曰以其居中得正遂設二義非敢遽以小人絶之也案隂柔無大人之義中正有大人之德易為君子謀故以此爻明大人之否然則何獨不于九五言之曰九五治否之主非處否者也夫否泰皆以二居內得中為其類之主而泰上下交通九為君子故不特包荒用馮河而又且不遐遺朋亡此所以為泰也否上下不交六為小人故僅能包承其類而已此所以為否也右明爻義六三包羞贊曰位不當也案已為三隂之首故包之以進否之三隂進以消陽易于初言貞吉亨二言否亨皆以上下不交示訓也至此則隂盛敵陽矣道日長而上進不容遏矣故不言休咎而直曰包羞也夫否塞之時上下不交亦可進乎曰否塞而不交者卦之體也下卦之終必進上卦者爻之序也過此以往為觀為剝隂豈不進乎孔子故曰小人道長也右明象占吕與叔曰柔而不當其位入于邪者也下包二隂羣相比也劉長民曰初以處卑而守貞故吉亨二以中正而應上故否亨是居小人道長之際而不居小人之行者也以柔居陽不正也處下體之上失中也不言凶咎體順而承陽也案羣隂道長相挻以進不可咎也不言吉亨抑隂也右明爻義九四有命無咎􅔧離祉贊曰有命無咎志行也吕與叔曰上下不交命不行矣四切近于隂獨有下交之情可以有命于下下必從之林黃中曰濟否在君子主濟否在君程可久曰雖小人道長之時然順而在下以本爻之剛健可以行君之命制之在下者也制之在下非特本爻之無咎而􅔧類亦附麗其祉矣􅔧謂三陽祉謂不為隂所剝袁氏曰有命無咎而已能使􅔧類並麗其祉何也無咎者以否之時言之苟有命焉君子之志行而其道長矣轉否而泰􅔧之離祉莫甚于此蓋泰者福祉之時也案以向消之陽制方長之隂安得無咎以其隂陽之情有近而相得之義又上承九五之君同德合志故取斯義則可無咎而同類皆賴其不爭善勝之福也右明象占朱子發曰否道乃革故言濟否之道劉長民曰過否之中有亨否之道而已為之先蘭惠卿曰處近君之地材過其位有濟否之資鄭舜舉曰君子不可榮以祿為不在位者設也四居近君之位濟否之責在焉石守道曰三隂並進小人黨盛宜速止之四當其衝剛健足以止遏三隂李子思曰以象觀之是固為否以爻觀之初不見其有極否之辭聖人慮天下後世以天地否塞為當然之數致使小人得以塞君子之亨路故于爻辭必有以通之也右明爻義九五休否大人吉其亡其亡繫于苞桑李子思曰小人之勢始于遘終于剝否之世隂陽數均未至于極而九五以乾剛處中正之位故能息天下之否也蘭惠卿曰剛健中正可以止息否塞未即通泰通泰須否傾之後也右明象贊曰大人之吉位正當也毛伯玉曰反否為泰非臣子之事唯人主自為之故休否必大人而後吉非休否之吉也李子思曰六二居三隂之中故小人吉九五居三陽之中故大人吉卦雖名否而小人大人同歸於吉作易者所以闢小人而通君子之門也說卦子曰危者安其位者也亡者保其存者也亂者有其治者也是故君子安而不忘危存而不忘亡治而不忘亂是以身安而國家可保也易曰其亡其亡繫于苞桑程正叔曰大人之吉猶未離于否也故有其亡之戒程可久曰上下不相通可底于滅亡每以其亡為戒李季辨曰桑柔脆之木方苞之桑柔脆之甚危之至也毛伯玉曰其亡其亡危之至也苞桑猶綴旒也小人之危其國也如此李去非曰否之將傾有存亡之幾其亡其亡戒之之深此讀其作幾劉氏曰苞桑以况衆君子亦通右明占上九傾否先否後喜贊曰否終則傾何可長也朱子發曰否毁兊成如決積水而傾之莫之御也御今禦此以卦變言也林黃中曰乾為天為西北之天傾西北故否有傾之之象當否之世乾坤不交至其極也自上而反下則又有傾覆之象張舜元李子思同此以卦體言之王景孟曰言傾否而不言否傾人力居多焉以陽剛之材處否之終固所優為也程正叔曰反危為安易亂為治必有陽剛之材而後能之故否之上九則能傾否而屯之上六不能變屯也經言傾否否天也傾之者人也贊言否終則傾否之終必自取傾覆也小人之禍君子不至於自取傾覆不止也此天數也亦人事也右明象毛伯玉曰先否後喜昔之塞今之通也袁氏曰先否後喜皆非此爻之時李氏曰人之常情否則憂泰則喜喜言傾否為泰也閭丘逢辰曰泰之終言城復于隍以戒之否之終言先否後喜以勸之若以否泰相因為一定之數則易不必作矣右明占林黃中曰物極則反道窮則變泰之君子艱貞否之小人包羞下卦之終也及乎上卦之終則泰復而否傾矣張舜文曰消長之相循盈虛之迭至窮則變滿則覆必至之理也習治之害淺習亂之禍深剝爛而順止夬決而乃亨泰亨而止吝否終而必傾觀乎此亦可以見天地之情矣張知常曰因其已傾之勢而傾之宜若易然而小人之黨根結深固所以難也案泰之時唯上下之通也故陽之進也速而其敝也亦易故在九三己有無往不復之戒否之時唯其上下之不通也故隂之進也遲而其散也亦難故至上九猶有先否後喜之辭右明爻義趙氏曰泰三陽在內有君子同升之象隂雖在外而六五下應九二有柔得尊位而能下賢之象故六爻以交相應為善否則三隂在內有小人方進之象陽雖在外而九五得位有剛健中正以興衰撥亂之象故六爻唯三陽為善各以爻取義與成卦之體不同也林黃中曰否六爻上下不交三隂合而為否者也三陽合而傾否者也朱子曰易為君子謀否內三爻是小人得志之時但能如此而已不能大有為也至四聖人便言君子得時否漸可反至上則傾否為泰矣案陽本在上之物隂本在下之物泰則各欲復其所故相交而為泰也否則各已安其所故不交而為否也然自遘復至乾坤十二卦氣言之則三隂自地下而上升無終閉隔之理故初二皆言亨至三則包之以進矣此自以三隂為義在造化之運如此也以人事言之三陽在上為得位故同力以遏三隂之進九五命九四以止之遂得休否至上而否遂傾矣此自以三陽為義為君子之計如此也右明六爻
