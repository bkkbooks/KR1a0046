body:
  text: 厚齊易學卷三十七宋馮椅撰易外傳第五象上贊乾至履此孔子所題文王卦爻之象之名而贊之也象者像也以剛柔雜居六位之畫之象以像此理耿氏曰六爻有象乃鄭王之徒分而益之非古也天行健君子以自彊不息天行健乾之象行古道通健無息也程可久曰不言乾避斥尊也所以别他卦也傳謂天形如雞子上規之星常見下規之星常隱中日月五星之所由二十八宿布于其間半覆地上半繞地下故觀天之道有以見重乾之象也胡翼之曰天之形南極入地下三十六度北極出地上三十六度夫人之一呼一吸謂之一息一息之間天行已八十餘里一晝夜一萬三千六百餘息而天行九十餘萬里自古及今未有毫釐之過亦未嘗有毫釐之不及蓋乾之至健而然也張舜文曰乾坤坎離曰天行地勢水洊至明兩作象皆在上何也四卦者覆而無變體卦也故其象自體而起用震艮巽兑曰洊雷兼山隨風麗澤象皆在下何也四卦者覆而相變用卦也故其象攝用而歸體君子通上下而言之欲人皆可以體乾也以者以此卦之義後並倣此自强不息體天行之健也李子思曰天積陽氣而成者也君子以之充元氣以自强故能不息游定夫曰至誠無息天行健也未能無息而能不息者君子自强也楊廷秀曰天行健誠者天之道也自强不息誠之者人之道也馮氏曰孔子贊易為天下後世為之也乾天之道必待聖人體之則學易體乾之事絶矣聖人者又豈待孔子論贊而後知耶今觀其贊象之辭于每卦六爻之前别設一意皆中庸可企及之事與全卦之義逺近淺深較然不同凡生而有知者皆可學而至雖聖人之髙明皆可迹此而造焉以乾象言之獨言天道之健君子自强不息以法天則為君者自强于仁為臣者自强于忠為父者自强于慈為子者自强于孝至于士農工商各自强于其業是人皆可以學易而易之為書誠有補于天下後世然自强不息雖聖人之髙明可迹此而造也毛伯玉曰泛言君子然後易之用無往而不通又曰文王設卦觀象至孔子大象則專釋八卦之所像者于卦爻之義初不相關其初本異卷是各一道也潛龍勿用陽在下也贊初九也下聲户一經並同以位言之在下卦之下以象言之陽氣在地下也陽宜在上之物今反在下不得時位所以勿用正義曰經言龍而贊言陽者明龍則陽氣也見龍在田德施普也贊九二也施去聲普古溥周而博也龍在田則雨澤膏潤之象故曰德施普也經言利見大人而贊不言之者德施普則天下利見可知不言者舉一隅也後並倣此正義曰初爻舉自然之象五爻並論人事互文也終日乾乾反復道也贊九三也反平聲陽自外來內曰反自下往上曰復或作覆非三已過中則反二之中者道也或上復五亦為中道所以終日乾乾夕惕若者或反或復懷危懼也合道則無咎矣耿睎道曰若反為道復為非道則君子去復而取反可也若復為道反為非道則君子去反而取復可也無為終日乾乾而至于夕惕若也惟進而可與幾止而可以存義反復莫非道也是以君子去取之際慎思而審擇之或躍在淵進無咎也贊九四緣九三而言也三以或進或退審處為無咎四已離下體將離人而之天故以進為無咎飛龍在天大人造也贊九五也造徂早反作興也正義曰姚陸之屬以為造至之造案贊辭皆為韵其讀非也歆向作聚亦非大人乘時以有為故利見一曰猶云聖人作也亢龍有悔盈不可久也贊上九也盈謂亢也盈則傾覆故不可久用九天德不可為首也用九舉目以見義天德不可為首也贊用九也朱子曰言陽剛不可為物先也此贊以下普為一韵道咎造久首為一韵自坤而下贊皆叶韵語可以類推之地勢坤君子以厚德載物地勢坤程可久曰地隆于西北而傾東南其勢則二見重坤之象君子以厚德載物李去非曰天以氣運故曰行地以形載故曰勢李子思曰地之勢最厚坤者厚之至也天覆地地載天凡物居天之下者地無不載焉君子之德博厚配地故亦能自任以天下萬物之載初六履霜隂始凝也馴致其道至堅氷也初六履霜初六象隂始凝也霜隂氣凝結之始履霜下有堅氷二字衍文徐邈本無凝魚氷反結而聚也馴致其道至堅氷也明堅氷至之占霜之馴致乃至堅氷馴似俊反徐聲馴狎順也致詣送也六二之動直以方也不習無不利地道光也六二之動直以方也直方六二之象言其直方之德至靜而不可見動乃見之動猶坤至柔而動也剛之動言占此爻之動也不習無不利地道光也直方地之道也不習而無不利乃為光明乾六爻唯九五應天道之光明坤六爻唯六二應地道之光明含章可貞以時發也或從王事知光大也含章可貞六三象以時發也程正叔曰以時而發非含藏終不為也或從王事占知光大也若止含章未為知也唯王事之可從者或從之而不終含藏其知乃光大知今作智括囊無咎慎不害也括囊無咎六四象占慎不害也明括囊乃慎之至無咎乃不害事也黃常元吉文在中也黃常元吉六五象占文在中也朱子曰文在中而見於外李季辨曰文釋黃中釋常也鄭舜舉曰坤純隂唯三與五為陽位經於三曰含章贊於五曰文在中謂其中藴陽明之美龍戰于野其道窮也龍戰于野上六象其道窮也地道窮極則與天際矣用六永貞以大終也用六永貞占以大終也大謂乾陽六爻皆六其變為乾故始為坤終為乾也雲雷屯君子以經論雲雷屯君子以經論取象於結而未解經論治絲之事經引之論理之所以解其結也論今轉注作綸朱子發曰雲蓄雨而未降屯也屯者結而未解之時解絲棼者經之論之凡事有未决反復思念亦此象也程可久曰伯舅和原缺許公云雷經也雲論也毛伯玉曰聖人設卦觀象因象命卦其法有三以屯一卦推之剛柔始交其畫然也動乎險中其義然也雷雨之動二體所配也參而觀之所以為屯者瞭然矣它卦不必盡然觀其所重者可也總而言之是三者皆象也至于大象則專釋八卦之所像者故與卦義往往不相關其初本自異篇是各一道也此泛言屯結之象耳經論所以解其結也它倣此二郭曰在天成象在地成形坎在上則為雲在下則為雨象物之宜也在上為雲故雲雷屯在下為雨故雷雨作解雖般桓志行正也以貴下賤大得民也雖般桓初九象志行正也明利居貞之占以貴下賤大得民也明利建侯之占下去聲九陽也陽為貴為大為君隂為賤為小為民以一陽下三隂故曰以貴下賤衆不歸五之陷而歸初之動故曰大得民朱子曰為民所歸侯之象也六二之難乘剛也十年乃字反常也六二之難以難明屯如亶如乘馬班如之象乘剛也乘初九故有此象十年乃字通匪冦昏冓以下之占反常也至十年則事變而反屯難之常矣即鹿無虞以從禽也君子舍之往吝窮也即鹿無虞六三象以從禽也以有從禽之心不俟虞人之導故入於林中一說有何字亦通見輯傳君子舍之句往吝並占窮也三為下卦之終上無應故往則入於林中而途窮也求而往明也求而往六四求昏冓往之占明也言見之明故能不以班馬而不往援九五必求在下之正應以共濟也屯其膏施未光也屯其膏九五象施未光也其膏澤上屯故所施未光施去聲泣血漣如何可長也泣血漣如上六象何可長也程可久曰言當蚤變山下出泉蒙君子以果行育德山下出泉蒙君子以果行育德下户五反行去聲劉長民曰山壯于外泉養其內君子體蒙之象外果其行內育其德張敬夫曰坎不謂之水者有泉之始達之義竊謂人之德性如山之有泉亦惟於蒙之時養之即所謂聖功也故曰以以其蒙也果行間邪於外也利用刑人以正法也利用刑人初六占以正法也耿氏曰行法欲正其始故著於初李去非曰坎為法律故取正法之義子克家剛柔接也子克家九二占包蒙納婦在其中矣剛柔接也初蒙三婦五父皆以六接九二也勿用取女行不順也勿用取女六三占行不順也女子有行行嫁也隂上逆下順嫁上為不順困蒙之吝獨逺實也困蒙之吝六四象獨逺實也逺去聲隂虛陽實在二隂之中二與上相逺無陽明以發其蒙也言獨者卦唯此爻不近於陽童蒙之吉順以巽也童蒙之吉六五象占順以巽也王景孟曰不順則不能從善不巽則不能下賢程可久曰未有知識之時承上而應二能資諸人以取吉者也荀慈明曰順於上巽於二夫彖言童蒙求我志止在二而此兼及上九者爻之取義與卦異也利用禦冦上下順也利用禦冦上九占上下順也上謂五下謂初初上首尾有相應之義况卦當二陽在下今九自初升上六自上降初往來相應也雲上于天需君子以飲食宴樂雲上于天需坎雲乾天也天降時雨山川出雲雲上於天則雨澤將至故須之君子以飲食宴樂所以待時也需有飲食之道飲上聲食實職反需于郊不犯難行也利用恆無咎未失常也需于郊初九象不犯難行也去坎難逺可行前以須之不犯坎也難去聲利用恆無咎占未失常也久於須時未失常道林慎微曰恆言心常言道也需于沙衍在中也雖小有言以吉終也需于沙九二象衍在中也衍怡戰反寬裕之意蘭惠卿曰沙者寬平而居郊與泥之問朱子曰以寬居中不急迫也李仲永曰陽道常饒饒衍在中不為坎所陷雖小有言以吉終也釋占疑以小有言為吉故曰雖小有言則知小有言已非吉道也需于泥災在外也自我致寇敬慎不敗也需于泥九三象災在外也坎離為災難然在外卦不與乾同體自我致寇敬慎不敗也釋占云所以致坎之寇至者自我迫而致之苟敬慎以少須之則不敗於寇也二三兩爻之占孔子皆反經之辭以為釋其垂教尤切也需于血順以聽也需于血六四象順以聽也明占聽去聲酒食貞吉以中正也酒食貞吉九五象占以中正也釋貞之義不速之客來敬之終吉雖不當位未大失也不速之客來敬之終吉上六占雖不當位未大失也以六居上正當位而云不當位者不當九五中正之位也易以吉凶為得失之象大小為隂陽之象明不速之客終吉非謂上六也此爻直以吉失自為一韻天與水違行訟君子以作事謀始天與水違行訟天浮而上水流而下天西旋水東注其行違也猶人之所行相違則有訟君子以作事謀始李氏曰使事不至於背馳則訟端絶矣都聖與曰天為三才之始水為五行之始君子法之所以作事謀始不永所事訟不可長也雖小有言其辨明也不永所事初六象訟不可長也所事謂訟也雖小有言占其辨明也以辨明曲直而小有言故終吉不克訟歸逋竄也自下訟上患至掇也自下訟上患至掇也下上定體二下四上掇都活都劣二反自取也言禍患之至乃自取之食舊德從上吉也食舊德六三象從上吉也上去聲謂從上之事復即命渝安貞不失也復即命渝安貞九四占不失也不失謂得之矣吉之象也訟元吉以中正也訟元吉九五占以中正也以此聽訟故元吉以訟受服亦不足敬也以訟受服明上九錫鞶帶之象亦不足敬也帶非服也為屈服之服以訟受人之屈服者亦不足敬言帶之三禠地中有水師君子以容民畜衆畜聚也地能容而後聚衆水猶君子之容民而畜衆也都聖與曰周官禮俗以馭民田役以馭衆容民而後畜衆郭立之曰司空掌邦土居四民容民也司馬掌邦政統六師畜衆也比閭族黨州鄉所以容民伍兩卒旅師軍所以畜衆李氏曰容民則無流民畜衆則無畔衆武有七德言安民和衆亦此意也師出以律失律凶也師出以律初六象失律凶也失律明否臧之占在師中吉承天龍也王三錫命懷萬邦也在師中吉九二象承天龍也龍今寵天謂九五正應寵謂寵任蓋大君寵任之專故在師之中而吉也王三錫命占懷萬邦也言諸侯以王命出師有功而錫命所以萬邦之諸侯皆說而懷之馮氏曰賞一人而千萬人勸也師或輿尸大無功也師或輿尸六三象大無功也以大無功明占之凶左次無咎未失常也左次無咎六四象占未失常也行師有進有次未為失其常度也長子帥師以中行也弟子輿尸使不當也長子帥師六五象以中行也謂九二行道也弟子輿尸占使不當也不當使之亦主師事大君有命以正功也小人勿用必亂邦也大君有命上六象占以正功也有功則有賞命地上有水比先王以建萬國親諸侯地上有水千源萬𣲖皆相合比萬國之諸侯猶水在地上相比也先王推本封建之始親諸侯使之相親也親取比義都聖與曰萬國猶地諸侯之得國猶水之居地也使諸侯小承大大字小國人各比于諸侯諸侯各比于其上方伯連率各率之以上比于天子李子思曰于師得古聖人井田之法于比得古聖人封建之法比之初六有他吉也比之初六有他吉也以爻義明占比好先故比之自內不自失也比之自內六二象不自失也不失則吉矣自內比初以偕比五則非忘己而徇人者矣比之匪人不亦傷乎比之匪人六三象不亦傷乎石守道曰上不受下不納中又不居是可傷也外比于賢以從上也明六四之象賢謂九五陽明賢君也故曰以從上從上故正而吉也顯比之吉位正中也舍逆取順失前禽也邑人不誡上使中也顯比之吉九五象占位正中也故顯于比以五隂明占下四隂來前逆者也則舍之上一隂以背之而去順者也則取之故失上六之前禽舍今捨邑人不誡占上使中也以中道使民從禽故不誡而吉比之無首無所終也比之無首上六象無所終也無收結故凶風行天上小畜君子以懿文德風行天上小畜胡翼之曰風行於天之上功不及物李去非曰雲以成雨而風行天上則雲散而不能雨君子以懿文德正義曰懿美也以於其時施未得行喻君子之人但修美文德待時而發風為號令若風行天下則施附於物不得云施未行也今風在天上去物既逺無所施及故曰風行天上復自道其義吉也復自道初九象其義吉也唯其自道故吉牽復在中亦不自失也牽復在中牽復九二象在中在初與三之中亦不自失也吉凶失得之象不自失言無凶也天下之理不凶則吉亦承上文夫妻反目不能正室也夫妻反目九三占不能正室也言隂在上陽在下室家之道不正有孚惕出上合志也有孚惕出六四象占上合志也言上孚于九五而與合志也有孚攣如不獨富也有孚攣如九五象不獨富也釋富以其鄰言不獨本爻之富既雨既處德積載也君子征凶有所疑也既雨既處上九象德積載也積三陽之德以載上君子征凶占有所疑也三陽猶欲上進則凶矣蓋月幾望則隂疑于陽矣上天下澤履君子以辨上下定民志上天下澤履君子以辨上下定民志此以履為禮天髙地下禮制行矣然不取象于地而取象于澤者以天地不交為否之象今因澤卑于地而乃有取焉楊廷秀曰此上下之間粲然有禮之象也司馬君實曰禮者人之所履也民生有欲喜進務得而不可厭者也不以禮節之則貪侈而無窮是故先王作為禮以治之使尊卑有等長幼有倫然後上下各安其分而無覬覦之心先王制世御民之方也程正叔曰天下之分明而後民志定民志不定天下不可得而治也古之時公卿大夫而下位各稱其德終身居之得其分也農工商賈勤其事而所享有限後世自士庶至于公卿日志于尊榮農工商賈日志于富侈億兆之心交騖於外天下紛然如之何其可一也欲其不亂難矣素履之往獨行願也素履之往初九象獨行願也無應故曰獨中庸君子素其位而行不願乎其外是也幽人貞吉中不自亂也幽人貞吉九二占終不自亂也近六三則隂陽之情相求以居中故能不自亂有貞之象眇能視不足以有明也跛能履不足以與行也嘻人之凶位不當也武人為于大君志剛也眇能視六三象不足以有明也眇故跛能履象不足以與行也跛故嘻人之凶占位不當也所履者剛故嘻人武人為于大君占志剛也六雖隂屬武而三陽志剛訴訴終吉志行也訴訴終吉九四占志行也近君故志行夬履貞厲位正當也夬履貞厲九五象占位正當也當位故雖厲而無咎元吉在上大有慶也元吉在上上九之占大有慶也慶者君臣相得之辭慶聲羌爻正應三無應五之象此孔子新意孔子於四曰志行上曰有慶兩爻皆以應五為義蓋六三武人為于大君之象九五履而决之有危厲之證故欲四上以同體相濟共决六三以正大君之權故曰位正當也此贊明行剛行當慶叶為一韻厚齊易學卷三十七
