body:
  text: 厚齊易學卷十二宋馮椅撰易輯傳第八經上篇謙豫隨蠱艮下坤上謙程正叔曰有而不居謂之謙朱子曰止乎內而順乎外謙之意也山至髙而地至卑乃屈而止於其下謙之象也林黃中曰謙不自滿之貌書云滿招損謙受益贊云虧盈而益謙序卦云有大者不可以盈故受之以謙皆以盈滿對謙而稱李子思曰設卦命名多以畫之反對取義謙豫兩卦履小畜之對也履謙取畫在三豫小畜取畫在四特陰陽之畫不同爾皆五陰一陽五陽一陰之卦也一陰在下卦三陽之上其位不順故謂之小畜一陽在下卦三陰之上其位則順故謂之豫一隂在上卦三陽之下其位則宜故謂之履一陽在上卦三陰之下其位非宜故謂之謙以一陽五陰之卦其位象也一陽之在上下者為剝為復象陽氣之消長也在中者為師為比象衆之所歸也陰為衆至於三四在二體之際當六畫之中故以退處於下者為謙自下而奮出于上者為豫此觀畫立象之本指也從而玩焉以實象言之則山在地中以虛象言之則髙處卑下內止外順皆其義也艮三爻尤吉蓋自處者下也雜卦曰謙輕而豫怡也右明卦義象贊曰地中有山謙君子以裒多益寡稱物平施右明卦用序卦曰有大者不可以盈故受之以謙林黃中曰自大有之謙變其四陽其不動者六五九三爾六五為君九三為臣變其四陽而君臣歉然自居於單弱之中是以謂之謙也古之有大物者聰明聖智守之以愚富貴崇髙守之以卑夫是故滿而不溢髙而不危此謙之所以次大有也案同人大有五陽一隂謙豫五陰一陽亦反對之義也然同人大有一陰在二五之中謙豫一陽在三四隂陽升降之象也正猶師比畜履之序特五陰一陽與五陽一陰相反爾夫大有則滿盈故次之以謙而大有之終有變謙之象何也其占曰吉無不利而謙下三爻吉上三爻利乃其兆也右明卦序亨贊曰天道下濟而光明地道卑而上行天道虧盈而益謙地道變盈而流謙鬼神害盈而福謙人道惡盈而好謙案以天地之道卑下釋謙光明上行釋亨又自天道而下推廣謙亨之義程正叔曰他卦有待而亨惟謙則亨矣石守道曰六十四卦惟謙六爻無悔吝皆吉能謙則亨通也君子有終贊曰謙尊而光卑而不可踰君子之終也正義曰小人行謙不能久長唯君子有終李子思曰謙之為卦指九三一爻故其辭亦曰君子有終又曰此易中最吉之卦而天下最難行之事唯君子之人然後能久非君子則吾固知其不能終也林黃中曰詩云靡不有初鮮克有終以九三之盛德有九三之大功居九三之極位而不以謙行之終者鮮矣是以他卦九三類多凶咎唯謙則曰君子有終彖既發之於前爻又申之於後以明有終之義在於九三而不在上六也案九三一陽象君子止於下卦而不上進有終之象蓋艮止之性安於謙也若上六則小人而無終矣卦爻多言君子者以羣陰之盛在他卦則為小人也故曰君子别嫌乎小人右明卦象占初六謙謙君子用涉大川吉贊曰謙謙君子卑以自牧也林黃中曰謙之為言下也下卦之下謙而又謙者也案上一卦謙也下一卦亦謙也又處下焉故當謙謙之義右明象李季辨曰互體坎居其前大川之象林黃中同蘭惠卿曰用涉與利涉不同用者自我用之不若利之無往不濟也聖人教人苟遇險難當用謙以濟之王介父曰利涉則其材其時利於涉耳用涉則用此以涉然後吉也右明占馮當可曰以陰柔處一卦之下盡謙之義他爻之所不及案六隂柔小人之象謙退艮止其材柔弱其處卑下若小人特牀下之巽耳何所用之焉得吉聖人以為謙非小人之事也於是以告君子焉所貴乎君子者以其德之盛也德盛而禮恭此謙之所以為美也禮恭而又自下焉謙之至也所處之謙人道所好以此涉世何事不濟尚可安於艮止而為楊朱氏之學也哉右明爻義六二鳴謙貞吉贊曰鳴謙貞吉中心得也蘭惠卿曰情發於聲凡物有不得於其心必形之聲音之間李去非曰物不得其平則鳴凡鳴者皆有激於其中者案卦有二鳴謙此爻與上六也上六之於九三陰陽相應而六五為謙之主隔上六之路故上六鳴焉而欲三之應之也此爻之於六五陰陽不相應而九三近而其情相求故此爻鳴焉而欲五之應之也上之於三六五之陰柔終不能間而應之也易此爻之於五九三宗乎衆陰而應之也難然三雖近權臣也五雖逺大君也自非艮止之性居中守正鮮不歸於三而忘五矣此其所以吉也諸說支離皆不足据右明象占九三勞謙君子有終吉贊曰勞謙君子萬民服也此以羣陰歸之象程正叔曰以陽剛之德居下體履得其位衆陰所宗上為君之所任下為民之所服有功勞而持謙德者也古之人有當之者周公是已王氏逢曰位髙而有功行之以謙能終之者其唯君子乎袁氏曰初六之謙謙有德而謙者也有初必有終故不言有終九三之勞謙有功而謙者也克終者鮮矣非君子不能也故外爻皆以君子言之有者不能必無之辭李季辨曰互體坎勞卦也故曰勞謙居艮之上萬物終乎艮故曰有終張知常曰吐哺握髮之事其勞如此非君子能有始卒乎此說亦通右明象占說卦子曰勞而不伐有功而不德厚之至也語以其功下人者也德言盛禮言恭謙也者致恭以存其位者也案以一陽統五隂此非常卦之比夫一陽之下方進者為復得中者為師若夫謙與豫皆失中者也而謙之九三又重剛而不中居多凶之地若非卦以謙為體其不恃功伐而僨悍難制者鮮矣聖人知其艮止於下而無上進之心故目之曰勞謙又以爻義無終不上進之理進則為豫六五已有貞疾之象又進則為比又進則為剝皆非保祿位之善也懼其鮮克有終也故戒之以有終則吉所以存君臣之大義而保君子之功伐祿位者其㫖微矣右明爻義六四無不利撝謙撝諸說難通贊曰不違則也李氏曰居坤體之下順之至也履重陰之位柔之至也如是者無往而不謙亦無往而不利王輔嗣曰處三之上而用謙焉則自上下下之義也承五而用謙則上行之道也故無不利程正叔曰處近君之地據勞臣之上故凡所動作靡不利於施謙都聖與曰撝去三之承己而辭遜以為謙者也蓋德視己為懋材視己為高功視己為多而位猶在己下能辭遜以為謙而不敢當其承己之禮也案以柔居隂謙之至也下則九三有近而相得之情上則六五為謙德柔中之主無所不利無爭奪也以柔乘剛有功伐者謙在己下撝去而辭之不敢當其過謙乃得中也右明象占袁氏曰先曰無不利而後曰撝謙非因撝謙而後無不利也都聖與曰四無不利而謙五侵伐而無不利蓋材之稱否不同也張敬夫曰下三爻直言吉上三爻皆設戒艮體止而有守故吉謙極而復執坤順故不得不戒李子思曰艮之性以謙而靜止故吉坤之性以謙而順動故利靜者得吉常多而動者非謙則不能利也右明爻義六五不富以其鄰利用侵伐無不利贊曰利用侵伐征不服也林黃中曰承乘皆陰不富之象不富而能以其鄰者其志同也劉長民曰逺人離畔不為之用唯用其鄰蘭惠卿曰五謙卦之主執謙而尚有負固不服者則當侵伐之蓋指九三也自本爻言之則為勞謙君子自六五言之則為有功剛過之臣三陰同志故無不利馮當可曰三以孤陽處衆陰之中有强梗不服之象案不有其富而用其鄰所以侵伐無不利五隂之卦復剝以本末言也比大君也在二而得中者師也上進則為謙為豫皆不得中故豫之彖利行師而謙之五上皆有侵伐行師之象也九三一陽據乎二陰之外止而不進有諸侯自擅如春秋霸者之象與大有九三之亨於天子者異矣自君子言之則為有終自公侯言之則為異志易之取象不可以執一求也無不利云者侵利也伐亦利也柔服亦利也夫五以君討臣伐之可也焉用侵曰彼據艮山之阻而得民未易克也坤衆也陰弱也以其衆則利伐以陰弱則利侵要在必克而已矣右明象占趙氏曰謙豈用師之道哉唯坤之順而後可以言利也師之六五利執言豫之利行師皆以坤也古語有之師以順動為武蓋以此也右明爻義上六鳴謙利用行師征邑國贊曰鳴謙志未得也可用行師征邑國也劉氏曰物不得其平則鳴人之聲音亦多以憤而發上六以謙在上而三猶跋扈於下宜其志未得而至於鳴也案鳴己之謙所以聲三之罪三之罪何也昵于近而不上應也在他卦則應爻所歷陽為之隔而陰無隔陽之理唯五陰同應一陽則近者相得而逺雖正應亦不相應如豫之初六是也右明象耿睎道曰未嘗鳴而不應未可罪也既鳴矣乃止而不應則其罪可征三得民非衆無以勝之故利用行師蘭惠卿曰三在下而己之正應猶己之邑國也右明占案謙以下為貴而上則所處者高陰以近陽為貴而上則去三也逺此所以上鳴而三不應三不應而征之何也下四爻為謙者也上二爻治謙者也已以謙接下而所當應者不我應焉此而不治則卑巽而非謙矣謙非巽比也巽者陰伏於下而謙則中藴陽剛者也以謙接下而下不應必治之矣然則與六五之義何如曰五大君也以謙治天下者也故以其鄰侵伐而無不利此天子率諸侯以討二者也上人臣之位高者也以謙治其邑國此如魯成公之墮郈費者也右明爻義張敬夫曰下三爻直言吉艮體止而有守也上三爻皆設戒謙極而復執坤順不得不戒也李子思曰下三爻艮以謙而靜止故吉上三爻坤以謙而順動故利王輔嗣曰六爻雖有失位無應乘剛而皆無凶悔吝者以謙也案六爻之義無不善者以五隂皆謙者也獨九三以一陽居下位之上然退處坤道卑退之下而不驕亢艮象為止而主卑退成謙之義在此一爻也然細玩爻義則九三以陽剛居謙為有功勞盛大而不伐之象在他卦則衆陰之所歸在謙之世則位髙功大而衆之所不與者也故初雖卑下猶以三為大川之難二近之而志在于五四近之而撝卻其謙五上則以正治之者也然則以謙居下而功大位高猶為上下之所忌如此况驕亢者乎為人臣者可以知所戒矣右明六爻坤下震上豫利建侯行師初六鳴豫凶案一陽已獨為正應二三隔之已無由進故先鳴以求應然陽唱陰應乃為常理陰先鳴是以凶也六二介于石不終日貞吉案豫九四象權臣權之所在衆之所趨初其應也則鳴求豫三其承也則盱求豫舉世皆趨四以為說焉知有五君也哉二者五之應人臣在下者也三陰同體則宜同趣况二介其間所宜相挻以進于四而二居中履正知有君臣之分不狥權勢者也知四之不可奪而五之不得應遂與初三如石之不相入翩然而下不俟終日此孔子不脫冕而行者歟內卦為貞故離之三言日昃乾之三言終日二之日故有不終日之象六三盱豫悔遲有悔案三四本近而相得然震動而上坤靜而下上下異趣故有此象聖人警而誨之曰盱豫固有悔矣去之不勇遲戀不去則猶有後悔者九四由豫大有得勿疑朋盍簪六五貞疾恆不死案六五隂柔當豫之時上下耽於逸樂以天下之事天下之才盡付九四大臣而漫不省此貞疾之證也然四雖剛强猶在下也五雖陰柔猶在上也君臣之名位未亡此恆不死之證也春秋時不惟周存名號而已齊以諸田疾魯以三家疾政在大夫孔子周流列國欲起其疾而無能用者上六冥豫成有渝無咎案人情之逸樂始雖為之猶未敢肆至於昏冥忘返則安於豫矣是其習成也又以一陽在柔主之側衆皆趨之惟二中正不隨流俗逺四而知避五雖中而不正近四而相逼二可去而五不可去此吉凶之所以異也然則奈何為九四者固當自任不疑合天下之才以致和豫之治為衆陰者固當以說豫自戒不徇乎四以致君臣之義為六五者又當震厲自强委任大臣勿使其專以怠豫為戒則聖人設卦生爻之義明矣震下兌上隨元亨利貞無咎初九官有渝貞吉出門交有功六二系小子失丈夫案六二中正謂之小子何也易之取象自本爻言之不計二之德也六三系丈夫失小子隨有求得利居貞九四隨有獲貞凶有孚在道以明何咎案九五剛明中正為隨之主一世之人所宜隨之也然六位之次以一隨二以後隨前不至於四不能逹五也故震之三爻俱動而進惟四之隨使四認以為己所獲私擅於下以是為貞無乃權太過而取凶乎惟其與五同德相孚在於率之以隨五以盡事君之道使上下昭然皆知其道在此而無他疑焉則何咎之有九五孚于嘉吉案嘉之為言中心相好之謂妃曰嘉耦婚曰嘉禮禮曰嘉㑹然則九四有孚于九五者蓋其所嘉者也其所嘉者何也居大臣之位能率一世之人以隨乎君是可嘉也然則四孚于五則曰道五孚于四則曰嘉惟其時物而已若謂嘉為六二正應之配則卦有隨義不取應矣上六拘系之乃從維之王用亨于西山案西者上六之象成兌之主也山者兌有伏艮象又居一卦之上最髙之象也巽下艮上蠱贊曰剛上而柔下巽而止蠱案此以九六升降合二體言之推原致蠱之由非以是即蠱也趙孟問秦醫曰何謂蠱對曰淫溺惑亂之所生也於文皿蟲為蠱榖之飛亦為蠱在易女惑男風落山謂之蠱李氏曰器陳則蠱榖腐則蠱事惰則蠱蠱為敗意蘇子瞻曰器久而不用則蠱生之謂之蠱人久宴溺而疾生之謂之蠱天下久安無為而弊生之謂之蠱案醫家病水與氣血者皆謂之蠱而制字之義皿以承物物壞則蟲生為蠱蠱之名義秦醫二氏得之訓釋家見秦醫謂惑亂之所生便以惑亂為解非也雜卦曰蠱則飭也郭立之曰柔在內事之所以起剛在上蠱之所以飭也謂事蠱則當修飭非以飭蠱也右明卦義象贊曰山下有風蠱君子以振民育德案此取風落山之義為象右明卦用序卦曰以喜隨人者必有事故受之以蠱蠱者事也正義曰物蠱必有事非謂訓蠱為事也林黃中曰傳不云乎無故者必有其故也聖人深究天下萬物之情狀知其無故而以喜隨人必將有事焉是故受之以蠱案隨之有蠱直反對耳序難通故兼豫以為義右明卦序元亨贊曰蠱元亨而天下治也李子思曰元亨者一陽之動有所感應而為亨通也陽動而有為不以巽陰之惑而輒止則雖大難皆可以涉也朱子發曰治蠱之道在乎上下之志交而元亨則天下治矣程正叔曰自古治必因亂亂則開治理自然也如卦之材以治蠱則能致元亨也袁氏曰巽而止所以為蠱巽而止之所以亨蠱案孔子因成卦之義遂言蠱元亨而天下治則元亨者亦以剛上柔下巽而止合卦變二體之材也今二說各據其一合而觀之則得孔子之指矣卦之所以有元亨之材者以乾之一陽自初復於上而坤之一陰自上復於初一升一降相為往來有元亨之象也又自成卦觀之初二五上四爻皆失位而當位者特中之二爻耳凡物之蠱敗者先自外始而其中未敗此蠱之所為可飭而有元亨之義也又以治蠱之敗言之則巽而止之所以為元亨之道也右明卦象利涉大川贊曰往有事也蘭惠卿曰事蠱而不修則益以頽敝不可視漏忽傾如涉川之期於必濟無所畏縮林黃中曰方蠱之時非垂拱無為而治者也書曰若涉淵水豫惟往求朕攸濟若畏其難而憚其勞則燕安苟且終於委靡而已矣李子思曰巽為木乘木而往濟則利涉大川之象也若涉淵水古有此語文王述之以為象然不曰涉川而必曰大川者若泛泛涉水不足計也必有大患難大險阻大功力然後著象以告人然逐卦取象不一端此卦巽木在下舟之象也艮之四五中虛乘木舟虛之象也自初至四坎水之象也舟實則溺虛則濟故為利涉先甲三日後甲三日贊曰終則有始天行也林黃中曰自大撓造甲子起於五行自甲至癸為天一地十之數自子至亥如乾坤十二位之象程可久曰蠱非訓事而事之敝則蠱故君子必飭之日有十辰有十二相錯而為六十天行也其六十之間為甲之日六先三日後三日者飭蠱貴復始故取甲也蘇子瞻曰先甲三日子戌申也後甲三日午辰寅也無九五以幹之故其治亂皆極其自然之勢勢窮而後變故曰終則有始天行也若夫巽之先庚午辰寅也後庚子戌申也庚之所後甲之所先也故曰無初有終又特曰吉不言於彖而言於五明此九五之功也馬氏曰甲十日之首蠱造事之端舉初而明始也陳氏曰甲為令首庚者申繼之謂蠱者造事之始巽者號令之常程正叔曰甲舉其首庚猶更也郭子和曰觀易之爻兼三才而兩之故六是以陽不過六陰不過六復稱七日自姤經六爻至初九而七也臨稱八月自復歷六爻至遁六二而八也李仲永曰蠱者事也言不可一日不事事也案甲庚之說諸儒不勝其異或取仁義或取納甲或取丁辛文王有象而無義孔子但言終則有始天行也諸儒求其說而不得故應失之鑿爾記曰外事用剛日內事用柔日故釋菜用丁祭郊用辛祓除用已若乃更新申命播告天下與天下更始則須用剛日此蠱巽所以有取於甲庚也甲取造端之始庚取申命之後義各有主甲者乾之一陽自初申上凡歷六爻故在下卦歷三位為先三日之象又至上卦歷三位為後三日之象蠱飭而治上窮而反則剛復來初為泰蠱終則泰始泰終則蠱始一治一亂一終一始此天道也孔子所謂終則有始不過如此若夫巽則有取於申命造命在前非巽之事故九五之君稱無初有終耳右明卦占左氏傳秦伯伐晉卜徒父筮之吉涉河侯車敗詰之對曰乃大吉也三敗必獲晉君其卦遇蠱曰千乘三去三去之餘獲其雄狐必其君也蠱之貞風也其悔山也嵗云秋矣我落其實而取其材所以克也見僖公十五年謂蠱敗而後元亨利涉大川其三去應三日之義易之知來如此或曰此連山歸藏之占也右明占法初六幹父之蠱有子考無咎厲終吉贊曰幹父之蠱意承考也馮當可曰乾為父坤為母乾剛升而上乾不成乾則父之蠱也坤柔降而下坤不成坤則母之蠱也程正叔曰初六成卦由之有主之義居內在下而主其事子幹父蠱也張敬夫曰艮止於上巽順於下無為而尊於上者父之道也服勞而奉於下者子之道也故蠱之卦多言子幹父事右明象胡翼之曰得巽之體能用權以幹父事代父之任而成家者子之職也一不能然是無子矣陸希聲曰能幹父事則人謂之君子之子王輔嗣曰能堪其事考乃無咎也正義曰父沒稱考在亦稱考康誥云奔走事厥考又云大傷厥考心此避幹父之文故變云考也都聖與曰考言其成德也事業之實必承其命故幹蠱則稱父毁譽之名必要其成故言無咎則稱考也張子厚曰處下而不系應於上如子之專制雖意在承考然亦危厲以其柔巽故終吉右明占程正叔曰處卑而尸尊事自當兢畏以六之才非有能濟之義聖人以當蠱之始專言為子幹蠱之道必克濟則不纍其父能厲則可以終吉乃備見為子幹蠱之大法也朱子發曰乾初九之上父往矣子來居父之位其事不正咎也乃危厲之道則變而之正於考為無咎於己為終吉貞事之幹幹父之蠱則變而正矣陰居下正也吕與叔曰父母之蠱人子所難治幹者以身任其事不敢避也以人子之所難故初則厲二則不可貞三則小有悔然卒以任事為功故初終吉三無咎五用譽也朱子曰初蠱未深而事易濟故其占為有子則能治蠱而考得無咎然亦危而能戒則終吉也袁氏曰夫蠱言子而不言臣言父而不言君者君臣之義取諸父子而移之者也張敬夫曰能盡子道則家齊矣由是而之焉則國可治天下可平故孔子曰蠱元亨而天下治也案六自坤來居乾之初幹乾之事有子如此父雖沒而無過矣夫居下位而無應輒專其事又不當位非所安也然一家之蠱終歸修飭豈非得乎使為人子者以其不安而不敢任事蠱誰與飭也其曰幹父而曰考無咎考雖父在之通稱然以爻義觀之上九為父諸爻自四而上皆近之此其長子逮事父者也初最逺而在下此其幼子而父老或不逮事者也人固有老而得子者象或以之右明爻義九二幹母之蠱不可貞贊曰幹母之蠱得中道也楊廷秀曰初承考二幹母其父亡而母存乎李子思曰遇者艮而為蠱者巽蠱之患非獨生乎陽而陰實為之故母亦稱蠱程正叔曰二應六五以陽剛之材在下而幹夫在上陰柔之事也故取之幹母蠱為義石守道曰六五陰居尊位委任九二有母之象蘭惠卿曰晉六二之王母亦謂六五也正義曰居內處中幹母事也朱子發曰六五位不當事之蠱也案上九陽剛在上在蠱之時而位不當父之蠱也世固有父沒而母任家事者以衆子在而母總其事也故因六五以陰柔為一卦之主而取象於母之蠱焉諸爻不取此義而獨于九二言之者以其正應在上又處乎內有陽剛之材能幹者也又家事之敗或由婦人亂政而其材子能飭之亦為幹母之蠱右明象劉氏曰婦人之情矯拂或過則易以傷故欲得中而不可貞固馮當可曰治父蠱易治母蠱難婦人處事疑阻不明易致忿怨二居巽之中不剛不柔六爻中治蠱惟九二最善故能幹母之蠱而不堅執也朱子曰言當巽以入之林黃中曰母柔而子剛于義為得矣然而不可以為正也有母在上而以剛行之有時而違咈矣案剛上柔下者貞之義也今二五柔上而剛下故曰不可貞幹父正也幹母變也幹母而又貞焉其不潰裂者鮮矣故聖人戒之右明占張舜元曰二以剛居陰在下卦之中事親以孝不失于柔制義幹蠱不失于剛剛柔相濟不出乎中人子之道盡矣閭丘逢辰曰二負剛明之材于蠱之時欲治逺自近治外自內豈屑屑然以閨門為己任哉幹母之蠱亦時焉而已都聖與曰不言凶悔者得剛柔之中也程正叔曰齊王好色好貨孟子引之當道而已不逆其欲也諸說雖不甚同皆可以旁通曲暢右明爻義九三幹父之蠱小有悔無大咎贊曰幹父之蠱終無咎也朱子發曰上九位不當父之蠱也九三重剛而不中幹父之蠱而剛過者也蘭惠卿曰剛之太過不免小有悔然時方蠱壞非剛過之材不能以濟故無大咎程正叔曰以陽剛之材居下卦之上主幹者也雖剛過然在巽體順者事親之本也又居得正故無大過都聖與曰悔自己言咎自彼言也案本爻巽體隂也故為小上九艮體陽也故為大自本爻言之幹上九之蠱而不應上九以過中之剛行之宜不能無悔然體巽以行權而不至于咈戾則其悔者小也自上九言之本爻能幹其蠱剛過而不應乎己宜不能無咎然所處當而不失其正則已亦不得而咎之也故曰無大咎小大以巽艮言也右明象占石守道曰九二九三全剛幹事近乎專權爻辭常抑之李子思曰處重剛之位而不應疑其改父之命或至於傷恩故小有悔然承蠱弊之後有剛幹之材體巽之權以濟事而委曲以行之無大過失作易者論幹父母之蠱而寄之於巽三爻有深意也右明爻義六四裕父之蠱往見吝贊曰裕父之蠱往未得也劉氏曰上為外之主四與五承之故皆以父言劉長民曰不能强幹以得其位猶可寬裕其事緩而圖之斯宜止矣往求幹事得無吝乎卜子夏曰以柔居陰不敏于事者也朱子曰陰柔不能有為寬裕以治蠱之象也如是則蠱將日深故往則見吝郭子和曰材力太柔未可往也案當父之蠱而寬緩處之材力不足故也若不自度而冒焉以往見吝必矣蓋不能濟蠱是吝也裕者陰柔之象不宜往者艮止之象吝者上九非其應之象也故不曰往吝而曰往見吝往吝則吝在我見吝則吝在彼也程可久曰裕益也裕父之蠱與逢君之惡之義同非惟不能幹又從而裕之林黃中曰傳曰以水濟水以火濟火命之曰益多案裕之義惟二氏說同疑乃正說也孔子之傳益曰長裕又曰德之裕則古蓋以裕為益矣不應蠱六爻皆能幹而無敗事者也大抵卦體陰柔隂難之類以六居四多為材不能濟坤蒙師卦可見矣右明象占胡翼之曰初六居敗壞之始能用權變以治其事今居已壞之後而無剛明之才故往見吝袁氏曰諸爻之幹蠱者或體剛或承剛或應剛獨本爻以柔而止蓋巽而止所以致蠱非所以幹蠱者也馮當可曰下三爻巽體故可以幹蠱以六居四比九三為和柔反不能幹徒能裕蠱蓋艮止而不巽非下三爻比也宜其往必見吝毛伯玉曰九三之鋭失之過故悔本爻之緩失之不及故吝必不得已寧為三之悔不可為四之吝此治亂興亡之幾也右明爻義六五幹父之蠱用譽贊曰幹父用譽承以德也張子厚曰雖天子必有繼也故亦云幹父之蠱都聖與曰六五之與上九柔下剛上其象則子于父也蘭惠卿曰以柔中之材為幹蠱之君是繼之主也柔則疑其不能幹事然而能用九二陽剛令譽之臣所以能幹父之蠱也游定夫曰二處多譽之地材有餘而道不失中固衆譽之所歸六五因衆譽而用之馮當可曰艮巽風山相觸而聲生焉用譽取有聲之象右明象占李子思曰蠱之為卦女惑男巽而止其疾疑若不可為也而卦之諸爻皆以幹蠱言之遇蠱而能幹隂陽相濟所謂蠱元亨而天下治也遇之難付之無可奈何易中無是理也六五體艮之德以柔居中而應巽之九二其所以幹者寄之于九二剛中之臣也案宣王承厲王之烈能用仲山甫令譽之臣當此爻也又或曰五君也有上九之父在則父老而子攝之時也林黃中曰應乎九二故曰幹父之蠱六五賢母也九二賢子也婦人無家以夫為家母雖在上而所幹者父之事也不曰夫而曰父者從子而言也案五不自幹而用二有譽之子以幹上之蠱則六五當位上之妻也其不言妻惡婦人之與家事故末言之此義亦通右明爻義上九不事王侯髙尚其事贊曰不事王侯志可則也林黃中曰王者五也侯者三也在五之上而不應乎三不事王侯之象也朱子發曰執剛不屈陸希聲曰以尊剛之德為四五所承不事王侯李子思曰髙處艮山之上也朱子曰陽剛居上在事之外故為此象而占與戒在其中矣案卦之六畫以衡觀之則在卦之外為不事王侯以豎觀之則在艮山之上髙而可尚矣不言事則蠱在其中也蠱之終則蠱之已治與蠱之已成皆無所事故不事而其事為髙尚也右明象占都聖與曰其畫為九則陽剛之象其體為艮則能止之象在卦之終則無所事事之象李去非曰師之上六不言師無所用師也蠱之上九不言蠱無所幹蠱也李仲永曰處艮之極知止者也出于有事之外而不事其事其舉髙矣楊廷秀曰臣事君子事父一也上九臣也而不事王侯然則為子而不事父與曰有初六九二九三以幹之有六四以裕之又有六五之君兼羣賢之幹蠱者而用之則上九不必為矣程正叔曰士之自髙尚亦非一道有懷抱道德不耦于時而髙潔自守者有知止足之道退而自保者有量能度分安于不求知者有清介自守不屑天下之事獨潔其身者所處雖有得失小大之殊皆自髙尚其事者也案若上九者其殆庶幾于懷抱道德而髙潔自守者與有君子之德有飭蠱之材而無其位方一世之蠱或幹或裕投其身于悔吝之域者多矣獨上九居事物之外其德至剛其道知止謂所以飭蠱者天下之士各以其材而效其事于一世而無所用我焉故不事王侯而以髙尚為事此微子箕子比干之徒致其身于殷之末造而太公伯夷獨居東北海之濵者也右明爻義王介父曰無為而用臣子者君父也有為而為君父用者臣子也蠱者臣子之任也故其爻雖得尊位亦幹父而已有父子然後有君臣君臣之義取諸父子而移之者也故自初至五皆以父母與子為言能幹父母之蠱則國蠧可知矣至上九則其義有進退去就而不可施於父子故特以君臣為言也在一卦之外家道不可有外也趙氏曰四爻皆以幹父之蠱為義而九二獨曰幹母之蠱以在內卦之中也上九獨曰不事王侯以在外卦之外也其在內則所幹為有限其在外則不事不失為髙案為子者遇家道之蠱不容不事事也上九陽剛在上父也六五陰柔居尊位上九之配母也四三其長次子也二父沒母在之子也初則母亦沒矣從兄以幹父之蠱者凡在下位者皆後生者也後生則父母老而逮事之日淺故曰考曰不可貞也生乎前則逮事父矣故曰幹也曰裕也六五母道也而用材譽之子以幹其父不稱母不以婦人與家事也上九父道也而取不事王侯之象不稱父避斤尊有害于過則稱已之義也右明六爻
