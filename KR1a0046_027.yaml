body:
  text: 厚齊易學卷二十七宋馮椅撰易輯傳第二十三經下篇漸歸妹艮下巽上漸贊曰漸進也又曰止而㢲動不窮也正義曰徐而不速之謂漸程正叔曰進以序為漸不越次也朱子曰止於下而㢲於上為不遽進之義范氏曰內止而不躁外㢲而不爭以斯而進不亦漸乎蘭惠卿曰否之六三往之於外漸進一位進不躐等又曰漸進蓋亦以漸而進也案物莫不有漸人之進退亦莫不有漸案三隂在下之卦觀其爻之進退漸之成卦專在六自三之四一爻為義經言女歸謂此也贊言漸進謂此也進得位謂此也止而㢲又自孔子說經之例然六三一進上卦即成女下卦即成男下卦即成止上卦即成㢲自有如此之義而立卦本指則蘭說是也毛伯玉曰易未有兩卦明一義者晉進也漸亦進何也愚曰漸非進也言以漸而進爾晉之進如艮之止漸進如大壯則止也義各有在不可以一律求也右明卦義𧰼贊曰山上有木漸君子以居賢德善俗右明卦用序卦曰艮者止也物不可以終止故受之以漸漸者進也林黃中曰自艮之漸變六五一爻而成也艮之所以為艮者上下敵應不相與也變五一爻則二五相應雖欲止焉不可得也程正叔曰止必有進屈伸消息之理也右明卦序女歸吉贊曰漸漸進也女歸吉也進得位往有功也雜卦曰女歸待男行也蘭惠卿曰以漸而進者唯女歸為得其義媒妁問之卜筮決之父母命之納采問名納吉納徴請期親迎莫不有漸如是則吉趙氏曰天下之事進必有漸然亦有不以漸者唯女之歸非漸則不可言必如女歸之有漸則吉也女子從人必待六禮之備各有其序不可遽合也馮當可曰六四之隂進而居九三之上男下女之義也張子厚曰女歸吉進得位指六四也朱子發曰此以否六三之四言漸也自內而之外也坤三之四成㢲女往也乾四之三成艮男下女也艮陽居三㢲隂居四男女各得其正矣易傳曰中二爻交也橫渠亦曰九三六四易位而居蓋後之傳易者自伊川橫渠二先生漸以卦變言之矣案六自內而往外有女歸之象自三之四其進為漸而九四來居於三為男下女又隂陽各得其位是以吉也少男長女本非匹也為有女歸之象因九來居三取義不論老少也程正叔曰乾坤之變為㢲艮㢲艮重而為漸自卦體而言中二爻交也二爻之交然後男女各得正位初上二爻雖不當位亦陽上隂下得尊卑之正男女各得其位與歸妹正相對女之歸能如是之正則吉也林黃中曰君子之窮通如四時之序時止則止時行則行既出乎艮可以行矣而猶曰漸云者君子之仕女子之嫁也二五之外爻位皆不相應五近乎四二近乎三又有害之者焉是故可以漸進而未可以遽行也易道廣大亦可如此推測朱子發曰臣之進於君人之進於事學者之進於道君子之進於德未有躐等而能進者而漸乃專以女歸為義蓋禮義亷恥之重天下國家之本無若女之歸也王景孟曰易中多以男女夫婦發其義者蓋本隂陽而作也見於造化則為天地施之人事則君臣也而其較然易知則男女夫婦焉天必得地而後成造化之功君必得臣而後致升平之治男必得女而後有生育之理其相須之勢固如此也右明卦占利貞贊曰進以正可以正邦也其位剛得中也蘭惠卿曰否之六三往之於外由此一爻漸進之故是以二三四五其位皆正故曰進以正可以正邦程正叔曰初終二爻雖不得位亦陽上隂下得男女之正竊謂因三四之交則一卦隂陽皆正而二五君臣中正不紊故可正邦其位謂陽剛之位初三五是也初始五終三中也九來居三為剛得中位易之取義無所不可不拘二五言中也朱子發曰此謂九三或謂九五誤也審如九五則當如無妄萃曰剛中而應同人曰中正而應也毛伯玉曰進以正者其選之以德成之以禮風化之基也故曰正邦陸希聲曰三五二四各得正位故曰利貞朱子曰自二至五皆得其正故其占為女歸吉而又戒以利貞也程正叔曰諸卦多有利貞而所施或不同涉不正之疑而為之戒者損之九二是也有其事必貞乃得宜者大畜是也有言所以利者以其有貞漸是也言女之歸所以吉利於此貞也蓋其固有非設戒也郭子和曰凡進以漸者必不失正進不以漸而失正者多矣右明卦象李子思曰序易者以八純卦自乾坤之後雜之於諸卦之中夫重震重艮未見其作用也故以漸歸妹豐旅四卦繼之漸者艮與巽交也歸妹者震與兊交也豐者震與離交也旅者艮與離交也蓋以示隂陽之相配而或得或失所以見震艮之作用也嘗觀艮與三女之卦相交遇兊之少女其卦為咸則以利貞為取女之吉遇離之中女其卦為賁則以物不可以苟合為亨遇㢲之長女其卦為漸則以女歸之吉為利貞大率男女之相合要不可不正其始其始不正其終必乖諸女之卦皆以徐行待禮與艮止之性相合而後為吉為利可以長久而無患也張敬夫曰艮上巽下為蠱左傳曰風落山女惑男國語曰宵靜女德以伏蠱蓋女下於男所以為蠱蠱變則為漸又曰兊上震下為隨彖辭曰元亨孔子曰剛來而下柔以男倡女隨為義隨變則為歸妹彖辭曰征凶無攸利孔子曰柔乘剛也以女先動而乘男為義大凡陽上隂下則理順而吉隂上陽下則理逆而凶蠱與歸妹皆二隂居上二陽居下故有邪慝之象漸與隨皆二陽居上二隂居下故有得正之象又曰以卦體論之則蠱與漸相反以爻畫論之則漸與歸妹正相反蓋漸之三隂處皆得正位又在內歸妹之三隂皆失其位又在外此漸所以為進得正而歸妹所以為不正而動也右明彖義初六鴻漸于干小子厲有言無咎贊曰小子之厲義無咎也劉氏仲平曰鳥飛多亢唯鴻進有序而不亂林黃中曰其飛不决起直上必有漸而致髙吕與叔曰干磐陸木陵皆所集而止之地亦有漸也張舜元曰此卦全體有鴻之象林黃中曰初承於六二互體坎為水故初有水湄之象詩所謂鴻飛遵渚也右明象李季辨曰六爻列鴻羣鴈也乾六爻龍亦曰羣龍六龍鴻之飛長在首而幼在後此其序也毛伯玉曰初六鴻之稚者也故曰小子劉仲平曰大曰鴻小曰鴈詩稱鴻鴈或大或小非一故也鴻羣飛而小者最後恐失羣伴故危之而號呼號呼則羣必緩飛以俟之所以無咎承互體之坎有言之象也訟之有言亦以坎也右明占郭子和曰一卦一爻之象天地萬物無不具焉聖人或取諸身或取諸物舉其一以明之理不能盡也漸之象卦言女歸爻言鴻漸互相發明無嫌於不同也世率拘於說卦已言之象其所不言者不能明也八卦無鴻而漸稱鴻故知易之象天地萬物之理無不具聖人亦不能盡言姑舉八卦之略使後之人知所謂象者如此觸類而長之也右明爻義六二鴻漸于磐飲食衎衎吉贊曰飲食衎衎不素飽也程正叔曰自干之磐又漸進也正義曰漸之為義漸之于髙故取于磐陸木陵逵以為喻耿睎道曰于磐則進得位之象也林黃中曰艮為石故有磐之象右明象朱子曰柔順中正進以其漸而上有九五之應故其象如此而占則吉也林黃中曰互體坎為飲食李季辨曰鴻食則呼衆故飲食衎衎和鳴也進至磐止而食也所謂君看隨陽鴈各有稻梁謀程可久曰酒食者人君所以養賢飲食者受其饗者也德稱其祿故衎衎而吉右明占九三鴻漸于陸夫征不復婦孕不育凶利御冦贊曰夫征不復離羣醜也婦孕不育失其道也利用御冦順相保也李子思曰詩云鴻飛遵渚即所謂干也又云鴻飛遵陸亦所以言其飛之漸也右明象王輔嗣曰非夫而孕故不育也王景孟曰三與四俱無其應故以夫婦目之婦人未有孕而不育者得孕於非交所以不育也石守道曰兩無其應近而相得猶可以同禦冦難蘭惠卿曰九三六四隂陽當位近而相得恐其各為六二九五之所冦奪故曰利用禦冦李氏曰卦以女歸明漸之正又於二體之交别夫婦之嫌亦以明君子之進惡不由其道也三與四順以相與患難相救無相失也程可久曰征則喪其所承居則物莫能犯李季辨曰鴈隨陽鳥也卦有三陽五與上在前而此爻處二隂之間失羣鴈也然鴈羣不亂止則相保故利用禦冦鄭少梅曰三與四氣交於人位故孕若五與二一居于天一居于地應逺而雌雄有别故不孕耳右明占毛伯玉曰夫征而不反則婦孕而不育矣其報然也晉文公欲伐衛公子鉏仰而笑公問其故曰臣適見鄰之人送其妻歸寧者道見桑婦說而與之言顧視其妻亦有招之者矣公悟引師而還未至有伐其北鄙者故戒之曰征而不復則凶歸而禦冦則利夫征而婦孕其冦不在外也曷亦自謹其防庶幾夫婦可以相保也與困之不見其妻其理亦然爻體艮其性本止而卦體漸其性好進三四九六往來互居所以有女歸吉之象六居四則成㢲婦九來三則成艮夫故聖人戒之曰天征而不復則婦孕而不育矣謂九三不可往四往四則六歸於三成否也禦冦則情合故利否則情隔故不育而凶唯九三六四相保以禦冦則利征以漸言禦冦以艮言也陸在木之下磐之上自三而往則漸於霄矣漸之女歸正以六四九三各得其位兩無其應而自為夫婦故吉今九離內卦之羣而往征於外則六歸於三而有應在上非九四之正耦也雖孕而不敢育矣豈不凶乎在卦則欲其進於上在爻則欲其止于下此文王所以演易而生爻也右明爻義六四鴻漸于木或得其桷無咎贊曰或得其桷順以㢲也李氏曰鴻雖水居而千般陸陵乃其所止也木非鴻之所宜也石守道曰巽為木故有棲木之象程可久曰鴻足蹼指間有膜不登于木然取象忘筌可也張子厚曰木非鴻之所居如四之易位而在上也本坤之爻進而為㢲右明象李季辨曰四進至㢲鴻不能瓜木桷木之衡陳者故亦可止巽體順故為得桷蘭惠卿曰以否之六三往居于四而言也隂當居下今進而上非其所當往故謂之鴻漸于木然得位居順體㢲何咎之有馮當可曰以六居四而乘九三在㢲之木故粗安耳朱子曰乘剛而順㢲故其象如此占者如之則無咎也案巽為木在艮山之上九三之竒畫衡于下桷之象也得位而體順故九三無相傾之意是以九咎右明占九五鴻漸于陵婦三嵗不孕終莫之勝吉贊曰終莫之勝吉得所願也程正叔曰鴻之所止最髙處也程可久曰得位居中雖尊髙不亢陵之象也李子思曰為髙必因丘陵言其最髙也右明象耿睎道曰婦六二也以漸進為三之所難是以三嵗不孕也然剛上柔下中正以相與是以物終莫之勝也程可久曰二五當位非三所能抗終莫之勝是以吉也蘭惠卿曰三者數之小極然理直道勝讒間終莫能勝之久而必合此其吉也李元達曰三嵗不孕則過三嵗有孕之道矣李季辨曰五漸至陵二已應也在後故不孕然女歸以漸故終莫之勝毛伯玉曰自二言之飲食衎衎自五言之三嵗不孕各以其爻發之也然則婦之所以不孕者以漸于陵之故也鴻陽鳥而水居得水則交接今也漸于陵固宜其不孕也三四之孕互體有坎水五君也夫也亢于上則臣不可得而遽進婦不可得而遽親也五以陽自亢二以柔自卑能有合乎雖然婦人以一為貞夫雖不愛而婦不可畔久將合矣五行以勝己者為夫勝以不義則為冦終莫之勝謂三之冦也是故于三之漸于陸也則以婦之必畔警其夫于五之漸于陵也則以終莫之勝勉其婦三以報施言五以分義言三輕而五重故也此君臣上下離合之機禍福之决也是以聖人交戒之郭子和曰女歸之卦故三五皆以夫婦為義右明占案三歲自二至五所厯三爻之象也不曰日月以進之漸且難于九三曰嵗言其久也然屯之二五不字至於十年則三嵗猶未為甚久也屯與漸之時異也況屯言二自臣下言之漸言五自君上言之宜其久近不同也終莫勝言三不能奪之于二也隂陽配合固不可得問于六五九二之合多易辭六二九五之合多難辭何也六五九二夫下接婦婦上承夫故易合也九五六二夫亢于上婦卑于下故難合也蓋九陽而上進六隂而下伏其義如此也右明爻義上九鴻漸于逵其羽可用為儀吉贊曰其羽可用為儀吉不可亂也程正叔曰九達之謂逵見爾雅通達無阻蔽之義上在至髙之位又益上進是出乎位之外在他時則為過于漸之時居㢲之極必有其序如鴻之離所止而飛于雲空在人則超逸乎常事之外者也林黃中曰鴻以漸至髙所謂鴻飛冥冥者也王景孟曰進于上而不失其㢲此賢達之髙致也右明象王介父曰其進也以漸而不失時其翔也以羣而不失序所謂進退可法者也六爻皆鴻也至于上而後曰其羽可用為儀要其終而不可亂也毛伯玉曰羽者所以飛也其不可亂者在于飛故特以羽言之此六爻所以取于鴻也歟林黃中曰若直以為羽不取飛翔之義則史稱鴻毛之遇順風亦毛而已矣豈不陋哉朱子曰雖極髙而不為無用之象故其占為如是則吉也李季辨曰可用為儀如摰見執鴈婚禮奠鴈之類謂其德可以配禮也此說亦通案自二至逵其進有漸無陵躐失次之患至逵則人皆仰之矣此其羽之可用以為儀謂可則而象之也夫乾之龍至上則亢漸之鴻至上則吉何也乾以六陽剛健而不可御故過髙而亢漸以三陰三陽其進有序故至髙而吉也右明占鄭少梅曰自子午以東為陽自子午以西為陰由艮達㢲子午以東陽氣之地也立春以後鴻鴈來故六爻皆係以鴻鴻者隨陽之鳥也毛伯玉曰漸一也卦取于女象取于木爻取于鴻各有理焉不相悖也故曰易者變也右明六爻兊下震上歸妹贊曰天地之大義也天地不交而萬物不興歸妹人之終始也說以動所歸妹也雜卦曰歸妹女之終也楊廷秀曰妹之為言幼少之辭也無父而有兄之辭也無父而歸于人孰歸之兄歸之也孰為之兄震是也兊少女震之妹也震長男兊之兄也說者有三唯此得之一謂男子三十而取女子二十而嫁為少女嫁長男然于妹字未安一謂諸侯一取九女以娣姪從此嫁者之妹娣媵也然贊謂天地之大義人之終始則非娣也案聖人作易人事物理無不備具咸恆言夫婦之情漸言女歸而女之無父者未有其義於是因長兄少女而設為歸妹之卦漸歸妹皆以乾坤二體三四兩爻相易成卦漸之九自三而往四自內而往外則女歸者女子歸其夫家也歸其夫家必待六禮之備而後行漸之義也歸妹之六自四而來三自外而來內則歸妹者長兄以其妹來歸其夫者也乾之九自三往四成震則是父往而長兄在也觀中兩爻之相易昭然義見矣都聖與曰九四以上嫡之象也六三以下娣之象也或疑爻有三娣字謂妹者娣也殊不知卦與爻異卦以震上兊下為義則長兄嫁妹之謂也爻以上下卦皆為妹則上卦震男之妹下卦兊女之妹也上尊而下卑上貴而下賤男之歸妹則與卦義同女之歸妹則娣之謂也故初三皆言娣二不言娣而五言不如其娣之袂良則二亦娣也或以卦之妹為娣則於孔贊不合或以卦為嫁女則於爻辭有疑是不明卦爻之不可同論也右明卦義象贊曰澤上有雷歸妹君子以永終知敝右明卦用序卦曰漸者進也進必有所歸故受之以歸妹程正叔曰進必有所至故漸有歸義林黃中曰漸之反也艮反為震㢲反為兊以九居五六居二上下之情不交是以謂之漸也以六居五以九居二則上下交矣是以謂之歸妹也右明卦序征凶無攸利贊曰征凶位不當也無攸利柔乘剛也馮當可曰歸妹反漸故吉凶亦相反張子厚曰泰之九三進在四故六四降而在三都聖與曰男女之相從正則吉中爻之材剛柔雜居非所謂正如是有行非禮法所容也故征凶夫婦之相與順則利而六爻之材柔上剛下非所謂順如是而有為非室家所宜也故無攸利名卦以二體其常也彖卦以六畫其變也以不正而征凶則知正則吉以不順而無攸利則知順則無不利由彖所言知其所不言則聞一以知二矣程可久曰中爻不當位妹歸不獲其所之象故征凶以柔乘剛又有見暴者焉故無攸利毛伯玉曰卦無他辭唯曰征凶無攸利安有女子之嫁而其凶直如此六十三卦之辭未有此也又曰所謂永終知敝也又曰意者卦雖託於歸妹而彖以它義發之故孔子曰位不當也柔乘剛也女居男位是無夫也皆從孔贊妹之再嫁亦可取象案上下本乾坤純體而九自三往四位不當故征凶六自四來三柔乘剛故無攸利孔子之論如此說者以六爻全體言之失其指矣然彖辭無象有占無吉有凶何也無乃警為人兄者之當慮其妹之不安於其家邪蓋父之於女無所不用其至而兄之視妹恩少殺矣此聖人之深意不然六十四卦一卦必有一用不應此卦皆無所用之而妹終不可歸也孔子固推廣之曰天地之大義也人之終始也可不重乎不當其位或柔乘剛可不慮乎此帝乙歸妹之辭所以丁寧切至也為人兄者之嫁妹必若帝乙而後無征凶不利之憂矣上六之象虛筐無血女子之通患也而不言於咸漸亦慮夫兄之不能防之以禮也與右明卦占初九歸妹以娣跛能履征吉贊曰歸妹以娣以恆也跛能履吉相承也郭子和曰初在下賤者之位也無正應娣之象也李元達曰娣有弟之道以嫡視娣猶弟也案兌為少女女之妹也又為妾娣之象也張舜元曰兊為毁折跛之象也李子思曰履之六三亦以兊為主故有跛能履眇能視之象蘭惠卿曰跛者不可以專行依人乃可娣妾之道必承正室以行事則吉司馬君實曰不正而合是以跛也以娣而行故能履也所以吉者說以承上也張子厚曰爻為剛故能履非匹故跛劉氏仲平曰履之三以六居之則不正也在下卦之上則不中也故曰眇能視跛能履孔子曰不足與有明不足與有行也歸妹之初九未中也故跛能履九二未正也故眇能視然娣不敢居中以承嫡無所用其行而相承以為吉幽人以自得為常無所用其明而以為正則利右明象占趙氏曰兊隂卦也隂柔而說則常患乎不正故兊陽爻多吉而隂爻多凶如臨如睽如中孚等卦皆然而履之三爻尤與歸妹相似履之初九曰往無咎此則曰征吉九二曰幽人貞吉此則曰利幽人之貞六三曰眇能視跛能履此則初言跛二言眇三則反歸以娣亦以六三之柔下如在下之陽爻也又曰在君子之踐履則以跛眇為當然故析言於初二其實皆因兊體而為之戒也李子思曰彖云征凶者以諸爻失位為妄動之戒爻云征吉者以初九能安於卑下而嫡將說而與之偕行也右明爻義九二眇能視利幽人之貞子夏傳無之字贊曰利幽人之貞未變常也朱子曰眇能視承上文而言張舜元曰離為目上承六三之兊兊目眇之象也履六三亦然案爻唯二五相應而中隔九四然終不能絶其應故不能正視六五而旁睨之猶眇者之視也右明象李去非曰陽剛而承隂處靜而居內自守窈窕幽閒之中而未得六五之正應若眇其目者而猶能視以繫於五右明占王景孟曰不言歸妹與娣者正得下體中位不應取娣象而六五位上體之中既稱其君矣則為嫡者五也二不應復為嫡也居隂守常未適乎外女子之賢明而妹之未歸者故爻辭但以守常為正而以幽人象之案卦有歸女之義無男女夫婦之義故上下體皆為妹而二五相應六居五九居二非女之於男也然下卦為女之妹則有娣之象而獨此爻不言娣者九陽剛賢德而明者也二中位隂靜而貞者也以為娣則與五正應非娣也以為嫡則有五在非嫡也故但以其陽明居兊體而以眇能視為象剛中而位隂而以利幽人之貞為占言有望於君而未耦守正於內而未行宜固守其正者也右明爻義六三歸妹以須反歸以娣贊曰歸妹以須未當也都聖與曰四以上嫡之象三以下娣之象劉氏曰以柔歸妹內卦之主是將有所須以為嫡者也朱子發曰初至五體専専須也張子厚曰三隂本彚征在上今爻反下而為兊故曰反歸以娣張舜元曰約象坎為須髮上承九四之震震為下輔須之象也賁之六二亦坎震之象右明象占毛伯玉曰六三妹也九四所歸者也三之於四也須其聘我而歸之故曰歸妹以須四之於三也以娣而不以聘故反歸以娣案卦以三四兩爻九六相易而成者也在六位之義三下之終而將以上進者也下體娣也上體嫡也三之六本在上體而今居下之上是須時以上進不肯為娣而求為嫡者也然九當其前則不容進矣蓋陽之性趨上而不肯反歸於下隂之性本下而不能反歸於上故三雖須為嫡於九四而九四反以娣之禮而歸之贊曰未當以爻言之以六居三於位未當以理言之蓋謂其本可為嫡而歸以娣禮其禮未當也以六歸四則於位當矣曰未者應須義也右明爻義九四歸妹愆期遲歸有時贊曰愆期之志有待而行也劉長民曰居下體之上位過乎少女是愆期也張子厚曰九四當速交而為泰今獨後者三須而有所待也趙氏曰女子以靜正為德處震陽之動而求歸非正也故雖愆期而不可不堅其待時之志李氏曰已離兊體故曰愆期處動之初非無行也以剛居隂其志不亂姑有待而已蘭惠卿曰以剛處隂無應是方正自守而不妄從人者也李季辨曰歸有時矣是其歸亦不久也李去非曰霜降逆女冰泮而止今震雷以動愆其期矣雖及春猶可以待其來逆也案以六位言已過其半是愆期者也然震陽已動雖遲其歸亦有時矣曰遲者以位隂也曰有時者以震動也天下之理無往不復九終歸三六終歸四也右明象占郭子和曰三之與四其不當位相似而辭有不同何哉蓋六三以柔居陽位而又為過中而九四以剛居隂位而有未中之義劉氏仲平曰以柔居陽其位僣也以剛居隂其志順也彖之贊以位不當釋征凶二爻之得失雖異而不當位則一故或以須或愆期要皆征凶之義林黃中曰所以然者上下之交進退之位二爻皆言歸妹而有反歸遲歸之文九四之義不盡於六三之文故引而伸之也易之互文見義豈一端而已哉案成卦之義固在三四兩爻而在他卦二五豈無九六之迭居者哉而未必不吉者得中也此兩爻有過不及之患是以其辭支雖然彖言不可征而兩爻無不征之義卦與爻義固不同也右明爻義六五帝乙歸妹其君之袂不如其娣之袂良月幾望吉贊曰帝乙歸妹不如其娣之袂良也其位在中以貴行也蘭惠卿曰五君位而以隂爻居之女之貴者也林黃中曰五天位也而六居之豈非王后配天之象乎詩云大邦有子俔天之妹是也古者后夫人為小君六五小君也下三爻娣也劉氏曰必其君能推賢讓善而援引其娣者也王輔嗣曰袂所以為禮容者也李氏曰泰之六五言帝乙歸妹者人君之事言其以帝之尊而能屈以順應於二也歸妹之五言帝乙歸妹者帝乙之后之事言其得歸妹之道居尊而能屈也五應於二五為女君而二為娣五位尊而飾以隂猶言尊而謙也二位卑而飾以陽猶言卑而盛也故曰其君之袂不如其娣之袂良言六五以貴而行謙之事也鄭少梅曰卦與泰類而人位兩爻交互有掩袂之象蓋天地之義備於人之一身左陽而右隂隂陽之交如兩爻之交也娣位乎下其畫陽也君位乎上其畫隂也易以陽善而隂惡陽貴而隂賤此君之袂不如其娣之袂良也都聖與曰不如其娣之袂良帝乙有是事也右明象陳氏臯曰小君之飾不如娣之容儀則隂雖盛如月之望亦保終吉此讀幾作既都聖與曰月者至隂之精而羣隂之主女君之象也幾望言女君之謙盛而未盈也望則盈矣吉宜家之謂也言月望當如陳言吉當如都則其義見矣右明占案君之袂不如其娣之袂良湯之歸妹適應此象能如是則小君如月之望並明當天照臨於下何適不宜夫乾坤純體而成泰自泰而九六互居三四而成此卦使九六各歸其位則復為泰矣故泰之六五亦取帝乙歸妹之象夫以歸妹名卦則雖自泰變而泰之取象則當自此卦而復變者言也右明爻義上六女承匡無實士刲羊無血無攸利贊曰上六無實承虛匡也程可久曰三上之應而二爻未嘗相合故曰士曰女而不曰夫婦張子厚曰爻應皆隂故曰士女曰無實李氏曰所應者三而居兊體之隂女之象也所須在上而上不足須承筐無實之象也本爻居震體之隂士之象也所取在三而近承九四刲羊無血之象也蘭惠卿曰女之筐將以受男子之幣而三上無所承無實也男之羊將以備女子之禮而爻下無所應則羊之所刲無血也尚何所利哉隂柔而無陽之應耳楊廷秀曰三承上卦有虛筐之象兊為羊朱子曰以隂居歸妹之終而無應約昏而不終者也故其象如此而於占為無所利也案卦以男女言之上與三應有嫁娶之義而陽實隂虛血隂類也自應言之上六無陽之實則士無幣帛以實女之虛筐所謂室家不足者也自爻言之六三不相應則兊羊無血蓋已死之羊不可用者也是以雖有昏約而不終也或曰六三近承九四有女失身之象故曰無血右明象毛伯玉曰卦曰無攸利爻亦曰無攸利不觀之於爻孰知卦之所謂哉案卦爻之辭同而指亦同者屯之利建侯是也卦爻之辭同而指不同者此卦之無攸利是也蓋卦以六來居三是柔乘剛失夫婦之正故無攸利爻與六二不相應是婚姻不終故無攸利也左氏傳曰晉獻公筮嫁伯姬於秦遇歸妹之睽史蘇占之曰不吉其繇曰士刲羊亦無􅎺也女承匡亦無貺也西鄰責言不可償也歸妹之睽猶無相也震之離亦離之震為雷為火為嬴敗姬車說其輹火焚其旗不利行師敗於宗丘歸妹睽孤冦張之弧姪其從姑六年其逋逃歸其國而棄其家明年其死於髙梁之虛古之占如此不盡用文王之辭因其事占其象而推其理也然此特其著者耳意亦多支離傅會者故孔子贊易而羣言盡廢也右明占林黃中曰陰與陽男女之象今以六三為女上六為士何所據而云之乎曰易者易也千變萬化而不窮者也聖人有以見天下之賾象其物宜是故謂之象如此右明爻義案六爻大抵以下三爻為妹之娣上三爻為妹蓋通卦以妹為象上貴而下賤也右明六爻厚齊易學卷二十七
