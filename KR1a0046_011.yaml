body:
  text: 厚齊易學卷十一宋馮椅撰易輯傳第七經上篇同人大有離下乾上同人朱子發曰三畫以初為地二為人三為天重卦四猶初也五猶二也上猶三也九五應乎六二同人也勾氏曰上居位之貴肯同其下程可久曰同者同其不同如春秋書同盟同圍之同司馬君實曰君子樂與人同小人樂與人異與人同者人亦同之與人異者人亦異之又曰草木鳥獸不可同也李去非曰同人與比異比為人所比同人與人同者也案上乾君也下應六二在下卦之中人位也故曰同人言君上之同乎人此包犧文王命卦之旨也大舜有大焉善與人同聖人與人同欲皆其義也贊曰柔得位得中而應乎乾曰同人李子思曰一隂疑可以統衆陽矣而位則居二故止可以為同人之象而不可以為大有趙氏曰一隂居二是柔得中而有謙以下同乎人之象朱子發曰父子君臣夫婦朋友長幼其位不同而相與㑹於大同者中也過與不及睽異而不同矣人受天地之中以生未始不同得其所同然則心同心同則德同李季辨曰天下之人所稟各異等倫則相絶也然其中有不約而同者天理之一也目有同視耳有同聽至於心獨無所同然乎以應乎乾為義三說各以贊之一明之大抵孔子贊易五陽一隂之卦則以一隂為主明卦名義自是孔子之例非經之本旨也至序卦乃云與人同者物必歸焉則經之本旨孔子非不知之雜卦曰同人親也右明卦義象贊曰天與火同人君子以類族辨物陸希聲曰日離于天其體同也火炎而上其性通也此亦孔子新意右明卦用序卦曰物不可以終否故受之以同人程正叔曰不交則否相同則為同人義相反故相次又曰世之方否必與人同欲乃濟同人所以次否也胡周父曰天下否塞之久人人欲其亨通是必君子同志以興天下之治則天下同心歸之李子思曰乾坤六子迭相用事而象顯卦成獨中女之卦其象未見故作易者以離交乾設為同人大有二卦以盡之又曰離之性上傅乎乾而乾之性亦下同乎離非復如向者乾上坤下兩不相交而否塞不通此同人之卦辭所以與否相反也案即否之乾上以離易坤初三兩爻變也序卦有正意而諸說旁通皆可以推之右明卦序同人于野亨利涉大川利君子貞贊曰同人于野亨利涉大川乾行也陸希聲曰同人于野亨道大公也利涉大川應乎天也程正叔曰天下大同之道則聖賢大公之心也常人之同者以私意所合乃昵比之情耳故必于野而無逺不同也天下皆同之何險阻之不濟哉馮當可曰以卦體言之則有大同之義以卦爻言之則示阿黨之戒野外也二之從五離之麗乾皆自內而外理契至公則雖胡越之殊為一心私狥於己則雖室家之壼有異志薛氏曰自朝及野君人之道也故門無咎郊無悔野方亨楊中立曰人之常情昵近遺逺則其同不廣矣李仲永曰以乾健而涉難無所不利陽以隂為難五陽一隂故不足以為難而利涉焉正義曰與人同心足以濟難聞之曰古之聖人唯能通天下之志故能成天下之務際天所覆志無不通則成大事濟大難立大功無往而不利也以象言之野天際之象坤龍戰于野是也離中虛舟虛之象乾健行之象也際天所覆皆與人同則志無不通以健行舟則雖有大川涉無不利健以言其合衆力也右明卦象贊又曰文明以健中正而應君子正也唯君子為能通天下之志李子思曰卦辭反否昔也不利君子貞而今也利君子貞案君子貞以乾在上言否隔大同所以為利不利之别也鄭舜舉曰人臣為羣陽之宗易失之私故同人之彖爻多戒辭人君為羣陽之宗上下順從故大有之彖爻多吉右明卦占初九同人于門無咎贊曰出門同人又誰咎也蘭惠卿曰處同人之初始出門而同人者也李季辨曰一隂在二衆陽所欲同也初最近之出門而相遇劉氏曰六二在外門之象也程可久曰六隂數耦動闢有門之象案同人之時五陽皆同一隂在二初出即遇之六畫一門之象也隨之初九節之九二皆前遇六取象於門右明象林黃中曰二五正應也初九六二以近而同宜若有咎矣然初在二下不隔五路無乘陵之象又誰咎之哉案初九六二各當其位近而相得出門相遇非邀求結約以為同者也衆陽在外未嘗涉害誰得而咎之右明占六二同人于宗吝贊曰同人于宗吝道也林黃中曰異體為配同體為宗二於五為配於初三為宗何者同離體也李季辨曰衆陽皆欲同二而二與下體同同于宗也然非正故吝張舜文曰親其所親則疏者隔矣黨其所黨則逺者疑矣不亦吝乎案初與三皆近而其情相得又離之為卦本以一隂麗於二陽之間其相與之同決非乾之三陽所能間矣特同人之義貴乎大同不貴乎自私也右明象占程可久曰當同人于野之時僅同于宗所以吝也張敬夫曰同人于野則曰亨同人于門則曰無咎同人于宗則曰吝推此則聖人之心可見矣案卦曰同人于野亨與二也爻同人于宗吝不與二也同比六二而一與一不與何也卦論成卦之體爻論一爻之義也右明爻義九三伏戎于莽升其髙陵三歲不興贊曰伏戎于莽敵剛也三歲不興安行也朱子曰剛而不中上無正應欲同於二懼九五見攻故有此象胡翼之曰以剛據陽志好强暴欲私六二而奪其應以不正加人不敢顯然興戎但伏於草莽又升髙陵以望之張舜民曰離為甲胄為戈兵戎之象也諸陽莫不願同二而五以正應專有之三以炎上之剛欲與之戰自度內虛之力不足以當乾之剛健至于三嵗不敢興也都聖與曰愛惡相攻逺近相取物之情也六二柔中草莽之象也伏戎于莽下据六二之象也劉子圭曰用壯而强欲人之同乎已居下體之上故謂之陵有憑上之志故謂之升三嵗不能興則五與二通矣李季辨曰三與五隔三爻故曰三嵗案內据乎二伏戎以待五之至而敵之升髙陵以望五雖三嵗之久而不敢興何者下固不能以敵上私固不能以勝正也同人者師之伏也故因離之外剛為甲胄戈兵而取伏戎之象三嵗不興猶屯六二之十年乃字也其必待三嵗十年何也逺近之勢異也其三歲十年之久近又何也屯者塞同者通時不同也右明象占程正叔曰卦惟一隂諸陽之志皆欲同之然以中正之道正應乎五三與之比而欲奪之故其象如此深見小人之情狀不曰凶者不敢發未至於凶也司馬君實曰三四者上下之際異同之分也故迭爭而交不勝也伏戎于莽下襲上也乘其墉上陵下也三不興而四弗攻吉逆順之勢也李子思曰天下之理聚則必爭卦以相同為義而三則伏戎四則乘墉五則大師克何也二應五而三四据之所以爭也嗚呼出而與人同至易至簡之事而乃如此故易中必知險簡中必知阻不學易者殆不可以涉世變也右明爻義九四乘其庸弗克攻吉贊曰乘其庸義弗克也其吉則困而反則也王介父曰墉保內以扞外也程可久曰墉限內三之象李季辨曰四欲同二而隔九三故乘九三之墉右明象都聖與曰剛不中正犯義以陵人之象也位本隂柔則知義不勝之象也程可久曰與迷復者異矣張知常曰不曰悔亡而言吉聖人貴遷善如此右明占朱子發曰三非犯已二非已應乘墉豈其宜哉胡周父曰二為卦主五為君位君臣同心三乃升陵而敵五四又乘墉而攻三則積嵗不興弗克攻宜也朱子曰乘其墉矣非其力之不足也特以義之弗克而不攻耳故吉郭子和曰三四居二五之間故有爭奪之象乘墉之逼過於伏戎弗克之攻過於不興何吉之有本爻言此深罪三之伏戎也案三四皆欲同二而二五正應君臣之義也誰能奪之然三之不興僅免凶咎而四之弗克乃吉何也三之所欲敵者五也四之所欲攻者三也逆順異也四之失在乘九三耳弗克攻則吉矣故曰吉吉以弗克攻言不計其乘墉之失也抑又觀之同人六爻皆無吉義聖人似太不恕也故於衆爻之中擇其可吉者以九四當之右明爻義九五同人先號咷而後笑大師克相遇贊曰同人之先以中直也林黃中曰詩不云乎未見君子我心傷悲亦既見止亦既覯止我心則夷夫人乖離則悲遇合則喜此天下之至情也程正叔曰五同於二而為二陽所隔自以為義直理勝憤抑至於號咷然邪不勝正終必得合故後笑也案此與旅上九笑號先後正相反萃初六亦言號笑右明象贊又曰大師相遇言相克也代氏曰三四敵強大興師方可克之傳曰如二君故曰克王介父曰兩剛雖俱抗五然各欲擅其私而非同心者也是以不能克五而為五之所克商周之不敵此之謂也程可久曰卦反變為師故三四五皆言兵戈以此右明占程正叔曰不取人君同人之義者不與天下大同而獨私一人非君道也王氏逢曰以剛居上非所以善同于下而又同乎己之應失同人于野之義九三九四所以悖之楊中立曰雖克相遇止於後笑亦不言吉也李子思曰物將有合也而或間之則不可以不去故頤中有物必噬而求合同人之卦柔得位得中而應乎乾豈知有是事哉唯自二之五不免歷三四兩爻而後至經歷險阻而激起爭端此涉世之常也爭既息而二五自合豈終能為間也哉案九五大君當與天下相孚於大同之世而乃今私繫所應是以彊弗友之徒競起而爭之夫以上伐下直舉而錯之爾何至動大衆而僅能勝之哉私故也作易者以為失君人大同之道故備言其私昵之狀而以敵國交兵之法言之其訓嚴矣說卦子曰君子之道或出或處或默或語二人同心其利斷金同心之言其臭如蘭案五於二其悲哀之極至於號咷征戰之爭至於大師不至於笑而相遇不止者以隂陽之至情君臣之正應有真同者存也孔子是以發明言外之意曰其利斷金以見大師之必克也右明爻義上九同人于郊無悔贊曰同人于郊志未得也案上去二逺孔子又發此占外之旨朱子發曰乾天際有郊之象張舜元曰需于郊亦乾之象也郊野皆以天際取象或乾之初或乾之上唯其時物而已同人于宗以其親也同人于門以其近也同人于郊以其逺也若夫同人于野則與衆大同矣邑外曰郊唯取在外之象右明象劉氏曰非無同二之志以逺而外不與五爭是以無悔毛伯玉曰有悔者悔而無及也乾之亢豫之遲是也無悔者無使有悔也同人之于郊咸之其脢是也悔亡者無所可悔也恆之久中晉之衆允是也毛說雖未必盡當一經之義亦可以推矣右明占楊廷秀曰君子之於人異勿處先同勿處後右明爻義林黃中曰同人之時二五同心天下莫不同矣苟非憑陵强暴之徒皆有同人之義是故初在二之下不為九五之難自門而出即同於二同於二則同於五矣上在五之上不為六二之難自郊而入即同於五同於五則同於二矣故唯初上之爻不罹於悔咎也案五陽欲同乎一隂而一隂不能皆同乎五陽則以其同體者親之然失大同之義矣故曰于宗吝若夫五陽之情九五以其正應且居尊而臨下必欲同之而九三以同體而近以抗五九四又以九三之隔也而攻三然終不勝乎九五之正應故終於相遇而九三之伏戎不興九四之攻不克也若夫初上之逺近雖異而皆處不爭之地是以無悔咎之失右明六爻乾下離上大有贊曰柔得尊位大中而上下應之曰大有程正叔曰居尊執柔物之所歸楊中立曰以虛受之能有其大也馮當可曰上下五陽皆為己有所以謂之大有也林黃中曰大有者有天下之大也剛為大而柔有之乾為大而離有之也案贊言尊位大中則諸侯大夫不與焉而止据卦義言之則大小不同而其為富有之義一也蘭惠卿曰凡物非其有而有之則為大有若以天子富有天下言之則有礙若以卦義言之則有理蓋以陽有隂以大有小于理為順而以隂有陽以小有大于理非所當也今五陽乃為一隂之所有迹若可疑然以其得尊位大中然後可以奄有天下而不為過也不曰有大而曰大有其㫖微矣若夫序卦曰有大者則又就卦中别取義非命卦之本指也鄭少梅曰以陽統隂可謂有衆不可謂大有李子思曰衆陽象君子其出應文明之主者乎說卦曰大有衆也案此以五陽言之右明卦義象贊曰火在天上大有君子以遏惡揚善順天休命右明卦用序卦曰與人同者物必歸焉故受之以大有鄭少梅曰能大同然後能大有林黃中曰同人之時天下莫不同矣然而未能有之何也為其以九居五無含容之義衆陽並爭而未有歸也反而易之以六居五則并包兼容五陽雖欲無歸不可得也毛伯玉曰天下之亂常生于不一故同人者諸侯之離合而大有者天下之元亨也案傳曰同者有同也亦有不同者矣至大有然後天下一統故大有之六爻與同人之義相反蓋反對也聖人之大寶曰位一隂得尊位大中而同人之爭奪息矣元亨贊曰其德剛健而文明應乎天而時行是以元亨程正叔曰以卦之材可以元亨即能元亨也大有而不善者與不能亨者有矣注云不大通何由得大有此不識卦義也又曰卦名自有其義者比吉謙亨是也有因卦義為訓戒者師貞丈人吉同人于野亨是也有以卦材言者大有元亨是也朱子發曰有其大者未必元亨致元亨者由其材也李子思曰大有蠱升鼎四卦言元亨者皆以柔應剛陽剛有應進而為亨通也案元者以有乾也應離故亨程可久曰大有為太平至盛之時人君虛己以任衆賢以保盈成之業固自有元亨之道鄭少梅曰大有之時盛德在火萬物赴亨嘉之㑹二說皆可旁通毛伯玉曰元亨二字盡一卦之義辭約而博矣右明卦象占初九無交害匪咎艱則無咎案或以無交害為未涉于害然施於同人則爻義有之大有無之也又以孔子九三小人害也例之則不通贊曰大有初九無交害也郭立之曰羣賢彚升已最下而無應楊中立曰以剛健之才而困於一卦之下無交故也君子厄於陳蔡之間無上下之交也張舜元曰上下咸應以柔接下之君已獨窮處有害君臣之義得無咎乎案六五之君厥孚交如上下並交也已獨逺處而無交有害於應君之義右明象李仲永曰四不當位而不為之應匪我咎也袁氏曰匪咎本非有咎也艱則無咎矣都聖與曰無上下之交非其咎也唯待時而不易進焉然後無咎郭子和曰難進易退士之常也當大有為之時為君子者豈不欲與衆賢並進哉疏逺而無交非其咎也然賢人在上必引其類乾非在下之物終必上進特進少難於諸爻爾終無咎也右明占蘇子瞻曰二應於五三通於五四與上近五獨立無交者唯初而已張子厚同右明爻義九二大車以載有攸往無咎贊曰大車以載積中不敗也馮當可曰二應於五是不居其有以奉上故為大車以載有攸往之象劉長民曰下乘陽為動上承陽為實得中之位為安五以虛中接下往則無咎張舜元曰乾為圜為剛有輻有輪之象輅車之飾以金玉者蓋取諸乾也林黃中曰六五有之而九二載之二五相應陽志上行故有有攸往之象五之所及者四上兩爻而已初與三逺非其應近非其鄰五雖有之勢所不及必得九二之臣自下而載之則初與三雖欲違之不可得已案中隔九四況五非正應往宜有咎特以大有之時乾之三陽皆為五有況非在下之物未有不上進者三陽同體本爻居中承上乘下行之以健與之俱進何咎之有右明象占李子思曰大有元亨之治九二之力居多右明爻義九三公用亨于天子小人弗克贊曰公用亨于天子小人害也李子思曰居下卦之上為三陽之長以君子而當公侯之任者也馮當可曰上九既不應己五居尊位衆陽宗之是其道可應而應之之象程正叔曰以其有為天子之有乃諸侯之常義張敬夫曰公侯所有之民物所有之土地皆天子與之者也必以是而通于天子若小人則認為已物至有不供苞茅不修朝貢者也朱子曰剛而得正上有六五之君虛中下賢故為亨于天子之象案位下之上長乎三陽居髙而能望六五大君之位以其剛正之德應之此公侯之為方伯賢而能率諸侯以通于天子者也不曰應而曰亨者以上無正應能自通者也是爻變則為兊隂小人也全卦為睽不克通於天子之象李子思曰君子道亨之時猶著小人之戒作易者真不忘於退小人者也愚亦曰小人道長之時猶言大人之亨真不忘於進君子者也王介父曰易之辭有王有先王有帝有天子有后又有大君王以德業言先王以垂統言也帝以主宰言天子以正位言也后者天子諸侯之通稱大君天子之尊稱也右明象占鄭舜舉曰二應五四比五皆五之所能有也三於五無相得之義固當自通于天子案大有之時五陽皆應六五有可通之義故易言之又疑其終於不通故著小人之戒右明爻象昔秦伯師于河上將納王狐偃言於晉侯曰求諸侯莫如勤王公曰筮之遇大有之睽爻九變六為睽曰吉遇公用亨于天子之卦也戰克而王亨吉孰大焉且是卦也天為澤以當日乾變兌天為澤也上體離當日日之在天垂曜在澤天子降心以逆公天子在上說心在下降心逆公之象不亦可乎見左氏僖公二十五年此因其時物而變亨為享古字通用則義亦相通又以公用亨于天子為天子亨公也六五以虛中下接諸陽亦有此象右明占法九四匪其旁無咎贊曰明辨晳也正義曰謂九三在九四之旁程可久曰本爻先於衆賢最近於君郭子和曰賢者居近君之位自進於君而無外交者九四是也袁氏曰四與三疑於近而相得然離性炎上上承而不下比匪其旁可知也都聖與曰比于三焉疑二於君而有下比之咎然其體則明其材則剛其性則趨上而不趨下案以全體言之五陽同德應五四近君宜引類以進也以二體言之下三畫乾自為一卦上三畫離又為一卦四五同體自相附麗彼乾之三陽自為一朋四無與焉此大臣之逺權勢者也與同人之九四乘墉異矣何咎之有右明象占六五厥孚交如威如吉贊曰厥孚交如信以發志也威如之吉易而無備也程正叔曰虛中孚信之象上以信接下下以信事上故厥孚交如或謂與二交非五陽交孚于六五夫是之謂大有五中有剛處之以柔故五陽親之愛之而無敢犯敢慢之心所謂威如而吉也與同人之先號後笑克以大師者異矣右明象占馮當可曰當大有之世爻爻皆有五為大有之主下當以有歸於上故諸爻皆以不自有為義唯五則言處大有之道倘下或有不歸於上則烏得為大有之時哉右明爻義上九自天祐之吉無不利贊曰大有上吉自天祐也李氏曰孔子贊象曰應乎天與此爻辭其意通也又于說卦觀象玩變十三卦通變皆引此爻之辭以明之案易窮則變大有至上宜變矣而反吉焉其變之善者乎夫一爻變則為大壯六爻變則為比序卦變則為謙無一之不善者也抑觀凡乾下之卦至終未有不上進者至此則乾之三陽至矣所以有自天祐之之象衆陽歸五而已麗其上吉無不利之象右明象占勾氏曰豐盛之時以無纍于位為賢馮當可曰衆陽宗于六五不宗上九是處有之極不有其有也朱子曰滿而不溢故其象占如此李季辨曰合六爻皆善善處大有者也宜其得天之祐故于卦終贊之如此總一卦言也楊廷秀曰八卦乾為尊至上亢而悔六十四卦泰為盛至上復而吝盛治備福孰如大有之上九者乎說卦子曰祐者助也天之所助者順也人之所助者信也履信思乎順又以尚賢也是以自天祐之吉無不利也李子思曰爻辭不言所以致自天祐之吉無不利之由孔子然後申述之王輔嗣曰五德有孚而已履焉履信之謂也五德柔順而已乘焉思順之謂也王介父曰大有大畜皆尚賢之卦乾陽物所謂賢也張舜元曰人欲而天必從天祐而人亦歸信順之至天人交與故祐之以吉而焉往不利哉案爻止言自天祐孔子并及人助何哉以天道言之則乾陽上進為天助也以人事言之則三陽並進為人助也其實皆以乾之上復言也乾之三陽又為衆賢之象已立乎卦外而上之亦為尚賢也然所以致此者亦豈氣數之必然哉下履六五交孚之信而近思六五柔中之順又能尊乾之賢而尚之所以自天之祐助不唯吉而且利而其利又無往而不然蓋得君而不有其有也古之三公復政厥辟而享有備福者其應此爻乎右明爻義楊廷秀曰六爻亨一吉二無咎三明主在上羣賢畢集無一敗治之小人嗚呼盛哉右明六爻
