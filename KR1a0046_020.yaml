body:
  text: 厚齋易學卷二十宋馮椅撰易輯傳第十六經下篇家人睽蹇解離下巽上家人贊曰女正位乎內男正位乎外男女正天地之大義也家人有嚴君焉父母之謂也父父子子兄兄弟弟夫夫婦婦而家道正正家而天下定矣案卦以女貞為利孔子謂一家皆當正女正只一事也故首曰女正位乎內而繼之以云云蓋合父子兄弟夫婦然後為一家之人雜卦曰家人內也正義曰明室內之道正一家之人故謂之家人程正叔曰家人者家內之道父子之親夫婦之義尊卑長幼之序正倫理篤恩義家人之道也又曰治天下之道蓋治家之道也推而行之於外耳故取自內而出之象為家之義也案王仲淹以明內齊外為義非也萬物潔齊於巽方非巽有齊義也右明卦義象贊曰風自火出家人君子以言有物而行有恆右明卦用序卦曰傷于外者必反其家故受之以家人焦氏曰明夷之失本由家道不治故受之以家人李子思曰序卦聨屬之意不免委曲以求通如明夷家人睽是也易之卦多以反對取義而雜卦兩兩相從得聖人作易之意為多案明夷變家人易五上二爻為陽也右明卦序利女貞王輔嗣曰家人之義以內為本故先言女也程可久曰六二正位乎內以應九五九五正位乎外以統六二此男女之正也特曰利女貞者夫子制義非宜貞固於家人之時如父子為隱與不責善非正也此專以女言之馬季長曰男以女為家家人以女為奧主長女中女各得其正故曰利女貞趙氏曰卦惟二陰爻而一居二一居四各得其位張敬夫曰在咸之時則尚少此中女與長女家道既成之象也鄭舜舉曰長女處下而巽順乎陽中女處中而傅麗乎陽婦人之義有三從離巽蓋盡從陽之義此女之正也此以二女立卦為義正得文王彖卦之意馮當可曰以內外二體言之巽離皆女也周南召南本乎后妃夫人以位乎內者為主也李子思曰以離之陰柔處中有中女之象而今處內卦是為女子之貞此家人所以為利也且以天下觀之一國在內以一國觀之一家在內以一家觀之女子在內背陽向陰而常處乎內者女子之正也此主雜卦之意耿睎道曰男女莫非家人也男易正女難正女正則家人莫不正矣故以女正為利胡翼之曰女之性無常而好惡隨人凡君子欲治其家必正其身以正其女使閨門之內尊卑之序各得其正是治家之道在女正為始也案凡曰貞者不特正也有固守之義焉女貞之義所該者廣故一卦之象其取類亦廣孔子特以男女內外之位正推言之舉一隅耳今之説者止述孔子之傳而文王之易則不復推求嘗竊病之善乎張敬夫曰九五居外六二居內男女正位之象也四陽二陰陽強而陰弱夫唱婦隨之象也愚亦曰長女居上中女居下長幼有序之象也自初至五皆得其位尊卑各安其分之象也而鄭少梅又曰家人之卦由人事而名也天理在焉學者不旁其情而拘於家人一事則六十四卦皆拘也請以吾之一身論家之道九五者吾之心也志所在也六四者吾之身也氣所在也心為身之君志為氣之帥志與氣是吾身內之父母也志在於耳而能聞志在於目而能見志在於手而能執志在於足而能行是耳目手足本於身見聞執行本於心相配為夫婦也夫易象廣大無所不包在人推測故曰其稱名也小其取類也大右明卦象占初九間有家悔亡贊曰間有家志未變也李季辨曰言為人女之道女子生則願為之有家當間之於未從人之時則可以無後悔也王輔嗣曰凡教在初而法在始志變而後治之則悔矣胡翼之曰於私邪未萌之時以為之間故悔亡都聖與曰九剛間之之道初始間之之時右明象占六二無攸遂在中饋貞吉贊曰六二之吉順以巽也李季辨曰言為婦之道婦道不敢成事故曰無攸遂職在飲食之事故曰在中饋耿睎道曰無攸遂是無失德也在中饋是無失職也無失德者順無失職者巽也朱子發曰二主婦之位楊中立曰柔順中正得女人之正也婦人無遂事從人而已無非無儀維酒食是議案無攸遂正應九五從之者也故事無所專在中饋居下卦之中在中也互體坎飲食之象也故以主饋言之斯二者婦人之貞也故吉以六居二婦人之貞之象也右明象占九三家人嗃嗃悔厲吉婦子嘻嘻終吝贊曰家人嗃嗃未失也婦子嘻嘻失家節也林黃中曰六二為婦六四為子本爻居子婦之間處門內之長母之象也蘭惠卿曰以剛居陽在內卦之上故有嗃嗃之稱處二陰之間所以又有嘻嘻之戒李季辨曰言為人母之道也母道尚嚴太嚴則不和故有悔而厲然與其狎而慢寧若嚴而肅故吉家政廢弛無所恐懼則母道失矣故終吝楊中立曰家人有嚴君焉而本爻所以限內外雖嗃嗃未失也婦子以順説為事而至於嘻嘻則失節矣程正叔曰治內過剛則必悔于嚴厲雖未得寬猛之中然而家道齊肅人心祇畏猶為家之吉也嘻嘻笑樂無節也必致敗家之凶吝之甚則至於凶故未遽言凶也朱子曰嘻嘻嗃嗃之反筮者各以其德為應故兩言之吕與叔曰嗃嗃歡言以聚議也治家而不免家人議之悔且厲也彼雖議我我未失道悔厲猶吉也此説亦通林黃中曰離火之極故有炎熇之象猶俗言焦熬也鄭子産曰火烈人望而畏之故鮮死焉是火有嚴威之象也鮮死吉也家道尚嚴而戒瀆故曰悔厲吉亦有此象案母道尚慈親而不尊然內治繫焉不可過于慈也孔子因其象之剛而槩謂之為嚴君良有以也家人以下二爻言也以重剛不中而下有初九之剛焉此所以有嗃嗃之象也婦子以上下二爻言也以過中而遇二陰之柔説焉此所以有嘻嘻之象也故嗃嗃嘻嘻皆重復不一之辭此爻自離變震有噬嗑之象然則王輔嗣轉注文從口為嗃嗃嘻嘻未為失也右明象占六四富家大吉贊曰順在位也李季辨曰言為人子之道也子而克家則其家富矣林黃中曰介於九五九三之間陽富陰貧以柔居陰而謂之富家者此也王景孟曰易以陰陽相得為富本爻居二卦之中當剛柔相濟之地而以陰靜之材處之所謂居而有之者也李去非曰初間之二饋之三治之四則享其富此治家之序也順於陽則益不勝其為吉矣毛伯玉曰子者父之陰臣者君之陰以此為國其國必康以此為家其家必昌案文同田為富分貝為貧此爻處內外上下之間盡為子之道富實在四陽爻或乘之或比之或應之或同一體在己雖虛視之猶已之有也惟六二不富而於己無忌嫉之嫌王景孟曰家人六爻各得其正故雖陰陽錯居舉無嫉妬使此爻比五而有妬二之心使六二應五而有嫉四之心焉能安富家之大吉乎為人子者不有私財而合上下內外為一體此家之所以富而為吉之大也右明爻義九五王假有家勿恤吉贊曰王假有家交相愛也李季辨曰言為人夫之道居五應二二盡婦道五假而有之五君位故曰王得內助則無憂矣楊中立曰天子理陽道后治陰德天下之內治后聽之也故勿恤吉朱子曰以剛健中正下應六二之柔順中正蓋聘納后妃之吉占而凡有是德者遇之皆吉也此以應六二言之李去非曰有廟則假有廟有家則假有家正之至也不能正乎家者不有其家者也不能享於廟者不有其廟者也蘭惠卿曰剛中正為家人之主而初二三四各當其位亦如人君正身齊家使父子兄弟夫婦各正位乎內外而不相紊故不待憂恤而吉林黃中曰傳有云閨門之內具禮矣乎嚴父嚴兄妻子臣妾猶百姓徒役也然則古之聖人推一家之治以及乎天下如斯而已矣天下之治本於一家敬其父則天下之為人子者莫敢不孝事其長則天下之為人弟者莫敢不順刑於寡妻則天下之為人夫者莫敢不義字於厥子則天下之為人父者莫敢不慈此以全卦言之二説皆通所占用者唯當其時物耳右明象占上九有孚威如終吉贊曰威如之吉反身之謂也郭子和曰家人之始在於間及其能成在於信究其終不可變者威如之吉而已王輔嗣曰凡物以猛為本者則患在於寡恩以愛為本者則患在於寡威故家人之道以嚴終也朱子曰以剛居上在卦之終故言正家久逺之道必有誠信威嚴則終吉也威如非謂作威也反身自治則人畏服之矣王景孟曰徒能威乎人而不能嚴乎其身則在人未有能我信而我從者使吾之身無一毫之可愧焉則將不施威而有自然之威矣何者人深信之故也吾是以知易之有家人也聖人不以責之家人而責之吾之身為人父者躬行之有素則家人無不孚之者矣其所謂躬行者豈飾厲以為威哉正其衣冠尊其瞻視儼然人望而畏之非心罔念已潛消而默化矣此威如之謂也反身之謂也夫六爻自初至五剛柔各當其位家道貴整肅也此爻宜以柔居之乃反柔為剛何也家道整肅不可有始而無終也故曰威如終吉右明象占李季辨曰言為人父之道也又曰此家道之終也一卦六爻皆善父子夫婦男女各得其正也一家皆正則有終而吉矣右明爻義李季辨曰下三爻正內之事也上三爻正外之事也女子之道其始也為人女初九言之其中也為人婦六二言之其終也為人母九三言之母道貴嚴婦道貴順女子當以禮自防故初與三居之以九二居之以六男子之道其始也為人子六四言之其中也為人夫九五言之其終也為人父上九言之父道貴嚴夫道貴義子道貴順故上與五居之以九四居之以六六爻剛柔皆當所以為家道之善林黃中曰初上二陽有門墻扞蔽之象二三四五各當其位有少長尊卑之象右明六爻兌下離上睽小事吉初九悔亡喪馬勿逐自復見惡人無咎九二遇主于巷無咎六三見輿曳其牛掣其人天且劓無初有終九四睽孤遇元夫交孚厲無咎六五悔亡厥宗噬膚往何咎上九睽孤見豕負塗載鬼一車先張之弧後説之弧匪冦昏冓往遇雨則吉艮下坎上蹇利西南不利東北利見大人貞吉初六往蹇來譽六二王臣蹇蹇匪躬之故九三往蹇來反六四往蹇來連九五大蹇朋來上六往蹇來碩吉利見大人坎下震上解贊曰解險以動動而免乎險解又曰天地解而雷雨作雷雨作而百果草木皆甲拆解之時大矣哉雜卦曰解緩也正義曰險難解釋物情舒緩朱子曰難之散也居險能動則出於險之外矣郭子和曰遇險而止者材之不足也遇險而動者材之有餘也以有餘之材故能免乎險所以為解也右明卦義王介甫曰在解之始者屯而在屯之終者解也屯難解矣與民更始之象也李子思曰以畫卦之四陰二陽坎險在前為蹇坎險已過為解則解者蹇之反也以卦觀之坎上震下為屯坎下震上為解則解者屯之反也蹇止乎險下也屯動乎險中也解動乎險外也案以卦序言之物不可以終難故受之以解則解之為卦生於蹇者也以卦之象言之雷雨之動滿盈而雷雨作解是解之名義因於屯者也右參他卦明卦義象贊曰雷雨作解君子以赦過宥罪右明卦用序卦曰物不可以終難故受之以解解者緩也程正叔曰物無終難之理難極必解散也林黃中曰自蹇之解坎反居下艮變為震二五相易而成也右明卦序利西南無所往其來復吉有攸往夙吉贊曰解利西南往得衆也其來復吉乃得中也有攸往夙吉往有功也正義曰西南坤位朱子發曰解者蹇之反解之九二乃蹇之九五也九四乃蹇之九三也坤為西南其體順自艮反而平易之意坤又為衆順乎衆而衆與之故贊曰解利西南往得衆也此以九四言處解之道也馮當可曰自子至已陽方也自午至亥陰方也震坎東北之卦動而之西南以陽遇陰乃為得衆則難可解程可久曰九四為衆陰所傅西南陰方以其得衆而為利也林黃中曰震東坎北皆難之所在也難在東北則西南者無難之地也蹇止乎險中是以利西南不利東北謂九三也解利西南謂九四也李子思曰直曰利西南而不言東北者今以出而離乎險則所履者皆西南平易之地不復有東北之險也案蹇言利西南不利東北恐其止於坎險而不知往也解言利西南不言利東北震已動乎東而向南矣出乎坎險故也上卦本坤九二自初往四乃往西南也朱子發曰其者指二也李季辨曰此卦乃蹇之反處蹇之時無所往而來復則得吉如往蹇來反之類今蹇散為解則向之無所可往而來反者今可以有所往矣先儒不知卦自蹇來反遂牽於無所往又有攸往故其説不定趙氏曰無所往其來復吉為下卦之坎言之也有攸往夙吉為上卦之震言之也方其在險而無所往故來復於中而吉以其陽剛之在中也及其出險而之震則有攸往矣故動宜早而往有功以其陽之初交而可以動也其未解則來復蹇之所謂來反也其既解則有功蹇之所謂利見大人也蹇發其端而解言其詳禇氏曰世有無事而求功故戒以無難求靜亦有大敗乃救故戒以有難須速李氏曰常人之情於解則緩緩必有所失故曰有攸往夙吉可以往可以來然後可以解天下之難若往來之間或有窒而不通之所是我方有難何以解天下邪郭子和曰安不忘危之義也案此因蹇利西南而其難之解設兩端以告之也若難不用往而自散則以來復為吉蓋當蹇之時往蹇來反今蹇可解尚何所往來復其所可也此以坎之九二言也若難須用往而後散則以夙為吉蓋解以緩為義恐其緩不及事蹇難復作也此以震之九四言也如禹之水土已平而舜之封十有二山濬川武王之歸馬放牛而成王之征三監皆無所往而又有攸往之義來復者九二自蹇之五來復於二一曰自中孚之三來復蓋坎水趨下以下為安也往夙者九四自臨之初有往於四蓋震動而上居爻之初也右明卦象占初六無咎贊曰剛柔之際義無咎也蘭惠卿曰屯之初以剛承柔所以為屯解之初以柔承剛所以為解近承九二逺應九四何咎之有林黃中曰居最下之地致恭盡禮以接二陽蹇難之解與有力焉右明贊意李仲永曰當解難之始雖有過亦已赦矣故但言無咎程正叔曰方解之初宜安靜以休息之爻之辭寡所以示意右明爻義九二田獲三狐得黃矢貞吉贊曰九二貞吉得中道也李氏曰以坎體論之剛健而不陷於險者正在於九二故爻辭明其除險之功焉又曰狐者幽陰之物以喻小人之隂險也李去非曰田為苗除害也狐害田之物指卦中之三隂也此爻為六五之正應三隂以狐疑間之獲而除去則難解也劉氏曰凡致難之由端在于小人故君子之解難也必誅小人以除其害此爻剛得中而有應于五奉君命以誅之故得中直以正吉都聖與曰人民曰獲器用曰得蓋獲者得之難得者獲之易程可久曰田有獲者用武而有功之象朱子曰此爻為卜田之吉占亦為去邪媚而得中直之象能守其正則無不吉矣又曰卦凡四隂除六五君位餘三隂即三狐之象也案睽上九遇雨而和孔子曰羣疑亡也前曰蹇難豈非隂小疑間之所致乎田而獲三狐可謂羣疑亡矣故君子得其中直而小人之疑間得釋此所以正而吉也此卦九四變師師行險者也內卦有坎故二上有武事而六三亦為致冦右明象占程正叔曰以陽剛得中之材上應六五之君用於時者也天下小人常衆剛明之君在上則明足以照之威足以懼之剛足以斷之故小人不敢用其情然猶常存警戒慮其有間而害正也六五以陰柔居尊位其明易蔽其威易犯其斷不果而易惑小人一近之則移其心矣本爻既當用必須能去小人而行其剛中之道羣邪不去君心一入則中直之道無由行矣楊廷秀曰當解之世此爻欲其獲狐三戒其致冦四欲其解拇五欲其退小人六欲其射隼一卦六爻而去小人者居其五然則召天下之多難者果誰乎君人者亦何利於天下之多難而何樂於近小人而疏君子哉右明爻義六三負且乘致冦至貞吝贊曰負且乘亦可醜也自我致戎又誰咎也張子厚曰不正而近比二剛不能致一故有小人負乘之象貪以致冦也蘭惠卿曰上負九四下乘九二蓋乘則不負負則不乘王介甫曰負者小人之事六小人之材也乘者君子之器三君子之位也案陽富隂貧負四乘二陽爻之富為輦且運財於道路相繼不絶之象也陰以陽為冦二陽皆欲冦已而有之故又為致冦至之象以此為貞則吝聖人教人以從其一則舍其一也負則不乘乘則不負也所謂三人行則損一人也右明象占朱子發曰此爻當內卦之上小人而在髙位自二言之為狐自上言之為隼自本爻言之又為負且乘也馮當可曰夫人方在蹇難之中必凡事有所棄損以求出然後可以解難若戀眷膠固則愈陷溺矣此爻暗弱不明上進一步則可出坎方且下乘二上負四固結於二陽之間自惑溺而不肯解去致冦固宜又曰坎為盜故致冦此爻無正應險難無援之者外無其應內惑於欲何由而可解邪右明爻義説卦子曰作易者其知盜乎易曰負且乘致冦至負也者小人之事也乘也者君子之器也小人而乘君子之器盜思奪之矣上慢下暴盜思伐之矣慢藏誨盜冶容誨淫易曰負且乘致冦至盜之招也案慢藏誨盜冶容誨淫此古語孔子述之善夫蓋物既有所負而又載之以車是招盜也若乃小人而乘君子之器是又孔子借易象以申其説非文王之初指也孔子以為負者不可乘而董仲舒又以為乘者不可負易象廣大皆可旁通而文王本指固自卓然於象意之表朱子有言不可以孔子之説即為文王之説蓋謂此類也右廣占九四解而拇朋至斯孚拇或以為初六非贊曰解而拇未當位也石守道曰此爻失位下比六三三上傅如拇之傅於足者上體震陽有足之象若解去拇則九二己之朋類相須而至矣劉氏曰君位不當而比三為大臣而親小人者也二方應君以誅羣小使己不能解散小人其能免二之疑乎故必解而拇然後朋至斯孚右明象占張敬夫曰此爻近君之大臣也為大臣而陰比小人則君子之朋逺矣蓋君子小人不兩立若能辨去小人則君子朋至而交孚矣李季辨曰四不得中故有此戒耿睎道曰此爻未當位也如其當位而所解若此則吝矣故不言悔吝右明爻義六五君子維有解吉有孚于小人贊曰君子有解小人退也林黃中曰五君位也以六居之是陰柔小人之所傅也小人而在君側可謂難矣君子之治小人維有緩之而已小人知君子之不為己甚也亦莫不孚而自知退聽矣是故九四言朋至斯孚此爻言有孚於小人蓋相因之辭馮當可曰陰陽相陵奪君子小人相挽而後有難難既解則君子小人各解釋以散君子自解而出乎險矣不為小人所困其道得行吉孰大焉李子思曰天下之難生於小人解之諸爻獲狐射隼負乘致冦之事皆汲汲於小人之戒然當解之世為之上者方以赦過宥罪為事則亦不可以窮薄於小人故君子之難解而小人信服而自爾解退張舜元曰昔居蹇難之中小人不無過焉今難既解赦過宥罪以孚之示不誅也小人亦知退而改過自新矣案卦有二陽三隂此爻為解之主不論陰陽然二陽君子也三陰小人也三陰與六五同德故能惑其君以致難然九二正應九四近君而情相得故能解君子之難當解之世君子維有解去小人之難則為吉矣豈復窮治小人哉此卦所以有赦過宥罪之象也使窮治小人則非解之義矣是以有孚於小人之象而小人亦安於退聽而不復作難也三陰同德故有有孚于小人之象右明象占劉氏曰此爻解難之主也程可久曰陷陽者陰也濟陰者陽也故小人常作難君子常解難本爻君位承應皆陽是用君子以平難者也案爻為吉凶悔吝何常之有原其卦體之休咎觀其時物之向背或指而之吉或戒而示凶作易者自有微權也右明爻義上六公用射隼于髙墉之上獲之無不利諸説皆失之贊曰公用射隼以解悖也説卦曰隼者禽也弓矢者器也射之者人也君子藏器于身待時而動何不利之有動而不括是以出而有獲語成器而動者也案爻之變為離上火下水亦有睽象故取於矢之義六爻之上髙墉之上之勢也隼性鷙險下五爻之象也五爻之象隼何也各不當位所謂悖也此爻德當其位而有在上之勢故解下五爻之悖如髙墉之上而射隼焉無不獲之者則亦無不利也五爻皆隼也今也隨所射而有獲蓋各解其位之悖而去之也是之謂解之終玩孔子之贊則其義著矣曰待時待解之終也曰成器器至終而成也右明象占鄭少梅曰解之為卦隂陽悖亂而不當其位上爻故有解悖之象李仲永曰公在百寮之上者也以百僚之上而攻小人之在下宜其有獲而無不利也楊中立曰居解之極有其位又有其時以是解悖何不利之有右明爻義趙氏曰當解之時已出乎險而動乎上故坎之三爻必以有應於上為吉以無應於上為咎蓋無應則不能出乎險也震之三爻則以動之初終為等差雖動至於極而無不利蓋已出乎險非動則不足為解也易之吉凶悔吝生乎動故凡於震體必有戒之之辭今獨不然者以其時坎而進於震經歷險阻而後動則其動必不妄也案解之時諸爻皆不當位故以二五得中為貴以剛爻能出險為尚唯上一爻當位故無不利也右明六爻
