body:
  text: 厚齋易學卷一宋馮椅撰易輯注第一經上篇乾至周官太卜掌三易之法一曰連山二曰歸藏三曰周易其經卦皆八其别皆六十有四筮人同鄭少梅曰自包犧以至夏商八卦雖重而未知所謂七八九六之常變也連山始艮歸藏始坤夏商用之皆以不變為占故其數止於六十有四而己文王因羑里之囚用以卜筮遂竄易繇辭更改術數立大衍之說開萬有一千五百二十之策使一卦可以衍六十四焉故名曰易易者變也後世謂文王重六十四卦不知洪範己有貞悔連山歸藏其别己六十四矣案周易之義唯鄭氏得之其曰演六十四卦著七八九六之爻竄易繇辭立大衍之說誠為確論按傳言神農黃帝皆有易卦而以連山歸藏為氏則二書不始於夏商也古之聖人凡改置宗社則禮文不相沿襲以應天命包犧始畫八卦令筮者重之而為六十有四其序則今之周易是也神農用之則退乾坤而首艮以其立乎春冬之交終始萬物也黃帝用之則退艮而首坤以其太極之前以隂含陽而萬物生死於土也意五帝則承用包犧八卦之序然皆未有辭也夏改正朔易服色故舎包犧八卦之序而用神農之連山以夏正建寅位乎艮也商舎連山而用黃帝之歸藏以商正建丑衝乎坤也意夏商卦下亦各有辭故周人並存以為占如左氏所載季友之占其文曰友在公之石間於兩社為公室輔又曰同復於父敬如君所說者謂即夏商之占辭文王贊述包犧之卦衍蓍之數推九六之變以生爻故卦爻各系以辭定名曰易自孔子贊文王之易而夏商之書廢矣然則名書以易自文王始文王以前曰卦而已孔子言包犧始作八卦不言易也周官之三易其亦因文王之易而并稱之乎亦猶夏商稱帝而因周文武併稱三王也正義曰傳云二篇之策則是六十四卦舊分上下篇乾坤象天地咸恒明夫婦乾坤造化之本夫婦人倫之原韓康伯曰先儒謂上經明天道下經明人事夫易六畫而成卦三材必備錯綜天人以效變化豈有天道人事偏於上下哉古者以韋編方冊故曰篇後世以紙帛舒卷則曰卷又其後鋟木以印彚而裝之則謂之帙矣曰篇云者存古也文王繫辭於卦爻而方冊繁重故離而為二曰上下篇孔子謂二篇之䇿是也世傳子夏傳與汲冡書皆然葢文王之經孔子之傳各為一書初不相參田何孟喜之徒以孔子之書為傳乃題上下經以别之經之名立而篇之名亡曾不知篇之所置則有上下而經非有上下之分也甚者於坎離咸恒之叙去其次第之辭而竟以咸自為首則是天地之間有二易也豈不謬哉周岐陽地名著代也此書文王之所作故稱周易夷繹反此書之名文從日從月取隂陽更代之義葢指竒耦之畫相易也上篇上去聲篇方冊之名或方或冊編之以韋故文从竹从編省方木板冊竹片也方冊繁重故分為二篇目以上下謂置首編於上次編於下也乾下乾上伏犧畫八卦卦止三畫筮則重之共為六畫竒畫屬陽乾之策也故三畫皆竒其卦名乾重卦又乾則止名曰乾古者以此六畫為卦之象不題卦名乾元亨利貞乾竭然反文王所題此卦之名而系之辭者也葢健而无息之謂在人為君父非居下者之所能當也元亨利貞此文王所系卦辭謂之彖者也左氏謂之繇疑即傳寫之轉葢剛柔雜居六位之象筮得六位之數皆九者以比占之葢占寓於象也元始也大也亨通利宜貞正而固也析言之則四者各為一徳合言之則為大通而宜正也筮者具是徳則吉苟不正固則不能大通矣初九潛龍勿用初九比下第一畫爻位之名文王題此以志而系之辭者也初位也九揲蓍所得之數以四積之凡三十六策餘爻皆七則占此爻後並倣此潛龍陽氣隠伏地下之象潛隠伏也龍象陽氣之升降變化也後人以其專主一爻謂之小象而卦辭為大象云勿用占勿不可也並文王所系此爻之辭亦曰繇筮得之者不可用事若有位者則不可用在下之人也九二見龍在田利見大人九二下第二畫爻位之名見龍在田陽氣發逹地上之象見濁聲自隠而顯之稱用九同田謂地上也利見大人占見清聲大人以大徳居正位之稱爻與筮者相為主賓自為一例人有見龍之徳則在我利於見之若有見龍之徳者則天下利見之也又為在我利見九五之大人九三君子終日乾乾夕惕若厲无咎九三第三畫爻位之名君子終日乾乾夕惕若下卦之終陽氣充滿於世之象直以人事言之亦象也君子告筮者乾乾健行之至惕他歴反怵也懼也若語辭猶曰如曰然或讀惕字絶句引文言因其時而惕誤厲无咎占厲力世反危也說文作夤非无今無天傾西北故以天屈西北咎其九反文从人从各相違也違則相尤說文災也以洪範休咎之證為義二說隨其爻義所取唯不自寧則雖危可以免咎九四或躍在淵无咎九四第四畫爻位之名或躍在淵已離下體陽氣欲升于天之象或者疑而未定之辭躍弋灼反无所縁而絶于地之名葢習飛也淵者上空下洞之所不言龍承初二之文无咎占可進則進无咎也九五飛龍在天利見大人九五第五畫爻位之名飛龍在天陽氣騰翔於天之象上二爻為天五在天之下曰在天者自下而仰觀之也利見大人占言大君之升天位天下利見之也若居天位者筮之則為利見九二之大人上九亢龍有悔上九第六畫爻位之名以在一卦之上故變文言上與初九同例亢龍陽氣極於天而忘反之象元苦浪反極於上而不能下之名有悔占悔呼内反過而追恨之意筮者能變而不至於極則悔亡用九見羣龍无首吉用九總言六爻用九之義非爻位也筮得六位皆九者以此占之乾坤純體特立此例或以傅之上九非也辭意與上九相蒙耳見羣龍六爻皆動陽極欲生隂之象總六爻故曰羣龍无首吉占无首猶无為戎首之義吉凶者失得之象吉謂於理得之筮者如其象則吉坤下坤上坤元亨利牝馬之貞君子有攸往先迷後得主利西南得朋東北䘮朋安貞吉耦畫屬隂坤之策也故三畫耦其卦名坤再筮得坤則陰之純也故定名下坤上坤此卦之名坤困魂反古文巛立卦之畫也文王所題葢順而有常之謂元亨利牝馬之貞象牝頻忍反陰類也馬莫補反以行地言之君子有攸往先迷句後得主利句西南得朋東北䘮朋安貞吉占先後䘮皆去聲攸所也隂闇故先則迷主陽也後於陽明則得所主而利西南隂方故得朋東北陽方故䘮朋筮得六位皆八數者以是占之葢其象為大亨而以順為正也君子欲有所往不可為先而後則得所主而利西南則得其朋類東北則䘮其朋類大抵安於正則吉也初六履霜堅冰至初六六耦畫之動數葢揲蓍而得二十四策以四計之也餘爻皆八者則占此爻後並倣此履霜隂氣始凝之象履鄭讀為禮非堅冰至占隂氣盛則水凝為冰曰堅告筮者以見㣲知著也六二直方大不習无不利六二直方大坤道中正之象不習无不利占内直外方則大矣不待習而自利也筮者有其徳則其占如是六三含章可貞或從王事无成有終六三含章隂氣包陽之象含古函章陽之文明也陽掩隂謂之包隂掩陽謂之函陽饒隂乏也可貞或從王事无成有終占以臣道言之凡言或皆如乾九四之義言當含蓄其文明之徳可以正固自守矣或不必貞而出從王事但不居其成功則有終也六四括囊无咎无譽六四括囊隂陽閉塞之象括古活反結也閉也囊乃剛反所以貯物言結其囊口而不出也无咎无譽占譽平聲稱道也一讀去聲名也朱子曰過實之名筮者惟當謹宻則无過亦无聲名六五黃常元吉六五黃常正位大臣之象常文從巾下服也俗從衣作裳元吉占能安其常分則大善而吉也上六龍戰于野其血𤣥黃隂極陽戰俱傷之象占在象中言有爭必傷不言凶凶可知也用六利永貞用六六爻皆六无八者以此占之利永貞固守其正之象象在占中永久也凡例詳於乾坤二卦後同者並不複出震下坎上一陽動於二隂之下其卦名震一陽陷於二隂之中其卦名坎震下坎上動而險陷故成卦曰屯屯元亨利貞勿用有攸往利建侯屯卦名張倫反鬱結不通也文象艸穿地出而未申元亨利貞大亨而宜於正固之象辭與乾同而卦義小大有異勿用有攸往利建侯占宜建立侯國也筮得之者為大亨而利於正未可遽有所往立君者遇之則吉也初九般桓利居貞利建侯初九般桓畏險而不輕動之象般步干反今磐槃皆轉注般桓回旋之貎一曰動而有阻之貎利居貞利建侯占凡事難進唯在所處之正亦為立君之吉占六二屯如亶如乘馬班如匪冦昬冓女子貞不字十年乃字六二屯如亶如乘馬班如亦畏險而不進之象屯說文作眕如語辭亶張連反回也俗作邅說文驙皆非乘平聲班古文分布也文從刀分玉下馬為班人馬異處也左氏傳班馬之聲書班師古語則然說文作驙鄭作般皆非匪冦昬冓女子貞不字十年乃字占昬冓今轉注從女或作構非男曰昬女曰姻冓男女合也禮女子許嫁笄而字占昬則雖不遽合終歸於成它事以此例之六三即鹿无虞惟入于林中君子幾不如舎往吝六三即鹿无虞唯入于林中進陷于險之象即就也鹿晁曰古文今麓山足也或讀如字引秦失其鹿天下競逐之義則是見鹿矣何以虞為誤認古文也虞人山澤之官君子幾不如舎往吝占幾平聲近也或作機或聲祈非舎去聲止也或上聲非吝良刄反古􅀢說文遴不足之意又恨惜也一曰固執也書改過不吝言即山足以從禽而无虞人以導之則入於林中而迷所向矣君子之於事物雖可幾及而不如止之往則有入於林中六四乘馬班如求昬冓往吉无不利六四乘馬班如遇險而止不深入之象求昬冓句吉无不利占言事必待所親以共濟則得之而且无不利矣亦為昬姻之吉占九五屯其膏小貞吉大貞凶九五屯其膏徳澤鬱結不下於民之象膏去聲徳澤也贊謂施未光故知去聲舊讀平聲誤小貞吉大貞凶占事之小者固守則吉大事則凶上六乘馬班如泣血漣如上六乘馬班如隂難雖出而窮无所之之象泣血漣如占漣聲連相繼不絶之貎說文作㦁言自傷其屯之極也坎下艮上陽明陷於隂險其卦名坎一陽極於上而止其卦名良坎下艮上在險而止莫知所從故成卦曰蒙蒙亨匪我求童蒙童蒙求我初筮告再三黷黷則不告利貞蒙莫公反物所蔽曰蒙亨卦有亨義故繫於卦下後並倣此匪我求童蒙童蒙求我我主卦而言以象告占者童未冠之稱字書轉注作僮初筮告此下占辭筮市制反問而決之也蓍之稱筮義葢同此告聲誥報也再三黷黷則不告黷聲讀煩數溷亂之意王作瀆說文握持垢非初六發蒙利用刑人用說桎梏以往吝初六發蒙開啓蒙昧之象發開啓也利用刑人用說桎梏以往吝占說今脫或聲稅非桎聲質杻也梏古毒反械也在足曰桎在手曰梏皆禁錮人之具九二包蒙吉納婦吉子克家九二包蒙容受蒙昧之象包今苞或作彪非吉納婦吉子克家以包蒙為象而繼之昬取有子之吉占六三勿用取女見金夫不有躬无攸利六三勿用取女蒙昧不有其身之象象在占中取今娶見金夫不有躬无攸利主取者而言謂上九也勿用取此見金夫之女葢金者彊暴之象一曰見利而動得金即為夫不能自有其身委身於人无所利也六四困蒙吝六四困蒙蒙昧无所開發之象困者窮而不通之謂六五童蒙吉六五童蒙天真未散之象吉占上九擊蒙不利為冦利御冦上九擊蒙蒙蔽怙終懲治之象不利為冦利御冦占御今禦冦暴也乾下坎上乾陽上進前遇坎險姑少待焉故乾下坎上成卦曰需需有孚光亨貞吉利涉大川需待也今或作非有孚光亨所需有信而亨之象孚相信也或作旉鄭讀為秀非貞吉利涉大川占言能待而有信則亨得正則吉事雖難必濟皆欲其需之也初九需于郊利用恒无咎初九需于郊逺于坎水之象坰外曰郊郊外曰野郊言去水之逺也利用恒无咎占恒胡登反久也九二需于沙小有言終吉九二需于沙漸近坎水之象小有言終吉占有言有違言也言漸近於難雖有言語終无所失九三需于泥致冦至九三需于泥迫近坎水之象致冦至占致詣送也謂有以來之難逼而招冦六四需于血出自穴六四需于血出自穴見傷而避之象占在象中血言其傷也筮者能待雖在傷地而終得出也九五需于酒食貞吉九五需于酒食為需之主安養以待之象食聲似貞吉占言如是而正固則吉也上六入于穴有不速之客三人來敬之終吉上六入手穴退處而不為險阻之象有不速之客三人來敬之終吉占速召也不召之客三人言乾之三陽也需之終則不復需矣故不召而自至也但能敬之則終无所失坎下乾上乾剛坎險兩不相下故坎下乾上成卦曰訟訟有孚窒惕中吉終凶利見大人不利涉大川訟兩相爭而言之於公也有孚窒惕自信堅執不通而警懼之象窒塞也惕義見乾九三中吉此下占辭中不過也一讀去聲中半而止也如中興之中終凶訟不可終利見大人以剛中正決訟者不利涉大川險不可濟占戒訟者隨其所處之得失為吉凶也初六不永所事小有言終吉初六不永所事隂柔不能竟訟之象小有言終吉占九二不克訟歸而逋其邑人三百戸无眚九二不克訟歸而逋自知不勝而退辭之象克能也逋聲晡逃竄也其邑人三百户无眚占眚生領反烖也過也眚文從目從生目生翳之名故為烖亦為所見不明而過失也六三食舊徳貞厲終吉或從王事无成六三食舊徳退歸於本邑而无訟之象人臣食舊邑之食古者度徳而受禄故曰食舊徳此卿大夫之訟貞厲終吉或從王事无成占言訟而正固不變則厲能守舊則終必吉也或肯從君命以事但不可居其成功九四不克訟復即命渝安貞吉九四不克訟復即命不能訟而聴聴訟者之命之象復聲伏即就也命九五之命渝安貞吉占渝聲俞變也變其欲訟之志而安於正也如是則吉九五訟元吉九五訟元吉象在占中以剛中正居尊位聴訟之道无善於此上九或錫之鞶帶終朝三褫之上九或錫之鞶帶終朝三褫之始得而終失之象占在象中錫或讀作賜非鞶王子雍作槃古通帶陸從篆作􅙮三平聲或去聲褫或省作褫解也鄭作拕徒可反晁氏曰如拕紳之拕乃得象意坎下坤上坎險坤順以順行險又九二一陽在下而統衆隂故坎下坤上成卦曰師師貞大人吉无咎師衆也用兵以衆故謂士卒為師貞大人吉无咎象在占中以至正大公行師乃得吉而免咎大子夏崔憬李鼎祚同揚雄以下作丈一經无稱丈人者此必誤林黃中同此說初六師出以律否臧凶初六師出以律師出必用法度之象否臧凶占否今不臧善也不善謂不以律也九二在師中吉无咎王三錫命九二在師中吉无咎王三錫命象在占中親統衆而得君之吉占言在師之中故也三或讀去聲再三也錫鄭作賜非命謂恩數六三師或輿尸凶六三師或輿尸將權不一之象或說見乾九四輿所乘烝徒從焉故為衆尸神所主故為主衆主謂軍權不一也一說師敗輿載亡尸而歸亦通凶占六四師左次无咎六四師左次退舎之象左上聲兵法偏將軍處左左者不用之地如人之左手也左氏傳凡師一宿為舎再宿為信過信為次次者按兵不行之謂无咎占六五田有禽利執言无咎長子帥師弟子輿尸貞凶六五田有禽師出獲敵之象田獵也為田除害故曰田禽俗作擒謂鳥獸之就擒捕者也利執言无咎長子帥師弟子輿尸貞凶占伐有罪者必聲言其罪故曰執言所謂奉辭伐罪也上六大君有命開國承家小人勿用上六大君有命開國承家小人勿用師還賞功之象象在占中古者諸侯皆有君道唯天子曰大君猶后之稱元后也命賞命也將帥之功上者開國為諸侯次者承家為卿大夫承受也朱子曰戒行賞者于小人不可用此占而小人遇之亦不可用此爻亦通坤下坎上坎水坤地水在地上其勢相比故成卦曰比比吉原筮元永貞无咎不寧方來後夫凶比毘志反親傅也吉比則吉矣故直以占為象原筮元永貞无咎此卦象皆在占中原再也如原廟原蠶之原元永貞詳見輯傳不寧方來不寧人不自安也方來各以其方來歸詩書論語方來其義皆同後夫凶後去聲隂以陽為夫謂九五也猶所謂夫夫是也非夫也之稱朱子曰筮者得之當為人所親傅然必有元永貞之徳然後可以當衆之歸而无咎其未比而有所不安者亦將來歸之比人者必再筮以自審其人有元永貞之徳則亟歸之若又遲而後至則彼交已固此來已晚而得凶矣初六有孚比之无咎有孚盈缶終來有它吉初六有孚比之无咎有孚盈缶終來有它吉求比于人之象戒以有孚者而後比之則无咎有孚盈缶為信有諸己充實之象缶方九反瓦噐爾雅曰盎也喻中心也終來有它吉占它或轉注作佗謂所比者也此爻有二象占一言已比于人一言人來比巳已比于人必求其人之有孚人比于已必在已者孚信充實于中也六二比之自内貞吉引類以達于君之象自内内偕初六也君謂九五正應貞吉占也六三比之匪人六三比之匪人所親非其人之象无占朱子曰其占大凶不言可知王子雍本有凶字六四外比之貞吉六四外比之上親于君之象外謂九五貞吉占能親其上則正而吉矣九五顯比王用三驅失前禽邑人不戒吉九五顯比天下顯然歸之之象王用三驅失前禽邑人不戒吉占王者用此顯比之道行田獵三驅之禮葢三靣驅之闕其一靣禽之來者取之背而前往者舎之故曰失前禽凡物之可擒捕者謂之禽書外作禽荒是也邑王者所都諸侯國中也不戒不待告戒今轉注作誡泰不戒以孚乃是本文上六比之无首凶上六比之无首凶不能率衆以比于君之象无首言无能為首也與乾用九辭同而指差異凶占乾下㢲上乾之三陽上進而㢲以一隂畜之故乾下㢲上成卦曰小畜小畜亨宻雲不雨自我西郊小畜小言㢲之一隂也畜敕六反一作蓄止而聚之也或許六反非亨以象為占宻雲不雨自我西郊我指本卦西郊隂方也陽先倡則雨隂先倡故不雨初九復自道何其咎吉初九復自道陽氣得上復其正之象復聲伏陽本在上之物故自下升上曰復此言由其所復之故道也何其咎吉占九二牽復吉九二牽復三陽牽聨以復之象謂下牽初上牽三也吉占九三車說輹夫妻反目九三車說輹不能前進之象車今輿說今脫輹聲腹說文車軸縛也王作輻夫妻反目占反平聲今翻怒視貌六四有孚血去惕出无咎六四有孚大君信任之象血去惕出无咎占血言傷也馬云當作恤意古文去去聲避之也出亦遯避之意九五有孚攣如富以其隣九五有孚攣如人君與大臣合志之象與四有孚攣力專反膠固之貌富以其鄰占陽實為富以左右之也其指本爻隣近指上九也上九既雨既處尚徳載婦貞厲月幾望君子征凶上九既雨既處畜道成而隂陽和之象處上聲相安以居也尚徳載婦貞厲此為妻占尚以徳載己者若婦人以此為貞則傎矣故危兊下乾上乾剛在前兊從其後而履之故乾上兊下成卦曰履履履虎尾不咥人亨履有所躡而進之意當有志卦縁下有履字後遂脫贊先釋卦而複出履虎尾可見今補之後同人艮並放此履虎尾不咥人亨所履雖危而不害之象咥杜結反囓也或作􅻱占在象中初九素履往无咎初九素履素其位而行之素中庸作傃往无咎占往謂前進遇九二中正故往无咎九二履道坦坦幽人貞吉九二履道坦坦所履夷易寛裕之象道路也言所行之道坦坦而寛平也幽人貞吉占居山澤之間而上無應幽人之象居中貞之象能貞固自守則吉進則漸迫虎尾危道也朱子曰幽人履道而遇其占則貞而吉矣六三眇能視跛能履履虎尾咥人凶武人為于大君六三眇能視跛能履視履不正之象眇妙小反目不正視貌跛波我反履虎尾咥人凶武人為于大君占諸侯皆有君道大君天子也九四履虎尾愬愬終吉九四履虎尾履至剛之後之象愬愬終吉占謂以恐懼而致福也愬馬作虩說文覤晁曰皆聲色恐懼貌九五夬履貞厲九五夬履决於所行之象貞厲占雖正而危當知戒懼上九視履考祥其旋元吉上九視履考祥相視所行以驗休咎之象祥者吉凶之兆也讀如禎祥之祥其旋元吉占窮髙極逺而能旋反則盡善而吉矣乾下坤上乾天也在下坤地也在上葢天之氣下交於地地之氣上交於天天地之氣和暢成泰故乾坤相交成卦曰泰泰小往大來吉亨泰郭子和曰通之大者也一曰安而舒也小往大來天地交之象三隂小而往外三陽大而來内吉亨占如是而吉是以亨也初九㧞茅茹以其彚征吉初九㧞茅茹三陽同體相援牽聨而進之象㧞蒲八反茅鄭作苗非茹汝据反耿曰如茹葷之茹謂茅之始生包其秀可茹者也毛曰根相連也以其彚征吉占彚古􅥖類也或上聲或作偉或夤非三陽以其類往外吉也九二包巟用馮河不遐遺朋亡得尚于中行九二包巟用馮河不遐遺朋亡同三陽以進而无私之象包一作苞巟今荒不治也馮今憑徒涉曰馮河遐逺也謂外三隂朋謂内三陽也巟謂初馮河謂三也得尚于中行占行道也謂六五中道之主尚上之也配也九三无平不陂无往不復艱貞无咎勿恤其孚于食有福九三无平不陂无往不復隂陽各欲復其所之象陂彼偽反傾也或破何浦寄二反非陽來在下升上則傾矣隂往在外降下則復矣艱貞无咎勿恤其孚于食有福占能知艱而復上之正可以无咎恤憂也朱子曰孚所期之信也謂勿憂其上之相孚但往上而自有食禄之福矣于往也六四偏偏不富以其鄰不戒以孚六四偏偏三隂下墜之象偏今翩王作篇詩偏偏者佳鳥相繼斜飛之貌不富以其鄰不戒以孚占不富謂隂虚以左右之也鄰謂五上不待告語相孚而下復六五帝乙歸妹以祉元吉六五帝乙歸妹人主下應賢臣之象帝乙湯也歸謂嫁也以祉元吉占以祉有所錫賚也祉福也上六城復于皇勿用師自邑告命貞吝上六城復于皇坤土復于地之象皇今隍子夏作堭姚作湟皆轉注城下池也􅕻土為皇皇為下池今城土復圮于池也勿用師自邑告命貞吝占衆散而不可用但自整戒邑貞固守之猶有吝也坤下乾上乾上坤下天地不交否塞之時故成卦曰否否否之匪人不利君子貞大往小來否之匪人隂小閉塞之象否備鄙反卦内同閉也塞也匪人謂三隂匪吉人與比卦同義据例欠志卦朱子曰或云之匪人三字衍不利君子貞占君子謂三陽以居上為貞隂長則消矣故不利大往小來天地不交之象初六㧞茅茹以其彚貞吉亨初六㧞茅茹三隂同體相援牽聨以進之象說同泰以其彚貞吉亨占守在下之貞則吉而亨六二包承小人吉大人否亨六二包承聨三隂以同體之象小人吉大人否亨占小人隂柔之象大人中正之象隂陽不交故九五與二否隔然正應終必亨通六三包羞六三包羞援三隂以進之象占在象中包以上包下二隂也羞進也讀如可羞於王公之羞九四有命无咎􅔧離祉九四有命命行於下之象否隔之世上下不交四與下接故有命无咎􅔧離祉占􅔧今疇類也離去聲麗也命行乎下則九五上九其􅔧類也皆麗其祉不為隂剥九五休否大人吉其亡其亡繫于苞桑九五休否息一世否隔之象休息也大人吉其亡其亡繫于苞桑占再言其亡也其亡也繫聲計苞桑桑之方苞者也上九傾否先否後喜上九傾否傾覆一世否隔之象先否後喜占先後並清聲喜去聲喜其否之傾也卦體否故云先否爻位傾否故云後喜
