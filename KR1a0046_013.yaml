body:
  text: 厚齊易學卷十三宋馮椅撰易輯傳第九經上篇臨觀兊下坤上臨贊曰臨剛浸而長說而順雜卦曰臨觀之義或與或求朱子曰臨進而陵逼於物也二陽浸長以逼於隂故為臨十二月之卦也毛伯玉曰復者陽失其位而初反也泰者以三陽為最安也四陽而壯五陽而夬義盡於名無可疑者二陽之為臨何也二得位而三猶隂也逼而不相安必以去之為快故婉而命之曰臨此命卦之微指也吕與叔曰臨以上臨下觀以下觀上臨位之在上者臨下在下者為上所臨者也觀位之在下者觀上在上者為下所觀者也以剛臨物物所不與以暗居上下所不觀故柔上剛下為臨上陽下隂為觀耿睎道曰大者以道長而臨小上者以位髙而臨下郭立之同王介父曰陽大隂小來者信往者屈大者信則臨小者之屈矣此以大臨小言也爻則貴賤以其位之上下四隂皆臨下之二陽二陽有應於上皆見臨於隂此以上臨下言也王景孟曰臨有二義以爻之剛柔言之則以剛臨柔消長之序然也故君子不可以不知天以位之上下言之則以上臨下統屬之道然也故君子不可以不知人程正叔曰臨民臨事凡所臨皆是案卦有衡有豎衡則以大臨小蓋內臨外之象此彖贊之意也豎則以尊臨卑蓋上臨下之象此象贊之意也內三爻以應外取義而外三爻則以下臨其應取義也一陽為復應冬至之氣而泰之隂陽適停應春分之氣也然則臨之二陽其應立春之時類有不盡通者取用在人要難以一說定也右明卦義象贊曰澤上有地臨君子以教思無窮容保民無疆案此以上臨下為義右明卦用序卦曰有事而後可大故受之以臨臨者大也林黃中曰巽變為兊艮變為坤二五不動巽變兊入而說也艮變坤止而順也入而不說則事不成止而不順則功不就此蠱之所以有事而臨之所以為可大也石守道曰臨非訓大大則乃能臨物也剛陽浸長所以大也臨之成卦二陽浸長所以可大非謂臨之義訓大也巽變兌畫之覆也艮變坤上窮則變也二五不動剛中而應所以成元亨利貞之德也右明卦序元亨利貞贊曰剛中而應大亨以正天之道也王氏逢曰一陽復於下二陽浸長可以臨人臨天下之大不具四德可乎虞仲翔曰九二剛中四隂皆應故大亨以正也案虞本贊意要之元指乾之初九也亨指九二之應乎六五也利貞者陽以上復為貞自二陽浸而長至於六陽成乾無所不利也右明卦象至于八月有凶贊曰消不久也陸希聲曰陽息於子為復為臨消於姤至遁凡厯八月有凶言有而未至也又曰臨卦下兌故曰八月復卦下震故曰七日自然之數也楊中立曰遘隂始生也而繫於金柅蓋柅之使無行也至於二陽浸而長則必至於否矣尚如之何哉有遁而已矣故言八月有凶欲其豫為之防也非知微知彰其孰能與於此右以遁言之王輔嗣曰八月陽衰而隂長故曰有凶勾氏曰諸儒謂周正建子為復至建未二隂生乃為八月匪唯月錯乃成遁矣易取否泰相反臨觀倚伏之義八月建酉為觀隂陽相推世數相變所以至於八月有凶也李子思曰建丑之月其卦為臨二陽浸長而逼四隂至於八月建酉其卦為觀四隂浸長而逼二陽則臨至觀而危矣林黃中曰說者曰復冬至之月也八月周之八月也然正月勾萌而謂之泰二月陽中而謂之壯皆所未安按春秋書春王正月冬十有二月詩云四月維夏六月徂暑七月流火皆夏時也蓋四時之序十二月之名冬不可以為春夏不可以為秋所謂三代不相沿襲者但以十一月十二月為嵗首耳太甲唯元祀十有二月乙丑武王十有一年一月戊午秦漢元年冬十月是其例也此以觀言之夫謂八月為遁者厯臨六位又至遁初二皆隂凡八位以其隂故其數八其象月也若復之七日則厯剝六爻至復初一陽其數七其象日也此一說也謂八月為觀者直以建酉之月言之此實象也蓋自六三厯四隂爻覆卦觀又四隂爻其數八其象月也此又一說也遁對臨為二陽二隂之卦觀對臨為反對之卦皆有意義文王孔子二聖人不明言之未易以臆說定也獨愛夫林黃中三代不相沿襲之說能破千古之惑故於此傳見之張子厚曰易之於爻變陽至二未過中即為之戒恐有過滿之萌猶履霜堅冰之義王介父曰有凶者不必凶而不能必無凶能戒之於早則至於八月可無凶矣程正叔曰聖人設戒必於方盛之時若既衰而後戒亦無及矣狃安富則驕侈生樂舒肆則紀綱壞忘禍亂則釁孽萌楊廷秀曰二君子方來四小人未去可不戒乎亦有此義右明卦占初九咸臨貞吉贊曰志行正也王輔嗣曰咸感也有應於四感以臨者也薄氏曰以下臨上名不順也故變云咸臨李氏曰其性說而足以有感其才剛而足以有臨故曰咸臨李子思曰山澤通氣故山上有澤其卦為咸而澤上有地則爻亦謂之咸隂陽之氣兩相感也蘭惠卿曰初四兩爻交感以相臨右明象蘭惠卿曰初四隂陽皆正所以獲吉馮當可曰凡臨之道上下相感說為善初之應四非中也貞固審慎則吉躁動則凶程正叔曰凡貞吉有既正且吉者有得正則吉者有貞固守之而吉者各隨其事也右明占朱子發曰以大臨小者臨之道以上臨下者臨之位郭立之曰臨觀之義或與或求故初九九二六四六五皆有焉李子思曰其遺君子之戒於臨民之初者乎案以卦義言之則以大臨小初九九二臨四隂者也是之謂臨以爻位言之則以上臨下六四六五臨初九九二者也是之謂臨唯其正應而隂陽相感故交相為臨而謂之咸言其交相感而交相臨也自卦義言之則二陽浸長上復為貞四隂浸消下復為貞隂陽皆得其道貞吉也自爻位言之六四初九皆當其位故各得其正而吉也右明爻義九二咸臨吉無不利贊曰未順命也案贊說難通疑未衍文象見初九張子厚曰非咸則有上下之疑有所不利矣程正叔曰吉者已然如是故吉也無不利者將然於所施為無不利也李子思曰二之咸臨與初同然二陽之勢浸長尤盛於初贊所謂剛中而應大亨以正者謂二也案初與二象同咸臨占同吉而初貞二無不利則異蓋初位卑而不中故取其貞二得中而應君故無不利不言貞位不當也君臣感應以相與故陽之上進羣隂順之所以無不利也右明占六三甘臨無攸利既憂之無咎贊曰甘臨位不當也既憂之咎不長也朱子發曰有臨下之位而無臨人之德又不當位以口說人甘臨也郭立之曰不中不正甘而說人者也劉氏曰體說之極以一隂臨二陽是以小人臨君子知其得時而已不可安遂諂佞以求容說者也右明象朱子發曰處不當位上則無應故無攸利能下九二之賢則無咎耿晞道曰節之九五以中正為甘則吉臨之六三以不正為甘則無攸利李氏曰以卦體論之三以柔說臨二剛之長故曰甘臨以設卦觀之二剛長而臨乎四柔本爻以柔居其上而位又不當故既甘而又知所憂也林黃中曰君子之進非小人之利也然且匿其凶險之心而見其順伏之意可謂知危而憂懼者矣君子之於小人亦豈得志而讎疾之哉彼既憂懼而自新則小人變而為君子泰之象矣右明占李子思曰彖以八月有凶警君子爻以既憂之無咎戒小人易於君子小人之際用意深矣朱子曰能憂之則無咎勉人遷善為教深矣案二陽浸長而臨其後已以柔臨之其德不勝其勢不敵處位不當而位又多凶宜何如哉然兌之為兊者以此爻也兊為和說為口舌甘言之象也以甘言而臨二陽二陽長以漸而不暴則為禍不烈也然進則羣隂咎豫之不遏二陽退則二陽臨已而不退聽進退皆無所利也以其位之多凶事之危急而憂之二陽與已同體者也己上無應而九二隂陽之情近而相得又以甘臨之而不競則庶乎免於咎矣陽之浸長則不能遏也所謂剛浸而長說而順合卦爻之義言之其本爻之謂與右明爻義六四至臨無咎贊曰位當也陸氏曰待賢不忌體柔居正德之至也張子厚曰以柔居隂體順應正盡臨之道雖在剛長可以無咎石守道曰剛勝則柔危柔不失正則得無咎六四六五所以得吉者以不忌剛長而能應之程可久曰本爻當位上承於五下應於初有大臣進賢之象臨之至者也亦可旁通案德柔而履得其位臨下之兊六三隂爻無剛害也剛雖浸長不與己競與己為應臨之至善也故可無咎右明象占六五知臨大君之宜吉贊曰大君之宜行中之謂也耿睎道曰識時之變達事之宜所謂知也六五以勢臨下知剛之浸長有向乎泰乃忘其勢而以柔順臨之故曰知臨郭立之曰方剛長之世而接之以柔知天道之行而戒之以知微知彰者也案二得權于下與初九相挻以進驟而遏之則不可御聽其自為消長則駸駸有逼己之勢左右之人又皆柔弱不能協贊六五於是與之相應信任不疑潜消其剛長之氣而使之為用此其知髙天下而柔能制剛足以臨之者也蓋惟大君然後宜以此臨之而乃吉若乃人臣以勢相臨决非知之所能御也中庸曰唯天下之至聖為能聰明睿智足以有臨也夫聖人之所以為知者豈若後世人主用區區術數以籠絡天下之英雄豪傑也哉右明象占李子思曰泰之六五知三陽之上進而以帝乙歸妹之象自處故元吉大壯之六五知四陽之上進而以喪羊于易之義自處故無悔大抵陽進而隂莫之逆則陽志得亨而能助隂以成功參之諸卦皆然案隂陽消長天道必然之數非人之所能加損也一委之天而人不與焉非聖人之道也嘗觀隂之長至六四去剝一間耳而九五尚居太君之位則雖二隂已遁三隂已否而正名曰觀為中正以觀天下之象使下之隂險觀而自化也今陽之長至二以得位得中其勢浸長而六五以柔居尊位宜向消矣而正名曰知臨為大君之宜之象使下之陽剛知分而自服也此聖人知易之道而扶君道於將衰而有旋乾轉坤之功也與右明爻義上六敦臨吉無咎贊曰敦臨之吉志在內也林黃中曰敦厚也坤為厚德以坤臨坤是謂敦臨敦復敦艮皆重復之義袁氏曰坤厚載物臨與復皆坤體上處坤體之極厚之至也案敦取崇厚意復在五下有三隂以藉之艮在上而下又有一艮以藉之今臨亦在上而下有兊隂以藉之不止乎坤之三隂而已故曰敦右明象石守道曰四五與剛為應剛長則柔危唯本爻處乎卦外所應亦柔剛不能害所以全坤之厚故吉無咎胡翼之曰無正應無剛明之助故吉乃免咎都聖與曰以隂居上有咎之象也故吉乃無咎善補過也李子思曰以厚接物未有不安故易之爻辭敦復無悔敦艮吉敦臨吉右明占程可久曰一陽生於初未應於五而六五已敦復矣二陽進於中未應於上而本爻已敦臨矣敦者自厚之道方未見君子其自厚如此則既見之情相得可知矣故曰吉天道貴方進而賤始退故與他卦逺實者異亦一說也可以備考案一隂在上五陽浸長而决之之兆也四與五應二陽故曰至曰知然後可以臨之若上逺於陽未有剝牀及庸之象以上臨下不得而搖之羣隂重復以敦厚之德臨下者也故吉而免咎陽長隂消未有咎也易以陽為君子隂為小人此以卦之上下言之以上臨下則上為君子下為小人易之取象不可以槩定也右明爻義王輔嗣曰此剛長之卦剛勝則柔危柔有其德乃得免咎故此一卦隂爻雖美莫過無咎也楊廷秀曰剛長將大之世也故初九升聞之君子九二得位之君子六四好賢之近臣六五任賢之泰君上六厚德之長者小人在位者六三而已李子思曰陽長則隂消君子吉則小人凶臨之二陽方長而六三六四曰無咎六五上六曰吉何也陽方長而羣隂順以應之則兩不相傷故在下而親者無咎在上而尊者獲吉所謂浸而長說順者也右明六爻坤下巽上觀贊曰大觀在上順而巽中正以觀天下觀雜卦曰臨觀之義或與或求朱子曰觀者有以示人而為人所仰也九五居上四隂仰之又四隂長而二陽消而名卦繫辭更取他義亦扶陽抑隂之意李子思曰臨二陽處內在下而近民與之相接故曰臨觀二陽處外在上而逺民若不相接唯以中正之道示之故曰觀又曰四隂用事而乃専主九五何也易之論隂陽每以得位失位為吉凶之分九五剛中履帝位則羣隂雖盛莫能病之故曰聖人之大寶曰位王介父曰剝大者失位則不足觀矣毛伯玉曰四隂用事而謂之觀蓋専以九五當之大明當天羣隂消伏袁氏曰大者小之所觀寡者衆之所觀李仲永同爾雅曰闕謂之觀劉氏曰王者垂六典之象於象魏亦取是耳案卦疊艮畫有門闕重復之象故取於觀此實象也大觀在上此虛象也觀有三義門闕不與焉上之觀下下之觀上皆平聲讀與上之示下之觀如卦名讀右明卦義象贊曰風行地上觀先王以省方觀民設教取觀平聲義不取觀去聲義右明卦用序卦曰物大然後可觀故受之以觀案臨觀反對後乃取義如此非以物大可觀而設二卦也右明卦序盥而不薦有孚顒若贊曰盥而不薦有孚顒若下觀而化也觀天之神道而四時不忒聖人以神道設教而天下服矣林黃中曰可觀者二陽也觀之者四隂也九五為盥而上九薦也自下觀上近則覩之四隂之所觀者五而已至於上九隔乎九五觀瞻之所不及故曰觀盥而不薦觀在阼階薦在室寢阼階之下可得而觀室寢之中非衆之所覩也吕與叔曰荀卿云祭祀之未入尸也大昏之未發齊也喪之未小斂也一也斯得之矣李子思曰三陽體巽之德萬物於是而潔齊有誠敬化民之象而羣隂以坤順在下則有衆民信順之意故卦辭首觀盥而不薦即所謂神道設教者毛伯玉曰隂者鬼道也至幽之義也陽者人道也至明之義也祭祀之禮以其至明者託於至幽所謂以神道設教也是故薦者籩豆簠簋之設百官奔走各執事而主祭者盥而升當此之時在位者皆肅然主敬所謂有孚顒若也此理也與未占有孚之意略同楊中立曰古人所以交神而接人其道一主於誠故曰明則有禮樂幽則有鬼神幽明本無二理故所以感之者亦以一理所謂神道誠意而已案下之人觀盥而不及薦己有孚顒若矣其薦可知也觀以二陽得位而化四隂俾順而巽乎二陽不為小人消君子之事非如臨祭之誠何以俾之有孚而仰望乎我哉况誠莫重於祭以此事神以此臨民同此一誠天下亦將以敬神者而敬我矣不然從事於控制籠絡之術相欺相詐則有矣何孚之有右明卦象占初六童觀小人無咎君子吝贊曰初六童觀小人道也王輔嗣曰處觀最逺無所覽見故曰童觀馮當可曰觀以近為明初最逺故為童稚之觀林黃中曰隂為衆為小衆而小童子之象童子最在人後不能有所見案凡童蒙之象多陽位隂爻陽則男而隂則稚也唯其最在後長者在前不能有所觀也吕與叔曰以下觀上以隂觀陽近者得之逺者失之初六六二所以為童為女也案初位陽故為童二位隂故為女皆隂爻故為幼稚之象右明象程可久曰小人於道日用而不知故無咎君子童昏如此則吝矣楊廷秀曰小人無咎非無咎也不足咎也李去非曰小人日用而不知則觀道益神案大觀之君以神道設教於上百姓日用而不知乃其分也故曰小人道也無足咎也若乃君子則承流而宣化者也而亦無見焉則宜其取吝也李子思曰聖人於君子小人之際留意如此右明占朱子曰卦以觀示為義據九五為主也爻以觀瞻為義皆觀乎九五也右明爻義六二窺觀利女貞贊曰窺觀女貞亦可醜也陸希聲曰處內窺外女子之醜行然處不失位能正以自守故利女貞林黃中曰大觀在上近則覩之二雖與五為配去之尚逺是以謂之窺觀在禮女子迎送不出門見兄弟不踰閫雖有觀禮之心而不失自防之正斯其為利也朱子發曰坤為闔户窺外之象朱子曰隂柔居內而觀外窺觀之象女子之貞也故其占如此丈夫得之則陋矣案與五正應猶隔二隂故為窺觀夫隂雖隔於覿陽二終歸於配五不正視而竊窺已非正矣故贊曰亦可醜也唯其居中守正得隂陽之道故利於女子之貞貞則不為闕觀之行也易開天下以為善之門如此隂在下卦為貞得位亦為貞右明象占六三觀我生進退贊曰未失道也趙氏曰陽為德而主生羣隂之所觀仰也故陽以生為言隂為彼則陽為我故生以我為言生義難通曉姑從此說朱子發曰卦以九五為主我謂九五也說者謂三不當稱五為我當為三自觀其生然則當如上九之觀其生可也九家曰三欲進觀於五四既在前三故退未失道也石守道曰處兩卦之際有進退之象程正叔曰若居當其位則無進退之象矣張子厚曰觀上所施而進退李子思曰雖隂盛之世審其進退不敢直進以侵陽馮當可曰他卦三不中多不善二居中多善而觀以逺近取義故如此鄭舜舉同林黃中曰三四者內外之交進退之地也四之不為進退何也曰四已進乎上卦矣何退之云卦以九五大觀之君為主爻為賔故曰觀我生然四隂浸長能無消陽三猶在下卦未至如四之上進逼已故因其下卦可終而取進退之象夫隂無不進之理而亦有下降之義一進一退則不果於消陽易之扶陽抑隂每如此蓋去剝一間耳可不懼乎右明象占六四觀國之光利用賔于王贊曰觀國之光尚賔也楊中立曰大觀在上國之光也而四近之則觀國之光者也蘭惠卿曰九五以陽明居上是有光華者也王景孟曰觀以逺陽為晦近陽為明程正叔曰不指君之身而云國者當觀天下之政化則君德可知矣案九五二陽之內有國之象不曰大君尊之也尊之也者不使隂之切近而上僭也黃林中曰五居天位有王之象以四承五有賔王之象焉周官大行人以九儀辨諸侯之命等諸臣之爵以同邦國之禮而待其賔客朱子發曰古者諸侯入見於王王以賔禮之士而未受祿亦賔之馮當可曰賔之為言去其家以客於人而有所託也李子思曰居九五之位者知四隂並進為隂長之世賔而禮之使隂類反從而順化無以致其犯上之患此所謂以神道設教者歟四隂日長孰能遏之而聖人作易以垂世立教即爻象之有是理者以示天下後世三在下卦之終猶可止也故取進退之象四已離下體矣是在下者上進以逼五之陽矣故取人臣自下觀上之象以用賔於王家則利也如此則隂乃聽命於陽而為客爾為天下王者仍九五之大君也右明象占九五觀我生君子無咎贊曰覩我生觀民也鮮于子駿曰示民以生育之道朱子曰陽剛中正以居尊位其下四隂仰而觀君子之象也朱子發曰二陽為君子四隂上進本消陽也唯其居大中尊位四隂仰而觀之潛化於陽明之德而皆為順巽之人君子於此故可以無咎不然剝矣君子小人交相為養為君子者必示小人以生生之道然後小人無畔之心所以為無咎也右明象占上九觀其生君子無咎贊曰觀其生志未平也蘭惠卿曰九五上九皆陽剛九五居尊位上九則貴而無位九五有民上九髙而無民九五之觀我生者自觀也上九則觀其生者觀他人也其者指他人之辭又曰九五上九言君子無咎則小人有咎可知於初六言小人無咎則君子吝可知馮當可曰讀易至觀讀觀至上九則知為君子信乎其難也上九在傍竊觀九五之所生有間可乘則上九與五同類四隂亦皆嚮之唯五當位而有其權上九在外而無其位故四隂嚮五為五所有也五有失則四隂移以嚮上九矣故在九五為觀我生在上九為觀其生孔子識之曰志未平也我與五同德何五之獨有四隂已獨無有之之謂也李子思曰九五上九兩君子在四隂卦中皆獲無咎則以其體順巽之德而隂有以化服小人之類也順巽四隂二陽皆通用之唯所取義耳案臨二陽方長在上四隂爻皆吉而無咎觀四隂方長而在上二陽爻亦皆無咎以是知世之所謂咎者皆其人自取之也咎至而避何咎之有程可久曰四隂向長二陽向消君子宜有咎之時也故二爻皆曰無咎以見補過之義右明象占王輔嗣曰觀以所見為美者也故以近尊為尚六四尚賔逺之為吝初六君子吝趙氏曰以二陽在上為羣隂觀仰為義故下四爻以去陽之逺近為善否郭立之曰在下而仰上謂之觀平聲童觀窺觀觀國之光是也在上而視下謂之觀去聲大觀在上觀其生是也李季辨曰在上者為君子之觀去聲在下者為小人之觀平聲君子為人所觀者也小人觀於人者也右明六爻
