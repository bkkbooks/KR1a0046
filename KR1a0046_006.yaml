body:
  text: 厚齊易學卷六宋馮椅撰易輯傳第二經上篇屯蒙震下坎上屯贊曰剛柔始交而難生雜卦曰屯見而不失其居李季辨曰天地交而雷雨興天地晦冥難作而未明之象張舜元曰乾之氣下交於坤其卦為坎萬物始生於黃泉之宫其物向上於象為震尚為坎之寒氣之所難盤屈地下而未逹此所以為屯也林黃中曰天地交為泰交之始九五在上六二在下是以屯也按易之例二陽四隂之卦則論二陽之升降陽畫在下則以兊在內起例陽畫在上則以巽在外起例此卦初九陽畫在下則二當為九卦體為臨則剛浸長而四隂不能為難今九升於五而陷於二隂反為坎險震動而上則遇之此其所以屯也九五陽畫在上則上當為九卦體為觀則上能助五以正君位為下四隂之所仰望今九降於初則九五為隂所陷而初勢相逺不能助援此亦其所以屯也孔子之傳論剛柔之始交而未暇及此自隨以後乃始言之故得以發其所未言楊廷秀曰氣始交未暢曰屯物勾萌未舒曰屯世多難未泰曰屯詳見上三條郭立之曰天地無屯人與萬物皆有之故為人道之始蘭惠卿曰形質具而未生物生之屯也事業備而未行行事之屯也德澤積而未布膏澤之屯也鄭少梅曰坎中之一陽心君也震下之一陽志帥也善持志者必悟此象右明卦義象贊曰雲雷屯君子以經綸案此即動乎險中之意右明卦用毛伯玉曰天地始判則為屯屯者生民之初所以次乾坤也李氏曰自此以往其用無窮而卦各以序成其後矣李子思曰乾坤之後次以屯蒙此乾坤以生育之功付之三子也屯震下坎上蒙坎下艮上王景孟曰屯初建侯蒙二克家蓋謂是也郭子和曰易為三材之書然人道雜而多端無天地之純全故純剛為乾而天道盡純柔為坤而地道盡所以為易簡至於屯至未濟共為人道以配乾坤右明卦序元亨利貞贊曰動乎險中大亨貞李仲永曰物之始生皆具四端李子思曰震之一陽初來為主出為亨利而卒歸於正故傳曰大亨貞陽為大大者元也四德與乾同長子肖父故也郭立之曰四德非一於屯也屯之所得者屯之時與屯之事而已案屯繼乾坤之後得之一再索之初猶水之去源未逺也故四德具焉程可久曰震初九元之象也二五相應亨之象也各當其位利貞之象也程正叔曰處屯有致亨之道其唯貞乎能守正不變者鮮矣案震之一陽元也上通坎中之陽亨也九五當位利貞也毛伯玉曰方天地之始判也民生其間羣然無主紛拿相搏屯也久而漸有所歸所謂元亨利貞也此以天地之初言之右明卦象勿用有攸往利建侯贊曰雷雨之動滿盈天造草昧宜建侯而不寧正義曰此二句以人事釋屯之義都聖與曰以爻言之陽在一卦之內有不能往之義而於體為震有犯難而往之象故有勿用有攸往之辭焉趙氏曰震動于下而坎險陷之深以輕犯難為戒此明勿用有攸往凡爻之般桓亶如皆勿用有攸往之義都聖與曰一陽在內為衆隂之主而震有驚百里之義故有利建侯之辭吕與叔曰利建侯各付其所主也楊中立曰建侯所以自輔也使人各有主而天下定矣朱子發曰天造草昧人思其主能乘時衆建諸侯使人人各歸以事主誰與為亂哉郭立之曰厥初生民無羽毛以蔽其身無爪牙以充其欲則必求其羣而比焉勢又不足則必求其彊且大者而比焉此后王君公之所由立也此明利建侯毛伯玉曰於斯時也民利於得主無主則屯彼有主矣安用往也程可久曰險在前故勿用有攸往初未履位故利建侯馮當可曰唯多助乃可濟屯勿用有攸往者不可獨往唯建侯求助有可濟之理案大抵以震之一陽動於下乘人之思主就以立之則各安其分而足以為我之輔矣不然决非安於屯而不動者也彖曰勿用有攸往爻曰利居貞聖人之戒不亦深切而著明矣乎李子思曰封建要以親親相繼為義當自太子始震以一陽在下出而當監國撫軍之任以解屯者也或曰是亦可以占乎曰洪範稽疑三人占則從二人之言左氏所載多出於文王系辭之外顧所筮何如耳右明卦占初九般桓利居貞利建侯贊曰雖般桓志行正也李子思曰以一陽動於坎下未可遽進故有般桓之象程正叔曰以剛明之材當屯難之世居下位者也不般桓而遲進則犯難矣故冝居正而固其志凡人處屯難則鮮能守正者案屯之世非陽剛孰與濟者而九五居大君之位陷於羣隂拯而出之其責實在此爻夫一陽而承三隂决非在下之物震體之動亦非安於靜者聖人以坎險在前慮其輕動而犯難故以般桓象之又慮其畏難而遂止也復以利居貞告之欲其必進以拯九五之難也陽以復上為貞隂以居內為貞故曰利居貞乾坤之貞是其凡也諸說皆以初位陽九德剛為居正之象則是初九安于下而不可進矣唯李氏之說獨得其指見象贊右明象占贊又曰以貴下賤大得民也左氏曰畢萬筮仕於晋遇屯之比辛廖占之曰屯固比入吉孰大焉其必蕃昌震為土車從馬足居之兄長之母覆之衆歸之六體不易合而能固安而能殺公侯之卦也見閔公元年又曰衛襄公嬖人婤姶生子名之曰元孔成子以周易筮之曰元尚享衛國主其社稷遇屯又曰余尚縶元之兄跛尚克嘉之遇屯之比以示史朝朝曰元亨又何疑焉且其繇曰利建侯見昭公七年是時三易並掌於大卜唯以周易筮故以變比之爻占之程正叔曰方時之屯隂柔不能自存有一陽剛之材衆所歸從也朱子曰爻在成卦之主以陽下隂為民所歸候之象也郭子和曰聖人經綸建侯非自為也為民而已為民而得民其難濟矣夏商之季湯武其盡之毛伯玉曰五為大君自後世名分既正言之爾生民之初君臣之位未定也傅我者因而親之傅彼者因而聼之天下有可一之勢而不必盡一屯以初為主故此一爻盡屯之義而以餘爻為之客以究其義蒙困之二震之初皆然又曰利居貞者其利在我利建侯者其利在民右明建侯趙氏曰以陽居震動之始又在五位之下真濟難之材也一卦之義實具於此李子思曰屯為太子用事故彖辭唯此爻當之易以屯次乾坤蓋以太子代父母而經綸也毛伯玉曰震者乾坤之初交天之長子也乾坤主造化長子主天下右明爻義六二屯如亶如乘馬班如匪冦昏冓女子貞不字十年乃字贊曰六二之難乘剛也王輔嗣曰困於侵害故屯亶也程可久曰與初九近不相得而乘剛為疾故屯如亶如應五而失初故乘馬班如也李季辨曰無濟屯之材故欲進而不能進蘭惠卿曰凡爻言馬者陽爻也賁之白馬睽之喪馬大畜之良馬明夷渙之拯馬中孚之匹馬皆指陽爻也林黃中曰初非二之所乘故有班馬之象案二陽爻馬也四隂乘之者也當屯之時故欲往而不果有班如之象曰屯如亶如者乘初之難甚於四上二爻也右明象王輔嗣曰志在五不從初無初之難則與五昏矣馮當可曰初冦二者也二欲應五而不得應屯之象也自己行藏它人得而制之者隂柔故也林慎微曰冦莫大於隂陽見莊周隂以柔靜為正則陽為之冦陽以剛動為正則隂為之冦張舜元曰初九震為決躁有彊暴之男之象程正叔曰初賢明剛正而為冦以逼二何也曰据二以柔近剛為義不計初之德也石守道曰止論本爻之事吉凶悔吝爻各不同若六爻之義上下相通無以見其事之變也贊又曰十年乃字反常也張敬夫曰屯者其物之初也與故有女子昏冓之象吕與叔曰女子者常其德以待正而不可與權者也凡易之情近而不相得則凶或害之悔且吝屯者人求其主之時六二欲求其主而初不相得以為之難也案彖爻有婦有婦人有女有女子婦有夫之稱婦人言其為母也女未有夫之稱女子言其為子也此言女子何也以有所怙也以有所怙故乘剛而不失正也其有所怙何也以九五為之應也李子思曰貞不字者守五之正應不許初求合也林黃中曰夫婦之道男先下女女乃從之君臣之義君先下士士乃應之夫士之仕猶女之嫁也不曰士貞而曰女子貞者女子待禮而行其守貞不可犯尤嚴也女子亦隂柔之象雖然男女之情室家之願隂陽相求自然之理也二守其正有五為之配其終不字而已乎數終必變運周必復二五相易昏冓字矣雷雨作解其十年之數乎李去非曰二位交五則成坤矣十年坤土之成數也正義曰十年難息之後初不為害乃得往適於五馮當可曰十年而後從亦已晚矣是亦屯也劉氏曰凡患之辭於患之輕則曰三年其重則曰十年亦有言十年以見其終不可者蓋孽由自作之甚也案卦二陽在下九自二往居五六自五來居二故成屯然二五之交終各反其故居非若初之相近而已也况皆中正者乎故雖迫於剛難而五陷於險其終必合易凡陽言日隂言月以其近也陽言年隂言嵗以其逺也右明占正義曰因六二之象以明女子昏冓之事其餘人事亦當法此如有人逼近於彊難逺有外應未敢苟進被近者所陵經久之後乃得與相合是知萬事皆象於此非唯男女而已諸爻隂陽男女之象義皆然程正叔曰以女子隂柔苟能守其志節久必獲通况君子守道不回者乎都聖與曰女子臣之未受命之象王景孟曰君子守道不回不苟合而失正此女子之貞而忠臣之義也案上有剛明之君為羣小所蔽膏澤不下流時之屯也有材足以解屯者而起於下且有求士之意士之不歸之者鮮矣有一人焉其材不足而確守君臣之正義此之而不傅迫之而不應寧困躓而終期於君之我知此伯夷居北海之濵以待文王之興者也李氏曰若六二者守正則其志有餘濟難則其權不足馮當可曰人君欲平治天下得如此人材安得有成雖乃心國家無益於緩急也前一說主本爻而言此一說主九五而言主本爻言之則雖無材可以拯君於屯而志不可奪主九五言之則唯求剛明之材以解屯非柔弱者所可濟也此所以利於建初九之侯乎右明爻義六三即鹿無虞唯入于林中君子幾不如舍往吝贊曰即鹿無虞以從禽也程可久曰九五在衆隂之中有林中之象王景孟曰虞人山林之導也入於林而無其導焉徒往也上六處一卦之外而非其應也故有無虞之象吕與叔曰二四皆有正應爻居其間逺則無應近不同志而倀倀然欲進猶求即鹿而無虞者也劉氏曰古者田獵則虞人萊所田之野而植表焉不敢越此以從禽也易多以田之所獲况君子之成功右明象贊又曰君子舍之往吝窮也耿睎道曰體決躁之性居動之極非君子不能舍也馮當可曰若小人無深謀逺慮有以禆補於時徒欲遂其躁妄之志其終也不誤國家即自誤其身者多矣趙氏曰幾不如舍亦勿用有攸往之義王介父曰夫屯之時可以有為而非可舍之時也時欲有為而從非其應殆不如舍之愈也不舍而往雖君子不能無吝矣朱子曰吉過則悔既悔必吝又復吉如言動而生陽陽動而靜靜而生隂靜極復動悔屬陽吝屬隂案易以吉凶明得失而多為悔吝無咎之辭何也天下之理唯中則合道得中則吉失中則凶未至於失而不盡乎中者則有過與不及過過也不及亦過也故悔則知過而必改吝則知過而不肯改必改則無咎而趨於吉不肯改則有咎而趨於凶先儒以吝為羞失其義矣書曰改過不吝古有此語也所以說卦止言吉凶悔吝生乎動而不言無咎無咎者善補過而無悔吝之失不在吉凶之域也右明占王輔嗣曰近五而無冦難四應初而不妨己路可以進而無屯邅也程可久曰在隂爻之中於二陽之事獨無所與故不稱馬李季辨曰居下卦之上為衆所推故有即鹿從禽之志李子思曰初九為用事之主而九五為人君之位居屯之世不應初則應五應初者相與濟難者也應五者相與尊王者也各唯其正而已矣三在諸爻之中絶無應援獨上六是為正應而兩隂相遇則又不能相與為應者也以隂柔之質出居陽位震體之極躁而思動不能班馬以待而急於逐鹿前遇坎險必招吝矣案五陷于二隂已處下卦之上震動之極望五一間但隔四耳四乃五之鹿也如田於野而望山之鹿可幾而即也急欲拯五之難故有從禽之志然上為已應而兩隂相遇不能相援如入而無虞者也約象為艮故有山林之象動極必往艮以止之又居下卦之終故有幾不如舍之象右明爻義六四乘馬班如求昏冓往吉無不利耿睎道曰屯者經綸之時也故乘馬而欲行李仲永曰四與初應乘初之健進有九五之比退有初九之應故班如朱子曰陰柔居屯不能上進故有班如之象案四乘初之應而其材柔弱不能以自濟九五之屯故班如以俟初與之偕往也右明象贊曰求而往明也蘭惠卿曰初九以爻言之則為賢以應言之則為昏冓四居近君之位於是班之而求於內初九應之而往於外以佐九五剛明之君如是則吉無不利先儒乃謂初求而四往不知易之言往者皆自內之外也鄭舜舉曰近五而五陷於屯初之得民乃四之昏冓求初而往濟於五則事上之義馮當可曰天下方屯已為大臣任天下之責而柔弱不足以濟方且求在下之賢以助之宜有補於事功案屯之時其君陷於險而不能出左右皆柔弱無解屯之材唯一初九又逺在下宜無元亨之理矣然九五剛明中正非終不能濟者六四居近臣之位與初為應乃求之而相與以往輔其君以解其屯功不必出己而祇務以濟難此所以吉無不利獨擅于諸侯者乎或曰隂不先求陽曰屯蒙二卦義皆如此借昏冓以象之耳不可膠柱以言易也右明占馮當可又曰人主觀此爻象必欲經時濟物大臣有可任者専任之不可者速退之使初四兩易其位則無屯矣然則所以致屯亦由五也不拘文王孔子之辭此為善學易或又曰古之大臣親諸侯以安王室者其四之謂乎亦通右明爻義九五屯其膏小貞吉大貞凶贊曰屯其膏施未光也王介父曰膏者陽之澤李子思曰坎為水膏也屯之時名分未定乃以剛中之尊下應六二而不逺求初九故其施不博而有屯其膏之象王景孟曰五履尊位而陷於羣隂則五乃致屯之主也剛明中正非有失德也特以膏澤不下而民心不歸思亂者衆故屯也右明象林黃中曰陽為大隂為小大者五也君道也夫道也小者二也臣道也妻道也五正也二亦正也李子思曰小者貞固則吉大者貞固則凶猶恆其德貞婦人吉夫子凶者也李仲永曰小者無以出險故貞則吉大者必思所以出險故貞則凶案二守女子之貞此小者之貞也十年乃字則吉矣五不能博求上下之人材以共解一世之屯徒以陷於二隂之中而不能出乃以隂陽之情下守六二之正應二隂柔不能有濟此大者之貞則凶也右明占楊中立曰陷乎險中乘隂而無輔欲有為而力不足也此人君之屯也鄭舜舉曰初與五皆陽剛也初位乎下乃大得民五位乎上乃屯其膏何也草昧之時必有奪乎下者初為動之主勢必上行此民之所歸也五坎體也坎者陽陷也居屯而有所陷徒擁其位者乎楊廷秀曰以剛明之主宜其撥亂反正有餘也然其澤猶屯者有君無臣故也上與四近臣則弱三逺臣則尤弱唯一初九逺而在下然則將欲有為誰與有為郭子和曰見掩於二隂女子小人皆隂也能掩君德者也能屯君澤者也人君惑之乃自致其屯也馮當可曰屯至於五猶可以為也五者陽也猶曰賢君欲有為而未得臣也至於上則無可為矣右明爻義上六乘馬班如泣血漣如贊曰泣血漣如何可長也蘭惠卿曰所乘之馬九五之陽也林黃中曰五非上之所乘故亦班如李子思曰屯難之世未可遽進故諸爻求應皆班而有待乃若上六處險之外乘馬以出無所適從痛時之窮閔道之屯而泣血漣如也郭立之曰二之班如待五之冓也四之班如待初之往也上六班如獨無所待進退不决而自傷耳五非所乘故班如前無所向故泣而繼之以血也林黃中曰舍其班而適三三隂柔而非耦坎為憂傷為心病為血卦處屯之極故備此象正反皆坎則漣如之象也與五為鄰舍之而去倀倀然無所之途窮泣血不亦冝乎胡翼之曰泣血相續無所訴也王介父曰易之辭有泣有出血未有泣血者遇屯而道大窮右明象占都聖與曰隂而不明柔而非據雖坎有趨下之情而三莫之與也劉氏曰屯之終人盡歸其主矣班如何待其泣血宜也程正叔曰若陽剛而有助則屯極可濟矣程可久曰乘五而逺初於二陽皆相失故泣血漣如知危懼禍而不言凶傳謂之何可長者言當變也李子思曰易之道窮則變變則通未有終窮而不變者若窮而不變則何以為易故乾坤之後必曰用九用六者舉乾坤以例餘卦也世有知易之深者當自得之王介父曰困之上六亦乘剛上窮而無應乃以征吉何也在兌之終以說而散也其無應乃以免乎險也屯終於坎故窮而不能變李季辨曰唯項氏當之其辭與垓下之事同易止有一推來藏往之理後世變故自然吻合右明爻義王輔嗣曰此一卦皆隂爻求陽也屯難之世弱者不能自濟必依於彊民思其主之時也故隂爻皆先求陽馬雖班如而猶不廢不得其主無所馮也初體陽爻處首居下應民所求故大得民也馮當可曰九五陽也而陷於羣隂之中必得剛明之材如九五之類者為助則可以解屯初九其人也然非正應又蔽於三隂盤桓而不得進豈得不屯邪使初九進而為九四則不成屯矣張敬夫曰非廣求賢才以輔助不可也初九之利建侯六四之求昏冓兹處屯之道乎都聖與曰屯雖人求其主之時又惡不由其道而往君子有待求而後應者有守正而後從者若夫惟其應而不舍則吝失其主而猶待則窮此六三上六易之所以戒也李子思曰屯之世初二四五隂陽之畫相應有相與濟屯之理而三上二爻既窮且泣則以其兩隂不能相應故也易之六爻其隂陽之應得失蓋如此嘗考六爻之辭曰般桓曰亶如曰班如曰屯其膏不間剛柔承乘皆以屯為義蓋易窮則變變則通而屯窮則蒙繼之前又五坎所以窮而不能通也右明六爻坎下艮上蒙贊曰山下有險險而止蒙楊中立曰險在上往斯陷險見險而能止蹇之所以為知險在下往斯出險險而止卦之所以為蒙耿睎道曰險在前則貴止止則不犯險也險在內則貴動動則免乎險也朱子曰險在內止在外已先自不安外又不可往蒙之象也林黃中曰瞽謂之蒙童謂之蒙暗謂之蒙蔀謂之蒙石守道曰物之初生蒙蒙然人之初生者未知所向又有長而懵於道暗於理亦謂之蒙書蒙士是也李季辨曰泉之始出泥沙不混莫清如之性善之端也既出而混少加澄治元性固在猶之學焉所以反其初也本性之外未嘗加益曰聖與賢不過存得童蒙之心在故孟子論性善之端必自孩提之童推之揚子雲謂天降生民倥侗顓蒙未害也必曰恣於性情聰明不開然後訓諸理則失聖人論蒙之義矣案山下有險而不通蒙之象也水性趨下今止而未决蒙之義也雜卦曰蒙雜而著序卦曰蒙者蒙也物之稚也右明卦義象贊曰山下出泉蒙君子以果行育德右明卦用序卦曰物之始生也物生必蒙故受之以蒙李季辨曰以蒙次屯只是反對李子思曰乾坤之後次屯震以太子出而用事也坎艮二男當用晦以避之故坎艮相重繼屯之後而其卦為蒙右明卦序亨贊曰以亨行時中也朱子曰九二內卦之主以居中能發人之蒙者而與六五隂陽相應有亨道焉程正叔曰水必行之物始出未有所之故為蒙及其進則為亨蒙有開發之理亨之義也林黃中曰蒙而後亨非謂蒙有時而亨也凡物之生形氣未定無以蒙之則暴露發散而不能以條暢遂茂人之聰明亦猶是耳李季辨曰蒙而亨善端之發也就其發處推之無非天理也鄭少梅曰童子目未廣見耳未廣聞者心識未通耳心識通則耳目見聞不足道也案說者多以發蒙言亨義非也蒙自有亨之義焉耳九二陽明在內卦之中心性之象也陷於二隂止而不能出所以蒙也然陽明必有發逹之時知識無有不開明之理暗必資明羣隂相求亨之道也匪我求童蒙童蒙求我贊曰志應也李子思曰二以剛居中是為陽實有餘此教者之象五以六居尊是為陽實不足此則童蒙之象也有餘則應不足則求朱子發曰二在內不動有剛中之德以自守匪我求童蒙也王輔嗣曰隂暗而陽明凡不識者求問識者不求所告暗者求明明者不咨於暗故童蒙求我匪我求童蒙也李氏曰凡童蒙必求於先覺以資其明唯能知所求則心已有所嚮矣從而發之為功也易不知所求則心無所嚮而先發之雖勞而不喻故先覺者因其求而應之耳禮聞來學不聞往教蓋謂是也程正叔曰二以剛中之德在下為君所信嚮固當自守以待求已而後應蓋其尊德樂道不如是不足與有為也楊中立曰湯之於伊尹學焉而後臣之伊尹非有求於湯也右明卦象初筮告再三黷黷則不告贊曰初筮告以剛中也再三黷黷則不告黷蒙也游定夫曰易於致誠以謀亦以筮言之非假布䇿也蒙之初筮致一以有求比之原筮再思以有擇李氏曰初筮者志一以求决也從而告之則罕譬而喻筮者再三則煩數而志不一內已惑矣又從而告之是益其惑也程可久曰筮以决疑告之而不我用是不以其占也雖再三而黷終亦不果用矣黷則不告此不屑之教也不告者上卦有止象朱子發曰六三六四不與二相應再三黷黷則不告也隨其屢問而告之决之不一不知所從則必燕辟廢學非亨蒙之道也案易尚象占故設占筮以言教者學者之事自義言之筮至再三也自象言之則為三人同筮也隂爻蒙也則筮者也九二發蒙也則告之者也隂性善疑故筮以求决初最先筮近二而嚮之故告三應上而背之四五應而逺之故不告三為再四為三者二為發蒙不在其數也通三至上有艮止之象不告之義也表記子曰無辭不相接也無禮不相見也欲民之毋相褻也易曰初筮告再三黷黷則不告此旁通取喻義不相蒙褻謂黷也然四逺於二無褻義利貞贊曰蒙以養正聖功也李子思曰一徹其蒙則心之四逹有接物而為正者亦有接於物而流入於不正者唯不失其初心是之為利貞李季辨曰能貞守童蒙而存之則本然之性見而無所偏倚矣張敬夫曰記云幼子常視無誑書云若生子罔不在厥初生蓋童稚之時表裏粹然純一不雜人欲未起天理實存謂之大人者守此而已謂之小人者失此而已毛伯玉曰人生之初唯其蒙也所以未失其正也既失而後收之則其正已不醇矣是故養正之利莫利於蒙非蒙之利而利其未失正也案贊飬正之義凡易以六位言貞則主上一爻或九五以隂陽言貞則陽上而隂下其餘則以隂陽當位爾此謂上九也九二陽明之性為隂所蒙至上則蒙徹矣上之陽明即二之陽明同此一性也蒙徹則易失其正故利於貞以九居上貞也李子思曰始言亨終言利貞不言元者一元之氣蒙於中抑以避震陽之元也案諸卦言亨利貞多矣無稱元者元亨元吉之類蓋為亨吉而發不專言元也豈非乾坤之元默運於造化之表而散在諸卦皆其出為亨利貞者與右明卦占朱子曰筮者明則人當求我而其亨在人筮者暗則我當求人而其亨在我人求我者當視其可否而應之我求人者當致其精一而扣之而明者之養蒙與蒙者之自養又皆利於以正也案彖言六爻之象亨與童蒙相求謂二五也初筮再三謂初三四也貞謂上也右總明彖義初六發蒙利用刑人用說桎梏以往吝贊曰利用刑人以正法也都聖與曰隂晦之性下愚不移則有不師教之象比於九二之剛中則有啓迪而禁止之象案隂柔居初繼屯始生之後童稚之蒙也其質隂暗蒙之未開者也其位最下下愚不移者也亦為小人之蒙故有用刑之事石守道曰二以陽明下照於初故初之蒙得以發也趙氏曰隂爻必求陽以發其䝉然唯切近於陽而下之者則有可發之理又曰發蒙之道但啓其未開之明而已明固彼之所自有非發蒙者所能加損益也既啓之矣則蒙去而明自開非於發之之際有明以與之也李子思曰决蒙者當决之於初故作易者因借初爻以論發蒙之義案初上以事本末言發蒙者必於其初以其切近九二發蒙之人故明其義右明象蘭惠卿曰物之所生必有善惡善則逹之惡者禁之李季辨曰以六處下小人之蒙也小人不畏威則不能寡罪故發其蒙當用刑游定夫曰下民之迷若以物蒙其首也今欲發而示之以好惡則且不見利不勸不威不懲罰一以警百然後蒙者畏刑之將至相與從上之所好而避其所惡故其蒙可得而發也李子思曰嚴而警之於始則知所趨避而終身無復麗於刑者此用說桎梏之道也胡翼之曰若其性識至昧以犯教化則當用刑以正之久在蒙昧至遭桎梏始曉悟而自悔則又當肆赦之郭子和曰或疑聖人先刑後教非也發蒙所以教之也用刑所以輔教也此明於五刑以弼五教之意案伯夷降典折民惟刑用此道也坎為刑隂居大冬之象又為陷上體艮手互體震足俱陷於初隂桎梏之象坎趨於下艮止於上有說之象王介父曰發蒙辨之於蚤也利用刑人懲之於小也不辨之於蚤而至於上九則擊之然後能勝故有擊蒙之辭焉不懲之於小而至於上九則桎梏不能制故有禦冦之辭焉不能正法以懲其小而縱之以往則吝道也案初上以事之本末言况二陽在下之卦當以兊體承坤今六自上來初以隂掩陽所謂蒙也九自初往外有禦寇之象義尤相關夫不能發其蒙於初必至擊之於其後不能說桎梏於其始必至為冦於其終待其終待其為冦而禦之則不可正救矣故曰往吝此言下民之蒙都聖與曰天降生民倥侗顓蒙人之生未嘗不蒙也蒙則所見不明必待乎有以啓之所為不善必待乎有以制之時過而後學則勤苦而難成發而後禁則扞格而不勝自茲以往則過而不改矣此明吝之義尤善李子思曰九二職教者之事其唐虞朴作教刑者邪記曰夏楚二物妝其威也其是之謂也張舜元曰聖人知童蒙之未知所適不得明者開導之或流而為不善故設學校立明師敷五教申其孝弟忠信養之以正者也其有不率者又明五罰以禁之使天下後世同歸於正者聖人教養之功也此言學者之蒙王景孟曰禁于未發之謂豫書曰制官刑警于有位用訓于蒙士初隂暗未明所謂蒙士也此言士夫之蒙右明占馮當可曰䝉特取初終二爻著用兵刑之理以為訓案䝉不但物生之稚凡昏迷不恭者皆䝉也鄭少梅曰童䝉在五擊之在上是外學也包䝉在二發之在初是內學也右明爻義九二包䝉吉納婦吉子克家贊曰子克家剛柔接也蘭惠卿曰凡易之言包者皆自外而包內泰之包荒否之包承姤之包有魚瓜皆自上包下也程可久曰包納䝉昧家道尚恩案䝉謂初之稚也猶一家之卑幼也右明象李氏曰唯剛中則有夫子制義之宜故納婦吉林黃中曰婦之初歸未習夫家之事猶童䝉也納而教之書曰觀厥刑于二女此之謂也毛伯玉曰曰包䝉又曰納婦是二吉者不可偏廢也案三在下體之上隂之長也故有婦道在外故曰納聞之曰易以男女明隂陽之情屯䝉人道之始故多言昏冓之事程正叔曰以家言之五父也二子也二能主治䝉之功乃人子克治其家也又曰子克治其家者父之信任之専也二能主治䝉之功者五之信任之専也楊廷秀曰五求二而二匪求五乃曰子克家何也臣之事君如子事父責難訥誨陳善閉邪正使致君以堯格君於天如伊尹周公亦臣子分內事耳亦如子之克家耳非功也羣隂歸二而五以隂暗柔弱居尊位聖人懼其柄之下移也故以父子君臣之大分曉之右明占代氏曰二具三善蘭惠卿曰初六隂暗九二包之六三隂柔九二納之如是皆吉六五君也父也九二陽剛之臣子之克幹其家者也本爻雖以剛中而有發䝉之資然猶在坎險之中不過包納隂爻之比與承應者而已未能盡去諸爻之䝉僅如子之克家非可盡専其事也此六四所以獨為困蒙而吝與李氏曰凡暗於理者皆謂之蒙若書之蒙士是也父不慈子不孝夫不義婦不順皆蒙唯九二剛中得包蒙納婦克家之正陸希聲曰上九為國師九二為家師故曰子克家亦可旁通案卦有二陽治蒙者也上過中無位此爻居中應五克當其任者也猶泰之九二居下體之中而任上下之責夫二隂皆坎一家之事也能包養幼稚聽納其婦則為克家之子矣不言吉者以包蒙納婦為吉也李子思曰震以建侯而有經綸之功此長子事也坎以剛中而有克家之能此次子之事也艮以順巽而得童蒙之吉此少子事也乾坤三子之用至是各得其冝矣右明爻義六三勿用取女見金夫不有躬無攸利贊曰勿用取女行不順也程可久曰勿用取女指正應者言之也蘭惠卿曰在九二則為納婦吉在六三則勿用取女所處之位中正不同故得失亦異在九二所處之中正六三以近而相得則納之為婦已正則物正也在六三不中不正乃舍正應而從所比故戒筮者勿取之失正不中則大節不足觀也義各有主焉耳程正叔曰隂柔蒙暗不中不正近見九二為羣蒙所歸得時之盛故舍其正應而從之女之見金夫者也劉長民曰稱見自上窺下也朱子曰以金賂已而挑之若魯秋胡之事者案易設象不必有是事金取其剛蓋謂彊暴近而相得故以為夫然若秋胡之事亦可以言張舜元曰應乎上九之艮艮為躬三坎性趨下下見九二之金夫不有上九之躬此其取象如此郭子和曰見利忘身不可取也蘭惠卿曰凡易言金皆指陽爻九乾之䇿乾為金胡翼之曰以隂柔居陽位不正也比近九二陽剛之人而遽從之不有躬者也故戒以勿用取此不正之女女之不正必蠱其一家之事猶不正之臣以此道事君必害其治復何所利哉右明象占李氏曰屯之六二近初九之陽而正應在五然震之性動而趨上舍初而歸五故曰女子貞不字十年乃字此女子之屯者也蒙之六三近九二之陽而正應在上然坎之性陷而趨下舍上而從二故曰勿用取女見金夫不有躬此女子之蒙者也程可久曰屯難在時而六二中正蒙暗在性而六三不中正兩失故也石守道曰以柔居陽處下卦之外失隂柔居內之道王景孟曰昧其所適至於喪軀失德蒙不足以盡之故此爻獨不言蒙都聖與曰學者之義當謹其從苟失其所當從而比所不當從則兩失之矣夫理之當從者雖逺已而不可違理之不當從者雖近已而不可比此以發蒙之義言也抑又聞之是爻蠱之變女惑男也故有不有躬之義右明爻義六四困蒙吝贊曰困蒙之吝獨逺實也王輔嗣曰獨逺於陽處兩隂之中暗莫之發故曰因蒙張舜元曰獨止其所上不資於上九下不資於九二困而不學終於蒙而已李子思曰以隂居隂而又承乘所應皆隂蒙暗之甚者也易中陽為明隂為暗隂麗於陽則其明乃開故曰蒙雜而著蒙必資人以發明者也是故隂資陽以為明月遡日以為光無所資以發明是以謂之困蒙右明象蘭惠卿曰雖處因蒙履得正位凶非所致故唯稱吝右明占胡翼之曰自古聖賢未有不由擇師取友親仁善鄰以成者也李氏曰居不擇鄉游不就士則無以近於中正終為蒙而已困而不學民斯為下矣然謂之為吝者聖人無絶法也以為天下之蒙皆可教也苟能改而隆師親友則困知之與生知學知及其知之一也右明爻義六五童蒙吉贊曰童蒙之吉順以巽也朱子曰柔中居尊下應九二純一未發以聼於人故象為童蒙馮當可曰屯為物生之始繼始生之後即為童蒙也程可久曰未有知識之時承上而應二能資諸人以取吉者也案六五之時以童蒙自處則吉矣所以能吉而其蒙可發者以內藴五之陽明也童之為象不一或為童觀或為童牛要皆耦畫隂數也人生十五而成童蒙物之稚也至為之主而居尊位則蒙之成童者矣或者猥以艮之少男為說然不言於上而言於五其義已不通況例之童觀童牛其象不亦異乎致吉之道孔子以為順以巽荀慈明謂順上而巽二是也案承上應二皆所資以發明者也蒙之六爻四最吝者以承乘與應皆無陽餘爻各一其應乘與應為陽者唯六三六五而六二承陽又不正與六五異六五中正履位又承陽明則有師事之義是以獨為吉也或者止以應九二為義豈非以彖辭謂童蒙求我乎夫彖者統論一卦之材爻者止言一位之象義各有主不相亂也不然九二止當以六五為義而包蒙納婦又何象之不一乎唯善變者可以言易右明占楊中立曰居尊位而下求九二之臣不挾貴也以童蒙自居不挾長挾賢也成王之於周公用此道也李子思曰此以少主當極者也能孫志務學俯從道德之士學焉而後臣之故傳曰順以巽也右明爻義上九擊蒙不利為冦利御冦李去非曰陽為擊蒙為發蒙朱子曰居上過剛故為擊之象吕與叔曰蒙而怙終不可教也故至於擊郭立之曰不能發之於初終至於過而後擊之非特教者之不至蓋積惡不移之資如何校滅耳者也楊廷秀曰上者蒙之終故不化九者陽之窮故必擊趙氏曰超乎諸爻之上出乎其類此足以去衆人之蒙者也此說亦通張舜元曰諸柔皆蒙其不蒙者唯二剛而二則以剛居中包蒙以開其善上則剛而過中擊蒙以懲其惡毛伯玉曰二陽之於蒙也必有以發之既不可發則包之不可包容則擊之是三者同一理但施之有次第耳非謂九二能發之包之而上九能擊之也右明象贊曰利用御寇上下順也王介父曰夫不能發蒙於初以懲之於小使之浸長則治之不能勝而冦亂作矣蘭惠卿曰非其有而取之之謂冦六五為九二之正應而近本爻若本爻近取六五則是為冦六三為本爻之正應而近九二若本爻取六三之正應而禦九二之為寇則順案陽剛在上治蒙者也又為剛復怙終蒙之不可誨諭者也艮為手故曰擊六五九二之正應也近而若相得則有寇之之象然以二陽在上之卦例之則當以巽乘坤今九自五來二六自二往五其情相求則冦之不利至若六三之與本爻素其位而行者也九二近六三而欲冦之則本爻禦之自上而下其勢為順無不利者矣或曰五方資上以迪其童蒙而三已見二之金夫何占辭之反是乎曰易之各爻取義正不如此右明占李氏曰三苗之逆三監之畔皆以蒙為寇者也朱子曰扞其外誘以全真純雖近於嚴乃為得宜故戒筮者如此凡事皆然不止為誨人也李子思曰陽剛之材與九二同然超然於外卦之上此帝者之師抱負道德而不肯居位者也雖不居位而切近六五朝夕於人君之側擊去不正之人所以為蒙蔽於人主者也右明爻義王輔嗣曰夫隂昧而陽明隂蒙陽能發之故四逺於陽則困蒙初比於陽則發蒙也五應於陽則童蒙吉案初上事之本末故言發蒙擊蒙之義主教者言也二三以男女之義言教者之事以明蒙之可教不可教者也四五直言蒙者之事以明其質之可受教不可受教者也抑聞之曰屯蒙反對也故蒙之二至上與屯之初至五爻義略同所不同者屯之上九與蒙之初耳蓋乾坤純體之後剛柔雜居之卦昉乎此故文王特發此例若其餘爻義有與他卦相似者亦互見之特非全卦也右明六爻
