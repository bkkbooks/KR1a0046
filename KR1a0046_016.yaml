body:
  text: 厚齋易學卷十六宋馮椅撰易輯傳十二經上篇大畜頤大過乾下艮上大畜案大畜大其所畜也所畜之大則與小畜同義矣贊曰剛健篤實輝光日新案此贊其德非釋其義孟子充實而有光輝之謂大蓋出於此雜卦曰大畜時也馮當可曰艮止乾健健在下安肯止而不升艮自是止體二陰下應初二兩爻陰陽感而自止所以為畜石守道曰乾務上進而為六四六五所止不能行也林黄中曰虛則能畜實豈能畜也哉郭立之曰易之稱大者凡四卦趙氏曰乾健上進而為艮所止故有畜之義艮陽卦也陽為大故曰大畜毛伯玉曰小畜大畜所畜皆乾所别者艮巽耳是故以大畜大謂之大畜李子思曰以陰畜陽所畜之力小故謂之小畜以陽畜陽所畜之力大故謂之大畜程正叔曰畜止也聚也止則聚矣大小畜之分義亦不一毛趙李之說本指也然旁而暢之大畜二陰所虛者廣故大其所畜小畜一陰所虛者狹故小有所畜又風行天上陽氣之升風散而畜者少天在山中陽氣之升山止而所畜者多皆以畜乾為義非所畜之小大也乃知天地間萬理萬物何所不有隨人所受之多寡以畜諸已耳程可久曰大人之所蘊畜也郭子和曰无妄動以天大畜止天徳李子思曰易以大畜為畜賢之卦三陽上進而艮則止之猶之賢人並進而賢主畜之之象程正叔曰在人為學術充積於内右明卦義象贊曰天在山中大畜君子以多識前言往行以畜其徳右明卦用序卦曰有无妄然後可畜故受之以大畜程正叔曰无妄則為實故可畜聚林黄中曰无妄之反也乾反居下震反為艮二五三四相易而成大畜震反成艮動而能止也乾反居下尊而能降也二五相易上下能相與也右明卦序序本反對而誠實在中中畜天理故為大有所畜之義利貞贊曰其徳剛上而尚賢能止健大正也楊中立曰言上九也張舜元曰泰變坤之上六為艮以剛上有大正之徳蘭惠卿曰大壯九四之剛往為大畜之上九為六五之君所尊尚大者之正也案陽以上復為貞四陽在下之卦體成大壯今九自四升上則陽之貞也故曰利貞程正叔曰人之蘊畜宜得正道若夫異端偏學所畜至多而不正者有矣李子思曰方否之時不利君子貞今大畜遇剛上尚賢之主則君子利貞矣林黄中曰利貞云者以明无妄之為元亨也震者始也艮者終也贊之互文見義皆如此右明卦象不家食吉贊曰養賢也表記曰故君子不以小言受大禄不以大言受小禄也子曰不家食吉注君有大畜積不與家食之而已必以禄賢者鄭舜舉曰養賢以及萬民若家食之則非大畜矣案食讀似聲言君有大畜積不家至而食之也禄養賢者而已正義曰以在上而有大畜之實養此賢者不使賢者在家自食也程可久曰尊賢使能與享天禄主人君而言蘭惠卿曰三賢受畜於上而不家食馮當可曰君能以至尊屈體下士陰柔應剛賢者不當食於家林黄中曰乾為君子有賢徳之象艮為山有養人之象三陽並進而受畜於艮是以知其不家食郭子和曰賢不家食禄之也書云唯賢非后不食蓋古之人不仕无禄則耕而食之食於家也仕而禄足以代耕則不耕矣非家食也主賢者而言鮮于子駿曰上九能納乾健又居外卦之上故曰不家食吉周公吐哺下士得上九之義案詩退食自公言從事於公而退於家也此言夙夜在公而不食於家爾諸家皆依傳為說而不同今並列之以俟知者利渉大川贊曰應乎天也馮當可曰乾健有為而五應之故有利渉大川者九非遇乾即巽蓋乾健行而巽以木也或曰小畜以陰畜陽大有以柔有剛皆應乎乾而无利渉之辭何也林黄中曰小畜大有皆一陽五陰天下之動貞夫一故无險閡之象大畜上有二陰六四居近君之位而下畜三陽是以有大川之象也昔周公相成王而羣叔流言㡬䘮王室故曰予小子若渉淵氷予唯往求朕攸濟都聖與曰以剛居上而畜賢髙宗之於傅說用汝作舟楫之謂也右明卦占初九有厲利己贊曰不犯烖也王輔嗣曰四乃畜已進則有厲止則利也石守道曰乾雖剛健前遇山險程正叔曰乾三爻以受畜為義艮三爻以畜止為義初以健體居下必上進者也而六四畜之安能敵在上得位之勢若犯之則有厲利在己而不進也在他卦則初四九六為正應在大畜相應乃為相畜李子思曰乾陽之健從艮所畜則是止而聽命為艮之用體艮而在上者非獨得養賢之義而又能操馭臣之權謂之大畜冝哉毛伯玉曰易道尚變明者晦之健者抑之非唯天道亦物理也故有厲則利於止愛之以徳所以全其用也然則艮之畜乾施止於健非以厲之所以成之也歟案乾陽君子文王孔子之辭无非為君子設耳自卦言之則以艮畜乾為義自爻言之則下三爻為君子審進退之道也乾之三陽豈終受畜者哉勢必上復然三陽盡復猶有上九焉則卦遂成遯九二九三皆升上體而本爻猶在下體也故二說輻三利往而本爻獨曰有厲而利於己蓋雖上進不離乎下也右明象占九二輿說輹贊曰中无尤也劉長民曰三陽同志已乘於初初止其行已不獲進猶乘車者輹說則所乘者亦止毛伯玉曰說輹猶稅駕也說如說卸之說止而為之用故彖贊曰能止健爻辭曰車說輹中心於止又何尤焉袁氏曰剛中有載物之材所謂車也案下卦三陽而二居中載初與三以行車之象也說輹初已而本爻尚進猶輹說也右明象程正叔曰初與二乾體剛健而不足以進四與五陰柔而能止之時之盛衰勢之髙下學易者所宜深識也蘭惠卿曰小畜說輹在九三而夫妻反目大畜說輹在九二而象稱中无尤何也小畜以一陰而畜五陽而六四為小畜之主近畜九三以小畜大以陰畜陽又非正應所以九三不受其畜而有夫妻反目之象大畜則艮能止三陽之健九二在下卦之中而上受六五之君所畜以君畜臣以上畜下二五皆中又其正應居中相應何尤之有初而往四譬之牛焉童其牿矣所以利於己也二而往五譬之豕焉豶其牙矣所以輹之說也右明爻義九三良馬逐利艱貞日閑車衞利有攸往贊曰利有攸往上合志也程可久曰馬有健行之才而又良健之至也毛伯玉曰逐者總三陽而言之陸希聲曰與二陽角逐志在疾者也得位失中故利艱貞程正叔曰雖其進之勢速不可恃其才之健與上之應而忘備與慎也故戒以知難與不失其貞乾體而居正能貞者也朱子發曰乾馬馳逐不已必有犇蹷之患張舜元曰乾之良馬以健動之體不可以用壯利在艱難守正蓋五畜九二說其輹而止之四居已前有止之之象恐說我輹宜必防之故日閑車衞王景孟同林黄中曰閑車衞者所以為艱貞也楊中立曰戒慎之至也張子厚曰不防車衞而進歴二陰則或有童牿輹說之患其往不利朱子曰節良馬之步而徐驅焉其進利矣張知常曰所畜已成可以致逺然以難進為貞閑車衞戒於疾驅也案乾為良馬象陽之壯也車輹車衞因良馬以取象而車衞又承說輹而言也茂陵中書武功爵十三級曰閑車衞則古有此語而以為爵號易之取象亦因古語也乾非終在下之物觀畜之終可見况畜極則通理勢固然然下卦已終未可輕進二陰在前皆畜乾者也進則受敵故其利在於難而貞雖陽以上復為貞而本爻當衞在下卦之上亦為貞而居過中多凶之地是以難之也車以載之衞以防之皆指下之二陽同力者也戒約其母疾驅以取覆敗則往必利矣右明象占王輔嗣曰物極則反畜極則通初二之進於畜盛故不可以升上九天衢之亨塗徑大通進无違距可以馳騁程正叔曰乾三爻被畜艮三爻畜之者也在他卦則六與九為應相援者也在大畜則相應乃為止畜在上之與三皆陽則為合志蓋陽皆上進故有同志之象无止畜之義右明爻義六四童牛之牿元吉贊曰六四元吉有喜也案能為六五畜初六五所以喜之吕與叔曰六四六五皆以柔畜剛止健者也牛之剛在角豕之剛在牙案牛豕隂類今初九九二受畜於四五而取象焉何也曰取其畜擾也乾陽至此受畜而馴擾故有此象有角與牙焉其剛故在也童之豶之則不能以觸噬矣此畜英雄之道也夫馬者乾象也在坤之行地利貞則坤變為馬牛者坤象也在畜之乾陽受制則乾變為牛易之取象何常之有哉制之在初故曰元吉右明象占馮當可曰以弱畜剛苟不有以制之將不免觸囓之禍君相畜才雖天下之健者亦俯伏奔走而為我之用此二陰所以能成其畜之功也毛伯玉曰大有大畜皆養賢者也大有之三陽欲上而九四援之同類故也大畜之三陽欲進而二陰忌之非其類也他卦以陰陽明相應獨大有大畜以同徳為相親明其以大而有以大而畜故也案小畜之畜乾者六四也九居五為助者也大畜之畜乾者六四六五也九居上為之助者也夫外無陽爻則坤順而不能畜内无陰爻則同類而不相畜然則成大畜之義者在艮之上九而能畜乾之陽者在艮之六四六五也右明爻義六五豶豕之牙吉贊曰六五之吉有慶也案君得臣為有慶以六五畜九二之象也劉長民曰豕去其勢則牙不能長猶二乘初為車說輹而剛不能進也朱子發曰豶豕則馴擾剛柔自止吕與叔曰六四六五皆止健者也牛之剛健在角豕之剛健在牙李子思曰既童且豶又何能為宜其兩皆受畜而相與為應也朱子曰陽以進而止之不若初之易矣然以柔居中而當尊位是以得其機㑹而可制故其象如此而占雖吉而不言元也程正叔曰此見聖人機㑹處右明象占鄭舜舉曰天下之理交相濟而已柔不制柔制柔者剛也剛不制剛制剛者柔也初與二受畜於四五柔制剛弱勝强也案初居剛健之始畜而擾之如牛有牿也童其首則牛不能觸矣二居剛健之盛畜而擾之如豕之有牙也豶其特則牙不能噬矣是以吉也右明爻義上九何天之衢亨案胡氏以經文多何字然于義亦无妨聲或讀賀或以衢字絶句皆非傳以四字為句故不舉全文贊曰何天之衢道大行也陳氏臯曰陽久被抑今而亨通故曰何訝之也朱子曰言何其通達之甚也畜極而通豁達无礙故其象占如此耿睎道曰天衢者賢人所由以上達者也案五天位上位乎天之上也乾三陽上達於此之路故曰天衢右明象占耿睎道曰下卦受畜者也上卦畜下者也受畜者至於九三則良馬逐矣无復如初二也畜下者至於上九則天衢亨矣无復如四五也程正叔曰小畜畜之小故極而成大畜畜之大故極而散鄭舜舉曰以二卦彖爻觀之非散也小畜之傳曰柔得位而上下應之曰小畜蓋六四獨為一卦之主非特下三陽受其畜而上二陽亦受其畜故曰上下應之而止也大畜之傳曰剛上而尚賢能止健蓋四五協力以畜乾故曰能止健若上九獨處於外不受四五之畜故曰剛上而尚賢言四五尊而上之故不可畜而亨也右明爻義趙氏曰初九九二乾體之陽也四五艮體之陰也他卦雖以陰陽之應為正此則專取艮止畜陽為義故六四六五畜乾者也初九九二受畜者也唯九三與上合志然後利有攸往朱子發曰初剛正也二剛中也四五柔也柔能制剛剛知其不可犯而安之時也夫氣雄九軍者或屈於賔贊之儀才蓋一世者或聽於委裘之命故曰大畜時也林黄中曰時者上之所制也陳氏臯曰上養賢之主四五為疾賢之人乾之三爻求進之君子也亦有此義案卦以艮畜乾艮一陽止於上而六四六五畜乾之三陽者也初一陽之萌也其剛如牛之角六四童之則不能觸矣聖人教之以利己二陽之盛也其剛如豕之牙六五豶之則不能囓矣聖人示之以說輹言其不可進也是以受畜也至於三則陽之壯如馬之良逐逐以進則非四五之所能遏矣聖人教之以艱貞教之以閑其車衞使勿恃其壯而取覆敗也苟能是亨於天衢矣右明六爻震下艮上頤序卦曰頤者養也雜卦曰頤養正也耿睎道曰上止下動而其中虛頤之象也馮當可曰凡人之頤上曰輔下曰車輔不動艮也車轉動震也案輔上九之象車初九之象也楊廷秀曰上覆下承衆齒森然卦之形也上止下動卦之用也皆齒頰飲食之象也故曰頤養也案艮一陽上覆震一陽下承中四耦畫衆齒之象也都聖與曰記曰君者所養也非養人者也孟子曰无野人莫養君子君無為以止乎上民有為以動乎下然後養之道得矣案頤之為養其義有三以畫觀之四陰乃所養者也以二體言之上卦尊而艮體止无為以仰養於下者也下卦卑而震體動有為以致養於上者也民出穀粟絲麻以奉其上諸侯效職貢包篚以輸於王是也然分田制禄以養其臣平頒興積以養其民此又以上而養下者也故六爻之中所以養之者雖由乎二陽而自四以下皆以養於初九為象至上九乃有以上養下之義焉贊曰天地養萬物聖人養賢以及萬民頤之時大矣哉程正叔曰口所以飲食養人之身故名為頤因卦推養之義大至於天地養育萬物聖人養賢以及萬民皆養之道也動息節宣以養生也飲食衣服以養形也威儀行義以養徳也推己及物以養人也右明卦義象贊曰山下有雷頤君子以慎言語節飲食案象取止其動為義故受之以頤程正叔曰物既畜聚必有以養之頤所以次大畜也林黄中曰自畜之頤艮體不易乾變為震二陰而畜四陽是之謂畜二陽而養四陰是之謂頤右明卦序貞吉贊曰養正則吉也李季辨曰人生有口體之累孰不求養然得之必有道故曰貞吉李去非曰自其微而觀之一飲一食之不正以積為非禮非義之大者皆根於口體之奉都聖與曰君子之養口體惡乎所取之不正而况養其徳也哉李子思曰頤中有物謂之噬嗑頤中有物則害其所以養故不取頤養之義而頤中之虛元未有物則以貞吉告之方其未受外物之間要當擇其所養故正則吉不正不吉也薄氏曰養民自養養賢皆貴其正程正叔曰養身養徳養人養於人皆以正道則吉也案二陽居上下四陰居中正也虛中有離柔麗乎中於象為正於義為吉觀頤自求口實贊曰觀頤觀其所養也自求口實觀其自養也都聖與曰記曰无節於内者觀物弗之察故在我者正則中有主而可以觀人矣耿睎道曰自養者正然後可以觀人之所養與其自養蓋取人必以身故也朱子發曰四陰皆虛則無物故求口實林黄中曰陽者足以養人者也謂初上陰者求以自養者也謂中四爻郭子和曰頤非虛中則口實无自而致養必虛以容之斯足以受養矣故祇以觀頤口實為言飲食之養朝夕有常頤非止於飲食而已也聖人立象以盡意故言簡而理明如此李子思曰古之觀人每每觀其所養而所養之大小則必以其所自養者觀之夫重道義之養而略口體此養之大者也急口體之養而輕道義此養之小者也養其大體則為大人養其小體則為小人天之賦予初无小大之别而人之所養各殊則其所成就者亦異頤之彖全以畫取象先儒言之矣二陽上下四陰居中正之象也所觀之頤二陽外實之象也自求口實四陰中虛之象也諸卦多以六爻為義獨此卦自為一例也頤以納飲食飲食所以養也論養之義古今唯孟子為詳曰養其一指失其肩背曰舎其梧檟養其樲棘此易之觀頤之方也曰養其大者為大人養其小者為小人曰無尺寸之膚不愛焉无尺寸之膚不養也此易之自求口實之象也至於養之之道又盡見於浩然之氣揠苗不耘之喻又曰苟得其養无物不長苟失其養无物不消學如孟子然後可以言頤右明卦象義初九舎爾靈龜觀我朶頤凶贊曰觀我朶頤亦不足貴也張舜元曰震動於下朶頤之象也頤之全體有龜之象焉存乎人者豈无良心哉舎而不知求反觀我之言語飲食以為節不知自養之為善是以凶而不足貴也劉氏曰靈龜前知心之象也初九動於下朶頤之象也夫朶頤是養其小體以棄其大體小人之道也飲食之人則人賤之矣故曰不足貴張敬夫曰人人莫不有至靈者謂靈龜若孟子所謂良貴是也不以程正叔楊中立能嚥息不食之說為然蓋以靈為義也李季辨曰六爻貴止不貴動口之飲食言語上止而下動初九震體在下也靈龜心朶頤口也若謂人曰舎女養心之道而觀我養口體故凶李子思曰頤之初中虛而未有所受故先以此戒之郭子和曰頤之取龜猶艮之取背程可久曰朶頤下垂以受物也楊中立曰爾對我之辭蘭恵卿曰易之言我者十三卦皆自指其爻也案陽饒有餘隂乏不足有餘者養人不足者養於人四陰養於人者也居於中靈龜也雖不足而可以自養謂嚥息可不食也案初九養人者也動於下朶頤也以有餘而可以受物然位不足而勢不順非上九之比也懼无以應四陰之求乃告之曰舎爾之靈龜而觀我之朶頤失之矣凶之道也然設辭以拒四陰亦凶之道也頤中虛有離之象為介屬故以其靈而象龜而全卦之畫有仰龜之象而尾足不露耳抑聞之昭武陳氏曰朶之字亦為㙐多辨也詳見注案下三爻震動故欲慎言語上三爻艮止故欲節飲食今爾心自有至靈如龜不知自養而觀我之言語以為從違取舎非計之得也俗諺謂聽他人下頷動是已亦有此義右明象占六二顛頤拂經于丘頤征凶贊曰六二征凶行失類也馮當可曰應五而五不應反而求初所以為顛頤李季辨曰反隨下體以動也游定夫曰以上養下頤之正也在上而反資養於下則為倒置矣此二與四所以俱為顛頤也郭子和曰二五相應者也兩陰不能相養反養於初違經常相應之理也李仲永同李氏曰二應在五五居尊位而養于初拂頤之常楊中立曰丘在外而髙上九之象也李子思曰艮為山九居上丘之象也張舜元曰賁於丘園亦艮之象王介父曰於體為震是以有征之辭焉案二所處亦難矣反養於初則拂君臣之經往養於上則有不從君之失六五又不能以相養此其所以凶也右明象占程正叔曰女不能自處必從男陰不能獨立必從陽二陰柔不能自養待養於人者也案天子養天下諸侯養一國臣食君上之禄民賴司牧之養皆以上養下理之正也二反下求於初則為顛倒拂違經常若求養於上則往必有凶朱子發曰二陽受養於六五養道不足然二亦不可越五而上征也劉氏曰凡陰必資陽之養初上二爻衆陰資焉二在上反受養於初故為顛頤違五之應故為拂經四資初言顛頤而不言拂經五資上言拂經而不言顛頤從可知矣案卦以二陽養四陰為義然逐爻逺近承乗愛惡情偽又復不可以槩定諸卦六二當位得中鮮有凶者而此爻獨不然蓋應在五而兩陰不能相養則於義无取矣下比於九陰陽之情近而相得則反求養於初固拂正應之經也姑舎是則上有九焉又將越五而求之則无君矣是又罪之大者是以征凶固无一而可也震體陽動上雖逺亦有往征之象至顛拂于丘之指不勝異說然中四爻二顛三拂自有義例能通之則得矣右明爻義六三拂頤貞凶十年勿用无攸利贊曰十年勿用道大悖也李季辨曰三當應上上為頤之主應之正也三亦拂之而隨下體之動以正言之則凶三取上隔互體坤坤數十故曰十年此說獨得之後取諸說旁通其義也郭子和曰拂經謂違二五相應之常此言拂頤則違頤之道矣本爻有應而凶者蓋上下動為頤之道今居上下之際過於動而不知止以是為貞則凶矣易每以十年反常則人之一失必十年而後復可不謹哉王介父曰易之辭或稱年或稱嵗嵗者舉四時之周而言也以言其久至於十年則未有稱嵗者蓋十年則亦已久矣不必言嵗而後可以為久也案其言十年取數不同皆列之以俟知者案易之六二鮮有凶者而頤之六二征凶正應鮮有凶者而頤之六三貞凶此易之所以不可為典要如春秋之无達例也夫三者下卦之終也每有終之之義今上有正應宜往從之而不終於此矣然上居艮體近傅六五之君天下雖由之以養而勢位有間且止而不下接此三所以隨下體之動以為養而拂所養之正應也故守下體之貞而不上應於義為凶夫上終於止而三終於隨同體之初以養此雖十年之久終以不用而无攸利也所由以養之主與我正應乃固執而不上交則亦何利哉右明象占六四顛頤吉虎視眈眈其欲逐逐无咎贊曰顛頤之吉上施光也王輔嗣曰屬上體居得其位應於初程正叔曰初以陽剛居下在下之賢也與四為應四柔順而正能順於初賴初之養也李季辨曰居上體與初為應亦曰顛艮體止於上而初動以應之故吉蓋以應人之所求也耿晞道曰六二六四皆自養正而能有所養者也然二未離乎下而四則在上矣故二之顛頤不如四之吉也案二為苟盒為正應二動而有求四止而待求此吉所以獨在四也右明顛頤之占程可久曰眈眈近視貌逐逐即物貌張敬夫曰虎視常垂首朱子曰眈眈下視而專也案一卦之義莫吉于四頤之道貴正而六居四則正也卦有二陽上九秉由頤之權威震人主初九位卑而賢己則應初而不應上也近六五而同徳資在下之賢以輔之不為上九所奪此又文王孔子之所未及言者也故以養於初九言之則吉以求養於初九言之則无咎上九陽剛虎也其貪嗜之欲未易饜也非所應之正咎必踵至唯本爻之於初其欲逐逐舎上而從之上有虎下視之心而不能奪不可得而咎也虎之象不一或取諸兊或取諸坤或取諸艮兊以西方白虎言也坤以乾龍對坤虎雲從龍風從虎是也艮以位乎寅尾星為虎也此以艮之上九言之為尾星之象也右明虎視之占六五拂經居貞吉不可渉大川贊曰居貞之吉順以從上也李氏曰以六居五徳未稱位故由頤之事宜在於己而反在於上九失養下之經矣李去非曰以陰柔居君位待上九以為養拂其常者也楊元素曰六二從初六五從上俱失中爻之常劉長民曰以无養下之徳故不加頤字乃曰拂經合衆說而觀之可以互相明矣右明象耿睎道曰不能有所養則動而无輔是以居貞則吉不可渉大川也朱子發曰艮止也有居之象陸希聲曰不能養下民所不從不可渉難劉氏曰五不利渉上利渉非剛健不能濟大事可知矣案居貞吉猶洪範用静吉謂自養可也不可渉大川猶洪範用作凶謂欲以養人則不可也右明占馮當可曰在五之經當下應二如輔之應車也五下无應遂不復顛頤乃仰而應上九亦為拂經是輔愈上而車愈下其將何以養故二與五俯仰不同而同於拂經也然以象取之五傅於頤而當中如人之前齒雖无功於噬囓但不動摇缺折斯足矣故曰居貞吉傳謂順以從上者五雖柔順能傅於剛彊以自立如前齒雖不致用能傅於骨以自堅斯亦可久毛伯玉曰五君也養人者其事也養賢者其道也而爻則陰也二者胥失之是拂其常者也无事猶可以分相縻故曰居貞吉欲有所為則難以濟矣无臣无民而求成事未之有也故曰不可渉大川案上九居已上而衆歸之已以陰柔居天下之上而无輔初九逺而不我即六二柔而不我應是无臣也三四皆非所養是无民也凡君上臣民之大經已拂違矣當是時守正而无所事則尚得无咎有所事則不可濟矣右明爻義上九由頤厲吉利渉大川贊曰由頤厲吉大有慶也馮當可曰頤之所以成頤由此一爻李季辨曰如人之頤然上體不全則下雖動而不應飲食之道廢矣王輔嗣曰以陽處上四陰必宗之故莫不由之以得其養楊中立曰卦惟二陽而爻居一卦之上衆陰由之以養也郭子和曰豫之由豫以九四之剛徳也頤之由頤以上九之剛徳也初九非不剛也在頤之初未足以自養况養天下乎此天下之養所以必由於上九也右明象王輔嗣曰貴而无位是以厲也髙而有民是以吉也為養之主物莫之違故利渉大川蘭恵卿曰六五陰柔不能養物而養物之權皆歸於本爻所以危厲然六五順從於我使物由已養吉孰大焉劉氏曰以剛在五之上厲也而六五尊之故吉耿睎道曰輔之者衆故利渉大川也右明占李氏曰養賢以及萬民上九足以當之程可久曰二五君臣之正位不能養物為拂經則由頤於上者亦危矣雖然君子居有為之地有可為之材豈憚於危而不任其重哉故厲吉而利渉大川也李去非曰上九主乎頤者也伊周能使天下之大權在已而君不疑以退聽然不免於危厲毛伯玉曰六五不可渉大川而上九利渉大川此非常之事也而其端在於養民夫天下之勢何常之有有以養之則君之矣五誠无以養之彼安得不歸於上天下莫不與也雖欲不濟不可得矣厲者非常之危吉者莫大之慶案隂宗于陽之卦必在九五君位然後為正而安比之所以吉而後至者則凶也豫之九四所由以豫則六五為貞疾之主而朋盍簪於九四然而位在六五之下猶可以制也故其辭曰勿疑頤之上九所由以頤而位在六五之上居一卦之外不可得而制矣故六五為拂經為不可渉大川而由頤利渉皆歸於上九而其辭曰厲蓋天下之生久矣斯民生養之道實為人上者有以致之斯民苟得其養則歸之矣此湯武之所以興也故厲而吉渉大川而利其事可以想見為人上者盍知所謹哉右明爻義李季辨曰口容止故頤貴止不貴動上三爻皆吉下三爻皆凶趙氏曰雖其爻之當否為義不同然吉凶之大槩可决也馮當可曰頤者養也養人亦所以自養也六爻之中動而從人以求養者皆凶静而受人之養者皆吉李氏曰顛頤者上反養於下也由頤者天下由之而養也朶頤者動以致養也丘頤者止於上而養下也拂頤者失養之道拂經者失養之常此六爻之義也毛伯玉曰頤之義凡三養心者君子之道也以初九明之養人者大人之事也以上九當之養於人者天下之勢也以二三四發之案卦以二陽養四陰六五之君反受養於上九而曾无養人之功故中四陰爻皆以顛拂為象初九位卑埶微未足道也上九有其位矣有其埶矣而又有其民而利渉大川故下體之動者皆以凶為戒蓋動而從上以渉大川其事有難言者也上體雖止而四以應初為吉五以居貞為吉聖人之情睟然見乎辭矣鮮于子駿曰六爻與象戾者上下不順也凡頤之道以尊養卑以上養下今震下艮上長反動而求少少反止而養長故諸爻多以顛拂言之右明六爻巽下兊上大過贊曰大者過也張舜元曰四剛之過二柔大過小之象也李子思曰四陽居中而二五又居用事之方擯二陰於初上无位之地可謂陽大過而陰大弱也大今太林黄中曰内柔而外剛者小人之道也内剛而外柔者君子之道也大過四陽自内而過小過四陰自外而過是皆君子之過也為其陰陽多寡之不同故有大小之辨非君子小人之謂也案大小之過皆取陽居其中蓋大過以大過為中小過以小過為中所謂時中之道而非常人之所謂過乃失中也馮當可曰此卦人皆謂為非常之事誤矣贊明言大者過也是陽過陰也天下之事唯兩兩相當則易為力苟有過聖人尚欲出力思有以救之安得謂非常之事程正叔曰聖賢道徳功業大過於人凡事之大過於常者皆是也又曰常事之大者耳非有過於理也按四陽居于初上二隂之中在三畫之卦似坎是陽為隂所陷也唯陽之數過倍於隂之數然後本末俱弱不為隂所陷而有大過之義焉則是大者不容不過而初非果有過當之事也若夫小過則隣於坎矣雜卦曰大過顛也此以棟橈取義右明卦義象贊曰澤滅木大過君子以獨立不懼遯世无悶按此義取於實象又别一理說卦曰古之葬者厚衣之以薪葬之中野不封不樹䘮期无數後世聖人易之以棺槨蓋取諸大過按此謂過於厚也右明卦用序卦曰頤者養也不養則不可動故受之以大過程正叔曰凡物養而後能成成則能動動則有過大過所以次頤也郭子和曰頤之中虛虚故受實實則剛剛而後過二卦之象相終始也林黄中曰此變頤也震變為巽艮變為兊六畫盡變而成也巽者震之配兊者艮之配也由震而之巽由艮而之兊將以從其配也案天地之間理皆對立卦之畫凡竒耦之不齊者以反對為序屯蒙需訟之類是也竒耦正停者以全體變為序乾坤六子之卦是也頤之竒耦上下正停故全體變而為大過此天地自然對立之理如此也序卦者乃因其象而推其義云爾非謂因養而可動故以大過次頤也若以為因養而可動為序胡不受之以震乎右明卦序棟橈利有攸往亨贊曰棟橈本末弱也朱子曰四陽居中過盛本末二陰不勝其重故有棟橈之象朱子發曰天地之理剛柔不可以相无剛以柔為用柔以剛為體柔既不足剛亦无自而託譬之棟也中雖剛彊而兩端柔弱豈能勝其任哉胡翼之曰二陰居其初終是猶内外皆小人而朝廷紀綱敗壊若棟已傾摧也右明卦象贊曰剛過而中巽而說行利有攸往乃亨大過之時大矣哉吕與叔曰必大有為而後濟故利有攸往乃亨蘭恵卿曰亨出於有攸往也程可久曰有攸往則剛長而終不為柔揜故利且亨焉右明卦占馮當可曰棟已橈屋將壓矣聖人欲挈屋下之人而出之於外以避摧壓之禍而尚有安於棟橈之下而不肯出者將奈何哉聖人唯以剛過之才以巽說行之為出之之術得其從則利有攸往即有亨理也李子思曰四陽居中有棟之象而上下二陰柔而无力是上无所傅而下无所寄者也安得不橈大壯凡四陽而在下者亦壯故上棟下宇取諸其象者得所載也今大者過乎剛而无所傅小者過乎柔而不能載是棟將壓而危之甚也雜卦曰大過顛也大厦之顛非一木所能支是必過而求濟然後可故曰利有攸往乃亨案四陽二隂在上者為大壯在下者為遯今二陰分於上下其義當自遯推之何則遯則陽雖衆而其道消故象於遯今升二之六以往居上則陽居中而過於中矣此卦之所以名大過也然猶有棟橈之象焉又升大過初之六以往居五乃始為大壯而上棟下宇之象成陽道亨矣故曰利有攸往亨右明彖義初六藉用白茅无咎贊曰藉用白茅柔在下也說卦曰苟措諸地而可矣藉之用茅何咎之有慎之至也夫茅之為物薄而用可重也慎斯術也以往其无所失矣案成卦以棟橈為象爻之三四亦取於棟使六爻不出乎棟橈之一說則爻无用立可也是故聖人於初見其以柔而承衆剛剛易缺折而柔以藉之則无傷故有取於置器而以茅藉之之象所以使人於有過之初知所致謹則其過鮮矣右明象占九二枯楊生稊老夫得其女妻无不利贊曰老夫女妻過以相與也朱子發曰兊為澤巽為木楊澤木也蜀僧曰四爻之剛同為木然或為楊或為棟棟負衆榱則材之彊者也楊為早彫則木之弱者也此卦本末皆弱二近於本五近於末故均為木之弱也程正叔曰楊者陽氣易感之物也陽過則枯矣楊中立曰陽雖過而陰已感之生稊之象也林黄中曰枯而生稊書所謂若顛木之有由蘖也楊枯矣而更生稊夫老矣而更得妻衰者復盛絶者復續何不利之有哉正義曰枯陽則老夫也稊則女妻也吕與叔曰九二在初六之上老於初六故曰老夫九五在上六之下故曰士夫士未娶女未嫁者也案合六畫全體言則中四陽為木析巽兊二體言之則各卦祇以在上者為老在下者為少老少以相比二位取象不論全體也楊陽木也而枯則以耗於陰也右明象袁氏曰易之言利有攸往以攸往為利也利居貞以居貞為利也利渉大川以渉大川為利也唯无不利則其往其居其渉川无所不往而不利矣右明占蘭恵卿曰九二之下有一陰九五之上有一陰二與初五與上陰陽相近而各相比所以相對取義也九二陽爻也故謂之枯楊在上也故謂之老夫初六陰爻也故謂之生稊在下也故謂之女妻李氏曰下體之棟橈在初六而九二之剛過之上體之棟橈在上六而九五之剛不能過此生稊生華老夫老婦之所以異也老夫剛過也女妻微弱也以剛過拯微弱何往而不利馮當可曰女嫁士夫相遇也不得已而遇老夫自古君臣過以相與者多矣吁可歎也右明爻義九三棟橈凶贊曰棟橈之凶不可以有輔也程可久曰三四居一卦之中又皆陽實棟之象也衆材所恃以成室者也李季辨曰下卦上實而下弱下弱則必上傾故三居下卦之上而曰棟橈凶言下弱而无助也又曰上卦上弱而下實下實則可載故四居上卦之下而曰棟隆吉言下實也此二爻當分上下體案易之取象固不一而足也凡六爻之象或豎取或平取或縱或衡猶未也或合為一體或分為二體此卦二棟之象正如鼎卦分上下各自為象也鼎分為二則下一鼎有足而无耳故三言鼎耳革而初言鼎顛趾上一鼎有耳而无足故五言鼎黄耳而四言鼎折足也今分為二棟則上棟之下重剛藉之故為棟隆猶今人之覆枅之象下棟之下一陰為足故為棟橈无有枅以為藉也不然合而言之祗見其鑿而不可通也是說也惟李季辨知之右明象占九四棟隆吉有它吝贊曰棟隆之吉不橈乎下也王景孟曰三四列之中爻之中譬如屋室衆材咸集而棟則居中矣石守道曰雖與初六為應而上傅九五之君不為初六所橈故得棟隆之吉劉氏曰材過其位能上承剛明之君以扶顛持危故為棟隆李去非曰隆者託乎君之辭也案下有枅以藉之故不橈九三九二重枅之象右明象趙氏曰說者謂九四應初有它也殊不知易中未有以正應為它者李季辨曰橈在上六非己之咎案棟隆本爻它它爻也輯衆棟以成屋室一棟之隆一棟之吉也它棟之橈非此棟之所能持也故有它則吝其理然也右明占耿睎道曰大過之時所貴者大有所過也故以材勝位為過九二九四是也不如是不足興衰而振弱也九二僅過於初未離於中是以其功又不能如九四也李子思曰全體棟橈也聖人不許其坐視而許其往以求濟於是擇衆爻之中剛不過中者以棟隆之吉告之使之有以為拯救之術不然六爻皆以凶橈告則是天下之事不可復為矣此聖人吉凶與民同患而重易演爻以救世之深㫖也林黄中曰三四兩爻以反對為文案易上下畫停者多從中分反對為象非它卦内外相應之例也頤中孚小過皆然而此尤明三與四對皆為棟象上隆下橈也二與五對皆為枯楊之象上華下稊也初與上對初為藉用白茅之謹上為過渉滅頂之踈也右明爻義九五枯楊生華老婦得其士夫无咎无譽贊曰枯楊生華何可久也老婦士夫亦可醜也張舜元曰枯楊生華末勝本也蘭恵卿曰九五陽爻也故謂之枯楊在下也故謂之士夫上六陰爻也故謂之生華在上也故謂之老婦林黄中曰物之巨細本於相形象之變通生於重互陽施於下故生稊稊生於下者也陽施於上故生華華生於上者也合二五兩爻之象觀之九二枯楊老夫之象也初六生稊女妻之象也則九五當為枯楊而今以上六為枯楊老婦九五反為生華士夫何也易之意蓋以枯象老在陽爻則為夫在陰爻則為婦而楊者不拘於陰陽之爻也猶有說焉聖人立象以盡意凡天下事物之變无不備者老夫之得女妻再取女之夫也老婦之得士夫婦再嫁而夫未取也凡人倫之變備見於象矣右明象鄭舜舉曰剛而得中故无咎不能救過故无譽程正叔曰五雖非少比老婦則為壯矣以士夫而得老婦雖无罪咎殊非美意右明占郭子和曰二之枯楊謂老夫也五之枯楊謂老婦也老夫女妻則剛為主而柔輔之大過之得者也故无不利老婦士夫則柔為主而剛輔之大過之失者也故无譽然大過之道在臣下為多故不以君道處九五亦猶君道之无明夷也王景孟曰巽為長女而反曰女妻兊為少女而反曰老婦易之取象如此其不一也案此則知以童蒙取象於艮之少男者拘矣嘗觀此爻若主上六而言者孔子謂之可醜而辭但云无咎无譽何也婉辭也婉之為辭何也避斥尊也九五大過之主剛中正履帝位而昵於陰柔之小人視一世傾橈而不加之意故不以君道處之而託言於老婦士夫之象也右明爻義上六過涉滅頂凶无咎贊曰過涉之凶不可咎也程正叔曰因澤之象而取涉義正義曰滅頂言涉難深司馬君實曰滅木之澤淫滔甚矣而本爻不剛无利涉之材至於滅頂宜其凶大過之世棟已橈矣宜拯之於蚤也迨其傾摧而欲救之何嗟及矣故藉之於初則无咎救之於三則已橈而凶下卦如此上卦可知澤之滅木猶棟之橈也木猶滅之人烏可過涉以求濟哉過涉凶者无舟楫而馮河者也澤溢於上至於滅頂自取其凶何所咎也孔子謂不可咎言不救之於早至此无及也上之畫耦兊之澤也澤陰水也中四畫奇人之身也初畫耦足也全卦有人居澤中滅頂之象故於上一爻發之右明象占李氏曰卦雖以初上喻棟橈至於以爻明變以位明人則意各有所寓也右明爻義王輔嗣曰大過者棟橈之世也本末皆弱棟已橈矣而守其常則是危而不扶凶之道也以陽居陰拯弱之義也故陽爻皆以居陰位為美李子思曰大過剛過而中蓋大過乃所以為中苟過極而不知反則將有必折之患故以陽居陰者吉且利以陽居陽則凶而无譽也案六爻雖以二體中分反對為象然上下爻位義未嘗不相應也初之藉用白茅至四則棟隆而吉矣二之枯楊生稊至五則生華矣三之棟橈凶至土則過涉滅頂而不可咎矣右明六爻
