body:
  text: 厚齋易學卷二十一宋馮椅撰易輯傳第十七經下篇損益兑下艮上損林黄中曰損有餘而補不足也損之為名由有餘而起也益之為名自不足而生也又曰滿招損謙受益若多寡適稱則无所損益矣都聖與曰陽道常饒隂道常乏損陽之饒益陰之乏者自然之理天之道也老氏所謂天之道損有餘而補不足也故隂卦虚而宜益陽卦實而宜損損乾之九三益坤之上六則坤益于上而為艮乾損于下而為兑損下益上則致損之道此卦之所以成損也注謂非補不足則失之矣蘭恵卿曰損益二卦專為三陽設也損乾之九四故曰損上損乾之九三故曰損下案卦隂陽適停而取損有餘補不足之義何也陽饒而隂乏陽富而隂貧陽實而隂虚故陽雖三爻為有餘隂雖三爻為不足故損陽謂之損益隂謂之益損益二卦皆主内卦而言也損者損内卦之乾也益者益外卦之坤也此損則彼益矣此益則彼損矣内此外彼也至孔子贊之則易内外而為上下都聖與曰以損為損者物也以損為益者道也方損方益方益方損者時也凡不可損者皆成己者也凡不可不損者皆害己者也張敬夫曰天下之理不過適中損者所以裁束而歸于中道爾有當損者有不當損者一以中為凖則无過不及矣唯中故能適時之宜合理之正理之自然不可得而損益也特時有過則當損不及則當益爾卦三隂三陽本不可有損益也唯其陽偏于陽饒而向長隂偏于隂乏而向消故損九三向長之陽以益上六向消之隂則隂乏得陽而濟隂消得陽而止三隂三陽居然適停此損之所以為理之當然者也若以人力私意自為損益則非易矣賛曰損下益上其道上行朱子𤼵曰益上矣而謂之損上以下為基譬之築墉損其基以增上之髙則危矣非益也耿睎道曰貴以賤為本髙以下為基故益下則下與上俱益損下則下與上俱損李子思曰在下者民之象而在上者君之象也損民益君亦分之常而作易者名之為損葢損民者乃所以損國故設卦命名深寓至戒也又曰陽實在下此天下萬民富實之象也惟斯民富實之時則差可損下以益上若斯民之困匱而損之不已則民之凋瘵乃國之殄瘁故聖人因陽在下而後以損下益上其道上行許之劉氏曰古之為人上者无損下𫉬益之理故易以損下為損益下為益後世乃有百姓輸己之財以助公上者皆非治古之事鄭少梅曰儒者不達隂陽之㫖遂以聚歛裒克為損孔子曰損下益上其道上行安有聚歛裒克之意邪林黄中曰然則元吉有孚无咎可貞利有攸徃者其義安在也鄭康成曰猶諸侯損國之富以貢獻于天子李氏曰舉天下而奉一人則所損在下所益在上而享上之道得行焉故曰損下益上其道上行説卦曰損徳之修也又曰損先難而後易又曰損以逺害郭子和曰世以損有損下厚己之意故以損為非美然損善損惡損下損上損其過與不及或損而為君子或損而為小人一治一亂莫不謂之損也以義言之則下流惡也上善善也損惡益善則道日進故彖言利有攸徃而賛言其道上行或不知居尊之義以天下奉一人則善日消而惡日進矣案損有二義損善以益惡損民以益國損君子以益小人則損為害義徳之䘮也損不善以益善損國以益民損小人以益君子則損為逺害徳之修也唯所引用爾經言正理孔子多反㓙為吉以開諭人雜卦曰損益盛衰之始也林黄中曰孔子謂殷因扵夏禮所損益可知也是益不必賢于損損不必不如益也時所當損不可不損時所當益不得不益此損益二卦之義也損益二卦以盈虚消息而成其在六爻以始終盛衰為義何則始乎損者卒乎盛始乎益者卒乎衰孔子讀易至于損益喟然而歎子夏曰夫子何歎焉子曰夫自損者必有益之自益者必有决之吾是以歎也案損者衰之始益者盛之始方損益之初未遽盛衰也要其終而盛衰乃見矣林説以序卦損而不已必益為義右明卦義象賛曰山下有澤損君子以懲忿窒慾程正叔曰山體髙澤體深下深則上益髙又澤在山下其氣上通潤及草木百物又下兑三爻皆上應是説以奉上皆損下益上之義也程可久曰山澤氣塞時之損也損下益上勢之損也林黄中曰風雷為益者雷震則益風風怒則益雷山澤為損者山摧則損澤澤動則損山自然之象也此明象程正叔曰天下之害无不由末之勝本也峻宇雕牆本于宫室酒池肉林本于飲食滛酷殘忍本于刑罰窮兵黷武本于征討凡人欲之過者皆本于奉飬其流之逺則為害矣先王制其本者天理也後人流于末者人欲也損之義損人欲以復天理而已王景孟曰昔者聖人之作易也葢所以遏人欲而復天理者也始終六十四卦大抵皆然而尤深切著明者于謙也節也損也之三卦見之蓋人之情莫不欲倨肆之為便而誇尚之為髙也而聖人則抑之曰是不可也易有謙退之道焉人之情莫不欲侈縱以自適而滿溢以自盈也而聖人則抑之曰是不可也易有節止之道焉人之情莫不欲裒克以自肥而忿戾之是恣也而聖人則抑之曰是又大不可也易有自損之道焉蓋聖人者天理之盟主㣲易則斯人天理日負而人欲日勝易微此三卦則所以抑人欲而復天理者又或緩而未切著而未明矣右明卦用序卦曰解者緩也緩必有所失故受之以損石守道曰又如蹇難已散當有損益如三王随時改易是也林黄中曰自解之損坎變為兑震反為艮損川為澤損長為少也案蹇觧皆四隂二陽故損益以三隂三陽濟之損隂益陽見于卦序而成卦之義損陽益隂无非用中之權也右明卦序有孚元吉无咎可貞利有攸徃賛曰損而有孚元吉无咎可貞利有攸徃王景孟曰損而有孚則元吉而无咎矣此之謂可貞之道有攸徃而利也楊中立曰損之不以其道則民不應不應則不孚不孚則凶咎随之矣尚可以為正乎不可正則无徃而可也朱子𤼵曰上下无不信乃可以損以人情莫不欲損也李子思曰財賦之所取皆信其非奪我之財也力役之所加皆信其非奪我之力也閭丘逢辰曰无君子莫治野人无野人莫飬君子貢助征役有國家者所不能免也但用之有節取之有制不失信于民則自然樂輸以奉其上矣都聖與曰下樂以享上而吉吉而後无咎李季辯曰天下之人皆有愛君之心故相與出力以奉上聖人為之斟酌立一定之法夏商周之貢助徹不過什一皆損下益上之義也其義盡見于損卦蓋損之始出于斯民奉上之誠心以孚為誠似非本指故曰有孚必得六五之位然後可以受天下之益故曰元吉无咎其法不過天下之中正故曰可貞出力奉上然後可得而治故曰利有攸徃案卦之為義理雖一貫其象則取之六爻有孚元吉謂六五九二也九六之應无相間礙故有孚五居君位故元吉无咎可貞謂初九六四也各當其位故无咎故可以貞利有攸徃謂六三上九也九三徃而上得其益故利説者皆知利有攸徃為上九而有孚則多以六爻皆應此于爻象未害而經指則各有所指不相紊也其餘則不知所指矣右明卦占曷之用二簋可用享賛曰二簋應有時損剛益柔有時損益盈虚與時偕行耿睎道曰享上之謂享享亦有備物者然損下益上則二簋用享可也禮之或豐或儉唯其時而已朱子𤼵曰損之用不可常也徃而不已將何之乎故曰曷之用此因上九之徃以設問也亦通劉氏曰曷之云者度時以審其可用也地産飬形簋所盛也卦有益柔之象故以簋言李子思曰二簋在下二陽爻之象朱子曰言當損時雖至薄无害林黄中曰此聖人觀㑹通以行典禮也國莫重于禮禮莫重于享李氏曰言趨時之事蓋當時之歉則殺禮所以從宜案下之奉上葢謂之享燕禮之重亦謂之享此損下益上之時則言諸侯享天子之禮也古者享禮以四簋為中故陳饋八簋以為盛而二簋用享以為可酌其中而損益之也以二簋言者下卦三陽九三一爻既徃于上卦之上矣下二陽爻應乎四五皆有奉上之義故以取象也坎之時艱難多事禮文多闕故六四之于君上樽酒簋貳可以納約蓋以一簋貳一樽也損之時非不能為禮也殺之而已故以二簋為享視坎猶為備禮也抑觀自坤之外諸卦之彖未有如損之反復告戒之詳且悉者葢損者拂人情之事易至凶咎故特詳也右眀卦象初九㠯事遄徃无咎酌損之賛曰㠯事遄徃尚合志也張舜元曰兑動而下故戒之曰㠯事遄徃无咎李仲永曰上以事使下謂之使下以事事上謂之事鄭舜舉曰損下益上故下當損而上不當損損剛益柔故剛當損而柔不當損初剛而在下四賴其損者也則宜速徃以益上右明占鄭舜舉曰量其所受随器而止酌之義也呂與叔曰所以酌者以其剛也林黄中曰居最下之位兼有餘之資在損之時當損以益上滿而不損必有決之者矣酌取水也詩云酌彼行潦挹彼注茲損澤以益山故有酌損之象程可久曰方在初未過也可遄徃上應而後无咎上合志也謂告其損下而斟酌之勿令浚深李子思曰已事遄徃者在下酌損之者在上當損之初先為在上者酌損之戒則下其可重損乎李季辨曰遄徃者下之人奉上之誠酌損者上之人愛下之仁也㳺定夫曰損下以益上或失其節則後難繼故必酌之右明象王景孟曰兑三爻皆損下益上者也然九二則以弗損而為益六三則以獨行而得友初九之陽方盈在下則當損下之盈以益上之虛此所謂出粟米絲麻以事其上者也則當速徃乃能不失以下事上之職而𫉬免厥咎雖然當酌而損之使下之所以供乎上者其心不厭而上之所以取乎下者其道不窮蘭恵卿曰量其輕重而使之適中此損之六爻以剛柔適中為吉過剛過柔則凶張敬夫曰當損而不損過也不當損而損之亦過也易所以戒焉凡所謂酌損之弗損益之者言不過損也所謂損一人損其疾者皆理之所當損也案以所損之事亟徃奉上則免爾貢不供之咎上如水焉酌之不竭澤也兑為澤故有酌之象六爻唯初以剛居陽為過于富實所宜損者也初實四虚初下四上故當損之以益四也言酌損于无咎之後補爻辭未盡之意右眀爻義九二利貞征凶弗損益之賛曰九二利貞中以為志也㳺定夫曰兑之情悦而陽之性好動故有利貞征凶之戒程可久曰損而得中利于正固以守之征則過中矣損下而過中凶之道也李季辨曰初酌損得宜矣二又損則過故曰利貞征凶謂宜以中正之法取民過征則凶也什一天下之中制多取之則為桀少取之則為貉以此爻得中故寓聖人立法之意耿睎道曰損上益下過亦无傷損下益上過則有害故初九已有酌損之戒九二損既得中故利貞征則過矣蘭恵卿曰二本隂位今以陽爻居之是弗損而反得益者也或者以弗損益之為无所損益是不知小過弗過遇之弗遇過之之意也損下益上非特取民之法諸侯職貢皆是也夫損下益上三最比上故己損之若又損二以益五則過矣故許之以貞吉戒之以征凶夫二隂虚不足者也九陽實有餘者也弗損乎九則有益乎二矣故曰弗損益之損兼言益益不言損此又聖人作易之微意右眀象占六三三人行則損一人一人行則得其友賛曰一人行三則疑也説卦曰天地絪緼萬物化醇男女搆精萬物化生易曰三人行則損一人一人行則得其友言致一也朱子曰下卦本乾而損此爻以益坤三人行而損一人也一陽上而一隂下一人行而得其友也兩相與則專三則雜而亂卦有此象故戒筮者當致一也程可久曰友言心志之相得謂上九也李季辨曰三陽並行兩不成竒一不成耦必一陽上徃然後剛柔竒耦皆相應故説卦又取致一之義右眀象占楊中立曰隂虚而陽實故陽施而隂受受則益施則損蓋天地之義也程正叔曰天下无不二者一與二相對待生生之道也三則餘而當損矣此損益之大義也程伯淳曰道无无對有隂則有陽有善則有惡有是則有非无一亦无三只是二也張敬夫曰三居下體之上位之髙物之盛數之當然者也是故聖人于此極言萬物損益之理焉又曰天下之理一隂一陽一男一女一唱一和一柔一剛大至于天地細至于蟲魚事事物物莫不皆有自然之對非有待于一人焉者此天地之至理也過此則為贅少此則為虧贅者不得不損虧者自然相求艮兑交而為咸咸交而為損損之中三與上復交焉此夫婦交感化育之事也中庸曰其為物不貳故其生物不測天地𤼵生萬物不過二氣交貫誠一無二况人者天地之心哉劉氏曰古之大臣曰孤曰卿孤之命名取其无朋卿之執羔以其不黨是人臣當致一以事君也案孔子言致一謂兩人則致一也一則獨三則雜矣右明爻義六四損其疾使遄有喜无咎賛曰損其疾亦可喜也楊中立曰損之為卦用下益上則上皆𫉬益者也郭立之曰損其害己者然後遄有喜初九六四之辭略相𩔖者上下皆為損之初也故曰損以逺害李季辨曰當損去蠧財害民之政使遄徃奉上者皆有樂輸其上之意如我朱孔陽為公子裳言私其豵獻豣于公之𩔖則无咎案初九陽實有餘當損之以益六四隂虚之不足者也而九二間焉則為己疾者也六四當受初之益而隂柔虚弱所最求益者也然而居損之時則所宜損者損其疾已者耳果能損九二之疾使初九之遄于奉己則有喜矣隂虚之有待于富實其情然也凡有喜有慶云者皆内外相應之情也受下之益而有疾之者使不得通焉咎之招也今損其疾而使之遄而有喜何咎之有説者謂損六四偏于隂柔之疾或又謂意必固我遷怒貳過之為疾者皆非右眀象占六五或益之十朋之龜弗克違元吉賛曰六五元吉自工祐也林黄中曰以六五之中行固已足乎已而无待于外矣而上九之富又自上而益之是以有或益之象又曰非其求而得之是以謂之或也又曰爾雅有十龜之名漢新莽傅有十朋龜貝蓋古有此稱謂崔氏曰元龜直二十八貝雙貝曰朋程可久曰古者寳龜而貨貝十朋之龜猶言大寳也龜决疑之物賢智之象朱子曰柔順虚中以居尊位當損之時受天下之益者也十朋之龜大寳也或以此益之而不能辭其吉可知筮者有是徳則𫉬其應也蘭恵卿曰十者極數也朋者陽朋也離為龜頥與損之自二至上益之自初至五皆外實中虚有離之象所以取諸龜也九二者六五之應上九居六五之上二陽為朋又曰九二正應非益我者也故不主二而言上九上九自他而來益我者也李去非曰得尊位居中而受九二之益者也而上九又或從而益之或之者疑之也疑扵過也欲違而弗克也其惟居之以損乎案九二當損以益五而上九近而相得乃或益之自二至上有龜之象損一益一乃其常也二陽並益一隂故有十朋之龜之象五君位也己損而受天下之益不為過故元吉右明象占呂與叔曰當損下益上之時五以柔中居上損上益下之時二以柔中居下天下之益皆歸焉莫之致而至至斯受之故弗克違凡損所以為益居損𫉬益為得其元故曰元吉居益𫉬益則欲長保故曰永貞吉右眀爻義上九弗損益之无咎貞吉利有攸徃得臣无家賛曰弗損益之大得志也李子思曰上九本以坤體而受乾之施以為艮則是既得益矣至是无復可損者故曰弗損益之蘭恵卿曰上本隂爻陽徃居之是弗損而反受益者也何咎之有利在貞固守之爾三徃為上九居一卦之外故曰利有攸徃自内之外故曰得臣无家程可久曰既得六五之君則不専在於六三之應故得為臣則國爾忘家也鼎之得妾亦謂得為妾爾朱子𤼵曰外以内為家上以三為家外本于内也虞仲翔謂鼎九二曰二据四家謂四以初為家也案卦以損下益上為義則工不宜損茍不損九則上隂位𫉬益矣故曰弗損益之損九則為咎弗損故无咎也以下奉上正也故曰吉與五近而相得以六五𫉬本爻之益故賛曰自上祐以本爻事六五之君故曰得臣謂得臣于五也三者己之内應故謂之家損三以益本爻故曰无家蓋近得六五則逺遺六二也右眀象占林黄中曰弗損益之无咎貞吉與九二均也然二征凶而上利有攸徃何也曰九二在卦之下損而得中又欲何徃也是以征凶上九居卦之終窮則變矣由損而之益是以利有攸徃也右眀爻義林黄中曰初之遄徃四之使遄者剛柔之偏勝也二之利貞五之元吉三之得友上之得臣者盈虚之相補也始于遄徃終于得臣者始損而終盛也始扵大作終于勿恒者始盛而終衰也損而不已必益益而不已必決始終之辨不其然乎案卦六爻皆以損有餘為義陽剛有餘隂柔不足九二上九位隂也故欲其弗損而益之以陽六三六五位陽也三在下故損其九以益上五在上故比于上而𫉬益損下益上之義也初九陽勝故以事遄徃而不嫌其損六四隂虚故損其疾已而以遄為喜然則初有餘當損者也四不足當益者也三之損上之益已得其宜者也二以弗損而為益五以或益為望外葢適中而不必損益者也右眀六爻震下巽上益賛曰損上益下民説无疆自上下下其道大光又曰益動而巽日進无疆天施地生其益无方凡益之道與時偕行説卦曰益徳之裕也又曰益長裕而不設又曰益以興利雜卦曰損益盛衰之始也向子期曰明王之道志在恵下故取下謂之損與下謂之益李子思曰損卦兑在下本乾體天下富實之象也乾陽在下損乾之九三以益坤于上則是損下之陽實以益上之隂虚者也益巽在上本乾體朝廷富實之象也乾陽在上損乾之九四以益坤于下則是損上之陽實以益下之隂虚者也下富實而上虚弱則損下以益上上富實而下虚弱則損上以益下上下相交而更為損益其道一也而損下則謂之損損上則謂之益何也古之聖賢富厚之資則寜使在民而不在己儉薄之用則寜使在己而不在民案易内卦為主故損内卦則謂之損益内卦則謂之益也李季辨曰受損以為益君民之相與也如此古人之于民夫受百畝凡其室廬服食器用之需皆上之人與之至于賑賙之法補助之政又有以濟其不及蓋下之人既出力以奉上上之人必有實恵以及民此損上益下之所以為益也石守道曰在上益下之義動而巽于民志亦是有益風散雷動而物遂益亦其義也都聖與曰凡益之道不可一言盡見善則遷益徳之裕也利用為大作益以興利也十朋之龜弗克違損下而不已必益也莫益而或擊之益而不已必決也剛得尊位大中至而有孚恵心益長裕而不設也中行告公從有餘而益下也利用為依遷國不足以求益也益用凶事以益為衰之始也王用享帝得賢者以益上也有孚恵我徳有益物之功而物反益之也右眀卦義象賛曰風雷益君子以見善則遷有過則改説卦曰神農氏作斵木為耜揉木為耒耒耨之利以教天下蓋取諸益右眀卦用序卦曰損而不已必益故受之以益林黄中曰兑艮為損震巽為益震巽者長飬之日而兑艮者歛藏之時也物極必反道窮必變兑艮之後繼以震巽損而不已必益豈不然哉程正叔曰盛衰損益如循環然損極必益理之自然益所以繼損也右眀卦序利有攸徃利涉大川賛曰利有攸徃中正有慶利涉大川木道乃行程可久曰二五當位而應將以致益故利有攸徃蘭恵卿曰否之初六徃為六四居近君之位上輔九五陽剛中正之君君臣相得此其利有攸徃也郭立之曰益象虛中而上下二卦皆木所以利涉大川李去非曰震陽木也巽隂木也胡翼之曰巽木為舟楫震動則能涉大川劉氏曰仁于五行為木道可以涉川則知仁徳之可以濟難矣聖人觀象制器作為耒耜以動而入取諸益焉亦所以助天地之施生爾郭立之曰損益之道相為終始故二卦之辭其義相繼案損益猶否泰正相反耳右眀卦占初九利用為大作元吉无咎賛曰元吉无咎下不厚事也林黄中曰益之初九損之上九也自上而来居坤之下得以貴下賤之意故上言利有攸徃而初言利用大作也既曰元吉而又曰无咎與師吉无咎之義同耿睎道曰于卦則上自損以益下于爻則上又巽以應下初九之志行矣故利用為大作張舜元曰震為動作應于六四之巽方益之初上以益下為務乃以事委初初則受上之委利扵大作蘭恵卿曰居益之初自上反下以陽變隂是興利去害初有變更以益天下者也朱子曰吉凶事也咎理也蓋有事則吉而理過差是之謂吉而有咎興事動衆易有咎也必盡善而後咎可免元者震之初九之象也益之諸爻用享帝用凶事用依遷國皆大有作為之卦故曰益以興利是也初九為大作之始故以元吉无咎戒之右眀象占李子思曰乾以一陽下交于坤而成震之初九此即損上益下之象益之所以成卦者初九是也上既施益于下則下舉事必從之斯可以大有為于世矣鄭舜舉曰損之上三爻唯上得益益之下三爻唯初得益夫得益者非以是而自私也故損之上利有攸徃得臣无家益之初利用為大作然初九在下位未崇誠未孚必元吉然後无咎右眀爻義六二或益之十朋之龜弗克違永貞吉王用享于帝吉賛曰或益之自外來也林黄中曰九五六二既相為益矣而初九之剛又自外來益之是以有或益之象也初至五有龜之象與損六五之稱龜同張舜元同益之初即損之上益之二即損之五李子思曰益者損之反也是以二爻之辭同所以異者五為元吉而二為永貞吉君臣之道也李仲永同特道作義李季辨曰王九五也用二以助享上帝也蘭恵卿曰六二柔順受益之臣九五之王用之則可以享于天帝而𫉬吉如成湯之用伊尹而能克享天心太戊之用伊陟而能格于上帝也王輔嗣曰帝者生物之主興益之宗出震而齊巽者也朱子曰爻位皆隂故以永貞為戒以具居下而受上之益故又為卜郊之吉占又曰享于帝吉是祭則受福之謂也又云王九五也帝上九也九五用六二所弗克辭之十朋之龜以享于上九之象損之彖曰曷之用二簋可用享損之時故從儉也此爻曰或益之十朋之龜而曰王用享于帝吉益之時故從豐也故曰損益盈虚與時偕行右眀象占朱子曰損益二卦諸爻皆互損之六五乃益之六二也損上九吉益上九則凶郭子和曰損益相須以相成損上益初其辭相屬而損五益二又大同矣損卦益上故䝉益在六五益卦益下故蒙益在六二耿睎道曰損在工而䝉益之盛其常也故直曰元吉益在下而蒙益之盛非其常也故永貞吉右明爻義六三益之用凶事无咎有孚中行告公用圭賛曰益用凶事固有之也李子思曰益之為卦損上益下則下卦皆䝉益者也以隂居陽震動不安有凶之象遇凶事而无咎者以在上者有以益之也周官以委積待凶荒以荒禮哀凶札或弛其政或去其征皆損上之所取以益下之凶荒者也三有應于上上來相應而損己以益之有孚之象三隂在三陽之中或損或益皆得其中是之謂中行又云以二體言之則二五各居其中以全體言之則三四並居其中故三四中孚以三四為中亦猶益之三四稱中行也林黄中曰凶事有三有札瘥之政有死䘮之禮有兵革之事今益之時損上益下其凶荒札瘥之政乎李仲永曰以臣位之髙而處乎逺地民有凶荒之事行一時之權以振之可也故无咎見信任而行之以中故曰有孚中行告于公上而用圭者功成然後告也李季辨曰居下卦之上而長民奉君命以益民者也當凶荒之事宜𤼵倉廪以行振救可也如此則无咎有孚中行君茍信任酌中而行之不必待君命也事已然後用圭而告公上葢民之食必待中覆則无及矣正如汲黯河内之事告公用圭正猶禹錫元圭告厥成功也右眀象占蘭恵卿曰損以剛柔當位為過損而凶不當位為剛柔相濟而吉益以剛柔當位而吉不當位為凶二四五皆當位唯六三不正故謂之益之用凶事右眀爻義六四中行告公從利用為依遷國賛曰告公從以益志也耿睎道曰有餘則損不足則益然則損益期于中者也六三六四在中爻之中皆以中行益之都聖與曰分二體以言之三居下卦之上四居上卦之下皆不得乎中者也然合六位以言之二爻居六爻之中即中爻以言之則二爻居中爻之中朱子曰三四皆不得中故以中行為戒以益下為心而合于中行則告公而見從矣蘭恵卿曰爻本初六徃之于外乃為六四遷國之象朱子曰周之東遷晉鄭焉依古者遷國以益下必有所依然後能立此爻又為遷國之吉占也程可久曰衛遷楚丘依齊也杞遷縁陵依普也卦體有震互體坤諸侯之象也都聖與曰四以柔巽之徳上依五之剛健則以弱依强之象右眀象占李季辨曰四近君非三之比益民之事須先告公上既從然後為之不然則為擅命李仲永曰三遠于君有振濟凶荒之事若待告而為之則无及矣故必成功而後告也四近君者也遷國大事也必待告于公上得從然後為之可也林黄中曰初者四之配也初言利用大作而四言利用遷國互眀之也又曰二爻皆有利用之辭變通之義也耿睎道曰雷以動之風以散之此生物之序也故雷風為恒若風而又雷則其事為益故風雷為益然則所謂益者益之于經常之外也李去非曰所謂益者益之于常事之外故曰大作曰享帝曰凶事曰遷國皆非常之辭李子思曰在初則曰利用為大作元吉是可用之于大事也在二則曰王用享于帝吉是可用之于大禮也在三則曰益之用凶事无咎是可用之于大烖也在四則曰利用為依遷國是可用之于大遷也天下有是理易有是象為天下者允蹈之乃見其效非虚語也右明爻義九五有孚恵心勿問元吉有孚恵我徳賛曰有孚恵心勿問之矣恵我徳大得志也程正叔曰陽實在中有孚之象蘭恵卿曰不必區區問人而恵之如是則元吉案此爻無能言者夫以事理言之則我有孚于下而恵在人心不必問而知之也斯為元吉矣則下亦有孚于我而恵我所益之徳也以爻象言之則六二者本爻之正應中無陽爻間閡則有孚于二而恵在其心勿問而知其元吉矣而六三六四又告于我而或用凶事或依遷國而有孚于我方且恵我從之徳也蓋隂陽之情如此損上益下其象亦然本爻為益之主又陽實而饒故為羣隂之所求而相孚者也右眀象占楊廷秀曰損之六五言益而不言損損之至也益之九五言恵而不言益益之盛也右眀爻義上九莫益之或擊之立心勿恒凶賛曰莫益之偏辭也或擊之自外來也胡翼之曰處益之極故莫有益之而或有擊之者耿睎道曰人道惡盈故也張子厚曰未嘗損己而云莫益之作易者因卦之為益而言爾或擊之反莫益之之義為文又云陽爻富實在益之上益之極也益之極則當損之以益下而九五為益之主下三隂皆受益于五而已之澤不下流故莫有益之者言无所用其益也益之極而无所用之必有慢蔵誨盗之招此或有自外來而擊之者也立心知此之不可恃而散之于下則可茍以為恒凶之道也益之為卦恒之反也巽下震上為恒震下巽上為益今益之窮則将變而為恒故聖人戒之以立心勿可恒也不然凶矣右眀象占説卦子曰君子安其身而後動易其心而後語定其交而後求君子修此三者故全也危以動則民不與也懼以語則民不應也无交而求則民不與也莫之與則傷之者至矣易曰莫益之或擊之立心勿恒凶案此借此爻之義以明其㫖非釋本爻之義案益以損上益下為義故上三爻皆損之以益下而下三爻皆受上之益者也唯上九處益之極卦之将變故或擊之而凶六三之益用凶事因上九之凶而取義也損上益下正在六四故有遷國之象右明六爻
