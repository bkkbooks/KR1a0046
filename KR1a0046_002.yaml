body:
  text: 厚齋易學卷二宋馮椅撰易輯注第二經上篇同人至離離下乾上上乾天也君也下離六二一爻在離之中人位也乾上離下五陽同歸二之一隂有以天同人之象亦為人君同乎斯人之象故成卦曰同人同人同人于野亨利涉大川利君子貞同人與人同也舊脫志卦今補之據贊衍同人曰三字當是錯簡後人因更增曰字同人於野亨無所不同之象爾雅邑外曰郊郊外曰牧牧外曰野四方之所輻湊無有隔礙於此同人無不亨通利涉大川利君子貞占離中虛有舟虛能載之象載上三陽健於行水故利涉大川君子謂六二成卦之主隂柔疑為小人故告於君子貞則利貞位當也初九同人于門無咎初九同人于門同人于近之象無咎占六二同人于宗吝六二同人于宗親其所親之象吝占九三伏戎于莽升其髙陵三嵗不興九三伏戎于莽內懷異志之象莽莫蕩反草莽也升其髙陵三嵗不興占大阜曰陵升髙以望其所敵而三嵗之久不敢興戎九四乘其庸弗克攻吉九四乘其庸隔於所同而欲通之之象庸今轉注墉垣墻也欲同二而隔三如庸故乘之弗克攻吉占弗克攻三九五同人先號咷而後笑大師克相遇九五同人先號咷而後笑隔於所同而後相遇之象號平聲咷道刀反啼呼也先後清聲大師克相遇占用大衆以克所隔之人然後相遇上九同人于郊無悔上九同人于郊逺人之象無悔占乾下離上一隂居尊位而五陽歸之是大其所有也大謂陽故乾下離上成卦曰大有大有元亨大有衆陽為六五柔中之君所有元亨以象占大亨也初九無交害匪咎艱則無咎初九無交害逺於君而無友助之象謂當此之時無交則害匪咎艱則無咎占所處疏賤固應無交匪已之咎但知進之難則終達於上故無咎九二大車以載有攸往無咎九二大車以載三陽同力以任重之象車聲居古輿通大車兼三陽為象載上卦也有攸往無咎占九三公用亨於天子小人弗克九三公用亨于天子乾應乎離之象位當上下之交故取此象公諸侯之尊稱亨許庚反諸家作享然以王用亨于西山之象例之亨字是也古亨享通故相亂耳然亦通用也小人弗克占九四匪其彭無咎九四匪其彭大臣逺權勢之象彭古旁通子夏作旁今傍步郎反匪其彭謂不招乾之三陽以進也無咎占六五厥孚交如威如吉六五厥孚交如上下相信之象如語辭威如吉占恐有君弱臣強之患故威如乃吉上九自天祐之吉無不利上九自天祐之乾之三陽上進之象乾為天吉無不利占艮下坤上艮山之髙退處坤之下又坤隂在上而一陽退處其下皆為退遜之象故艮下坤上成卦曰謙謙亨君子有終謙嗛不自滿之意子夏作嗛亨卦有亨義因以為象君子有終占初六謙謙君子用涉大川吉初六謙謙謙而自卑之象諸説以贊以四字為句聨君子讀之殊不知與鳴謙之象同用涉大川者乃君子事也君子用涉大川句吉占六二鳴謙貞吉六二鳴謙有聲而不自居之象鳴鳥語也貞吉占九三勞謙君子有終吉九三勞謙有功而不自居之象君子有終句吉占六四無不利撝謙六四無不利占撝謙不受而郤其謙之象此爻象在占後撝毁皮反郤去也古麾今揮六五不富以其鄰利用侵伐無不利六五不富以其鄰左右同德謙虛之象利用侵伐無不利占潛師曰侵聲罪曰伐上六鳴謙利用行師征邑國上六鳴謙象同六二利用行師征邑國占坤下震上豫利建侯行師初六鳴豫凶六二介于石不終日貞吉六三盱豫悔遲有悔九四由豫大有得勿疑朋盍簪説者謂簪貫髮之象然古無簪又曰簪即辨服之笄鹽鐵論曰神禹治水遺簪不顧夫鹽鐵論乃漢人之言非古也遺簪之事不見於經難據也姑從訓釋無害於理焉耳六五貞疾恆不死貞疾猶曰痼疾也痼猶固也疾自外入者也上六冥豫成有渝無咎震下兑上隨元亨利貞無咎初九官有渝貞吉出門交有功六二系小子失丈夫六三系丈夫失小子隨有求得利居貞九四隨有獲貞凶有孚在道以明何咎九五孚于嘉吉上六拘系之乃從維之王用亨于西山巽下艮上巽風作於艮山之下有落葉之象又下巽上止事之所以敗也故巽下艮上成卦曰蠱蠱元亨利涉大川先甲三日後甲三日蠱聲古蠱壞之名元亨象物之蠱敗者其元氣尚存故亨蓋蠱以元而亨也利涉大川先甲三日後甲三日占事壞必求其濟故利於涉大川日取甲者造事之始之義先後各三者周天之運凡六甲也先後並如字初六幹父之蠱有子考無咎厲終吉初六幹父之蠱修飭尊者所壞之事之象有子考無咎厲終吉占有子能幹其蠱則事雖蠱於考而修飭之可以無咎也有拂人情或更張則危而終歸于吉九二幹母之蠱不可貞九二幹母之蠱修飭家事之壞之象不可貞占謂不可以為正也九三幹父之蠱小有悔無大咎九三幹父之蠱象同初六小有悔無大咎占六四裕父之蠱往見吝六四裕父之蠱緩以修飭尊者所壞之事之象裕寬緩也或曰益之也往見吝占謂不可以有行也六五幹父之蠱用譽六五幹父之蠱象同初六用譽占譽去聲用有聲譽之臣以幹其父之蠱上九不事王侯髙尚其事上九不事王侯遺去有事之象髙尚其事占蠱者有事之卦飭蠱則有事也上在卦外又蠱之終可飭者已飭之矣不可飭者無所自飭也故不事而其事為髙尚兑下坤上以爻之序而言則二陽逼四隂而臨之以卦之象而言則地臨乎澤之上故兑下坤上成卦曰臨臨元亨利貞至于八月有凶臨有二義逼也覆也臨逼之臨去聲臨覆之臨平聲元亨利貞大者亨通而利於正之象至于八月有凶占八月詳見輯傳初九咸臨貞吉初九咸臨與物相交相感而相臨之象去聲九二同咸感而臨之也貞吉占九二咸臨吉無不利九二咸臨象吉讀無不利占六三甘臨無攸利既憂之無咎六三甘臨以甘言媚説臨下之象上四爻臨皆平聲無攸利既憂之無咎占臨非其正本無所利知其非正而憂之能改則無過咎矣六四至臨無咎六四至臨臨之盡道之象至當也盡也無咎占六五知臨大君之宜吉六五知臨知髙天下而足以統臨之象知今智大君之宜吉占上六敦臨吉無咎上六敦臨以篤厚之道臨下之象敦篤厚也林黃中曰增培之義吉無咎占臨之以厚故得其道而免咎坤下巽上以巽成坤下之四隂仰乎上之二陽二陽在上以示乎下故坤下巽上成卦曰觀觀盥而不薦有孚顒若觀去聲示也盥而不薦有孚顒若以象為占譬之臨祭盥滌器浣手薦或作􅏪祭也言有孚于下下之觀者見其盥已信敬不待薦而後知也故有孚顒魚恭反仰望貌若語辭初六童觀小人無咎君子吝初六童觀卑逺而觀不能見之象下四爻觀皆平聲童稚矮小在衆人之後相去又逺所觀不及謂觀九五也小人無咎君子吝占君子小人以位言也五上兩爻同小人位卑不能有見乃其分也故無咎君子而在下位亦無所觀君子之羞也六二窺觀利女貞六二窺觀自內覘外之象窺窺通苦圭反竊窺也如窺豹一班之窺女貞占釋文一本有利字以初爻例之無利字為當六三觀我生進退六三觀我生下觀上而可見之象我主九五本爻為客陽主生育故曰我生進退占謂進可觀五退可自保六四觀國之光利用賔于王六四觀國之光近天子之光之象國指九五利用賔于王占王九五也如作賓于王家之賓謂以客禮見王者乃利也九五觀我生君子無咎九五觀我生人君中正以示天下之象觀二爻並去聲我爻自我也示我之所以生育天下之道君子無咎占言如此而後君子無咎上九觀其生君子無咎上九觀其生推戴大君以示天下之象其指五也君子無咎占震下離上合六畫有頤中有物之象物麗於頥必動而噬之頤乃合故上離麗下震動成卦曰噬嗑噬嗑亨利用獄噬嗑噬市制反齧也嗑胡臘反合也亨象卦有亨義頥噬其物而嗑之乃得亨也利用獄占用獄所以去間去間而後合故利初九屨校滅止無咎初九屨校滅止懲惡於其初之象屨紀具反校爻教反以木絞校者也即械也校者通名屨校所謂桎也滅沒也止今趾足指也桎其足而沒其止也無咎占告在獄者六二噬膚滅鼻無咎六二噬膚滅鼻惡之寖長而深治之之象膚方于反皮之表也無咎占告獄者三五同六三噬臘肉遇毒小吝無咎六三噬臘肉遇毒惡堅而不服之象臘聲昔小物全乾之名毒肉有毒者也小吝無咎占九四噬乾胏得金矢利艱貞吉九四噬乾胏得金矢惡雖寖堅而得其情之象乾聲干下同胏緇美反肉傅骨之名説文作􅳨子夏作脯鄭作簀于爻義無取乾胏最難于噬者鈞金束矢詳見輯傳利艱貞吉占利於艱貞乃吉蓋非易噬之物六五噬乾肉得黃金貞厲無咎六五噬乾肉得黃金以中道治惡而罪疑從輕之象乾肉輕於臘胏黃金贖刑也貞厲無咎占存貞厲之念謹刑而不輕決乃得無咎上九何校滅耳凶上九何校滅耳懲惡於怙終之象何今荷校枷也何之於首者也沒其耳重枷也凶占長惡不悛故凶離下艮上坤之一隂自上而來二以文乾成離之明乾之一陽自二而往上以文坤成艮之止故離下艮上成卦曰賁賁亨小利有攸往賁彼偽反文飾也或甫寄符文反或謂古班字並非亨小象因其質而賁文之無其質則文無所施故所亨者小小謂六二文乾也利有攸往占天下有自然之文不容但已故以有攸往為利往謂上九往文坤也初九賁其止舍車而徒初九賁其止致飾于其初之象止同噬嗑初九舍車而徒占舍今捨車今輿古居與余二聲通用鄭張作輿徒行也六二賁其須六二賁其須致飾於其上之象占在象中須今鬚九三賁如濡如永貞吉九三賁如濡如致飾潤澤之象如語辭濡聲儒永貞吉占六四賁如皤如白馬翰如匪寇昏冓六四賁如皤如白馬翰如未致飾而人求之之象皤白波反或聲煩髮白貌或作燔波皆非翰户旦反叶聲寒董黃曰馬舉頭髙卬貌謂所賁髮白而猶未加飾有乘白馬翰飛而來賁之者謂初九也匪寇婚媾初九正應也六五賁于丘園束帛戔戔吝終吉六五賁于丘園束帛戔戔飾致于幽隱而以物將之之象丘園隱逸者之所居束帛聘幣戔戔委積貌薛虞云禮之多也在千反或聲箋或作殘殘者非吝終吉占上九白賁無咎上九白賁終於致飾成文之象白賁即繪畫之事後素功也無咎占謂能以白賁五采則無咎坤下艮上上艮一陽在上二隂在下下坤三隂凡五隂消去一陽故坤下艮上成卦曰剝剝不利有攸往剝普卜反讀如八月剝棗之剝擊也又邦角反割也裂也諸爻以割裂為義不利有攸往無象有占往則剝陽矣初六剝牀以足蔑貞凶初六剝牀以足毁下之象足牀之最下以象初也以謂欲剝牀先剝其足也下以同蔑貞凶占蔑荀作滅今文貞正也滅正道故凶六二剝牀以辨蔑貞凶六二剝牀以辨毁漸近上之象辨皮莧反説文判也正義足與牀分辨之處崔云牀梐或作辦古通辨故誤蔑貞凶占義同初六六三剝無咎六三剝無咎不隨衆以毁上之象象意寄於占今本作剝之無咎京劉荀一行皆無之字釋文一本有之字非後人以贊有之字遂疑經脫此一字增入也六四剝牀以膚凶六四剝牀以膚毁及其身之象膚或作簠非凶占六五貫魚以宫人寵無不利六五貫魚羣隂相次而進之象魚隂物貫之則不亂以宫人寵無不利占以宫人之寵寵之無有不利者矣寵今文古龍上九碩果不食君子得車小人剝廬上九碩果不食陽實不剝之象碩大也食式亦反君子得車小人剝廬占車從董遇朝曰古文今輿羣隂上載之象廬上覆下本爻之象震下坤上一陽自剝反下來居主內而上復故震下坤上成卦曰復復亨出入無疾朋來無咎反復其道七日來復利有攸往復聲伏去而還其所也又為陽氣自下而復上之義亨象一陽之氣上達則亨矣出入無疾朋來無咎反復其道七日來復利有攸往占出乎剝入乎復無有害之者朋類之來誰復咎之自上反下自下復上其道皆以七日為節故七日而來復也自復以往至于六陽無不利者反今翻疾或以為疾速之疾亦通初九不逺復無祗悔元吉初九不逺復至近而先復之象無祗悔元吉占祗聲支辭也玉篇曰適也李氏曰謂擇善而行無適於悔以詩易考之亦祗以異祗攪我心祗自塵兮易此爻與坎祗既平適義皆通或以為徒亦通而無所據或以為底而詩祗自底兮則底自底祗自祗義不相蒙餘説益難據元吉大善而吉也六二休復吉六二休復優裕自得以復之象吉占六三頻復厲無咎六三頻復頻今瀕古通水崖也瀕於勢窮而後反也或作顰蓋説文謂人所賔傳頻蹙不前而止遂以為真也厲無咎占六四中行獨復六四中行獨復與衆俱行而獨能從善之象以象為占中行行於五隂之中乃獨能復也六五敦復無悔六五敦復躬自厚以復於善之象敦者厚之至也無悔占上六迷復凶有災眚用行師終有大敗以其國君凶至于十年不克征上六迷復昏暗而忘反之象迷失道也凶有災眚用行師終有大敗以其國君凶至于十年不克征占災今災籀災傷害也眚目不明也以猶及也其國謂上卦坤也君謂六五也十年坤之極數雖久如此不能行也震下乾上無妄元亨利貞其匪正有眚不利有攸往朱子謂史記作無望自文王以來多為無望之義馬季長鄭康成王子雍皆同斯義古人用字聲同者義亦通之如豫之為預履之為禮噬嗑之為市合不一端而足今觀卦內作無所期望而有得其義多通序卦之意非可如此推也蓋動出於人則為之而期其成有所望也動而聽命于天非可期望也初九無妄往吉六二不耕穫不災畬則利有攸往六三無妄之災或繫之牛行人之得邑人之災九四可貞無咎九五無妄之疾勿藥有喜上九無妄行有眚無攸利乾下艮上下乾三陽欲上復而上艮止之故乾下艮上成卦曰大畜陽為大言乾為艮所畜也大畜利貞不家食吉利涉大川大畜與小畜聲義同謂大有所畜也利貞象陽以上復為貞不家食吉利涉大川占食石易反又聲似亦通謂不食於家出而事君乃吉亦為不家家而食之惟養賢以及萬民初九有厲利己初九有厲前有危阻不進之象利已占已止也或作已非九二輿説輹九二輿説輹載重而不能進之象以象為占義並同小畜九三良馬逐利艱貞日間車衛利有攸往九三良馬逐三陽駸駸上進之象逐鄭姚作逐逐利艱貞日間車衛利有攸往占日或作曰非車今輿利于知難而守正故日間習其車衛而往則利矣六四童牛之牿元吉六四童牛之牿制其剛而畜擾之之象童去其角而平之如童子之去其髮之貌今山之去木者亦曰童牿劉表云角也鄭作角陸績云當作角元吉占六五豶豕之牙吉六五豶豕之牙象同六四特變文爾豶符云反豕去勢曰豶牙或作互非吉占上九何天之衢亨上九何天之衢陽德達于上之象何歎辭也衢路也以象為占震下艮上上艮而下震動頤之象也又六畫亦象頥故震下艮上成卦曰頥頥貞吉觀頥自求口實頥頷也口所以飲食飲食以養生故以養為義貞吉象在占中觀頥觀平聲觀二陽之所養也自求口實四隂中虛當自求所以實口者初九舍爾靈龜觀我朵頥凶初九舍爾靈龜觀我朵頥四隂就養於一陽而養之不足之象舍今捨朵多果反下垂貌木垂為朵故世以花為朵也朵頥下垂以受物也靈龜心之至神之象爾爾通對我之稱我指本爻爾四隂也蓋本爻告四隂之辭朵京劉作㙐多辨也凶占言本爻不能養四隂而為辭以卻之隂陽皆凶六二顛頥拂經于丘頥征凶六二顛頥拂經于丘頥捨上而就養于下之象顛反也反頥于初九也以上養下者頥之常道經常也丘言其髙如丘嫂之丘謂上九也拂戾也謂反養於下戾以上養下之常經征凶占既就養於下則往上為凶上不應也六三拂頤貞凶十年勿用無攸利六三拂頥失其所以為養之象捨上九而從下體以動為拂其所頥貞凶十年勿用無攸利占違正應而從所昵固守則凶雖十年之久不可用也六四顛頥吉虎視耽耽其欲逐逐無咎六四顛頥就養于下之象義同六二吉占虎視耽耽其欲逐逐威不勝愛之象耽丁南反垂首下視貌其指本爻逐逐言勇於從正應是其所欲雖虎視之專弗顧也無咎占六五拂經居貞吉不可涉大川六五拂經戾以上養下之常之象居貞吉不可涉大川占居貞吉猶用靜吉也故不可涉大川用作凶也上九由頥厲吉利涉大川上九由頥天下由已以養之象厲吉利涉大川占其事雖危已當任責故吉所養者衆則可以濟事巽下兑上陽居中而隂半之是陽過于隂也陽大隂小故巽下兑上成卦曰大過大過棟橈利有攸往亨大過去聲過越之過非經過之過也棟橈本末俱隂弱陽居中獨隆之象棟屋之脊梁也橈乃教反曲而折也利有攸往亨占往以救棟橈之弊故亨初六藉用白茅無咎初六藉用白茅以柔乘剛之象無咎占九二枯楊生稊老夫得其女妻無不利九二枯楊生稊陽本弱而復生之象枯鄭聲姑非稊徒稽反鄭作荑木之更生者老夫得其女妻無不利占女未嫁之稱九三棟橈凶九三棟橈下弱之象凶占九四棟隆吉有它吝九四棟隆陽實居中之象隆壯實也吉有它吝占九五枯楊生華老婦得其士夫無咎無譽九五枯楊生華陽末弱而復生之象華古敷聲孚後作荂今花老婦得其士夫無咎無譽占譽平聲此爻叶韻上六過涉滅頂凶無咎上六過涉滅頂弱不能濟之象遇水津也過涉勇濟也沒頂則溺而不出矣凶無咎占謂無所歸咎坎下坎上一陽陷於二隂之中其卦為坎為陷為險復筮得坎是為重險故成卦曰習坎習坎有孚維心亨行有尚習坎習重習也坎苦感反險也陷也或作坎欿水岸曰坎有傾陷險阻之義蘭曰習者積習相繼之義有孚行險以信之象二五中實維心亨行有尚占言二五之心相通以求濟險也尚配也如得尚于中行之尚水流行之物以坎遇坎故行險則有配初六習坎入于坎窞凶初六習坎重重遇險之象入于坎窞凶占窞徒坎反虞翻坎中小穴或陵感反水鍾于穴大曰潭小曰窞九二坎有險求小得九二坎有險居險而未出之象既曰坎矣而又有險未能出也求小得占小謂小事小物六三來之坎坎險且沈入于坎窞勿用六三來之坎坎進退皆險之象石曰之往也險且沈入于坎窞勿用占沈古文薛同平聲沈溺也險或作檢沈或作枕玷按皆非六四樽酒簋二用缶內約自牖終無咎六四樽酒簋二用缶內約自牖簡禮以結主知之象樽盛酒器簋聲軌盛食物器內方外圓曰簠內圓外方曰簋二副之也缶方九反瓦器虛而有聲可擊之以當樂內今納約質言也牖牖下謂本爻近臣之象也或謂簋絶句無二字內或作內外之內牖或作誘皆非終無咎占九五坎不盈祗既平無咎九五坎不盈欲出險之象謂水不盈岸祗既平無咎占祗義同復初九既平則水不流矣故無咎上六繫用徽纆置于叢棘三嵗不得凶上六繫用徽纆置于叢棘三嵗不得獄訟纒綿不能脫去之象繫義見隨六二徽許韋反纆聲墨三糾曰徽兩糾曰纆皆索名置劉作示今置示即置也叢棘刺之叢生者也得如罪人斯得之得言得其情也凶占離下離上一隂麗於二陽之中主隂而言曰離再筮得離其象不易故離下離上成卦曰離離利貞亨畜牝牛吉離去聲傅麗也一隂麗乎二陽之中則陽分為二故取離象與麗聲同亦為麗也利貞亨象上下二卦皆以隂麗乎中故曰利貞二五中虛交通故亨畜牝牛吉占主六五而言以下一離為牝牛而畜之初九履錯然敬之無咎初九履錯然足躁動之象錯七各反交互也敬之無咎占六二黃離元吉六二黃離柔麗乎中正之象黃中之見於色者也元吉占九三日􅨫之離不鼓缶而歌則大耋之嗟九三日􅨫之離明將沒之象􅨫古仄今􅉴日在西方時也不鼓缶而歌則大耋之嗟鼓古鞁今鼓鄭作擊恐非耋它結反九十曰耋文從老從至謂垂盡也王子雍它結反或作絰嘻非嗟古差今本有凶字古文及鄭本無朝曰無凶字得象數九四突如其來如焚如死如棄如九四突如其來如犯上而反之象突徒忽反古倒子作子或倒子作子説文忽出也今以古文難書改突從穴從犬以犬從穴忽出為義􅘸竈之囱出火氣者謂之突如語辭下卦之火從突出衝上六五大君不可犯來反也自外至曰來焚如死如棄如占上不可犯而犯乃自焚而死死而人棄之以其不順也六五出涕沱若戚嗟若吉六五出涕沱若戚嗟若憂傷之象出尺類反自內而外也涕淚也沱徒河反亦作沱或作池恐非滂沱大雨也沱若言若大雨然若陸作戚古文今蹙子夏作嘁子六反咨慙也李氏曰蹙額而嗟嘆也吉占上九王用出征有嘉折首獲匪其醜無咎上九王用出征以君命討不服之象征出師之名征之為言正也正不正也有嘉折首獲匪其醜無咎占嘉賞之也折之舌反上為首折首謂屈服其首者也一曰後世所謂斬首級醜類也所獲非其類謂脅從罔治也
