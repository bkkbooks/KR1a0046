body:
  text: 厚齋易學卷二十五宋馮椅撰易輯傳第二十一經下篇革鼎離下兑上革贊曰澤火相息二女同居其志不相得曰革又曰天地革而四時成湯武革命順乎天而應乎人革之時大矣哉雜卦曰革去故也耿睎道曰革與變異變則質亡革則質存若皮之為革也質存焉金之從革也質存焉案革則質存而去故變則變質而從新化則質亡矣鄭少梅曰革雖有鼎鬲革生為熟之象然以爐鞴之象為正蓋以離火鼓鑄兑金而金從革也革而受之以鼎者以鼓鑄而成鼎也林黃中曰以火克金從革也是故全卦之體有爐鞴之象焉李子思曰兑之三畫隂潤在上是為澤澤之隂潤是為水水澤之氣凝結而成秋之肅是為金金與水澤之氣皆畏火者以金得火則銷而水澤遇火則燥而且涸故離兌相遇其名為革革者金水之氣遇火而變易其故常有革去故之象者也此皆以兑金為説與澤火相息之義小異然澤息火易見也若火息澤則子思之説得之程可久曰澤火不相遇則睽相遇則革説見睽革也者從其所勝而已王介父曰澤在上則欲下火在下則欲上澤火非如離坎有隂陽相逮之道也其相遇則相息而已矣其相息也唯勝者能革其不勝者耳李子思曰澤火相息必有一勝兑非北方之正水少隂之氣不能以敵南方之正火兑之隂畫下有二陽畫限之而離火從下暵之此火能革澤水也人知澤下息火而不知火能上息澤水故贊曰澤火相息李氏曰火動而上澤動而下未若澤火相息其藝不能兩存也二女同居其志不同行未若志不相得其藝不能兩立也此睽與革之分也朱子曰澤火相違則為睽相息則為革此述贊意正義曰此卦明改制革命故名革也閭丘逢辰曰王者之興受命於天故易世謂之革命於是乎除苛解嬈興弊起廢改正朔易服色王景孟曰文之於九五特曰大人虎變未占有孚而止耳至於孔子然後廣及革命之事豈知微其辭於爻者此文王之旨也即由是旨而申之以其事實之以其人而無復隱諱焉者此則孔子之旨也李季辨曰文王三分天下有其二以服事殷其事見於明夷文王非不能革也時未當革聖人不敢先時已當革聖人不敢後聖人不能為時能不失時而已文王晦其事於爻孔子發其祕於彖即彖以觀爻則革之義見矣此以革命言革之大者蓋卦有此一義毛伯玉曰火畏水而限於鼎故為火所革然則此象也與既濟略同而實異彼雖以二體名卦而實以六畫為重故曰剛柔正而位當所以濟也此乃以澤火為革而又取於西方之金此鼎所以坎革也若是則鼎足矣曷為又以革言之革有革義鼎有鼎義濟有濟義猶咸恆歸妹之不可一闕也雖然聖人論卦亦多説矣澤火相息者革之正説也二女同居亦革也文明以説革之道也澤中有火天地之革也皆通則具列之所以為易也此言贊之釋彖每每如此大抵包犧畫卦使人觀象隨其事推其象而吉凶可見矣於是乎有官占文王懼易道之不明而占者之失其指也故因以象繫一辭其不能盡推者辭之所不及也孔子從而贊之有出於辭之外者孔子之新意也有不出於辭之本指者孔子之新例也毛氏之言謂孔子之意與例爾文之辭蓋舉一隅而不盡意也右明卦義象贊曰澤中有火革君子以治厯明時右明卦用序卦曰井道不可不革故受之以革程正叔曰井之為道存之則穢敗易之則清潔不可不革者也林黃中曰自井之革巽反為兑坎變為離上下相易而成卦也毛伯玉曰離火也澤水也兌金也有鼎之象焉其將革也取於井之泉其已革也則為鼎之實此三卦相次之義也右明卦序已日乃孚元亨利貞悔亡贊曰已日乃孚革而信之文明以説大亨以正革而當其悔乃亡朱子發曰十日至庚而更更革也自庚至已十日浹矣已日者浹日也二應五三應上孚也案周宫垂法象魏浹日而斂之蓋浹日則人己相孚可以斂之而不示也離兑之間有坤焉戊己之上所從生也二體皆隂故取於己己隂土也易中多取十日為象如先後庚甲是也聞之浮屠氏善易者曰今本己作已誤也古人用事皆以十日為義自甲至己為下五日亦為更革之義猶乾至四爻曰乾道乃革也二説並存以俟知者張敬夫曰後世改作多出臨時率意是以民不心服而畔亂隨之故聖人每戒之以有孚使之取必於衆人不可任一人之私意始言已日乃孚又曰革言三就有孚改命吉李去非曰革有難改之意人情安於故而未習乎新其誰肯遽信以為革之之當程正叔曰先王之政令人心始以為疑者有矣然其後也必信趙氏曰革取澤火相息義不取坎上離下而取兌上離下者以變革之難非內明而外説則不可也內明則見理必盡外説則無咈於人情不如是而能革者未之有也革而不當未有無悔者也當革之際求信之難如此求其無悔之難又如此唯二五中正相應所謂大亨以正者也故六爻之中唯此二爻為善蓋以六居二而在離明之中則所見不偏必無過舉故已日乃革之可以征吉而無咎以九居五而在兑説之中則所存剛實必無不信故一時丕變如虎文炳著雖未占而有孚下言征吉而上言有孚則中正相應之辭也此與贊意合而發明二五之應是為得之蘭惠卿曰革則已有悔在其中唯革而當則其悔乃亡正義曰為革而大通利正可謂當理矣是以其悔乃亡李氏曰聖人之為革積於思慮者既審則發於事業宜無不當然必以知悔為心然後發而當也右明卦象占初九鞏用黃牛之革贊曰鞏用黃牛不可以有為也正義曰禽獸之皮皆可從革故以喻焉毛伯玉曰易道尚變故賁之爻有不賁者存損之爻有弗損者在而革亦不專言革也及其變革為黃牛之革鞏而固之戒其輕也革而當其悔乃亡戒之於初所以全其革也與朱子曰革所以固物亦取卦名而義不同其占為當堅確固守不可以有為聖人之於變革其謹如此李仲永曰黃牛言為六二所革也李子思曰坤在離為黃牛離之初爻剛而無應於上故有此象程可久曰上無其應近比六二中順應上當固用六二之道以為革案黃中之色坤為六六坤之䇿二居中黃牛為六二也六二在本爻之外以包之有鞏用黃牛之革之象言初非其時下非其位當固執之未可言革也聖人謹之於變革之初如此變革與皮革字同而義異如履之為禮噬嗑之市合易中率取其聲同則不拘其本義也右明象占劉氏仲平曰以位言則下以時言則初下非可革之位初非可革之時蘭惠卿曰以九居下有材而無位不可以更革也案聖人以其陽爻慮其恃材輕革故告之以當鞏黃牛之革而用之以無應比二當革九之陽剛為中順之道而固執之也右明爻義六二已日乃革之征吉無咎贊曰已日革之行有嘉也劉氏曰柔順中正盡為臣之道也不敢以革倡始唯以革代終王介父曰臣道不為事首故已日乃革之柔順故征乃吉無咎朱子發曰十日之次自庚至己浹焉已日浹日也王輔嗣曰二與五雖有澤火之異同處厥中隂陽相應往必合志不憂咎也案澤火殊體者卦也剛柔相應者爻也朱子曰必已日而後革之則征吉而無咎戒占者猶未可遽變也都聖與曰人君不待已日而後革其所革也已日而後孚爾人臣待君之造始而後代終故已日乃革之程可久同案已日乃孚王朝之革也革之令浹日而後孚於天下也已日乃革之侯國之革也王朝之命孚於侯國侯國乃從而革之後入告於王斯吉而無咎矣革之不以道或不奉命皆咎也征吉謂往應九五入告之於王象也右明象占九三征凶貞厲革言三就有孚贊曰革言三就又何之矣程可久曰以剛過中以離炎上故征凶守之以正雖曰有厲然變革之言已三就矣兹可信而革又何用更征朱子發曰兑為口革言也上六應之孚也劉氏曰自三達上二陽隔之故有三就之辭石守道曰三就則議之之審所以有孚案下卦之終革道已成往將何求進而求革則變法亂政而凶矣雖正亦危也然上之人以革令之言三就於我而議之則有孚于上何凶厲之有以象考之下卦之終必進上卦而火進遇澤故征凶也以九居三貞也切近於炎厲也上六為兑之口舌革言也九隔四五而不能上進以應之澤動而下隂必求陽雖隔四五乃其同體終不能間故就之至三其情有孚也右明象占毛伯玉曰火居澤下能無危乎往則凶而居則危本爻適當其會者也劉仲平曰六二九三其體炎上故皆有征之象二則勉之以吉三則戒之以凶聖人因二以濟民行亦因其材以篤之而已案六二應九五之君革於已日之後故征則吉九三上應上六之窮革道已成故征則凶右明爻義九四悔亡有孚改命吉贊曰改命之吉信志也馮當可曰佐五為革之大臣得位合志無有疑悔故能於人主之命可從則從不可從則改之而人主不以為逆非改君命革非以從是也革之用於九四者然也程可久曰王言唯作命以剛德近君君命有未善以相孚之德改之豫違汝弼所以吉也道曰變事曰改質曰革劉氏曰改命如古之納言後世之封駁詔書也案下三爻革之初革有當不當至四則革已定矣故悔亡近君而革大臣之位同德相孚故君命之革有未當者改之而不以為疑得大臣之盛者也故吉自三至四皆言有孚于君五有孚于天下也三議革而後孚四有孚而後改淺深之序也五未占而有孚積孚之素也右明象占耿睎道曰以陽居隂是有悔當水火交會之際如火已極則水當代王至此可以改制以五行則水火當更離兑相更正夏秋之交陸希聲曰火焚澤物則變革四體在澤為火所焚以陽居隂得革之義程正叔曰四非中正至善何也曰唯其處柔也故剛而不過近而不逼順承中正之君乃中正之人也易之取義無常也隨時而已右明爻義九五大人虎變未占有孚贊曰大人虎變其文炳也蘭惠卿曰自乾之飛則曰龍自革之變則曰虎要之為大人則一也堯舜之揖遜天下唯德之見故曰龍龍陽類也湯武之征伐則有威存焉故曰虎虎隂類也馮當可曰虎西方肅殺金行之正氣其德配龍蓋神獸也長林一嘯萬谷風生乳孳幽巖太隂成暈居之九五不亦宜乎李子思曰以離革兑兑體之中已具離之文明矣故有虎變文炳之象兑説乎離明信而從之有不可強故卦辭先以已日乃孚為訓而九三九四諸爻皆曰有孚積至于五而有大人虎變之象則其孚不問而可知矣三四五皆陽爻也雖離兑異體而陽剛信實則同故皆有孚朱子曰虎大人之象變謂希革而毛毨也在大人則自新新民之極應天順人之時也以陽剛中正為革之主故有此象朱子發曰兑為虎虎具天地之文然未著也變則其文炳然易見六二離變兑為文明虎變也劉氏曰下卦言革上卦言改言變革道愈進而愈成也初言黃牛之革五與上言虎豹之鞹亦類也都聖與曰變者革之成也為革之主則可以言變而革不足道也未占有孚言大人之道已日乃孚言天下之情蓋已日乃孚亦無所事乎占也耿睎道曰古者有所建置必先稽卜筮然則事之序先占而後革者也占在未革之先而孚又在於未占之先則孚之其已久矣案九五陽剛中正大人之象以四陽在下二隂在上言之則五之六來居二為離二之九往居五為兑有虎變文炳之象下乾為虎履虎尾謂乾也乾九五亦為風從虎往變兑亦虎虎變也兑應西方白虎之宿揚子雲未知變之義以為化也其云豹變則虎誤矣唯朱子得其指古者大事必卜所謂寧王遺我大寶龜紹天明即命我有大事休朕卜并吉是也舜之命禹亦曰官占唯先蔽志昆命于元龜有如室家相慶於來蘇之先未占而已有孚矣與政令之革已日乃孚之義不同右明象占上六君子豹變小人革面征凶居貞吉贊曰君子豹變其文蔚也小人革面順以從君也朱子發曰兌之陽爻稱虎隂爻稱豹考之天文尾為虎火也箕為豹水也而同位於寅虎豹同象而異爻也九五自離來火也上六兌體之隂水也離二文之中也故二交五其文炳明離三文已過故三交上其文蔚茂三交上成九君子豹變也上交三成六小人革面也李子思曰以兑之隂氣鬱而成澤有南山之豹處霧中而澤其文之象馮當可曰上六之位君子處之則為豹變小人處之則為革面牛虎豹皆革當革卦而取皮革之義易之所以為通者也牛革取其用虎豹取其文右明象占干寶曰君子若周召之徒也豹虎之屬君聖臣賢殷之頑民皆改志從化故曰小人革面天下既定當偃武而不用故曰征凶居貞吉得正有應君子之象耿睎道曰九三之革陽動乎外故為革言上六之革隂見于外故為革面九三居下體之極其功成於革言上六居上體之極其功成於革面則皆可以止矣故皆曰征凶鄭舜舉曰初離體而陽剛乃不可以有為上兌體而隂柔乃有如是之吉人情難與慮始可與樂成唯革之時見之初九君子也以其居革之始故其有為也難上六小人也以其居革之終故亦順以從君子曰革面者革之而當必非小人之謀既革而成小人亦不得而非之亦有此義案五上二爻湯武革命之事豹虎之屬其君子依乘風雲以俱變者也其小人亦改觀面目以共覩聖人之作自此一正君臣之名分則吉若又顧而之他則凶矣右明爻義林黃中曰尊者變法卑者聽焉賢者變禮不肖者從焉是故革之諸爻陽為革命之君子隂為從革之小人案革之為道始以中順固結民心然後擇日革之所議已熟有孚于天下其悔乃亡有命欲改無所不可是以革之大君一出令而未占有孚蓋孚於天下者素也其在位之君子在下之小人皆一新其心志觀聽六爻之義雖有參差不齊而其綱維相貫如此又有一義下三爻言革革政之事也初九位卑百官有司守法者也故不可有革二諸侯承王命之革者也三方伯居危疑之地但主侯國之議者也若夫四近君大臣司出納命令者也五上二爻則變文言革命之事矣易道無所不包故其義相為經緯也右明六爻巽下離上鼎贊曰鼎象也以木巽火亨飪也聖人亨以享上帝而大亨以養聖賢雜卦曰鼎取新也張子厚曰足隂腹陽耳虛鉉剛鄭舜舉曰此鼎之象與義也郭立之曰聖人名卦必以道乾坤艮巽坎離震兑凡諸重卦名皆道也卦辭乃言德獨井鼎二卦以器者道器一也由道可見器由器可推道也李子思曰聖人設卦取名之義則論理而井鼎二卦則論象蓋理者內象也象者外象也因象以探理即理以明象聖人之意要使學易者互觀而得之以畫而觀在下者分而為止在中者充而為實在上者岐而為耳衡而為鉉其象灼然文王卦下之辭止言其德至孔子然後申言其象以詔後學林黃中曰鼎之為器尊其為用也重古者祭祀賓客及王公膳羞陳其鼎俎各有差等周官膳夫王日一舉鼎十有二公侯大夫以次降殺故樂正子謂孟子前以三鼎後以五鼎則鼎之道上行而非下濟者也李季辨曰昔禹平水土九牧貢金于是象物以鑄鼎示人知所避厯代傳之以為寶器武王克商遷九鼎于洛邑成王宅洛定鼎卜年卜世及周之衰楚子問鼎大小輕重周人假説以為在德不在鼎秦而下鼎遂淪亡漢武帝得寶鼎於汾隂薦告宗廟作為歌詩此事多偽然則鼎也者國家之重器也右明卦義象贊曰木上有火鼎君子以正位凝命右明卦用序卦曰革物者莫若鼎故受之以鼎程正叔曰鼎之為用所以革物也變腥而為熟易堅而為柔所以次革也林黃中曰自革之鼎離反居上兑反為巽上下相易而相成也又曰金火同居革而成器器之大者莫若鼎故以鼎次革也又曰革所以改命鼎所以凝命右明卦序元吉亨贊曰巽而耳目聰明柔進而上行得中而應乎剛是以元亨林黃中曰鼎之義在于養六五以柔上進而下應九二之陽剛有仁賢之主下養剛德之賢之義故曰鼎元吉亨元者陽剛也得應而為亨李氏元達曰以此成器達于有為則元吉亨者鼎之功也王氏昭素曰元始即亨鼎蠱大有三卦不云大亨是其義也程正叔曰卦才可以致元亨案孔子以卦才言之文王初意則謂鼎之用可以養人故元吉成亨飪之功則亨也亨飪與元亨文同則義亦通古人用字之例如此右明卦象占初六鼎顛止利出否得妾以其子無咎贊曰鼎顛止未悖也利出否以從貴也馮當可曰初止則足顛則耳也林黃中曰反覆視之皆有鼎象三陽在中鼎之腹也一隂在下鼎之止也一隂在上鼎之耳也鼎以足竒耳耦而成器以初六為止則欠一止鼎而欠一止則下以上為顛上以下為折在卦之初鼎於是未有實也未實而顛之是將出否而致新也李季辨曰全體一鼎象也分上下體則為二鼎上體之鼎有耳而無足故四曰折足下有足而無耳故三曰耳革六爻皆取鼎象故贊總言之曰鼎象也初為鼎足鼎有三足今畫二而已則顛傾也二説言象皆有理若止以本爻言之前説為長其為欠一足故有顛象則一也特否未有象程可久以九四為否大抵隂柔而不足以任重猶大過之棟橈乎下爾右明象程可久曰以初承二因二以應五如妾承女君以事夫剛柔相與而功成故得為妾而以其子無咎是皆趨變以就道者也昔之人有忠於所事不知義命之大戒蓋不足以語此此取妾象為宜而未有子象林黃中以四在外應為子本爻在內下而賤為妾未詳孰是耿睎道曰妾之於子有母道焉母宜在上而今在下則是母賤而子貴以母之賤從子之貴有出否取新之道朱子發曰以賤為貴而後有子也公羊謂妾以子貴非也嫡妾之分豈可亂哉蘭惠卿曰鼎不責其顛止而取其出否妾不責其卑賤而取其有子鼎者宗廟之器長子主之故聖人於鼎之初有得妾以其子之言欲使後世沒汲冢嗣主器之人也胡翼之曰妾雖至賤以其有子能荷先祖之業故得無咎案孔子之意非貴其得為妾貴其有子而得為妾爾位最卑下而賤則始非妾矣石守道曰未妾而有子是亦顛倒之象右明占李氏曰止之顛以出否為利備妾非其正而以得子為貴皆事之權也彖象皆言聖人之材與用材之效至於六爻唯五與上言聖人之事餘爻則各因其材而論之劉氏仲平曰初六之材非如不逺復之無悔蓋舊與為惡而能自革爾是過而能改者於道未違也劉氏曰人之材昔嘗為惡在所可賤今能改過為善則宜見用此古之人君所以不廢補過之臣與毛伯玉曰自養賢言之則顛止所以出否去小人而用君子也自其實言之則國以鼎為存亡顛止者鼎之傾也湯武革命而遷鼎未可以為悖也又曰出否去故也覆鼎則為革故也自子言之則取之震以明主器之義而革也鼎也震也三卦相次之理益明矣剝復無妄之次亦然都聖與曰革主於故而終於取新故九五上六有炳蔚之文鼎主於新而始于去故故初有出否之利二卦之義其相為終始者乎天下無不可為之時亦無不可為之事聖人知足以知事幾之會苟可以轉敗為成轉禍為福無不致之者鼎之初六其畫為足則欠一故有折足顛止之象然在四則鼎實已盈故為覆餗之凶在初則未有實也未有實而顛止則可以為出否之利鼎覆則為革革去故也出否之象豈不明甚以此知百姓日用而不知特見理不明耳右明爻義九二鼎有實我仇有疾不我能即吉贊曰鼎有實慎所之也我仇有疾終無尤也王輔嗣曰以陽之質處鼎之中有實之象也劉氏曰二三四同為鼎腹皆以陽而有實二之實尚少未可舉而用之程可久曰有實之始君子之道未成則不利於輕用據爻意不曰無咎而謂之吉者蓋有實之初不輕用其道未易可量非特補過之義馮當可曰物之初入鼎未可食也故五雖不我即而吉右明象胡翼之曰疾謂三四也言雖應於五以三四間隔其路蘭惠卿曰六五有疾者閡隔三四而不能就我也趙氏曰以九比初六之隂宜其招仇而見疾也李季辨曰五為鼎耳麗乎上體而不能下接案二五得中相應以臣承君爻義未有不善也然隂陽相應而中閡陽爻則未有不為疾者也况近據初六亦有可疑之迹宜六五之下應而疾之者衆也然鼎之實以上出為用初六在下鼎實無下逮之理六五在上虛而能出又為耳受鉉以舉者也唯其在鼎實之下為物初入鼎又為實未盈鼎初入鼎則未可舉未盈鼎則亦未可舉故三四疾五之應而五不能即乃所以吉也右明占九三鼎耳革其行塞雉膏不食方雨虧悔終吉贊曰鼎耳革失其義也蘇子瞻曰六五之耳可鉉而上九之塞不可鉉林黃中曰三無正應而承乘皆剛故有行塞之象郭立之曰凡物之行以足獨鼎待鉉故以耳耳實則其行塞矣又曰雉文明之物離之象也李仲永曰離明在上而不為之應是雉膏不食者也又曰隂陽和則雨三與上皆陽欲雨而不雨也故方雨而虧惟悔乃終吉蘭惠卿曰方者方欲而未必然之辭劉氏曰二三四皆以陽同為鼎實二之實尚少四之實既盈唯三之實適得其中焉故終吉馮當可曰鼎之亨飪未可食而出則是君子之道未充于己而欲施之於人不可也如其可以食矣而不能出以濟人亦無取矣方雨而虧不為雨矣上雖應而不應之象也悔終吉者時未可則卷而懷之以有待何凶之有不量可否一意於進者凶何疑焉林黃中曰六五在上九二九四上九莫不從之九三雖欲不從不可得也然則始虧而終悔始於不食而終於吉不亦宜乎李季辨曰分上下體言之下體有足而無耳離在上為雉鼎既無耳雉無所立故不下食觀高宗肜日雉升鼎耳而雊今鼎耳既革宜其不食也若與上體合隂陽相和則鼎體全而終吉矣亦一説也言雉有理案九二應五得鼎耳可以舉者也而有疾之者故五莫之即九三應上則鼎耳變矣故失其義而莫或舉之上實而不虛九四當其前故其行以往則其路塞也鼎實積二至三切近離火實兑而烹熟其膏沃可食也雉升于鼎而不下食則以失其耳而五非所應也雉之文明謂五也然三終上進進而至五則隂陽和而雨其耳得矣方雨而虧則以九四閡其進塞其行也故有輕舉之悔二四上衆陽皆歸六五三居其間尚何之乎終于從五則耳舉而雨應君臣之義得矣大抵鼎之為卦繼革之後革之覆為鼎鼎之覆為革故諸爻顛止者有出否去故之象而下卦之極又有可革之象或曰易取象于商髙宗之事乎曰鼎之上體離也故有雉升于鼎之象耳革而行塞故有不下食于鼎之象髙宗之事偶應其象耳非取象於髙宗以繫易也右明象占九四鼎折足覆公餗其刑剭凶贊曰覆公餗信如何也説卦子曰德薄而位尊知小而謀大力小而任重鮮不及矣易曰鼎折足覆公餗其刑剭凶言不勝其任也張舜元曰應于初六之巽巽撓乎下折足之象也足折則其實覆矣耿睎道曰鼎之所受有量適中斯可矣以九實四而不得中則是實有餘而量不足故有覆餗之象程可久曰公餗所以養賢也苟比于所私則失養賢之禮矣李季辨曰分上下體言之有耳而無足不勝鼎之任也林黃中曰三陽皆為鼎實至四則盈矣四應在初初止欠一是折其足矣方其在初鼎未有實故謂之顛止出否及其在四鼎實已盈故謂之折足覆餗也或曰初正應也獨不可以從其配乎曰鼎有上出之理無下趣之義六五君也九四大臣也初六則小人也四居近君之位五之所親信也不能守正奉公而下與小人為比是自覆其餗夫為國大臣受君委任而乃背公營私附下罔上懷諼誤國者凶及其身宜矣汪氏曰古之大刑有剭誅之法周官掌戮凡有爵者殺之于甸師氏右明象占六五鼎黃耳金鉉利貞贊曰鼎黃耳中以為實也鄭舜舉曰五為鼎之主故以耳鉉兼系之朱子曰五於象為鼎耳而有中德故云黃耳案黃坤土之中色離之五再索于坤而在上卦之中故其色黃馮當可曰承剛為金鉉張子厚曰柔故利于貞馮當可同李季辨曰鉉所以舉鼎而行九居上金鉉也五必得上鼎體乃全未與上合利在乎貞蓋未可行也案四既覆餗不勝任近而相得無若上九所藉以舉者鼎不舉則亨飪之實為徒設故利在于貞戒其任四而失上也王景孟曰以中虛之德為鼎之主中則不亢虛則能受此所以居無為之地而尸舉措之功者也在鼎之上受鉉以舉鼎者耳也六五之象也在鼎之外貫耳以舉鼎者鉉也上九之象也上曰玉鉉矣而五曰金鉉何也曰六五之中虛而資上九剛實之助故謂上九曰金鉉以上九之履柔不純乎剛而且與五接也故又曰玉鉉諸家乃謂金鉉九二也鼎耳九三也夫二與三既為鼎實矣復得為鉉耳乎金玉皆乾之象九乾之䇿也自六五之柔言之則上為金之剛自上九之不變言之則上為玉之粹夫各象其物宜而已右明象占林黃中曰聖人立象以盡意故三言耳四言足皆錯互其物宜五言黃耳則正其象矣金鉉亦互言之也右明爻義上九鼎玉鉉大吉無不利贊曰玉鉉在上剛柔節也鄭舜舉曰乾為玉九乾之策石守道曰玉者言火炎而不變其性也馮當可曰剛陽在上及物之功全系此爻如舉鼎實以養人者全在于鉉陽剛無應無所回撓如玉不變於火故為玉鉉李仲永曰惟辟玉食非食玉也食之器用玉也鼎而用鉉鼎之道成也鉉而用玉鼎道之大成也非享上帝何以哉李季辨曰玉和物也鼎道貴和得玉鉉則隂陽和而鼎之功成矣鉉一也五取金上取玉金剛而玉和五體柔故貴剛上體剛故貴和離為火而鉉居之金畏火而玉不畏火故成鼎之功以玉為貴也程可久曰四受實而上能舉鼎蓋不親小勞不侵衆官而獨總其逺大者故大吉無不利右明象占王景孟曰上鼎外之物也非若耳止之相聯屬焉者也然鼎之舉措在乎耳而耳之舉措在乎鉉亨飪之事既成是鉉也必上以尸舉措之功功既成矣是鉉也復脫然無所纍而自處於鼎之外若無與焉石守道曰在卦之外如一賢人在上當鼎立制度已成之後不纍於位者周公告老之事當之李子思曰井與鼎之取象大率以養人為義觀最後之爻而義益明右明爻義案鼎初六足也而畫耦則欠一故為顛止折足之象六五耳也上九貫耳鉉也二三四皆陽爻鼎實也亦腹也二為入鼎之初而亨未飪故反以不即為吉以有待也四為實飪而盈故為覆餗以下應初之折足且位不當也三適其中而上無應不能上出故為行塞不食趙氏曰鼎以虛受物耳以虛受鉉皆惡夫實而自滿也二三四有疾行塞覆餗則皆以陽實不虛故也又曰與井之義相近水以汲而出井為用食以亨而出鼎為用故五上皆吉初井泥鼎顛止皆以在下也中爻則以其剛柔之應而異其吉凶焉右明六爻厚齋易學卷二十五
