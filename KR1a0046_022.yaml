body:
  text: 厚齊易學卷二十二宋馮椅撰易輯傳第十八經下篇夬姤乾下兑上夬贊曰夬決也剛決柔也健而說決而和程正叔曰以二體言之澤水之聚也乃上於至髙之處有潰決之象以爻言之五陽在下長而將極一陰在上消而將盡衆陽上進決去一陰所以為夬也林黃中曰山附于地山宜在上者也剝而落之是以謂之剝也澤上于天澤宜在下者也決而潰之是以謂之夬也程可久曰柔乘剛小人凌君子必決去之耿睎道曰合五剛以決一柔其勢順而易若決水然雜卦曰夬決也剛決柔也君子道長小人道憂也李子思曰序卦始乾坤終未濟者男之窮也雜卦亦始乾坤而終夬者小人之窮也孔子之意以謂未濟雖有不盡之意然象為男子之窮不若決為小人之窮也故變文以為六十四卦之終林黃中曰不曰小人道消而曰憂者此聖人之深㫖也雜卦六十二皆一辭而已蓋有合兩卦而言之者獨夬遘疑於辭費夬之四言又系於雜卦之末夫以五剛而決一柔君子之道可謂長矣而小人之道其窮若此能勿憂乎我盛而長則無意外之慮彼窮而憂則有先事之防然則以五剛而決一柔吾未知勝負之所在也右明卦義象贊曰澤上于天夬君子以施祿及下居德則忌說卦曰上古結繩而治後世聖人易之以書契百官以治萬民以察蓋取諸夬右明卦用程正叔曰理無常益益而不己巳乃決也林黃中曰自益之夬震變為乾巽反為兊益而不已則上九之兊澤乘乎九五之天位澤上於天必決之象也李子思曰陰卦之序先剝而後遘陽卦之序先復而後夬蓋自復之一陽而至夬之五陽者君子漸進之象也自剝之五陰而至遘之一陰者小人漸退之象也易卦之序其所以進君子而退小人其微㫖蓋如此右明卦序揚于王庭孚號有厲告自邑不利即戎利有攸往贊曰揚于王庭柔乘五剛也孚號有厲其危乃光也告自邑不利即戎所尚乃窮也利有攸往剛長乃終也游定夫曰揚於王庭誦言於上也孚號誕告於下也告自邑自近而及逺也郭子和曰始自王庭孚號自邑國告之及於四方以見盡天下之公義也耿睎道曰王庭君子之所聚也合五剛之象也林黃中曰五天位也王者之象也庭外而虛也九五為王宫上六有王庭之象都聖與曰乾至剛實有孚之象兊為口舌號令之象蘭惠卿曰孚信以布號令明上六有危厲與衆棄之邑者位也明言布告自爾上六之位言不當乘五陽也程可久曰告自邑可也即戎不可也戎指上六窮冦不可迫也李季辨曰小人竊威福之權利在興兵君子於此欲舉兵以誅之則惡在君側其勢不順李去非曰獸窮則搏蠆毒在尾決之於欲窮者尤當防小人反噬也張舜元曰利有攸往以至剛長乃終而後已以此見小人雖少亦不可容之於朝廷之上也張子厚曰除害務本故利有所進毛伯玉曰為山九仭功虧一簣夬之世實然聖人蓋勉而進之則克終矣非謂進而不已不留餘地也右明卦象占楊廷秀曰古者孰有不以存小人而傷君子不以去小人而傷國哉以其有乘五剛之大罪我是以聲其罪而揚之於王庭以其有不可忽之危機我是以信其令而警之以惕厲李季辨曰一陰在五陽之上衆皆去而一獨留小人之據尊位而在君側善固結其君而未易動者也將誅君側之小人辭雖直而勢不順自古寡謀淺慮輕舉妄動身戮而國隨以亂者皆不明夬決之理者也故處夬之道其為危懼警戒之辭者不一聖人之示後世者深矣小人彌縫之計密而君不以為疑必揚其過於王庭使人主明知其為小人也信號令於衆謂將有危事使舉朝皆知其為小人也又告令於其邑使舉國皆知其為小人也不利即戎小人利在興兵也李子思曰上下無陰則一陰者衆陽之所與也上六雖處至窮之𫝑然九五與之為比九三與之為應九四與之同體其與之敵者獨初九九二耳又逺於上六雖欲決之其𫝑有所不及故曰有厲有戎有凶有之為言不必然之辭也五陽相信而不忘於號令知其危而戒之斯有萬全之𫝑而無一跌之虞矣鄭少梅曰陰傅於五五于四皆屬之是謂之兊卦所謂包陽之陰挾君子之小人所以難去爾右總明彖義初九壯于前止往不勝為咎贊曰不勝而往咎也都聖與曰壯言其健也前言其進也止言其行也咎言其無應也郭子和曰大壯初九壯于止而此曰壯于前止又欲速其進也李氏曰壯于止征凶當壯之初而戒其用壯也壯于前止往不勝為咎當夬之初而戒其好勝也蘭惠卿曰卦以夬名往則未必不勝然聖人之道于未決之初必圗萬全慮勝而後動茍不勝而徒往則為咎有戒之之意非惡之也毛伯玉曰勝在往前者兵法也必往之道也往不勝為咎者逺慮也所以戒其往也聖人于五陽之盛而有不勝之憂微矣哉王景孟曰居夬之初倡決柔之謀者也先衆而動之象也必有全勝之道而後往往而不勝咎將誰執案初去敵最逺又逺于君欲鼓衆而前以決在上之小人以剛居陽過于剛者也萬一不勝則為咎矣為初九者聽倡而動可也右明象占李子思曰大壯四陽也進而五陽夬也二卦者皆陽盛之卦下體皆乾故夬與大壯在下三爻其義則同所以戒乾陽之上進初無有二而初爻尤寓深戒右明爻義九二惕號莫夜有戎勿恤贊曰有戎勿恤得中道也程可久曰九五發號者也本爻奉號令而警惕者也上六應九三有見乘之理而不見其迹莫夜有戎之象以柔犯剛以危犯安故可勿恤况能惕懼者乎李季辨曰二與五同德既信於君矣但謹懼而施號令於邑使小人無所容則其𫝑自衰小人罪彰利在為亂故莫有興兵之意本爻不可啓兵端但勿恤之則其計不行林黃中曰易以下卦為晝上卦為夜本爻之視三四有莫夜之象猶乾九三之夕惕也三與上為應四與上同體則有戎勿恤不亦宜乎張舜元曰兊為兵戈故曰有戎本爻剛中而善斷知其剛長而足以制之乃戒諸剛曰勿恤毛伯玉曰警之則可應之則不可彼之計將出於徼幸而吾不為之動則其技窮矣右明象占郭子和曰初過于用剛而不知不勝之咎二處中居陰而無過焉是以有謹戒不虞之義鄭少梅曰聖人以陰陽明君子小人可謂謹嚴矣否次泰觀次臨遘次夬明小人之代君子復次剝大壯次遁明君子之代小人也然獨于剝之一陽夬之一陰雖窮而深憂者何也以剝陽足以制二陰而為艮夬陰可以御二陽而為兊耳夬之一陰既可以御二陽而下卦之三陽其一為我應矣唯他位之陽為敵而又逺于上有三四五為屏翰豈不為之深憂乎蘭惠卿曰初九則夬勝於大壯九二夬亦當勝乃惕號莫夜有戎何也蓋大壯則有六五之應而夬則九五不應反比上六故也右明爻義九三壯于頄有凶君子夬夬獨行遇雨若濡有愠無咎贊曰君子夬夬終無咎也王輔嗣曰頄謂上六也最處體上故曰權也權今顴案或疑咸之象腓股脢輔未嘗逆施今初為趾而四為臀何也曰是與咸異咸合六爻以為象猶剝艮之類也夬則分二體以為象猶大過鼎之類也故三在下卦之上為頄四在上卦之下為臀六爻不相蒙也不然臀下體也上體烏得而象之此易之所以為易而不可以一說定也李去非曰小人見其壯于顔面則思防之是以有凶也都聖與曰有凶者不能必無之辭王景孟曰聖人戒其過剛也頄剛物也居乾健之極而疾惡之心見于顔面此凶之道也何者小人之或我疑也小人我疑則君子之禍至矣可不戒乎王說得之大壯之陽進一步則為夬故夬之初三兩爻猶以壯為象蓋陽自壯而浸長也右明壯頄之凶李仲永曰君子夬夬與衆偕行而我獨往應於上六九家曰獨行謂一爻獨上與陰相應為陰所施故遇雨也蘭惠卿曰遇者不期而會也見穀梁程正叔曰易中言雨皆謂陰陽和也張舜元曰兊為雨澤程可久曰遇雨若濡猶詩人言厭浥行露也李子思曰五陽同決一陰而已獨為之應則衆陽焉得不愠都聖與同然而終以無咎者以和說為夬而不至傷暴則小人甘心於引退矣右明君子夬夬獨行遇雨之旡咎張知常曰決小人之道當不惡而嚴壯于頄所以凶也反之則無咎毛伯玉曰自重剛言之則有凶自有應言之則無咎聖人所以兩言之又曰雨者所以解也其徒必有愠之者終無以咎我何也𫝑在彼而吾以應從之是枉道也𫝑在我而我往懷之何求于彼也上六窮而無歸也茍有所歸將不為厲矣馮當可曰夬決之壯見于外貌而中不能無應之之心陰陽之情不能無私九三不勇決者牽于欲也此言爻之情案衆陽勇決一浸消垂盡之陰宜無難者易之卦爻之辭多凶咎艱難何也上六近比九五挾君之勢以臨下九三居乾健之極比諸爻尤勇于決者也茍用其壯見于顔面不顧其君而勇于決君側在已上之小人其取凶必矣故曰有凶有凶之理非謂其事之凶也惟不隨衆陽之決而獨行以遇之與之和說則雖不免衆陽之愠而可以無咎其彖贊所謂決而和者歟右明爻義九四臀無膚其行次且贊曰其行次且位不當也程可久曰臀上體之下膚陰柔也耿睎道曰衆剛皆以夬為事而爻乃居陰止而不行則三陽並進而見侵于下故曰臀無膚朱子發曰四本大壯震震為足欲前而九五礙之又柔而少決則却而不前故其行次且李氏曰離乾而居兊則知說而不知健以剛而居柔則欲決而泥于和故止則不能安有臀無膚之象進則不能前有其行次且之象若是者不果於為決也李季辨曰爻與上六同在君側位望已重無意除亂欲止則衆陽並進于下勢不得安故曰臀無膚欲往則與上六同事心不能斷故曰其行次且牽羊悔亡聞言不信贊曰聞言不信聰不明也蘭惠卿曰若能牽引諸陽以共決上六則非位之悔可亡然不中不正終不能聽信此言都聖與曰牽羊則在三陽之前率先以進者也張子厚曰牽羊者必讓而先之則易為力朱子曰當其前則不進隨其後則可以行程可久曰方孚號之時不赴事功有聞言不信之象張舜元曰以兊居坎之變本爻九六為坎變兊為口舌坎為耳坎變故聞言不信李仲永曰處衆剛之間無應又不當位故聞言不信自用者也馮當可曰暗弱之人利害之際中既無主謀亦不從蓋常態也右明象占毛伯玉曰諸爻皆通大壯言之然則羊非兊也大壯所謂觸藩者也大壯之三已觸者也故不能退不能遂夬之四欲觸而未果者也故臀無膚其行次且進退皇惑之間其象略同李氏曰下三爻與大壯同者同於為乾也上三爻與大壯異者震兊之體殊也案臀無膚則羊已觸矣特大壯止九四一陽為藩故決之則角不羸本卦則九四之上有九五焉據大君之位未易進也故必牽之而後進大抵二卦相因為義故藩決則壯亦取夬象夫合六爻一體觀之則壯四陽夬五陽上進而消陰此卦之所以為義也分上下二體觀之則乾之三陽本在上之物下非所居𫝑必上進不容有一陽爻之當其前故壯夬二卦乾三爻率與上卦為敵其或相應者陰陽之情也右明爻義九五莧陸夬夬中行無咎贊曰中行無咎中未光也蘭惠卿曰諸儒以莧陸為上六愚以為本爻若上六則當言夬夬莧陸而不當言莧陸夬夬也本爻以剛居陽故亦曰夬夬莧陸二物生於潤澤今九五之夬如莧陸之不免外資上六兊澤之濡潤為夬之主而不能決去小人內接四陽外比上六君子小人皆兩存之中道而行止可免咎馮當可曰九五率衆陽以決一陰乃不能去豈非如莧陸之浸潤而失其剛決者邪猶剛明之人久與小人處不能無惑者惟其居得中道故勉為夬決之事決之又決而決不足也五剛明之主也四陽同德比義決去一陰而猶若是下于此者何如哉嗚呼使小人得用而在上位據要𫝑雖當時士君子所守不固亦或助之雖人主剛明樂其說已亦或安之其去之之難觀夬之象可為太息又云決陰者陽也卦三陽位初九逺而在下位不能決者也然則居陽位者下卦惟三上卦惟五二爻當合力決之故于二爻言夬夬而三有相應之情上有相比之說故一陰之夬至於揚于王庭孚號有厲也右明象占爻義上六無號終有凶贊曰無號之凶終不可長也劉長民曰小人乘至尊雖無號令終必有凶况號令嚴信告自下邑而共決者哉李季辨曰決而至此不假號令亦知其凶矣程可久曰柔處上窮之地下乘五剛宜有命令使知畏懼不然罪大惡積終于有凶不特凶于小人亦凶于時故以終為言案卦有三號彖為孚號九二為惕號上六為無號兊之口自天而出令故為渙汗其大號之號彖之孚號者孚於五陽也二之惕號戒謹而布於下也上之無號者已揚於王庭矣雖無號小人終不免凶况孚號之大者哉右明象占馮當可曰初有志也下而無力惟二犯難而無恤三已牽于應四則暗于事五為陰所惑當夬之時五陽盛長以去一陰其中倫類尚有不可倚仗如此去小人何其難哉林黃中曰夬之君子不患其不能決而患其不能和故三陽位雖處得其道僅能無咎李季辨曰五陽決一陰而五陽皆未善初不能決二未成決三與為應四與同體五有右之之意以見小人為計之密君子受其欺而不知覺聖人于爻時反復設諭獨詳于他卦君子處此可以自謹案于剝見剝一陽之易于夬見決一陰之難蓋君子明白洞逹難進易退而小人綢繆固結麾之不去也使君子者致謹于待小人之際不可以易心處之右明六爻巽下乾上遘贊曰遘遇也柔遇剛也雜卦同又曰天地相遇品物咸章也剛遇中正天下大行也遘之時義大矣哉朱子曰決盡則為純乾四月之卦至遘然後一陰可見而為五月之卦以其本非所望而卒然值之如不期而遇者故為遘林黃中曰一柔而遇五剛爭亂之道也而何遇之云乎謂夫陰方來而始與陽遇是以謂之遘也李氏元量曰夬之一陰不為主者陰往而窮也故曰剛決柔遘之五陽不為主者陰來而信也故曰柔遇剛月建一陰律曰蕤賔則陰為主而陽已為之賔矣是遘主陰遇陽而言也蘭惠卿曰陰生于午與陽相遇于中途林氏曰聖人內剛而外柔內君子而外小人以陽為主陰為客故陽來謂之復而陰來謂之遘也豈特聖人之心然哉亦天地自然之理而已矣趙氏曰一陽之生曰復謂本有而復來一陰之生曰遘則若始相遇然蓋聖人內君子外小人之意集解曰小人有不正之行而遇時亦有此象右明卦義象贊曰天下有風遘后以施命誥四方右明卦用程正叔曰物之决判則遇合不合則何遇遘所以次夬也林黃中曰遘之成卦夬之反也乾反居上兊反為巽初上相易而成卦也陰陽相求物之情也剛柔相推時之運也窮于上必反于下決于此必遇于彼自然之理也邵堯夫曰復次剝明亂中生治乎遘次夬明正中生亂乎時哉時哉未有剝而不復未有夬而不遘者是以聖人重未然之防右明卦序女壯勿用取贊曰不可與長也朱子發曰女德巽順而剛壯故曰女壯此深得其㫖餘說旁通而曲暢之者也或謂巽長女故稱壯然復之震亦長男不稱壯何也金氏曰巽女既長矣五月之卦一陰用事剛不能制是謂女壯程可久曰陽既壯曰大壯陰始生曰女壯者言于將壯也初六以巽上承未有犯上之意九五剛中正命二制之在下得防微杜漸之義李去非曰復遘者皆初生之爻也于復言朋來于遘言女壯于潛龍言勿用于女壯言勿取一陽之未得其朋而知其必以朋來且為君子喜也一陰之未至乎壯而知其必以女壯先為小人戒也故潛龍勿用以養陽而女壯勿取以抑陰其實則憂君子之至矣楊廷秀曰當一陽之生也聖人未敢為君子喜而必曰朋來無咎言一陽未易勝五陰也當一陰之生也聖人以為君子憂而遽曰女壯言一陰已有敵五陽之志也又曰勿用取申戒五陽以勿輕一陰之微而親昵之也逺之且不免况親昵之為同室之人乎都聖與曰夬五陽已盛而猶以剛長為貴遘一陰方生而遂以女壯為戒則陰陽雖相為消長君子小人雖相為盛衰而陽長則萬物生君子進則天下治乃人之大情天下之公願而作易者之所不能違也右明卦象蘭惠卿曰一陰始生小人始長苟與之進遂至于剝君子故曰勿用取也遊定夫同李氏曰女以順為正取女者將以永終也今柔有變剛之志則女必用壯有不可勝者非永終之道故贊曰不可與長也李仲永曰男不下女亦勿取之義或以為五陽皆求非貞女故勿取失其指矣李季辨曰作易者其有憂患乎聖人重卦至此蚤知後世有非常之變也初六一柔以漸而長既進而二又進而三未有咎也進而至四則有無魚之凶進而至五則有自天之禍又進而至上則始有上窮之吝而于彖則曰女壯勿用取女一陰尚微預言女壯戒以勿取其三代未有之變乎其知漢唐之女禍乎武王數商之罪曰牝雞之晨惟家之索然不過唯婦言是聽而已未至如後世之冠屨易位也漢吕氏之禍猶曰與帝並興雖制政房闥而于大臣猶有所畏憚至唐武氏則矯假威福臨制天下使天下之人重跡寢息稽首以聽命而不敢作為天地為之易位者數十載此三代以來所未聞聖人逆知之于遘見其義又曰女子之道易以說人一為所牽則事去矣右明卦占初六繫于金柅貞吉有攸往見凶羸豕乎蹢躅贊曰繫于金柅柔道牽也李氏曰金柅者剛而止物九二之象也初若牽繫於二柅而不行則剛柔之分正而吉茍無以止之將有攸往則變剛之志逞矣故見之則凶蘭惠卿曰金者剛也柅者木也指九二巽木之陽九家曰絲繫於柅猶女繫於男故喻以初宜繫二也順二則吉復往見四則凶矣此說近古而得經之㫖以初而言二是也見之義亦密下卦巽為繩故有絲繫之象李仲永曰女待男行者也不待男行而往見之凶也程可久曰以柔在下有豕之象繫于金柅言見制於九二之剛乃不棼亂故貞吉若有攸往則以柔變剛故見凶于攸往之後非凶于初也案此告初六之辭故使之遇九二得陰陽之配則吉不可復往見九四之正應則凶也陰以下為貞居卑下得婦人之正况既遇二不可復見四婦人之義從一而終亦貞也此欲一陰之止而不欲其浸長故告之若此若以正義言之舍正應而惟其所遇與蒙六二之見金夫不有躬者何以異哉右明繫于金柅之象占李去非曰羸豕之孚信于其類也陽為龍陰為豕蘭惠卿曰豕指初六之陰趙氏曰應于九四有剛柔相孚之意豕而羸之猶絲而繫之也羸之者九二也然九四正應其情相孚故蹢躅而欲决其羸以往也觀此象也則一陰决非羸中之物右明羸豕之象王景孟曰卦之所以為遘者在此一爻吉凶實於此乎判也有以制之則吉無以制之則凶朱子曰一陰始生靜正則吉往進則凶故以二義戒小人使不害于君子則有吉而無凶然其勢不可止也故以羸豕蹢躅曉君子使深為之備云趙氏曰既言固止之為貞吉又言其不止而往則凶其為小人之戒明矣猶恐常情忽于其微而不戒也復言羸豕之蹢躅以見小人之情狀馮當可曰此卦不相應何也曰相應者素也適出而相當者遇也非素也初遇二則為二所得豈復有應四之理或以初應四而繫二為疑林黃中曰卦以遇為義蓋遇合之女未嘗擇配也二近而先斯得之矣案聖人取象金柅以見九二之剛制于初六而繫之矣然初六之情狀雖與二近而相得浸長之𫝑決不已也故以貞吉曉之復以往見凶戒之猶以為未盡也復取象于豕以見初六之雖絓繫在下而衆陽之所求其志皆足以相孚雖羸之而不能進其躁而動固不自禁也軼其繫羸則浸浸上行矣可不戒哉可不憂哉右明爻義九二包有魚無咎不利賔贊曰包有魚義不及賔也虞仲翔曰賔謂四乾尊稱賔二据四應不利四也李去非曰魚陰物喜伏而惡見小人之象剝之貫魚遘之包有魚皆陽能制陰者也故剝六五無不利而本爻無咎李季辨曰初之魚進而至二入二之包也王介父曰四自外至賔之象也朱子發曰初本應四而二据之宜有咎然陰出遇陽于遇道為得故無咎胡翼之劉氏同李仲永曰包者治也魚則民也有民之少不可以分治也故不利賔右明象占或者以賔為衆陽以九四無魚之象觀之不待辨矣程正叔曰二與初密相遇者也在他卦則正應於四在遘則以遇為重李子思曰一陰初來遇剛則從故近而先者得之逺而後者不得也初本應四遇二得之則為主而四為賔一民不可以有二君不可更及四也案因有魚之象故言賔蓋魚可以充賔客如婚禮有賔在焉為酒食以待鄉黨僚友則當及賔而此魚至寡僅充己食則不能及賔矣假此義以明一陰不可以遇二陽亦不容于上進也孔子贊意又以義言右明爻義九三臀無膚其行次且厲無大咎贊曰其行次且行未牽也耿睎道曰二方有初而三乃乘之是以見侵於二而有臀無膚之象馮當可曰與二有競理故也三次且不前有顧戀之意而初終不與朱子曰既無所遇則無陰邪之傷故雖危而無大咎然則小小悔咎亦不能無之蓋以其有爭初之心也案臀以二在後取象夬之四亦取象于臀者以下卦在其後已當其前也本爻之取象于臀者以九二在其後已當其前也見侵于後故無膚欲進而前行則未忍舍初而去欲止而退却則又以二之侵于其後故次且處多凶之地而迫于爭奪之傷故厲右明象占郭子和曰夬之九四辭相類者夬遘三四反對之爻與損益二五同李氏元量曰雖剛而體巽其性入而伏有下爭初之心焉初已入二之包非己所可得是以見侵且傷而行次且夫以其見侵且傷故厲以其行而欲避故無大咎楊庭秀曰一卦五陽而一陰則爭赴于一陰一水衆漁而一魚則必爭赴于一魚初六之一魚二最近近最先得三乘而爭之爭則必傷傷則必郤郤而不力爭雖不得魚無後烖故無大咎李子思曰易之六爻惟九三自乾以下多厲無咎之辭豈非重剛不中須知戒懼然後危而復安者乎右明爻義九四包無魚起凶贊曰無魚之凶逺民也胡翼之曰初與二相得而失四之應是二包有魚而四反無魚也程正叔曰四與初為正應當相遇者也而初已遇二矣四失其所遇猶包之無魚亡其所有也林黃中曰包而無魚則亦已矣何咎之有起而爭之斯為凶矣都聖與曰書所謂用作凶李去非曰微有動象則凶隨之不待有攸往矣右明象占九五以杞包瓜含章有隕自天贊曰九五含章中正也有隕自天志不舍命也陸希聲曰初有意于五此瓜蔓滋延之象五以重剛下際于一陰杞根深之象朱子曰瓜陰物之在下者甘美而善潰杞髙大堅實之木也五以剛陽中正主卦于上而下防始生必潰之陰其象如此又曰有隕倐然而有之象李去非曰杞髙木而葉可以包物瓜實多而易潰以陽包陰有變離之象故為含章案五陽宗一陰而今爻為遇之主夫以陽覆陰謂之包以陰奄陽謂之含五髙而初在下故有以杞包瓜之象初六浸長而遇五以承之故有含章之象杞之包瓜九五包初六也含章初六含九五也其交相遇如此夫九五之包初則猶有制之使不上進之義初之含五則由浸長至五其象為剝矣上九在九五之上天之象也懼初之剝已也則擊而隕之使瓜下墜而安于在下之貞焉故曰有隕自天隕亦剝之象也天亦天之命也聖人扶陽抑隂見于爻象微意如此右明象占毛伯玉曰瓜者延蔓之物引之則日滋夷狄小人之象也以杞包之者勿令出于杞也亦金柅之義也隕者瓜之落也李子思曰所制者在一陰六爻之中曰豕曰魚曰瓜皆所以喻一陰又曰陽明謂之章易遇陰中之陽皆曰含章集解曰有隕自天奉天命以翦凶孽也五陽同功一陰為亂若不除去是舍命也右明爻義上九遘其角吝無咎贊曰遘其角上窮吝也蘭惠卿曰角者如獸之角最居首上如普之普其角也耿睎道曰角者剛上窮也林黃中曰上九志在于遇斯遇其角矣李子思曰當天地相遇品物咸章之時而已獨以剛亢在上不能下與物合是為吝道然陰方漸長而陽與之遇者要須有以制之如繫如包可也制之或失必反被陰邪之害獨上九巍然在上剛亢絶物雖無所合而亦不近陰邪可無意外之患案卦以遘為體六爻無非遘也遘而剛窮于上其象為角去初之陰最逺故吝然遘者陰長之卦陰長至上則為坤之龍戰矣惟其無所遘遇而陰不至于剝陽雖吝而無咎右明象占李氏元量曰遘之諸爻或以所承如初之于二或以所應如二之于五皆得其遇也上雖與三為應而三方志于下是以窮而吝三欲爭初則臀而無膚四欲應初則起凶上獨剛以自守雖無遇而上窮視三四則有間矣是以無咎朱子曰以剛居上而無位不得其遇故其象占與九三類右明爻義趙氏曰當遘之時小人固不可使之進為君子之計亦不可無以畜小人也故聖人既戒初六之不可往而又于九二九四九五言所以包制小人之道九三重剛不中近于髙亢上九以陽剛居一卦之終髙亢而上窮故厲而吝然而無咎者以陰不相遇不與其進也案凡外三爻者內三爻之應初之有往見凶故四則起凶二之包有魚故五則以杞包瓜三之臀上之角此厲無大咎則彼吝而無咎逺近淺深之間耳右明六爻厚齊易學卷二十二
