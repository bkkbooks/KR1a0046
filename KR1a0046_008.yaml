body:
  text: 厚齊易學卷八宋馮椅撰易輯傳第四經上篇師比坎下坤上師贊曰師衆也雜卦曰比樂師憂都聖與曰凡有衆者稱師易之所謂師則軍旅之名也林黃中曰坤三為衆又合坎之二隂斯為大衆矣而坎之一陽實居下卦之中五隂之衆攝於一陽一陽在下而為之主非行師之義乎楊中立曰先王之制民居則為比閭族黨州鄉故比則衆在內一陽在上而為之主君象也伍兩卒旅軍師之制則衆在外一陽在下而為之主將帥之象也周人五家為比五旅為師蓋取諸易朱子曰古者寓兵於農伏至險於大順藏不測於至靜之中又一陽居下卦之中為將之象五隂順而從之為衆之象九二以剛居下而用事六五以柔居上而任之為人君命將出師之象案天子六師亦取師有六位之義大國三軍取象於內卦而已石守道曰五隂而一陽取其兵出於一指麾進退一聽於將也命出於一必勝命出二三衆罔適從必敗六五用柔軍中之事一委於將也李子思曰坤與坎相遇隂爻衆而肅殺之氣勝故以師旅為義凡五隂之卦皆然師特以一陽居二而以二體之象取義譬之草木黃而隕之時生非吾仁之死非吾殺之也夫然故生者不德而死者不怨又曰兵險事也故作易者因以坤遇坎而論用師不寄之於以乾遇坎則取象之安吉也使聖人以需訟乾坎相爭之象而著行師之義則是敵我之間剛險相摶紛然見於爻辭而戰爭之禍無時可息非所以託訓也右明卦義象贊曰地中有水師君子以容民畜衆右明卦用序卦曰訟必有衆起故受之以師師者衆也林黃中曰自訟而師下坎不動上乾變坤夫民有所不得其平而後至於訟訟而不有以正之則民有寃而無所訴有所訴而無所直疾視其上而幸其危亡其不起而為亂也未之有也故曰訟必有衆起案說卦夫乾天下之至健也德行恆易以知險坤天下之至順也德行恆簡以知阻屯蒙之後需訟繼之乾之遇坎而知險也需訟之後師比繼之坤之遇坎而知阻也右明卦序貞大人吉無咎贊曰貞正也能以衆正可以王矣剛中而應行險而順以此毒天下而民從之吉又何咎矣游定夫曰用師之道將以正天下之不正也故師謂之征己則不正其能正人乎劉氏曰征之為言正也湯伐桀曰豫畏上帝不敢不正武王伐紂曰將有大正于商蓋能用衆以正天下也李氏曰師出必有名而直常在我所謂正也蘭惠卿曰三代未嘗有無名之師後世始有潛侵暗襲出於詭道者皆非正也此述贊意以正為貞李仲永曰衆不能以制衆制衆者貞夫一者也都氏曰陽為一隂為衆衆以一為貞隂以陽為貞此以貞固為義案四德不言元者古之帝王皆為應兵不為戎首故不稱元也不言亨利者李子思謂懼其貪功以困生靈故不以訓也右明卦象李氏曰大人主伐事者也李仲永曰謂九二以一陽為之主李子思曰大人者乃長子帥師者也卦辭以大人吉為首而爻辭以小人勿用為終易之為書不許託干戈以殘民槩見於此程正叔曰吉謂必克王景孟曰師以功成為吉案古者行師諸侯躬親帥師然必唯有大德之人乃能至公無我然後可以正天下也自大人之訛為丈人說者不勝異說祗見其曲也唯林黃中正之而又以為六五夫卦爻之稱大人者皆以九未有六而稱大人者也此其疑於孔子可以王矣之言故不敢以為九二爾殊不知此卦唯二一爻屬陽非大人而何在下而專兵者諸侯之事也能以衆正湯武以之豈非可以王矣乎說者不論天下之理以湯武為諱言之事謂聖人必不以訓故屈經㫖以為之說至以大人為丈人安得熟識天下之義理而深明易道之象數者而與之言哉王輔嗣曰興役動衆無功罪也故吉乃無咎師以殺伐為事死生存亡繫焉豈無悔咎唯以大人行之則吉而咎可無矣右明卦占初六師出以律否臧凶贊曰師出以律失律凶也張子厚曰體柔居賤不善用律故凶案爾雅曰坎律銓也郭景純曰易坎卦主法律皆所以銓量輕重鄭氏曰北方之坎黃鍾之本也黃鍾之律起為度量權衡故言律律者法度之所從出也李季辨曰甘誓攻左攻右御非其馬之正牧誓五步六步七步五伐六伐七伐皆不可亂司馬法坐作進退皆有常節魯侯誓師牛馬臣妾戒以勿逐以其亂部分也故失律則凶或曰周以同律聽其軍聲以詔吉凶林黃中曰古者斷竹為律吹中聲以驗氣候輕重短長毫釐不差後世法令通謂之律取其輕重不差也都聖與曰有同律以聽而無紀律安能保其不敗亂乎吹同律者取象師律之義非師出以同律也左氏傳晉荀林父帥師及楚子戰于邲知莊子曰周易有之在師之臨師出以律否臧凶執事順成為臧逆為否衆散為弱隂為衆變兊則弱川壅為澤坎川兊澤初六耦閉為竒水不下流川壅之象有律以如己也如從也法行則人從法法敗則法從人故曰律否臧且律竭也竭敗也坎變兊為法敗此春秋之占法釋文王之辭者也然則九六之變尚矣右明象占程正叔曰初師之始故言出師之義行師之道李氏曰用師者施教法於未陳之前故出以律若其失律則不勝者乃其常而勝者乃其幸雖幸亦凶之道也故易於初爻言之林黃中曰初六後軍之象也使初而非隂師之象毁矣及其為隂也又有失律之憂故聖人兩著其辭以明失得之未可知而憂懼之不敢忘也案兵凶器聖人不得已而用之故卦皆著戒懼之象右明爻義九二在師中吉無咎王三錫命贊曰在師中吉承天龍也王三錫命懷萬邦也李子思曰一陽居中前四隂為之先後一隂為之殿楊中立曰以剛中之材分閫外之寄為師之主天吏也在師中吉則無逸德矣案行師將必親之在師之中然後吉而免咎將不在中而督人以戰人誰用命哉九二在下卦之中又在五隂之中皆在師中之象也說者猥多無一能識此義者先儒言韓信背水而陳後世亦有襲其迹者然不勝蓋信在軍中後世將在外也右明象占林黃中曰自五至二所歷之爻三錫命也朱子發曰錫命之至于三極數也李子思曰錫命不一如錫以斧鉞使得專征伐之類趙氏曰其獲吉無咎亦唯天子有以委任寵嘉之聖人必推明六五之正應以詔後世者于以見人臣有權得衆皆其君寵任之所致也程正叔曰衆隂所歸正應於五乃師之主專制其事者也在下而專制其事唯在師則可他卦九二為六五所任者多矣唯師所主專其義最大右明爻義六三師或輿尸凶贊曰師或輿尸大無功也王介父曰師之命貞夫一者也陽畫竒隂畫耦耦不一者也李去非曰二既為之主矣三又欲尸其事是令出不一也程正叔曰以居二上故發此義郭子和曰以柔居上非其材也位不中正非其任也欲衆主師凶之道也趙氏曰處非其位而又在險之極乘九二之剛有出位犯分之象故有輿尸之戒而於六五詳焉聖人之意亦何明哉蘭惠卿曰河曲之師趙盾為將而令出於先縠宣公十二年後世復有中人監軍者衆主師則未嘗不敗孰謂聖人而不學軍旅之事也哉案三在下卦之上有尸軍旅之象朱子曰師徒撓敗輿尸而歸也以隂居陽材弱志剛不中不正而犯非其分故其象占如此張舜元曰坤為大輿而坎為輪其體下注輿尸奔北之象也揚子雲曰輿尸血刃皆所不為案前說則於六五弟子之象為當由後一說於輿尸之義為安蓋一陽上載有輿象叠羣隂於上尸象二說並存以俟知者右明象占六四師左次無咎贊曰左次無咎未失常也李氏曰所處重隂又在三隂之間故能安靜以有待劉長民曰約象坤為平陸師律曰平陸處易而右背髙前死後生此處平陸之地退師待敵者也李子思曰坤體平陸而無險左旋其斾下依坤水之阻而止軍者也軍事出則尚右旋反則為左次胡翼之曰師必尚右右者隂也楊中立曰上將軍居右以右為主也都聖與曰隂陽之運自東徂西而易之六位自下而上故凡易之辭上右而下左左次者不前而却也韓信曰欲右背山陵前左水澤王輔嗣曰行師之法欲右背髙故左次之右明象占王介父曰上無承下無應不可以動之時也朱子曰全師以退賢于六三逺矣馮當可曰用兵之法要在觀時乘勢豈可一於進而不知退一於勝而不謀敗時可矣則為九二時未可則為六四程正叔曰可進而退乃咎也度不能進而全師以退愈於覆敗逺矣易發此義以示後世其仁深矣右明爻義六五田有禽利執言無咎長子帥師弟子輿尸貞凶司馬君實曰二以剛中能任其事是以動則有功若田而獲禽也李仲永曰田有禽者田獵而有功謂得九二為正應也案田獵以除田之害故曰田二在地之中田之象也陽實居之有禽之象也卦唯九二一陽而爻居君位與之正應故其象如此林慎微曰易于取之小者以弋為象取之大者以田為象取之尤大者以狩為象右明象郭子和曰自古帝王興兵動衆蓋未有無名之師也田之有禽害稼也故獵取之蠻夷寇賊害民也故執言以伐之此論在師之君道非將帥之事故鳴條牧野之戰湯武必執言誓師明告其罪而後舉也案禹之征苖啓之伐有扈仲康征羲和自虞夏以來其伐有罪必執言如此不但鳴條以後也爻畫耦開口之象故為執言以上伐下帥師得人故利贊曰長子帥師以中行也弟子輿尸使不當也都聖與曰將兵者將之職將將者君之職也九二正應而有剛中之材長子帥師者也六三非應柔不中而乘九二之上任之不一弟子輿尸者也九畫竒其數一長子也六畫耦數有不一之義李子思曰六五寬柔之主疑於無斷故言弟子輿尸以戒之雖正亦凶權不可分也案九二衆隂之長故曰長子六三以位序言之次九二弟子也在下卦之上分九二之權者也右明占程正叔曰五君位興師之主也馮當可曰易言用兵必於隂爻得非以肅殺之氣乎王輔嗣曰隂不先倡柔不犯物犯而後應往必得直故曰有禽也物先犯也故可以執言而無咎柔非軍帥故不躬行案獸害田故田之物犯己故伐之此義得矣右明爻義上六大君有命開國承家小人勿用贊曰大君有命以正功也小人勿用必亂邦也蘭惠卿曰居師之終舍爵䇿勳飲至論功之時也張舜元曰君命有功者賞之於祖廟功之大者開國而有民社次者承家而有世祿為民立君長也以小人為之君長禍莫大焉謂之大君者别於諸侯禮樂征伐自天子出萬世之通法也朱子曰坤為土開國承家之象毛伯玉曰三代以上專以邑國賞功非若後世之有散官勳賜也又曰其始也能以衆正則其終也可以有功寧不求功而不可使小人有功也聖人之戒深矣李季辨曰行師之始小人斷不可用有功而不賞非報功之意賞之則亂邦文王卦辭專言大人吉至此又有小人之戒此義微矣案先儒言韓彭不當封不知王者用兵命將之始如此輩皆不用用之有功安得不賞此義先儒所略李氏曰武王卒伐之後大封諸臣之有功者賚之詩是也其序曰言所以錫豫善人也則小人勿用可知林黃中曰方師之初一陽在下而為之帥五隂莫不順聽者行師之義也及論功行賞而復聽九二之節制則無君矣故必大君有命而後可以正其功案此上也大君則以五言之蓋論師之終不拘爻義也夫以卦言之則九二一陽為五隂之主帥師者也以爻言之則五君也君能制命為義不容九二之專權於下也故在九二則言王三錫命在上六則言大君有命蓋師則當聽命於大帥而師之進退豫奪則又當聽命於大君六五柔順故易每以是垂訓也古者王朝命將以卿或用諸侯或大夫故執言伐罪易其君長就以命之賞有功也故非有德者勿命以將是之謂小人勿用或謂小人帥師有功而乃勿用之開國承家也不知金帛蓋後世之賞古無是也爻比六五則大君有命之象也坤為土則有國家之象也三為應有弟子輿尸之象故曰小人勿用也以位言之則為弟子以德言之則為小人本爻隂柔不斷故以戒之右明象占李子思曰易惟師一卦統紀始終節次甚嚴初師之始故紀其出上師之終故紀其還程正叔曰此專言師終之事不取爻義蓋以其大者若以爻言則以柔居順之極師既終而在無位之地善處而無咎者也右明爻義李子思曰師卦六爻而出師駐師將兵將將與夫奉辭伐罪旋師班賞之事無所不載雖後世兵書之繁殆不如師卦六爻之略而況所論王者之師非後世權謀之書之比也張知常曰師嚴於節制等級初失律三五輿尸則凶四左次則無咎趙氏曰唯六五一爻有執言之利餘爻言吉者必繼以無咎謂不如是則未免有咎也兵其可以輕用哉案六爻皆一訓一戒四不進師二有王命故無咎以此知兵不可以輕舉也右明六爻坤下坎上比贊曰比輔也朱子曰九五以陽剛居上而得其中正五隂比而從之以一人而撫萬邦以四海而仰一人之象又曰水比于地不容有間石守道曰水不可離地而行是水與地相親比也蘭惠卿曰地處下而水性潤下天地之間相親比者無過于此王介父曰水附于地未必聚也鍾之以澤然後聚此比之所以異于萃也此以二體言之程可久曰九五以剛邁衆君以武得天下之象王輔嗣曰五隂而一陽為之主此以九五一爻言也卦繼師則程說亦通雜卦曰比樂師憂李子思曰師比反對師之所以為憂者聚而從事于五兵也比之所以為樂者聚而歸附于明主也右明卦義象贊曰地上有水比先王以建萬國親諸侯右明卦用序卦曰師者衆也衆必有所比故受之以比程正叔曰人之類必相親附然後能安故既有衆則必有所比比所以次師也李子思曰當行師之際五以柔居尊位而二以陽剛居將帥之任及師平之後則當正其上下之分故坎之九五以陽剛在上而在下者皆以柔順比之此比之所以居師之後也右明卦序吉贊曰下順從也程正叔曰人相親比自為吉道故曰比樂師憂郭子和曰卦之一陽者唯比得天位莫吉于此故直言吉案卦之象多言四德所謂繼之者善也獨此卦不言德而直言吉占此特例也易以五定大君之位諸爻則臣民也陽剛君德也隂柔臣民也六十四卦君當其君臣民當其臣民未有如比者也故直以吉言之且夫乾坤父母也乾之遇坎則多險阻艱難之意而坤之遇坎則無復有之何也陽之權欲專而坤順從之乾剛强而不為下故也朱子發曰凡物孤則危羣則强父子夫婦朋友未有孤危而不凶者人君為甚故比而吉此言上比下李季辨曰天下之衆不能相一也奉一人而戴之俯首聽命于其下將以求一日之安也故曰比吉趙氏曰易之六爻貴于正應其近而相得亦有不必應者唯比之諸爻不論其應否而專以比五為吉此言下比上程正叔曰凡生天地之間者未有不相親比而能自存者也比之道由兩志相求上撫懷其下下親附于上親戚朋友鄉黨皆然苟不相求則睽而凶矣此言上下相比楊中立曰先王什伍其民鄉田同井使之出入相友守望相助疾病相扶持比之所以吉也衆散民流用蕩析離居則凶可知矣此言下自相比案理當歸一是四說者不亦異乎曰皆是也合而觀之則吉可知矣原筮元永貞無咎贊曰以剛中也李氏曰元者猶一人元良之謂也永貞者猶一正君之謂也有元德而能永正于天下者比之主也九五剛得中而為顯比之主所謂元永貞者也此指比于上而言也元永貞唯此一說其餘支離皆不足据耿睎道曰道足乎已而為人所比者歸斯受之而已矣無擇焉可也道不足而比乎人則必擇其所比焉是故原筮原筮者不遽以初筮為信也都聖與曰原筮云者審擇而慎求之也與蒙之初筮異矣蓋欲其致一則曰初而欲其致慎則曰原隂性善疑思有以決之羣隂俱從故有原筮之象張舜元曰坤坎有原田之象林黃中曰蒙之初初筮告再三黷明筮貴初而惡黷也今筮謂之原固將黷之也與曰夫言各有當也書卜不習吉初筮之謂也又云一習吉原筮之謂也毛伯玉曰師之後次之以比比蓋名分未定之日也一時之人以去就不明而失身亡國者多矣雖湯武之興亦然後服者固凶矣不審者能無悔乎故曰原筮馮當可略同程可久曰筮所以順天也記曰國家將興必有禎祥動乎蓍龜是也案原以重卦為象上卦二隂既筮所比而吉下卦三隂又筮而後比五故曰原筮再筮以為審知其有元永貞之德然後比之乃免咎也苟一筮而遂决後有悔焉其能免咎乎劉氏曰當比之時臣民擇主必得剛中而元永貞者比之故免于咎李子思曰審决而出依陽明之主則災咎何從至又曰易以隂畫之耦主小人之道陽畫之竒主君子之道一陽之竒正位乎五凡天下之麗于耦數者皆不逃其所攝此以君子之道統攝萬有者也萃之九五曰元永貞悔亡亦此類也案萃與比下體坤地則同而上體水澤之象亦不相逺萃唯九四一爻有分權之勢故元永貞于五言之若比下無分其權者故言之于彖義各有在也比既吉矣又曰無咎何也吉以比者而言無咎以比之者言也不寧方來後夫凶贊曰不寧方來上下應也後夫凶其道窮也李去非曰人之比者阻于坎險故不寧楊中立曰隂無正應不寧之象也而順從于五方來之象也李仲永曰夫謂五後謂上也鄭氏曰居五之上後其君者也案六位先後有二義以衡觀之則外在前內在後也以竪觀之則在下者乃其所歸往而謂之先在上者乃其歸之緩而後之者也五君也而謂之夫以其陽爻有夫道也耿睎道曰已得所比則寧而無求未得所比則求而不寧者物之情也張敬夫曰陽明所在不可不依衆人所往不可獨背方衆隂比乎九五而上六獨在外有背而去之之象毛伯玉曰凡居五之外者類有自外之意其位然也又曰爻之分為六彼我之詞也自五隂言之則去就不可輕也雖原筮不為無斷自九五言之則不寧者並來而後服者凶二者並行而不相悖也王輔嗣曰比復好先程可久曰不寧方來者厭亂之民將比于君也後夫凶者上六僭亂之人不相比也胡翼之曰禹會塗山執玉帛者萬國獨防風恃强而後至為禹所戮此後夫凶之驗也案兵戈甫定民歸其主之時有一剛明之君作于上天下皆不自安而歸之恐後不是之歸而遲疑不决自罹其咎凶之道也然先比之則欲其原筮後比之則又凶求比者亦不可不審也右明卦象占初六有孚比之無咎有孚盈缶終來有它吉贊曰比之初六有它吉也程可久曰當比之初未有所傅而六二上孚于君初比之故得無咎郭立之曰見賢則比之不必有應也有應而比之易二是也逺而非應者比之難初是也柔弱不能自達有待于人者也司馬君實曰初比之始也始謀相親者不可以不謹擇其人人之誠信未孚而親愛之取咎之道也傳曰定其交而後求此之謂也都聖與曰無上下之交而求比于人宜莫之與也案二應九五有孚于君者惟本爻比之可以因二而達于君矣故無咎右明有孚比之無咎馮當可曰卦分內外六二之比己為自內初又在二內則由衷之誠發于其心猶酒醴盈于缶中非外也雖無正應五必應之正應者非它也非正應為有它都聖與曰缶以土為之坤之體也或曰坎之六四用缶何也曰水由地中行凡坎之隂爻則坤也蘭惠卿曰易之言有孚者二十又一有言信其如此者有言有孚誠者五非初之正應故謂之終來有它吉言自外來也程可久曰終來有它吉者非本爻之時吉在後也即斯二說可以知占矣案初陽實六隂虛虛者缶也實者盈也右明有孚盈缶終來有它吉楊中立曰比之初原筮之時也孔子曰君子周而不比小人比而不周故比以忠信為主比而無孚小人之比也能無咎乎古語忠信為周有孚比之孚之在人者也有孚盈缶孚之在己者也劉氏曰比必以信不以信則比而不周矣李季辨曰有比乎人者有為人所比者然皆以信為主當比之初故兼舉其義耿睎道曰有孚比之言比乎人者也終來有它言為人所比也比之六爻皆以比五為善故爻義如此比于有孚之人僅可免咎比非其人則咎矣終來有它以孚之盈缶故吉右明爻義六二比之自內貞吉贊曰比之自內不自失也趙氏曰自內以比于五非五之求比也李子思曰比之世隂皆求陽而非陽求隂故二之比五自內而之外出而應乎上者也又曰比之世衆隂莫不求比于陽而二為正蓋正應故也故初謂之有它而四謂之外比郭子和曰九五比之主六二正應率天下以比五自內之外二之比初非欲親初也欲與之比五也蒙之六三亦舍應親二而有不有躬之象者蓋蒙與比異道而二與三異位義不同也此說近之初比二以達于五故二自內比初以比五也比之與初六六四比之同義初二兩爻皆以相比應五為象者比道貴先二為正應皆比道之善有事君以人引類之義衆說支離皆不足據右明象王景孟曰小人比而不周所惡于比者為其不正也如比而得其正則無惡于比矣五比之主二其應也隂陽各當其位所謂正也夫上下相比以正所以吉也蘭惠卿曰二五中正相應道合志從非枉道苟合者也案陽以上復為貞隂以安下為貞況得中而位當又為正應也右明占六三比之匪人贊曰比之匪人不亦傷乎蘭惠卿曰不中不正下之六二上之六四逺之上六本爻所與比者皆小人之黨也朱子發曰與否之匪人同義都聖與曰天下之理隂宜比陽故小必比大柔必比剛晦必比明得所比則日益反是則日損焉李子思曰阿黨為比小人比而不周三乃阿比之比而非比輔之比也劉氏曰承乘與應皆隂匪人之象凡居者之鄰學者之友仕者之同寮皆當戒匪人之傷焉程正叔曰二之中正而謂之匪人隨時取義各不同也以隂柔之資居不中正之位又無其應是自棄于不善者也使所比之賢猶可夾輔正救以為善今介于二隂之間所比又非其人上有剛明之君無階而親比之其困而無與為善者與蒙之六四同義右明象占六四外比之貞吉贊曰外比于賢以從上也李氏曰內舍于初而外比于五都聖與曰二與四皆比五者也二自內卦之外四自外卦之外此爻辭之所以殊程可久曰上承于君得其所比故貞吉王介父曰四宜應內者也內無可比而比乎外亦義之與比而無適莫者也剛柔正而位當故貞趙氏曰外有可比則為貞吉不必應于內而後為正也以柔德居隂位以臣比君皆正也一陽為主位乎天位不論正應右明象占九五顯比王用三驅失前禽邑人不誡吉贊曰顯比之吉位正中也舍逆取順失前禽也邑人不誡上使中也林慎微曰陽為明故稱顯都聖與曰德與位稱衆隂比之顯比之象合二說觀之義斯見矣都又曰衆爻趣之于下上六背之于上來者不距往者不追王用三驅失前禽之象王介父曰上六在前禽之象也朱子發曰卦爻內為後外為前三面驅之闕其一面逆而背我則舍之順而嚮我則取之案二至五歷三位三驅之象上左外隂闕不合圍之象本爻王之象也前禽上六之象也李仲永曰六二正應邑人也得位得中不待期約而自孚也故曰不誡朱子曰天子不合圍開一面之網來者不距往者不追雖私屬亦喻上意凡此者皆吉之道案迎來者逆背去者順來者不知己欲殺之而不避去者知而逃之者也不知者舍之閔其適相值也知者取之以其無所逃焉命也此成湯祝網與孔子弋不射宿之意若夫邑人則喻王者之心熟矣故不待告誡也右明象占程可久曰易以田喻用武此卦師之反也故九五喻王者之田趙氏曰此卦九五曰失前禽恐其過于剛也大有六五曰威如吉恐其過于柔也聖人以中道詔天下萬世如此右明爻義上六比之無首凶贊曰比之無首無所終也案六位自下言之初始而上終初本而上末也以全體自上觀之上首而初足上角而初尾也乾姤艮賁既未濟之象可見矣上為一卦之首衆隂歸于一陽一陽獨尊宜在上也而乃居五上反為隂故曰無首與後夫之取義不同張舜文曰主乎一則專分乎二則惑伍必有長率必有正居必有屬行必有隨未有師而無帥者也兩國有胥命而王道闕矣衆國有同盟而霸業衰矣比之無首其何以相統治乎李氏曰雜卦言比樂三傷而上凶者蓋三之所比者非其人而上則失其所當比也右明象占程可久曰卦言其材則夫當順從而不可後爻言其變則首當統下而不可無其凶一也蘭惠卿曰乾之六龍沈潛剛克無首則吉比之上六以隂居外無首則凶右明爻義趙氏曰易中六爻貴于正應其近而相得亦有不必應者焉唯此卦之諸爻則不論其應之正否而專以比于五為吉劉氏曰二應五四上近之故皆言上下之比初與三止言敵者之比案五隂唯三上為凶三欲比陽而不能上本比陽而自後也右明六爻
