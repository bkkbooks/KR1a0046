body:
  text: 厚齋易學卷四十七宋馮椅撰易外傳第十五説卦下鄭少梅曰此篇出于漢宣帝之時而宣帝以前儒者亦多引援昔者聖人之作易也幽贊于神明而生蓍聖人謂文王此章専言揲蓍之術蓍聲尸蒿屬生千嵗以老故知吉凶天下和平王道得而蓍莖長一本生滿百莖説見説文龜策傳博物志然不常有故必文王演易而為之符如麟鳳之類也易半其莖以莖為䇿衍卦生爻神明言能知吉凶而不能告人聖人生蓍以通神明之德是幽贊于神明也鄭少梅曰有天地則有神明聖人以蓍為用以數為體則天地神明之理在吾掌握之內矣參天兩地而倚數取五行之生數而積之則為五十適當蓍之半及揲之成爻又以五行成數計之為七八九六所以取九六以繫爻而不取七八者九六又合參天兩地之數也參天之一三五為九兩地之二四為六則七八乃為成數而靜無變動故不占也是之謂倚數倚依也林黃中曰用蓍之半參天兩地而依五十之蓍以定大衍之數五而十之者五十也是參天兩地之積也觀變于隂陽而立卦觀七八九六之變即前篇所謂變動不居周流六虛上下無常剛柔相易者也發揮于剛柔而生爻隂陽以氣言剛柔以質言氣生質猶父生子卦父也爻子也七八九六成質而為剛柔七八不變九六則變變者發揮也與乾文言六爻發揮之旨同耿睎道曰夫物發之則隱者見揮之則鬱者彰和順于道德而理于義道卦名是也德彖辭是也元亨利貞即乾之德卦有二體七八九六之不同調和歸一順其義而立彖義六爻之義也逺近承乘愛惡之不同理之使有條中篇言卦之德方以知六爻之義易以貢所指雖異其義則同道德説見李子思窮理盡性以至于命窮一卦六爻之理盡一卦六爻之性乃至于命自本至末自潛至亢消息盈虛天命存焉下章所謂隂陽剛柔仁義即性命之理也程正叔指柱而言曰此木可以為柱理也其曲直者性也其所以曲直者命也邵堯夫曰有義理有物理蓋義理內象也物理外象也右第一章朱子發曰參天兩地蓍䇿數也觀變于隂陽揲蓍分卦也發揮于剛柔爻有變動也昔者聖人之作易也將以順性命之理申言上章窮理盡性以至于命蓋由聖人作易本順性命之理是以能窮理則能盡性以至于命也程可久曰乾為君坤為臣者命也盡君道盡臣道者性也其他上下交際皆然聞之于師云是以立天之道曰隂與陽立地之道曰柔與剛立人之道曰仁與義姑以大者言之天之道日北而寒日南而暑有隂有陽也地之道流而為川峙而為山有柔有剛也人之道理一而愛分殊而辨有仁有義也一則孤兩則立道即理也隂陽剛柔仁義性命也先隂柔仁者自上而下上四二位隂五三初位陽也李子思曰天統元氣隂陽者太虛聚而為氣者也地統元形剛柔者氣聚而有體者也人統元識仁義者生于心充于氣體動而有知覺者也若夫謂天陽而地隂天剛而地柔亦各指其盛者而言之耳兼三才而兩之故易六畫而成卦三者之才八卦未重止為天地人體常也八卦既重則兼而兩之分為隂陽柔剛仁義盡變也所以必六畫而成卦也分隂分陽迭用柔剛故易六位而成章章假數也六位各分隂陽既成六假故迭用柔剛以盡其變隂陽位也剛柔爻也德也又與天地隂陽柔剛所配不同位有隂陽無剛柔德有剛柔無隂陽廬山周燔彥誠辨之甚明右第二章言六爻鄭少梅曰前章言聖人作易自蓍數卦爻以明性命之理此章論聖人作易自性命之理出為蓍數卦爻蓋使人知蓍數卦爻即性命之理也天地定位乾南上也坤北下也山澤通氣異所而氣相通艮西北兑東南相通也雷風相薄薄迫也今世俗相摶謂之相撲即薄字之變也巽西南震東北也林黃中曰雷薄風而震風薄雷而怒水火不相射射聲亦讀如詩無射亦保之射厭也離東坎西水火之用相資故不相厭射此一節朱子發曰天地定位乾上坤下也山澤通氣艮兑以三相易也雷風相薄震巽以初相易也水火不相射坎離以中相易也邵堯夫曰乾南坤北離東坎西兑東南震東北巽西南艮西北相交而成六十四此先天之學也蓋謂包犧畫卦之初如此八卦相錯錯七各反治鐡之名言相磨軋也毛伯玉曰八卦以兩相從各以其配言之不可亂也及其交也山不専從澤水不専從火往來交錯為六十四而天下之變滋矣鄭少梅曰八物者八卦之物理也八卦者八物之義理也未畫八卦之前八物亦交錯也此孔子之所以贊大象有山中之天澤中之火之類以常情觀之豈不誕乎是聖人物理之學如此其妙也數往者順知來者逆數上聲逆迎也周官凡逆皆訓迎是故易逆數也數去聲自初至上為順自上至初為逆猶其初難知其上易知之義也毛伯玉曰往者可以順數來者可以逆知所謂彰往察來也是故易用于逆不用于順謂之知來謂之逆數謂前民利用皆一理也右第三章雷以動之風以散之雨以潤之日以烜之散去聲烜又作烜今烜無此字京云乾也之皆指萬物震巽坎離發生之功也物之脈理閉塞雷以震動之而後物皆甲拆風以散之而後物皆敷榮一潤一烜然後不淫不枯艮以止之胡翼之曰止于萬物而不使過分也兑以説之物各安其所利故説乾以君之主宰萬物坤以藏之萬物皆傅于土所謂含萬物而化光也右第四章胡翼之曰明八卦生物之功也朱子曰卦位相對與上章同耿睎道曰八卦之用或縱衡相錯也此章其序一陽一隂先後相繼也程可久曰六子致用主于乾而動出歸于坤而斂藏物不足以舉其用者則稱卦毛伯玉曰雷風雨暘以形用故不名其卦而名其象萬物之得雷風雨暘也雜然並作于天地之間至秋而息兑之説也至冬而斂艮之止也資始于乾故君之生乎土歸乎土故藏之郭子和曰動止説言其性散潤烜言其功君其道藏其德也互言之互相備也竊謂此章之卦序即先天之易後四章卦稱名者乃後天之易之序以此見先後天之易之序自有天地以來即有之意者先天之易造化之本體後天之易造化之致用也帝出乎震程正叔曰天者理也帝者以主宰而名程可久曰帝者神之應齊乎巽相見乎離致役乎坤説言乎兑戰乎乾于時為立冬則乾卦用事位乎西北六隂終乎亥以坤乘乾隂陽相戰萬物于是蟄藏以待隂陽之定坤之上六龍戰于野是已耿睎道曰説而後可戰亦説以犯難之義勞乎坎勞去聲猶勞歸士之勞于時為冬至則坎卦用事位乎正北萬物歸根而復命坎有以勞之林黃中曰物息而相勞也成言乎艮于時為立春則艮卦用事位乎東北萬物之終而又將出震皆于此成之胡翼之曰艮者動靜之界也林黃中曰出而齊齊而相見見而致養養而後説説而後戰戰而後勞勞而後成成而後出自然之序也邵堯夫曰此後天之易河圖之數文王之八卦之方也毛伯玉以為不然不為無見而辨之未盡河圖洛書已于上篇述之矣竊謂自河圖出于包犧之世故因之以畫八卦之象視禹為先况包犧推測于天地之先則謂之先天可也洛書出于大禹之世故因之以定八卦之方視犧為後况所推在天地已判之後則謂之後天可也然此方位則決非文王之所定蓋觀夏正建寅為艮而謂之連山商正建丑以衝于未首坤而謂之歸藏則此八卦之方位定于神農氏以來自洛書出而合若符契文王特正乾坤之序爾則後篇序卦是也然則此編自昔所傳之書孔子特述而為傳耳萬物出乎震震東方也此下孔子衍而傳之者也鄭康成曰萬物出乎震雷發聲以生之也齊乎巽巽東南也齊也者言萬物之潔齊也鄭康成曰潔猶新也離也者明也萬物皆相見南方之卦也聖人南面而聽天下嚮明而治蓋取諸此也鄭康成曰萬物皆相見日照之使光大王介父曰離為火為日故曰明聽平聲聽天下之治也周官所謂視治朝則贊聽治之聽今官舍謂之聽事亦此義也林黃中曰然則昧爽丕顯嚮晦入息從可知矣坤也者地也萬物皆致養焉故曰致役乎坤養去聲物于此成實猶子之致其養于母也人子之役于外而歸必有以致養于父母故致役有致養之義林黃中曰致役而遂養也兑正秋也萬物之所説也故曰説言乎兑鄭康成曰草木皆老猶以澤氣説成之戰乎乾乾西北之卦也言隂陽相薄也薄同雷風相薄之薄鄭康成曰戰言隂陽相薄西北隂也而乾以純陽臨之猶君臣對合也坎者水也正北方之卦也勞卦也萬物之所歸也故曰勞乎坎歸根復命于坎之時故曰勞乎坎勞朱子發讀作平聲鄭康成曰坎勞卦也水性勞而不倦萬物之所歸也萬物自春初生于地冬氣閉藏還皆入地艮東北之卦也萬物之所成終而所成始也故曰成言乎艮鄭康成曰成終成始言萬物隂氣終陽氣始皆艮之用事右第五章林黃中曰帝出乎震則萬物不得不出萬物成乎艮則帝之功亦成矣又曰聖人之言蓋有所互明焉故曰離也者明也則坎之為幽震之為旦兑之為暮可知矣坤也者地也則乾之為天艮之為山兑之為澤可知矣坎者水也則離之為火震巽之為木乾兑之為金坤艮之為土可知矣坎勞卦也則離之為暇震之為作兑之為息可知矣聖人嚮明而治蓋取諸此則昧爽丕顯嚮晦入息從可知矣程可久曰帝與萬物皆出乎震兑言正秋則四時可推坎言正北則四方可推坎言水坤言地則八物可知坤不言方致役不系于方也乾不言萬物戰不系乎物也聖人于離有所取則他卦可以通其類焉竊謂奠方正時觀象推理人事存焉以日言之則震朝兑夕離晝坎夜也日出而作則民析也命農勉作人力齊也日中為市相見離也日入而息致役坤也百榖收成兑言説也説以犯難戰乎乾也戰勝而歸勞歸于坎也曰為改歲成終始也終則有始天之行也神也者妙萬物而為言者也妙古眇此章意屬上章蓋孔子述上章之義而及此也程可久曰為言者亦強名而已妙精理也動萬物者莫疾乎雷撓萬物者莫疾乎風撓乃教乃飽二反蓋雷震則物之脈理開然後風以撓之則水潛上于枝條而華葉生諺謂之撼條風亦謂花信風是也燥萬物者莫熯乎火説文燥乾也又作莫暵乎離夫暵從火從日皆轉注也燥當從火離當從日皆同漢聲以熱氣乾物之名説萬物者莫説乎澤蘭惠卿曰浸潤百物使之説懌潤萬物者莫潤乎水終萬物始萬物者莫盛乎艮此一節言神之所以妙乎萬物者也莫疾莫暵莫説莫潤莫盛者神也朱子曰去乾坤而専言六子以見神之所為然其序位亦用上章之説柴氏曰不及乾坤者六子即乾坤之用也乾坤者隂陽之分六子者隂陽之變故水火相逮陸作不相逮非逮及也雷風不相悖悖蒲昧反疑古與背通違也山澤通氣然後能變化既成萬物也既盡也柴氏曰獨陽不生獨隂不成必一隂一陽然後能變化右第六章李氏曰前章言雷風水火之用不同而山澤通氣則不異者山澤之氣無往而不通也程可久曰始言六子之材各有所長終言六子之情各有所合鄭少梅曰始則因後天之序終則因先天之序又曰乾坤為六物之本六物為萬物之本毛伯王曰六物之致用于天地間猶耳目鼻口手足之用于一身也人之寐也體非不具而耳不能聞目不能見四肢口鼻不能自為用則必有用之者矣此聖人之所謂神也是故六職並舉無不如意此六物所以能變化成萬物也大哉神乎其妙萬物者乎龔氏曰上言生物之序則歸于乾坤此言生物之成功則歸諸六子獨言艮者終始非山事也言莫盛者終始則日新也通氣而後相薄相薄而後不相射者相反以為用也相逮而後不相悖不相悖而後通氣者相因以為用也相反以為用故八卦相錯以至數往知來相因以為用故能變化既成萬物也林黃中曰震巽有在天之象而無在地之形艮兑有在地之形而無在天之象唯坎離居中在天則為雨日在地則為水火故易言其迭用則取諸天言其相須則取諸地知此者可與言象矣乾健也坤順也震動也巽入也坎陷也離麗也艮止也兑説也張子厚曰健動陷止剛之象順麗入説柔之體一陷溺而不得出為坎一附麗而不能去為離艮一陽為主于兩隂之上各得其位而其勢止也易言光明者多艮之象著則明之義也龔氏曰上序八卦之相為用此序八卦之各有才也其性至剛而其才不息者乾之健也其性至柔而其勢善承者坤之順也陽之性動而起乎二隂之下善動者也此震之反乎艮也隂之性靜而伏乎二陽之下善入者也此巽之反乎兑也陽明而隂暗陽易而隂險故一陽在乎二隂之間則為陷以非所麗也陽尊而隂卑陽強而隂弱故一隂在乎二陽之間則為麗以非所陷也一陽止乎上而二隂不違之則動者可止之時也故艮為止一隂見乎外而二陽不違之則伏者可見之際也故兑為説震也坎也艮也皆陽卦而生乎乾也故其才剛極下則動極上則止在中則陷于隂巽也離也兑也皆隂卦而生乎坤也故其才柔極下則伏極上則見在中則麗于陽然彖于坎不言陷而言險者以陽陷乎隂陷于險也于巽不言入而言巽者以巽有順意而入不足以體巽也耿睎道曰乾運行而不息健也坤承天而行順也右第七章此言八卦之性也所謂成之者性是也李氏曰此論其性也而用亦然鄭少梅曰欲觀物象者不可不知物理欲知物理者不可不知物性知物性則知天命矣天地雷風水火山澤物也乾坤震巽坎離艮兑理也健順動入陷麗止説性也由八物而窮八理而盡八性而至一命可謂善觀易矣八物者萬物之祖也八理者萬理之宗也八性者萬性之源也而一命貫之程可久曰諸彖巽言巽而不言入坎言險而或言陷離言文明而或言麗夫是之謂其言曲而中郭子和曰此章言乾坤之德與六子之性情所以釋八卦之名也八卦之名出于包犧氏上古之言止此八者而已文王能明之而不訓其義孔子訓之故後世可以學易非健順八字則易不復能讀矣故乾坤八字盡三才之道健順八字盡八卦六十四卦之道漢上朱氏曰動陷止皆健之屬入麗説皆順之屬不離乎乾坤也天地能變化成萬物者必水火雷風山澤合一所謂隂陽合德剛柔有體也隂陽者在天成象也剛柔者在地成形也萬物既成各得其一故健順動入陷麗止説其性各不同能偹萬物而兼有之者人也故下舉八畜八體而終之以男女乾為馬坤為牛健順也抑聞之傳邵氏之學者曰健順其性也推其類無往不然馬輕疾牛重濁馬蹄圓牛蹄耦馬夜立而不卧卧而死其究順也牛夜卧而不立立而死其究健也震為龍潛而能飛陽自下起之象震起也或曰震位乎東蒼龍之次箕亢位乎辰亦為龍又曰龍乾也震亦為龍長子肖父也巽為雞南方鶉火象鳥而離巽當之離正位南得火之正巽東南木也故離為雉而巽則為雞雞似雉而文采不彰黃帝書曰雞木畜蓋巽為木也雞將號擊羽翰而後有聲資巽風也朱子發曰風主號令故雞號知時坎為豕亦作彘畜于圈陷也其色黑北方水也朱子發曰美脊剛鬛坎中陽也垂耳俯首而尾不足本末隂也卑而處穢隂也突蕩難制陽也離為雉離為飛鳥鶉火之次故為雉文章著見文明也艮為狗善守門闕朱子發曰搏噬者前剛也兑為羊其色白西方金也王介父曰外順而內狠陽在內隂在外也右第八章龔氏曰有是才故可以逺取諸物近取諸身馬行不息者也牛順以載者也龍者性動而善變自潛以至于飛也雞羽屬也而不能飛其性則為入為伏知時而善應也豕則性趨下而卑汚雉則文明而介潔剛而善禦柔而附人者狗也狠而善觸説而不能害人者羊也皆逺取諸物也朱子發曰言八卦本象也然而震龍艮狗不見于經或者唯其時物之所占與郭子和曰逺取諸物皆此類也毛伯玉曰自此以下雜用之于占聖人不廢也乾為首正義曰尊而在上也龔氏曰其外員而諸陽之所聚者首也坤為腹龔氏曰衆隂之所藏者腹也朱子發曰為釡者腹器也郭景純筮得豫之謙曰有釡之象瓶甕缶皆腹器也震為足動于下也巽為股巽繼于震隨足而動者也坎為耳離為目林黃中曰坎之聰在內耳之聽也離之明在外目之視也艮為手竒畫肩也二耦垂下兩手也郭子和曰下垂也兑為口鄭康成曰上開也右第九章近取諸身皆此類也若以重卦之象則首者元首也腹有隔上下也足股耳目手皆兩也口有上下脣也是説自鄭少梅發之程可久曰以下章觀之震足在馬坎耳加痛艮手為指兑口加舌而義各有所主也鄭康成此章在乾為馬之前則于近取諸身逺取諸物為宜一或作巽為手艮為鼻與兑口為山澤通氣之象乾天也故稱乎父坤地也故稱乎母以人道言六子之生于乾坤惟天地萬物父母故又言天地之象此合三極以言造化也震一索而得男故謂之長男巽一索而得女故謂之長女坎再索而得男故謂之中男離再索而得女故謂之中女艮三索而得男故謂之少男兑三索而得女故謂之少女長上聲少去聲索所白反搜求也此言揲蓍立卦之法謂揲之以求爻也一索而得男謂一求而得此一爻陽也則餘揲皆隂矣求于隂爻之中而得此則男之象也故曰陽卦多隂凡稱索凖此自初而上長中少之序也初先而次後也隂中得陽陽中得隂男女之辨也衆宗乎寡也右第十章乾資始坤資生乾道成男坤道成女此在造化者然也三揲一變三變成爻七九為陽八六為隂此在揲蓍數者然也以蓍而求造化故乾坤純體之所生六子如此龔氏曰乾坤三畫有男女之道藏焉索而後得之也正義曰得父氣者為男得母氣者為女李氏曰父母隂陽之分也六子隂陽之交也長中少生出之序也郭子和曰男皆自隂而求陽女皆自陽而求隂卦變之義蓋始于此故曰觀變于隂陽而立卦朱子發曰察乎此則天地與我並生萬物與我為一是故君子親其親長其長而天下平伐一草木殺一禽獸非其時謂之不孝竊謂張子厚西銘蓋發明此義鄭少梅曰乾坤言天地而六子不言六物者聖人于此寓齊家之道也此以上皆為孔子之傳乾為天為圜為君為父為玉為金為寒為冰為大赤為良馬為老馬為瘠馬為駁馬為木果為天陽浮而上成象也為圜其體也陽竒而圓孔子曰天道曰圓地道曰方為君主宰萬化也為父化生萬物也為玉剛而粹也為金剛而精也為寒熱之極也世有服金石而熱極者毛骨皆寒是其證也耿睎道曰剛則其氣栗故為寒為冰變柔為剛也位乎西北卦氣為立冬之節水始冰以此為大赤老陽之色也為良馬陽壯于春也為老馬陽老于夏也為瘠馬瘠在亦反為秋氣所薄也為駁馬駁北角反色雜也冬隂盛陽微故託象為駁王介父曰象陽氣之消長于四時也程可久曰其德健有四時之義焉為木果胡翼之曰老而實生之本也林黃中曰秋冬之交木成果矣九家又云為龍為直為衣為言按此占筮家所類以占之書不盡其象也在人觸類而長之如九家所云未為無所見者特悉數不能終其物增之不為贅去之不為損也坤為地為母為布為釡為吝嗇為均為子母牛為又車為文為衆為柄其于地也為黑為地隂墜而下成形也為母林黃中曰配父而資生也為布鄭少梅曰土布于辰戌丑未四方毛曰猶震之為敷也生于土故曰布出乎震故曰敷為釡房甫反腹器也坤為腹郭景純筮得豫之解曰有釡之象坤中一爻為腹也為吝嗇吝京作遴嗇音色林黃中曰隂性也鄭少梅曰揫斂之意正義曰靜也翕而不施也為均正義曰動也闢而無疆也程可久曰遍也又曰井里之義為子母牛程可久曰有老少也如乾馬之良老駁瘠耿氏曰生出之有繼也為大車今輿厚載也為文畫竒則一而無文耦則雜而成文也又天事武地事文正義曰其質柔故為文林黃中曰西南之卦赤白為文為衆三畫耦故為衆為柄林黃中曰居物之後也鄭少梅同其于地也為黑至隂晦冥之色也朱子發曰日冬則行黑道程可久曰坤為地故可分于他卦其黑者不可分故再言之九家為牝為迷為方為囊為裳為黃為帛為漿漿義未詳以乾坤二卦互明之則知坤雖取類為多亦僅舉其凡耳乾為圜則坤當為方乾為君則坤當為臣坤為布則乾當為幬坤為吝嗇則乾當為濟豫坤為大車則乾當為幕帟坤為文則乾當為武坤為柄則乾當為首以此知為舉一隅耳天下之象不盡于書也善學易者觸類而長之震為雷為龍為玄黃為敷為大塗為長子為決躁為蒼筤竹為萑葦其于馬也為善鳴為馵足為作足為的顙其于稼也為反生其究為健為蕃鮮為雷林黃中曰陽之動也龔氏曰陽動欲起隂氣相薄有聲而成為龍説見前章林黃中曰陽之升也虞作龐朱子發曰當作􅹪蒼龍尾也孟春之月旦尾中國語曰日月會于龍􅹪是也為玄黃得乾坤之初氣故雜天地之色為敷聲敷後作華又作荂今作花于云華之通名為大塗萬物于此出也鄭康成曰國中三道曰塗震直房心有三塗為長子程可久曰坎艮不列中少男尊嫡也鄭少梅同為決躁重隂閉塞故奮擊而出決而且躁陽鬱而求逹也為蒼筤竹筤陸作琅蒼筤之義未詳諸説皆曰蒼春之色也然于筤義無取為萑葦萑胡官反萑葦蘆荻之别名鄭少梅曰二物中虛而易析然根皆盤固一陽在其下也其于馬也為善鳴象雷之聲程可久曰分乾之一體故亦為馬為馵足馵朱戍反馬後左足白也林黃中曰二隂其色見于足也京荀作朱荀云陽在下為作足林黃中曰方動之初力于行也為的顙的丁厯反説文作馰明也顙桑黨反額也隂在上故的顙白隂色也詩所謂白顛傳所謂的顱林黃中曰隂在上其色見于顙也其于稼也為反生反虞陸作阪陸云當為反平聲程可久曰實墜于土而再生者也字書謂之秩林黃中曰二隂在上為藁秸一陽在下為根苗其究為健林黃中曰極其動為健朱子發曰震究為健巽究為躁雷風無形故卦特變爾為蕃鮮蕃聲煩草茂也鮮平聲正義曰春時草木蕃盛而鮮明蓋萬物潔齊于巽春交于夏也林黃中曰極其敷為蕃鮮九家為王為鵠古鶴通為鼓為王未詳巽為木為風為長女為繩直為工為白為長為髙為進退為不果為臭其于人也為寡髮為廣顙為多白眼為近利市三倍其究為躁卦為木木德在東震震既為雷木之功成于辰而巽位辰巳之交故為木為風巽委曲而入之之象為長女坤一索于乾而生巽為繩直繩墨之繩工人所用以糾彈者也木之性曲直而繩糾也曲而彈木則直朱子發曰剛爻為直繩所以直者以剛糾柔也林黃中曰執柔以齊物也為工鄭作墨工執藝事者百工也能制物曲直李氏曰猶言巽德之制為白林黃中曰少隂之色也竊謂白本在兑而今也在巽赤本在離而今也在坎皆未知其指姑于諸説中擇其長者以為據八卦之難通者準此為長龔氏曰木之升也朱子發曰草木風之類皆長為髙天莫髙于東南也説本鄭少梅朱子發曰風至髙者也飛鳥之類有背負蒼天皆風所為為進退一隂之勢當自下而進于上其性則趣下而欲退龔氏曰陽外則進隂外則退為不果巽順太過則疑而少決乾為木果一索得隂則不為果矣故有不果之象為臭正作香臭為復正義曰風所發而逺聞也林黃中曰震為聲故巽為臭隂陽之義也其于人也為寡髮龔氏曰髮血之餘一隂伏于二陽之下則髮之達于上者寡林黃中曰隂少而不榮也寡虞作宣謂黑白雜為宣為廣顙隂小而陽在上一隂在下下小而上大猶面之額廣也龔與程可久同廣鄭作黃非為多白眼離為目巽為白近離而未正故為眼而多白為近利市三倍近傅近也倍步罪反日中為市離之象而巽近之近市也利三倍程可久曰三體爻數也鄭少梅曰明堂天市在夀星之分巽其當之其究為躁卦究極也物極則反巽本柔緩決躁震也六爻皆反朱子發曰巽三變成震舉震巽二卦以例餘卦九家為楊為雚文從佳今加鳥作鸛則為復正與寉之為鶴佳之為騅同諺云雚鳴則風生坎為水為溝瀆為隱伏為矯輮為弓輪其于人也為加憂為心病為耳痛為血卦為赤其于馬也為美脊為亟心為下首為薄蹄為曳其于車也為多眚為通為月為盜其于木也為堅多心為水正義曰取五方之行為溝瀆正義曰取水行無不通李氏曰隂陷于外也程可久曰水所適為隱伏正義曰取水藏地中李氏曰以陷而匿也郭子和曰賢者為隱盜者為伏朱子發曰水善隱伏為矯輮矯一作橋輮篆文古柔俗揉如九如又二反王為柔程可久曰水之性也因物而制形也為弓輪姚作倫非鄭少梅曰弓二十八蓋之數輪三十幅之數也故一象星辰一象日月坎者虛危之分日月星辰始躔于此龔氏曰輪以利轉言行險而不失也程可久曰弓以覆車輪以行車流而能通也毛伯玉曰弓輪者方圓曲折因物為形者也朱子發曰坎兩端柔其中剛剛柔往來施張也其于人也為加憂正義曰取其憂險難耿睎道曰在志為恐故為加憂毛伯玉曰重險也朱子發曰卦以隂陽失位為憂憂之中又見險加憂也為心病正義曰憂險難也龔氏曰陽陷而不靈也程可久曰心宜虛中實則病為耳痛正義曰聽勞則耳痛也程可久曰耳體虛實則痛也為血卦正義曰人有血如地有水程可久曰色赤也赤陽之色也朱子發曰血流行而物傷之為赤正義曰取血之色龔氏曰一陽生故為赤朱子發曰坎中之陽靜則陽消故鹽白而大鹵之色正赤乾為大赤坎乾中畫也其于馬也為美脊資昔反胡氏曰陽在中也朱子發曰乾為馬中畫為脊坎得之為美脊為亟心亟紀力反急也荀作極中也鼂又以亟為古文極王子雍去記反非耿睎道曰剛動乎內也為下首程可久曰陽不上統也朱子發曰乾為首坎隂在上交之為下首為薄蹄程可久曰下弱也耿睎道曰柔在下也朱子發曰震為足坎隂在下交之為薄蹄為曳今拽羊列反程可久曰陷則失健也朱子發曰坎水欲下離火欲上曳也龔氏曰一陽在內而處則其載重二隂在下則其勢弱其于車也為多眚病也車今輿坤為車一陽陷于中乃為車之病為通一陽貫于二隂之中為通透之象朱子發曰坎水決為江河升為雨露血之在人者周流無窮也為月遡日以為明中一陽日也張子厚所謂坎離之精互藏其宅程可久曰受日之明與離變也朱子發曰乾陽流于坤隂月體不明待日而明明者乾也為盜程可久曰有隱伏之情朱子發曰潛行伺隙而動其于木也為堅多心朱子發曰剛在內也多心重坎也離為火為日為電為中女為甲胄為戈兵其于人也為大腹為乾卦為鱉為蟹為螺為蚌為龜其于木也為科上稿為火正義曰正南之行龔氏曰緣物以為體為日為電皆火也耿睎道曰南方丙丁火丙陽火故為日丁隂火故為電為中女為甲胄直又反龔氏曰外剛而內柔為戈兵龔氏曰上鋭而麗物其于人也為大腹中虛而隂在內也毛伯玉曰亦娠之象為乾卦乾聲幹或作幹者非今田家放水為乾正義曰日烜之也為鱉又作鱉卑列反毛伯玉曰専于視也為蟹户買反躁于動也為螺力禾反蚌屬或作螺蠡上鋭而善麗為蚌步項反又作䗲中虛而含明為龜刳而虛之以灼則明而神龔氏曰此五物皆外剛而內柔也鄭少梅曰介蟲之屬火也而生于水中與鱗屬異其于木也為科上稿科苦禾反或作折非稿苦老反或作􅢠熇正義科空也木既中空上必枯稿李氏曰上稿上炎之象九家為牝牛艮為山為徑路為小石為門闕為果蓏為閽寺為指為狗為鼠為黔喙之屬其于木也為堅多節為山止于上也為徑路艮在東北冬春之界為限止者也然終必有始雖限止而通故為徑路非四達者也朱子發曰易象有相因而成者震陽動于下為大途艮陽止于上為徑路為小石閡而可通也郭子和曰為山又為小石猶坎水之又為溝瀆也為門闕出入之限猶小石之閡而通也冬閉而春啓艮當春冬之交司啓閉者也林黃中曰門闕上實而下虛之象程可久曰下雙峙也鄭少梅曰兩觀也將出震而行號令垂法于象魏者也為果蓏乾為木果而艮又為果蓏蓏果之小而柔者艮惟一陽在外故也果從木蓏從草亦有分剛柔之意為閽寺閽聲昏寺如字徐讀作侍轉注作䦙因門闕之象也李氏曰所以限內外艮有守故也耿睎道曰周官閽人守王宫中門之禁止物之不應入者也寺人掌王之內人及宫女之戒令者也皆為阻于前而衛其內之柔者也為指指趾皆止也指止于上趾止于下艮一陽在上止于上者也為狗為鼠狗陽禦于外鼠隂伏于內也郭子和曰坎之為隱伏也賢者則為隱小人則為盜艮之為利則為狗為害則為鼠為黔喙之屬黔其亷反徐聲禽鄭作􅲂喙况廢反徐丁遘反謂虎豹之屬郭子和曰震剛動于下故言足坎剛在于中故言心艮剛動于上故言喙三陽卦艮獨不言馬者其剛在上所用益小故于獸畜無行健之能徒有齧物之象其于木也為堅多節一本無堅字以坎例之無者非節止也林黃中曰外剛故止九家為鼻為虎為狐兑為澤為少女為巫為口舌為毁折為附決其于地也為剛鹵為妾為羊為澤説見象贊為少女為巫正義曰口舌之官毛氏曰隂在上鬼道也為口舌口耦畫在上之象舌耦中有柔也正義曰五事為言口舌言之具也故文從兑從言為講説之説為毁折之舌反鄭少梅曰春發生秋搖落震蕃鮮兑毁折也程可久林黃中同毛伯玉曰西方又為金太剛必折張子厚曰物茂則上柔者必折一説折食列反自折也為附決附漢字古傳柔附于剛而剛乃決柔有夬象也林黃中曰隂在外不敢敵剛附從其決柴氏曰柔附剛決故夬曰決而和其于地也為剛鹵五金之産藏于地中外柔而剛藏焉故為剛陽在下為剛隂在上為鹵郭子和曰澤所停則鹹鹵也鄭少梅曰剛地坑冶之所生鹵地鹽貨之所生為妾程可久曰隂失位也正義曰少女從姊為娣竊謂少而能悅少則賤皆妾之象為羊其色白隂見外也其性狠剛在內也或作羔陽無取九家為常為輔頰常坤之末也右第十一章八卦之象孔子曰于是始作八卦以通神明之德以類萬物之情此類是也然亦概舉其一隅爾使八卦之象僅止于此則取象亦狹矣何以盡萬事之變哉意此八卦古之占書三代皆用之孔子講説卦義其末舉八卦之象故門人傅見于此所以九家猶以遺象續其後也程可久曰八卦之象八物而已充其類則有所謂百物不廢者極其説則又可以類萬物之情然説卦之象有與卦爻相符者如乾為天坤為地之類是也有不與卦爻相符者如乾坤稱龍而不必在震坤屯稱馬而不必在乾之類是也有見于卦爻而説卦不載者如漸之鴻中孚之豚魚之類是也有見于説卦而卦爻無之者如為釡為布為螺為蚌之類是也若夫大琴謂之離小罍謂之坎此見于他書而易與説卦又可以類推也大抵有象可見有數可數者無非易也彖爻之辭雜而取之也説卦之象别而言之也六十四卦本之乾坤故諸卦中皆有乾坤象意如乾為玉為金坤為牛為車本釋他卦非徒言也毛伯玉曰此用之於隂陽律歷占筮小數往往而合故今隂陽家流通用之聖人以卜筮為君子之道以蓍龜並列于天地聖人之間而説卦又旁及于譎怪嵬瑣所以備天下之理林黃中曰説卦之象大率皆舉一隅亦有舉其二三者蓋聖人見天下之賾而擬諸其形容其名物象類多隱奧而難知姑托其近于人情而可以意逆者附著其下將求明者而質焉查元章曰荀慈明添物象以足卦爻所載者通倫類則不須添不然多添亦不盡厚齋易學卷四十七
