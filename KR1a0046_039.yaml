body:
  text: 厚齋易學卷三十九宋馮椅撰易外傳第七象上贊噬嗑至離電雷噬嗑先王以明罰敕法電雷噬嗑今本雷在電上程正叔曰象无倒置者疑此之互也朱子同今正之林黄中曰雷電之至常見電而後雷故卦以其序言之若皆至則為豐也李子思曰離配諸卦者七豐噬嗑旅賁大象皆言刑獄非天下之至明其孰能之先王以明罰敕法敕恥力反正也文見字林今俗作勑張舜元曰體電之光以明罰則情偽不能逃體雷之威以敕法則彊梁不敢犯楊廷秀曰金作贖刑明罰也象以典刑敕法也屨校滅止不行也屨校滅止初九象不行也械沒其止不能行也明其惡不行之象噬膚滅鼻乗剛也噬膚滅鼻六二象乗剛也乗初九之剛故噬之力而至於滅鼻遇毒位不當也遇毒六三象位不當也剛藏於柔之中為不當位故噬而遇之利艱貞吉未光也利艱貞吉九四占未光也去間之難故未光貞厲无咎得當也貞厲无咎六五占得當也得治獄之當何校滅耳聰不明也何校滅耳上九象聰不明也聰聽也校沒其耳以示其聽之不明无所聞知山下有火賁君子以明庶政无敢折獄王景孟曰明有所止之象君子之於庶政則欲致其明此明也於庶獄則无敢折之此止也諸說惟此可通都聖與曰法離之明而明庶政法艮之止而无敢折獄程可久曰離為刑獄之象凡四卦賁旅不嫌於用明故離象稱火豐噬嗑稱電者蹔明於幽闇之間不以為常也竊謂庶政飾治者也故於賁言也舍車而徒義弗乗也舍車而徒初九占義弗乗也弗不肯也乗平聲於義當以止徒行故不肯乗車賁其須與上興也賁其須六二象占與上興也上去聲謂九三興起也如須傅頤而動永貞之吉終莫之陵也永貞之吉九三占終莫之陵也陵相加也謂四据上陵下能永貞則四雖欲陵已終莫之能也六四當位疑也匪寇昬冓終无尤也六四當位疑也以當位明爻義謂疑於所與有初與三之婚寇隂善疑凡言疑皆隂爻也匪寇婚媾占終无尤也謂能不從寇而以婚媾則終无怨尤三四兩爻皆言終蓋本不如是處得其道然後如是故曰終无尤尤叶聲怡六五之吉有喜也六五之吉占有喜也喜去聲凡喜怒去聲體也上聲用也有喜君臣相得之辭白賁无咎上得志也白賁无咎上九象占上得志也居上故曰上得志謂得賁飾之如其志也山傅于地剝上以厚下安宅傅今附著也山以傅著於地為安故為人上者以厚下為安所宅也上下定體宅如宅帝位之宅山上艮之象厚下坤之象安宅象艮宅於地而安也不言后者凡為人上者皆欲厚其下以安其宅也程可久曰唯厚其下故宅乎人上者斯安矣毛伯玉曰觀於卦而知所戒焉觀於象而知所勉焉竊謂大象别立一義主乎象不主乎卦體也說者以剝落為義則非矣劉氏曰傅如傅益之傅以山傅地地愈厚而山愈安亦猶益下之為益也亦通剝牀以足以滅下也剝牀以足初六象以滅下也滅古蔑爻象用字不同此蓋以今文傳也下謂足剝牀以辨未有與也謂身在羣隂之中未有陽以相與剝之无咎失上下也剝之无咎六三占失上下也上下各二隂皆欲剝上九而本爻獨應之失上下四隂之字作文之法鼂謂多之字不然剝牀以膚切近烖也剥牀以膚六四象切近烖也近上聲烖叶聲齎都聖與曰剝至五隂而後成卦以其在四也故曰切近烖朱子發曰言烖者隂之剝陽天也以宫人寵終无尤也尤叶聲怡君子得車民所載也小人剝廬終不可用也君子得車上九占民所載也衆隂為民小人剥廬又占終不可用也言小人不可用用則剝廬矣載用韻未詳雷在地中復先王以至日閉關商旅不行后不省方雷陽氣之動者也在地中已動於地下也至日日南至也資貨而行曰商旅客也后天子諸侯之通稱省方巡省四方也關則閉之商旅則不行於塗為天子諸侯者不省四方凡以養陽之稚也孔子言先王以見其時不然矣郭子和曰先王喜陽之復懼其微弱而人泄之是以閉關而助其氣蓋三才一氣耳方天地欲動而人爭先之則損天地之氣是以閉塞人事以助天地之微陽也後世為月令之書者仲冬之月塗闕廷門閭築囹圄以助天地之閉藏蓋假此為義而誤以為天地閉藏之時也李子思曰陽之初萌其氣甚微不有以閉護之則其生必傷李季辨曰閉關不行省方恐其踐傷陽氣也此聖人輔相天地之道都聖與曰舜十一月朔巡狩而此言后不省方者巡狩者是月也不省方者是月之至日也不遠之復以修身也不遠之復初九象以修身也欲修其身必蚤復善休復之吉以下仁也休復之吉六二象占以下仁也下去聲仁謂初九之陽下謂下比於仁林黄中曰震為木仁也李子思曰下比於初以扶助其陽氣之將達頻復之厲義无咎也頻復之厲六三象占義无咎也袁氏曰其事宜有咎以趣時之義言之則无咎矣中行獨復以從道也中行獨復六四象以從道也道謂初九從隂陽正應之道耿氏曰孔子或從衆或違衆唯道之所在而已敦復无悔中以自考也敦復無悔六五象占中以自考也考成也從中道自成其已也五為中位故曰中迷復之凶反君道也迷復之凶上六象占反君道也六五以積之厚為敦復本爻以處隂之窮為迷是反乎六五也故曰反君道明以其國君凶之占天下雷行物與无妄先王以茂對時育萬物无妄之往得志也不耕穫未富也行人得牛邑人災也可貞无咎固有之也无妄之藥不可試也无妄之行窮之烖也天在山中大畜君子以多識前言往行以畜其徳天在山中大畜自山中見天則天在山中如壺中有天之義劉氏曰象所懐者大毛伯玉曰大畜以艮為大也天在山中以天為大也是各一道也君子以多識前言往行以畜其徳識今志亦記行去聲前人之言已往之行所記之多則畜古人之言行以成其徳爾有厲利己不犯烖也有厲利己初九象占不犯烖也已則不犯艮烖輿說輹中无尤也輿説輹九二象中无尤也居中而不進則无所歸尤此兩爻烖尤韻叶同剥之四五利有攸往上合志也利有攸往九三占上合志也上上聲上合上九之志六四元吉有喜也六四元吉占有喜也喜叶去聲君臣相得之辭六五畜之主四能為五童初牛之角故六五喜之六五之吉有慶也六五之吉占有慶也二受畜於五故君臣有慶何天之衢道大行也何天之衢上九象以四字為句故去亨字舉其隅也道大行也君子之道大行於上所以亨也以慶行為韻山下有雷頤君子以慎言語節飲食飲去聲食實職反言語飲食出入於頤者也法雷之動以慎其所出法山之止以節其所入先儒云禍從口出病從口入此至論也觀我朶頤亦不足貴也觀我朶頤初九象六二征凶行失類也六二征凶占十年勿用道大悖也十年勿用六三占道大悖也悖聲佩正應陽爻足以相養而拂之其道大悖亦言悖陽也顚頤之吉上施光也顚頤之吉六四象占上施光也施去聲本爻在上與上九同體而下應初故為所施之光居貞之吉順以從上也居貞之吉六五占順以從上也隂順從上九之陽以為養由頤厲吉大有慶也由頤厲吉上九象占大有慶也言本爻有得於六五之君為大有慶君臣慶㑹也澤滅木大過君子以獨立不懼遯世无悶滅沒也遯一作遁澤下於木今乃沒木是過越之大也君子以此之象如木末之不沒則獨立於斯世而不懼如木末之已沒則遯藏於斯世而不悶人之常情獨立鮮不懼遯世鮮不悶者唯其大過於人故不懼不悶劉長民曰用之則獨立不懼舍之則遯世无悶程正叔曰中庸所謂遯世不見知而不悔也王景孟曰懼則不能獨立悶則不能遯世張舜文曰獨立而莫我助遯世而莫我知自非豪傑之士大過人者烏能篤信如此哉藉用白茅柔在下也藉用白茅初六象柔在下也柔白茅之象在下曰藉老夫女妻過以相與也老夫女妻九二占過以相與也老夫得女妻為過棟橈之凶不可以有輔也棟橈之凶九三象占不可以有輔也成屋室者輯衆材以輔棟今棟已橈雖有衆材无所輔之棟隆之吉不橈乎下也棟隆之吉九四象占不橈乎下也下有二陽比九三下有一隂之不同故異於九三之橈乎下也彖以衡取象故言本末不言上下爻以豎取象故言上下不言本末枯楊生華何可久也老婦士夫亦可醜也枯楊生華九五象何可久也以枯故老婦士夫九五占亦可醜也亦承上文而醜以老故過涉之凶不可咎也過涉之凶上六象占不可咎也明无咎之意與常言无咎不同水洊至習坎君子以常徳行習教事水洊至習坎洊今荐在薦反相繼不一之義爾雅再也亦如洊雷之洊或在悶才本二反或作臻並非按文從水正為水洊至之稱水之走下繼至不絶所以為習坎也說者猶謂經軼卦名習坎為象或謂習衍文或又謂水洊至習為句何惑甚也君子以常徳行習教事行去聲教事教武事也常徳行常其教武事之徳行如周官大司馬四時之教是其常也耿睎道曰行險者武事所謂教事武事也程可久曰水盈科而後進先至者陷洊至者不陷水洊至習坎也常徳行者如水无不下習教事者如水之行險序周宣王之詩者曰有常徳以立武事意出於此郭子和曰日常曰習此不已之義毛伯玉曰二坎相仍為水洊至水洊至則常流而不竭矣以吾徳行之常為吾教事之習習則常矣常則習矣習坎入坎失道凶也習坎入坎初六象占失道凶也習坎之初迷失其路故入於坎之窞求小得未出中也求小得九二占未出中也居坎之中而陷於二隂未能出也故所求但小小則有得耳來之坎坎終无功也來之坎坎六三象終无功也進退皆坎終无出險之功樽酒簋貳剛柔際也樽酒簋貳六四象剛柔際也本爻以柔與九五之剛相交際也坎不盈中未大也坎不盈九五象中未大也九陽為大而陷於隂中故為水不盈坎而中未大之象上六失道凶三歳也上六失道凶三歳也以失道明象占迷失其道陷之愈深也明兩作離大人以繼明照于四方明兩作離作興起也袁氏曰兩作明之並無與也朱子曰明兩作猶曰水洊至大人以繼明照於四方耿睎道曰重明者上下明也繼明者先後明也彖言二五君臣故以上下重明言之象專言明兩作皆君也故以先後繼明言之蘭惠卿曰離為日為火為電而獨言明者蓋指一偏則不足以盡繼明之義六十四卦惟離稱大人程可久曰以徳則稱君子以政則稱后以創法則稱先王對下則稱上以繼統則稱大人履錯之敬以辟咎也履錯之敬初九象占以辟咎也辟聲壁逺之也黄離元吉得中道也黄離元吉六二象占得中道也以中道明黄然則離之所以元吉者以黄而後吉也日昃之離何可久也日昃之離九三象突如其來如无所容也突如其來如九四象无所容也下焚而上不可進无所容於上下之間六五之吉離王公也六五之吉占離王公也離或作麗傅也都聖與曰王謂天下之君公謂一國之君凡六五九五之爻有天子諸侯之象王用出征以正邦也獲匪其醜大有功也王用出征上九象以正邦也据上三爻為一國正其邦之不服者九四是也獲匪其醜大有功也王肅本有此兩句厚齋易學卷三十九
