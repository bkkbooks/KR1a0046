body:
  text: 厚齊易學卷四十三宋馮椅撰易外傳第十一說卦上舊以上中二篇為繫辭按繫辭乃文王繫于卦爻之下之辭非傳也當是其間有孔子述繫辭之㫖漢儒無經可附如彖象之類故釐為上下而别自為編也吳斗南曰漢藝文志有說卦三篇出于河內女子今亡其二即此上下篇是也今正之司馬君實曰雜記前聖及孔子解易之語程可久曰悉類于此出于孔子者加子曰以别之竊謂此書與文言出于孔門故仲尼稱子其無子曰者疑亦周家說易之遺書也所述皆文王作易之事周以前未有此也天尊地卑乾坤定矣卑或作埤非太極之初乾陽坤陰之氣渾然于有域之間無象可見乾坤有性而無體託天地以為體乾陽之氣上浮而為天坤陰之氣下墜而為地一尊一卑乾坤始定易之首畫乾坤蓋取諸此鄭少梅曰庖犧未畫卦之前天地是乾坤自然兩卦也程可久曰尊卑者不易之體故曰定朱子發曰歸藏先坤首萬物之母連山先艮以萬物之終始至於周易尊乾卑坤其體乃定見於卦則上體乾也下體坤也君尊臣卑父尊子卑夫尊婦卑三綱不正天地反覆卑高以陳貴賤位矣陳布也卑者賤而位乎下則地之象也高者貴而位乎上則天之象也易之辨貴賤存乎六位蓋取諸此王介父曰高者不能自高唯有卑然後見其高張子厚曰不言高卑而曰卑高者高以下為基亦人先見卑處然後見其高也朱子發曰貴以賤為本易自下升上元士大夫三公諸侯承之然後君位乎五也程可久曰卑高因時之升降而列焉故曰陳動靜有常剛柔斷矣斷都玩反决也乾坤皆有動靜直専闢翕是已唯夫形於天地天圓則常動地方則常靜然後乾剛坤柔斷然無疑易之以七八九六生爻蓋取諸此柴氏曰動靜無常則剛柔特未定故有常則可斷楊中立曰若其變動不居則剛柔不足以斷乾坤矣方以類聚物以羣分吉凶生矣方者陰陽之方主靜而屬地各以氣而類聚物者陰陽之物主動而屬天各以情而羣分易之繫辭以明吉凶蓋取諸此郭子和曰居同方則以類聚物殊情則以羣分聚必黨所同分必伐所異同異立則愛惡相攻而吉凶生矣在天成象在地成形變化見矣如離之在天成日在地成火坎之在天成月成雲在地成水成泉巽之在天成風在地成木是乾坤變化之形見也易之剛柔相推而生變化蓋取諸此蘇氏曰象者形之菁華發於上者也形者象之體質留於下者也人見其上下真以為兩矣豈知其未嘗不一耶此一節言易之始形於造化如此造化存乎天地而易存乎乾坤皆一陰一陽之所為也柴氏曰乾坤之體定然後以卑高分貴賤以動靜名剛柔以分聚知吉凶以形象觀變化耿睎道曰乾坤之定既由於天地之判則天地之卑高以陳而乾坤之貴賤斯位矣天地之動靜有常而乾坤之剛柔斯斷矣天地之間類聚羣分而乾坤之所以為吉凶者生矣天地之間成象成形而乾坤之所以為變化者見矣凡此言聖人作易之所由起也是故剛柔相摩八卦相蕩摩或作磨乾坤之氣相切摩也易之九六七八往來升降於六位蓋取諸此朱子發曰乾以剛摩柔坤以柔摩剛蕩唐黨反或作蕩非今世俗溫酒謂之蕩文從皿從湯以皿盛酒動蕩於湯之上也故或作蕩或曰動也或以乾蕩坤或以坤蕩乾三男三女亦然易之重卦蓋取諸此鼓之以雷霆潤之以風雨日月運行一寒一暑此言剛柔相摩八卦相蕩之實也鼓鼓動也霆聲廷或上聲去聲雷之餘氣挺生萬物也風之潤物方春發生之時撓之使脉理疏通而水上行也運或作違非雷霆震也風巽也雨兊澤艮山通氣蒸而為之也日月坎離也剛柔八卦而止及六子者乾剛坤柔立本者也六子代父母以有為者也故易之剛柔相推而生變化蓋取諸此張子厚曰人之氣一出一入上下相摩錯於鼻息見之自鼻息相摩以蕩於腹中物既銷鑠氣復升騰乾道成男坤道成女男者乾之道女者坤之道此以人之生言也至於鳥獸草木皆有陰陽雌雄牝牡此一節言易之形於造化之生物如此皆陰陽之變化也朱子發曰六子之致用不越乎乾坤張舜元曰陽氣至東雷奮而霆隨陰氣至西風畜而雨降日月北會陽氣入而陰氣出以為寒日月南行陰氣入而陽氣出以為暑乾下坤得之而成男坤交乾得之而成女李仲永曰剛柔相摩陰陽相推也八卦相蕩陰陽相錯也鼓之以陰陽之聲潤之以陰陽之氣運行之以陰陽之精耿氏曰萬物資生乎雷霆風雨之變而從役乎日月寒暑之運所以流形而不窮也李氏曰凡此皆變化之道也鄭少梅曰天地一變而為雷霆風雨日月寒暑又一變而為人物男女無非天地之變乾知大始坤作成物言造化之生物本於易之乾坤物各有始感乎乾則知之物各有成資乎坤以作之柴氏曰物之有象一氣之動則自有知覺而生意所始乾實為之一氣既感則妙合而凝其形乃著有作成之意坤實為之朱子曰知猶主也乾主始物而坤作成之承上文男女而言蓋謂猶今之官制內稱知樞密院知制誥外稱知州事知縣事之知也此說自司馬君實而朱子述之乾以易知坤以簡能易去聲平夷也簡省徑也乾隨物所感而有知因以賦豫豈不平夷坤唯乾所施而成之未嘗自為豈不省徑能謂作成物也楊廷秀曰乾坤之功雖至溥而無際乾坤之德實至要而不煩始萬物者乾之所知也知其始莫知其成是之謂易成萬物者坤之所為也為其成莫為其始是之謂簡李仲永曰陽以隂為險乾無陰以為險唯一於健故易陰以陽為阻坤無陽以為阻唯一於順故簡柴氏曰乾有知覺以其易也坤能成物以其簡也易則易知簡則易從易知則有親易從則有功有親則可久有功則可大可久則賢人之德可大則賢人之業自易簡外凡易知易從皆為難易之易賢人謂賢於人如夫子賢於堯舜之賢一曰聖賢之賢其為聖賢之賢者謂易未嘗以聖人責天下謂之賢人則下聖人一等皆可勉而至也朱子曰人之所為如乾之易則心明白而人易知如坤之簡則其事要約而人易從易知則與之同心者多故有親易從則與之協力者衆故有功又曰德謂得於己者業謂成於事者人法乾坤之道至此可以為賢矣耿睎道曰若幽險而難知則人畏而不親矣叢脞而難從則勞而無功矣易簡而天下之理得矣天下之理得而成位乎其中矣以易而平險以簡而御煩則天下之理千蹊萬派同歸一致皆為我所得矣得之為言謂在彼者皆有之之謂也天以易而位乎上地以簡而位乎下人而能體易簡使天下無遺理則成位乎其中與天地並立而為三極也朱子曰至此則體道之極功聖人之能事可以與天地參矣此一節言易本於乾坤之易簡存乎人以體之然後配天地而成三極也郭子和曰大明乾坤之德終以聖人法乾坤之道柴氏曰就人推明乾坤易簡之德如此其大蓋人物均有此德唯人能擴而充之與天地並也鄭少梅曰人之所以異於天地者其心志本來易簡而習艱險也艱險一習與天地逺矣所以坎險之卦易坤靜之位加一習字表其由易簡以入艱險也右第一章首言乾坤之理形於天地之兩間則易之卦與爻位吉凶變化之理畢具繼言乾剛坤柔相推而生變化則易之竒偶重卦之功用無遺終言乾坤之易簡而推之在人則可以與天地並而立三極之道則卦雖未畫易雖未作而一經之理本末粲然在目推而行之存乎人爾郭子和曰自天尊地卑而至易簡乾坤之義畢矣朱子曰以造化之實明作經之理又言乾坤之理分見於天地而人兼體之也鄭少梅曰有自然之易有庖犧之易有文王之易有孔子之易自然之易在庖犧未畫之前也庖犧之易在文王未作經之前也文王之易在孔子未作十翼之前也庖犧因天地而畫乾坤未畫之前天地是乾坤自然兩卦也故天地之位有貴賤材有剛柔兆有吉凶道有變化相摩則有相推之剛柔相蕩則有自然之八卦有雷霆風雨日月寒暑之變以成萬物之男女其要不外乎易簡之善而已此自然之易而庖犧法之以畫卦文王玩之以作經孔子述之以作十翼者也聖人設卦觀象繫辭焉而明吉凶虞下有悔吝二字辭不倫剛柔相推而生變化此章言文王之作易也聖人指文王也設陳也陳庖犧所畫之卦以觀其象象謂卦之吉凶爻之變化也下文所云是也吉凶有其象則繫之以辭而明之變化有其象則剛柔相推以生之剛推柔則柔變而剛化矣柔推剛則剛變而柔化矣此言爻也不言繫辭吉凶者承卦下之文猶周官言詩之風即次之以賦比興而雅頌在其後不復言賦比興者承上文也鄭少梅曰古卜筮家謂之繇大傳無繇之說是孔子删去不取也此一節明文王作易卦爻之辭耿睎道曰八卦成列象在其中矣卦之有象見吉凶猶天之垂象見吉凶也剛柔兩盛為相摩一盛一衰為相推八卦交互為相錯一去一來為相蕩是故吉凶者失得之象也象猶形之有影也失則凶得則吉觀事之失得則知吉凶之必至矣朱子曰象者物之似也悔吝者憂虞之象也吉有凶凶有吉吉凶二辭不能盡也故又有悔吝悔追恨也吝文從文從口口以為是文過而不改也觀事之憂虞則知悔吝之必至矣朱子曰吉凶相對而悔吝居其中悔自凶而趣吉吝自吉而向凶耿睎道曰悔過而將改則過止生於心故為憂之象憂在心也吝過而不改則過遂形於外故為虞之象虞在物也變化者進退之象也耿睎道曰六爻剛推柔則剛進而柔退柔推剛則柔進而剛退進者變也退者化也觀爻有進退則知變化之所通矣剛柔者晝夜之象也內卦屬陽剛明晝之象外卦屬陰柔暗夜之象故離之三為日􅨫而豐之二為日中觀時有晝夜則知剛柔之所分矣六爻之動三極之道也三極與三材異三材陰陽柔剛仁義是其材也極至也三極天地人各一其極也必待於六爻之動者爻有肴義又有交義剛柔雜居於六位之名也爻圓而動天也位方而靜地也位之當不當人也以天之剛德居地之陽位在人為位正當也動而變柔是以柔德居尊位不當矣柔居陽位在人為位不當也動而變剛是以剛德居尊位為位當矣柔也亦然是三者必極其道之變通而後已是以謂之三極也此一節言設卦所觀之象以歸於三極之道是故君子所居而安者易之序也所樂而玩者爻之辭也君子指體易之人居者處而不出也樂聲洛玩者觀之詳朱子曰序謂卦爻所著事物當然之次第張子厚曰每玩習則有所益所以可樂朱子發曰易貴賤之序爻吉凶之辭張舜元曰進退各以其序吉凶各有其辭此一節明君子體玩卦爻以待用者也是故君子居則觀其象而玩其辭動則觀其變而玩其占是以自天祐之吉無不利君子處而不為則時之合應何卦觀其卦之象而玩其卦之辭出而有為則筮之所變何爻觀其爻之變而玩其爻之占蓋卦靜而爻動用靜則吉若乃動必觀所變之卦其占吉而後動也朱子曰凡單言變者化在其中占謂所值吉凶之决也張舜元曰觀象玩辭觀變玩占吉凶之期可以前知矣李仲永曰吉凶天也觀而玩之避凶趨吉一順乎天是以有吉而無不利也此一節言君子體玩卦爻以致用而獲吉也林黃中曰此所謂易有聖人之道四焉者也蘭惠卿曰象與辭寓於書而已存故居則法之以體其常變與占求諸蓍而後見故動則筮之以盡其變右第二章專言文王之作易之象觀天地乾坤以演卦生爻不能無吉凶悔吝有待於君子體玩之以致諸用與易道合然後有吉而無凶也彖者言乎象者也彖者指文王所係卦下之辭言一卦之大象即第二章所觀之象也爻者言乎變者也爻以變動為占爻者指文王所係爻下之辭鄭少梅曰揲蓍遇七八不變遇九六即變今易皆系九六則言其變也以左氏考之因變而得辭龔氏曰道無變動則為三材有變動則為六爻朱子發曰聖人設卦觀象默而識之天下不皆識故彖辭所以言一卦之象剛柔相推而生變化變化有難知者故爻辭所以言一爻之變吉凶者言乎其失得也悔吝者言乎其小疵也耿睎道曰積悔可以為吉而未純乎吉積吝可以為凶而未純乎凶是以同為小疵龔氏曰積而大之則成得失也無咎者善補過也善其補過也龔氏曰止於常則其德全全則人以為休而依之過於常則其行闕闕則人以為咎而違之唯隨其闕而補之然後無咎正義曰即此一爻能補其過第一節朱子曰此卦爻辭通例耿氏曰此申上章君子居則觀其象象烏在彖之所言是也動則觀其變變烏在爻之所言是也或言象或言變以至言失得言小疵則有盡其言之辭焉乃居而玩之之辭也有吉凶有悔吝有無咎乃動而玩之之占也竊謂辭者卦爻象之辭卦如履虎尾爻如潛龍之類是也占指言變之占不及卦也如勿用利見大人是也上章皆言吉凶悔吝剛柔變化之象此章則言彖爻吉凶悔吝之辭是故列貴賤者存乎位列謂成列有序位六位也卑高以陳貴賤位矣位高者貴位卑者賤故孔子論三多凶五多功謂之貴賤之等上貴而下賤也與陽貴陰賤不同齊小大者存乎卦陰陽固有小大之分然一隂一陽對立乎有域之間未嘗有餘亦未嘗不足小者往大者來所以為泰也而大者亦時乎往小者亦時乎來大者之能畜小也而小者亦時乎能畜大大者之過小也而小者亦時乎能過大並立之謂齊王景孟曰爻者言乎變而列貴賤者又存乎位彖者言乎象而齊小大者又存乎卦辨吉凶者存乎辭辨分别之也承上卦爻之文則卦爻所係之辭也憂悔吝者存乎介介界也介在吉凶之兩間分界處也朱子曰介謂辨别之端蓋善惡已動而未形之時於此憂之則不至於悔吝矣震無咎者存乎悔朱子曰震動也知悔則有以動其補過之心而無咎此第二節申上一假之義講義曰位卦吉凶悔吝無咎皆申上文之言爻之變有貴賤之不等而能列者以其位也彖之象有小大之不齊而能齊之者以其卦也吉凶之有失得而能辨之者以其有辭也悔吝之有小疵而能憂之者以其能介也無咎之善補過而能震之者以其知悔也是故卦有小大辭有險易陽卦體大其辭平易陰卦體小其辭險陂平易多吉險陂多凶君子小人之分也辭也者各指其所之指其險易之方各者卦有小有大也之所往也李仲永曰指其吉凶之所在而使之趣避也朱子發曰辭有易者之於吉也辭有險者之於凶也或曰左氏不言得某爻而言某卦之某卦之變也易以變為占猶漢書注邦之字曰國之之右第三章專言文王作易所擊之辭易與天地凖故能彌綸天地之道此總言易之為書與天地適相當無缺無餘也準均停也彌亦作弥綸條理也彌綸天地之道猶所謂贊天地之化育也朱子發曰生蓍立卦生爻三者凖天地也亦通仰以觀于天文俯以察于地理是故知幽明之故天在上故曰仰地在下故曰俯以者以此易之書也天逺故曰觀地近故曰察文者氣之所形如日月星雲之象理者形之所成如高下流峙之義文明也理幽也朱子發曰仰以易觀乎天則凡地之成形者莫不有是文俯以易察乎地則凡天之成象者莫不有是理然則幽明一致也幽者明之理明者幽之文是所謂故也原始反終故知死生之說朱子曰原者推之於前反者要之於後蓋謂始何緣有生終何緣有死生從何來死從何去此原始反終之謂也夫有生必有死有死必有生一晝夜之間極覆載之內無一息不生無一息不死人物各受一元之氣有聚有散自然如此死者氣散於太虛生者氣聚於其物氣者陰陽大造之氣非一物之所得私也非謂死者復生如異端所謂前身化後身或人為異類異類之為人也說謂言其理也程可久曰二氣絪緼而精聚物之所以生二氣離析魂不載於營魄而遊焉物之所以死精氣為物游魂為變是故知鬼神之情狀氣之精者聚而為人物魂之游者散而為變化變對化言則變為生化為死單言變者化之義也胡翼之曰於萬物之間受陰陽之精氣而靈者則為人人受陰陽之精氣萃之於身則耳目口鼻心知髮膚而為體魄合於人身則謂之魂故目能視耳能聽心能思慮則謂之神及夫思慮既久精神已倦心知己勞髮膚漸衰用之太過及其死也體魄降於地骨肉斃於下精神散之於天則為神體魄散之於下則為鬼左氏載子産之言思之精爽是謂魂魄去之何以能久祭義曰氣也者神之盛也魄也者鬼之盛也人之生則精氣聚而為神死則骨肉散而為鬼而精魂改變去形離體則成變化之道也程正叔曰變則存者亡堅者腐更無物也張子厚曰動物本諸天以呼吸為聚散之漸植物本諸地以隂陽升降為聚散之漸物之初生氣日至而滋息物生既盈氣日反而游散至之為神以其伸也反之為鬼以其歸也朱子發曰陰陽之精五行之氣氣聚為精精聚為物得乾為首得坤為腹得震為足得巽為股得坎為耳得離為目得艮為鼻得兊為口及其散也五行陰陽各還其本故魂陽反於天魄陰歸於地陰陽轉續觸類成形其游魂為變乎講義曰精氣為物言其聚也游魂為變言其散也精天一之所生也故自此而化生自此而壯長自此而神明氣陰陽之所成也故一清一濁而具天地一呼一吸而成晝夜或動而散或靜而止此所以聚為物物成形而有所歸故大化有四以至於死死則體魄降於地魂氣升於天降則為化化則因形而盡升則為變變則無不之故鬼以有所歸而為言則凡物之化可知之也神以無不在為言則凡游魂之變可知也游魂者聚魄之對也故者其事之所因也說者其理之所在也情者可以意通也狀者可以形測也耿南仲曰精神魂魄意五者聚而為物散而為變其聚也精為先故於物言精氣其散也魂為先故於變言游魂而已不直曰精而曰精氣者有曰精氣有曰神氣氣以神主以精凝有精則氣從之矣夫聚而為物散而為變同此五者而已則鬼神之情狀何以異乎人之情狀哉鬼神特其散者而已以其聚可以知其散也又曰祝可以通則鬼神之情無以異乎人之情尸可以象則鬼神之狀無以異乎人之狀張舜元曰情由狀立狀因情成鬼神雖去形其情不違乎狀故獺之祭也不離乎獸人之祭也以粢盛為主祝天則以圓丘祭地則以方澤是知鬼神之情不違乎狀猶天地神祇不違其方圎也此一節言易之作知天地之道故凖之而能彌綸之也柴氏曰易所謂彌綸天地之道天地何道也一文一理有幽明之故一始一終有死生之說一物一變有鬼神之情狀文理者幽明也知其故則易也始終者死生也知其說則易也物變者鬼神也知其情狀則易也朱子曰此窮理之事也以者聖人以易之書也易者陰陽而已幽明死生鬼神皆陰陽之變天地之道也王景孟曰天地之道即下所謂一陰一陽是也在天地則為幽明寓於始終則為生死見於物變則為鬼神易之為書彌縫無闕綸理有序而天地之道盡在此書與天地相似故不違違悖也知天地之道幽明死生鬼神之故之說之情狀故能凖天地而與之相似彌綸天地之道而不違也知周乎萬物而道濟天下故不過旁行而不流道或作導流或作留皆非聖人之知周萬物似天之髙明也而道亦似天之濟天下故能不過於亢旁行乎天下似地之通普也而未嘗狥物而忘反故能不流於蕩此言與天地相似也樂天知命故不憂安土敦乎仁故能愛樂聲洛虞作變非與天地相似故時行則行時止則止焉知通塞之命而樂之故能無道不行之憂所謂受命也朱子曰既樂天理又知天命故能無憂與地相似故不擇土而居焉敦友助之仁而安之故能與所居而愛所謂里仁也此言故不違王介父曰傃富貴行乎富貴傃貧賤行乎貧賤所謂樂天也傃夷狄行乎夷狄傃患難行乎患難所謂安土也張知常曰順天之數故樂天知命而不憂體地之德故安土敦乎仁而能愛王景孟曰樂天安土此又言易之道無適而非天地也夫天者制命之君也土者宅生之地也而易則性命之學也樂天則消息盈虛與時皆行初無冒昧干時之失蓋所知者命也所知者命則無一毫之非吾命夫何或憂之有安土則素其位而行無入而不自得初無厭惡不平之念蓋所敦者仁也所敦者仁則無一物之非吾仁又何不愛之有知命命之學也敦仁性之學也故曰易性命之學也而天地盡在是矣此節言易之故能彌綸天地之道如此知周萬物道濟天下而不過旁行而不流即其所以與天地相似者也樂天知命安土敦仁不憂能愛即其所以不違者也範圍天地之化而不過朱子曰範如甄冶之有模圍匡郭也天地之化無窮而易為之範圍不使過於中道所謂財成者也王景孟曰天地之化即陰陽二氣之相為推移是也李氏曰前言彌綸天地之道此言範圍天地之化道者陰陽之運行化者陰陽之生育龔氏曰春則生夏則長秋則斂冬則藏一寒一暑終則復始天地之化也使之各因其時而成功此之謂範至於寒不陵暑暑不奪寒陰不至於太肅陽不至於太溫而萬物各得冲氣以生此之謂圍範圍不過皆中節也曲成萬物而不遺李仲永曰萬物散殊洪纎巨細各各成形者曲成而不遺也通乎晝夜之道而知通貫也朱子曰通猶兼也晝夜即幽明死生鬼神之謂耿睎道曰晝夜積而成寒暑寒暑積而成嵗嵗積而成古今萬物之動靜出入死生榮悴於是迭廢而迭起矣通乎晝夜之道同為一條而知則近之於出作入息之冝逺之於往古來今之變小之為夢覺大之為幽明死生鬼神無不洞達矣此一節結彌綸天地之道與通乎晝夜之道而知之者也晝夜之道不過隂陽兩端而已矣幽明死生鬼神皆一陰一陽也故神無方而易無體朱子曰通晝夜之道如此然後可見至神之妙無有方所易之變化無有形體也王輔嗣曰方體者皆系於形器者也神則陰陽不測易則唯變所適不可以一方一體明王景孟曰神與易非二物也郭子和曰孔子言神易道聖人凡有四者之異且神無自神其在道則道之神也在易則易之神也在聖人則聖人之神也神寓於道易聖人各有其名不謂之神此神所以無方也李子思曰八卦相錯交變而不常乾或來內坤或往外坎或居上離或居下或剛上文柔或柔來文剛或剛得中或柔得位以至反對相易形象非一殆不可指其方而名其體也唯其不可以指其方而名其體夫是以謂之神謂之易神者不可知測易者交相易之謂也耿睎道曰天髙地下不為無方天圓地方不為無體與天地凖與天地相似則固在方體之中矣乃若範圍天地之化曲成萬物通乎晝夜之道則無方亦無體矣一陰一陽之謂道道者比况行路以為稱也一陰一陽往來升降消長變化周流無窮故不居於一方不定於一體此之謂易之道也程伯淳曰道非陰陽所以一陰一陽者道也如一闔一闢謂之變繼之者善也成之者性也繼者接續之辭成者始終之辭姑以乾坤言之純陽者乾之道也純隂者坤之道也乾坤有純陽純陰之道故接續此道者為元亨利貞四者即所繼之善也乾由其元亨利貞以終始乎至健坤由其元亨利牝馬之貞以終始乎至順者即所成之性也程可久曰一陰一陽之謂道即乾坤見之繼之者善即四德見之仁者見之謂之仁知者見之謂之知仁者以愛人為心見易之教人趣吉則曰易之道仁也知者以慮患為心見易之教人避凶則曰易之道知也仁知有異見易無異道彼各隨所知者名之爾耿睎道曰仁者有見於仁而謂道仁而不知道之藏諸知知者有見於知而謂道知而不知道之顯諸仁百姓日用而不知百姓謂凡民而無見於易者也飢食渴飲夏葛冬裘君臣父子夫婦長幼無非日用乎一陰一陽之道而不自知故君子之道鮮矣君子猶大象之所稱鮮猶民鮮久矣之鮮易之一書無非聖人體易參天地之事今言其道為君子者不以聖人絶天下也李仲永曰是道也一隂一陽不離日用於日用之中見而知之者君子也無所見而不知者百姓也無所見而不知者多則見而知之者鮮矣此一節言易之神彌綸天地之道而人罕知之大抵此章皆言致知之學首言易知天地之幽明死生鬼神之道中言聖人通乎晝夜之道而知易此又言天下之見道偏暗而鮮知易也顯諸仁藏諸用鼓萬物而不與聖人同憂至此始言聖人之於為諸毛氏曰古者反聲切字之原佛家者流謂之二合蓋兩字合一聲也易顯之於仁陽之闢也而主生凡吉慶亨利之事也即仁者之所見者也易藏之於用陰之闔也而主殺凡凶咎悔吝之事也即知者之所見者也聖人之心憂患天下恐一物之不得其所而易以陽生隂殺鼓動萬物使之自為趨避而不與聖人同其憂患斯世之心蓋易道無所容心與天地相凖而聖人不能忘情者也盛德大業至矣哉嗟嘆易之德業如此其至也朱子曰顯自內而之外仁謂德之發也藏自外而之內用謂業之本也毛氏曰聖人之憂有所不忍易之吉凶有所不恕林黃中曰仁顯而用藏則德盛而業大人見其盛德大業之美而不知其顯仁藏用之神故曰至矣哉歎其妙用也此一節意屬於成之者性之下其中欲言人不知易以仁知百姓君子間之張知常曰此易之所以不得不興聖人之所以不得不作易也張子厚曰此篇或說易書或說天地或說人卒歸一道雖甚參錯而理則同也竊謂言易法象天地與之相凖而行之存乎人故其終必歸之聖人君子也富有之謂大業日新之謂盛德既贊德業之盛大必推原其極大之由洪纎髙下媺惡短長皆隂陽之所造化是名大業消息盈虛往來更禪皆陰陽之所迭運是名盛德之謂與謂之不同之謂者猶曰是名也謂之者猶曰呼為也張子厚曰冨有者大無外日新者久無窮生生之謂易因德業之冨有日新而推本之曰凡此皆易也易道生生不窮所以富而有其業日而新其德也朱子發曰隂生陽陽生陰陰復生陽生生不窮是謂之易朱子曰理與氣皆然也成象之謂乾效法之謂坤蘭惠卿曰乾始三晝以象三才故曰成象坤則斷三畫成六效法乎乾故曰效法毛伯玉曰畫一以為竒謂之成象因竒而生耦謂之效法乾坤者竒耦之畫也極數知來之謂占通變之謂事蘭惠卿曰揲蓍之時極十又八變之數遂知來物是之謂占化而裁之推而行之舉而錯之天下之民謂之事業是之謂事朱子曰事行事也所謂占者極蓍揲之數可以前知也所謂事者即占之變而通之者也陰陽不測之謂神方其筮時未知此爻為陰為陽得一爻又未知次爻以至六爻成卦未知陽卦或陰卦是之謂不測不測則不可知是其神也唯其神所以占而知來講義曰陰知其在隂而不知其在陽陽知其在陽而不知其亦在陰此之謂不測此一節林黃中曰有生而後有象有象而後有法有法而後有占有占而後有事竊謂始言易之神而占筮之事卒歸於神而已右第四章始言易之在天地繼言文王觀天地之象而作易又繼言文王作易而繫之辭至此乃言易道難知而寄之筮占也蓋易之成書凖天地能彌綸其道而其神天下罕知易不能憂患而寓其神於占筮告天下也夫易廣矣大矣以言乎逺則不禦以言乎邇則靜而正以言乎天地之間則備矣易以道陰陽而陰陽之性則乾坤是也乾大坤廣故易為廣大廣配地大配天以言乎逺謂天也天之行健故不可禦以言乎邇謂地也地德直方故靜而正以言乎天地之間則人道也備言無缺闕也楊廷秀曰廣大出於乾坤龔氏曰廣言無不載也大言無不覆也王景孟曰合乾坤以為易廣邇謂坤大逺謂乾此一節總言三極之間無非易也夫乾其靜也專其動也直是以大生焉夫坤其靜也翕其動也闢是以廣生焉專陸作磚非翕虛級反斂也斂聚其氣闢婢亦反此申言易之廣大出於乾坤也不禦靜正者廣大之所形也專直翕闢者廣大之所生也朱子曰乾坤各有動靜於四德見之靜别而動交乾一而實故以質言而曰大坤二而虛故以量言而曰廣蓋天之形雖包於地之外而其氣常行乎地之中也程可久曰方乾用事而動坤乃輔乾而開闢及坤用事而靜乾乃不交而專一也無所閡故曰直以揫斂為事故曰翕李仲永曰乾為命之府坤則申之而已坤靜則翕萬化而含𢎞動則闢萬化而光大程伯淳曰乾陽也不專一則不能直遂坤陰也不翕聚則不能發散廣大配天地變通配四時陰陽之義配日月易簡之善配至德子曰易其至矣乎此申言易之於逺邇天地之間如此也而天地之間以人為貴周官至德以為道本言在人德之到其地位者也天地者廣大之體四時者變通之序日月者陰陽之精至德者易簡之所賦尚何以配為哉蓋乾坤之廣大變通陰陽之有其義易簡之有其善無以形容之故有形者廣大無加於天地而非謂天地也有氣者變通莫著於四時而非謂四時也日月之往來而為寒暑生殺隂陽之義也而非指乎日月至德之在人心而為仁義禮智易簡之善也而非專乎至德李氏曰取彼以匹此得所配則乾坤有託而顯矣李仲永曰配者兩相當也象者微像著也程可久曰廣大者乾坤之體變通者乾坤之用義則理之所在善則性之所鍾毛伯玉曰本之則為陰陽畫之則為竒耦名之則為乾坤用之則為剛柔造化之妙變動之端生生之理物之體質人之資性位之貴賤德之邪正無出此二者此聖人本之以作易者也故以其極至者贊之在易則具於爻象在人則極於聖賢與天地四時日月俱運於不窮而反之至約則唯陰陽二畫耳故曰易簡易其至矣乎與盛德大業至矣哉之辭同此贊上文而生下意也作文者謂之結上生下是也今人皆分在下一節别為一章誤矣朱子疑子曰為後人所加蓋文言說卦多孔子所作亦有門人記之者此子曰字著孔子言之至此而嘆美之如書之乃言曰也夫易聖人所以崇德而廣業也聖人之德業體乾坤之易簡而為之首章已明其指而此因贊易之至極於易簡之善配人心之至德而乃申首章未盡之意也崇大之廣廣之也體乾坤以廣大其德業猶易之廣大而配天地也知崇禮卑崇效天卑法地德之崇由夫知之所及業之廣由夫禮之所行知性乎水易流於卑貴乎上騰故崇效天之髙然後德可以崇禮性乎大易過於髙必貴乎下降故卑法地之下然後業可以廣知今智禮或作體卑或作埤婢皆非不曰知效天禮法地而云崇卑者則蓋欲其崇如天卑如地非知本如天禮本如地也鄭舜舉曰成已者德也故欲崇崇則日新成物者業也故欲廣廣則富有林黃中曰水性下知則配焉不極髙明不足以為知火性上禮則配焉不道中庸不足以為禮天地設位而易行乎其中矣設位言天尊地卑陳布於上下也自天地奠位而易運行乎其中無非所以法象者此知禮之欲崇卑亦效法於天地也論易之理先天地而存有太極然後有天地論易之道則有天地易道然後行無天地則無所寄託也郭子和曰易之廣大備於天地之間舉天下之事莫不有易之道凡具天地之象者易已在其中故聖人無適而不用易成性存存道義之門成知禮之性而存之又存其道義從此而出德崇業廣矣門謂從此而出也由是之焉而有得則為德行而宜之而有功則為業右第五章言易之廣大散在三極而出於乾坤乾坤之善在人為德業法象天地而成其性則德業從此出矣厚齊易學卷四十三
