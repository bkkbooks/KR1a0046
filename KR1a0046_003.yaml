body:
  text: 厚齋易學卷三宋馮椅撰易輯注第三經下篇咸至姤艮下兑上兌澤反在艮山之上是山澤相感而氣通也故艮下兌上成卦曰咸咸亨利貞取女吉咸感也合也皆也亨利貞象取女吉占取今娶初六咸其拇初六咸其拇心感而足未動之象以象占拇茂后反古母通卜作􅡑足大指六二咸其腓凶居吉六二咸其腓心感而足欲動之象腓肥通脛腨也俗謂之足肚凶居吉占動則凶静則吉九三咸其股執其隨徃吝九三咸其股執其隨感近而逺不應之象股聲古隨謂腓拇隨之而動者也執之者因股而執腓拇也徃吝占本應上六隔閡九四九五而下執六二之隨故徃應上則吝九四貞吉悔亡憧憧徃來朋從爾思九四貞吉悔亡此爻占在象前憧憧徃來朋從爾思事物交至而所感有限之象憧昌容反又聲童徃來不絶之貎或聲鐘或作􅚸非朋正應也爾指諸爻也四當上下諸爻交相應之㑹故諸爻相感相應憧憧徃來於前各以類應從其所思於我何與焉九五咸其脢无悔九五咸其脢心感而欲言之象脢武杯反或聲灰或作脄膴􅀈恐非喉之出納之所也説者以為眷肿非是心而脢脢而口其序不難見也上六咸其輔頰舌上六咸其輔感形於言之象輔頰車也頰舌占猶俗言口舌巽下震上反咸之象震以長男居上而在外巽以長女居下而在内為人倫夫婦之常故巽下震上成卦曰恒恒亨无咎利貞利有攸徃恒胡登切常也久也吕曰居常而可久也亨象无咎占利貞象利有攸徃占此卦再言象占盖占屬於象謂亨而後无咎利貞而後利有攸徃也初六浚恒貞凶无攸利初六浚恒貞凶无攸利象在占中九二悔亡九二悔亡占九三不恒其徳或承之羞貞吝九三不恒其徳徳二三之象或承之羞貞吝占或鄭作咸非或有承之者亦羞之以此固執為恒吝之道也九四田无禽九四田无禽有事而无功之象占在象中田今畋禽義見比九五六五恒其徳貞婦人吉夫子凶六五恒其徳徳一而不變之象貞句婦人吉夫子凶占上六振恒凶上六振恒常久而不能安之象振馬曰動也虞張作震鄭曰摇落也説文作榰陸希聲作寘于象无取凶占艮下乾上艮之二隂上進消陽則乾之三陽逺之而退避故艮下乾上成卦曰遯遯亨小利貞遯徒困反古篆省从遯亦作􅋟退避也或作遁義不通用亨象小利貞占言隂利於正固也初六遯尾厲勿用有攸徃初六遯尾在遯之時最後之象初尾之象也厲勿用有攸徃占六二執之用黄牛之革莫之勝説六二執之用黄牛之革莫之勝説固留而不使之遯之象執林黄中曰古文今縶勝平聲説今脱黄牛之革柔順而堅固以此縶系諸陽而使之脱去不可得也以象占九三系遯有疾厲畜臣妾吉九三系遯有所拘戀而不得去之象系古文今係或繫有疾厲畜臣妾吉占九四好遯君子吉小人否九四好遯以義制欲而必去之象好去聲情好也九五嘉遯貞吉九五嘉遯與下同志而嘉隠遯之象嘉志合之㑹貞吉占上九肥遯无不利上九肥遯遯而以道自裕之象肥豐裕也陸希聲作飛髙舉逺引之象亦通无不利占乾下震上大壯利貞壯者氣力强盛之名初九壯于止征凶有孚九二貞吉九三小人用壯君子用罔貞厲羝羊觸藩羸其角九四貞吉悔亡藩決不羸壯于大輿之輹六五䘮羊于易无悔上六羝羊觸藩不能退不能遂无攸利艱則吉坤下離上下坤三隂上巽一隂四隂在下成觀之象今六自四進五成離故下坤上離成卦曰晉晉康侯用錫馬蕃庶晝日三接晉進也古齊篆㬜康侯用錫馬蕃庶晝日三接以象占康安也錫予也下予上也蕃盛庶衆多也三接人君接此康侯也言安寜其國之諸侯嘗用此卦之義錫予君上之馬蕃而且庶故為君者一日凡三接之親寵之至也康或以為康周公之康錫謂上錫下庶作遮接作㨗皆非三或讀去聲亦通初六晉如摧如貞吉罔孚裕无咎初六晉如摧如有所抑而不得進之象摧罪靁反説文擠也折也貞吉占罔孚未信於上之象裕无咎占寛裕自處不戚戚於上之不我知則无咎六二晉如愁如貞吉受兹介福于其王母六二晉如愁如進而有憂之象愁或子小反非貞吉受兹介福于其王母占介大也于徃也謂能守貞則其愁可釋而徃王母以受此大福也愁謂九四為阻王母謂六五以隂相應也六三衆允悔亡九四晉如鼫鼠貞厲鼫詩作碩疑此轉注從鼠郭景純云形大如鼠好在田中食粟豆盖田鼠也六五悔亡失得勿恤徃吉无不利上九晉其角維用伐邑厲吉无咎貞吝離上坤上明夷利艱貞明夷夷傷也利艱貞以象占利于艱難貞固自守以不䘮其明初九明夷于飛垂其翼君子于行三日不食有攸徃主人有言初九明夷于飛垂其翼傷于明而欲引去之象飛以鳥喻其明傷而飛去也垂其翼歛翼避禍也君子于行三日不食有攸徃主人有言占君子之于行三日之久而不食所主之人以不食其食而有違言六二明夷于左股用承馬壯吉六二明夷于左股傷于明而不能行之象今本夷字下又一夷字衍文九家無之或作睇眱睼眤股或作般槃並非用承馬壯吉占承陸九家本今作拯無此字子夏字林作抍聲承升也用己所承之乾馬壯而健行故吉九三明夷于南狩得其大首不可疾貞九三明夷于南狩得其大首明傷于隂而驅除之之象于徃也狩古守田獵也為傷于明故徃南田狩得其為惡之首也六四入于左腹獲明夷之心于出門庭六四入于左腹獲明夷之心深察其中而得其見傷之意之象于出門庭占既獲其心則徃出門庭不復入矣六五其子之明夷利貞六五其子之明夷繼統而當明傷之時之象其指大君也當明夷之時而傳之子則其子亦為明夷矣其蜀才本今以彖贊有箕子之文遂加竹作箕趙賔之徒知其非乃訓箕子作荄滋劉子政班孟堅鄒湛非之利貞占告其子以正則不傷人之明矣上六不明晦初登于天後入于地上六不明晦積隂蔽明之象謂至上當變乃不明而復晦也初登于天後入于地覆釋象不明而晦也以象占離下巽上専以男女各正其位為義下離六二位内上㢲九五位外故離下㢲上成卦曰家人家人利女貞家人謂一家之人合父子夫婦兄弟長㓜言之利女貞以象占初九閑有家悔亡初九閑有家家道防之于初之象閑限之也悔亡占六二无攸遂在中饋貞吉六二无攸遂在中饋居家而盡婦道之象春秋大夫无遂事示不敢専也饋巨媿反食也祭祀飲食也貞吉占九三家人嗃嗃悔厲吉婦子嘻嘻終吝九三家人嗃嗃嚴厲而諠議之象嗃嗃呼洛呼學二反諠譟也鄭作熇焦熬貎荀作確晁曰古文悔厲吉占有悔有厲然未為失也婦子嘻嘻歡笑无節之象嘻嘻喜悲反張作嬉陸作喜晁曰吉文終吝占六四富家大吉六四富家家道興隆之象九五王假有家勿恤吉九五王假有家人君能正其家之象假古雅反讀如王假之假大也勿恤吉占恤憂意也上九有孚威如終吉上九有孚威如信于一家而敬畏之象終吉占兑下離上睽小事吉初九悔亡䘮馬勿逐自復見惡人无咎九二遇主于巷无咎六三見輿曳其牛掣其人天且劓无初有終九四睽孤遇元夫交孚厲无咎六五悔亡厥宗噬膚徃何咎上九睽孤見豕負塗載鬼一車先張之弧後説之􅓡匪冦昬冓徃遇雨則吉艮下坎上蹇利西南不利東北利見大人貞吉初六徃蹇來譽六二王臣蹇蹇匪躬之故九三徃蹇來反六四徃蹇來連九五大蹇朋來上六徃蹇來碩吉利見大人坎下震上坎險在下震動上出有險難觧散之象故成卦曰觧解利西南无所徃其來復吉有攸徃夙吉解胡買胡賣二反物自散也利西南无所徃其來復吉有攸徃夙吉象在占中初六无咎初六无咎難已平之象象在占中九二田獲三狐得黄矢貞吉九二田獲三狐得黄矢貞吉驅除羣邪而得中直之象狐隂疑之獸黄中色矢言其直也貞吉占六三負且乘致冦至貞吝六三負且乘殖貨而載挈於道路之象負背挈之也乘車載之也乘去聲致冦至貞吝占九四解而拇朋至斯孚九四解而拇除去比傅小人之象而爾也拇音義同咸初六朋至斯孚占朋類之至斯相孚矣六五君子唯有解吉有孚于小人六五君子唯有解除難而不窮治之象唯王作維一經无用此字者唯維系之維乃用之吉有孚于小人占上六公用射隼于髙墉之上獲之无不利上六公用射隼于髙墉之上乘勢之順而盡去蹇難之象射食亦反上去聲公諸侯之為三公者獲之无不利占兑下艮上卦本乾坤純體今損乾之九三徃坤之上成艮以坤之上六來乾之三為兌故兌下艮上成卦曰損損有孚元吉无咎可貞利有攸徃曷之用二簋可用享損減省也有孚元吉无咎可貞利有攸徃此彖先占後象凡有所損有孚于人盡善而无失然後无咎而可貞固守之以此所損而徃為利也徃謂損而又損也若非有孚元吉則有咎而不可貞不利徃矣以此見損之難行人情之所不樂也曷之用審其所當用之辭二簋可用以奉上言禮在所損如此簋古軌享古亨並蜀才本初九㠯事遄徃无咎酌損之初九㠯事遄徃无咎占在象先㠯今以訛作己虞作祀皆非遄市専反速也詩所謂式遄其歸以所損之事速徃于四則无愆期之咎六四正應在上所益者也酌損之量其所損淺深之象盖以所損之事遄徃于四故四不咎之而為之酌其所損无太過傷廉也九二利貞征凶弗損益之九二利貞征凶占在象先弗損益之不可減而可増之象六三三人行則損一人一人行則得其友六三三人行則損一人一人行則得其友有餘則損不足則益之象以象占六四損其疾使遄有喜无咎六四損其疾去其害己使遄有喜无咎占疾己者損則益己者至必速矣故有喜而无咎疾者不損則為咎矣喜去聲六五或益之十朋之龜弗克違元吉六五或益之十朋之龜非所期而或益之厚之之象或者非所期之辭雙貝曰朋元龜直二十大貝故曰十朋弗克違元吉占違辭也欲辭而不獲也上九弗損益之无咎貞吉利有攸徃得臣无家上九弗損益之象同九二无咎貞吉利有攸徃得臣无家占弗損而益故无咎得其正而吉故利有所徃得為臣故忘其家震下巽上乾坤純體今損乾之四為六成巽益坤之初為九成震是益下之不足也故震下巽上成卦曰益益利有攸徃利涉大川益増長𢎞裕之名利有攸徃利渉大川象在占中徃謂益而又加益也初九利用為大作元吉无咎初九利用為大作元吉无咎象在占中大作大事也六二或益之十朋之龜弗克違永貞吉王用亨于帝吉六二或益之十朋之龜弗克違象同損五永貞吉王用亨于帝吉占六三益之用凶事无咎有孚中行告公用圭六三益之用凶事以凶荒振恤之象益益下也凶事荒札之政也无咎有孚中行告公用圭占中行義見泰九二公公上謂君也用圭以告于上表其成功之信也六四中行告公從利用為依遷國六四中行告公從利用為依遷國象在占中以中道告于公上從之然後用以依形勢以遷國都乃利也九五有孚惠心勿問元吉有孚惠我徳九五有孚惠心所益有信而在人心之象惠讀如惠而不費之惠言有益也勿問元吉占有孚惠我徳信在人心而有所懷之象謂以我徳為惠也上九莫益之或擊之立心勿恒凶上九莫益之或擊之无相與而有相攻之象謂下之人莫有益之者而乃或有擊之者也立心勿恒凶占立心不可以此為恒凶之道也説者謂立心無恒與象不合乾下兑上兊一隂在上合乾五陽決去之故乾下兊上成卦曰夬夬揚于王庭孚號有厲告自邑不利即戎利有攸徃夬古快反決也揚于王庭孚號有厲告自邑不利即戎利有攸徃象在占中揚播也王庭王者之庭百官所在之處號號令告布告也邑上六之都邑即從戎兵也言衆君子之去一小人必揚于王庭信其號令謂有危事告自其所居邑以與衆棄之然不利于從兵特利于有所徃合衆力以去一小人不可但已也初九壯于前止徃不勝為咎初九壯于前止健于上進之象止今趾前一止始于行者也徃不勝為咎占未有咎也恐徃而不勝耳九二惕號莫夜有戎勿恤九二惕號即彖孚號有厲之象惕義音見乾九三號號令之號莫夜有戎勿恤占莫今俗加日為暮非戎冦兵也恤憂念也勿恤言不能為害九三壯于頄有凶君子夬夬獨行遇雨若濡有愠无咎九三壯于頄剛强形於顔面之象頄或作仇非顴也或聲龜或作顇雖據切有凶占也君子夬夬獨行遇雨違衆而私交之象夬夬不一之辭謂衆君子決之而已獨與之遇而和也隂陽和而成雨若濡有愠无咎占若為雨所沾濡而有衆君子之愠然而无咎濡聲儒愠含怒貌九四臀无膚其行次且牽羊悔亡聞言不信九四臀无膚其行次且坐不安行不進之象臀徒昆反次且今趑趄次或作趑􅯓且或作趄跙皆後人轉注程可久曰一行一却也牽羊悔亡聞言不信占牽連乾之三陽程正叔曰羊者羣行之物牽者挽拽之義朱子曰筮者能聞言而信則轉凶而吉也九五莧陸夬夬中行无咎九五莧陸夬夬失其剛決之象陸或作睦竝未詳虞曰莧蕢陸商陸也荀曰皆葉柔根堅莧根小陸根大朱子發曰陸有赤白二種朱子曰莧馬齒莧陸章桞皆澤草也中行无咎占中行義同泰上六无號終有凶上六无號終有凶象在占中言雖无號終不免凶也巽下乾上乾三陽巽二陽共五陽而下一隂遇之故巽下乾上成卦曰遘遘女壯勿用取遘遇也亦昏冓也以女遇男為象王註易改為今文為姤雜卦猶是本文鄭本同女壯象言隂浸而長也勿用取占取今娶或者從今文𫝊者遂以古文分作二字為取女京曰誤増女字都曰言勿用此義以取也初六系于金柅貞吉有攸徃見凶羸豕孚蹢躅初六系于金柅隂制於陽之象系今繫柅乃履反止也絡絲趺也青齊間謂之柅鼂作檷王子雍作柅子夏作鑈皆因字轉注也以金為之則凝重不摇金者鐵也或謂止車之木初六之柔无車象貞吉有攸徃見凶占李仲永曰見與蒙六三見金夫之見同謂九四正應也羸豕孚蹢躅以象占羸如大壯羸其角之義陸讀為纍是也蹢治益反一作躑􅤲躅直録反古􅤳一作䠱踴躍也俗謂跳躑孚謂孚于所應九二包有魚无咎不利賔九二包有魚一隂受制之象包今苞易中並同或作庖胞非凡陽奄隂謂之包无咎不利賔占九三臀无膚其行次且厲无大咎九三臀无膚其行次且象音義並同夬九四厲无大咎占九四包无魚起凶九四包无魚失其所應之象包同九二起凶占起動作也九五以杞包瓜含章有隕自天九五以杞包瓜含章上下交相遇之象義見輯傳祀梓屬此言其葉闊大可包物瓜或作甜瓜或謂枸杞杞桞匏瓜恐非章外見之物含奄蔵也有隕自天占隕墜也上九遘其角吝无咎上九遘其角上窮而无所遇之象角首之上也見晉上九後並同吝无咎占
