body:
  text: 厚齊易學卷三十六宋馮椅撰易外傳第四彖下贊萃至未濟萃聚也順以說剛中而應故聚也王假有廟致孝享也利見大人亨聚以正也用大牲吉利有攸往順天命也觀其所聚而天地萬物之情可見矣萃志卦聚也順以說剛中而應故聚也以卦性二五明卦義下順以說乎上上剛中以應乎下故天下之心歸之所以聚於一人王假有廟致孝享也萬物之萃故致其孝以享廟如冬之蒸之類利見大人亨聚以正也以九五明大人居正位行正道以聚民故利於見之得其亨通用大牲吉利有攸往順天命也萬物之聚此天意也用盛禮舉大事所以順天休命觀其所聚而天地萬物之情可見矣推廣卦義天地萬物之情皆以相聚為樂柔以時升巽而順剛中而應是以大亨用見大人勿恤有慶也南征吉志行也缺志卦柔以時升以四隂明卦義初六之柔在下而坤柔在上蓋時乎如此耿晞道曰柔非升物其升也時焉而已張舜元曰剛本在上有時而降柔本在下有時而升劉氏曰言臣之升也巽而順剛中而應是以大亨以卦性二五明卦象柔以時升本謂四隂也今以內巽而順隂剛中而應柔則所謂元亨者乃隂柔升而陽剛與之俱升而亨也故孔子變文曰大謂陽也李子思曰唯剛有應而得以上亨然後足以濟在上之柔而辦天下之大事建大功興大利也用見大人勿恤有慶也以二五明卦占南征吉志行也言剛之志上行也林黃中曰以二配五是謂有慶以二升五是謂志行困剛掩也險以說困而不失其所亨其唯君子乎貞大人吉以剛中也有言不信尚口乃窮也困志卦剛掩也以卦畫明卦義詳見輯傳險以說困而不失其所亨其唯君子乎以卦性卦變明卦象內遇險難而外悅人情所以身困而道亨也此以二卦之性言也不失其所謂乾之上九下為九二而陷險坤之六二上為上六而掩剛唯九五居君位為困之主無所變易是謂不失其所陽剛有應有輔是以亨也陽剛君子之道也惟君子能處有道巽乎水而上水井改邑不改井乃以剛中也無喪無得往來井井井養而不窮也汔至亦未繘井未有功也羸其瓶是以凶也缺志卦巽乎水而上水井以二體明卦義上上聲巽下入乎水而上之汲井之象也改邑不改井乃以剛中也以坎中一爻明卦象自困下反上邑改而井不改以剛居卦之中位也無喪無得往來井井井養而不窮也謂養物而不窮往者來者皆汲此一井也此文舊無經文而贅在卦義下朱子發正之汔至亦未繘井未有功也井以上出為功羸其瓶是以凶也革澤火相息二女同居其志不相得曰革已日乃孚革而信之文明以說大亨以正革而當其悔乃亡革志卦澤火相息以卦象明卦義兌澤離火息今熄滅也澤舊作水鼂以道正之蓋坎水兌澤各分卦象也二女同居其志不相得曰革兌少女離中女也朱子曰火然則澤水乾澤水決則火滅劉長民曰中女思嫁反居在內而後故不謂之行而止曰不相得也已日乃孚革而信之革於旬日之後人情乃相孚信之指臣民言之蘇氏曰不信於革之日而信於已革之日林黃中曰非也革令而人不信則令有不從不從而彊革之亂之本也文明以說大亨以正以卦德明卦象占趙氏曰內明則見理必盡外說則無咈於人情劉氏仲平曰易有舉二體之義者義不在於爻也有舉六爻之材者二體不足以獲卦之義也革之二五剛中而應不言之者以澤火相息也革而當其悔乃亡如上所云則革而當理也陸希聲曰有此德則可以革既革而悔亡天地革而四時成湯武革命順乎天而應乎人革之時大矣哉以三才推廣卦義而贊之也上六澤初九火天地革也中四爻四時也湯武應九五上順上六天也下應六二人也李氏曰夏革春而陽事畢冬革秋而隂事畢時變繫焉湯革夏而為商武革商而為周天命繫焉都曰革陽以隂革隂以陽天地然也所以四時成而人信之鼎象也以木巽火亨飪也聖人亨以享上帝而大亨以養聖賢鼎象也以卦義就志卦六十四卦皆象而鼎獨言象正義胡翼之皆曰鑄金為之而有法象者也以木巽火亨飪也聖人亨以亨上帝而大亨以養聖賢以卦象推廣卦義亨古享今烹煮物也卦內同飪入甚反熟物也上去聲養去聲木下巽火則為燔燎巽火而後成鼎之亨飪耿晞道曰巽乎水而上水者非井也井之汲引之用也以木巽火者非鼎也鼎之亨飪之用也朱子發曰乾為天在上為帝指上九也在下為聖賢指二三四也然則六五用鼎之主也巽而耳目聰明柔進而上行得中而應乎剛是以元亨以卦才卦變明卦象占經文元吉亨此曰元亨說見經注李季辨曰下巽上離離為目五為鼎耳故曰巽而耳目聰明震亨震來虩虩恐致福也笑言啞啞後有則也震驚百里驚逺而懼邇也不喪匕鬯出可以守宗廟社稷以為祭主也震亨卦象皆無說震來虩虩恐致福也虩虩恐懼貌言恐懼乃致福也笑言啞啞後有則也前遇震來虩虩恐懼其則不逺後亦如之故可笑言而不敢出聲也震驚百里驚逺而懼邇也主五六而言初逺四邇逺者驚其不測近者懼其可畏也不喪七鬯徐氏王昭素諸儒皆云脫此句今補之出先儒云衍文鬯之訛也可以守宗廟社稷以為祭主也匕鬯用之於宗廟社稷祭主猶舜使之主祭之謂李子思曰易以乾為人君之象震為太子之象故二卦不可泛論以他事竊謂震為長子主器乃孔子之意經未嘗専指也艮止也時止則止時行則行動靜不失其時其道光明艮其止止其所也艮志卦止也明卦義先儒曰節亦止也節而止之也大壯則止不可過也艮止則自然之性也時止則止時行則行動靜不失其時其道光明推廣卦義時止九三之象也時行則行上卦之象也動謂行靜謂止時謂當其可也馮氏曰一於止如木石之無情豈理也哉行止時焉而已故六爻皆取止不廢動動不廢止為義李子思曰艮後鄰坎與物俱息時止也艮前接震與物俱作時行也夏曰連山言山氣之連屬也又曰艮其背止也行其庭行也如其燕坐拱默自縳於枯寂之中而一意於靜是亦無取耿睎道曰揚子謂日有光月有明然則動不失時故其道光靜不失時故其道明朱子曰明者光之質光者明之用艮其止止其所也艮其背古作北今以下有止字𫝊訛也說見鼂以道止其所也止得其所謂背也都聖與曰上者陽之所下者隂之所隂下而陽上隂陽各得其所而止此艮之所以為止也張敬夫曰人生而靜天則也事事物物莫不有自然之則非待造而成者若父慈子孝之類是也上下敵應不相與也是以不獲其身行其庭不見其人無咎也以六爻明卦象占上下定體謂上下卦也其上下爻相應者乃相為敵蓋隂陽各止其所無相與之情也劉氏仲平曰八卦六爻皆不相應而獨言於艮何也巽則上下皆志於巽震則上下皆志於動離之同於文明坎之同於出險是皆志同而相與者也若夫艮則上下各止而不相為應非敵而何漸漸進也女歸吉也止而巽動不窮也進得位往有功也進以正可以正邦也其位剛得中也漸志卦漸進也明卦義舊作漸之進蓋古凡二字則次一字作二𫝊者以意改作之朱子林黃中皆曰漸進也今從之都聖與曰一氣不頓進則漸而浸長一形不頓虧以漸而浸消女歸吉衍文以簡脫差誤遂增此四字成文止而巽動不窮也以卦性明卦義止則不驟巽則不止故其動以漸而不窮此兩句舊在剛得中也之下今正之進得位往有功也以六四明占六自三進四為得位往自內之外也謂女歸也有功謂吉也進以正可以正邦也其位剛得中也以四五兩爻明卦象正謂貞也六自三進四位得其正是進以正也因九六進退而二五自正初上雖不得位而剛上柔下得剛柔之正是正邦也邦亦天下邦國也其謂九五為卦之主以九居五位為剛得中亦利貞之義然則所謂利貞者合九五六四言之不専主六四也歸妹天地之大義也天地不交而萬物不興歸妹人之終始也說以動所歸妹也征凶位不當也無攸利柔乘剛也歸妹志卦天地之大義也天地不交而萬物不興歸妹人之終始也此明卦義男女配合猶天地也天地交而為泰此其義之大者蘭惠卿曰泰坤上乾下為天地交而萬物通歸妹泰之三四易位男上女下故曰天地不交而萬物不興女子之嫁女道終於此母道始於此故曰人之終始竊謂三四中二位人道也四為上卦之始三為下卦之終故有人道終始之象說以動所歸妹也以卦性明卦義李仲永曰因妹說之於內長兄為嫁之於外是說以動也蘇子瞻曰其所歸者妹也征凶位不當也無攸利柔乘剛也以九六互居三四明卦占九自三征四則位不當而凶六自四來三則乘剛而無所利位不當則不安其居乘剛則反夫婦之正豐大也明以動故豐王假之尚大也勿憂宜日中宜照天下也豐志卦大也以震明卦義一陽用事故大明以動故豐林黃中曰豐當作亨釋亨義以卦性明卦象郭子和曰噬嗑與豐皆明動之卦噬嗑先動而求明得明而後可亨豐已明而後動則不期而自亨矣王假之尚大也王者所尚乎大之而亨勿憂宜日中宜照天下也宜如日中之照天下則勿憂其大之難遍矣離在下卦故曰宜照天下日中則昃月盈則食天地盈虛與時消息而況于人乎況于鬼神乎以卦變推廣卦占昃說見離食俗作蝕虧也又月食必於望日中則昃觀離九三可知月盈則食謂上卦也下卦晝上卦夜此卦變離之上九成六上卦之離為月之昱夜今闕上九食之象也陽盈隂虛卦本乾下坤上乾之九自二往四坤之六自四來二則乾中虛而坤下盈天地盈虛之象也然所盈所虛者一爻也則天非虛地非盈也天始消而將虛地始息而將盈也六二在下卦人位人也九四在上卦隂位鬼也爻陽神也李子思曰明動而得其中是之謂宜毛伯玉曰豐大也亦盈也唯有道闕然若不足未嘗中故不昃未嘗盈故不食日新則為大反則為盈知日中之宜則知昃之可戒矣朱子發曰消者必虛息者必盈天地之所不能違者時也而况天地之間聚而為人散而為鬼神乎林黃中曰豐之患患在下情不得上達上情不得下通宜如日之中不宜鄣蔽其明如蔀沫也李季辨曰極敝大壞之形常出於豐亨豫大之後天地盈虛與時消息此理也天地如之人與鬼神安得而違也彖言日中故贊發此意以為後世習治者之戒旅小亨柔得中乎外而順乎剛止而麗乎明是以小亨旅貞吉也旅之時義大矣哉旅小亨柔得中乎外而順乎剛以六五明卦義卦象成卦以坤之六自三之五成離為卦之主得中於外卦而順乎上九之剛外取旅義柔得中順剛隂小所以亨也柔順處旅之道止而麗乎明是以小亨旅三字衍貞吉也以九三並卦性明卦占九自乾之五來三止而得位貞也止乎下而上麗乎明亦旅之所以為吉旅之時義大矣哉推廣卦義蘭惠卿曰孔子恐後世以為旅之道微小所以發揚其至大之意李氏曰適旅之時動得其宜其義大矣朱子發曰旅之時不一而義者時措之宜程正叔曰旅為難處故稱其時義之大重巽以申命剛巽乎中正而志行柔皆順乎剛是以小亨利有攸往利見大人缺志卦重巽以申命明卦義林黃中曰重去聲再也舊讀平聲非風者天之號令故為命令之象巽順以入之也再因巽道以申其命令欲其丁寧也申亦再覆之義剛巽乎中正而志行柔皆順乎剛是以小亨利有攸往利見大人以二五初四四爻明卦象占陽下就隂為巽隂上從陽為順志行者二五之志得行於下申命行事是也順乎剛者初四之柔皆順乎上所倡而應也成卦以隂為主故小得亨通於上利往於上利見上之大人也兌說也剛中而柔外說以利貞是以順乎天而應乎人說以先民民忘其勞說以犯難民忘其死說之大民勸矣哉兌志卦說也明卦義說今悅凡十翼皆同程正叔曰二隂居陽之上隂說於陽而為陽所說郭子和曰兌非有意於說人亦非有意於求說天下有說之道在上者不違是道以臨人在下者得其志而自說耳使有心於其間非兌也剛中而柔外說以利貞是以順乎天而應乎人以六爻明卦象占剛中二五柔外三上也順天應人亨也以二隂在上之卦言之九自三之五順天也六自五來三應人也三人位程可久曰以柔外接物故亨以剛中處已故利貞不言亨應乎人則亨可知朱子曰剛中故說而亨柔外故利於貞蓋說有亨道而其妄說不可以不戒又柔外故說亨剛中故利貞亦一義也程正叔曰說而能貞是以上順天理下應人心李去非曰世固有小人文為圓外方內之說者循習以失正則陷於脅肩諂笑脂而澤之不勝其為柔矣此偏于說之害也聖人發利貞之戒所以防之者切矣彼小人惡得借以自文哉說以先民民忘其勞說以犯難民忘其死說之大民勸矣哉以九五六三往來推廣卦義先難並去聲九自三往五成兌上六隂民也五在上先故曰說以先民六自五避九米三勞也而忘之九自三直犯居位難也九居五則三忘矣故曰忘其死爻為來兑凶謂是也鄭少梅曰忘死言犯難則知忘勞之為服役矣忘勞言先民則知忘死之先說矣然則說之所以為大者不特使之忘勞忘死而尤在於使之相勸而忘勞死焉所謂民勸者蓋父詔其子兄語其弟妻勉其夫朋友亦以是相責也李泰發曰民至相勸以從上之令何事而不可成聖人所以大之也渙亨剛來而不窮柔得位乎外而上同王假有廟王乃在中也利涉大川乘木有功也渙亨就彖辭不復志卦剛來而不窮柔得位乎外而上同以二四往來明卦義不窮上同明亨剛柔不窮即需剛健不陷義不困窮之象盧氏曰此本否卦乾之九四來居坤中成坎水流而不窮也坤之六二上升乾四柔得位乎外承五貴主與上同也薛氏曰二以身入險四則輔君任事上下同志厥事乃濟王假有廟王乃在中也以九五明之王九五在廟之中言祭祀也利涉大川乘木有功也以卦象明之孰乘之王者也有功則利不釋利貞疑有闕文節亨剛柔分而剛得中苦節不可貞其道窮也說以行險當位以節中正以通節亨就象志卦剛柔分而剛得中以爻畫明卦義九五明卦象剛柔分謂乾本純剛坤本純柔則剛柔無節剛不得中則節苦而不亨今坤分五之六以來三節乾之剛乾亦分三之剛以往五節坤之柔是以謂之節也向也五以柔居中則不能節節所以止其過非剛不可而剛常患於太過今剛當大君之位而得中則無過節之苦斯可以通行於天下矣苦節不可貞其道窮也以上六明卦占上窮也說見輯傳并本爻說以行險當位以節中正以通又以卦性二五覆釋卦象兌說坎險也當位當五位中正二五同德也遇險則止險有止義節止也通同也以人情之所說而行節止之制又當大君之位以行節止之權又與臣下同德節以中正之道此節之所以亨也天地節而四時成節以制度不傷財不害民以三極推廣卦義天地節前所謂坤節乾乾節坤也四時下乾上坤各二爻不動乾陽成春夏坤隂成秋冬也節以制度以坎節兌坎為法律之象也陽富為財隂貧為民隂陽雖相節而三隂三陽仍在陽不傷隂不害也郭子和曰剛節柔柔節剛天地節也剛節柔猶冬之有春柔節剛猶夏之有秋四時成也李氏元達曰不傷財則用之有式不害民則取之有制耿睎道程可久同張舜元曰節之道同於天地合於民情朱子曰四時乃自然之節非有以使之然也聖人則因其自然之節而節之中孚柔在內而剛得中說而巽孚乃化邦也豚魚吉信及豚魚也利涉大川乘木舟虛也中孚以利貞乃應乎天也中孚柔在內而剛得中也柔在內六三六四也剛得中九二九五也柔在內中虛之象中虛則生信信者孚之德剛得中則中實實者孚之本說而巽孚乃化邦也上以巽行之下以說從之所以孚也利涉大川乘木舟虛也舟中虛則利涉大川此贊意也澤有巨浸如震澤彭蠡者大川之象也巽為木為風木得風而行於澤上亦所以利涉要當參而觀之中孚以利貞乃應乎天也又以六四九五明卦占應去聲中孚六四也貞九五也五天位四應之應乎天也誠者天之道孚之正則應乎天不正則徇乎人而孚不足言矣小過小者過而亨也過以利貞與時行也柔得中是以小事吉也剛失位而不中是以不可大事也有飛鳥之象焉飛鳥遺之音不宜上宜下大吉上逆而下順也小過志卦小者過而亨也過以利貞與時行也即卦義以明卦象小者過而自亨又過以利其貞蓋與時行如此此小過之時故過利於貞如周公孔子之過皆以正也時當小小過越但不可失正耳柔得中是以小事吉也剛失位而不中是以不可大事也以中爻位明卦占小謂隂柔得二五之中故可小事而吉也大謂陽剛失二五之位而三四不中故不可大事而凶也有飛鳥之象焉程正叔曰此句不類贊體蓋解者之辭誤入贊中然亦無害理有飛鳥之象焉飛鳥遺之音不宜上宜下大吉上逆而下順也以逆順明卦象占數往者順知來者逆故比九五贊亦曰舍逆取順失前禽也鳥飛自下而往上則順自上而來下則逆蓋毛乘風而欲下則逆也鳥之飛而下者必盤旋卸風之勢也故不宜在上上不可窮極來下則逆宜在下下則可上其勢順也故吉既濟亨小者亨也利貞剛柔正而位當也初吉柔得中也終止則亂其道窮也既濟亨就志卦小者亨也以六二明卦象利貞剛柔正而位當也又以六爻明卦象坤之六五來二乾之九二往坤則六爻之剛柔正而各當其位謂利貞也初吉柔得中也以六二明卦占六自五來二得中內卦為初得位為吉終止則亂其道窮也又以九五明占九自二往五一正君而國定上下各止其位而無所為則不防患而亂之所起也外卦為終終則變變則不窮終止則不變而窮矣未濟亨柔得中也小狐汔濟未出中也濡其尾無攸利不續終也雖不當位剛柔應也未濟亨就志卦柔得中也以六五明卦象六自坤之五進得君位柔則未濟中則必亨小狐汔濟未出中也以初六明卦象未出險中明在險下濡其尾無攸利不續終也以初六明卦占卦以上為首初為尾則上反為始初反為終濡其尾是終陷於險之象其力不能繼也楊廷秀曰三陽失位而弱於材如狐之能濟而恨其小且弱也故幾濟而力不能舉其尾如事之幾成而敗材不能以畢其功也雖不當位剛柔應也又以六爻推廣卦義以六爻皆不當位故無攸利然剛柔皆應故亨厚齊易學卷三十六
