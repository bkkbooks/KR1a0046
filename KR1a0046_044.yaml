body:
  text: 厚齋易學卷四十四宋馮椅撰易外傳第十二説卦上二聖人有以見天下之賾而擬諸其形容句象其物宜是故謂之象見今現或讀如字下同賾仕責反象義當為像古通賾司馬君實曰精微之極致蘭惠卿曰藴奧難明也或作嘖聲同九家作册非形容猶曰狀貌也物宜物物所宜也象謂彖辭聖人有以見天下之動而觀其會通以行其典禮繫辭焉以斷其吉凶是故謂之爻會通司馬君實曰交衢也朱子曰會謂理之所聚而不可遺處通謂理之可行而無所礙處如庖丁解牛會則其族通則其虛也程可久曰在本爻為理之所會其變動為道之所通典禮常禮之有條貫者也或作等體非程可久曰常用之禮程正叔曰法度為物之則者也蘭惠卿曰法度以律之權其得失所謂出入以度內外者也斷丁亂反決也繫之以辭於逐爻之下以斷其吉凶所以謂之爻司馬君實曰爻者羣動之交也郭子和曰此作易聖人立爻象之初意也耿睎道曰無以見天下之賾於是立象象立則有以見天下之賾矣無以見天下之動於是生爻爻生則有以見天下之動矣林黃中曰擬諸其如是之形如是之容乃取諸物宜以象之象者像也觀其如是而會如是而通乃謂之典禮以行之又繫之以辭以斷其如是而吉如是而凶爻者效也竊謂至陽之形動而其容運行不息擬此形容而像其陽物之宜命卦曰乾而為天以象之至陰之形靜而其容方正不撓故擬此之形容而像其陰物之宜命名曰坤而為地以象之以至陰陽之雜而為六子八卦之重而為六十四卦皆可類而推也初上為事之本末二五為體之中正三四為上下之交則所謂會也七八九六以處其位遠近承乘以為其情位有當不當情有相得不相得所謂通也故觀乾之初九其龍為潛是所會未通也則斷之以勿用之辭而凶觀乾之九二其龍為見是所會之通則斷之以利見之辭而吉三百八十四爻皆可類而推也言天下之至賾而不可惡也言天下之至動而不可亂也惡烏路反朱子曰惡猶厭也象之所言如牝馬牝牛匪人女壯棟橈羸瓶之類若可惡矣然天下之至賾所在而不可惡也爻之所言如户庭無咎而門庭則凶弗遇過之而弗過遇之先號後笑而先笑後號若甚亂矣然天下之至動所關而不可亂也朱子發曰天下之至賾者理也天下之至動者時也擬之而後言議之而後動擬議以成其變化以言者尚其辭故君子之欲有所言必擬卦爻之辭而後言則言無妄發以動者尚其變故君子欲有所動必議卦爻之變而後動則動無過舉擬之議之而成其言動之變化如易之變化也張子厚曰擬之而後言議之而後動不越乎是而已耿睎道曰象為天下之至賾則君子宜擬象而後言爻為天下之至動則君子宜議爻而後動猶所謂居則觀其象而玩其辭動則觀其變而玩其占也郭子和曰擬議者用易之道蓋觀象玩辭所以反諸其身也然不曰用而曰擬議者爻象必先擬議而後可用必從其事物象類以探作易聖人之意是以必至於擬議而後可也古之君子以擬議學易之要務後世多略而不言或言之而復失擬議之道是以易終不用於世也朱子發曰剛柔相推而生變化者爻象之變化也擬議以成其變化者言動之變化也或曰君子曰言動聖人曰云為朱子曰觀象玩辭觀變玩占而法行之此下七爻則其例也鳴鶴在隂其子和之我有好爵吾與爾靡之中孚九二之辭音義並見本卦下後並同子曰君子居其室出其言善則千里之外應之况其邇者乎居其室出其言不善則千里之外違之况其邇者乎居其室在隂之義出其言鳴之義應去聲應之違之其子和之之義言出乎身加乎民行發乎邇見乎遠行去聲下同見今現此下推廣其義言行君子之樞機樞機之發榮辱之主也言行君子之所以動天地也可不慎乎引此爻以明擬易而後言也言有善不善則民之從違繫焉因兼言言動之所關如此之大則天地可動千里之外猶為未也是所當敬謹也按凡説卦所引不必文王本指特借易以明其説使人旁通曲暢以逹於事情知易之止為舉一隅也張子厚曰聖人之於書亦不欲併以一説盡慮人易知則不復研究故或在此説或在彼説要終必見但使學者潛心同人先號咷而後笑同人九五子曰君子之道或出或處或默或語言志在六二也五在外出也二在內處也九五竒畫閉口之象默也六二耦畫開口之象語也二人同心其利斷金鄭少梅曰乾九五之變則同乎離離六二之變則同乎乾二五居中心之象也言外不同而心同也斷上聲截假也利猶利其器之利卦本純乾為金六二間之有斷之之象同心之言其臭如蘭六二與五同心而形於言臭香氣蘭芬草離虛而臭逹於乾也此亦明擬易而後言初六藉用白茅無咎大過初六也初六二字疑衍子曰苟錯諸地而可矣藉之用茅何咎之有慎之至也此易本指錯今措夫茅之為物薄而用可重也愼斯術也以往其無所失矣此孔子發明議易而後動之新意然六經無術字唯孟子方言術記云營道同術亦後人之言此術字疑亦後人編類者以今語改古語也勞謙君子有終吉謙九三子曰勞而不伐有功而不德厚之至也名功曰勞誇功曰伐德有德色之德或作置鼂氏云古文德類置相亂卦唯一陽爻為有功勞之象退居下卦謙卑而不伐不德之象地厚而又有山厚之至也此易本指語以其功下人者也語下並去聲陽居陰下之象其指謙也德言盛禮言恭以德言之則為盛蓋艮崇高而藴諸內也以禮言之則為恭蓋坤卑順而形於外也謙也者致恭以存其位者也坤恭於外以存九三之位下卦之終易亡其位者也存其位即所謂有終也民之所歸為上所忌而居多凶之地非謙以終之則不能保其位矣此亦明議易而後動亢龍有悔乾上九子曰貴而無位高而無民賢人在下位而無輔是以動而有悔也説見乾文言亦明議易而後動不議之於易則動有悔矣大凡凶爻皆用靜則吉也不出户庭無咎節初九子曰亂之所生也則言語以為階猶階之自近至遠也君不密則失臣臣不密則失身幾事不密則害成二五君臣初身也畫皆竒而不耦不密之象幾平聲事之方來而未形其間必有不樂者使先知之則有害其成者矣是以君子愼密而不出也又明擬易而後言亦於經文外生出言語為階之意程可久曰兊為口舌當節之初有謹密之象前有坎之一陽塞之又有閉密之象子曰作易者其知盜乎易曰負且乘致寇至解六三負也者小人之事也乘也者君子之器也此不用易之本指但以負為負販乘為乘車小人而乘君子之器盜思奪之矣上慢下暴盜思伐之矣乘平聲以乘為慢以負為暴程正叔曰伐者聲其罪也上謂九四下謂九二慢藏暴橫也慢藏誨盜冶容誨淫易曰負且乘致冦至盜之招也藏去聲誨教之也起招盜之義或作悔非冶艷冶也古有此二語借以明致冦之義此又明議易而後動之戒右第六章天一地二天三地四天五地六天七地八天九地十此舊在夫易何為者也之首先君子嘗是正之後見胡翼之諸儒之説果合遂移置於此蘭惠卿曰言揲蓍布卦之功用本起於數也竒數陽屬天耦數陰屬地李氏曰竒耦相生至於十而五行之數備自一至五五行之生數也自六至十五行之成數也林黃中曰天一則地二天九則地十一竒一耦一生一成相與循環迭為終始四時所以行百物所以生易由此而作聖人用此而治天數五地數五上文是也五位相得而各有合謂天與地數相得而天地之數又各有合也朱子曰一與二以至九與十皆以類相得一與六至五與十各以兩相合又曰即所謂河圖者也其位一六居下二七居上三八居左四九居右五十居中五為衍母十為衍子一二三四為四象之位六七八九為四象之數漢志天一生水地以六成之地二生火天以七成之天三生木地以八成之地四生金天以九成之天五生土地以十成之此各有合也天數二十有五有同又下同二十有五積一三五七九也地數三十積二四六八十也凡天地之數五十有五此所以成變化而行鬼神也變化謂剛柔相推鬼神謂吉凶禍福成之行之者以此數也講義曰陽推隂則成變隂推陽則成化柴氏曰鬼神者吉凶悔吝感而遂通之謂也張子厚曰行鬼神之氣也氣之所至有吉有凶大衍之數五十舊為章首胡翼之諸儒知其脫簡而釐正之猶為未盡今次於此數有小衍有大衍小衍之數不可得聞矣或曰小衍衍其五大衍衍其五十小衍至五十而終大衍自五十而起意者文王未演卦生爻無七八九六之變則衍止於竒耦而已唯文王欲發揮於剛柔而生爻故爻有動有不動不動者不占而動者變也則占之故衍其七八九六之數而謂之大衍也孔子曰昔者聖人之作易也幽贊於神明而生蓍作易之聖人文王也然則用蓍以大衍者自文王始蓍之生百莖文王乃中分其半分卦揲扐以衍易則五十之數也故張舜文曰大衍之數五十者蓍數也五十有五天地之積數也五十者大衍之起數也其於天地之積數次五者或曰五行生數也或曰五十有五所宗者也所以不用也或曰河圖之數以五乘十也此皆因半蓍之用而推象數之理如此要之用蓍之本指則初不謂是其用四十有九數竒則圓而生變化數耦則方而不能相生矣故蓍之䇿五十止得用四十有九也其一不用象太極也毛伯玉曰歸扐之餘欲得七八九六之數也若盡五十則羡而不合矣分而為二以象兩以四十九䇿分於左右手為二以象兩儀挂一以象三挂卦買反或聲卦别也言别置一所也一一䇿也三三極也蓋於左右取一䇿則置之於小指間也蘭惠卿曰天地既分人位乎中必取左手之一者左屬陽天也天之所生為動物地之所生為植物人者動物故取天之所生以挂之毛伯玉曰欲三揲之餘數得四或八也若不挂一則乘除皆五不可變矣揲之以四以象四時揲時設反又思頰息列二反猶數也説文閲持也每四䇿為隊而數之數上聲歸竒于扐以象閏竒紀宜反零數也扐郎得反以䇿置之中指兩指之間也歸歸所揲零䇿也餘䇿則再分揲此十有八變之一也五歲再閏故再扐而後挂後去聲京云布卦第二變皆如前特不挂爾至第三變則又挂一然後揲故曰再扐而後挂以象再閏也三變而一爻成矣按大衍止以中分蓍之䇿起數以衍七八九六既於天地之數已次五矣又不用其一又或挂其一或不挂皆起數之例不得不然然皆法象於天地自然之數故天地全數欠五以象五行生數為物之宗不可用其用四十有九以下亦各有法象也後之作歷者見衍有四時再閏之象遂依倣易數以起歷蓋天地自然之數推之無不合也若乃以後天坎離震兊分主四時而乾坤下同諸卦以分布於六日七分之間則傅會之説矣毛伯玉曰扐從手挂一之所也以餘數合置其間故曰歸竒於扐五歲以再閏為率一揲以再扐為凖再扐者左右手所揲之餘也既併兩揲之餘歸于扐矣則取元挂之一升于次指以别之是之謂再扐而後挂第二第三變遞升而上非每變别挂也既畢三變則三變之竒與元挂之一分寄四指間了不相亂而餘䇿可見矣每揲之餘不四則八總三揲之餘三四者併挂一為十三則所存之䇿三十有六是四九之數也故九為老陽三八者併挂一為二十五則所存之䇿二十有四是四六之數也故六為老陰二八一四者併挂為二十一則所存之䇿二十八為四七也故七為少陽二四一八者併挂為十七則所存之䇿三十二為四八也故八為少陰郭子和專論䇿數而置餘數舉張程之説以破一行非也雖然爻之不用七八何也三揲為一爻猶三畫為一卦也乾坤之畫皆三竒三耦猶蓍數之三四而用九三八而用六九六變而七八不變易以變用筮以變占故七八不數也見之於書凡爻盡托於九六以示其可變使吉者無恃其吉而凶者求避其凶此聖人之深意也故曰易者變也按此説與注疏合但再扐而後挂為遞升於指間義為未安不若京君明布卦之説為差是當俟知者陰陽老少徇承襲之説亦未安也乾之䇿二百一十有六坤之䇿百四十有四凡三百有六十當期之日二篇之䇿萬有一千五百二十當萬物之數也䇿初革反亦作策當平聲如位不當之當期今期但以九六之數為乾坤之䇿而不取七八言與期之日其數相當也期尚有六日竒數古人但舉其大綱爾二篇説者以為經之上下篇總其䇿數如此疑指乾坤未詳其指也毛氏曰聖人以乾坤之䇿當期之日則六日七分之説漢儒穿鑿明甚此一節言大衍之數擬天地之數是故四營而成易營經營也四為分挂揲扐朱子曰易變也四營而成一變十有八變而成卦三變乃成一爻六爻成一卦則凡十有八變也八卦而小成先布八卦乃為小成再筮外卦所謂因而重之者也引而伸之觸類而長之天下之能事畢矣經凡伸作信此傳者易以今文也引八卦而伸為六十四卦也長上聲觸其卦之類而長之為六爻能事畢柴氏曰能事謂凡涉人為者皆不外出也郭子和曰重為六十四卦合為三百八十四爻為䇿萬有一千五百二十天地之間無不備矣此一節明揲蓍以求卦爻顯道神德行是故可與酬酢可與祐神矣行去聲酬市由反酢在洛反京作醋聲同賔主更相酌飲之名祐荀作侑助也六十四卦各有其道揲蓍布䇿其象乃見故曰顯道合六爻之象為卦德行分而為二莫知其數之多寡揲之以四莫知其爻之竒耦故曰神德行筮則告占則應故可與酬酢知鬼神之吉凶故可與侑神蘭惠卿曰顯道者自幽而至明所謂闡幽也神德行者自顯而入幽所謂微顯者也張子厚曰顯故可與酬酢神故可與侑神此一節明卦爻之用子曰知變化之道者其知神之所為乎大衍之數能成變化故知其道能行鬼神故知其所為此一節結上生下朱子曰皆非人之所能為故夫子嘆之而門人加子曰以别上文也右第七章易有聖人之道四焉聖人明僧紹作君子恐是正義曰易之為書有聖人所用之道者凡四焉毛氏曰是四者變化之凡也以言者尚其辭以動者尚其變以制器者尚其象以卜筮者尚其占以用也猶大象君子以之以陸氏云下三句無以字一本皆有尚貴之也言者所告之事也求諸易之言則有辭觀辭則知言之所指矣動者所舉之事也求諸易之動則有變觀變則知動之所之矣制器以利用求諸易之制器則有象觀象則器之理制在其中矣卜筮以占事求諸易之卜筮則有占觀占則筮之吉凶在其中矣制器者如十三卦與鼎井是也卜者龜而非易也兼言之者卜筮乃一體事猶曰莫大乎蓍龜也占者吉凶悔吝利不利無咎之類代占者而推休咎也古者龜易皆無辭故有官占三人占則從二人之言文王作易而易之占在書矣蘭惠卿曰前章所謂君子居則觀其象而玩其辭動則觀其變而玩其占是也王景孟曰凡此無非神之所為也故聖人尚焉此一節總言辭變象占是以君子將有為也將有行也問焉而以言其受命也如嚮問易而言其所為所行之事則易受人之命有以告之如嚮之應聲也朱子曰命者將筮而告蓍之語冠禮筮日宰自右贊命是也此明言辭也無有逺近幽深遂知來物逺近定體言所為之事所行之方無有逺近幽深也物事之總名來方來之吉凶也李仲永曰如響言答之速遂知言知之速也此明筮占也非天下之至精其孰能與于此與去聲後同張子厚曰言易之為辭至精者乃聖人窮理極盡精微也此一節明辭與占參伍以變錯綜其數此言揲蓍之法也參謂分二挂一也伍猶隊伍謂揲之以四也變謂十有八變而成卦也錯雜四十有九之數而揲之以綜之於扐也參伍錯綜皆古語參倉含反考工記云罄折以參伍荀卿曰窺敵制變欲伍以象參韓非曰偶參伍之驗以責陳言之實又曰參之以比物伍之以合參史記曰必參而伍之又曰參伍不失漢書曰參伍其賈以類相凖錯綜者取象於織錯者交而互之之謂也綜者總而挈之之謂也借此四字以明揲蓍之法通其變遂成天地之文地諸本多作下通猶通乎晝夜之道之通文者九六周流六位之謂兼該參伍之所變也極其數遂定天下之象數所綜之數象卦之象也非天下之至變其孰能與于此此一節明變與象易無思也無為也寂然不動感而遂通天下之故寂然者不動之貌隨人之筮而感之即通其故無不報應者非天下之至神其孰能與于此至神能知來也此一節總言四者神之所為如此夫易聖人之所以極深而研幾也聖人指文王窮極至理之深研究方來之幾幾平聲後同唯深也故能通天下之志志謂言與筮之所志也通感而遂通之通唯幾也故能成天下之務務謂動與制器之所務也唯神也故不疾而速不行而至速謂受命如響遂知來物感而遂通天下之故之類至謂無有逺近幽深成文定象之類申言神之所為子曰易有聖人之道四焉者此之謂也此門人申孔子之言以結之恐其説之難明而人不悟也故知説卦三篇成於孔子之門人與文言同右第八章申前章言神未盡之意而以辭變象占明之即所謂變化之道而神之所為者也子曰夫易何為者也夫易開物成務冒天下之道如斯而已者也夫聲扶下同一本者也下無夫易二字開一作闓造端也物事物也程可久曰開物者肇其始成務者究其終冒莫報反司馬君實曰包而有之天下之道凡所由行者易皆冒之開其物成其務故曰如斯而已竭盡無餘藴之辭也郭子和曰凡天下之道無不具於其中此一節總言其端耿睎道曰蓍卦爻三者易之所以開物成務冒天下之道者也是故聖人以通天下之志以易通逹天下之人其志之所欲為者蓋易有開物之道故也以定天下之業以易定天下之人所作之事業蓋易有成務之道故也以斷天下之疑斷丁亂反決也以易決斷天下之人其心之所疑者蓋易冒天下之道故也郭子和曰孔子言易必繼以聖人用易以見聖人凡有為有行無適而非易也張舜文曰開物成務以定天下之業則吉凶生矣有吉有凶則天下之人不能無疑疑則業不可定於是有卜筮以通志定業斷疑也此一節應上生下言生蓍立卦生爻之事蓍圓而神故能通天下之志而開物卦方以知故能定天下之業而成務爻易以貢故能斷天下之疑而道無不包也是故蓍之德員而神員今圓蓍無定數故曰員神謂知來物也卦之德方以知知今智卦有定象故曰方知謂藏吉凶也六爻之義易以貢龔氏曰貢如貢賦之貢謂獻也猶書獻卜之謂注作告恐無所據爻無定位故曰易耿睎道曰道非數而蓍以數推道無象而卦以象告故蓍卦謂之德德猶常體爻言乎變者也故謂之義義則盡變聖人以此洗心退藏于密吉凶與民同患方其未作易之前聖人出而應世其憂患天下後世之心未嘗一日忘是故因蓍生卦因卦生爻因爻生義曉之以利害禍福詳之以逆順從違使天下後世得之于書者猶吾與之交口相付則天下求之于易而不復求之于我則吾心之所憂者可以盡洗退藏于密而聖人隱矣而聖人方且憂患與庶民皆同凡云為動作求之於筮龜此蘭毛二氏之説為得之也此一節應通志定業斷疑神以知來知以藏往張舜元曰吉凶之效可以數推吉凶之事可以象定其孰能與于此哉古之聰明睿知神武而不殺者夫與去聲其知由聰而明明而睿則非常人之所謂知也故能立卦以藏往其神雖武而不殺則非常人之所謂神也故能生蓍以知來王景孟曰夫謂之聰明睿知則卦之知非此聖人其孰能與之謂之神武不殺則蓍之神非此聖人其孰能與之耿睎道曰布昭聖武不免于殺者將以使人之知懼也今也神以知來則未然之祥見于其先知以藏往則已然之戒存乎其後豈待殺而後知懼哉此應蓍卦爻是以明于天之道而察于民之故是興神物以前民用故物謂蓍龜朱子曰明天道故知神物之可興察民用故知其用之不可不有以開其先也此申聖人以此洗心之意聖人以此齊戒以神明其德夫齊今齋齊戒致敬以筮蓍所以神明蓍之德所謂員而神者也朱子曰湛然純一之謂齊肅然警惕之謂戒楊廷秀曰尊敬其事之謂神發揮其義之謂明聖人所以擇建立卜筮人然後命之者以神明其德也又曰蓍者神物也卜者鬼謀也吾之一心能神明夫蓍之德則蓍亦神明而應之曰神明云者尊敬之也記曰其曰明器神明之也此之謂也此申吉凶與民同患之意是故闔户謂之坤闢户謂之乾李氏曰此又廣其所以為易也朱子曰先言坤者由靜而動也胡翼之曰凡物先藏而後出故先坤朱子發曰無靜則無動無闔則無闢此歸藏所以先坤與竊謂通乎晝夜之道而知凡日出為晝則户之闔者始闢一年之春亦自冬之閉藏而啓之一闔一闢謂之變往來不窮謂之通張舜元曰乾一闔而為坤坤一闢而為乾吕微仲曰大氣本一所以為陰陽者闔闢而已氣闢則發生氣闔則妝斂一體二用不可以二物分之見乃謂之象形乃謂之器見今現象自無而出有器成質而不變凡以體言之則謂之器以質言之則謂之材闔闢變皆然制而用之謂之法此聖人觀象因材制器也利用出入民咸用之謂之神或利於出而不利於入則出者利於用之入者不利而不用也利於入而不利於出則入者利於用之出者不利而不用也唯一出一入民咸利其用而用之有不知其所以然者此所以謂之神此一節明蓍易之前民用其道如此也郭子和曰變通最為易之要法説卦凡三致意焉近人而易曉者莫如户故以户之一物明之則天下萬物皆如此也所以為户二者以其闔也此即坤也闔則必闢此即乾也一闔則一闢一闢則一闔此即變也人之往來於户者不窮此即通也見於闔闢即户之象形於運動即户之器制而用此者法也利於用而民之出入莫不由此者所以為神也一户至末也猶必盡變通之法而後可用於天下然則治天下者可不如制一户之法使之變通可久乎黃林中曰蓍卦之德亦既神明則象無不顯數無不陳是故十有八變而皆陰則六畫皆耦是天地之闔而為夜是以謂之坤也十八變而皆陽則六畫皆竒是天地之闢而為晝是以謂之乾也一闔一闢則乾坤錯居故謂之變一往一來則闔闢不窮故謂之通見而在天則謂之象形而在地則謂之器像其象制其器故謂之法闔而入闢而出天下由之而不知則謂之神朱子曰闔闢動靜之機變通化育之功也見象形器生物之序也法者聖人修道之所為而神者百姓自然之日用也朱子發曰坤自夏至以一陰右行萬物從之而入故曰闔户乾自冬至以一陽左行萬物從之而出故曰闢户坤闔則陽變而陰乾闢則陰變而陽故謂之變闔者往闢者來往來相感其機不息故謂之通氣聚而有見故謂之象成而有形故謂之器利用此道以動靜出入而民咸日用莫知其然故謂之神七者同出而異名其變化之道神之所為乎毛伯玉曰凡此皆天地之靈而蓍卦之神也易之道極於神故必以神終之是故易有大極大今太此申言揲蓍之所法象者極曰太極者以天地萬物之理無先於此也楊中立曰極如屋極之極朱子曰以有形言之四方八靣輳合到此築底更無去處從此推出四方八靣都無向背一切停均故謂之極楊廷秀曰元氣渾淪陰陽未分是謂太極當是之時易之道已具故曰易有太極然非易能有太極亦非太極之能有易也易之未作易在太極之先易之既作易在八卦之內是生兩儀司馬君實曰儀匹也分而為二相為匹配劉長民曰不云天地者蓋以兩儀則二氣始分天地則形象斯著竊謂凡有物之先皆曰太極一物有一物之太極有太極則有物兩兩相配故曰兩儀天地特域中有物之大者也兩儀生四象在易則固有在矣在造化則兩儀陰陽也四象唯方外書言之極精謂乾坤坎離也乾南坤北上天下地之象離東坎西左日右月之象後言易有四象辭同指異或謂乾坤之四德或謂四時或謂七八九六或謂火水金木皆其象也猶太極兩儀之不拘於一定之説四象生八卦既有左右上下自有四維而震艮巽兊成矣八卦定吉凶吉凶生大業張子厚曰盡吉凶之理然後人謀作大業生此一節明神物之用申大衍之數也大衍易也其一不用易有太極也分為二是生兩儀也挂一歸竒而揲之以四生四象也故説者以為七八九六理或然也既有七八九六則陰陽可定而卦爻可畫生八卦也卦重而為六位剛柔雜居爻當不當吉凶生矣有吉凶則成敗得失之變相尋於無窮而人謀用矣故曰生大業朱子曰每一生二自然之理也畫卦揲蓍其序皆然周茂叔曰無極而太極太極動而生陽動極而靜靜而生陰靜極復動一動一靜互為其根分陰分陽兩儀立焉陽變陰合而生水火木金土五氣順布四時行焉楊中立曰太極無定位當處即是既有太極即有上下既有上下即有左右前後四方既有四方即有四維皆自然之理也王景孟曰易之為書不過示人以吉凶趨避之理而已矣唯聖人入乎吉凶之域故能立大功業於天下則聖人之大業即易之大業也故曰神而明之存乎其人楊廷秀曰大哉易書之事業乎下文即言法象莫大乎天地蓋乾坤之闔闢變通是也是故法象莫大乎天地觀象於天取法於地孰非法象然無有大於天地者下言莫大皆然變通莫大乎四時易之一闔一闢往來不窮無大於四時者縣象著明莫大乎日月縣今懸垂也天垂象星辰風雲孰非象者而著明無大於日月崇高莫大乎富貴聖人之大寶曰位此謂五有大君之位也六位以上五為天而上貴而無位高而無民唯位乎五則富有下四爻貴為天子故莫大於五也胡翼之曰言天地之道陰陽之理變通之事日月之明此後即以富貴而繼屬之者何也天地之道但能生成萬物不能生成天下之人是故君子有大才大德凡居崇高極盛之位代天理物能以仁義教化生成天下之人若無富貴之位則其功不能以及於天下也備物致用立成器以為天下利莫大乎聖人十三卦乃其凡也民生之物所不可闕者必備之用之所資者必致之又立成器以為天下之利用孰有大於包犧黃帝堯舜之數聖人者哉蓋莫非人也而為此以利天下者唯人之聖者能之探賾索隱鈎深致遠以定天下之吉凶成天下之亹亹者莫大乎蓍龜賾九家作册大陸作善皆非探平聲索色白反亹亡偉反猶勉勉也朱子曰疑故怠決故勉陸農師曰古以龜卜以蓍筮龜象也天産也蓍數也地産也傳曰上有叢蓍下有伏龜龜筮之相為用抑天理也程可久曰賾者含蓄而未發隱者藏伏而未形賾可探也而深者不可以探取必致曲以鉤之隱可索也而遠者不可以索得必順理以致之李仲永曰象賾而深以龜卜之則賾可探而可鉤也數隱而逺以蓍筮之則隱可索而逺可致矣耿氏曰如此則賾者吐隱者見深者出逺者至而吉凶之辨明若觀火天下之就吉者若渴去凶者若熱而亹亹以成也張舜元曰探賾索隱言乎象也鉤深致遠言乎數也定天下之吉凶決疑也成天下之亹亹者存乎人也言象數少異當俟知者毛伯玉曰筮以蓍不以龜每兼言之何也以類故也然龜從者有時而筮逆卜之不吉者筮之或從此洪範之所以有稽疑也此一節推廣吉凶之生大業而歸於蓍龜之神郭子和曰此章凡五是故蓋文義相屬也蘇子瞻曰天地日月四時天道也天道所不及富貴者制之富貴所不制聖人通之聖人所不通蓍龜決之是故天生神物聖人則之因蓍龜以言天實生之易乃則其象數用以為卜筮也天地變化聖人效之爻者效此者也天地之變化易以六爻剛柔相推而生變化以效之天垂象見吉凶聖人象之見今現日月星辰顯見垂象而有吉有凶聖人乃繫之以辭而明吉凶以象之河出圖洛出書聖人則之洛漢王火德避水改從佳作雒王子雍本圖書不可得詳但論語云鳳鳥不至河不出圖則古蓋有之不列於六經而不傳也今據漢以來諸儒所傳似有考者漢律歷志云伏羲畫八卦由數起而五行志劉歆言包羲氏繼天而王受河圖則而畫之八卦是也河圖九宫縱衡十五數即天地定位山澤通氣雷風相薄水火不相射之配蓋先天之易此包羲氏因而重之者也洛書止分五位即帝出乎震齊乎巽相見乎離致役乎坤説言乎兊戰乎乾勞乎坎成言乎艮之序蓋後天之易此文王所以定之者也河圖九南一北三東七西八東北而二西南六西北而四東南五隱於中對耦而分十數尊貴者得數多卑賤者得數少竒處四方耦處四隅包羲以畫八卦乾南而坤北則九與一也離東而坎西則坎七而離三也震東北得八而巽西南則二也艮西北得六而兊東南則四也蓋天數五地數五二五為十而陰陽分之此合先天之易也洛書一六在北水數也而坎居之二七在南火數也而離居之三八居東木數也而為震四九居西金數也而為兊五與十居中央土數也而虛其中火生土土生金故坤之土居西南離兊之維以應五木克土而土克水故艮之土居東北震坎之維以應十巽亦木也繫於震之終乾亦金也繫於兊之後蓋坎離水火以配天地南北故各一而不二金木土各二卦以為陰陽之配此合後天之易也故漢五行志曰河圖洛書相為經緯八卦九章相為表裏正謂此也夫禹得洛書而作洪範非異於易也文王恐後世以洛書與河圖對立而為二遂演其數以定後天之易先朝諸儒交互圖書之數而不能決斯義也唯蘭惠卿得之程可久曰有體可據者則之有物可見者象之有理可推者效之張舜元曰則神物而起數效變化而生爻象吉凶而繫辭則圖書而定卦朱子曰此四者聖人作易之由也耿睎道曰天地之數聖人生知極其數可以定天下之象矣不待見蓍龜而後知也然神物非常之物天生以示象數聖人何敢不則之言天地變化則不止乎四時也言天垂象則不止乎日月也蓋前言其莫大此言其該也夫神物變化垂象自兩儀定位則有之矣至於河圖洛書則有時焉孔子以河圖之出同鳳鳥之至豈非天之興易而有先至之符哉易有四象所以示也何氏曰上四者四象也謂神物變化天象圖書所以示天下也與兩儀所生之四象名同而指異繫辭焉所以告也告天下使知此卦此爻之時物定之以吉凶所以斷也繫辭而定其卦爻之吉凶所以決天下之疑也右第九章朱子曰此章言易之興專歸於卜筮子曰書不盡言言不盡意此上舊有大有上九一章諸儒疑脫簡當在中篇莫益之下今移之書者寫之於簡蓋有限也言則宣之於口故書不能盡意又無窮言亦有限故言亦不能盡也朱子曰有意而後有言有言而後有書書以記言而不能盡逹其言言以述意而不能盡逹其意使之觀象而意得則有不待言而盡者矣然則聖人之意其不可見乎聖人指文王子曰聖人立象以盡意設卦以盡情偽朱子曰兩子曰疑衍其一蓋子曰字皆後人所加故有此誤然有問則有答此自問而自答之辭物之情偽見於卦爻者也中篇云情偽相感而利害生即此所謂情偽也惟卦足以盡物之情偽故卦之象可以盡我之意此答言不盡意也擊辭焉以盡其言此併下文釋書不盡言故繫辭以盡之變而通之以盡利耿氏曰變動以利言故變通可以盡利亦謂言其變通之利也鼓之舞之以盡神鼓天下之動者存乎辭亦謂繫辭之言也鼓之舞之與成天下之亹亹者同意使人奔走於趨吉避凶之域而不自知也故曰盡神張子厚曰辭不鼓舞則不足以盡神神主於動天下之動皆神鼓之舞之也乾坤其易之緼邪緼紆粉反所藏蓄也朱子曰衣之著也猶緼袍之緼乾坤兩卦乃易之緼蓄朱子發曰爻象變動緼於其中乾坤成列而易立乎其中矣一陰一陽對列成立則變易立乎陰陽之中乾坤毁則無以見易無陰陽則變化無自而形則亦無易矣易不可見則乾坤或幾乎息矣易非無也有易之理而無乾坤則不可得見也或之者疑之也蓋易未嘗無乾坤未嘗息設使卦不畫則易不可見則乾坤之變化亦幾乎息幾平聲近也非真息也息今熄滅也朱子曰易之所緼陰陽而已凡陽皆乾凡隂皆坤畫卦定位則二者成列而易之體立矣乾坤毁謂卦畫不一乾坤息謂變化不行郭子和曰乾坤有體而易無體有體則成毁從之故乾坤言成列言毁易以無體託於乾坤故乾坤毁則易無以見矣明聖人不得不作易也林黃中曰六十二卦皆自乾坤而來成列云者獨乾獨坤則不成變化也乾坤之象天地也六十四卦之象萬物也有天地然後有萬物無天地安得有此萬物無此萬物又安用此天地蘭説同是故形而上者謂之道形而下者謂之器形謂形見非形影之形凡一事一物有形而下者必有形而上者上者其理下者其事物也理無體故謂之道事物有體故謂之器此言易與乾坤易無體其道也乾坤有體其器也乾坤謂七八九六之數形為竒耦之畫非謂乾坤之性也李氏曰以易言之易為道而乾坤即器也以象言之則至賾在道而物宜即器也以爻言之則至動在道而典禮即器也變通之用或起於乾坤者易道之行也或存乎爻象者書載乎道也化而裁之謂之變推而行之謂之通裁古財以今文改之因其化而裁制之使合於理此所謂變也推其變而施行之使宜於民此所謂通也不化則無變推不去則不通前章乾坤之變通易之自然之理也此章道器之變通作易之聖人之所以載於書者也下復言存乎變通之人朱子發曰以易道言之晝夜六時寒暑六氣剛柔六位因其化而裁之以著其變之微故謂之變晝夜相推為一日寒暑相推為一歲剛柔相推為一卦推之則通故謂之通郭子和曰大而天地細而萬物各具變通之理天地不變通則不能長且久人與物不變通則病且死矣故曰乾坤毁則無以見易謂乾坤不變通則雖成而毁也姑以人言之朝而作闢之道也暮而息闔之道也一作一息變也與日無窮通也竊謂聖人作易具在卦爻舉而錯之天下之民謂之事業錯今措化裁推行者化推乎道器也舉而措之者舉是變通而措之天下之民也此所謂事業也變通事業皆易之道器也化之推之舉之皆聖人作易之用也此一節言易之體用程伯淳曰謂之不可移謂字在之字上蓋一易也形而有器則為乾坤自乾坤闔闢以至成功則各有稱謂爾如此則曰道如此則曰器如此則曰變則曰通曰事業皆易也皆乾坤之所為也右第十章是故夫象聖人有以見天下之賾而擬諸其形容象其物宜是故謂之象聖人有以見天下之動而觀其會通以行其典禮繫辭焉以斷其吉凶是故謂之爻夫象二字衍郭本無音義見前章天下之賾道也物宜器也觀其動之會通以行典禮化而裁之推而行之者變通也道器寓於象變通寓於爻極天下之賾者存乎卦鼓天下之動者存乎辭此言聖人之用也易有象以見天下之賾聖人欲極其賾求之卦可也象具於卦之畫故也有爻以見天下之動聖人欲鼓天下之動求之辭可也爻具於辭之指故也耿睎道曰作易之聖人以言不盡意而立象以盡意所謂象者在於卦之中矣以書不盡言而繫辭以盡言所謂辭者在於爻之中矣鼓天下之動則進退遲速之有節若周之鼓人或鼓而進或鼓而退或鼓而馳或鼓而驟也化而裁之存乎變推而行之存乎通凡曰存乎云者皆存乎易也謂易之卦之辭之變之通人亦易之人也聖人體易以治世則於天下之事物如易之化而裁之推而行之當求之易之變通也神而明之存乎其人欲章明易道於天下使人由之而不知其所以然此必易中之人方可如包犧黃帝堯舜氏是也下此則如顔子之不逺復其殆庶幾乎默而成之不言而信存乎德行行去聲前言舉而錯之天下之民者也此言其人之以易成已存乎德於已而踐履之者也默不言也成乎已故信於民林黃中曰弗躬弗親庶民弗信故必默成乎德行則不言而信耿氏曰卦之有象聖人將以盡意也即此神而明之則存乎其人神而明之則忘象矣爻之有辭聖人將以盡言也即此默而成之不言而信則存乎德行不言而信則忘言矣司馬君實曰卦爻所以變通者在人人之所以能神而明之者在德毛伯玉曰乾坤之變通錯之事業求之易之書可也道器之變通存乎其人舉其用而託之人也無是用不足以為易有是用而其人不足以用之非易之罪也前乎此黃帝堯舜氏其人也自今以往其人不可知也大哉神而明之乎此包犧氏所以不傳以書而傳之人也右第十一章言易之立象繫辭以明變通待其人而後行也厚齋易學卷四十四
