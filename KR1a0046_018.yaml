body:
  text: 厚齋易學卷十八宋馮椅撰易輯傳第十四經下篇咸恒艮下兑上咸贊曰咸感也柔上而剛下二氣感應以相與止而説男下女又曰天地感而萬物化生聖人感人心而天下和平觀其所感而天地萬物之情可見矣雜卦曰咸速也闗子明曰咸者天地之交也謂乾之上九下交于坤而為九三坤之六三上交于乾而為上六程正叔曰天地二物故二卦分為天地之道男女交合而成夫婦故咸與恒皆二體合為夫婦之義咸感也不曰感者咸有皆義男女交相感也君臣上下以至萬物皆有相感之道郭子和曰易卦六爻皆應者八卦泰否咸恒損益既濟未濟雖名義不同而為道皆大咸以感為義盖无所不感之謂咸毛伯玉曰春秋傳曰周公弔二叔之不咸鄭舜舉曰咸合也交也皆也和也所以明卦之義並行而不相悖也毛伯玉曰咸者和也所以感也所以感者心也故咸加心而為感我以其和而待其自感則可有意于感之則陋矣故感去心而為咸和不若合劉長民曰贊以感釋其義而卦以咸名者聖人之㣲旨欲明感物之无心也李子思曰有心則為感无心則為咸則知咸者无心之感也李季辨曰易无思也无為也寂然不動感而遂通天下之故有心于求感非易之道故去心而名卦以咸咸皆也无心于感者无所不感案咸者皆有此情之謂也故情之交孚謂之感感生於心者也謂咸无容私心於感則可謂无心則語猶未瑩以意逆之可也李子思曰説卦天地定位山澤通氣雷風相薄水火不相射此言太極肇分之初八卦各得其體也又曰水火相逮雷風不相悖山澤通氣然後能變化既成萬物此言太極既分之後六子各致其用也相薄者有貴于不相悖不相射者有貴於相逮其體有所不同而山澤之通氣固自若也夫山澤通氣其功用盖與乾坤等而咸一卦乃能具山澤通氣之象宜其列於下經之首也故上經之始于乾坤者天地定位也下經之始于咸者山澤通氣也然天地定位則分為乾坤二卦者位欲其分而有辨山澤通氣則合為咸一卦者氣欲其合而相通也程可乆曰艮兊二體獨立則相變並立則相應咸與損皆艮兊並而咸以陽下隂有交感之道卦之所以為咸也鮮于子駿曰乾之上九下居于三坤之六三上居於上故乾坤交感而男女之象成孫明復曰咸以二少恒以二長二少者感道貴速也張子厚曰感之道不一或以同而感聖人感人之心是也或以異而感男女是也二女同居則无感也感即合也右明卦義象贊曰山上有澤咸君子以虚受人右明卦用序卦曰離者麗也麗必有感故受之以咸咸者感也張敬夫曰有天地然後有男女故上篇首乾坤而終坎離有男女然後有夫婦故下篇次之以咸恒有夫婦然後有父子君臣故下篇終之以既濟未濟焉既濟者坎離之交而物有所成之謂也動静相生有无相禪隂陽之運萬物之生无有窮已故既濟之後復歸之以未濟李子思曰八卦者六十四卦之祖也聖人序卦以乾坤坎離列之于上經以震巽艮兊列之于下經所以更相經緯而示神易變化不測之用也然上篇始乾坤而終坎離則下篇亦當始震巽而終艮兊而乃始咸恒何也艮下兊上謂之咸巽下震上謂之恒二卦者乃艮兊震巽合而致用也震巽艮兊在上篇亦嘗合矣然頥也者陽與陽合大過則隂與隂合也陽自陽而隂自隂故非咸恒相交致用之比也易以用為主隂陽以交而致用此咸之所以先恒而為六十四卦之序也右明卦序亨利貞取女吉贊曰柔上而剛下二氣感應以相與止而説男下女是以亨利貞取女吉也程正叔曰物之相感則有亨通之理郭立之曰感而无不通是以亨耿睎道曰剛柔感應以相與則其氣交其情通此卦之所以為咸而咸之所以亨也閭丘逢辰曰感非其正則夫婦不以禮合君臣不以道合朋友不以義合終必致于睽離故曰亨利貞程可乆曰感物者无所待而亨然必待正而後利朱子發曰感有必通之理然不以正則失其亨而所為皆凶也案咸有亨義必利于貞不貞則所以感者皆人欲私情矣四徳无元者二少之卦也右明卦象胡翼之曰以少男取少女則人倫正而天地之義畢故咸之道為取女吉也女守正静男以禮下之則夫婦之道成如賢者懷道義君以禮下之則君臣之義行毛伯玉曰咸恒皆夫婦也柔上而剛下所以為感也男尊而女卑是以為恒也男女之相從必以其少長相當者為夫婦之正故既濟謂之定未濟謂之窮亦以夫婦言之又曰咸者取女之初故女猶在外恒者成家之後故女專職内林黄中曰男不下女而女從之非貞女也君不下士而士從之非貞士也如是者不可取矣親迎之禮廢于夫婦之間就見之儀蔑于君臣之際為女與士者不待禮而行為君與夫者惟其易與而畜之未有不悔於其終者也郭子和曰序卦言天地萬物男女夫婦父子君臣上下皆有咸之道聖人明人道故卦辭以取女為言而贊併天地萬物言之所以盡卦之象也右明卦占初六咸其拇贊曰志在外也林黄中曰艮為指而在下體之下拇之象也吕與叔曰初最下而應九四四以心感而初以足行不曰足而曰拇者以隂居下静而未行盖心感而迹未應也楊廷秀曰九四説之初初六止之初九四之感初六欲行者也而艮以止之是心行而足止也右明象程可乆曰九四不比于隂本爻不比於陽无有分其應者故贊稱志在外而四謂之朋從言不失其所感也馮當可曰占不言吉凶盖未渉于動謹則吉不謹則凶吉凶未定不言者存乎人也案四心之象感之主也下體自拇而腓自腓而股皆聴命於心焉而初六正應九四則尤為所感之專者特去四尚歴三爻視股腓之近以為行止故未有吉凶吉凶生乎動者也右明爻義六二咸其腓凶居吉贊曰雖凶居吉順不害也胡翼之曰腓者拇之上股之下朱子發曰互體㢲為股股之下腓也蘭惠卿曰腓在下體之中隨股而動者也上有九五之正應隔礙于三不能交感隨九三之股而動則凶然六二中正能安居以待九五之正應則吉程可乆同郭子和曰足之力本乎此為下體之要二居下之中腓為動之主吉凶之判特在夫動止之間耳李季辨曰設兩端以聴其自擇也隂陽之情近則相得正應猶隔二陽而所感之主猶隔九三則如腓之隨股感九三而動凶之道也聖人以其居中得正又有艮止之徳故告之以居以待正應則可轉凶而吉矣右明象占九三咸其股執其隨往吝贊曰咸其股亦不處也志在隨人所執下也劉氏曰股在下體之上三之象也雖于拇為大於腓為剛然感于上而動則均也鄭舜舉曰初與二隂也感于陽而動故為咸其拇咸其腓三以陽為艮之主宜其止于下體而不動今亦説乎上之隂而應之故為咸其股右明象郭子和曰所應在上所隨在下以是而往能无咎乎李去非曰九三陽也為艮之主今乃咸其股焉股動於上則腓隨于下也李仲永曰往應上六則窮而吝也蘭惠卿曰雖有應在上然隔礙四五舍近從逺往則招吝朱子曰陽剛居上宜静而往可吝之甚者也案有應在上而隔二陽往必吝矣九四感之主本爻切近之而聴命焉猶股之動聴命于心也心感其股執其隨四之志以應之盖心動則股動股動則腓拇无不動者右明占九四貞吉悔亡憧憧往來朋從爾思贊曰貞吉悔亡未感害也朋從爾思未光大也胡翼之曰居股之上脢之下心之象也以陽居隂失其正道本有悔也若守之以正則吉可獲而悔可亡楊中立曰此心之位不言心心无不該不可以位言也朱子曰當三陽之中心之象咸之主也心之感物當正而固乃得其理今以陽居隂為失其正而不能固故因占以設戒蘭惠卿曰易之言貞吉悔亡者三爻咸也大壯也未濟也皆以九居四履非其位悔也故戒之雖有應在初而近礙九三未能與相交感故戒以貞固則吉右明占王介父曰思者心之動也案咸以感為義五之于二上之于三雖隔陽爻皆相為感應而本爻適當其中諸爻憧憧然往來于前而此心本无與也惟爾之朋則從爾之思爾以此見非其類則有感不應也右明象程正叔曰不言咸其心感乃心也四在中而居上當心之位故為感之主而言感之道劉氏曰凡感之道以心為主張知常曰下卦皆失莫若静之為愈至四然後悔亡惟五為无悔張敬夫曰咸六爻未嘗言心文王于四曰思孔子于初三五曰志盖志者心之所期而思者心之用人之所感惟物誘于外然後心往赴之發而為情矣此所以不言心歟按天地感而萬物化生聖人感人心而天下和平感之為道如此其大而六爻乃无一吉者自一身之象推之四當上體而在三陽之中此其為心之位而所由以感者也此而不言吉則感之道廢矣然而適焉以九居四乃不當位聖人于是以其居中有陽剛之徳而許之以貞吉以其不當位之有悔而開之以悔亡惟其時物而權其占如此也夫感之道有我感物者有為物所感者我感物則我為主必當位中正而所感无不通四无二五之中又无當位之正聖人恐其所思之過中而為物所感而遷也故又謂諸爻之往來于前者各以朋類而從其所思己之所感者有初六焉隔于九三而思不及爾其餘憧憧之往來者皆非所思也故卦曰咸而不曰感爻言思而不言心聖人之旨斷可識矣右明爻義説卦子曰天下何思何慮天下同歸而殊塗一致而百慮天下何思何慮日往則月來月往則日來日月相推而明生焉寒往則暑來暑往則寒來寒暑相推而嵗成焉往者屈也來者信也屈信相感而利生焉尺蠖之屈以求信也龍蛇之蟄以存身也精義入神以致用也利用安身以崇徳也過此以往未之或知也窮神知化徳之盛也程正叔曰感動也凡有動皆為感感則必有應所應復為感一有感復為應所以不已也張子厚曰釋氏以感為幻妄夫天地之常以其心普萬物而无心聖人之常以其情順萬事而无情故君子之心莫若廓然而大公物來則順應苟規規于外誘之除將見滅于東而生于西也非惟日之不足顧其端無窮不可得而除也楊中立曰或謂无思所以體道有思所以應世此為不知易之義也易所謂无思者无所事乎思云爾故其于天下之故感而遂通今而曰不可以有思又曰不能无思此何理哉三子者之言雖微有異同而可以推其端也右推廣爻辭九五咸其脢无悔贊曰咸其脢志末也郭立之曰下之无憧憧之思上之无騰口之説可以无悔而已李季辨曰悔亡是有悔而亡也无悔是无復有悔也李子思曰卦者天徳論其本體之自然而爻者人事各牽於爻位繋應之私則與卦體遂異矣學者知爻位吉凶得失之殊反而觀之於全卦之體以造于无心其與天參乎案爻居心之上口之下則脢也心有所感然後動于脢乃形于言言之是非系乎所感之邪正而爻居其間邪正系四而是非系上故无悔尤也右明象占上六咸其輔頰舌贊曰滕口説也楊中立曰本爻兊之主兊為口舌故有頰舌之象林黄中曰在上體之上也郭立之曰易近取諸身惟咸艮二卦為詳而其成終者特異豈非咸極于説而艮終于止邪案感道在心感人以言者末也故于上言之咸其輔者象也頰舌者占也謂咸其輔則有滕頰舌而已右明象占王景孟曰六爻自初至上皆取諸身盖人之四支百體雖有上下小大之不同而其血氣脉絡之相為感通固有至理行乎其間故大而天地衆而萬物感通之理即諸身而可見矣此聖人制爻取象之意朱子曰此卦雖主于感然六爻皆宜静而不宜動者也案吉凶悔吝生乎動者也感于物而動故六爻之中吉凶悔吝之辭備焉然感生于心惟心正則所感正所感正則所動亦正故以貞吉屬之九四盖吉凶悔吝之所由生也下三爻足之象感于動者也上二爻喉舌之象感于言者也右明六爻巽下震上恒贊曰恒乆也剛上而柔下雷風相與巽而動剛柔皆應恒恒亨无咎利貞乆于其道也天地之道恒乆而不已也利有攸往終則有始也日月得天而能乆照四時變化而能乆成聖人乆于其道而天下化成觀其所恒而天地萬物之情可見矣説卦曰恒徳之固也又曰恒雜而不厭又曰恒以一徳李子思曰昔者聖人之作易以巽配震剛上柔下有一定不易之位長男長女有能安乆處之理於是重為此卦名之曰恒林黄中曰天尊地卑乾坤定矣恒以剛上柔下為義不取諸乾坤而取諸震巽何也曰天地定位雷風相與位定而不交故其卦為否相與而不易故其卦為恒右明卦義程正叔曰咸少男在少女之下以男下女男女交感之義也恒長男在長女之上男尊女卑夫婦居室之常道也論交感之情則少為深切論尊卑之叙則長當謹正故兊艮為咸而震巽為恒也孫明復曰咸以男下女以成其家既成其家不可不正也君先下臣以成其國既成其國不可以不治也故恒以二長相與因見正家之象又曰天尊地卑君上臣下父坐子立夫動婦順恒之道也李去非曰交感一時之情常乆萬世之道右通咸明卦義象贊曰雷風恒君子以立不易方右明卦用序卦曰有天地然後有萬物有萬物然後有男女有男女然後有夫婦有夫婦然後有父子有父子然後有君臣有君臣然後有上下有上下然後禮義有所錯夫婦之道不可以不乆也故受之以恒李子思曰易以乾坤坎離為上經之終始以咸恒既未濟為下經之終始乾坤坎離分而立體者也咸恒既未濟則艮兊震巽坎離合而致用者也自太極既分使八卦常分而不合則造化之功何由得見故分之以示定體于先而合之以示致用於後此序易者之深意也案乾上坤下離東坎西先天之易天地日月之四象也居上經之始終以立造化之體山澤通氣雷風不相悖水火相逮此後天之易六子之功用也故居下經之始終以致造化之用既濟之後猶有未濟者示造化之用終則有始也雖然上下經皆以坎離終者在天成象則為日月在地成形則為水火日月東西之相望水火南北之相交也其在四時則為二分二至上經以二分終下經以二至終也林黄中曰恒咸之反也自咸之恒上下相易二五迭居而成卦也上下相易則艮為巽兊為震矣二五迭居則剛處隂柔處陽矣是故柔上而剛下以明男下女之義柔下而剛上以明女從男之義也夫婦居室長乆之道是以謂之恒也林以九六為隂陽六位為柔剛此惑于立天之道曰隂與陽立地之道曰柔與剛也謂六位不動于下為地道九六變動于上為天道爾然所謂三才之道者止謂六位不及九六也此卦傳云剛上而柔下謂九四初六則九六為剛柔明矣凡此等處皆改從經文右明卦序亨无咎利貞利有攸往贊曰恒亨无咎利貞乆于其道也天地之道恒乆而不已也利有攸往終則有始也王介父曰亨然後无咎耿晞道曰物不可以乆居其所則恒未為无咎也惟乆于其道是以亨而无咎右明前象占李仲永曰天地之道貞觀者也日月之道貞明者也天下之動貞夫一者也貞乃乆也乆者乆而不變者也李季辨曰利乎正正則可恒王景孟曰天地之道自百刻積而為晝夜自晝夜積而為寒暑晝夜之相為晦明寒暑之相為往來遲速進退機緘不停故終始相循如環无端者此盖有常而然也惟其有常故有往而利如此也如使有往而不利則有今日之晝夜而止爾又烏有來日之晝夜乎有今嵗之寒暑而止爾又烏有來嵗之寒暑乎袁氏曰道无終窮故利有攸往乃所以為乆也右明後象占郭子和曰其道可乆斯无不通通則无過舉内利以固外利以行此其所以為恒也李子思曰易中諸卦大率皆以兩兩相從而合兩為一隂陽相等則其為用可以至于乆大不爾則隂陽偏造化將无所寄其作用矣然以巽遇艮而隂老陽少則為蠱以兊遇震而陽老隂少則為歸妹不若咸之少男少女之相配而恒之長男長女之相匹隂陽之氣等而无差而曰亨曰利曰吉曰无咎盖无所往而不可也右總明象初六浚恒貞凶无攸利贊曰浚恒之凶始求深也孔穎達曰最處卦底故曰浚王景孟曰取其巽入之義朱子曰初與四為正應理之常也然居下而在初未可以深有所求四震體性上而不下且隔二三應初之意異乎常矣初之柔闇不能度勢又以隂居巽下為巽之主其性務入故深以常理求之浚恒之象也筮者如是雖正亦凶而无所利矣説本程正叔案二性字深得其指所謂成之者性也林黄中曰自咸以來初六九四未之有改巽入而在卦之最下震亢于上求之愈深是以浚為恒也朱子發曰泰之六四成巽九出六入有隂陽相求之象初入卦底浚之象劉氏曰記言事君者量而後入凡乞假于人為人從事者亦然盖慮夫浚恒之凶也程正叔曰世之責望故素而至悔咎者皆浚恒者也案恒之成卦在初四二爻剛柔相易而成也六自四來初入伏二陽之下成巽九自初往四動于二隂之下成震是初六與四雖隔二陽而本易位而處求應之切者也六入于二陽之下以求達于九四九四動而上而不下應初故有浚井求深之象盖九動而上則為井也九上為井則失其應矣焉可恒乎貞凶隂以居下為貞又位當也右明象占九二悔亡贊曰能乆中也都聖與曰于卦為恒而以剛居中能乆中之象雖位不稱徳而六五應之悔亡之象也程可乆曰以剛應上非常乆之道惟中而不過是以悔亡大壯九二解初二與本爻之辭不著其所以然以其象意明也毛伯玉曰恒乆也二中也不言其故而遽言其報以為其徳已具于卦爻也是之謂象學是故自我言之所以悔亡者本于乆中自其報言之能乆于中固宜其悔亡也李去非曰五爻皆不善二獨以乆中亡悔盖巽入之道惟中為難案恒明夫婦之道震男處外巽女處内夫婦之恒也而五柔二剛反夫婦之恒宜有悔者也以其體巽位隂居中用剛為得中之義以此為恒能治梱内之政家道嚴肅者也故悔亡説者謂失位稱悔誤矣右明占林黄中曰咸以剛下柔上為義初六九四反之而以少為咸恒以剛上柔下為義九二六五反之而以中為恒是以初悔而卒亡二爻之辭同也右明爻義九三不恒其徳或承之羞貞吝衆説支離不足以據茲不復辨贊曰不恒其徳无所容也論語南人有言曰人而无恒不可以作巫醫善夫不恒其徳或承之羞子曰不占而已矣李子思曰巽為進退為不果其究為躁卦則是出居陽位而剛柔皆不得其恒者也都聖與曰以陽居三剛過中而又巽體焉所行无恒之象欲應上而九四以剛拒之或者不一之辭謂非人之所願承而亦或有承之者也羞言非所願承而以承之為恥也以是為固執而不改則吝李氏曰恒則于道為正不恒則于正為吝劉氏曰正固如是則為吝于改矣王景孟曰君子自立于天地之間所以俯仰无愧驗之千古聖賢之心而皆合者徒以此心存焉爾此心不存則无所執守在己者以為不足為吾累而不知羞辱承吾後矣吝謂不足多之也亦通右明象占案論巽之進退不果九二九三同也然九二以剛處隂而位得中是以悔亡九三剛過而不中其究為躁是以不恒其徳也六五體震而以柔處尊位而得中故為恒其徳象意明甚然以夫婦之道言之應乎上六而隔于九四隂陽易位而進退不常此所以進不獲應而退求所承則或承之者亦可羞也所承之人疑謂初六盖初六浚而深入疑達乎三隂陽之情相遇也説者皆謂九二二雖近而相承然以陽承陽恐非婦人之義右明爻義九四田无禽贊曰乆非其位安得禽也石守道曰禽謂初也朱子發曰與初相易則巽伏而不見四安得禽哉王景孟曰田為禽設也田而无禽謂无功也正義曰田以譬夫有事也无禽者有事无功也程可乆曰巽六四得位乎外以柔巽剛故田獲三品今九四乆非其位與六五近不相得故曰无禽易以田喻用武言用武而无功也馭世任用小人乆處髙位一旦事變无不敗績九四以之右明象李子思曰震巽男女之合在初四二爻又曰咸恒二卦其象甚善而六爻之義鮮有安吉者盖以爻而配六位則隂陽得失乗承逆順之理又各不同故也毛伯玉曰九三當位則以不中發之九四失位則以无禽言之易之變也如此各有理焉而不可亂也王景孟曰以剛居隂與九二同而位不得中與九二異以常為恒不若以中為恒也右明爻義六五恒其徳貞婦人吉夫子凶贊曰婦人貞吉從一而終也夫子制義從婦凶也閭丘逢辰曰以隂柔應陽剛是以順從為恒也程正叔曰居中而所應又中隂柔之正也故恒乆則其徳為貞王景孟曰恒其徳與不恒其徳反九三之剛太過而六五以柔居中故也李子思曰貞者四徳之一也謂之恒則要當以貞固為事而初曰貞凶三曰貞吝五曰貞夫子凶何也易之為書以變通為義執而不變亦非所以為恒此六五之貞以婦人從一而終之義論之則是為吉以夫子制義之道責之則是為凶案凡居陽位者能正固守之不拘其徳也吉凶則存乎人焉右明象林黄中曰婦无再醮之義既嫁從夫既寡從子雖居尊位未嘗不以順為正也李季辨曰男上女下五雖男位而以六為常二雖女位而以九為常以五之柔下從二之剛夫柔而婦剛非可恒也貞于柔婦人則吉夫子則凶楊廷秀曰五長男之正體也為君則柔弱而下從九二之彊臣為夫子則柔弱而下從九二之彊婦以此為恒宜其凶也案二五之應隔三四之剛然中正相與聖人以恒明夫婦之道故特以其應言也以言其爻之徳則柔順為正婦人之吉也以言其卦之體則以男從女夫子之凶也易故兩從其義焉右明占程正叔曰五君位而不以君道言者其義在丈夫猶凶況君乎程可乆曰以六居五而應剛在他卦則有人君虚已任賢之象若以為恒則順從而无辨蘭惠卿曰此洪範三徳所以有惟辟作福作威之戒也毛伯玉曰二五均為中也彼悔亡而此凶何也九二陽徳也君子時中者也六五隂徳也執中无權者也知恒而不知變故以婦人夫子訓之案以咸九變六言之則為知變以六居五言之則為不知變義不相悖也所以易兩著其辭右明爻義上六振恒凶贊曰振恒在上大无功也司馬君實曰振者木之摇落也上以柔弱之質當常乆之終體動而應風摇落之象也常乆之道由茲而墜故凶説者大率以動為義惟此説為當按初上本末也巽木在下而爻以柔弱在上九三應之有風以動之其末振而摇落之象浚其本而振其末失其道矣朱子曰居恒之極處震之終恒極而不恒震終則過動以隂柔而居上則非其所安故有振恒之象而其占則凶也右明象占耿睎道曰物不可以終止故既濟終止則亂物不可以終動故上六振恒則凶李子思曰君子之體恒要須合震巽之全體而兼動静相須之理然後恒亨之利可保不然獨取一爻之義而觀之則動静必至偏勝吉少而凶多故善明卦者必論全卦善學易者必究全易右明爻義馮當可曰恒之道深不可常動不可常弱不可常非其位不可常惟中故常故子思謂之中庸林黄中曰恒之諸爻皆有正應以剛上柔下而言恒則初六九四宜若恒矣以剛柔當位而言恒則九三上六宜若恒矣然而初有浚恒之凶四有无禽之咎三有不恒之羞上有振恒之凶者乆而不變也至于九二六五既非當位之爻又反尊卑之正而二為悔亡五為恒徳者變通而能乆也易變則通通則乆咸恒二卦相通義自咸之恒其變者中二爻耳千變萬化而不失乎中恒乆之道斯為得也李季辨曰恒之六爻惟二五以中行而有常初四不及三上過之皆不可恒者也二五雖得中又失剛柔之正六爻皆未善所以見恒道之難案惟中故常惟變故中中庸一書言中不及庸盖能中則常也孟子言執中无權而賊道盖能變則中也右明六爻
