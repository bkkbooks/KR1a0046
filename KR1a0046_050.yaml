body:
  text: 厚齊易學卷五十宋馮椅撰易外傳第十八雜卦六十四卦紛雜並陳之必有其序然其間先後豈必如繩之貫也事物之理不齊未免逐兩卦别生義例以序之孔子恐學易者之拘於一定之序也於是有雜卦焉各以兩兩相對亦有單舉者其配偶其次第若無意而實有意學者宜盡心焉此猶卦序既濟之終復繼之以未濟示易有無窮之意義也虞仲翔曰雜六十四卦以為義韓康伯曰錯綜其義或以同相類或以異相明正義曰序卦依文王而次序之雜卦孔子更以意錯雜而對辨不與序卦同也乾剛坤柔易自乾坤而出必始二卦剛柔各以其材之盛者言之剛柔者立本者也變通者趣時者也由乾坤以立其本而六十二卦無非趣時之義比樂師憂言涉人道之始也樂聲洛比者情相親也故有友助之意而樂師者衆雜處也故有爭奪之患而憂臨觀之義或與或求羣比而衆不可以無主故必有出其類者以臨之而示人之觀瞻故二卦皆有二義二陽求臨於四隂四隂與之臨四隂求觀於二陽二陽與之觀此猶在下者求所臨而在上者與之以臨在下者求所觀而在上者與之以觀其義在交相與求也故曰或以柔愛求為韻屯見而不失其居蒙雜而著見今現居去聲今据人生而必有羣聚羣聚則必有臨之觀之者屯者草昧之始險艱見於外而天子諸侯不失其位是以臨之而有以統之也坎外而九居初五之象也蒙者未有知識之始聖賢雜處於庶民之上而觀瞻開明有以示之而使化之也二陽雜于四隂而後能發蒙之象也居著為韻震起也艮止也此下肆言處己應物消息吉凶之道二卦以一陽言也李氏曰陽在隂下居非其所則起陽在隂上居得其所則止損益盛衰之始也二卦合言之者此損則彼益此益則彼損也損之又損則日衰矣益之又益則日盛矣故一損一益乃盛衰之始此衰則彼盛此盛則彼衰也大畜時也無妄災也二卦以乾言之乾非畜止之物時乎受畜爾無妄陽動上窮故有災眚震動而上乾陽又上進此龍之亢而有悔猶蝸牛之升髙不知回者也序卦先無妄此後之者言君子時乎為物所畜則災眚至矣萃聚而升不來也二卦以坤言之坤地也澤流下則聚於地木漸上則不復來也謙輕而豫怡也此以一陽言也輕去聲怡虞本今作怠誤以心在下也或作治蓋以起止始災來怡為韻謙一陽退處於下故為自處者輕豫一陽奮出於上故為和樂而怡一曰謙輕而不為備豫則豫治其備也故怡作治噬嗑食也賁無色也二卦以離言也噬嗑言其威賁言其文噬嗑頥中有物噬之而後嗑則為食物之象凡繪畫之事後素功五色畢陳乃以粉間之使相雜而成章所以為賁飾之象無色言其素也兑見而巽伏也二卦以一隂言也見今現兑說巽入說見於外巽入於內李氏元逹曰巽之隂內伏伏乃隂之性也兑之隂外見見則發乎情也伏聲白隨無故也蠱則飭也故者有所因之謂隨者因人而隨之者也故曰無故柴氏曰不主於故隨時而行飭或作飾整治修飭之也事物蠱敗則加整治修飭之郭立之曰柔在內蠱所以起剛在上蠱所以飭郭子和曰言非大有作為也毛伯玉曰志在於隨不事其事是以為蠱蠱則多事繁興是以為飭然則無故者有故之端也以食色伏飭為韻剝爛也復反也物過熟則爛爛則剝落陽窮於上而反於下則剝變為復毛伯玉曰彼爛則此復反今翻以爛反為韻晉晝也明夷咮也二卦以離言也晉明出地上故為晝咮舊作誅韻語不叶明夷明入地中明者傷也離為飛鳥鳥以喙傷物咮聲晝喙也但取傷義明則安暗則傷李子思曰晉為晝則明夷為夜明夷為咮則晉為賞故晉之明出地上者晝也則明夷之明入地下者夜也晉之錫馬蕃庶者賞之事也則明夷之左股之傷者咮之類也晝夜之更相代猶嘉傷之更相用序卦之次序與雜卦之反對其揆則一井通而困相遘也二卦以坎言也遘遇也舊作遇遘亦遇也特遇韻不叶此言困窮而通之義困於上而反於下下遇井則通矣林黃中曰泉之在井其脉通流李氏曰井上有說相遇之象也象以上水為井以無水為困其水居下而上通則必遇之合也咸速也恆久也毛伯玉曰二卦男女之相從也自其初言之易於相感故曰速自其後言之久而相安故曰恆又曰以一日之恩誤百年之身者有之矣以晝咮遘久為韻渙離也節止也二卦以坎言也離去聲離散也物散則止之故渙反為節人情久則易離也有以節文之則止而不散亦緣上咸恆為義以離止為韻解緩也蹇難也二卦亦坎也解取懈怠之義緩謂凡事緩慢也難去聲毛伯玉曰先蹇後解者卦之序也先解後蹇所謂雜卦也物不可以久懈懈則緩而廢弛故蹇難生焉雜卦不唯顛倒六十四卦之序雖覆變相因之次亦顛倒之凡此者必有意義以類推之可也以緩難為韻睽外也家人內也二卦以離言也睽在外卦家人在內卦先睽後家人者亦暌於外者必反於內之意李氏曰外而踈內而親否泰反其類也以三隂三陽言也類猶乃與類行之類隂陽各以類否則隂類在內而陽類在外泰則陽類在內而隂類在外反謂相反也先否後泰者謂反否之類則為泰矣毛伯玉曰治亂所以相反者君子小人之黨不同也大壯則止遁則退也二卦以四陽言君子進退之義也大壯則陽長隂消六五君位故四陽止而不進存君也遁則隂長陽消二隂上進故四陽退避全身也言大壯則君子安遁則君子退止本艮也而節壯皆言止各有所指也渙亦言離正猶春秋貴賤不嫌同號美惡不嫌同辭耿睎道曰剛過則折不可以不知止以外內類退為韻大有衆也同人親也二卦以五陽一隂言也衆或作終非同人則卑而情親先大有者謂人君得衆則必有以固結其心使之親上也革去故也鼎取新也二卦以離言也故舊敝革取改革之義故為去故鼎取熟物之義故為取新天下之物有故必有新然必去其故而後可以取其新李氏曰已陳而敝者為故方作而興者為新知所去取則通變之道得矣石守道曰改革窮敝之事則必新立制度小過過也中孚信也二卦以中爻言也小過者過以舉事中孚者信而後行以親信為韻豐多故也親寡旅也二卦以離言也朱子曰以明而動其故必多李去非曰火烈于山親之者寡李氏曰時極盛則事益繁旅于行則親益寡本言旅寡親今倒言之者欲叶韻也離上而坎下也二卦以中一爻言也隂性本下在離則麗于陽隨之而騰上陽性本上在坎則陷于隂隨之而趣下小畜寡也履不處也二卦以一隂言也隂豈能畜陽以居至寡之地而一隂為之主故以寡而得衆也履貴處得其地而卦義以陽不處陽位為吉故不處而行也以故旅下處為韻需不進也訟不親也二卦以乾坎言也需險在前故不敢進訟天水違行故不相親不進者有待也不親者有爭也大過顛也此一卦以本末弱言也本末弱故顛以進親顛為韻遘遇也柔遇剛也漸女歸待男行也遘以一隂言漸以六三言也遘柔進而遇剛為女遇男子非婚媾之正漸巽女在外待艮男以歸也以剛行為韻頥養正也既濟定也二卦以六爻言也頥二陽分于上下四隂在中為所養之正既濟六爻各當其位無往來升降之變故云定也歸妹女之終也未濟男之窮也歸妹以六三言未濟以三陽言也歸妹六自外卦歸三為少妹之女歸其夫家女嫁至少妹則婚禮畢矣故曰女之終未濟三陽皆失其位三男無一得所處者故曰男之窮未濟之義程正叔得之成都隱者或曰潘閬云以終窮為韻夬決也剛決柔也以言窮則反本也一隂既決則復變為乾所謂終則有始天行也君子道長小人道憂也此又雜卦聖人之微意夫易者道隂陽之書者也此篇始于乾剛坤柔對立以立其本中間雜陳人道卒歸於剛之决柔明君子小人之消長蓋剛柔者晝夜之象也剛為陽明為君子剛長則天下治晝之象也柔為隂暗為小人柔長則天下亂夜之象也一晝一夜迭相乘承在天地者鼓萬物而不與聖人同憂聖人憂患斯世故以剛决柔則君子之道長小人之道憂危而知退則天下有治而無亂矣此聖人之治天下所以成天地所不及之功也毛伯玉曰雜卦之義與序卦不必同序卦之說與卦體不必合是故其為畫也以竒耦相易其為爻也以剛柔相易其為卦也以二體相易其為位也以乘承相易其象也其義也其類也其吉凶也無往而非變變之中又有變焉方其兩兩相從也不以覆則以變覆亦變也是之謂易朱子曰自遘以下卦不反對或疑其簡錯今以韻卟之非誤也竊謂此所以謂之雜卦若孔子之本指所能意曉者則識之所不可通者則以俟後之君子厚齊易學卷五十
