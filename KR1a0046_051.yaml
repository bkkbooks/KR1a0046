body:
  text: 厚齊易學附録一宋馮椅撰先儒著述上古經易學外傳云中興書目周易古經一卷蓋未有傳注前經彖象繫分上下并文言說卦序卦雜卦各不相屬不著名氏謂後人倣之類為一書非舊古經也按劉向嘗以中古文易經校施孟梁丘經至蜀李撰又嘗著古文易今皆亡惟成都府學官有元豐五年壬戌嵗吕微仲自序其書十二篇與古經同朝氏讀書志云二卷今李仁父再刻者止一卷建中靖國元年辛巳嵗朝以道著古周易八卷亦與吕氏合特不分經彖象繫上下篇縮十二為八爾李仁父謂吕朝二家不相祖述蓋其篇次暗合也漢藝文志易經十二篇顔師古曰上下經及十翼此其本之田何最為近古吕朝所以倣之以釐正王輔嗣之易而反之古也近世沙隨程可久作古周易程氏考十二篇别為章句不與正經相亂正同田何而名同於以道邵堯夫作百源易其次序亦如此與吕文字句讀初無增損以道以諸家及說文等九十五書是正有增有損專主北學朱子著周易本義謂吕氏更定朝氏著為經二卷傳十卷乃復孔氏之舊此指東萊吕伯恭非指微仲伯恭亦但謂近世朝氏所編其刊補離合之際或以為未安故釐正之皆不及微仲也淳熙十五年戊申嵗知蘄州羅田縣吳斗南因二家復加訂正名亦循朝氏自上下經外而傳合彖大象上下止各一卷分上下小象為繫辭傳二卷以王弼繫辭上下與說卦通為說卦上中下三卷以實隋志之說餘並同二家自謂博考深求凡二十八年而後定然以繫辭為周公作未脫承襲之舊又每卦必占覆卦為難從也吕名大防汲郡人諡正愍公朝名說之嵩山人自號景迂生吳名仁傑稱河南氏平江崑山人程名逈宋州人號沙隨由紹興府登大學第終於鄱陽又有古占法并圗一篇外編一篇博采諸家之說參以己意多所發明朱子自號晦菴諡文公贈太師其學出于周程為一代宗師本義前有九圗後有五贊筮儀讀書志成於紹興二十一年辛未朝名公武號昭德自序其書有得於井氏者井氏名資知興元府領四川轉運常以俸之半傳録時巴蜀獨不被兵民間多有異本力求之甚富載歸廬山以子孫稚弱付之朝氏周易緯崇文總目周易緯九卷漢鄭康成注隋志有宋𠂻志唐四庫書有宋均注按中興館閣書易緯七卷又有李淳風等續注其一推天元甲子之術其二推易天地人之元術又乾坤鑿度上下二卷題包犧氏先文公孫軒轅氏演古籀文蒼頡修為上下二篇首稱黃帝曰又易通卦驗上下二卷上卷題于七經第一於河洛第九亦首稱孔子曰其下卷所論卦氣方位雖略本說卦至其論氣候病症脉理與今素問所謂黃帝岐伯對問相類此其為假託不必辨也按緯出漢哀平世載占驗災祥隂陽符䜟光武以䜟立故篤信之鄭康成何休引以解經桓談張衡之徒深疾之自苻堅之後其學殆絶易正義引易緯乾鑿度等書而漢儒引君子正其始萬事理差之毫釐謬以千里程可久曰此緯書通卦驗之文也按館閣本通卦驗有曰故正其本而萬物理失之毫釐差以千里其文特小異爾黃魯直云其中多有不可曉者獨九宫之法頗明崇文總目云皆述隂陽日辰數䜟今考三書凡十一卷蓋無足深据云子夏傳隋志周易二卷魏文侯師卜子夏傳殘缺梁六卷按唐志題卜商亦止二卷亡全文諸儒請不帖經然則梁有六卷至隋殘缺止存二卷唐蓋承隋本也崇文中興書目乃有十卷崇文謂非子夏所傳故剟去子夏名以祛後人誤惑中興亦云或謂卜子夏傳程可久曰子夏傳京房謂之箋近世有陋儒用王弼本為之注鄙淺之甚凡先儒所引子夏傳此書皆無之熙寧中房審權萃訓故百家凡稱子夏者皆取後贋本按正義引子夏傳云雖分上下二篇未有經字此說不可謂不近古也至崇文總目云篇第略依王氏易決非舊文元豐二年楚州連水縣丞張聘賢論次者亦止王本自以為出於近世而信其以為子夏不疑反謂唐孔頴達陸德明所引止見其僞本且引歸妹六五傳云古者王女下嫁於諸侯衣服不繫其夫下王侯一等為出詩小序不知詩小序衛宏之徒所作非卜氏也中興書目則謂陸德明所引與近本間有合者若云地得水而柔水得地而流比今本地藏水而澤也水得地而安也但小異爾至束帛戔戔作殘殘又云五匹為束三𤣥二纁象隂陽則今本無此先儒疑非卜商遂謂漢杜子夏作然漢又有梁丘家鄧彭祖亦字子夏非有明据也朝以道云唐張弧僞作劉知幾直以為易無此傳竊謂卜子夏未嘗傳易正義所引亦無卜字京房之箋恐亦是後人託其名以行梁隋唐乃京房所箋及唐初孔頴達本而崇文中興張聘賢房審權本則唐初本已亡而張弧書也所謂比卦與陸德明稍合者依倣為之以求信於世爾京房箋本不復可見矣田何易前漢書田何以上下經十翼離為二十篇而解者自為章句何以授王同周王孫丁寬服生皆著易傳數篇何字子裝自魯商瞿受易於孔子五傳而至何丁寬之學最盛寬字子襄梁人從何受易後從周王孫受古義號周氏傳作易說三萬言訓故舉大綱而已寬再傳而得施讐孟喜梁丘賀繇是易有施孟梁丘之學讐字東卿沛人一傳張禹再傳彭宣皆有傳而施氏有張彭之學喜字長卿東海蘭陵人好自稱譽得易家占候隂陽烖異書詐言田生死時枕喜膝獨傳喜按隋志喜章句八卷殘缺梁十卷喜授白光翟牧而有翟孟白之學賀字長翁琅邪諸人從京房學易更事田王孫王孫受丁寬學三傳而得王孫張鄧彭祖衡咸而梁丘又有王孫鄧衡之學又有髙氏之學蓋髙相也無章句專說隂陽烖異自言出於丁將軍將軍寬也焦贛易林六十四卦變讀書志焦贛延夀易林十六卷費直題其前曰六十四卦變唐王俞序每卦變六十四總四千九十六首皆為韻語程可久曰於乾之姤云仁政不暴鳳凰來舍四時順節民安其處乾之同人云子號索哺母行求食返見空巢訾我長息與潜見之義了不相蒙至泰之需云東鄰好女為王妃后莊公築館以尊主母歸於京師季姜喜悅莊公築館乃王姬下嫁非妃后也其用事已不可据紹興辛巳完顔亮入寇沈丞相判明州用以筮之遇比之隨云過時不歸若悲雄雌徘徊外國與叔分離又有以筮之者遇解之大壯云驕胡大形造惡作凶無所能成還自滅身其占驗如此崇文中興書目不著而今卜肆有之或者卜筮家託之贛以行爾然崇文總目云第述隂陽災異之言與聖人之經不類若非朝程之所見者大抵術數家每託之古人以為信如素問謂之黃帝岐伯命書謂之東方朔地理書謂之李淳風蓋無足怪贛得隱士之說託之孟喜而孟氏之徒不肯自以為喜之學又詭託之田何毛氏所謂彼亦自愧其不經更相假借以為重者要之不過卜筮家術不足以語聖經也京房章句約象貞悔互體隋志漢京房章句十卷唐同舊題京房傳吳陸績注朝氏曰皆星行氣候之學非章句也程可久曰房易積數初為下貞二為中貞三為上貞四為下悔五為中悔上為上悔二三四為互體三四五為約象今傳注未有約象之名唯術數家見之崇文中興書目不著其書當在民間按漢書房受易焦延夀以明災異得幸為石顯所譛誅其學授殷嘉姚平乘𢎞而易有京氏之學與田焦費並行毛伯玉曰房本李氏推律自定為京氏房不難更其氏姓則祖其學者固宜傅會假合乾坤相易坎離相奪以為當然也房字君明費直易分彖象傳入經隋志漢單父長費直周易注四卷唐同按費直傳徒以彖象繫辭十篇之言解說上下經崇文總目云以彖象文言雜入卦中自費氏始蓋誤以之言為文言且鄭康成易猶以文言說卦序卦合為一卷則不始於直明矣吳斗南云解經但用彖象繫辭似於每卦之後列彖象繫辭去其篇第之目而冠傳字以總之正如杜元凱春秋解分經之年與傳之年相附也然彖象繫辭之名一沒而汨亂古經則始于此劉向以古文易經校施孟梁丘經或脫去無咎悔亡惟費氏經與古合然則易之篇名次第雖亂於直而田何之易傳之衆而易差古文惟直本未失也特未聞直有注者唐亦云章句十卷恐未真也方田學盛行費氏只傳民間至後漢陳𤣥鄭衆康成馬融荀爽之徒皆學費氏費興而田焦京諸易微矣鄭康成注隋志後漢大司農鄭𤣥注周易九卷唐十卷未知何緣增一卷也崇文總目止有一卷唯文言說卦序卦雜卦合四篇餘皆逸指趣淵確本去聖人之未逺也中興亡王肅注隋志魏將軍王肅注周易十卷唐同崇文總目乃十一卷題王肅傳云後人纂陸德明釋文所取者附益之非肅本書中興亡肅字子雍晉易髓中興書目易髓八卷卦及繫辭題晉人撰按前志無之中興得於民間王弼注韓伯注略例大衍論隋志周易十卷魏尚書郎王弼注六十四卦六卷門人晉大常韓伯注繫辭以下三卷弼又撰略例一卷弼字輔嗣山陽人伯字康伯潁川人唐志七卷又有大衍論三卷然則弼注六卷其一略例也獨大衍論隋既無之唐本恐亦後人託之者也中興書目弼又有易辨一卷論易論彖論象亦類略例或言弼著此書已亡晉得之王羲之承詔録此書藏於祕府世莫得見自漢以來言易者為隂陽烖異符䜟卜筮星歷象數無復近正至弼始歸之人事無隱祕竒怪之說自是學者靡然從之至唐而弼易專行衆學盡廢唯梁有晉揚州刺史顧夷等難輔嗣義一卷至隋已亡孫盛謂六爻變化五氣相推弼皆擯落多所不關李鼎祚云天象難尋人事易習折楊黃華學徒多從之程正叔曰弼元不見道蓋以老莊之意解之也毛伯玉曰弼未生時荀爽陸績虞翻皆以易名家大同小異京房焦贛之餘波也翻等既死而後弼始作易傳弼死裁二十四惜哉獨喜其少年有髙識亦恨其所見未審而鋭於著述也正義𤣥談唐貞觀中國子祭酒孔頴達奉勑為正義十四卷初號義贊詔改正義顔師古司馬才章王恭王談于志寧與焉馬嘉運駮正其失序云與博士馬嘉運太學助教趙乾時等參定頴達字仲達冀州衡水人永徽中詔太尉長孫無忌與諸儒刊定序與前修疏人及四門博士蘇德融等對詔更令裁定功未就復詔中書門下與國子三館博士𢎞文館學士考正序云敕使趙𢎞智覆更詳審以為王輔嗣之注獨冠古今所以江左諸儒並傳其學河北學者罕能及之其江南義疏十有餘家義涉於釋氏唯以輔嗣為本采衆說傅益之本朝端拱初國子司業孔維等奉詔再是正主申王學云頴達又以所得撰周易六十四卦𤣥談六卷正義補闕崇文總目周易正義補闕七卷不著撰人名氏自謂禆頴達之闕蓋出於近世云周易外義中興書目周易外義三卷不知作者多案諸經傳以釋注疏之言易訓中興書目易訓三卷本朝至和中屯田郎中宋咸撰咸以既補注易以其餘義百餘篇大可疑者三十有六題曰易訓謂訓其子而已李鼎祚集解中興書目唐著作郎李鼎祚周易集解十卷按唐志集注周易十七卷子夏孟喜京房馬融荀爽鄭康成劉表何晏宋𠂻虞翻陸績干寶王肅王弼姚信王廙張璜向秀王凱冲侯果蜀才翟𤣥韓康伯劉儼何妥崔璟沈麟士盧氏崔覲孔頴達三十餘家又引九家易乾鑿度義所謂蜀才者人多不知按顔之推云范長生也隋志所録易類六十九部今所有七部而已乾鑿度是緯書焦贛易林又屬卜筮關子明不載書目子夏傳干寶王肅之書多是僞本然則隋志所録捨王弼皆未得見也自餘獨鼎祚所集者時可見其大指今又亡七卷惜哉其所取荀虞之說為多崇文總目云大抵以卦互體緣爻索變蓋本易家師承之舊其自序云自卜商之後傳注百家唯王鄭相沿頗行於近代鄭則多參天象王乃全釋人事易之道豈偏滯於天人哉而天象難尋人事易習折楊黃華學徒多從之今集諸家刊輔嗣之野文補康成之逸象蓋宗鄭學者也隂𢎞道新論疏崇文總目周易新論疏十卷唐隂𢎞道撰𢎞道仕為臨渙令世其父皓之學雜采子夏孟喜等一十八家之說參訂其長合七十二篇於易家有助云中興井氏皆無之豈軼於兵間邪一行傳中興書目周易傳十二卷唐沙門一行撰采前代諸儒古說無闕者凡四卷郭兼山父子因論歷云論歷取一行則可論易取一行則不可彼所謂大衍歷者強名之耳非真大衍也舉正崇文總目唐蘇州司户郭京撰稱家藏王弼韓康伯手札周易本及石經校正一百三十五處二百七十三字其序言今所習者或將經入注用注作經小象中間以下句反居其上爻辭注內移後義却處於前舉正其訛讀書志云蓋以繇彖相證託之王韓手札與石經耳知渙之繇利涉大川下有利貞而彖辭無之則增入漸之繇女歸吉下無也字而彖辭有之則削去它皆類此演聖通論中興書目周易演聖通論十六卷本朝前知制誥胡旦撰其說多引注疏及王昭素論為之商𣙜旦字周父濵州人口義中興書目周易口義十卷本朝直集賢院石介撰建本作解義說本王弼介字守道號徂徠先生兖州人傳孫明復之學王洙言象外傳崇文總目周易言象外傳十卷中興書目云十二篇本朝王洙撰洙字原叔應天人以通經侍講天章閣集諸儒易說折𠂻其理依卦變為類自序云論次舊義傅以新說以王弼傳為內摘其異者表而正之故云外傳張弧王道小疏中興書目周易上經王道小疏五卷唐大理評事張弧撰其說周易有王道為治國治家治身之鑒誡其所疏並依王弼意廣義𤣥者則略而取之注簡義眀者則全而取之先賢不言者則添而疏之號曰小疏舊十卷今止存上經要削中興書目周易要削三卷題丘園子王隱撰自序謂綜康成輔嗣輩所說曰要削者言撮其要也稱天寶庚寅知為唐人李翺易詮中興書目易詮七卷唐李翺撰先說八卦次列六十四卦并雜卦翺字習之案本傳不言著此書陸希聲傳微㫖中興書目易傳上下經分為六卷唐太尉中書門下平章事陸希聲撰希聲蘇州吳縣人大順中棄官居陽羡自號君陽遁叟按後說云著易傳十篇上經第一下經第二又有演文伸係等八篇又撰易圗指說釋變微㫖四卷通為十卷又撰文證一卷非十編之目今止存上下經二篇分為六卷又微㫖一編分為三卷設為問答崇文總目云初隴西李阮學其說以為上下經傳二篇思屬近妙故希聲自為之解餘篇差顯不復為注蓋近世之名家歟甘棠正義崇文總目周易甘棠正義三十卷五代梁任正一撰据孔頴達正義而申演其說正一為陜州大都督易論崇文總目易論三十三卷本朝處士王昭素撰以注疏異同互相詰難蔽以己意太祖時嘗召令講易昭素開封酸棗人後有徐徽撰易論纂要一卷王介父題云豫嘗苦王先生易論晦而難讀徐徽生刪取其略以示豫又取其義可傳及雖不足傳而猶可論者存之劉牧王弼易辨中興書目劉牧王弼易辨二卷凡二十八篇石介撰又云宋咸撰其說取王弼謂劉牧以五十五數天五退藏為四象者為鈎隱圗之精義非是獨摘乾坤二卦以見其餘胡安定口義中興書目周易口義十卷又有繫辭說卦三卷本朝國子監直講胡瑗撰援以易說授其弟子因記之為口義大抵祖王弼瑗字翼之號安定先生泰州人史氏口訣義崇文總目周易口訣義六卷河南史徴中興書目作史文徴撰讀書志曰唐人直抄孔氏疏以便講習故題曰口訣王逢傳讀書志易傳十卷王逢撰逢為國子直講其學宗王弼號廣陵為王介父客年雖不夀著述甚富蘇軾傳中興書目易傳九卷讀書志云毗陵易傳當是蜀本本朝翰林學士蘇軾撰父洵作此傳未竟疾革命軾卒其業軾字子瞻眉州人朝氏云謂卦不可爻别而觀之其論卦必先求其所齊之端則六爻之義未有不貫者未嘗鑿而通也王荆公解中興書目易解十四卷讀書志云易義二十卷建本二十七卷本朝司空王安石撰安石字介父臨川人始封荆公後封舒王有上下經至雜卦外有卦象論統解易象讀書志云介父三經義皆頒學官謂之新經獨易解自謂少作不專以取士故紹聖後復有龔原耿南仲三書偕行於場屋耿南仲解義中興書目周易解義十卷國子祭酒耿南仲撰讀書志云注二十卷建本題進周易解義南仲字晞道開封人龔原續解義中興書目周易續解義十七卷讀書志云注二十卷工部侍郎龔原撰原字深之括蒼人學者多師之一十五卷後乃雜義有釋卦釋彖釋象辨重卦辨上下位辨上下繫辨古今篇按二家解義而朝氏為之注且卷數多於書目豈蜀本以注行邪楊中立頗不然之伊川傳中興書目易傳六卷解六十四卦本朝崇政殿說書程頥撰元符二年自序頥字正叔河南人號伊川先生其學出於周茂叔自漢以來言易者局於象數之偏展轉推測流於方技自王輔嗣一掃羣說獨據義理人事言之雖未能盡識經㫖而易可尋矣本朝諸君子如胡石亦只是依近注疏王蘇又太濶略至正叔傳出義理彰明而輔嗣之學淺矣其答張閎中書易傳未傳自量精力未衰尚覬少進其不苟如此嘗以易傳示門人曰止說得七分後人更須自體究也正叔兄皓字伯淳號明道先生亦有說易處載之語録曾穜裒之為大易粹言云鄭氏翼傳周易翼傳原缺卷近時鄭汝諧撰蓋謂孔子翼文王之經此則翼伊川之傳也汝諧字舜舉自號東谷橫渠說易說三卷題橫渠先生韓元龍刊於建康府漕臺主管文字胡大元校勘按張載字子厚秦人號橫渠先生舊坐虎皮與諸生講易一日見程伯淳兄弟及講易輒徹去虎皮謂諸生曰有二程眀易前此所講說未是可往見之不知此書子厚晚年以所得刪正邪或好學者以門人所記録與正蒙類為此書也多所發明有二程未到處藝閣解蜀本三家解之一讀書志藝閣先生易解一卷吕大臨撰有統論數篇無詮次未成書也大臨字與叔藍田人自號藝閣學出程氏遊定夫易說粹言之一廣平遊氏易說遊名酢字定夫建安人學出程氏龜山易說粹言之一龜山楊氏易說楊名時字中立延平人號龜山先生學出程氏漢上集傳卦圗叢說中興書目易集傳十一卷紹興初翰林學士朱震撰震字子發荆門人朝氏云自謂其學以程伊川為宗和會邵康節張子厚之論合鄭康成王輔嗣之學為一多采先儒之說以成故曰集傳又有叢說一卷卦圗三卷毛伯玉力詆其卦變互體伏卦反卦之失謂如乾五為坎坎變離離為飛故曰飛龍之類又如蒙六三一爻五變爻無定象頗中其膏肓云四學淵源中興書目四學淵源論三卷凡四十篇曰總論曰諸卦論曰諸卦雜說本朝郭忠孝撰忠孝字立之河南人號兼山先生曾穜獻之以二程張子厚遊定夫楊中立并忠孝父子合七家易解為一書題曰大易粹言刊於龍舒郡齊以忠孝之解為易說與四學淵源之目不同未知館閣所藏異同也其子雍字子和號白雲先生放浪長楊山谷間嘗詔不起亦著易說自序其先人受業伊川二十餘年念其學殆將泯絶於是更潜稽易象以述舊聞紹興辛亥嵗序不以彖為卦辭而直循王弼之名以為孔子自言其彖泥於卦變毛伯玉不以為然竊謂郭氏雖嘗學於伊川之門而其學不著至其子自相祖述為一家之學未為無得於易而非復伊洛之舊聞尹和靖云忠孝自黨事起不與先生往來及卒亦不致奠鮑極重注中興書目周易重注十卷治平中建昌軍司户鮑極撰右司諫鄭獬表進祕閣校理錢藻序宣和中祕書少監孫近重行改定取翼贊附經之末以全一家之書陳瑩中易說中興書目易說一卷本朝贈諫議大夫陳瓘撰瓘字瑩中南劍人自號了翁竊嘗從其孫大應見了翁有易全解不止一卷也多本卦變與朱子發之說相類鄒志完繫辭義中興書目易繫辭義三卷本朝兵部侍郎鄒浩撰浩字志完常州人房審權義海讀書志周易義海一百卷本朝熙寧間蜀人房審權撰集鄭𤣥至王安石凡百家摘取其專明人事者為一編諸家說有異同輒加評議附之篇末程可久云所取子夏傳贋本也至紹興庚辰江都李衡又刪削其文義之重疊者而益之以伊川東坡漢上龔深父之說謂之義海撮要云衡字彥平顧思叔義類中興書目周易義類三卷題顧思叔撰以先儒論易不同因取其辭說同者分目而聚之凡九十五條劉鄭注中興書目劉鄭注周易六卷集劉牧鄭夬二家所注集者不知其名凌唐佐集解中興書目周易集解六卷本朝朝奉大夫凌唐佐撰劉槩繫辭解中興書目周易繫辭解十卷劉槩撰有論以括其大意槩字仲平陳禾傳中興書目易傳十二卷本朝正言陳禾撰張舜文易索中興書目易索十三卷本朝承議郎張汝明撰每卦以索曰釋經外有觀象觀變玩辭玩占叢說通十三卷汝明字舜文吉州太和人登元祐壬申第知嶽州卒遊酢定夫志其墓其說亦支離蓋以意逆之者也葆光解中興書目易解十卷紹聖中泉州教授張弼撰弼字舜元莆陽人按紹聖二年章惇劄進其周易解義九卷今建本二十五卷賜葆光處士三年授福州司户參軍充泉州州學教授黃裳龔原皆序之稱其明於象數古今之說閲之殆盡未能當意默誦繫辭二十年一日釋然而悟得大例幾百條毛伯玉云其易專主輔嗣今觀其義亦主卦變如朱子發太學十先生易解林疑獨慎微吳子進袁志行李元量劉仲平路純中洪成季陳子明鄭正夫閻彥升共成一書凡十二卷又有說卦以後論三卷亦有發明處四李全解四李先生周易全解十卷說卦以後三卷李彥章元達端行聖與舜由彥安士表元卓合成一書宣和四年序者不著其名謂四人者俱有職於庠序則太學講義也大學周易新講義大學周易新講義三十七卷統例一卷不著其人紹聖丁丑中都本大學直講繫辭繫辭即說卦也大學直講繫辭十二卷不著其名右四書皆三舍時學舍講義也雜見旁證房𤣥齡龍昌期盧穆孫坦句徽代淵薛溫其陳文佐陳皋劉巘子圭楊繪元素汪沿于弇見房審權義海又有白氏集氏范氏亡其名陸績虞翻仲翔虞喜王符王廙王嗣宗馬融季長徐邈荀悅荀柔之荀爽慈眀崔憬劉向子政劉歆劉表劉昞劉遵向秀子期董遇姚信張璠張賔張晏張軌董頴侯果孟康崔子𤣥服虔宋𠂻見朝以道古易虔薛音注見陸德明引又有傅氏不著其名皇甫謐見正義李授之經解通義中興書目周易經解通義三十卷紹興初知簡州李授之撰每卦之首各著論一篇以言一卦之大要又著論十篇明易之指趣解微中興書目周易解微三卷不知作者言八卦繫辭易傳中興書目易傳四卷不知作者自乾至益易樞中興書目易樞十卷不知作者釋六十四卦劉翔解義易卦解義二卷貴州文學劉翔撰紹興十五年表進監學官看詳云通達經㫖附近人情間出新意議論不詭旁涉史傳援證眀白特差福州教授藏其書禁中翔福州人鄱陽洪邁序以上下經離為二卷據王弼本繫辭以下卷頗多蓋非翔之舊云邁字景盧沈丞相小傳中興書目易小傳六卷紹興中左僕射沈該撰每卦别為一論都聖與作周易變體推廣其說李莊簡易詳說莊簡名光字泰發諡莊簡紹興中謫嶺南著書十卷自號讀易老人淮漕錢冲之序其後云其學自劉元城元城名安世字器之學於司馬君實解東卿疑難圗解周易疑難圗解三十卷二十九卷內十三卷分上下鄭東卿撰一本稱合沙漁父紹興丁巳自序云為朋友講習而作始得富沙丘先生告東卿曰易理皆在於畫於是日畫一卦置之座右周而復始厯五朞而後有所入醫算卜筮之書神仙丹竈之說經傳子史凡與易相涉者皆博觀之不泥其文字而一采其意㫖以求吾之卦畫東卿字少梅丘先生名程字憲古建陽人嘗有詩云易理分明在畫中誰知易道畫難窮不知畫意空箋注何異丹青欲畫風少梅學傳潘冠英潘說十三卦數處內象極當而少梅所撰無之蓋聞之鄉人于公梁國輔于親受之潘也吳園解周易解九卷題吳園先生又有序論五卷雜說泰論張根字知常饒州德興人吳園所居地名也厚齊易學附録一
