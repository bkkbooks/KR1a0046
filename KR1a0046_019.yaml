body:
  text: 厚齋易學卷十九宋馮椅撰易輯傳第十五經下篇遯大壯晉明夷艮下乾上遯雜卦曰遯則退也正義曰陰長之卦小人方進君子日消當此之時不若隠遯避世李仲永曰一陰生而知退者聖人之知幾也二陰方長而能遯者君子之見幾也耿睎道曰君子難進而易退是故可以進亦可以不進君子不進也至於不可不進而後進焉可以退亦可以不退君子有退而已不待至於不可不退而後退也待其不可不退而後退則非遯也逋竄已矣右明卦義象賛曰天下有山遯君子以逺小人不惡而嚴右明卦用序卦曰恒者乆也物不可以乆居其所故受之以遯遯者退也林黄中曰自恒之遯二五相易變其上爻而成遯也程正叔曰乆則有去相須之理也遯所以繼恒也石守道曰日往則月來寒往則暑來日月寒暑尚不能乆况君子之於禄位冨貴而可以乆居之乎右明卦序亨賛曰遯而亨也剛當位而應與時行也李子思曰遯中有亨猶困之困亨否之大人否亨蘭惠卿曰小人長而君子不遯則觸禍矣安得亨故曰遯而亨言亨由於遯也李去非曰坤再交乾而得遯則陰浸長而陽浸消君子見幾而先遯以全其剛非潔其身而亂大倫也全身逺害以聴天理之自復今日之遯所以為它日之亨也林黄中曰二陰其勢必勝與之争則吾道必消不争亦消四陽唯遯而去之陰無能為危莫與扶顛莫與持則將反之為大壯矣故易以壯繼遯盖言二陰之世陽苟遯則大壯有反掌之易唯其懐禄不去則陰遂盛彊而不可救耳由遯而為大壯亨之義也案文王多以二五有應言亨盖九五當位則在下者未至於有言不信也時雖當遯猶可亨也此文王之意也若賛則又是孔子説經之意言君子猶得位與時行尚可亨也若夫以遯而亨説者多謂身遯道亨恐不謂是林李二氏得之右明卦象小利貞贊曰浸而長也程可乆曰小者利貞所以抑其浸長之勢貞者静而正也林黄中曰二陰浸長而皆有其應六二居中而巽以承上以此為貞小人之利也小人在下而君子在上何不利之有哉毛伯玉曰遯亨為君子言也君子以遯為亨小利貞為小人計也小人以貞為利案隂常以居下為貞况以六居二君剛而臣柔剛上而柔下此陰小之所以為貞而利也而小人若不安於貞恃其浸長之勢則天下否矣右明卦占初六遯尾厲勿用有攸往賛曰遯尾之厲不往何災也朱子發曰卦以前為首後為尾蘭惠卿曰卦以上為首下為尾案爻有衡象𥪡象以人言之則其象竪上首而下足也以獸言之則其象衡前首而後尾也林黄中曰遯自内之外故初為遯尾在遯之時六二小人居中而用事者也初六小人在下而圗進者也小人進則君子遯矣夫猛獸之遯也妥其尾而莫敢逐或者從而䠞之其首必反不亦厲乎為其體艮而居下故戒以勿用有攸往聖人之愛君子至矣此以爻之陰為小人而告君子以厲而勿往其象占之意頗明李子思曰卦以陽遯陰而陰則以固留諸陽為義初六之陰最居卦尾卑而旡位不能追逐諸陽而縶維之者也獨以陰險之性行於世將有危道故唯止而不行則可免禍所以為陰柔之戒或者以為君子之遯貴速而居尾則危是不觀畫也王景孟曰隂始長聖人防遏之而㣲其辭曰遯尾厲又戒之曰勿用有攸往非為小人謀為君子謀也毛伯玉曰不往則不灾所謂小利貞此皆為戒隂小之辭但於厲義不甚明大扺陰雖浸長四陽尚衆而據在上之勢未可犯犯則厲故告之以勿用有攸往所以戒小人之安分而全君子之遯也右明象占六二執之用黄牛之革莫之勝説賛曰執用黄牛固志也司馬君實曰黄者中也牛革取其柔而堅韌也鄭少梅曰九三以剛居外有革之象三苟隨乾以遯則二遇禍矣所以勸其執之也李子思曰以陰居中當遯之主慮衆君子之遯我而求有以固之體艮之性柔順取中故爻辭如此其堅不可說所以固君子之志而求濟其事也林黄中曰九五將遯本爻居中而巽以係之取互體巽象冀其為己留也正義曰遯之世避内出外二處中居内非遯之人也為所遯之主物皆棄已而遯何以固執留之惟有中順之道可以安之也案以全卦言之四陽皆遯者也二陰皆逐之者也以二體言之下艮止二陰之進而上乾遯去者也以各爻言之二與九三同體欲留乾之三陽而執之用黄牛之革而九五据尊位三陽所聴命者也九五留則九四上九留矣九五剛當位而應二而其賛與本爻賛皆稱志是其志應也則執之者執九五也執九五者執乾之三陽也以九三執之者九三與二同體而與三陽同徳者也右明象占李去非曰二遯之主也五爻皆言遯而二獨不言凡所以起遯者二則為之遯所以避二也二有應在五未有逐君子之形故執之用黄牛之革猶欲君子之留也莫之勝説二五之交尚固也而其勢必至於遯何也小人之至於衆豈皆有逐君子之心而其初亦豈无意於託君子惟其衆而相為激也則小人自小人而君子自君子矣鄭舜舉曰爻不言吉凶以示處得其道則吉處非其道則凶王景孟曰陰陽消長此天道之盈虚也在聖人亦豈能加損於其間哉然於陰長陽退之卦則深致意焉案易於二隂之長為小人謀以全君子之節初戒以勿犯君子之厲二告以曲留君子之方易之策行則小人安於下位而聴命於君子君子亦安於上位而不復引遯矣則知天下无不可為之時亦无不可濟之事顧所處何如耳處得其道則吉處失其道則凶右明爻義九三系遯有疾厲畜臣妾吉賛曰系遯之厲有疾憊也馮當可曰陽說於陰系之而不能解當遯之時有所顧戀而不能遯朱子發曰巽繩系也互體蘭惠卿曰遯以无拘系為吉爻下比二陰是遯而反為小人所拘系而致疾厲者也卜子夏曰為小人所系不能遯也右明象并占賛曰畜臣妾吉不可大事也蘭惠卿曰九三為艮之主二陰浸長而止之於内是畜二小人於内者也若畜之以臣妾之禮則吉不可使之與政事也白氏曰六二系本爻而本爻以臣妾畜之不使之進石守道曰但以臣妾畜之不任以事如剥之以宫人寵也右明占程可乆曰遯而有所系此以巽取象又為不果之意畜制陰小於内此以艮取象鄭少梅曰艮以九三為主九三遯則二陰無主陽為隂所系則陽病矣故以九三為吉凶焉二陰主一陽臣妾之象也陰氣方長將化九三而為陰是系之而使之有疾也得其道則二陰為我畜所以吉也終不能使上體之乾下從於我此所以不能大事也案乾三陽所以得遯而避二陰之長者以有九三以止之也今九三為二陰所拘系而不得脱將為陰氣所薄而元氣危矣能如人主之畜臣妾柔而服之使二陰止於内而不往外乃吉道也作易者以陰陽消長之㑹責之九三憂之治之其所以為君子慮者不其周乎右明爻義九四好遯君子吉小人否賛曰君子好遯小人否也王介父曰有應在内所謂好也有好而遯何也已在外而逺於初也九五嘉遯貞吉賛曰以正志也李子思曰亨者嘉之㑹嘉㑹足以合禮嘉者陰陽之合而亨故婚姻謂之嘉禮林黄中曰九五六二有嘉耦之象夫九四情好之私舍之而去猶若易然至於伉儷之情室家之義幡然而改亦已難矣故曰貞吉以此為貞斯為吉也鄭少梅曰嘉妃也妃則吾正耦也不能絶也故正其志焉志正則邪滛非僻不能入矣此所以為貞吉云案陽以居上為貞九五居位中正亦為貞嘉者君嘉其臣猶夫之有嘉耦也易中言嘉喜慶皆以君臣陰陽之情相好為義喜者初相得之辭也慶者交相得之辭也嘉者君嘉臣之辭也賛所謂剛當位而應正指此爻惟其嘉六二之應以中正而相與引遯此其所以吉也右明象占都聖與曰五雖有人君之象而不必皆人君也故坤之五臣之盛也晉之五進之盛也旅之五旅之盛也而遯之五亦遯之盛也盖列貴賤者雖存乎位而不可為典要者又唯其時物之義而不可以一端求此其所以為易也右明爻義上九肥遯无不利肥一作飛賛曰无所疑也石守道曰子雲所謂山雌之肥其意得乎盖君子以道自肥耿睎道曰陽道常饒其或損者陰剥之也本爻超然處外不累於陰无有疾厲故稱肥焉鄭少梅曰獨此一爻不與二陰相涉所以為肥遯也案陽為隂所薄則瘠純陽无陰則常饒而肥故乾在秋為瘠馬也乾上三陽頼艮止二陰於下高遯而去然以内外卦爻相應之情言之則四五皆未免應係於陰雖遯而不得謂之肥也唯此本爻陰不得而侵故獨全肥遯之利右明肥遯象占孫氏曰知三將變脱然高舉蘭惠卿曰三則内比四五有應唯本爻飄然一卦之外矰繳不能施憂患不能及无所不利右明飛遯象占陸希聲曰遯陰長於内而陽在於外故爻在外多吉在内多咎案艮止二隂於内故乾三陽得遯於外二陰浸長故聖人於初之逺三則告之勿往不使消陽也二之近三則告之執用九三欲其留陽也三之係遯欲以臣妾畜二陰不使之進也艮止故也所謂在内多咎者如此外卦四五有應在内陰陽之情未能相絶故告之有好而遯有嘉而遯至於上九去陰之逺而始无不利焉盖三陽同志從遯棄艮而去者也所謂在外多吉者如此此聖人設卦觀象使天下之君子小人皆知趨吉而避凶所謂辭也者各指其所之也右明六爻乾下震上大壯利貞案壯者氣力强盛之名初九壯于止征凶有孚九二貞吉九三小人用壯君子用罔貞厲羝羊觸藩羸其角案乾在下必上復上卦為陽卦者必阻之需大畜是也大壯合二體觀之則九三在三陽之前故觸九四之藩盖三陽皆欲闢九四以上復九四貞吉悔亡藩決不羸壯于大輿之輻六五喪羊于易无悔上六羝羊觸藩不能退不能遂无攸利艱則吉坤下離上晉賛曰晉進也明出地上正義曰進長之名蘭恵卿曰進而不已之義朱子曰六四之柔進而上行而至於五蘭惠卿曰朱子發所傳邵堯夫六十四卦相生圖以為二陽之卦皆生於臨夫臨六已居五矣當言剛進不當言柔進也子發自覺其非乃曰晉者蹇之變亦不可信盖二陽之卦有生於臨者有生於觀者晉當生於觀觀之九五來於九四而六四往為六五故謂之柔進而上行也案詳犧文命卦之義與孔子賛卦之義其指甚明特諸儒以意逆之說未瑩徹爾姑以始畫八卦言之先乾坤純體次論一索則二陰二陽純在上也次論再索則一陰一陽當在於中也又次論三索則二陰二陽純在下也重而為六爻何獨不然姑即二陽四陰之卦言之二陽在下者當上坤下兊其卦成臨自此二陽爻相升降隨象取義二陽在中者當上震下艮其卦成小過二陽在上者上巽下坤其卦成觀又復以二陽升降隨象取義也今皆自臨起例得其一而遺其二一不通也又曰自臨生自觀生夫六子之卦曰自乾坤生可也六十四卦曰自八卦生可也二陽之卦升降不齊皆既重之卦何有後先而曰自某卦生二不通也故此說此理雖甚明白而未明者毎毎攻之謂此也姑以此二陽卦例之則凡一陽五陰三陽三陰四陽二陰之卦皆可類推矣張敬夫曰升與漸亦進也名雖相近實則相逺盖晉有明盛之象升者自下超上漸者進而有序明出地上觀日之麗天可見矣雜卦曰晉晝也李氏曰晉晝也日始生為晝夜漏盡為晝晝漏盡為夜方進而升於上也故有進之象李子思曰離配諸卦凡有十四而象之最美者莫如晉與大有盖晉則明出地上而大有則明在天上也大明之生初自虞淵之下轉而上升出地上則轉夜為晝破暗為明及其中天離明亭午而尤盛此二卦所以為南離之象之最美者也右明卦義象賛曰明出地上晉君子以自昭明徳右明卦用序卦曰物不可以終壯故受之以晉晉者進也石守道曰物不可以終壯晉進也亦如人之有盛大之徳然後方可以進用於時若學優則仕皆其義也案遯大壮皆四陽二陰之卦故繼之以四陰二陽之卦然四陰二陽純體之卦已為臨觀見之上篇矣於是晉以六四升五為晉明夷以九二升三為明夷次遯大壯此作易者自以義起也右明卦序康侯用錫馬蕃庶晝日三接賛曰順而麗乎大明柔進而上行是以康侯用錫馬蕃庶晝日三接也程正叔曰大明在上而下體順附諸侯承王之象又曰不曰公卿而曰侯者天子治於上者也諸侯治於下者也在下而附順於大明之君諸侯也承于晉義未的朱子發曰五為天子四為諸侯六四進而之五以近天子之光鄭少梅曰明出地上象諸侯者以火在天上大有象天子故爾郭子和同劉氏曰地臣道日君象有君象而執臣道故取於康侯林黄中曰有諸侯朝王之象坤為土為民有土有民諸侯之象也康侯謚也古盖有錫馬蕃庶而蒙三接之寵者故彖辭取之以明人臣自進而上行之義猶帝乙歸妹箕子明夷之象也又曰錫馬當為下錫上之錫書師錫帝禹錫𤣥圭錫汝保極皆下錫上晝日三接所以懐徠諸侯之道也李季辨曰下體純柔至三方得諸侯之位三諸侯之位也又進而五方能錫馬三接故五為晉之主三為康侯之位五接以禮是康侯用此卦而錫馬蕃庶晝日三接也案康為謚則不可知然以詩之齊侯周官之不寧侯例之必能有安康之徳而稱之者也說者謂為康周公之康於義亦通但於卦象无取用猶王用亨於西山公用亨于天子之用盖康侯用此卦之義云爾三陰上進錫馬蕃庶之象也易之卦以之藏往不但帝乙箕子之事如王用三驅王用出征之類皆古之王者用此卦又以行此事也毛伯玉曰三代以上專尚封建故以諸侯之從違為興衰之候上明下順成康之隆不過如此楊中立曰馬地類坤象也劉氏曰以三陰故曰蕃庶或以離火取馬之象然於下錫上之義无取吕與叔曰明出地晝日之象歴三陰而至離之明三接之數也案三接王母接下三隂之象朱子發曰行人之職諸公三饗三問三勞晝日訪問之時此以六五兼坤體而言處晉之道郭子和曰易之卦辭唯晉為異専以康侯為義康侯如是則其亨利貞可知程正叔曰晉有義而旡徳者无用有也晉之明盛故不言亨順乎大明无用戒正故不言利貞李子思曰上明下順可以進矣若於斯時而不進則是无時而可進也此晉所以獨以進為義而不及四徳歟右明卦象占初六晉如摧如貞吉賛曰晉如摧如獨行正也李子思曰六爻皆以進為義處坤順之初進而上向乎明故曰晉如然以爻觀之陰柔在下而未得位則是雖有向進之心而尚為在上者所壓故曰摧如毛伯玉曰晉如者諸侯之朝覲也摧如者為四所間也李季辨曰卦之三爻為康侯之位初在下未得位未可上進貞守則吉胡翼之曰處衆陰之下君子志未得行於進之始必見摧抑當守之以正則獲吉案隂以居下為貞右明摧如貞吉象占罔孚裕无咎賛曰裕无咎未受命也李去非曰君不我信而吾益摧折則自處不𢎞矣裕无咎其寛以居之也劉氏曰君子行吾正不以人之不見孚而改其度也楊中立曰孟子云我无官守我无言責則吾進退豈不綽綽然有餘裕哉此之謂也以未受命言之張舜文曰可斯進難斯退行吾正而已矣雖不吾信吾亦裕如也誰其咎之哉右明罔孚裕无咎象占毛伯玉曰摧如者在彼而吾不可以不正罔孚者在上而吾不可以不裕案坤三柔皆欲麗乎五而上行者是之謂晉而初六之進九四摧之位卑而勢逺罔所孚於五也四雖見摧而貞固則吉五雖罔孚而自裕則无咎始雖難進而終必於進至三則上行矣惟能貞自守而寛裕自處此居下之道也不安分則摧於四而凶求躁進則未孚於五而有咎五君臣之正義其有過也尚輕四専命之權臣其得罪也必重此吉无咎之辨也諸卦例以剛柔内外為正應獨此卦以柔順同附六五為義二陽爻反為異已者也説者謂有應在四為晉如失位為摧如失其指矣右明爻義六二晉如愁如貞吉石守道曰在下卦之中已得位之人趙氏曰以進為憂也毛伯玉曰本欲晉如而乃愁如九四間之也能守其正終必合矣受兹介福于其王母賛曰受兹介福以中正也李子思曰六五以陰柔居尊位王母之象二之於五宜乎兩陰相遇不能相濟然五之所麗者乃離明之位大明所在无幽不照六二中正守而不移何患其不逹李季辨曰二應在上進而至五則錫馬三接矣言受介福必進至於王母之所毛伯玉曰王母六五也嫌於无應故特以母言之明其以同徳必相親也李去非曰錫馬三接所以為介六五為四陰之首王母也九本居五正應也今六進而据此大君之位九退居四二欲往從五以上進九四必阻之故欲進而先愁也唯其居中守正六五同徳相援終必上進故又釋之曰爾之受此大吉之福而不愁者王母在上往必與進非九四所能遏其指本爻右明象占六三衆允悔亡九四晉如鼫鼠貞厲案鼠常晝伏晉之離晝也在離之下伏於晝者也有竊據衆陰之勢故象鼫鼠六五悔亡失得勿恤往吉无不利上九晉其角維用伐邑厲吉无咎貞吝離下坤上明夷賛曰明入地中明夷内文明而外柔順以蒙大難大王以之雜卦曰明夷誅也都聖與曰日之遇夜而入乎地中之時也鄭康成曰日出地上其明乃光至其入也明則傷矣張知常曰明不可夷也人謂之夷耳程可乆曰明入地中明出地上此觀文察理以知幽明之故者也在人明為物揜者為傷内卦離為明外卦坤傷明者也右明卦義程正叔曰晉者明盛之卦明君在上羣賢並進之時也明夷者昏闇之卦闇君在上明者見傷之時也王景孟曰其在人君則為昏闇其在賢人則為晦藏正義同李去非曰晉外景也明夷内景也晋明乎外明夷明乎内晉以順用其明明夷以順保其明外有蒙蔽而用其明則必傷矣趙氏曰不特遭時之昏暗人有蔽於物汨於情者皆足以傷吾之明也右推廣卦義象賛曰明入地中明夷君子以蒞衆用晦而明右明卦用序卦曰進必有所傷故受之以明夷夷者傷也石守道曰晉之上九已用伐邑若極進必見傷㓕也程正叔曰進之不已必有所傷理自然也林黄中曰明夷晉之反也離反居下坤反居上上下相易而成卦也餘同程説右明卦序利艱貞賛曰晦其明也内難而能正其志箕子以之正義曰時雖至闇不可隨時傾邪故宜艱難固守其至正之徳石守道曰君子當闇世雖遇難而不失其貞故曰利朱子發曰明夷之世不晦其明則有禍失其正則其明熄處之者利在于艱貞而已張舜元曰明傷之時唯艱難守貞晦其明而後免也李去非曰外有蒙蔽而用其明則必傷矣文王拘箕子囚皆傷也文王以全卦為象箕子以内卦為象利艱貞謂内三爻也説者皆惑于六五以其為箕遂以為象唯此謂内三爻為得其指李子思曰易卦諸爻噬嗑之九四大畜之九三曰利艱貞盖諸爻之中不幸而或遇艱難之象則以艱難之辭戒之未有一卦全體以利艱貞為義者也此盖覩明入地中之象知君子之明傷為可懼而危辭以戒之六十四卦言利貞者非一更加以字者如坤之利牝馬之貞家人之利女貞同人之利君子貞不過各因其卦之材而為之義獨明夷加以艱字則其時可知也其商之末世乎文王抱明於躬而處紂之時深感此象故托意以為世戒抑以自警也此卦自臨變九自二之三六自三來二遂成明夷之象九三之進前遇坤土其進為艱而以六居二乃貞故有此象右明卦象占初九明夷于飛垂其翼君子于行三日不食有攸往主人有言賛曰君子于行義不食也正義曰去坤最逺逺遯匿迹飛不敢顯故垂其翼也龔深父曰明夷之難在上而初極逺之宜下而不宜上故飛而垂其翼就下也蘭惠卿曰陽剛之君子居明夷之始戢翼避禍見幾先遯九家曰火性炎上離為朱鳥故曰于飛為坤所抑故垂其翼陽為君子三者陽徳成也曰以喻君不食者不得食君禄也張子厚曰進應于四為三所困故曰于飛垂翼亦有此象林黄中曰晉之上九反居明夷之初飛而垂翼行而不食非遇傷之故乎飛之為言不敢集也行之為言不敢留也既飛而又垂翼懼不免于矰弋也既行而又廢食懼不免于刑戮也王介父曰三日不食棄其應之象也王景孟曰君子于行謂去其禄位也三日不食謂義不食其禄也案六二身也初九九三翼也初在下其翼垂也專以内卦離為朱鳥取象耿睎道曰體炎上之性亦必有所往而犯難尚淺故主人有言而已主人宜見賔禮而有言况其他乎郭子和曰主人主我者也有言則難將作矣蘭惠卿曰知明夷之主不義而亟去之不食其食有攸往是委而去之也則主人有言盖闇君之於君子既不能用及其去也又不能無言案離性炎而不静有飛行之象以避坤之闇而去之投明也垂翼不敢上進也不食不敢食坤之禄也三日離三爻之象也凡此皆避坤之闇舍四之應也其舍四之應以閡三也所以然者應四有攸往則有言也其有言亦以三故也明夷之君在上故四為所主即觀逺臣以其所主之人也以上六為闇之主義不相妨案君子于行三日不食伯夷義不食周粟之爻後世若孔子於衛明日遂行在陳絶糧亦應斯義右明象占春秋左氏傳曰叔孫穆子之生莊叔以周易筮之遇明夷之謙以示卜楚丘曰明夷之謙明而未融其當旦乎日之謙當鳥故曰明夷于飛明之未融故曰垂其翼象日之動故曰君子于行當三在旦故曰三日不食離火也艮山也離為火火焚山山敗于人為言敗言為䜛故曰有攸往主人有言必䜛言也以言為䜛唯其時物不拘一説也右明占法六二明夷于左股用承馬壯吉賛曰六二之吉順以則也石守道曰六二居中有位者也漸近明夷之主不能如初之飛而尚在位故有傷林黄中曰明夷以傷為義近取諸身而有首足心腹之象初二為股三四為腹五上為首此以兩位為一象初三右也故二四謂之左五亦首也故上謂之大首右强而左弱陽壯而陰羸吉事尚左凶事尚右者文武異宜故剛柔異尚也説者以左為陽右為陰失之矣蘭惠卿曰左者陰也右者陽也豐之折右肱終不可用則明夷雖傷左股而傷不害也承馬壯吉與渙之初六近𫝊九二之象同吕與叔曰在二陽之間不能自明而賴物以為明不能自行而頼物以有行順物之則而不自用晦其明者也夷于左股則不能自行乗馬者馬在前前遇九三之剛故馬壯也閭丘逢辰曰行地莫如馬行坤之地馬之壯者尤其健者也二質陰柔故立左肱壯馬之戒馮當可曰壯馬九三也陽體為馬王景孟曰六二文明之主也以六居二柔順之至也夫子釋之曰順以則也所謂内文明而外柔順以䝉大難者也説者以為大顛閎夭此何義哉豈不以下體而輔九三乎以九三為文王之爻非也此徒泥不可疾貞為文王之事此不識爻義也夫南狩獲其大首武王之事也左股見傷羑里之厄也股傷而壯者猶無恙所以為文王者猶故也案離之為卦在天成象日也在地成形火也火以虚而明實而闇明夷土在火上塞而不明則明者傷矣日出地上為晝日入地下為夜明夷日入地下隠而不見則明者傷矣然離之所以為明者六二也二臣位而在下者也䝉坤難或為文王之爻承馬之壯有武王繼之之象承謂已承之壯謂三陽也然則文王作易而自言之乎曰古今天下唯有此理爾有此理則有此事有此事則有此象休咎之數不可得而逃也自後世觀之則見其當文王與紂之事云爾文王初不自以為己事也右明象占九三明夷于南狩得其大首不可疾貞賛曰南狩之志乃大得也石守道曰南者取其背暗向明狩者所以為民除害如武王救民是也王介父曰凡易之所謂戈者興事之小者也其所謂田者則興事之大者也狩則田之大者也李氏曰自初至三皆以離而蔽然初與二則明既晦矣九三重剛處離之極則將大有為反其晦而復於明故有南狩之象李去非曰幽陰之極必有至明者出而伐之南明方也大首為闇之主者也不曰元首者首上之象也上末也无元義故變文言大朱子發曰自二至上有師之體坎為北冬狩之時離為南三動之上南狩也大首元惡也得者易辭離為甲胄戈兵故象狩獲右明象程可乆曰不可疾貞者冀有悛心也以冬田為象則非疾貞也郭子和曰離之性失之過則暴故戒之以此案三隂在上据大君之位未易除也故正之不可疾耳右明占王景孟曰他卦九三與上六為正應在明夷則為至明克至暗之象鄭少梅曰南狩則上六之不明變為離明矣李季辨曰武王處明夷則以不可疾為貞箕子處明夷以利艱為貞二者各當其事也右明爻義六四入于左腹獲明夷之心于出門庭賛曰入于左腹獲心意也案以此推之乃獲六五之心楊中立曰腹坤象也坤體之下故曰左腹地道尊右故也于出門庭則與慎密而不出者異矣王介父曰與上同體以六五上六為門庭耿睎道曰二陰之象也案艮之門闕豫之重門皆以絫隂畫為象李氏曰自初至三同為離體三則武王之事自四至上同為坤體上則商末之事也盖四與上同體既親且近處腹心之地矣然左非有為之所雖處腹心而不見信任於是深知其心不可與存商則出門庭以趣周也案此爻之義最難明然以爻象觀之亦有可言者離明晦於地下今自下卦入上卦而四處上體之下則入于左腹之象也左以象言不必拘左右之辨也入其腹則獲其心矣得其心腹則往出門庭无所畏避而明不復夷自此升矣盖指九三而言陰陽之情近而相得故有此象大抵内卦為明傷為明晦外卦則明出于地照破羣陰矣用兵克獲得其腹心皆其象也諸説支離舉无足據或曰紂剖賢人之心正應此象右明象占六五其子之明夷利貞賛曰其子之貞明不可息也案五君位為人主而夷天下之明不以訓也故文王移置其象於上六以初登于天後入于地况明夷之主六五在下而承之則明夷之主之子之象也其父在上夷天下之明矣其子居明夷之時繼明夷之治利在於貞而明不可以復夷也故孔子賛之曰明不可息自後世以其為箕遂傅會於文王與紂之事甚至以爻辭為周公之作而非文王之辭盖箕子之囚放在文王羑里之後方演易時箕子之明未夷也唯李子思非之其説謂班馬止言文王演卦乂曰人更三聖世厯三古止言包犧文王孔子未嘗及周公也馬李長而下始有周公作爻辭之説絶不經見孔頴逹始引韓宣子見易象與春秋知周公之徳與周之所以王為周公爻辭之證審爾謂周公作象辭可也况春秋又將屬之周公乎此論確矣至箕子之事終不敢議委曲而為之説豈襲於王輔嗣之文而境熟乎或曰不言父而遽曰其子可乎曰易中取象不言其故多矣止如此卦初九遽曰于飛而不言何物六四遽曰入于左腹而不言何人上遽曰初登于天而不言大明此爻稱其子則上六為父可知矣以五中正故取利貞之象以告筮者使人主在上専以夷明為事則明者懼矣此聖人轉凶為吉之微意也閭丘逢辰曰以陰居陽既失於不正又在坤順之體於明夷之時其幽闇昏庸特紂之主也舉下以見上不欲直斥故但以箕子之明夷利貞為言不復更立他辭聖人之意深矣循王輔嗣作箕子唯此說差通右明象占上六不明晦初登于天後入于地賛曰初登于天照四國也後入于地失則也李子思曰明夷者有明而傷也晦其明者有明而晦也乃若上六居幽陰之極本自无明故曰不明晦言其實晦非藏明也朱子曰始則處髙位以傷人之明終必至於自傷而墜厥命故其象如此馮當可曰上已在地上反應於三為出而復入于地李去非曰初登于天因晉之象郭子和曰不明而晦其明息矣聖人原始要終言之故曰初登于天後入于地案上天之上也故離之明炎上初則有登于天之象重陰之極積地之後故離之明終不能出後則有入于地之象所謂不明而晦者此之謂也况去離之逺唯有坤土不明晦也卦因有晉初登于天也上六變為賁火在山下復入于地也易窮則變在諸卦之終則當為明登于天唯明夷坤地之積陰在上離炎上之勢至此不勝而窮故乃有入地之象易之无逹例毎如此右明象占代氏曰易以意為主此卦之意主於上六故以象闇君則君位不在五諸卦意有顃此者唯學者識之右明爻義趙氏曰初夷之始也故見幾而避之二離明之中正也故傷不至於甚而用承馬壯吉初二三同離體也故皆言明夷之可以復自六四以上則坤加離所以傷此明者也故五言利貞上言入地唯四近明夷之心故獲其心則出門庭以避之聖人為明哲之慮如此學者其母惑於傅託之說哉案自六五其子轉為箕子而孔子彖傳又以文王箕子言之言易者遂傅㑹其說以初為伯夷二為文王或以為大顛閎夭三為武王或以為文王四為微子五為箕子上為紂夫孔子所謂易之興也其當殷之末世周之盛徳當文王與紂之事謂一經之指慮患之深其辭多危爾非専為明夷一卦說也夫因文王箕子之事以六爻比𩔖之未必不合也然文王之演易所以公諸萬世豈專託意於是哉孔子亦以卦象文王彖象箕子未嘗裂爻位而分之也以箕子居五之君位文王居二之臣位豈其然乎右明六爻
