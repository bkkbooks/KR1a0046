body:
  text: 厚齋易學卷四十八宋馮椅撰易外傳第十六文言此錯雜彖象之言以文之故曰文言蓋孔子門人之所題以志篇目者也朱子發曰錯雜彖象反復成文問答往來相錯亦文也故大玄凖之以玄文林黃中曰聖門以學者執文害意故於乾卦問答而再釋之將使學者觸類而長深思而得至於坤則申言之而已他卦亦時舉一二見於説卦學者明乎乾則通乎坤明乎坤則六十二卦皆可通矣元者善之長也彖爻全以人事明之長張丈反首也元者仁也為衆善之首一隂一陽之謂道乾道也繼之者善則元亨利貞也亨利貞皆自一元而出故曰善之長以長釋元義林黃中曰穆薑云體之長以物象為義此云善之長以訓詁為義也亨者嘉之會也會者交相見之禮亨言情好之通也古稱賔客曰嘉亦以會聚之好言之以會釋亨利者義之和也言順物之宜而不相悖也以和釋利貞者事之幹也貞者固守事理之正而不可奪所謂天下之動貞夫一猶城築之楨幹也楨言其貞謂木之堅者故立以為幹以幹釋貞林黃中曰立本之謂幹君子體仁足以長人體去聲今俗作替非穆薑無君子二字仁者元之善也長善故足以長人李子思曰果木之實其中有生性者皆謂之仁此造化之本而生物之元也朱子曰體仁如體物然仁是道理以人立骨程可久曰湯武身之是也嘉會足以合禮會穆薑作德嘉好相會則禮可合謂朝聘會同燕享冠昏之事李子思曰猶隂陽之會而嘉生也利物足以和義利物者順適物情使之各得其宜而不相妨故曰足以和義貞固足以幹事朱子曰貞固者知正之所在而固守之所謂知而弗去者也故足以為事之幹遊定夫曰事以知謀物以知創而不貞則事不立李仲永曰四德不言知藏諸用也此古占語春秋時穆薑嘗言之於隨故孔子述之蓋析為四德以推廣乾之在人者也君子行此四德者故曰乾元亨利貞此孔子之所以文彖之言也遊定夫曰行此四德則乾道在我矣故曰乾元亨利貞初九曰潛龍勿用何謂也子曰龍德而隱者也乾之潛龍在人則有龍德而隱者隱諸潛也此爻內卦變巽隱伏之象楊廷秀曰龍德具矣所潛者時與位耳不易乎世易讀如天下有道丘不與易之易三人道世也九二比之則足以善世本爻逺之則不可得而易之也遊定夫曰龍德而隱故不易乎世龍德而中正故善世耿睎道曰不易乎世則獨善而已無善世之功也不成乎名君子者人之成名也見則名成隱則名泯名者人之所稱亦以去人道之逺也一無乎字非遁世無悶遁徒頓反逃也悶門遜反心悶貌去人道之逺是遁世也陽舒而明故無悶不見是而無悶亦以逺人故人不我知所為不見是於人也夫世不能易雖遁去而何憾名不可成雖非之而何損故皆曰無悶樂則行之憂則違之樂聲洛行之則不終隱也違之則勿可用也此復釋無悶張子厚曰主於求吾志而己無所求於外也確乎其不可拔釋勿用也確苦學反堅實貌拔蒲八反手出之也如朝拔一尤之拔言不為世用潛龍也此章文初九之言總結龍德而隱之義也不易乎世不成乎名身潛也遁世不見是而無悶心潛也至於樂行憂違則志亦潛矣身以心為主心以志為主志潛則心潛心潛則身潛此見之決而守之固雖欲拔而出之不可得矣李子思曰此蓋負天下至剛之德不出則處而無躊躇之志者朱子曰六爻皆以聖人明之有隱顯而無淺深也九二曰見龍在田利見大人何謂也子曰龍德而正中者也云以正中明見與大人之義蓋以正中之德處正中之位也正中言正當中也朱子曰不潛而未躍之時庸言之信庸行之謹行去聲庸平常也朱子曰常言亦信常行亦謹間邪存其誠鄭邪下有以字間限之也以言行之信謹限其邪則誠存矣蓋乾陽之誠自潛而見未嘗亡也唯防邪之害誠耳三接人道過中則邪故限之於外也蘭惠卿曰邪自外入故間之誠自我有故存之程正叔曰得正中之義處無過之地唯在間邪間邪唯在語默動靜與人交接之際如人有室藩墻不修不能防寇善世而不伐德博而化夸功曰伐相忘曰化唯存誠故言行足以善世而其德能博夫是之謂見然乾健不息使伐善而不化則其德不進矣三四言進德以此易曰見龍在田利見大人君德也此章文九二之言以君德結正中之義也石守道曰更舉易曰者欲見九二雖非君位有君之德也夫庸言庸行者言行之中也間邪言其正存誠保其中也善世而不伐德博而化得中而不敢過也凡以中正言之曰信曰謹曰間曰誠曰善世曰德博皆九之象曰庸曰不伐曰化皆二之象李季辨曰君德始著於二終盛於五大人之德當如九五質之天地日月四時鬼神無一之不合然後為君德之備然聖學自有源委若大人者言不必信行不必果而聖學之始則常言必信常行必謹間去邪念實理自存此正心誠意之學也正心誠意即治國平天下之事行言謹信之始即欲善世而德博蓋君德之發源也唯無一毫自足之心不伐而化然後進德不息竊嘗謂大易一書萬世人主聖學之用而純乾一卦萬世人主聖學之源也大抵易者理學之宗而乾坤者又易學之宗也子思孟氏言誠者天之道而先儒亦每言誠敬其源實出於此李子思曰乾之畫一一則誠坤之畫中虛虛則生敬故乾之九二言誠坤六二言敬誠敬二字蓋始於包犧之心畫而天地自然之理見於形象者也九三曰君子終日乾乾夕惕若厲無咎何謂也子曰君子進德修業以德進業修明日夕乾惕之義德以心言業以事言謂乾之德業已著於二至此當進修不已不可自安也忠信所以進德也修辭立其誠所以居業也此言進德修業之實以明終日乾乾之行事也盡己之謂忠以實之謂信書云恭儉惟德無載爾偽德者對偽之名主忠信則不偽而進於德矣修辭則言不妄立誠則行不欺言行不二則業有可居之地矣陽為實忠信與誠之象此爻變兑為口舌有修辭之象遊定夫曰言而忠信則言為德言行而忠信則行為德行蓋謂自九二之庸言庸行謹信充之進於忠信居於辭誠也程伯淳曰若以修省言辭為心則偽也唯立誠則有可居之地有可居之地則可以修業矣劉氏曰三未免危疑當以忠信與誠為德業之本修辭使人見信則誠立矣知至至之可與幾也知終終之可與存義也幾平聲及也義者當然之分也此覆言進德居業之義以明夕惕若之實也以進德言之則德無止法知可至而至之可以與之幾及也蓋如九五之與天地日月四時鬼神無不合可也以居業言之則業有成績知其可終而終之可以與之存大義也蓋如周文王之終於西伯可也接乎上卦故可以進終乎下卦故可以居審於所處惕厲之道也或曰三居人臣之極知前有可至之位而至之此害教之大者也李子思曰二已具君德矣而况於三乎乾坤純體與諸卦異乾為君六爻皆君事無臣位也坤為臣六爻皆臣事無君位也世儒未識乾坤之體安識乾坤之義此係名教之大者不可不辨是故居上位而不驕在下位而不憂是故因上文之辭緣知至知終之義以不驕不憂明無咎也上位謂下體之上下位謂上體之下爻之有位猶人之有位也德之所至則前有餘地位雖居上無足驕也不驕則能進德矣業知所終則分所當守位雖在下無足憂也不憂則能居業矣程可久曰居者不失其所之謂在則寓焉而已矣春秋書昭公之出於本國曰居它國曰在今下位稱在言其可進非常處也或曰九三之位危疑如此烏知其在下位而不憂林黃中曰以其乾乾而知之也夫乾天下之至健而德行恆易反復皆乾不離於道君子居易以俟命夫何憂之有故乾乾因其時而惕雖危無咎矣此章文九三之言以爻辭結進德修業之義謂因其進德居業之時而惕於至之終之之事也君德著於二君位尊於五自三以往無非養其德業之日而在上下之間處之尤難進德修業惕厲以趨時求為無過以合於道可也李季辨曰進此一位已有卓立之地始也庸信庸謹今則忠信已立可以為進德之基始也間邪存誠今則修辭立誠言修辭則暴慢自逺邪不待間言立誠則已履實地誠不待存言修誠立則有業可居然聖學無止法進德一念不容少息中間多少工夫何暇驕且憂哉九四曰或躍在淵無咎何謂也子曰上下無常非為邪也進退無恆非離羣也上下並上聲言升降也為離並去聲以上下進退明躍與在淵以非為邪離羣明無咎之義上與進言其躍下與退言在淵也上下宜有常度今無常度疑其為邪而志在於德則非為邪也進退宜有恆所今無恆所則疑其離羣而志在於業則非離羣也躍有邪正之分淵為羣龍之宅位不當非正也躍則離羣也故以非為邪離羣言之常猶定恆久也君子進德修業欲及時也所以上下進退者以此故無咎此章文九四之言以德業欲及時結爻辭之義朱子曰內卦以德學言外卦以時位言進德修業九三備矣此則欲及時而進也毛伯玉曰明其不可中止李氏宏曰三四皆中爻其辭略同然三下體故詳於德業四上體故上下進退之時不可失也蘭惠卿曰與進無咎之意同有勉之之意林黃中曰以九居四有上下進退之象以九居上有得喪存亡之義夫豈苟云乎哉九五曰飛龍在天利見大人何謂也子曰同聲相應同氣相求此下以同類相感明天下利見大人之義應去聲後不再出者並同如嚶其鳴矣求其友聲是也謂之相應則此鳴彼應彼鳴此應也同氣相求如下文是也借上句以發此句之指水流濕火就燥雲從龍風從虎此皆同氣相求以明同類之感也卑則濕水潤下故流之水求濕也髙則燥火炎上故就之火求燥也雲水氣龍水族故雲求龍也猛虎嘯谷風生故風求虎也聖人作而萬物覩聖人言大人也道曰大德曰聖作起也龍飛之象萬物者人民夷狄鳥獸之總稱覩謂利見也程可久曰贊言聖人者七皆以政教及乎天下者言之本乎天者親上本乎地者親下則各從其類也此章文九五之言此覆釋上意以結爻辭之義本乎天謂火與雲也親上謂就燥從龍也本乎地謂水與風也親下謂流濕從虎也上下各從其類火從燥雲從龍水從濕風從虎也亦舉一隅以言之聖人與萬物並生於天地上下之間是亦同類故利見而覩之蓋全舉六爻之象也水坎象乾再索九二也下濕則謂初矣火離象九五之變也髙燥則謂上矣雲坎氣之上騰謂九三之變也龍者上卦之乾一索得震之象下體之上則親上也虎者九三變兑之象風者九四變巽之象上體之下則親下也或曰聖人之於民類也不曰萬民而曰萬物覩何也曰以殊分言之則有人物之别以三極言之則命於上下之間者皆同類也舉物則兼人舉人則遺物矣聖人者民物之主苟作於上則下斯覩之民物何擇焉韓退之原人粗知此意而語焉未粹者也或謂萬物覩乃欲見之楊中立曰非也如日在天萬物皆見聖人不作作則萬物覩之矣李仲永曰聖人不作父子兄弟妻子有不相保者况於物乎聖人有作山川鬼神亦莫不寧鳥獸魚鱉咸若况於人乎上九曰亢龍有悔何謂也子曰貴而無位髙而無民賢人在下位而無輔是以動而有悔也貴而無位謂尊於一卦之上而無五之位髙而無民謂極於一卦之上而逺於初之民賢人在下位而無輔謂九二應五而不應上是以動而有悔也此章文上九之言以九之動結爻辭之義蓋七則無朕九則動而吉凶悔吝之所生也以貴髙者亢之義而上之象無位與民輔者有悔之義也蓋位者九五之位民者九五之民賢人者九五之輔過五則亢固應有悔如此然用靜吉用作凶苟能謹守靜處不交物涉害雖凶其如子何孔子以動之一辭發明文王占外之意然則不動則雖亢而悔可亡矣潛龍勿用下也此至用九一節以位明人事蓋文用九之言也下去聲經中唯此與井初二兩爻贊皆讀如今聲在下位故不可用馮氏曰居下位而欲為上禍斯及之矣見龍在田時舍也舍去聲止也與出舍於郊之舍同適止此位非久安也終日乾乾行事也行其位之事楊庭秀曰必有事焉非事則乾乾為無益之勤或躍在淵自試也四位近五未遽有為故試其可如試可乃己之試謂躍也飛龍在天上治也上去聲治平聲居上位而治天下亢龍有悔窮之災也災將來反天災曰災位窮於上而不知變則災至窮極也數極而位亦極乾元用九天下治也治叶平聲陽上窮之亢窮則變而反本反本則亨故乾以元而用九之變天下所以常治九不自用必有乾元之德乃能用之此孔子發明辭外之意李子思曰孔子贊彖曰大哉乾元此曰乾元用九四德獨舉一元何也曰亨利貞同出於一元如循環然乾道之終則一元復用矣都聖與曰見言在中將有為也潛而勿用以其在下而已飛龍而在天乃其所也見而在田則時舍而已過中故行事而不敢怠有疑故自試而不能釋得位則居上而治過上則勢窮而災夫天下治亂未嘗不在乎君也中則治過則亢居尊位大中而能用九以通其變則不至於亢矣此所以積上治而成天下之治也馮氏曰乾道始於初九之潛馴致九五而成上九而極以人事言之人君非一身遽能有此天下亦祖宗垂統相承以至於今然則氣之始乾之元也氣之極乾之亢也草昧創業者有國之元也極治而驕侈者有國之亢也使人主當極治之時能用其祖宗艱難創業之心為心體乾用剛內以制一己之欲外以裁天下之過則其極無極其窮無窮亦猶四時循環而天道自若安有危亡之事哉潛龍勿用陽氣潛藏此下一節以時明天運申文用九之言也藏與下韻明行皆張口聲陽氣入伏地下乃潛藏之時故不可用亦內卦變巽之義孔子釋潛曰隱曰下曰藏隨事制義無不可也見龍在田天下文明陽氣外達乃文明之時故曰見內卦變離之象文謂物之鮮榮明謂化之光顯終日乾乾與時偕行天運將變乃與之偕行之時故終日乾乾天運有變而無頃刻之息聖人懼夫人德業之止故欲其與時偕行而無有間斷也卦變履有行象或躍在淵乾道乃革或躍在淵乾道乃革上卦更始乃乾道革變之時故必躍而無咎革言更始也即所謂乾道變化也以卦言之筮得乾下復筮上卦革之義也以氣言之天地相去八萬四千里上四萬二千里為陽位下四萬二千里為隂位冬至之後陽氣自地下而升凡五日一候三候一氣一氣升七千里至春分十八候六氣為四萬二千里乃入陽位變寒為溫乾道之革也卦變小畜夫妻反目之象飛龍在天乃位乎天德陽氣在天乃位天德之時以當大人之造五應天之德位乎五是乃位乎天德也卦變大有元亨之象亢龍有悔與時偕極氣數以窮乃與之偕極之時故亢而有悔極者室柱之最髙者也此卦變夬之象此一節全體以卦變言之蘭惠卿曰過此則一隂生故時之極此章多以氣候明之楊廷秀曰暑極不生暑而生寒治極不生治而生亂故戒之程正叔曰時極則處時者亦極矣李氏宏曰時行而偕行可也時極而偕極則為不知變乾元用九乃見天則乾元用九乃見天則則者法之體如權衡有則而不可過也時不極則變不用有元以用變則得中不過而天道之則見矣不用七而用九九變七不變故也遊定夫曰將來者進功成者退天之則也都聖與曰孔子釋乾之六爻者三贊言其理以爻義明之而前章言其位以人事明之此章言其時以天運明之蓋孔子文言凡再釋乾義此章當在其唯聖人乎之後今繼前章者以其義相蒙也夫有其位必有其時二者相遇然後為之而成王景孟曰位者人之所居也時者天之所運也即天與人互明之而用九之義著矣李仲永曰此二章文用九之言用九不可見見於六爻在潛而下在見而舍在乾乾而行事在躍自試在飛則治在亢則窮窮則變變則通通則久故用九在六爻而天下治也此以人事言也潛藏於初文明於二時行於三道革於四位天德於五時極則終矣終則有始天行也天行有度故用九在六爻而乃見天則此以天運言也斯言也意必有所授云張知常曰此章以天運申前章之義陽氣潛藏聖人所以在下天下文明所以時出而舍與時偕行所以行其能事乾道乃革所以進而自試乃位乎天德所以居上而治與時偕極所以處窮而災乃見天則所以常治而不亂林黃中曰此章言上下卦之應初四為始初則潛藏而四乃革矣言革潛為躍也二五為中二則文明而五乃位天德矣言德稱其位也三上為終三則與時偕行而上則偕極矣言道窮而當反也此章二節皆協韻乾元者始而亨者也利貞者性情也此至天下平一章因用九而申乾元之義以文彖之言而繼以乾之體用明之元者四德之首故夫子常以配乾蓋乾道至頥其流行發見者皆一元之氣也天地之間萬物所資以始所謂乾知大始者一元主其事也始則必亨不亨則熄矣至於收藏歸斂乃情性之實蓋元亨者氣形之始而亨也利貞者性情之利而正也互文以見爾毛伯玉曰元亨利貞於人為氣形情性朱子曰乾唯一性情爾始而亨是性情發用處至利貞則一物具一性情百榖草木皆然李子思曰孔子每兼利貞言之者性情合為一也性情合一乃見天命知此則凡孔子於易所言性命皆可通矣性情鄭作情性意以情言利以性言貞也殊不知四德性則皆性情則皆情氣形性情各以其盛者言之爾性情情性初無後先孔子但協韻語猶正中中正止取其聲之協也馮氏曰孔子於易多為韻語亨情精情天下皆協乾始能以美利利天下不言所利大矣哉能鄭作而孔子於四德每以元為主而繼以亨貞罕言利也懼人以利為可略至此合而為一歸宿於利以見乾之利如此之大而包亨貞言之凡以明四德之不可一闕也亨者嘉之會合而言之所謂美利也不言利者對坤而言如言利牝馬之貞則貞不足於乾矣文王不言貞之所利者舉天下之貞無一非乾始之利不可指名也大矣哉云者嘆而有不盡之意大哉乾乎因嘆乾元之大而悟乾之全體若是其大也乾猶父元猶長子觀子而知父也剛健中正純粹精也六爻發揮旁通情也此乾之大之體也剛健中正乃元亨利貞之所從出也六爻發揮乃旁通元亨利貞之情也剛者純陽之精無一毫之隂故融而為元健者純陽之運無一息之止故達而為亨中則不倚而利為天下之平正則不偏而貞為萬事之幹以六畫觀之內剛健外中正凡內乾之卦雖遇艮止坎險亦必上進剛健故也在外卦則以九居五以上臨下故為中正程可久曰大有大畜乾在內曰剛健訟乾在外曰中正是也剛健中正散在諸卦未有不雜於隂者乾則純粹而精純言不雜粹言不駁精言純粹之極也內外皆乾故謂之純無隂駁陽故謂之粹內外合一故謂之精唯其四者之純粹而精所以出為四德也凡孔子之所以反復言四德者於此盡發其緼以詔天下萬世焉程可久曰乾之為時者一所以發越揮散旁通其情者六相對相變以合天之十二次或曰純坤亦有四德不言純粹精諸卦發揮亦有六爻何以乾獨言旁通情也曰坤畫耦耦則不可言粹耦則二二則不可言精至於諸卦六爻止各通其一卦之情旁通元亨利貞之情則唯乾也馮氏曰純粹精旁通情以御天皆以三語結上文或以為七德六德者過矣朱子曰旁通猶言曲盡時乘六龍以御天也雲行雨施天下平也此乾之大之用也乾各以其時乘此六陽之氣以御天運則雲行雨施天下均被其澤所謂能以美利利天下此其功用也彖贊天字亦協成字韻意古語之音協也毛伯玉曰以元包亨利貞猶春秋以春包四時也李氏宏曰彖贊言雲行雨施而後言六位六龍者蓋以雲行雨施起其用而六位六龍繼其用於後也此言六爻六龍而後言雲行雨施者蓋以雲行而施終其功而六爻六龍致其功於前也李仲永曰此一章文乾元亨利貞之言元始而亨者一元之出也利貞性情者一元之入也剛健中正純粹精者一元之合也六爻發揮旁通情者一元之散也時乘六龍以御天者一元之升也雲行雨施天下平者一元之降也出入合散升降不離乎一元所以見乾元之大也竊謂剛健中正以下槩言乾而元在其中李子思曰孔子之論元亨利貞或分而言之或繼而言之或離而言之或合而言之縱之衡之而於理無一不契蓋其胸中元自有乾坤所以流出於議論之間而辭無不達也君子以成德為行日可見之行也潛之為言也隱而未見行而未成是以君子弗用也此下再文六爻之言以釋前章未盡之意此初九也行並去聲見並清聲前章言德之潛此言行之潛德潛則不求用行潛則未可用成德成人之德如仁人善人信人之類乃以仁善信為行也德成者行日可見雖欲隱而不可得已今德隱於下而未見於世行在於己而未成其名世莫之知故未可用也文王言勿用謂不可用也孔子言弗用謂未肯用也李氏宏曰不成乎名則方且退藏不欲其名之彰也至於德行君子雖處幽潛未嘗一日廢也行無隱而不形曰未見曰未成者終於見且成也九二是已李子思曰行見而成則可用未見未成則弗用也潛藏於下不汲汲於用所謂龍蛇之蟄以存身也君子學以聚之問以辨之寬以居之仁以行之易曰見龍在田利見大人君德也此申前章君德未盡之意深明九二之為大人也四之字皆指君德朱子曰由四者以成大人之德李季辨曰言行信謹間邪存誠學問之功也善世不伐德博而化寬仁之驗也都聖與曰外剛故言學問內柔故言寬仁劉氏翔曰四者皆田之象基於積土聚之也成於敷災辨之也地必平衍寬也功主利養仁也郭子和曰學聚問辨寬居者期於仁以行之耳初九行而未成故仁以行之為九二之事仁以行之則德之所施者普矣大抵乾之六爻君德具焉養於初著於二日新於四而輝光於五至上終焉竊嘗因文言合乾坤而觀之於九二六二之傳有以知聖學之淵源有自來也九二言誠而六二言敬則誠敬之學本乎此也九二言仁而六二言義則仁義之學本乎此也此子思孟氏之學所為傳得其宗也與孔子又懼後世以乾坤為聖賢之辨而賢者以下不可企及於聖人亢聖人於髙明而不知尊德性道問學也則又於乾九二言學問以見聖人不可以無學而坤六二言不習以見賢者亦可以造聖人之域此所以為孔氏之易之學而有功於天下萬世也九三重剛而不中上不在天下不在田故乾乾因其時而惕雖危無咎矣上去聲九四同此以位申前章德業未盡之義以明其位之危故不能無憂懼也九三九四題爻位者諸爻以君子大人起義此兩爻不可遽言重剛不中故題爻位以代大人君子之稱也因其時謂日夕之時李去非曰以六爻言之則三四為中今以居重剛之間則中在二五而不在三四李季辨曰卦重乾故曰重剛上不在九五之天下不在九二之田其位危而不安故惕李仲永曰上不在天下不在田則中在人矣故稱乾乾之君子而不言龍也不得中而行過中之事恐懼修省以補過故無咎都聖與曰聖人與人為徒不能無憂疑也然憂其所當憂乃卒乎無憂疑其所當疑乃卒乎無疑此三四所以皆無咎也李子思曰初二兩爻以德言三四兩爻以位言此所以錯雜成文以盡六爻之義也鄭舜舉曰聖人亦有不中乎曰聖人之德無不中也時與位之不中聖人之所以兢兢也所遇然爾竊觀孔子論六位之中初無定説以八卦言之則下卦之中在二上卦之中在五以六位言之則初上為上下而中在二三四五故大過謂剛過而中説卦謂非其中爻不備以三極言之初二在下為地五六在上為天而三四在中為人故中孚以三四為中今乾乃以三四為不中者以二體取中也中無定用故無定位亦無定説故曰君子而時中執中無權猶執一也九四重剛而不中上不在天下不在田中不在人故或之或之者疑之也故無咎此以位申前章德業未盡之義以明其疑於上下之間也天人與田皆不在者明其在淵也疑者謂疑於所處隨時而未定也劉氏翔曰三於下之中也過之四於上之中也不及故皆不中孔仲達曰人道親地三居之矣四下逺於地上近於天非人所處蘭惠卿曰居逼近之地使其彰灼自顯安能免咎唯其進退疑慮不輕所發所以無咎也夫大人者與天地合其德與日月合其明與四時合其序與鬼神合其吉凶夫聲符發語之端後皆倣此此至况於鬼神乎一章以大人之德申九五前章未盡之意此言其德合造化之體也以此合彼猶符節然謂之合程可久曰天地之德生成萬物日月之明照臨萬物四時之序運行萬物鬼神之吉凶禍福萬物蓋聖人作而萬物覩以此先天而天弗違後天而奉天時天且弗違而况于人乎况于鬼神乎此言德合造化之用也先後並去聲造化莫大於天或先或後無往不合蓋在天在我者同此乾道也時之未至則先天以為之而天不違我非不違我不能違乾也時之既至則後天以奉之而我不違天非不違天不能違乾也天且不違况人與鬼神聽命於天者尚得而違之乎無怪乎日月四時無一之不合也李子思曰太極分而為隂陽隂陽分而為萬類九五之所謂大人者能充太極而體乾之大而默運隂陽故凡受隂陽之氣者無不合也天也日也春夏也神也則陽也地也月也秋冬也鬼也則隂也蘭惠卿曰聖材使隂陽則可以位置天地明昭日月序正四時驅役鬼神夫豈有不合者哉竊謂九五一卦之主故文言每兼一卦之象先天者謂乾下先乾上之天也後天者謂乾上後乾下之天也德合天地者初上卑髙以陳也明合日月者二五中正坎離之位也序合四時者六位之序也吉凶合鬼神者文之當不當也亢之為言也知進而不知退知存而不知亡知得而不知喪喪去聲聖或作愚非此章至終申上九前章未盡之義以三者明亢而因嘆非聖人不能處此孔子於初上之潛亢曰之為言以其為本末而表出之其唯聖人乎知進退存亡而不失其正者其唯聖人乎始若設問而卒自應之也一説以前其唯聖人乎至此為申文用九之言不言得喪者知進退存亡則無得喪矣進退者身也存亡者位也得喪者物也天下之理未有有進而無退有存而無亡者唯處之得其正則斯無悔矣本爻窮上反下則退矣九變六則亡矣無民無輔則喪矣正者貞也元亨利貞貞配上九也易於乾先言君子通上下言之也次言大人以德位言之也孔子至此再三感嘆而歸之聖人蓋非有聖人力量地位不能處此也李子思曰易之道一言以蔽之曰中而已天數中於五隂極則剝乾上則亢昔之知易之道者觀進退存亡得喪之象於爻位之表每每達權而用中不待其至於亢而後用夫然故進退存亡之際而不失其正也正者貞也此乾元之用之所歸宿而孔子論聖人之體乾亦歸於正也故豫每以利貞為乾之性情而易學之根抵云都聖與曰唯聖人乃能用九而不亢是猶天之氣不能無愆陽而天之道則變通而未嘗有弊也李氏宏曰堯舜相禪所以髙乎千古者其知此乎雖然必得九五之大人然後可以去亢而知退特堯舜之細爾張知常曰持滿有道天下所以常治而不亂也毛伯玉曰志得意滿般樂怠傲是之謂亢夙夜祗懼不敢荒寧是之謂乾九五之重在位故曰大人上九之戒在亢故曰聖人同是一人也所從言之者異耳竊謂合為一人觀之可也各為一人言之義亦有在也李之説進退之正也張毛之説存亡之正也坤至柔而動也剛至靜而德方此文坤彖元亨利牝馬貞之言至柔而動剛者坤之元而亨也至靜而德方者利於牝馬之貞也至柔者坤之材也而剛則其材之動也動則一元之氣闢而亨矣至靜者坤之性也而方則其性之德也靜則一元之氣翕而貞矣孰不為柔而坤則柔之至也孰不為靜而坤則靜之至也以六畫觀無一非耦則其材之柔其性之靜可謂至也已矣故一爻動則一爻剛矣使有一畫竒則動不為剛矣竒數圓而生耦數方而成使有一畫竒則靜不為方矣此純坤之象也方謂生物有常石守道曰若播榖求黍不可得也張子厚曰柔亦有剛靜亦有動但舉一體則有屈信動靜終始李子思曰以天為陽地為隂天為剛地為柔亦各指其盛者而言之爾要之隂陽之氣剛柔之體在兩間大率均有蘭惠卿曰坤之靜翕動闢立地之道曰柔與剛後得主而有常含萬物而化光此文彖先迷後得主利之言順故自後而得乾之主靜故有常以隂含陽萬物生生之理具焉故其化生光明此坤之所以為利化猶卵之孚也六三曰隂雖有美含之以從王事應此美也坤道其順乎承天而時行此文彖東北喪朋安貞吉之言且以結坤彖之義也東北喪朋乃順乾而承之也故安於坤道之貞承之而時行乾之所至者時也乾行則坤亦行未見乾行而坤止也此坤之所以為順也李去非曰二分王於四季者以時行也蘭惠卿曰承天之施而與之偕行馮氏曰乾之文言則贊曰四德至坤則含四德而贊牝馬柔順之意坤之所以别於乾者特以加牝馬二字爾此别乾健坤順君尊臣卑之綱領也始以柔終以順是坤之文言專為牝馬二字而設朱子曰此章申彖贊之意積善之家必有餘慶積不善之家必有餘殃臣弒其君子弒其父非一朝一夕之故其所由來者漸矣由辨之不早辨也此下至蓋言順也文初六之言猶曰積陽之後必有餘暑積隂之後必有餘寒也蓋霜至堅氷者積隂之所致也程正叔曰善惡萌於初而積善見於六五積惡見於上六林黃中曰説者皆以餘慶餘殃言子孫報應之事非也君君臣臣父父子子斯為慶矣臣弒其君子弒其父殃莫大焉李子思曰善不善之積於隂非一朝一夕之故也又曰以易道而占知吉凶之事於將來者無如是之不爽也弒式志反或作殺聲同辨鼂云今變王符作變初六在下臣子之象上六在上君父之象自初至上則由姤至剝而成坤歷變諸爻非一朝一夕之故也自姤而遁遁而否否而觀觀而剝剝而坤其所由來者有漸使節節有變之者則不至純隂矣由變之不早遂至於純隂履霜而至堅氷臣子而弒君父也又以八卦之方位與重卦十二月之氣參之乾位西北正十月之時也卦氣至此為坤以坤之氣乘乾之位尊卑倒置爻象為龍戰於野此臣子弒君父之象也聖人移上六之象於初六言之所以丁寧告戒使人知漸不可長變必早速履霜而即備其堅氷也易曰履霜堅氷至蓋言順也結此爻之意坤為順自下而往上以隂消陽無陽爻以阻之故其勢順爾朱子曰古順慎通用此義當作慎直其正也方其義也此以下至不疑其所行也文六二之言此謂直方大也蓋直者六二之正而方者六二之義也蘭惠卿曰以隂居隂正也隂為義義則方京氏曰坤以至順為正乃能因物之性以為直坤以有常為義乃能循物之分以為方林黃中曰由爻象而言則直為正方為中由德而言則直為正方為義君子敬以直內義以方外敬義立而德不孤直方大明君子體坤六二之德見於修身者也敬主一而無適之謂正在六二君子體之而為敬義在六二君子體之而為時措之宜都聖與曰坤者地道也君子者人道也人道以敬存心則不舍正以從邪內外不可以孤立必敬立於內義立於外並立則為德不孤此直方之所以至於大也楊廷秀曰爻辭止言直方文言以正釋直以敬釋正以義釋方其曉學者至矣敬以直內則養心主一而不分義以方外則處物適宜而不隨朱子曰正謂本體義謂裁制敬則本體之守也不孤言大也程正叔曰敬立而內直義形而外方義形於外也敬義既立其德盛矣不期大而大矣程伯淳曰乾卦言聖人之學坤卦言賢人之學李子思曰文言字字皆有位置乾之二言誠而坤之二言敬誠敬者乾坤之别也先儒論誠敬之學起於此乾之二言仁而坤之二言義仁義者隂陽之辨也先儒論仁義之用取諸此劉器之曰君子敬以直內敬當作政深衣篇云直其政政者正也古當通用敬與政文相似故傳之者訛爾未知孰是不習無不利則不疑其所行也明君子體坤之德而行之不疑以釋不習無不利且總結此爻之意隂善疑以隂居隂本有疑也以中正故不疑朱子曰疑故習而後利不疑則何假於習都聖與曰地之所以生物者直方而已何習之有君子之所以事君者直方而已何疑之有李季辨曰坤之德二已盡之矣自三以往則出而見於事業者也故三即從王事隂雖有美含之以從王事弗敢成也此以下至代有終也文六三之言以美釋章含藏之而弗敢成其美以從王事也荀慈明曰坤隂也位有伏陽含藏不顯以待乾命李子思曰天地之間萬物粲然而陳者皆隂麗於陽其美外見者也六三六五皆以隂居陽故三有美而五美在其中三方進而位不中故雖有美而含之五正位而居體故美在其中而發於事業耿睎道曰弗敢者於分有所不敢非其材有所不能也地道也妻道也臣道也地道無成而代有終也李去非曰地道妻道臣道者皆主乾也地終天功臣終君事婦終夫業李氏曰初言地道妻道以明臣道而終獨言地道者互見也程可久曰自陽始生而至於極隂特輔陽而行弗敢成也及陽靜而專隂乃代陽終其事天地變化草木蕃天地閉賢人隱易曰括囊無咎無譽蓋言謹也此文六四之言蕃伐袁反盛多貌李仲永曰乾至四乾道乃革則天地交而泰矣草木尚蕃况於人乎坤至四天地閉則天地不交而否矣賢人且隱况於物乎李去非曰括囊非以全身也時至於不可奈何則謹以待之林黃中曰天地閉塞賢人遁藏殺其身而無益也是以杜其口而不出君子黃中通理正位居體美在其中而暢于四支發于事業美之至也文六五之言暢敕亮反黃者色之美在中其文理通暢於外也此釋黃義也黃地之色也以明臣道也正臣之位而不辭居臣之體而不僭此釋常義也謂是所以為元吉也恐人難曉又覆釋之曰黃中者美在其中也通理者暢於四肢也正位居體者以此發於事業也其美如此之至是以謂之元吉也馮氏曰唯其由𠂻之誠表見於外如黃之染絲自中通理表裏如一斯有以釋天下之疑理者肌理之理自中通表故曰暢於四肢也程可久曰道窮則變中則通位過則危正則安亦一説也李子思曰美在其中根諸純懿此臯夔稷契之德孔子所謂正位居體者人臣之正也説者謂五君位在臣則猶新室在妻則猶武氏然得為正位居體者乎此係名教之大者不可以不辨又曰誠而見於變化者乾之九五也敬而見於事業者坤之六五也乾之九五堯舜之君也坤之六五臯夔稷契之臣也坤六五之應在乾之九五堯舜臯夔之遇合也堯舜之典謨即乾坤二卦之辭見於功用者也乾坤定體一純而不雜與諸卦六爻自為配應之例不同李季辨曰六五之事業設施非一日之積也蓋自六二坤德以備事業自當如此説者謂黃中色常下服五君位故有居中處下之戒然文王孔子無此意也初上已戒之而五又有戒是坤無德之可取也當從象贊文言隂疑于陽必戰為其嫌于無陽也故稱龍焉猶未離其類也故稱血焉夫玄黃者天地之雜也天玄而地黃文上六之言疑或作凝嫌或作謙嗛皆非離去聲朱子曰疑謂鈞敵無小大之差王介父曰嫌與春秋不以嫌代嫌之嫌同疑與臣疑於君之疑同蘭惠卿曰凡物各當其分則無疑為臣而疑其君則自歉而反疑其君為下而抗其上則自歉而反其上臣而疑其君下而疑其上則必戰李子思曰隂極無陽於理為嫌故稱龍龍出而戰隂必先傷故稱血郭子和曰上六之戰不稱龍以明之無以知其與陽戰也為其嫌於無陽而言戰也故稱龍蓋俱隂無戰故也因其稱龍故稱血因其稱血故稱玄黃從其類而言此爻辭之大法也厚齋易學卷四十八
