body:
  text: 厚齋易學卷九宋馮椅撰易輯傳第五經上篇小畜履乾下巽上小畜正義曰陽之上升隂能畜之趙氏曰三陽方長而六四居上卦之下以限隔之下三陽不得以進于上而上之二陽不得以接乎下此其所以能畜陽也程正叔曰巽隂也其體柔伏唯能以巽入柔其剛健非能力制之也林慎微曰實不能以容實虛則能之剛不能以受剛柔則能之案乾陽之尊非在下之物其在下勢必上復然上卦遇坤震兑則皆以陽消隂遇離則五陽宗乎六五皆無所阻遏也唯遇坎之險則為需遇艮之止則為大畜不得上復也若夫遇巽之柔乃為小畜何邪六四以一隂當三陽之路間二陽於外而不得上達雖九五同德在上而四得位近君其情相得三陽不獲伸此小之所以能畜大也天下之理柔能制剛弱能勝強矢能破木石而不能以穿幕帟何則柔其鋭而漸殺其力也此巽之所以為畜乾之道歟贊曰柔得位而上下應之曰小畜案一隂五陽則一隂為主此孔子論易之例非必包犧文王命卦之意也雜卦曰小畜寡也朱子曰以隂畜陽能系而不能固以為所畜者小也亦有此義程可久曰陽為君隂為臣小畜人臣之藴畜也張敬夫曰以大畜小以陽畜隂天地之大經古今之通義也然而事有出於一時不獨天下國家凡百君子之欲行事小人得以擾系之大事之將就小物得以邀沮之皆小畜也此以小畜言之胡周父曰文王當紂之時左右皆纎人終不能以止其進以此知文王之志在明夷而道在小畜也朱子曰文王衍易於羑里視周為西方所謂自我西郊我文王自謂也正小畜之時也毛伯玉曰文王觀象而適有會於心故以其所遭者言之其事則文王其象則自有君臣以來有之矣此以文王言之鄭少梅曰大小畜之異唯在五位一爻小畜五滿假權歸四大畜五謙虛權歸已得權者畜人失權者畜於人是説可以為人主之戒然小大以隂陽言謂艮巽之畜乾也巽以一隂入於二陽之下小其所畜也艮以二隂虛而受之一陽止之於外大其所畜也三陽之進六四以近臣得君而畜之六五以君得四而畜之事體有小大之異此兼以大畜言之右明卦義象贊曰風行天上小畜君子以懿文德右明卦用序卦曰比必有所畜故受之以小畜李子思曰乾坤試三子以用事又以身試險阻而三女未用事也故以乾遇巽兑而為小畜履師比五隂一陽之卦畜履則五陽一隂之卦也五隂一陽一陽居上下卦之中五陽一隂一隂居六位之中此聖人序易之指可得而見者也乾遇三女亦象之可見如此比必有所畜則其事理然也右明卦序亨贊曰健而巽剛中而志行乃亨案孔子贊彖多言卦材此孔子之例上九之雨豈非亨乎天下之理未有畜而不亨者説者止述孔子之意而文王之指隱矣右明卦象密雲不雨自我西郊贊曰密雲不雨尚往也自我西郊施未行也王輔嗣曰陽上薄隂隂能固之然而蒸而為雨下方尚往施豈得行李季辨曰卦言不雨畜未成也上九既雨畜道成也楊中立曰雲者陽氣之上升也一隂畜之未能上達達則交通成和而為雨矣蘭惠卿曰凡隂陽適相當而和則雨隂過不及則不雨小畜隂不及也小過隂過也故皆不雨又曰凡易言西郊西鄰西山皆自隂爻所致也李子思曰小畜小過皆隂之用事故止為密雲而不能為雨澤又曰不雨言身則亨矣而澤未及乎天下也程可久曰不雨者未能施澤也人臣道盛而未得君之象程正叔曰雲之畜聚雖密而不成雨者自西郊故也西郊隂所凡雨須陽倡乃成雲氣之興皆自四逺故曰郊據四而言故云自我李仲永曰一隂為主也案建寅之月中氣為雨水是月也地氣上騰天氣下降隂陽交通而成和所以為雨也天降時雨山川出雲雲者山澤之氣蒸而上騰者也小畜之六四阻三陽之進而不能達小過之六五渝二陽之氣而不固故皆為密雲不雨自我西郊密雲者隂陽相比而未通自我西郊者小畜之不雨以六四小過之不雨以六五也何也六四互體六五約象皆成兑兑正西也郊者天地之際也雲者兑澤之氣也小畜阻遏三陽小過包畜二陽隂陽皆失交通之義故爾右明卦占初九復自道何其咎吉贊曰復自道其義吉也劉長民曰凡陽上升曰復陳氏曰三陽同升已為類首張敬夫曰巽柔非在上之物而乾剛不可久沈於下故聖人每戒焉初與二乾也故初九曰復自道九二曰牽復吉言陽不可久居乎下必將以復其位矣李子思曰四已之正應而上應之是復自正道它爻則非其應以當權用事而強畜之爾石守道曰三陽唯初九與六四為正應四巽隂爻不能制剛不拒初九之路案以二體言之則以巽隂畜乾陽也以全卦言之則以一隂畜五陽也以六爻言之則柔不能力制故初二上復至三而止四五有孚至上而始雨也以卦變言之一隂在下之卦當以巽承乾今六自初升四九自四降初乾巽易位陽升隂降則九復四六降初乃其道也九自初復四猶有五上二爻畜道未悖也何咎之有右明象程正叔曰言無咎者如是則無咎矣雖爻義本善亦不害於道不如是則有咎之義初乃由其道而行無有過咎故云何其咎言無咎之甚明也程可久曰以其非補過故不曰無咎案無咎甚明而猶云爾者畜之時恐疑於進則有咎故以此開之然有如三之輿説輹焉得無咎右明占九二牽復吉贊曰牽復在中亦不自失也陳氏曰二陽之中同乾之體上下牽引亦能獲復朱子曰三陽志同而九二漸近於隂以其剛中故能與初九牽連而復亦吉道也程正叔曰遂其復則離畜矣乎曰凡爻之辭皆謂如是則可若已然則時已過矣尚何戒乎案凡在下卦之中者類有援初與三之意蓋同體居中也同舟遇風胡越相救况同德而受畜者乎唯其小有所畜故三陽相挻以復則不能制矣况九五同德以應乎使恃其中行獨復則必為之畜矣由其在中與上下以俱進是以吉也雖然若大畜之世雖三陽並進亦末如之何已右明象占九三車説輹夫妻反目贊曰夫妻反目不能正室也陸氏曰三成車二為輹居中三往趣上二下牽初説輹之象馮當可曰居健之極切比畜主使得進則四無全理五方從四委任之專三豈能排者案乾為圜三陽上載有車象爻變兑互體亦兑為毁折説輹之象右明象林黃中曰聖人體天地法隂陽制為夫婦室家之禮剛上而柔下男行而女隨然後可以長久孔子曰不能正室謂九在下而六在上也張舜元曰巽為多白眼反目之象案妻在上夫在下反目者妻視夫也巽多白眼亦為反也右明占朱子曰九三亦欲上進迫近於隂為所系畜不能自進故有車説之象然志剛不能平而與之爭故又有夫妻反目之占李子思曰陽欲進而隂制之進比而不相得之象案健極而力窮則易制下終而上間則易止以陽遇隂則相與以剛過柔則不爭此車之所以説輹而進也然乾陽之健非終安於下而不上復者上復則必與四爭已居下而四居上有夫妻反目相視不平之象巽多白眼因以象之且夫文章之有聲韻從古然矣易亦多為韻語此爻説輹反目是也至孔子之贊則非韻語者蓋寡右明爻義六四有孚血去惕出無咎贊曰有孚惕出上合志也林黃中曰有乎承五也血惕乘三也五陽與四本皆相求惟乾三陽上進而已欲畜之則為敵矣上九又逺矣已為成卦之主而五為君位位密近而相孚故有孚言孚於五也右明象石守道曰言血者陽犯隂也都聖與曰血言其傷也去言知所避也惕言知所戒也出言外比於五也朱子發曰五君位體巽四近而相得信孚於上三陽務進四以一隂乘之若畜之以力隂陽相傷可不懼乎楊中立曰為一卦之主而下當三陽之進勢不足以畜之則傷而去惕而出矣李子思曰九五之君同為巽體信而任之乾陽健進強畜止之乾雖説輻而四亦不能無傷傷而去懼而出依九五四五相信必賴以免咎非九五合志則一隂豈足以敵三陽需之三陽並進九三雖曰致寇而六四則曰需于血出自穴今小畜三陽並進九三雖曰説輻而六四則曰血去惕出隂陽相迫不能無傷而聖人必使隂避陽著以為訓雖六四一卦之主不少假借也趙説同案説者多以血除惕散為解然需之六四其象正同比類觀之則是以血而去以惕而出也以傷而去位以懼而出避不力制三陽之進也聖人于隂陽之際兩致其戒故需之九三則言其致寇小畜之九三則言其説輹戒三陽也需之六四則言其傷而出穴小畜之六四則言其傷去而惕出戒六四也使陽知止健而隂知避陽則兩不相傷而各得其道矣或傷而去或避而出遜其鋒而殺其鋭此又巽之所以為畜乾之道也右明占王景孟曰易雖以陽為君子隂為小人而以六居四者凡三十又二非必皆小人也不然人臣之以剛居陽而槩謂之君子可乎案以一隂畜五陽居大臣之位有孚於大君以柔巽而知所避不可謂之小人也李子思曰比豫之九四得君得權則同而隂陽之質則異故豫之九四與小畜之六四爻辭休咎相去甚逺聖人與陽而不與隂如此鄭舜舉曰苟非巽順則為權臣矣右明爻義九五有孚攣如富以其鄰贊曰有孚攣如不獨富也都聖與曰六四九五近而相得與中孚之九五一也故皆言有孚攣如朱子發曰易言交如者異體交也言攣如者同體合也四五同巽體林黃中曰易以逺而配為交如近而合為攣如言綢繆固結也案易雖逐爻取義亦有諸爻相通者一卦惟四五言有孚則四五之相孚者明矣以中孚九五攣如例之則或謂攣諸陽而畜之者非也右明象蘭惠卿曰富陽爻鄰近位蓋指上九也朱子發曰一隂畜三陽常恐力不足而見傷五於畜時得尊位又以其富委之於鄰併力而畜之案五居尊位當畜之時務畜者也而畜三陽六四勢單力乏雖信任之篤然猶得上九從其後併本爻二陽之力以助四則畜之勢其成矣乎右明占上九既雨既處尚德載婦貞厲月幾望君子征凶贊曰既而既處德積載也君子征凶有所疑也王輔嗣曰處小畜之極能畜者也程正叔曰既雨和也既處止也隂之畜陽不和則不能止既和而止畜之道成矣大畜畜之大故畜極而散小畜畜之小故畜極而成楊中立曰三陽上進一隂畜之不固故密雲不雨尚往也至上九則往極矣故既雨而既處矣案三陽不得復則密雲不雨三陽不得復則不處至畜之終則三陽上復而與隂和矣三陽亦各得其所處矣需之不速之客三人來六位終則陽至也艮以止之陽至上則止也此爻需之變雲上于天變則為雨需三來變則既處右明象都聖與曰載言承上也王輔嗣曰既畜剛健尚德載者也趙氏曰尚德與大有大畜尚賢同義朱子曰隂加於陽故雖正亦厲案自本爻言則為尚三陽之德而載己者也九三之車亦取載義畜之者所以尚之也夫以三陽剛強之臣受畜於君而載之則安也今九五有孚於六四而委六四以畜三陽之權隂柔妻道也苟尚三陽之載己而有竊弄大權之漸以是為貞豈不危哉五與四孚以四為婦也三亦謂四妻者各爻義不必拘也巽體長女之象右明婦貞厲都聖與曰凡言月幾望者盛而未盈之義朱子發曰六四未中幾望也正義曰月在望時極盛以敵日也張敬夫曰春秋書日食不書月食蓋君道不可以虧臣道不可以盈也程正叔曰于幾望將盈之時而為之戒若既望則陽已消矣尚何戒乎朱子曰隂盛而抗陽則君子亦不可以有行矣林黃中曰君子者對婦而言都聖與曰征凶言過是則凶也案此爻坎之變坎為月近乎五之中天幾望也君子謂乾之三陽至此不可復往則隂盛而往上窮也九三亦以六四為妻故云君子對婦言也右明月幾望君子征凶案乾三陽雖敵四以復至上而窮窮則不可復進而受畜矣故密雲不雨而今既雨矣牽復之吉而今既處矣巽之隂於是乎為幾望之月使為君子者猶有所征則凶也戒乾也夫隂雖至盛豈得加陽陽不失道豈制于隂此易所以兩致其戒不使之至于極也易窮則變此爻之變為需由需而變則為此爻需之雲上于天而上六三人來今既雨既處則由需而變也坎為月而月之幾望則欲變坎而為需也上非隂之所安不容不變故婦貞則厲上變則坎陽復陷矣故君子征凶作易聖人發揮剛柔立象盡意蓋如此右明爻義石守道曰上卦三爻巽皆務畜者也下卦三爻乾皆務進者也王輔嗣曰可以征而無咎者唯泰也則然坤本體下又順而弱不能敵剛故可以全其類征而吉也自此以往則其進各有難矣夫巽雖不能若艮之善畜然猶不肯為坤之順從也故可得少進不可盡陵也是以初九九二其復則可至于九三則車説輹也夫大畜者畜之極也畜而不已畜極則通是以其畜之盛在于四五至于上九道乃大行小畜積極而後乃能是以四五可以進而上九説征之輹右明六爻兑下乾上履贊曰柔履剛也説卦曰履德之基也又曰履和而至又曰履以和行雜卦曰履不處也郭子和曰履者行道之義也馮當可曰先儒謂履物為藉似未然也此卦不以上下言以內外言也凡人之行履莫不由內以及外兑內卦也以柔履外卦之乾程可久曰六三有應于上所履皆實此卦之所以為履象贊曰上天下澤履胡翼之曰履者禮也上乾為天為剛君父之道也下兑為澤為和臣子之道也上以尊嚴臨下下以和説奉上君臣父子夫婦皆有其節而禮行矣石守道曰六爻但見踐履之象夫禮必在踐履而行之本言禮樂之禮因此禮象遂明人之踐履也程正叔曰禮人之所履也天而在上澤而在下上下之分尊卑之義理之當然也禮之本也案卦本以兌履乾為義正與小畜之以巽畜乾對天澤上下自是孔子贊象之意然市合之取諸噬嗑備預之取諸豫古人用字聲同者皆通則履之為禮因天澤之象亦可兼通要之立卦之義則以踐履之履也林黃中曰以一隂為五陽之主雖非天位而五陽歸之在四而能畜者當位而承乎五也今而居三不當其位不承乎五以為君則不正以為臣則不順故不足以主一卦之義而取其上下二體名之曰履焉李子思曰履與小畜皆五陽一隂然小畜一隂進居乾上故謂之小畜履之一隂退居乾下故謂之履履者禮也以隂承乾隂陽之勢順而上下之分正故聖人以履為禮履而得乎正禮也又曰乾坤者禮之分履者禮之合乾坤之用著見于世者須以禮為之輔文王演易至于履而乾道愈尊右明卦義象贊曰君子以辨上下定民志右明卦用序卦曰物畜然後有禮故受之以履程正叔曰物之聚則有大小之别髙下之等美惡之分是物畜然後有禮也右明卦序履虎尾不嘻人亨贊曰説而應乎乾是以履虎尾不嘻人亨剛中正履帝位而不疚光明也朱子發曰卦後為尾張舜元曰三在乾後履虎尾之象馮當可曰內兑以柔履外卦之乾猶虎在前人履之于後也王輔嗣曰彖者言乎一卦之所以為主也三為履主以柔履剛履危者也虎尾言其危也李季辨曰履虎尾蹈危機之象王介父曰乾之為物剛健而不可履虎之象也兑與之應則由其後履之而往焉履虎尾不嘻人之象也朱子曰和説以躡剛強之後能如是則履危而不傷矣張知常曰剛莫如虎而柔能履之禮之可尚如此李子思曰彖與六三異何也以卦言之則三不見嘻而五不病三以爻觀之則五至于危而三見嘻非異也卦以兑乾二體相應者言之而爻則以六位之剛柔承乘而吉凶悔吝之交至以著其戒也又曰三以隂畫居陽位失位而至凶案若蹈虎尾古有此語文王述之後穆王亦以作書也右明卦象郭子和曰與天合德是以亨也右以贊明卦占初九素履往無咎贊曰素履之往獨行願也朱子曰居履之初未為物遷率其素履者也林黃中曰所處最下逺無所應近無所承其往也獨行其素而已郭立之曰素有先定於內之義故彖曰獨行願也李季辨曰處下體之後而虎在上體人之涉世舉足皆危機也唯能素其位而行則各安其當然之分而不蹈危機素富貴行乎富貴素貧賤行乎貧賤素患難行乎患難素夷狄行乎夷狄以此而往何咎之有程正叔曰夫人不能安于貧賤之素初位卑下則其進也乃貪躁而動求去貧賤爾故往則有咎又曰欲貴之心與行道之心交戰于中豈能安履其素哉素履之説王介父遊定夫楊中立郭立之子和蘭惠卿朱子皆同案人之所履自後而前初履二也爻剛而位柔兌體和説去虎之逺故無咎也初為履始故有素其位而行之象右明象占楊廷秀曰彖言禮之可行爻言履而不處其復于禮一也右明爻義九二履道坦坦幽人貞吉贊曰幽人貞吉中不自亂也劉氏曰六爻唯九二所履柔在其前是履道之平夷而無憂患者蘭説同程可久曰履道得中前乃隂虛坦夷而無阻不應於君幽人以正則無履虎之危所以吉也吳氏曰履道坦坦唯幽人為然楊中立曰居下而上無應故曰幽人夫履自內以之外初二內也故為素履為幽人自三以往則行乎外矣外則履虎之危也所履者柔前虛不礙坦坦之象右明象占林黃中曰隂陽相求物之情也卦唯一隂而九二履之烏知其貞吉而不為征凶也哉以其剛中知其不自亂矣若利害得喪亂於中尚能守其貞也哉李子思曰二不唯異於三亦優於四坦坦而安與訴訴而懼者孰得孰失故曰二多譽四多懼右明爻義六三眇能視跛能履履虎尾嘻人凶武人為于大君贊曰眇能視不足以有明也跛能履不足以與行也嘻人之凶位不當也武人為于大君志剛也耿睎道曰視欲正視而不正則眇者也行欲中行而不中則跛者也故歸妹之九二不正則為眇能視初九不中則為跛能履六三不正又不中故眇跛兼焉案眇跛之象無能言者蓋例之歸妹輒不通也唯耿説僅可爾歸妹之下卦亦兑體九三之幽人其象亦同聖人必於兑取象而未之知也上九正應隔四五之陽故眇而視之進雖虎嘻必求其應故跛而履之因其位不中正而取象則然也應隔二陽故不能正視所履者剛故危而跛卦本履而兼言視者視而後能履也書云若跣弗視地厥足用傷是已右明象朱子曰不中不正柔而志剛以此履乾必見傷害故其象如此併言眇跛而占者凶蘭惠卿曰彖舉全卦之義唯其説而應乾得履道之善所以不嘻人而亨爻則獨論六三之義履非所履所以致凶楊廷秀曰上三陽虎也九四虎尾六三履之卦以下為尾故遁既未濟之初爻皆為尾而履以四則止取上卦之象也案卦之履虎尾不嘻人者以兑履乾後説而相應也爻之履虎尾而嘻人者以三應乎上履尾而首應則必嘻也六三之履九四隂陽之情本相求也以禮辨上下二體之異近不相得失位不中况乾天下莫尊焉承之可也履之不可也而履之宜其有嘻人之凶也兑為口六畫耦亦有開口之象張子厚曰大君者為衆爻之主也李去非曰兑西方為肅殺武人用事之地蘭惠卿曰武人謂隂爻也巽之初六亦為武人之象六三以一隂為衆陽之所歸其志遂欲屈服陽剛而僣為大君案三居下卦之上又衆陽歸之此武人提師於外而遂僣焉者也在他卦則一隂為五陽之主今卦以履名則六三不得主一卦矣右明占趙氏曰好陽剛之過則必忘其六之本柔故不自量而妄以視履為能其不逼陽而取禍者幾希如武人志存剛暴而在人上必不可者也案一隂為五陽所宗而上九正應雖近閡四五終不能奪故有跛眇視履之象而虎首應尾不能無嘻至於欲宗衆陽之志則不專應上也故爻備述其義右明爻義九四履虎尾訴訴終吉贊曰訴訴終吉志行也程可久曰三與四在乾後故皆謂之履虎尾卦稱不嘻人則猶有嘻人之理至四則不虞於嘻矣蓋材勝其位上近於君因訴訴恐懼而致福也李季辨曰有畏懼之志則不至於輕舉妄動以蹈危機也楊廷秀曰近剛決之君履危之道然能終吉也九雖體剛而四則志柔訴訴而祗懼所以吉也都聖與曰未有恐懼戒慎而不轉禍為福者李子思曰居乾體之後切近九五履虎尾而知戒懼者也然則履虎尾不嘻人亨者觀卦則在六三而觀爻則在九四豈非卦論畫而爻論位二者皆以隂柔自處為得者乎案卦有三履虎尾一嘻人一不言嘻何也九六之畫有口之張閉之象卦以六三成象則本嘻人者也然卦論二體以柔履剛以説應乾故不嘻也爻止論本爻之象在六三則嘻人而九四無嘻人之象故不言爾然二爻皆不中正而位不當而凶吉異者兼以位言也三履剛而四履柔也曰終吉者言始危中懼也雖然三在尾後從而履之者也履四四已登尾而履之以及虎之身者也履五及尾則首可反嘻已及身則不能嘻矣象與義並行而不相悖也右明象占九五夬履貞厲贊曰位正當也楊中立曰以剛決而履也耿睎道曰履以乾為虎虎能嘻人有決柔之意故以夬稱焉程可久曰夬之為決者以一隂乘衆陽之上也今一隂雖在下而有應於上五剛中正而履帝位所以夬者決六三之履耳然不能防微杜漸逮小人有上乘之勢然後決之故貞厲程正叔曰貞厲義各不同隨卦可見案履夬皆以乾兑成卦五陽決一隂故履之九五亦曰夬履義相蒙也然夬之一隂在五陽之終故決之易是以九五曰中行無咎履之一隂據下卦之上而上九應之故決之難是以九五曰夬履貞厲然履之為義自後而履前夬履者決上九也上九蓋六三之應而六三浸浸有為於大君之象故決上九者乃決六三也不如夬之九五之易者六三得其民上九為之援是以其理雖正而其事則危也右明象占李子思曰權臣之所以為患者以其主之弱焉豫之九四當權用事而六五貞疾是也若夫履之九五以剛中正而履位此固非隂邪所能病者三乃欲為大君胡可犯哉其曰貞厲者戒五耳猶夬之孚號有厲之意右明爻義上九視履考祥其旋元吉贊曰元吉在上大有慶也朱子發曰吉事有祥祥生於所履者也視我之所履則吉之來可考而知矣趙氏曰履道之成可以視所履而考祥矣程可久曰居履之終有應在內故有旋反之意張子厚曰視所以履以考求其吉莫如旋而反下右明象占吳氏曰履不處也故始則往終則旋皆以不處為義旋然後反反然後復張知常曰進極當反物之理也楊中立曰禮進而反以反為文蓋禮雖以進為文進極而過中亦不可行矣故其終也旋反乃吉李子思曰乾之健行動極而不知止殆將無所歸宿唯能旋而與三應履之善終者也夫乾以陽在上而旋反於下將有隂陽交泰之象此履而繼之以泰之深意案一隂雖五陽所同宗而上乃正應雖極於上進必反顧於三其在六三則有虎反履尾嘻人之凶其在上九則為其旋之吉蓋譬如登髙至頂則反苟窮髙而不知回未有不凶者也右明爻義馮當可曰步履以視地為安不視地為危履卑者易安髙者易危初二在下而卑者也無應於上無他瞻視則鮮有顛踣之虞故曰無咎曰吉四五在上而髙者也無應於下下視不專則終有危懼之理故曰訴訴曰厲三應於上方且仰而視之而不知所履故有眇跛之象而凶上應於三反而觀其所履之祥故有俯視而履下之象而吉案輔嗣謂以陽爻處隂位為美為謙以制禮非也爻以陽剛為善剛則健於行位以隂柔為美柔則易於履故二四上皆吉以所行之健而所履之柔也六三獨凶以所行之不健而所履之剛二者皆失也五之厲所行雖健而所以履者剛也又下卦以無應於上為吉上卦以有應於下為吉履欲視地也右明六爻
