body:
  text: 厚齋易學卷三十宋馮椅撰易輯傳第二十六經下篇渙節坎下巽土渙象贊曰風行水上渙雜卦曰渙離也李氏曰下坎上巽順以免乎險也故卦有難離及離乎險之義李去非曰物之凝結則聚散則渙人心如風之行於水上流放而未定也斯散矣此以坎險言渙也張舜元曰風行水上其水必釋東風解凍之象王氏師心曰渙斯散矣所謂渙然氷釋也散則離所謂泮渙也都聖與曰人之遇難也對之以剛健則相攻而難成對之以柔巽則相和而難解此險而健所以訟險而巽所以渙也馮當可曰否體升降而為渙亦憂患消釋之時案乾本上坤本下否塞之象也今坤之六自二而升四乾之九自四而降二雖下成坎險而上成巽順巽風行乎坎水之上水流渙散而巽之木行乎坎水之上險難以濟此卦之所以為渙也右明卦義象賛曰先王以享于帝立廟説卦曰刳木為舟剡木為楫舟楫之利以濟不通致逺以利天下蓋取諸渙右明卦用序卦曰兊者說也說而後散之故受之以渙林黄中曰自兊渙下變為坎上反為巽三五不動而成也程正叔曰人之氣憂則結聚說則舒散故說有散義石守道曰凡人既能和說於民必能散其患難李子思曰巽兊之後以巽遇坎而為渙以兊遇坎而為節此巽兊二女之渉險而其象如此也渙節之後繼以中孚者巽兊二女之自相遇也繼之以小過者震艮二子之自相遇也終以既未濟者坎離男女之相遇而交與不交也故六十四卦之序演而至於既未濟則乾坤六子相遇之象畢具而先後之相次義𩔖之相從莫不各有深意存焉今序卦之所論特舉其一端以詔後世而其自然之畫灼然之理則有不可勝窮者右明卦序亨王假有廟利渉大川利貞贊曰渙亨剛來而不窮柔得位乎外而上同王假有廟王乃在中也利渉大川乘木有功也李氏曰渙有難散及離險之義難散而離險則亨矣馮當可曰渙未變則否矣四降為二得中正之位乾體雖散而不失中二升為四有順長之德坤體雖散而不失順此渙之所以有亨理案大抵否變而渙散其塞則通矣渙之所以為亨也右明亨陸希聲曰人氣聚則生散則死聖人以神氣渙散乃立宗廟以萃聚之是以渙萃二卦皆言王假有廟所以明聚散之理為教化之宗主也李子思曰萃之時因民之聚而立廟以堅其歸嚮之心所以為懐保之道而渙之時憂民之散而為之立廟以收其蕩析之志所以為招携之術皆所以統攝人心而堅凝之也李仲永曰莫不有家而王之有家者大故曰王假有家莫不有廟而王之有廟者大故曰王假有廟案假或讀如格亦有此訓以孔子贊家人渙萃觀之則格之為至良是然易之稱王假者四而豐又一言焉孔子乃曰王假之尚大也一經用字无二三之理故當以豐為正林黄中曰萃之廟在四而渙之廟在五各應其時義也說者皆襲焦延夀之論以上一爻為宗廟愚謂不然宗廟者國之本也其在都邑之中矣渙自五以下有廟之象又曰自五以下有七廟之象案七廟象想以畫數三陰爻六畫而一陽爻一畫通為七也葢三爻之艮為門闕謂一陽爻在上為屋二陰爻在下為闕高巍之象也故萃自四以下互體為艮渙自五以下約象亦艮也則黄中謂萃在四而渙在五者以上一陽爻言也家人之上卦巽九五一陽為屋而六四耦畫即為門象而非闕之高也同人之初九于門亦以六二一爻言之也故九五為有家然而家人之五渙之四萃之五上又皆一陽爻陽大也此所以三卦於有廟有家皆曰假與此卦九五為君位乃在廟故孔子曰王乃在中也右明王假有廟蘇氏曰以坎為水巽木乘之所以利渉程正叔曰治渙之道當濟於險難而有乘木濟川之象渉則有濟渙之功李子思曰十三卦之制器舟楫之利蓋取諸渙則是黄帝堯舜之時已嘗取此之象而為利渉之用矣毛伯玉曰所以渙者風水相激也乘木利渉又所以濟其渙聖人用卦用象用爻之法其變也如此右明利渉大川毛伯玉曰利貞者九五之中正陸希聲曰物散則失正故利貞程正叔曰合渙散之道在乎貞固朱子曰其利貞者則占者之深戒也案渙之時非以貞固之道行之則人心不復可収矣九五居中當位以陽居上皆貞之道也然以六畫攷之則當位者四爻所不當位者三上兩爻耳不正固不勝於正此其所以以貞為利也右明利貞李季辨曰九五渙之君也渙而欲萃必萃於五故卦爻皆歸於五九自四來二與五為同德之應六自二往四上同於五而為同志之臣五之所以成渙之功首以此二爻毛伯玉曰九二來而治其渙九五之命也六四得位乎外而收其渙者九五之故也洪氏曰渙之所以亨難之所以散天下難散則神靈顧歆而民心愛戴以享先王則可以有廟以渉大川則可以有功非盡亨之道者孰能與此案觀孔子之彖則全在二四兩爻九六往來成夾輔九五之功所以亨渙而王者之有廟以之渉川以之貞固皆兩爻之力也趙氏曰天下之難非陽剛得位則莫能濟故難之散也則為渙及其下之聚也則為萃二卦之辭略同然渙之言亨者一而萃則再言之渙之言利者二而萃則三言之渙言王假有廟而萃則加以用大牲吉之辭以是知渙而後萃誠有其序也右總明卦義初六用承馬壯吉贊曰初六之吉順也程正叔曰二陽剛壯初陰柔弱兩皆旡應旡應則親比相求託於剛壯之材以出險必有濟也程可乆曰九二剛健馬之壯也本爻順承用承馬也朱子發曰二為剛中之材坎為美脊之馬吕與叔曰乘車者馬在前前遇九二剛健與明夷六二同義洪氏曰初與二皆在險求以出險何患乎異心故九二聽初之承已而初六資二以有行以動則壯以𫝑則順孰能禦之哉案九二所以未出險者以二陰䧟之也然初六之陰在險下柔弱亦不能以出險二之材足以出險而䧟馬者初之位應四而爻不應二之九本自四來而欲歸四則正與己應是初與二之情同也同心以濟而不為險䧟則六三之一陰在外豈能制初二之協力以進哉此其所以吉也右明象占劉氏曰六爻獨初不言渙以當其時未渙也趙氏曰陰柔在坎險之下不足以渙難者也程正叔曰渙難之𫝑辯之冝早方渙而拯之不至於渙也右明爻義九二渙奔其杌悔亡贊曰渙奔其杌得願也程正叔曰諸爻皆云渙謂渙之時也王介父曰奔者速辭剛之為物能速者也朱子發曰二本否四在二者渙散之時也二之情不忘乎四猶逃亡之人不忘故國又曰二能奮身出險上奔於四是以悔亡震足動奔也互體震故也張子厚曰奮於險中進而之前則難解而悔亡若退累於初則險不能出其悔終存馮當可同案自初言則已欲應四而傅二以歸故資二以為馬承馬而壯吉自本爻言之則已欲歸四而恐初之累故傅初則有悔奔机而悔亡机之義說者以為所憑之几非也几說文象形所据者也杌說文木也二字義不相蒙周官五几亦不從木然則杌杌木也人之離家因於道途則依木以休息詩所謂南有喬木不可休息也休文从人从木也四者九之故居也今離之而在二人情渙散又䧟險中思歸其故居則机之象也何也几象形四之六居九下竒耦之畫有几之象而巽體木則木中之机也机可休息故奔而歸之猶困於道途之人汲汲求木以休息也曰其者指爻之几也此机乃九之机今自二而奔歸之也聖人立象以盡意精㣲如此或曰當渙之時人必求主爻義皆歸五而今皆奔四何也曰至四則歸五矣四近臣之位也二欲歸其位者也初欲因之以逹於五者也右明象占爻義六三渙其躬无悔贊曰渙其躬志在外也劉氏曰當渙之時陰必傅陽此爻體坎趣下宜喜於傅二唯能志在於上而脫身以從之始離於險而无悔焉趙氏曰猶在坎體故所渙唯其躬而已李子思曰坎之二陰本為險䧟者也三居坎上近接乎巽坎水得風而散巽木得水而通故能渙散其身出險自无悔吝其作易者教之以往為上九之應而離險者乎張子厚曰援上而進求自脫於險无悔而已非能及物者也朱子曰陰柔不中正有私於己之象此上四爻皆因渙以濟渙者也李季辯曰應上而上無位不若身自㧞而歸五程正叔曰悔亡者本有而得亡无悔者本无也案以爻義言之本䧟九二為險者也以爻情言之鄰應皆陽二隣近而上應隔五坎性下趣而不上宜趣二首也然當渙之時物情皆求渙散其難幸出險上坎水在下風以散之外卦有二陽焉一為正應一為大君僅以身脫而求往依之庶無險難之悔以卦體則在諸爻皆欲趣五已不得而獨異以爻義則在諸爻為獨有正應已不當以相違孔子曰志在外也上五皆外未知其孰從右明象占爻義六四渙其羣元吉渙有丘匪夷所思贊曰渙其羣元吉光大也吕與叔曰自坤六二上居於四離陰之羣上比於陽出幽谷而遷喬木者故元吉五處乎高九五也馮當可曰四以初三兩爻為羣同𩔖故也然五方得位正中最近于己二又不應之是賢明之君未有其物以成濟渙之功四則渙其羣以傅之故元吉五在四上高丘之象程可乆曰渙其羣則承上者專故元吉丘高而聚五能定渙之象今不系其羣而承於五至使等夷者不我思則心迹俱渙公爾忘私矣薛氏曰丘聚也得位上同散者聚也張舜元曰約象有艮案一卦之位莫善於四何也當天下渙散之時人主方為立宗廟以凝聚人心臣下亦罕有親己者上在外而不相比二在下而不相應初逺已而三僅以身免上下皆解體矣當是時唯有本爻近而相得親宻合志以收聚天下之渙故初則承二以求應二則奔机以求復已又離其陰險之羣以宻親於五故能凝聚天下之渙於五有高丘之象焉此其所以元吉獨善於諸爻而非其陰險之羣所得思戀者也羣乃其等夷也郭子和曰羣者天下之罹於難者也能渙天下之羣難則其道大矣非止於渙其一身故元吉此亦一說可以旁通而曲暢也右明象占爻義九五渙汗其大號渙王居无咎贊曰王居无咎正位也耿睎道曰險難既散人方安集此宜出大號改視易聽之時李去非曰宜有大政令以収人心李氏曰體之宣布曰汗君之宣布曰號鄭少梅曰人之一身陽主氣陰主形元氣蒸而為汗流而為血二陽散於外故言汗言血二陰分於中故言躬言羣程可久曰汗由中出浹於四體亦猶大號由君出而浹於四方也氣之閉者得汗而通德意志慮有所未孚大號渙然而天下之志通矣毛伯玉曰如病者之汗而自解徧身周浹无所不通漢儒說易以王者之號令如汗出而不反後之學者皆宗之涕唾涎液皆不可反何獨汗也朱子曰陽剛中正以居尊位當渙之時能散其號令與其居積則可以濟渙而无咎矣九五巽體有號令之象渙居如陸贄所謂散小儲而成大儲之意案渙有險難既散之義亦有人心離散之義蓋險難後人心固離散而未収也九五以陽剛中正居天下之正位渙然發其大號於天下散其居積以収人心如病者之汗周浹徧體而流通也如此而後僅可无咎蓋人心之散久矣此周武王散鹿臺之財發鉅橋之粟大賚于四海而萬姓恱服之時也汗由上渙其血取象聖人作易近取諸身至於涕洟血汗无所不備如此右明象占上九渙其血去惕出无咎贊曰渙其血逺害也卜子夏曰獨應者多至於爭洪氏曰血者陰之傷張舜元曰巽為風應于六二之坎坎為血卦風之與血常相為用渙而運之則為榮結而聚之則為害風行于上血渙于下陰陽流通是以逺害而无咎也李泰發同劉氏曰當渙之終王位已正而已猶處上焉儻居而不舎咎所由致也朱子曰渙其血則去渙其愓則出案六三與己正應當渙之終求應乎已而離險難者也而間於九五焉九五大君也又陰陽之情相好不從乎已収天下之渙而乃過我門而不入焉則傷之者至矣本爻在一卦之外而无位不敢爭之于五也則三雖傷而離之使去已必愓而逺之而出則可以終渙而无咎也右明象占郭子和曰與渙其躬者无以異葢止於一身之謀非天下之大計也二爻之應亦其志同耳凡渙之六爻皆无凶悔者以其知難及保身之道也右明爻義郭子和曰初二四五皆能渙難者以初比二四比五故也三與上私於其應能免其身幸矣案渙六爻皆以兩兩相比為象初承馬而二奔机三渙其躬而四渙其羣五渙其汗而上渙其血葢當物情渙散之時皆兩兩相比以相依不散也位一陰而一陽九六又變動不居故吉凶悔吝殊焉右明六爻兊下坎上節贊曰說以行險當位以節中正以通天地節而四時成節以制度不傷財不害民象贊曰澤上有水節雜卦曰節止也程正叔曰澤之容有限澤上置水滿則不容為有節之象蘭惠卿曰澤上有水不虛不溢適當其分謂之節林黄中曰水无節則汎政无節則蕩馮當可曰當乾之九三未升坤之六五未降其卦泰也物泰則當節卑者升之高者降之已有節之義程可久曰裁其過之謂節李元逹曰節之名生於有過為其有過而節之郭子和曰有過則有節不及則無節也李去非曰坎水之既盈為澤有節而宣洩之有度所以防其過也聖人逹節賢人守節其下者失節王氏師心曰竹有節物之自然也人即物之自然而節制焉節也者无適而非自然矣李季辯曰天下之物莫不有節節則也理之不可過者也劉氏曰節者止也物无節則莫知止而或渝其分故人之情欲君子之德行國家之財用皆貴於有節焉洪氏曰節者非人之所欲也節以分義則貪者不得逞節以檢拘則縱者不得肆大小有節而誇者悲進退有節而躁者憂張敬夫曰周官所謂六節者其器也烈士狥節者其道也處節之道要在識時而知變右明卦義象贊曰君子以制數度議徳行右明卦用序卦曰渙者離也物不可以終離故受之以節程正叔曰物既離散則當止之林黄中曰渙之反也自渙之節坎反居上巽反為兊二五不動而成也右明卦序亨苦節不可貞贊曰節亨剛柔分而剛得中苦節不可貞其道窮也程正叔曰節有亨義節貴適中過則苦矣歐陽永叔曰苦節而太過行於己而不可久也李泰發曰事得其節則可以通行於天下故亨朱子發曰所謂節者剛柔有節而不過乎中故亨易窮則變守而不變苦節也凡物過則苦味之過正形之過勞心之過思皆曰苦苦則違情性之正物不能堪豈通也哉李氏曰節以甘為亨以苦為窮所謂甘節者制之有道使人說而不厭故亨所謂苦節者損抑過常使人惡而不懌故窮也案節者節其過而約之於中人情甘之所以亨也節之過而不得其中人情苦之所以不可貞也甘味之中也於五行為土以坤之三陰言之分坤之五以節乾剛之過之象也苦味之過也於五行為火以上六言之易窮則變變則為中孚疊離之象且在上也孔子之贊其㣲義不過如此陰以下為貞上以六居之雖為當位之貞而陰非所安故有不可貞之象上六亦曰貞凶右明卦象占初九不出户庭无咎贊曰不出户庭知通塞也李泰發曰以陽剛之材上有其應而險難在外不可往也自守以正謹宻而不出此盡節之道者也故可以无咎耿晞道曰剛實在前塞而不通王介父曰九二近而不相得隔塞之時也李元逹曰初陽竒故稱户二隂耦故稱門案説卦又以陽奇為闢户陰耦為闔户易之象其物宜不一而足也馮當可曰初則二蔽之二則无蔽之者二猶户三猶門四猶路也又曰居一卦之内四雖其應初不應之為不出户庭不為物引也物交物則失矣李季辨曰居節之始人心與物交則為物所引傷財害民皆由此生能謹宻而不出則无咎矣當其在下可以无出然非終無出也至二則出矣毛伯玉曰澤之始有水也當蓄而未可洩雖户庭不可出也况門庭乎九二可以通矣不通則溢而敗其防失節甚矣案節之時行止貴有其節一卦唯初四有應冝出者也然前有陽爻蔽塞一不可出也四為坎體應則入乎坎窞二不可出也剛在下而無位三不可出也不出則免咎无陽爻之蔽坎窞之䧟陵節之僭也此知節者也右明象占說卦曰亂之所生也則言語以為階君不宻則失臣臣不宻則失身幾事不宻則害成是以君子慎宻而不出也程正叔曰不謹於初安能有卒故節之初為戒甚嚴洪氏曰時可處也外雖有應其處也不為失時時可出也外雖无應其出也不為干時李子思曰當節止之始剛未得位而又未得中未可以有行楊廷秀曰君子將有以節天下必始於節一家將有以節一家必始於節一身節天下者五也節一家者四也節一身者初也右明爻義九二不出門庭凶贊曰失時極也程正叔曰不至于外不從於五也非陰陽正應故不相從以剛中之道相合則可以成節之功李氏曰剛既得中可以有為李去非曰陰虛在前无有阻塞而乃不明出處之節故聖人戒之朱子曰知節而不知通故其象占如此李泰發曰互體為震變亦震震為足有可行之象而不行凶之道也此節之不得其中者豐之上下與此爻時異而象同張舜元曰明夷于出門庭亦取震象馮當可曰自初至二猶自户而至門案九五當位以節䧟于坎險正頼本爻同德以相輔者也互體震足前無蔽塞可以行矣而坎險正䧟約象之艮在前而止之節又有止義此其所以不出門庭而致凶也凶非特本爻也五亦凶矣孔子曰中正以通節所以亨正謂二五而經乃有此象何也曰卦與爻異一經皆然右明象占爻義六三不節若則嗟若无咎贊曰不節之嗟又誰咎也李泰發曰險在前此可節之時而不知節王介父曰不能節而嗟則是能自悔者也故无咎李仲永同程可久曰處不當位過中而乘剛不節者也嗟有自怨之義中有止象故嗟若之後其究無咎也贊曰又誰咎也與出門之爻同略例創為新說與繋辭不合張舜元曰兊為口嗟之象趙氏曰說極則悲故不節則嗟右明象占毛伯玉曰所以為節者澤也所以為澤者三也故節與不節以此爻當之劉長民曰節之爻唯居中得正者能立節二當節而不節有後時之凶三過節而不節有悲嗟之歎盖過中不正乘剛履險不節者也鄭舜舉曰下體之極則當變故發此義能傷嗟以自悔其誰咎之李元逹曰臨之六三失臨之道而既憂之節之六三失節之道而嗟若皆得无咎易以補過為善故也案以二體言則下卦之終當節之位也以卦象言之則澤止於此水之受節者也又以卦變言之柔自五來節剛者也而象乃謂之不節若則嗟若何哉節貴中不貴過三失節而已欲節之將有苦節之患此其不可節者也柔節剛亦只節下二爻澤至上則溢爻畫耦有宂而决之象此其不能節者也亦是過六本居君位今來此多凶之地思反其故居而不安此其不安於節者也故聖人槩曰不節若以不可節之時有不能節之材又有不安節之志自上而失身於此徒有嗟嘆而已右明爻義六四安節亨贊曰安節之亨承上道也程正叔曰以陰居隂安于正也李泰發曰居近君之地能卑能遜以承上安於臣節者也馮當可曰初之應也初户庭不出四為失應然上有陽剛中正之主我實近之得所託而安故為安節以柔居陰初閡於二而不我應安於所節者也安節云者各當其分之謂也然上比九五之君亦無正應故得通於五而道亨或曰五自往上亦不我顧何以能亨曰兊澤其道上行水節於澤亦以上行為事猶井之用也下卦初二兩爻不上行故有凶咎上卦四五兩又上行故得吉亨右明象占毛伯玉曰所節者水也節之者澤也四坎體受節者也王介父曰屯者剛柔始交之時故六四以從初為正節者剛柔分之時故六四以承五為正以初為屯之侯五為節之主也中孚既濟之六四與此同義趙氏曰古者王后之用有司不敢㑹大臣得以九式而撙節之正應此爻節也者中其節之義也在學為不陵節在禮為節文品節在財用為撙節在物為符節在臣為名節在君帥為節制之節唯其時物之所取象爾右明爻義九五甘節吉往有尚贊曰甘節之吉居位中也都聖與曰書曰土爰稼穡葢土於五方為中而其味為甘甘言味之中而人之所說也王氏師心曰甘者人情之所尚故往則有尚李子思曰坎之彖曰行有尚五亦坎之中爻不可自止乎險中而亨通之節也蘭蕙卿曰自否之三往居天位所以致吉而有尚馮當可曰五節之主節度一世者也不强人以所難然後天下甘之五居中為甘自三而往為有尚案節度一世必酌中而為之節則天下甘之所以吉也自此而往誰能廢之故曰有尚若取象則馮說最為得之右明象占李氏曰為節之主而使天下說其為節者剛當位而得中也程正叔曰所謂當位以節中正以通毛伯玉曰澤節水者卦也為節之主者爻也薛氏曰甘臨而无攸利者在下用甘以佞進也甘節而行有尚者在上用甘民說從也右明爻義上六苦節貞凶悔亡贊曰苦節貞凶其道窮也王輔嗣曰過節之中以至亢極苦節者也正義曰節過苦物所不堪不可復正都聖與曰土以居中作甘甘者人所說也故又為甘心之甘火以亢上作苦苦者人所患也故又為疾苦之苦林黄中曰坎之究為離居卦之窮則變是以其味焦而苦也案本爻變則為中孚故受之以中孚亦有疊離之象程正叔曰守固則凶悔則凶亡王介父亦有此說程可久曰苦節而正固故凶悔則不爲正固之行而无是凶矣説卦曰震无咎者存乎悔李子思曰節卦悔亡之義與他卦不同此說出於程正叔如元亨利貞與吉无咎貞凶之𩔖皆文同而義異何但无咎悔亡也右明象占石守道曰非聖人之中道過守其節不可行於衆孔子見喪三年則曰難為繼也見奢儉之不得中則曰難為上也難為下也聖人因人情而為之節文亦欲夫人之通行爾李氏曰陰性吝嗇而處於上過於為節者也趙氏曰三戒其不節上戒其苦節過猶不及其失均也右明爻義蘭惠卿曰六爻以當位為吉不當位為凶下三爻澤未有水未節者也上三爻有水受節者也故初之户庭二之門庭皆不出接物三又有不節之嗟至於四始安於節五甘於節上之過中亦苦於節自户而門以至不節自安而甘以至苦節各有序也初不出户四則安矣皆以下也二門不出五則甘矣以中之正不正也三不安節上則苦矣皆以極也然又如渙之兩兩相比取象户之與門不安之與安甘之與苦象皆相比以相反右明六爻厚齋易學卷三十
