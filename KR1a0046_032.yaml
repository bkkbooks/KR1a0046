body:
  text: 厚齊易學卷三十二宋馮椅撰易輯傳卷二十八經下篇既濟未濟離下坎上既濟象贊曰水在火上既濟雜卦曰既濟定也朱子曰既濟事之既成也水火相交各得其用六爻之位各得其正故為既濟李氏曰以六位則剛柔正以二體則坎離交剛柔正則位當而不亂坎離交則用通而不窮郭子和曰六爻有應者八卦然應而皆得位者六十四卦獨此一卦而已是知既濟者必在有應必得其位然後可也李子思曰水火不相射此太極肇分之初八卦之定體也水火相逮然後能變化既成萬物此太極既分之後六子之致用也水在火下兩不相射所以為未濟之象水在火上兩交相逮所以為既濟之象也其曰既成萬物則水火之致用而成既濟也趙氏曰乾下坤上為泰以天地之交也坎上離下為既濟以水火之交也以象言之水火若未可同於天地以畫觀之則乾畫居坤之中而為坎坎者乾之中也故乾居西北而坎居正北坤畫居乾之中而為離離者坤之中也故坤居西南而離居正南坎離者乾坤之大用也故泰之六爻雖相應而二五處非其位既濟之六爻不惟皆應而剛柔無一之不當以是爻而居是位則其應者皆正也水火相交而剛柔正應則其為既濟也豈不大哉案乾坤純體之交為泰又以二五九六兩爻交為既濟既濟者天下安泰之時已濟者也九六交于二五則陽以隂濟變見而成火隂以陽濟流通而成水又自坎離交於上下則火下濟於隂位而成烜水上騰於陽位而成潤坎離以氣交而非水火之粗迹也故自後天之易言之則乾居西北而坎居正北坤居西南而離居正南自先天之易言之則天尊地卑乾坤定于上下而乾陽包隂而離位乎東坤隂含陽而坎位乎西日月之象也是故易始於乾坤終於坎離以位上篇而下篇之終以既未濟者亦坎離之交也坎離之交為既濟其所關於造化人治之大乃如此濟之得名以利涉也既未濟皆有坎坎在上已濟也坎在下未濟也右明卦義象贊曰君子以思患而豫防之右明卦用序卦曰有過物者必濟故受之以既濟石守道曰凡在險難之中非有過物之材則不能濟林黃中曰自過而濟艮變為離震變為坎易初四五之爻而成也立天下之事者必有過人之材草天下之俗者必有過人之行過而受之以濟之義也李子思曰隂陽二氣往來於天地之間或不能無過差故聖人作易大過之後繼之以坎離者隂陽之中所以救大過之敝也小過之後繼之以既未濟者即坎離之中亦所以救小過之敝也案過之大故繼以坎離之全過之小故繼以坎離之交此皆序卦之所未及言也右明卦序亨小利貞初吉終亂贊曰既濟亨小者亨也利貞剛柔正而位當也初吉柔得中也終止則亂其道窮也王輔嗣曰萬事皆濟若小者未亨則有所未濟小者尚亨何况於大程正叔曰既濟之時不能無小未亨也耿睎道曰涉而未濟則所謂亨者有亨之道而已涉而既濟則所謂亨者乃亨之功也李泰發曰陽大而隂小故泰言小往大來既濟三陽皆處三隂之下以陽下隂是大者既濟而能亨其小者也王景孟同卜子夏曰陽已下隂萬物既成亨小之義難明唯李說僅可通郭子和力辨六十四卦無亨小之義緣未濟亨下有小字誤書于此其說曰彖以既濟亨為斷句則既濟亨為文王辭小者亨為孔子釋之之辭劉氏曰六二以謙虛得中而無盈滿之纍此既濟之初所以吉九五以盈滿而安止於上值其道之窮而不知變通此既濟之終所以亂李去非曰凡吉凶之相為無窮者剛柔之相推而各去其本位於是有變而後有吉凶之異今變之既濟則六爻之隂陽已定矣苟狃於安而無所變更則其末流必漸至於頺靡而不振此既濟之窮而終止則亂也朱子發曰始終時也治亂者道之窮通也李去非曰初吉者既濟也中吉者訟也終吉者師之九二訟之初六履之九四蠱之初六賁之六五家人之上九鼎之九三也無初有終者巽之九五睽之六三也然則終之實難玩易者可以有得矣案卦以九六往來二五而成也六來居二麗于陽明去其隂暗亨而為小者之象也亦初吉之象也初論六二則終當論九五以九居五則其德當乎大君之位而上下五爻亦各當其位而天下定矣所謂利貞者以此也然各當其位之定而無復有事則一氣之流行物情之營為萬事之更代所謂定者乃亂之源也故既濟之終則亂而孔子又贊之曰止則亂其義著明矣右明卦象占初九曳其輪濡其尾無咎贊曰曳其輪義無咎也李氏曰輪在車下尾在獸後初之象也朱子同唯剛動之材勉於必濟何咎之有李泰發曰履險故曳輪涉川故濡尾趙氏曰初以陽剛當始濟之時雖曳輪濡尾而無咎以其有應而可以濟也楊廷秀曰濟難之初將危亂而之吉亨也以剛居陽有濟難之材火性鋭進又能竭濟難之力如良馬焉駕車涉川岸已離而未登自非竭力以曳其輪至於濡尾而不恤何以能濟乎案爻以應坎之四為象坎為輪為水輪在四已曳之水在四尾濡之四在川岸挽之以濟者也濟則無咎右明象占六二婦喪其茀勿逐七日得贊曰七日得以中道也王介父曰茀者所以蔽車者也此爻柔順在中婦象也兩剛為之蔽茀象焉棄二剛以應五故曰婦喪其茀苟得志乎五則二剛猶主已而為之蔽又焉用逐七日者從其應以往反之時劉氏曰古者后夫人皆以翟茀蔽車易以日言近以嵗言逺李子思曰離為雉為文明有翟蔽之象李去非曰自二之外七位而還于本位故曰七日與復震七日同義案六自坤五來居于此而此爻之九乃往居于五矣二五隂陽正應則二婦也二歸于五之故居以從九則喪其上下二陽之蔽己者矣天道無往不復自二歷遍六爻而復本位則凡七也言日者以位本乾也張知常曰以中道自守雖見侵於羣枉必無失也此善言易者也右明象占九三髙宗伐鬼方三年克之小人勿用贊曰三年克之憊也張子厚曰上六險而應此卦之終亂者也故以比鬼方李去非曰此爻應上隔三位故曰三年朱子發曰鬼方幽逺小國於既濟之時恃險不來克難辭也離有戈兵朱子曰以剛居陽髙宗伐鬼方之象也言其久而後克戒占者不可輕動之意小人勿用占法與師上六同林黃中曰以有商之盛王伐鬼方之小醜曠日持久至於三年而後克之者謹之至也殷􅐥之頌曰赫赫厥聲濯濯厥靈夀考且寧以保我後生鬼方既服而威靈之所被者逺矣然則三年而伐一國若怯而實勇與夫快心於一戰者有間矣故曰小人勿用李季辨曰以剛居陽竭力以濟者也如髙宗之伐鬼方三年而後克之不以師老而止也三代之兵未嘗用一小人蓋無所用小人也苟用小人是平一亂而生一亂也聖人此意甚微亦是一說可以旁通時物案既濟之治非不用力自致也濡尾曳輪喪茀不恤然後濟甚至有負固不庭者極力之久而僅勝之成既濟之治其難如此故在六爻初四之濟也易在坎水之際也二五之濟也速九六之互相往來也唯三上之濟也難而緩蓋險陷之極而火迫乎水鄰於相息也不有髙宗之盛王不足以克此幽逺不賓之人鬼方在北坎北方也上六逺地也三年歷坎險之三位故以年計也克者剛克柔也離為中女之卦故有小人勿用之戒易中如帝乙髙宗之事所謂知以藏往者也右明象占六四繻有衣袽終日戒贊曰終日戒有所疑也趙氏曰雖有新繻而不棄衣袽之敝以其不忘濟難之始也郭子和同楊廷秀曰有之為言也蓋不至於求而無之之謂也林黃中曰說者謂衣之敗絮可以窒舟之漏愚謂不然涉川而恃漏舟備舟而恃敗絮殆非防患之道也離為日三爻皆離故有終日之象坎為憂故有戒懼之象案離三爻濟險者也坎三爻已濟者也九象坤為常為帛此爻坤之四也己歷下卦故為衣之敝乍入上卦故為繻之新下卦為晝上卦為夜已離下卦日之終矣戒云者安而不忘危存而不忘亡治而不忘亂者也右明象占九五東鄰殺牛不如西鄰之禴祭實受其福贊曰東鄰殺牛不如西鄰之時也實受其福吉大來也張子厚曰東鄰上六也西鄰六四也過於濟後也幾於中時也祭而合禮雖薄受福此爻既濟之主舉上與下其義之得不言而著也李子思曰設彼我之辭以明在此之義案五上體之中與四上同坎體而濟者也上六險之終故雖極力以濟之而濟之也難四險之始不盡力以濟之而濟之也易故有此象李季辨曰此爻為既濟之君三既伐國矣治定功成之後必生侈心古之聖人其制禮也必立為四時之定祭外此皆徼福者也故有殺牛之戒後世邊境無事則禱祠之事起以髙宗之賢伐國之後黷于祭祀以來鼎雉之變故聖人於此以祭祀言之其為後世慮者深矣右明象占上六濡其首厲贊曰濡其首厲何可久也程正叔曰坎為水濟取水義濡亦取水義窮至於濡首危可知也耿睎道曰既未濟皆以涉川為義李去非曰濡其尾則首可見矣濡其首則溺其尾可知矣林黃中曰初為尾上為首薛氏曰濡其尾者有後顧之義濡其首者不慮前也歷險而不慮前其危可知既濟終亂其義見矣朱子曰首尾在既未濟二卦不必拘一說各自為象且如無咎貞吉二卦亦自不同若一爻吉一爻凶確然不易此揚子雲之太𤣥也易道不然案獸首在前尾在後則既未濟之六爻象皆衡觀也皆經坎水故首尾皆濡以見凡事之欲濟者必身在其中乃可濟也首尾皆濡則身在其中矣未濟者方在水中坎在下也既濟者已出水上坎在上也若夫吉凶悔吝則各以爻之承乘逺近愛惡為義此爻之厲登岸而材弱恐復溺焉故設此戒使已治者之不可忘危懼之心也書曰若涉淵水兹豫往求朕攸濟此之謂也兩卦首尾不言何獸未濟姑曰卦有狐象此卦曳輪則牛之象也離為牛也右明象占案既濟險在前未濟乃出乎險者也而卦義相反焉蓋以水火相濟不相濟之象也然險終在前故既濟終厲終出乎險故未濟終孚應易窮則變之義右明爻義劉長民曰爻辭皆不稱既濟者以其各得位而互於逐爻明其義也初上居前後故以首尾言之二以中女既濟故稱婦三以過時既濟故稱伐鬼方四以臣既濟五以君既濟者也案下三爻用力於濟者也上三爻既濟之後也六爻皆當其位彊者濟而弱者不能濟故喪失戒厲皆在隂爻未濟六爻皆不當位然反隂陽相濟故無凶咎至其濟否亦以彊弱也唯未濟六五君位居中得吉自未濟六三之外兩卦諸爻不言濟者以首尾皆濡見濟之義也右明六爻坎下離上未濟象贊曰火在水上未濟雜卦曰未濟男之窮也虞仲翔曰六爻皆錯故稱未濟干令升同林黃中曰既之為言盡也已往之辭也未之為言有所待也方來之辭也又曰可以濟者有其具也未可以濟者俟其時也程可久曰火自炎上水自潤下無相濟之功六爻雖位失而有應非不濟也特未濟爾毛伯玉曰火在澤上猶在水上也彼為睽而此為未濟豈以剛柔皆應故邪是故易以隂陽竒耦明君臣父子夫婦之象以有應無應辨從違逆順之情蓋以天下之治未有不本於相與而天下之變未有不激於相悖也此贊所謂雖不當位剛柔應也右明卦義象贊曰君子以慎辨物居方右明卦用序卦曰物不可窮也故受之以未濟終焉張敬夫曰太極立而自然有乾坤乾坤立而動靜倡隨自然生矣是二物者未嘗相離而往來於無窮故物之麗於此者不能無屈信往反之數既濟者既然也未濟者未然也言物之既然矣而又有將然者來焉剛柔相摩動靜相生吉凶相倚有無相禪無時而已也程可久曰麗於數者其變無窮蓋莫適為終始林黃中曰未濟既濟之反也覆而視之既濟猶未濟未濟猶既濟也坎為水離為火水火相資而成是為既濟水火各反其所是為未濟朱子發曰天地之道以坎離相濟以日言之日降則月升以月言之日交則月合以嵗言之寒來則暑往皆既濟之象未濟藏焉李季辨曰上篇首乾坤終坎離下篇首咸恆終既未濟亦坎離也天地之道不過隂陽五行之用莫先水火上篇首天地隂陽之正也故以水火之正終焉下篇首夫婦隂陽之交也故以水火之交終焉案乾坤坎離對立者隂陽水火之體也咸恆既未濟相交者隂陽水火之用也隂陽之氣判而為天地水火之精運而為日月此所謂四象蓋指乾坤坎離不可誣也右明卦序亨小狐汔濟濡其尾無攸利贊曰未濟柔得中也小狐汔濟未出中也濡其尾無攸利不續終也雖不當位剛柔應也李子思曰自否之六二柔上行而得中天地相交否者亨矣又曰聖人作易一卦必求其亨之之理使當未可以濟之時坐視而不求所以濟者無是理也故在既濟之時則有既濟之亨在未濟之時則有未濟之亨既濟已用之亨也未濟方來之亨也李泰發曰雖隂陽各不當位而內外各有應有亨之理方時多難君臣同心上下協力事無不濟此未濟之所以亨也案內外有應李子思亦同此說王景孟曰六五以柔得中虗己任賢賴之以濟故近而九四以剛而承逺而九二以剛而應所以濟者在人而亨其成者在五此所以能亨也案贊言柔得中雖不當位剛柔相應蓋指二五居中在未濟之時上下同心所以能亨也五乾大君之位中天下而立柔自坤之二而上行得之故九自乾之五遜而下來二五為應此未濟之為亨蓋孔子之說如此餘說亦可以旁通而曲暢也右明亨劉氏曰狐之濟獨小者遺留於幾盡之時汔濟謂初六也以况隂柔不决之人其濟不能處先而常失於後也朱子發曰狐首輕尾重聼水負尾以其剛不息是以終濟李季辨曰以上六居初小狐也濡尾而不能曵輪故未濟也既濟柔處二而得中雖婦道亦濟也未濟柔居初而未能出中故為小狐幾濟而未濟也耿晞道曰將濟而未濟正涉險中必有過越之材果斷之志然後能進而免險今初六之柔則材不足也居隂則志不果也在險下而未出中故有小狐汔濟之象是小者未亨所以未得為既濟也涉險而在物後有濡其尾之象夫有陽剛之材如既濟之初九濡尾何害初六無其材是以無攸利也胡翼之曰既濟上六怠忽而不思其亂是以反為未濟之時欲復其所濟必籍大材德之人與之戮力同心不畏險阻奮然而往以濟苟有小材德者是猶小狐之涉淵水雖僅至於濟不免濡溺無所利也毛伯玉曰既濟之初九陽也君子也此卦之初六隂也小人也小狐之象小人也非濡尾之不可而小人之不足以濟也右明卦象占初六濡其尾吝贊曰濡其尾亦不知極也卜子夏曰以柔濟險始涉者也近淺猶濡尾况其深逺必不濟矣李泰發曰志欲有為而才不足雖履危涉險奮不顧身為可吝也楊廷秀曰既濟之初九彊於材者也已濟而濡其尾故無咎此卦之初六弱於材者也幾濟而濡其尾故吝然能力其弱以濟難其濟爾志也其不濟非爾志也故聖人惜之曰吝吝者力不足之辭也林黃中曰彖言無攸利而爻言吝者以在一卦之初其失未逺也故系之憂虞云爾右明象占九二曳其輪貞吉贊曰九二貞吉中以行正也干氏曰坎為輪離為牛牛曳輪上以承五命故貞吉李泰發曰當險難未濟之時必資剛健中正之臣然後克濟大業輪者車所恃以行逺也本爻是已六五之君所賴猶車之有輪也非能盡力於驅馳必正而後吉李子思曰既濟之濡尾曳輪止在初九一爻蓋方既濟之初如此耳若乃未濟初六既濡其尾矣而九二猶曳其輪則以其時之不同也然此爻之於六五剛柔相應雖在險中未可驟進其終也必相應以亨故惟居中以守正而待時之至則剛中之材終可以濟又安得不吉乎案未濟之卦緣既濟立象故濡尾濡首二卦既同而伐鬼方與曳其輪又先後一位爾蓋未濟之二乃既濟之初未濟之四乃既濟之三其爻之剛則然也所不同者時與位之異故吉凶亦異焉夫既濟之坎輪在外而初曳之初應四者也是車既濟而離牛曳之以登于岸者也未濟之坎輪在內則二乃輪也而誰與曳之得非六五乎輪正溺水中而六五在上以曳之五者離之牛位也此爻陷於險而難出故靜以俟正應之援及其終也未濟而亨則吉矣右明象占六三未濟征凶不利涉大川贊曰未濟征凶位不當也程可久曰材不勝位應上九無事之地功未集而遽往焉凶之道也朱子曰隂柔不中正居未濟之時以征則凶故其占如此蓋行者可以水浮而不可以陸走也或疑利涉當為不利涉此說是也應上無位不可以往則坎未能出故不利涉蓋征則以水遇火成既濟矣非未濟之象右明象占李子思曰六爻俱失位初上處無位之地中四爻其三皆曰貞吉獨於六三不曰貞吉而乃曰未濟征凶豈非未濟之時以征則凶而以居貞則吉者乎此說得之下卦既終復之上卦筮法然也因而重之之謂也故易之於三每有終止之義而亦每有上進之義此爻當止者也亦當進者也而曰征凶云者下體坎也若舍坎而征則濟乎險涉乎川矣張知常曰下卦皆在險而二獨以中獲貞吉初不量力而三不當位故其患如此右明爻義九四貞吉悔亡震用伐鬼方三年有賞于大國贊曰貞吉悔亡志行也陸希聲曰爻已出險是將濟者處非其位行未得中故能貞吉然後悔亡三年有賞者明有德之君非親征之可貴用得其人故有功而可賞林黃中曰震用伐鬼方之象與既濟之九三同然以九居三君道也以九居四臣道也程可久曰震為雷天之威怒也用伐鬼方此大臣贊其君興衰撥亂者也有賞于大國蓋以大國賞功云李子思曰以剛居隂本自有悔唯居貞俟時當其可動然後吉而悔亡雖然已出坎險之上而時可動矣鬼方之伐亦不免乎三年之淹兹所以為未濟之時乎案貞吉悔亡亦戒以用靜吉動有悔也震用伐鬼方三年此則既濟之時也然久而不克豈非有悔今既功成受賞其悔乃亡方其伐鬼方也猶然未濟也克之然後濟未濟有此不賓之人待其威行既濟而後受賞焉可也為戎首不可也鬼方初六也有賞六五大君也大國本爻之位陽為大位為國也若乃三年震伐則象同既濟之九三右明象占六五貞吉無悔君子之光有孚吉贊曰君子之光其暉吉也朱子曰以六居五亦非正也然文明之主居中應剛虛心以求下之助故得貞而吉且無悔又有光輝之盛信實而不妄吉而又吉也林黃中曰四應在初故先悔而後亡五應在二故貞吉而無悔坎為孚離為光李季辨曰九二陽為君子進遇文明之主相與共濟君子之道光矣剛柔相孚吉孰大焉李泰發曰九二中正之臣為之正應四上二陽相為夾輔能虛已而任用之故貞吉而無悔也所以未濟者以險難在內也所以險難者以九二陷于二隂也今也六五藉左右二陽之力以曵九二之輪九二上應則坎不成坎而險難濟矣此本爻所以為貞吉而無悔三陽君子之道所以光也有孚于三陽豈非吉乎前所謂吉者以居中下應為貞而吉也後所謂吉者以三陽相與有孚而吉也義各有主故辭繁而不殺抑又觀之卦之為爻者六而貞吉者三固戒以用靜之吉其亦以爻不當位而為之戒乎右明象占上九有孚于飲酒無咎濡其首有孚失是贊曰飲酒濡首亦不知節也程可久曰處未濟之終當無事之地為人君所尚蓋濟時之功既成故有孚于飲酒無咎林黃中曰坎為有孚為酒離中虛飲酒之象飲酒亦不可以無孚需于酒食是也飲食燕樂而不失其孚斯為無咎飲酒者燕樂之事也濡首者沉溺之形也案君臣相孚未濟之終有濟者焉飲酒以樂其成未為過也所謂始于憂勤終于逸樂者也然沾醉而至于濡首則前日之相孚者今失于逸樂之過矣孚酒皆坎之象離有頥合之象飲酒之謂也濡首象同既濟既濟首尾象之曳輪此卦尾傅于小狐就為狐尾而首傅于飲酒就為酒濡飲者之首也皆緣上文生義要之濡首至尾皆以全身濟險為象者也剛過中故有失是之戒右明象占李季辨曰聖人設卦不終于既濟而終于未濟者所以寓生生不窮之意也未濟易之終上九未濟之終生生不窮之理在是夫亂者治之基治者亂所伏未濟之極豈終于不濟哉以上九之才信其終于必濟也嘗聞天包地天如雞子地如卵黃此以象言也洛書之數自一至九耦數在竒之中大衍之數五十而其用四十有九蓋數竒則生生不窮也易之爻三百八十又四而始于乾之初九終于未濟之上九九又生一其數不窮而耦爻包伏於竒數之內此造化自然之數也右明爻義李季辨曰以六居初濡尾而不曳輪故未濟然卦有三陽曳輪伐國濡首濡尾無異于既濟但初爻得隂故曵輪不在初而在二伐國不在三而在四飲酒不在五而在上故未濟不如既濟之初既濟不如未濟之終案既濟初剛終柔故初吉終亂未濟初柔而終剛故有孚于飲酒既濟矣治則生亂唯未濟故圖所以濟者焉右明六爻厚齊易學卷三十二
