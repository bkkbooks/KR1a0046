body:
  text: 厚齊易學卷四十一宋馮椅撰易外傳第九象下贊夬至艮澤上于天夬君子以施祿及下居德則忌上下皆去聲施去聲居如竒貨可居之居謂積而不散也蘭惠卿曰水澤之氣上蒸于天其勢不居必決而下劉氏曰當施祿以象雨之沛不當居德以象其不雨朱子發曰古者上有大澤則民夫人待于下流知惠之必將至也居德則忌朱子曰未詳馮氏曰言積其德澤不以及下則忌矣劉氏曰不當自居其德以犯所忌也李子思同不勝而往咎也釋初九占言不慮勝而往有戎勿恤得中道也有戎勿恤九二占得中道也嚴備而不輕發為得中道與初九之不勝其任者異矣居下卦之中又以剛居隂位故也君子夬夬終無咎也君子夬夬九三象終無咎也明占其行次且位不當也聞言不信聰不明也其行次且九四象位不當也陽處隂位故不果決聞言不信聰不明也本爻坎六四之變變陽則坎耳塞矣約象之離目亦塞故曰聰不明也聰坎耳明離目之象中行無咎中未光也中行無咎九五占中未光也不能勇決故雖居大中之位未能光明也無號之凶終不可長也無號之凶上六占終不可長也一隂至末豈能長存天下有風遘后以施命誥四方后天子諸侯之通稱施去聲自上而下曰施命號令也諭下曰告以其為誥命故轉注作誥或作詰誤李氏曰風自上而下物自下而承相遇之象也李去非曰天與萬物相逺而鼓舞以風后與民相逺而鼓舞以號令張舜元曰天無言行四時之令者風也后則法之施命告於四方程正叔曰風行天下無所不周后故施命周誥四方毛伯玉曰天子曰元后諸侯曰羣后自一國而之天下皆可以言四方也程可久曰命令之行巽以入之以刑威強民者失其義也郭子和曰遘之道最為難用聖人用於誥命可謂善用易矣繫于金柅柔道牽也繫于金柅初六象柔道牽也牽有繫義六之道柔也朱子曰牽引而進也以其進故止之包有魚義不及賔也包有魚九二象義不及賔也釋不利賔之占毛伯玉曰初之受制於二猶魚之不出於包也欲二之獨任其責也以為不獨在我也而有正當任者焉此及賔之說也主不任貴賔誰肯任甚矣九二之任専而責重也竊謂此正孔子義不及賔之意與經不利之意少異其行次且行未牽也其行次且九三占行未牽也雖行未牽初六以進故無大咎牽承初六柔道牽之辭李去非曰夬之九四牽羊而遘之三未牽不欲柔之勝剛如此無魚之凶逺民也無魚之凶九四象占逺民也逺去聲隂為民謂初六去已逺而二近之也朱子曰民之去已由己逺之馮氏曰自古失民而動無有吉理九五含章中正也有隕自天志不舍命也九五含章象中正也即彖贊所謂剛遇中正有隕自天占志不舍命也舍今捨言不能舍天命以為遘有隕自天猶言今時既墜厥命遘其角上窮吝也遘其角上九象上窮吝也以上窮明吝上上聲澤上于地萃君子以除戎器戒不虞上上聲除去聲簡治而除舊也除舊置新謂之除猶治亂謂之亂馴擾謂之擾也戎器兵車介胄也必有弊壞者非所以防不虞之變不虞出於意料所不慮者也虞度也耿晞道曰澤上於地則鍾聚而不流毛伯玉曰除戎器戒不虞猶澤之有坊也程正叔曰衆聚則有爭物聚則有奪聚必有所不虞之事除戎器而聚之所以戒不虞也竊謂防壞則澤有不虞之決故謹防所以戒不虞乃亂乃萃其志亂也乃亂乃萃初九占其志亂也感於從四又欲從五故亂引吉無咎中未變也引吉無咎六二占中未變也居中而志未變故與五孚也往無咎上巽也往無咎六三占上巽也上上聲約象巽有巽入于五之象大吉無咎位不當也大吉無咎九四占位不當也有二義一正言位不當本有咎一借言不當君位故僅免咎萃有位志未光也萃有位九五象志未光也以九四近民有匪孚者故齊洛涕洟未安上也齎咨涕洟上六象未安上也上去聲在上而無民故未安而傷嘆如此地中生木升君子以順德積小以髙大順古慎通髙大或作成髙大後人所增也木植于地中而生則日升于上蓋順生理也君子以順為德故能升髙自下積小以髙大亦如木之自拱把而至于干霄合抱也坤巽之德皆順二卦皆隂為小然柔自初而升于上卦其髙大如此楊庭秀曰棟梁拱把之積也聖人小善之積也在積之有漸進而不已耳而巽端輒欲一超直入欺哉允升大吉上合志也允升大吉初六象占上合志也上上聲上合坤之志九二之孚有喜也九二之孚象有喜也喜去聲應六五故升虛邑無所疑也升虛邑九三象占虛空虛一作墟俗文四邑為丘四丘為墟無所疑也隂善疑三本六居之六則疑今九居之則無所疑矣言九居此位可不疑也王用亨于岐山順事也王用亨于岐山六四象順事也以順從事也坤體隂位之象貞吉升階大得志也貞吉升階六五象占大得志也大言九二陽爻六五以禮進之如升階登于王所是為得志趙氏曰孔子於贊曰上合志曰有喜曰無所疑曰順事曰大得志無非以其德之巽順也冥升在上消不富也冥升在上上六象消不富也六隂為不富隂盈則消此冥升之象澤無水困君子以致命遂志澤無水困見輯傳致詣送也程可久曰如夷齊之餓命也無所避致也求仁者志也得仁者遂也衆人處窮困之際惶遽拘迫喪其所守既失於已未必免於人此不知命者也入于幽谷幽不明也入于幽谷初九占幽不明也入于坎下幽隂而不明困于酒食中有慶也困于酒食九二象舉其一而下文併釋之中有慶也中言得中道不往而待其來乃中也九五賜賚酒食也據于蒺藜乘剛也入于其宫不見其妻不祥也據于蒺藜六三象乘剛也剛謂九二入于其宫不見其妻占不祥也明凶來徐徐志在下也雖不當位有與也劓刖志未得也乃徐有說以中直也利用祭祀受福也劓刖九五象志未得也為上掩下閡其與六二相應之志未得故用刑以去之乃徐有說占以中直也居中義直故徐乃相應利用祭祀占受福也福聲逼即尸嘏所傳之辭困于葛藟未當也動悔有悔吉行也困于葛藟上六象未當謂六三如葛藟之纒繞蓋隂柔未當其位也動悔有悔占吉行也行釋征木上有水井君子以勞民勸相上去聲勞相並去聲誘之之謂勸輔之之謂相李仲永曰以木汲水而上是水在上而木在下井之象也勞民者所以勸相也李氏元卓曰象之所像不一而足期于盡意而己木上有水非井也井之用也木上有火非鼎也鼎之用也李去非曰坎勞卦也水之出也不勞而人以汲為勞則有之矣勞其勤苦而勸助其不足則井為無窮之用程可久曰君子置井疆以養民使之稼穡必有以勞之未知所為則勸之已為而力不給則相之二說並行而不相悖也井泥不食下也舊井無禽時舍也井泥不食初六象下也下戶雅反在井之下泥滓所萃故也舊井無禽象時舍也舍今捨李季辨曰失井之道為時所棄井谷射鮒無與也井谷射鮒九二象無與也九五不應而無與之者故不上出而下注井泄不食行惻也求王明受福也井泄不食九三象行惻也行道之人為之心惻然也求王明受福也又明占辭承上文行道之人為之求明王以使人汲食之乃受福也井甃無咎修井也井甃無咎六四象占修井也井敝而修甃之寒泉之食中正也寒泉之食九五象占元吉在上大成也元吉在上上六占大成也以大成明收義澤中有火革君子以治歷明時澤中有火革不曰澤火革如電雷噬嗑而曰澤中有火必無之理也當假象耳唯林黃中曰澤中有火其氣必變為溫泉或為膽水為丹砂硫黃皆火之所革也治平聲歷歷法時天時也李氏曰時變之運有數存焉歷所以步其數治歷而時可明矣李去非曰晝夜者一日之革氣候者大數之革晦朔者一月之革冬至者一嵗之革歷元者無窮之革朱子發問古歷起於牽牛一度沈存中謂今宿於斗六度何也郭立之曰日久必差差必復於牽牛牽牛一度者上元太初起歷之元也林黃中曰夫歷其始未嘗不精且密行之嵗久未有不差三代而上莫可考已漢太初唐大衍皆歷術之宗然未數十年躔次悉不相應又復變而求之天道之行不能無變故也毛伯玉曰自漢以來歷家求自傅於易故有卦氣起中孚之說審爾則治歷明時曷不於中孚言之程可久曰春秋每年具四時朔晦以謹其甲子書日食者三十六蓋歷法存焉爾鞏用黃牛不可以有為也鞏用黃牛初九象不可以有為也為作為也言時不可變更已日革之行有嘉也已日革之六二象行有嘉也明征吉無咎之占征行也嘉得君之所嘉嘉叶聲笄革言三就又何之矣革言三就九三占又何之矣朱子曰言已審改命之吉信志也改命之吉九四占信志也明有孚為君上信其志大人虎變其文炳也大人虎變九五象其文炳也虎豹之革取其文九自離二往故炳然光明之盛君子豹變其文蔚也小人革面順以從君也君子豹變上六象其文蔚也蔚紆勿反茂也張子厚曰虎文章大其變故明豹文章小其變故蔚小人革靣占木上有火鼎君子以正位凝命象取神器之義不取物象也凝魚冰反聚止也如庶績其凝至道不凝焉之凝劉氏仲平曰木上有火非鼎也鼎之用也京君明曰神器至大至重正位凝命法其重大不可遷移李仲永曰位天位也命天命也馮氏曰不正則傾不凝則散鼎顛止未悖也利出否以從貴也鼎顛止初六象曰未悖也以出否故未悖必內反逆也陸希聲曰止當承鼎顛而覆之悖也以出其惡雖覆未悖利出否亦象疑為得妾以其子傳之者誤以從貴也出其臭惡不食以從所貴之潔新也李仲永曰妾賤而從其子之貴然則陽貴隂賤林黃中曰九四為子之象為長出否有棄賤為妾之象鼎有實慎所之也我仇有疾終無尤也鼎有實九二象慎所之也之往也馮氏曰以五不能即我而往以即之則不可故謹其所往張知常曰待時之謂我仇有疾占終無尤也疾仇而非疾我雖不相即而終無怨尤尤叶余之反蘭惠卿曰不能我即於我何尤李季辨曰五耳麗上若圮而下則鼎虧矣二不上往五不下接而鼎道全故終無尤朱子發曰四近君與我為仇二之五其可不慎所之乎二之五鼎得實而吉不喪其實終無尤也鼎耳革失其義也鼎耳革九三象失其義也耳革則不能舉失鼎養之義覆公餗信如何也覆公餗九四象信如何也鄭舜舉曰五鼎之主不擇人以當責乃從而信之曰信如何也夫子之嘆與鼎黃耳中以為實也鼎黃耳六五象中以為實也黃中之色實謂二三四陽爻在鼎之中玉鉉在上剛柔節也玉鉉在上玉鉉上九之象剛柔節也節叶津入聲以上九之剛節六五之柔如以玉鉉貫鼎之耳也或曰以陽居隂以剛節柔也洊靁震君子以恐懼修省洊音義同習坎省悉井反察也恐懼遇震之象恐生于心懼見於貌亦洊不一之義修其所未為初遇震也省其所以為再遇震也或曰修其善省其惡林黃中曰敬天之怒無敢戲豫迅雷風烈必變是也毛伯玉曰恐懼者作於其心修省者見於行事亦通震來虩虩恐致福也笑言啞啞後有則也震來虩虩初九象笑言啞啞占恐致福也後有則也說見彖贊震來厲乘剛也震來厲六二象乘剛也乘初九震蘇蘇位不當也震蘇蘇六三象位不當也不安其位必行而後無眚震遂泥未光也震遂泥九四象占未光也言陽剛不能升進五位遂止於此又為聲不大振之象震往來厲危行也其事在中大無喪也震往來厲六五象危行也行道也來則危道其事在中大無喪也明億無喪有事之占其所有事在得中道故大無喪失大謂億也億數之極故為大震索索中未得也雖凶無咎畏鄰戒也震索索上六象中未得也未得為六五之中雖凶無咎畏鄰戒也明占震于其鄰乃天示戒當知警畏則可無咎兼山艮君子以思不出其位出如字程正叔曰以此併彼為兼蘭惠卿曰山與澤不可重也李氏元卓曰兩山相並也李去非曰位者止之所也注各止其所不侵官也程可久曰禹思溺稷思饑是也劉氏曰山雖兼而各止其所也艮其止未失正也艮其止初六象未失正也明利永貞之占蘭惠卿曰凡所當止之事若待其已行而後止之則失正矣林黃中曰未之為言不保往云爾不承其隨未退聽也不承其隨六二占未退聽也未能退聽于九三之止艮其限危熏心也艮其限九三象危熏心也占艮其身止諸躬也艮其身六四象止諸躬也身也指自已猶曰我也郭子和曰言止之在我也艮其輔以中也艮其輔六五象以中也中故語默有序舊作中正朱子曰正衍文叶韻可見程可久曰宜作以中正然爻無正義敦艮之吉以厚終也敦艮之吉上九象占以厚終也以厚明敦厚齊易學卷四十一
